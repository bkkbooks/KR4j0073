body:
  text: 花草稡編卷六明陳耀文輯小令好事近宋子京睡起玉屏風吹去亂紅猶落天氣驟生輕暖襯沉香帷箔珠簾約住海棠風愁拖兩眉角昨夜一庭明月冷秋千紅索鄭毅夫把酒對江梅花小未禁風力何計不教零落為青春留得故人莫問在天涯尊前苦相憶好把素香收取寄江南消息催粧王昻山房隨筆喜氣擁門䦨光動綺羅香陌行到紫薇花下悟身非凡客不須脂粉涴天真嫌怕太紅白留取黛眉淺處畫章臺春色陶朱新録云嘉王榜探花王昻榜下擇壻時作催粧詞云吕聖求長記十年前彼此玉顔雲髮尊酒幾畨相對樂春花秋月而今各自困飄零憔悴幾年别說著大家煩惱且大家休說趙文鼎風動一川花搖漾影迷紅碧人立杏花隂下泛光風襲襲瓊枝璧月互相輝春容泫將夕羅蓋暗承花霧漬鮫綃香濕舟行嚴次山曉色未分明敲動月邊鼉鼓卯酒一杯徑醉又别君南浦春江如席照晴空大舶夾雙櫓腸斷斜陽渡口正落紅如雨秋飲吳君特鴈外雨絲絲將恨和愁都織玉骨西風添瘦減尊前歌力袖香曽枕醉紅腮依約唾痕碧花下凌波入夢引春雛雙鶒夕景廖世美落日水鎔金天淡暮烟凝碧樓上誰家紅袖靠䦨干無力鴛鴦相對浴紅衣短棹㺯長笛驚起一雙飛去聽波聲相拍趙德麟急雨漲溪渾小樹帶山秋色輕棹暮天歸路裊芙蓉烟白酒醒香冷夢回時蟲聲正凄絶只覺小忩風月與昨宵都别秦少游山路雨添花花動一山春色行到小溪深處有黃鸝千百飛雲當面化龍蛇夭矯掛空碧醉卧古藤隂下杳不知南北蔣子雲葉暗乳鴉啼風定老紅猶落蝴蝶不隨春去入薰風池閣休歌金縷勸金巵酒病煞如昨簾捲日長人靜任楊花飄泊程正伯别夢記春前春盡苦無歸日想見鵲聲庭院誤幾回消息萬重離恨萬重山無處說思憶只有路傍雙堠也隨人孤隻二烟盡戍樓空又是一簾佳月何事山城留滯負好花時節燒燈剪綵沒心情應有翠蛾說欲借好風吹恨奈亂雲愁叠蔡君謨瑞雪滿京都宫殿盡成銀闕常對素光遙望是江梅時節如今江上見寒梅幽香自清絶重看落英殘艷想飄零如雪送春蔡行之日日惜春殘春去更無明日擬把醉同春住又醒來岑寂明年不怕不逄春嬌春怕無力待向燈前休睡與留連今夕壽夫吳氏瀚臘近漸知春已有早梅堪折况是誕辰佳宴擁笙簧羅列玉杯休惜十分斟金爐更頻爇連理願同千歲看蟠桃重結李易安風定落花深簾外擁紅堆雪長記海棠開後正傷春時節酒䦨歌罷玉樽空青紅暗明滅魂夢不堪幽怨更一聲啼鴂魏夫人雨後曉寒輕花外早鶯啼歇愁聽隔溪殘漏正一聲凄咽不堪西望去程賖離腸萬回結不似海棠隂下按涼州時節鄭意娘往事與誰論無語暗彈青血何處最堪腸斷是黃昏時節倚樓凝望又徘徊誰解此情切何計可同歸鴈趂江南春色思越人馮延已酒醒情懷惡金縷褪玉肌如削寒食過却海棠零落乍倚遍䦨干烟淡薄翠幕簾櫳畫閣春睡著覺來失秋千期約杏園芳尹鶚嚴粧嫩臉花明教人見了關情含羞舉步越羅輕稱娉婷終朝咫尺窺香閣迢迢似隔層城何時休遣夢相縈入雲屏栁含烟毛文錫隋堤栁汴河旁夾岸緑隂千里龍舟鳯舸朩蘭香錦帆張因夢江南春景好一路流蘇羽葆笙歌未盡起橫流鎖春愁二河橋栁占芳春映水含烟拂路幾回攀折贈行人暗傷神樂府吹為橫笛曲能使離腸斷續不如移植在金門近天恩三章臺栁近垂旒低拂往來冠蓋朧朧春色滿皇州瑞烟浮直與路邊江畔别免被離人攀折最憐京兆畫蛾眉葉纖時散餘霞毛澤民墻頭花口寒猶噤放繡簾晝靜簾外時有蜂兒趂楊花未定䦨干又還獨憑念翠低眉暈春夢枉惱人腸更厭厭酒病繡帶子梅黃山谷小院一枝梅衝破曉寒開晚到芳園遊戲滿袖帶香回玉酒覆銀杯盡醉去猶帶重來東鄰何事驚吹怨笛雪片成堆客路見梅曽純甫瀟灑隴頭人取次一枝新還是東風來也猶作未歸人微月淡烟林謾佇立惆悵黃昏暮寒香細踈英幾㸃怎奈銷魂謁金門一名出塞詞話作空相憶張宗瑞名垂楊碧韋莊空相憶無計得傳消息天上嫦娥人不識寄書何處覔新睡覺來無力不忍把伊書跡滿院落花春寂寂斷腸芳草碧古今詞話云韋莊以才名寓蜀王建割據遂羈留之莊有寵人姿質艷麗兼善詞翰建聞之託以教內人為詞强莊奪去莊追念悒怏作小重山及此詞情意凄怨人相傳播盛行於時姬後傳聞之遂不食而卒二春漏促金燼暗挑殘燭一夜簾前風撼竹夢魂相斷續有箇嬌饒如玉夜夜繡屏孤宿閒抱琵琶尋舊曲逺山眉黛緑薛昭藴春滿院疊損羅衣金線睡覺水精簾未捲簷前雙語燕斜掩金鋪一扇滿地落花千片早是相思腸欲斷忍教頻夢見牛希濟秋已暮重疊關山岐路嘶馬搖鞭何處去曉禽霜滿樹夢斷禁城鐘鼓淚滴枕檀無數一㸃凝紅和薄霧翠蛾愁不語孫光憲留不得留得也應無益白紵春衫如雪色揚州初去日輕别離甘拋擲江上滿帆風疾却羡彩鴛三十六孤鸞還一隻馮延巳風乍起吹皺一池春水閒引鴛鴦芳徑裏手挼紅杏蘂鬪鴨䦨干獨倚碧玉搔頭斜墜終日望君君不至舉頭聞鵲喜南唐書云元宗樂府詞云小樓吹徹玉笙寒延已有風乍起吹皺一池春水之句皆為警䇿元宗嘗戲延已曰吹皺一池春水干卿何事延已曰未若陛下小樓吹徹玉笙寒元宗悅二楊栁陌寶馬嘶空無迹新著荷衣人未識年年江海客夢覺巫山春色醉眼飛花狼藉起舞不辭無氣力愛君吹玉笛又一闋云學著荷衣還可喜少都來有幾自古閒愁無際晏同叔秋露滴滴盡楚蘭紅淚往事舊歡何限意思量如夢寐人貌老於前歲風月宛然無異座有嘉賓尊有桂莫辭終夕醉荆公能改齊漫録春又老南陌酒香梅小遍地落花渾不掃夢回情意悄紅箋寄與煩惱細寫相思多少醉後幾行書字小淚㾗都揾了賀方回溪水急無數落花漂出燕子分泥蜂釀蜜遲遲艷風日須信芳菲隨失况復佳期難必擬把此情書萬一愁多翻閣筆春恨秦處度鴛鴦浦春漲一江花雨隔岸數聲初過櫓晚風生碧樹舟子相呼相語載取暮愁歸去寒食江村芳草路愁來無著處吳門王平子書一紙小砑吳箋香細讀到别來心下事蹙殘眉上翠怕落傍人眼底握向抹胸兒裏針線不忺收拾起和衣和悶睡俞文豹吹劍録趙德莊休相憶明夜逺如今日樓外緑烟封羃羃花飛如許急栁岸晚來船集波底斜陽紅濕送盡去雲成獨立酒醒愁又入耆舊續聞云紅濕二字蓋用李後主細雨濕流光如花間集一簾踈雨濕春愁之濕二春已半繡緑新紅如換燕子還來簾幕畔閒愁天不管翠被曲屏香滿花葉彩箋人逺鵲喜蛛絲都未判連環空約腕陳子髙花滿院飛去飛來雙燕紅雨入簾寒不卷曉屏山六扇翠袖玉笛悽斷脉脉兩蛾愁淺消息不知郎近逺一春長夢見耆舊續閒云花間集和凝詞云拂水雙飛來去燕曲檻小屏山六扇二春漏促誰見兩人心曲罨畫屏風銀爉燭淚珠紅蔌蔌懊惱歡娛不足只許夢中相逐今夜月明何處宿畫橋春水渌三愁脉脉目斷江南江北烟樹重重芳信隔小樓山幾尺細草孤雲斜日一向弄晴天色簾外落花飛不得東風無氣力張宗瑞春寂寂緑暗溪南溪北溪水沉沉天一色鳥飛春樹黑腸斷小樓吹笛醉裏看朱成碧愁滿眼前遮不得可憐雙鬢白張宗瑞花半濕睡起一窗晴色千里江南空咫尺醉中歸夢直前度蘭舟送客雙鯉沉沉消息樓外垂楊如此碧問春來幾日自名垂楊碧初春前人花事淺方費工夫勻染墻角紅梅開未遍小桃才數㸃人生暮寒庭院閒續茶經香傳酒思如水詩思懶雨聲簾不捲程觀過江上路依約數家烟樹一枕歸心村店暮更亂山深處夢過江南芳草渡曉色又催人去愁似游絲千萬縷倩東風約住史愚就日録深院宇寂寂不禁風雨苔徑流錢青莫數銀泥蝸篆古滿院多應無主却被癡兒拈取穿向栁絲喧笑語買將春色去蒲江風不定移去移來簾影一雨林塘新緑淨杏梁歸燕並翠袖玉屏金鏡日薄綺疏人靜心事一春疑酒病鳥啼花滿徑韓無咎春尚淺誰把玉英裁剪儘道梅梢開未遍卷簾花滿院樓上酒融歌暖樓下水平烟逺却似湧金門外見絮飛波影亂盧申之蘭棹舉相趂落紅飛去一隙輕簾凝睇處栁絲牽不住昨日翠蛾金縷今夜碧波烟渚好夢無憑窗又雨天涯知幾許前人閒院宇獨自行來行去花片無聲簾外雨峭寒生碧樹做弄清明時序料理春酲情緒憶得歸時停棹處畫橋看落絮石次伸風又雨斷送殘春歸去人靣桃花在何處緑隂空滿路立馬垂楊官渡一寸柔腸萬縷回首碧雲迷洞府杜鵑啼日暮暮春康伯可春又晚風徑落紅如剪睡起繡床飛絮滿日長門半掩不管離腸欲斷聽盡梁間雙燕試上小樓還不見樓前芳草逺蒲江寒半退斜掩小屏珠翠栁眼才醒桃欲醉日髙簾影碎暗解鴛鴦羅帶獨立晚風誰㑹心事悠悠人好在畫橋流水外趙文鼎新雨霽開遍滿園桃李波暖池塘風細細一雙花鴨戲喚起春融睡美扶醉宿粧慵理移步避人花影裏繡裙低窣地周紫芝春雨細開盡一番桃李栁暗曲欄花滿地日髙人睡起緑浸小池春水沙暖鴛鴦雙戲薄幸更無書一紙畫樓愁獨倚春晚吳子和風乍扇簾外落紅千片飛盡落花春不管鬪忙鶯與燕往事上心撩亂睡起日髙猶倦料得伊家情眷眷近來長夢見諸公要豫出郊程正伯春漠漠何處養花張幕佩冷香殘天一角忍看羅袖薄兩兩鴛鴦難學六六錦鱗空托趂有餘芳須細酌東風情性惡二春夜雨催潤栁塘花塢小院深沉門幾許畫簾香一縷獨立晚庭凝佇細把花枝閒數燕子不來天欲暮說愁無處訴盧炳春寂寂節物又催寒食樓上捲簾雙燕入斷魂愁似織門外雨餘風急滿地落英紅濕好夢驚回無處覔天涯芳草碧春晚洪叔璵空同詞風共雨催盡落紅飛絮百計留春春不住杜鵑聲更苦細栁關河狹路幾被嬋娟相誤空憶墜鞭遺扇處碧窗眉語度陳汝羲西風竹風入翠烟矗矗紅小欄干知幾曲聲聲敲碧玉窗下鳯臺銀燭斷夢已驚難續曾伴去年庭下菊夜䦨聽雨宿憶故居蘇養直何處所門外冷雲堆浦竹裏江梅寒未吐茅屋踈踈雨誰遣愁來如許小立野塘官渡手種凌霄今在否栁浪迷烟渚李好義花遇雨又是一番紅素燕子歸來衝繡幕舊巢無覔處誰在玉樓歌舞誰在玉關辛苦若使胡塵吹得去東風侯萬户春恨詩餘韋莊無花間春雨足染就一溪新緑栁外飛來雙屬玉㺯晴相對浴樓外翠簾髙軸倚遍欄干幾曲雲淡水平烟樹簇寸心千里目曽舜卿山銜日淚灑西風獨立一葉扁舟流水急轉頭無處覔去則而今已去憶則如何不憶明日到家應記得寄書回鴈翼二深院寂一㸃青燈銜璧空說銷愁須酒力病多禁未得遙望西樓咫尺爭信今宵思憶伴我枕前雙淚濕梧桐秋雨滴天機餘錦山無數遮斷故人何處見說䦨干獨繫住溪邊紅葉樹憶著前時歡遇惹起今畨愁緒怎得西風吹淚去陽臺為暮雨出塞李知幾花樹樹吹碎胭脂紅雨將謂郎來推繡户暖風搖竹塢睡起䦨干凝佇漠漠紅樓飛絮剗踏襪兒垂手處隔溪鶯對語春半朱淑真春已半觸目此情無限十二䦨干閒倚遍愁來天不管好是風和日暖輸與鶯鶯燕燕滿院落花簾不捲斷腸芳草逺趙介之風雨急紅紫又還狼籍嫩緑團枝苔徑濕簾開雙燕入院靜晝閒人寂一縷水沉烟直心事有誰能㑹得階前芳草碧好女兒山谷粉淚一行行啼破曉來粧懶繫酥胸羅帶羞見繡鴛鴦擬待不思量怎奈何目下恓惶假饒來後教人見了却去何妨憶悶令晏叔原取次臨鸞勻畫淺酒醒遲來晚多情愛惹閒愁長黛眉低斂月底相逄見有深深良願願期信似月如花須更交長逺天門謡賀方回牛渚天門險限南北七雄豪占清霧斂與閒人登覽待月上潮平波灔灧塞管輕吹新阿濫風滿檻厯厯數西州更㸃清平樂溫廷筠上陽春晚宫女愁蛾淺新歲清平思同輦爭奈長安路逺鳯帳鴛被徒燻寂寞花鎖千門竟把黃金買賦為妾將上明君二洛陽愁絶楊栁花飄雪終日行人恣攀折橋下水流嗚咽上馬爭勸離觴南浦鶯聲斷腸愁殺平原年少回首揮淚千行韋莊春愁南陌故國音書隔細雨霏霏梨花白燕拂畫簾金額盡日相望王孫塵滿衣上淚㾗誰向橋邊吹笛駐馬西望銷魂二野花芳草寂寞關山道栁吐金絲鶯語早惆悵香閨暗老羅帶悔結同心獨憑朱欄思深夢覺半床斜月小窗風觸鳴琴三何處遊女蜀國多雲雨雲解有情花解語窣地繡羅金縷粧成不整金鈿含羞待月鞦韆住在緑槐隂裏門臨春水橋邊四鶯啼殘月繡閣香燈滅門外馬嘶郎欲别正是落花時節粧成不畫蛾眉含愁獨倚金扉去路香塵莫掃掃即郎去歸遲孫光憲愁腸欲斷正是青春半連理分枝鸞失伴又是一場離散掩鏡無語眉低思隨芳草萋萋慿仗東風吹夢與郎終日東西二等閒無語春恨如何去終是踈狂留不住花暗栁濃何處盡日目斷魂飛晚窗斜界殘暉長恨朱門薄暮繡鞍驄馬空歸毛熙震春光欲暮寂寞閒庭户粉蝶雙雙穿檻舞簾捲晚天踈雨含愁獨倚閨幃玉爐烟斷香微正是銷魂時節東風滿樹花飛李後主别來春半觸目愁腸斷砌下落梅如雪亂拂了一身還滿鴈來音信無慿路遙歸夢難成離恨恰如春草更行更逺還生陽春集深冬寒月庭戶凝霜雪風鴈過時魂斷絶塞管數聲嗚咽披衣獨立披香流蘇亂結愁腸往事總堪惆悵前歡休更思量二雨晴烟晚緑水新池滿雙燕飛來垂栁院小閣畫簾髙捲黃昏獨倚朱欄西南新月眉灣砌下落花風起羅衣特地春寒三西園春早夾徑抽新草冰散漪瀾生碧沼寒在梅花先老與君同飲金杯飲餘相取徘徊次第小桃將發軒車莫厭頻來晏同叔西風細細葉葉梧桐墜緑酒初嘗人易醉一枕小窗濃睡紫薇朱槿花殘斜陽却照欄干雙燕欲歸時節銀屛昨夜微寒晏同叔春花秋草只是催人老總把千山眉黛掃未抵别愁多少勸君緑酒金杯莫嫌絲管聲催走烏飛不住人生幾度三臺二春來秋去往事知何處燕子歸飛蘭泣露光景千留不住酒闌人散忡忡閒階獨倚梧桐記得去年今日依前黃葉西風三紅箋小字說盡平生意鴻鴈在雲魚在水惆悵此情難寄斜腸獨倚西樓遙山恰對簾鈎人靣不知何處緑波依舊東流小山詞留人不住醉解蘭舟去一棹碧濤春水路過盡曉鶯啼處渡頭楊栁青青枝枝葉葉離情此後錦書休寄畫樓雲雨無憑二千花百草送得春歸了拾翠人稀紅漸少葉底杏青梅小小瓊閒把琵琶雪香微透輕紗正好一枝橋艷當筵獨占韶華三紅英落盡未有相逢信可恨流年凋緑鬢睡得春酲欲醒細筝曾醉西樓朱絃玉指梁舟曲罷翠簾髙捲幾回新月如鈎四波紋碧皺曲水清明後折得踈梅香蒲袖暗喜春紅依舊歸來紫陌東頭金叉換酒銷愁栁影深深細路花梢小小層樓五么絃寫意意密絃聲碎書得鳯箋無限事猶恨春心難寄卧聼踈雨梧桐雨餘淡月朦朧一夜夢魂何處那回楊葉樓中六暫來還去輕似風頭絮縱得相逢留不住何况相逢無處去時約略黃昏月華却到朱門别後幾畨明月素娥應是銷魂七雙紋彩袖笑捧金船酒嬌妙如花輕似栁勸客千春長壽艷歌更倚踈絃有情酒醉尊前恰是可憐時候玉嬌今夜初圓八蓮開欲遍一夜秋聲轉殘緑斷紅香片片長是西風堪怨莫愁家住溪邊採蓮心事年年誰管水流花謝月明昨夜蘭船九沉思暗記幾許無慿事菊靨開殘酒少味閒却畫欄風意夢雲歸處難尋微涼暗入香襟猶恨那回庭院依前月淡燈深十鶯來燕去宋玉墻東路草草幽歡能幾度便有繫人心處碧天秋月無端别來長照關山一㸃厭厭誰㑹依前憑暖䦨干十一心期休問只有尊前分勾引行人添别恨因是語低香近勸人滿酌金鍾清歌唱徹還重莫道後期無定夢魂猶有相逢歐陽永叔小庭春老碧砌紅萱草長憶小欄閒共繞擕手緑叢含笑别來音信全乖舊期前事堪猜門掩日斜人靜落花愁㸃青苔王介甫竹坡詩話留春不住費盡鶯兒語滿地殘紅宫錦汚昨夜南窗風雨小憐初上琵琶曉來思繞天涯不肯畫堂朱户東風自在楊花栁耆卿隂晴未定薄日烘雲影金鞍何處尋芳徑緑楊依舊南陌靜厭厭幾許春情可憐老去難成看取鑷殘雙鬢不隨芳草重生李閣使席張子野清歌逐酒醉臉鮮霞透櫻小杏青寒食後衣換縷金輕繡畫堂新月朱扉嚴城夜鼓歸遲細看玉人粧靣春工不在花枝二屏山斜展帳卷紅綃半泥淺曲池飛海燕風度楊花滿院雲愁雨恨空深覺來一枕春隂隴上梅花落盡江南消息沉沉朩犀劉原甫小山叢桂最有留人意拂葉攀花無限思雨濕濃香滿砌别來過了秋光翠簾昨夜新霜多少月宫閒地姮娥與借微芳陳去非黃衫相倚翠葆層層底八月江南風日美㺯影山腰水尾楚人未識孤妍離騷遺恨千年無往菴中新事一枝喚起幽禪蘇養直斷崕流水香度青林底元配騷人蘭與芷不數春風桃李淮南叢桂小山詩翁合得躋攀身到十洲三島心遊萬壑千巖朩犀向伯恭吳頭楚尾踏破芒鞋底萬壑千巖秋色裏不奈惱人風味如今老我鄉林世間百不關心獨喜愛香韓壽能來同醉花隂朱希真人間花少菊小芙蓉老冷淡仙人偏得道買定西風一笑前身元是江梅黃姑㸃破冰肌只有暗香猶在飢參清似南枝韓叔夏秋光如水釀作鵝黃蟻散入千巖佳樹裏惟許修門人醉輕鈿重上風鬟不禁月冷霜寒步障深沉歸去依然愁滿江山夷堅支志云原甫作朩犀詞其後陳蘇等五人亦續成一闋王晦叔并紀於碧雞漫志且云同一花一曲賦者六人必有第其髙下者豫以為皆佳句云閨情李漢老露花烟栁春思濃如酒幾陳狂風新雨後滿地落紅鋪繡風流何處踈狂厭厭恨結柔腸又是危欄獨倚一川烟草斜楊漁父連可久陳鴻驚起一網沉江渚落葉亂風和細雨撥棹不如歸去蘆花輕泛微瀾蓬窗獨自清閒一覺遊仙好夢任他竹冷松寒趙園避暑劉叔安栁隂庭院簾約風前燕著雨荷花紅半斂消得盈盈緑扇竹光野色生寒玉纖雪藕冰盤長記酒醒人靜暗香吹月䦨干宫怨黃叔暘珠簾寂寂愁背銀缸泣記得少年初選入三十六宫第一當時掌上承恩而今冷落長門又是羊車過也月明花落黃昏擬太白應制王通叟宜春小苑處處花開滿學得紅粧紅要淺催上金車要看君王曲宴瑶池小舟掠水如飛奪得錦標歸去匆匆不惜羅衣應制王仲甫黃金殿裏燭影雙龍戲勸得官家真箇醉進酒猶呼萬歲錦茵舞徹涼州君恩與整搔頭一夜御前宣喚六宫多少人愁耆舊續聞云仲甫字明之嘗自號為逐客為翰林權直內宿有宫娥新得幸仲甫應制賦此詞翌旦宣仁太后聞之語宰臣曰豈有館閣儒臣應制作狎詞耶既而彈章罷去賀方回小桃初謝雙燕還來也記得年時寒食下紫陌青門游冶楚城滿目春華可堪遊子思家唯有夜來歸夢不知身在天涯趙德麟春風依舊著意隋堤栁搓得鵝兒黃欲就天氣清明時候去年紫陌青門今宵雨魄雲魂斷送一生憔悴能消幾箇黃昏復齊漫録云劉弇偉明既喪愛妾而不能忘作此詞王履道花時微雨未減春分數占取簾踈花密處把酒聽歌金縷斜風輕度濃香閒情正與春長向晚紅燈入座嘗新青杏催觴黃山谷春歸何處寂寞無行路若有人知春去處喚取歸來同住春無蹤跡誰知除非問取黃鸝百囀無人能解因風吹過薔薇朝次膺劉巨濟深沉院宇枕簟清無暑睡起花隂初轉午一霎飛雲過雨雨餘隱隱殘雷夕陽却照庭槐莫把珠簾垂下妨他雙燕歸來吕居仁故人何處同在江南路百種舊愁分不去枉被落花留住舊愁百種誰知除非是見伊時最是一春多病等閒過了酴醿趙德莊桃根桃葉一樹芳相接春到江南三二月迷損東家蝴蝶殷勤踏取春陽風前花正低昂與我同心梔子報君百結丁香周少隱青春欲暮栁下將飛絮月到階前梅子樹啼得杜鵑飛去人歸不掩朱門一成過了黃昏只有瑣窗紅蠟照人獨自銷魂謝無逸晚風吹角月裏梅花落宿酒醒時滋味惡翠被輕寒漠漠夢回一㸃相思逺山暗蹙愁眉不覺肌膚瘦玉但知帶減腰圍妓訴狀立㕔下毛刊醉紅宿翠髻嚲烏雲墜管是夜來不得睡那更今朝早起春風滿搦腰肢階前小立多時恰恨一畨春雨想應濕透鞋兒朱希真亂紅深翠樓閣春風外蝴蝶成團飛照水睡鴨無人驚起身閒更覺身輕酒壺歌扇隨行芳草緑楊堤畔一聲初聽啼鶯二相留不住又趂東風去樓外夕陽芳草路今夜短亭何處杏花斜壓欄干朱簾不捲春寒惆悵黃昏前後離愁酒病厭厭三多寒易雨春事都相誤愁過黃昏無著處寶篆燒殘香縷低鬟暗摘明璫羅巾浥損殘粧簷外幾聲風玉丁東敲斷人腸朱雍雪開瑶徑素蕊迎春影樓上玉聲三弄定無奈幽香翻陳凌晨不事鉛華化工却付春花流水殘陽江上清隨月色低斜蒲江鏡屏開曉寒入宫羅峭脉脉不知春又老簾外舞紅多少舊時駐馬香階如今細雨蒼苔殘夢不堪重理一雙蝴蝶飛來程正伯緑深紅少栁外橫橋小雙燕不知幽夢好驚起碧窗春曉起來瞢總多時玉臺金鏡慵移多少春愁未說却來閒數花枝頥堂詞東風歸早已緑瀛洲草紫殿紅樓春正好楊栁半和烟裊玉輿遍繞花行初聞百囀新鶯歷厯因風傳去千門萬户春聲二墜紅飄絮收拾春歸去長恨春歸無覔處心事欲誰分付盧家小苑回塘于飛多少鴛鴦縱使東墻隔斷莫愁應念王昌别意劉潜夫休彈别鶴淚與絃俱落歡事中年如水薄懷抱那堪作惡昨宵月露髙樓今朝烟雨孤舟除是無身方了有身長有閒愁趙叔午初鶯細雨楊栁低愁縷烟浦花嬌如夢裏猶記倚樓别語小屏依舊圍香恨拋薄醉殘粧判却寸心雙淚為他花月凄凉李周隱緑窗初曉枕上聞啼鳥不恨王孫歸不早只恨天涯芳草錦書紅淚千行一春無限思量折得垂楊寄與絲絲都是愁腸括李白詩林正大若耶溪女笑隔荷花語日照新粧明楚楚香袖風颻輕舉誰家白面遊郎兩三遙映垂楊醉踏落花歸去踟蹰空斷柔腸楊師純小庭深院睡起花隂轉往事舊歡離思逺栁絮隨風難管等閒屈指當時䦨干幾曲誰知為問春風桃李而今子滿芳枝劉行簡相望吳楚逺信無慿據欲倩春風吹淚去化作愁雲恨雨春應已到三吳楚江日夜東徂惟有泝流魚上不知尺素來無雅詞畫堂晨起來報雪花墜髙捲簾櫳看佳瑞皓色逺迷庭砌盛氣光引爐烟素草寒生玉佩應是天仙狂醉亂把白雲揉碎雪孫夫人悠悠揚揚做盡輕模樣半夜瀟瀟窗外響多在梅邊竹上朱樓向曉簾開六花片片飛來無奈薰爐烟霧騰騰扶上金叉李易安年年雪裏常插梅花醉挼盡梅花無好意贏得滿衣清淚今年海角天涯瀟瀟兩鬢生華看取晚來風勢故應難看梅花春暮朱淑真風光緊急三月俄三十擬欲留連計無及緑野烟愁露泣慿誰寄與春宵城頭畫鼓輕敲綣繾臨岐囑付來年早到梅梢夏日游湖前人惱烟撩露留我須臾住擕手藕花湖上路一霎黃梅細雨嬌癡不怕人猜和衣倒在人懷最是分擕時候歸來懶傍粧臺李太白禁闈秋夜月探金窗鏬玉帳鴛鴦噴蘭麝時落銀燈香灺女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸游教在誰邊吕鵬遏雲集載李詞四首按松囱雜録白進清平調詞三章脞說以為清平樂曲此豈鵬羼入者耶十二時即憶少年謝勉仲池塘緑遍王孫芳草依依斜日游絲捲晴晝繫東風無力蝶趂幽香蜂釀蜜秋千外卧紅堆碧心情費消遣更梨花寒食别厯下朝無咎無窮官栁無情畫舸無限行客南山尚相送只髙城人隔罨畫園林溪紺碧算重來盡成陳迹劉郎鬢如此况桃花顔色曹元寵年時酒伴年時去處年時春色清明又近也却天涯為客念過眼光隂難再得想前歡盡成陳迹登臨恨無語把䦨干暗拍梅苑踈踈整整斜斜淡淡盈盈脉脉徒憐暗香句笑梨花顔色羈馬蕭蕭行又急空回首冰寒沙白天涯倦牢落忽一聲羌笛朱希真連雲衰草連天晚照連山紅葉西風正搖落更前溪嗚咽燕去鴻歸音信絶問黃花又共誰折征人最愁處送寒衣時節万俟雅言隴雲溶泄隴山峻秀隴泉嗚咽行人暫駐馬已不勝愁絶隴首凝眸天四濶更一聲塞鴈凄切征書待寄逺有知心明月琴調相思引一名玉交枝趙德莊拂拂輕隂雨趜塵小庭深幕墮嬌雲好花無幾猶是洛陽春燕語似知懷舊主水生只解送行人可堪詩墨和淚漬羅巾二曾躡姑蘇城上臺好山知有幾人來幾回徙倚月裡暮雲來閒倚和風千步栁倦臨殘雪一枝梅暖香髙燭翻動道人灰蒲江陸續鳴鳩呼曉晴霏微殘霧濕春城未成梅雨先做麥寒輕長日愔惜花又落短屏曲曲酒初醒小舟無緒閒帶牡丹行同楊子髙艤舟葉家莊前人夾岸垂楊步帳深露橋橫截影沉沉數家籬落一餉晚涼侵閒倚短篙停夜月靜看雙翅落棲禽久無羈思前事忽驚心梅苑膽樣瓶兒幾㸃春剪來猶帶水雲㾗且移孤令相伴最深樽每為惜花無曉夜教人甚處不銷魂為君惆悵何獨是黃昏定風波令周少隱梅粉梢頭雨未乾淡烟踈日帶春寒瞑鴉啼處人在小樓邊芳草只隨春恨長寒鴻空傍碧雲還斷霞銷盡新月又嬋娟望仙門晏同叔玉池波浪碧如鱗露連新清歌一曲翠眉嚬舞華茵滿酌蘭英酒須知獻壽千春太平無事荷君恩荷君恩齊唱望仙門二紫薇枝上露華濃起秋風管絃聲細出簾櫳象筵中仙酒斟雲液山歌轉繞梁虹此時佳會慶相逢慶相逢歡醉且從容三玉壺清漏起微凉好秋光金杯重疊滿瓊漿會仙鄉新曲調絲管新聲更颭霓裳博山爐暖泛濃香泛濃香為壽百千長海棠花春景馬莊父栁腰暗怯花風弱紅映秋千院落歸逐燕兒飛斜撼真珠箔滿林翠葉胭脂蕚不忍頻頻覷著護取一庭春莫彈花間鵲占春芳東坡春渚紀聞紅杏了夭桃盡獨自占春芳不比人間蘭麝自然透骨生香對酒莫相忘似佳人兼合明光只憂長笛吹花落除是寧王江亭怨冷齊夜話鬼詞簾捲曲闌獨倚山展暮天無際淚眼不曾睛家在吳頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句欲成時沒入蒼烟叢裏冷齊夜話云黃魯直登荆州亭柱間有此詞夜夢女子云有感而作驚悟曰此必吳城小龍女也一落索一名玉連環陳後山集作洛陽春張子野來時露浥衣香潤綵縧垂鬢卷簾還喜月相親把酒與花相近西去陽關休問未歌先恨玉峰山下水長流流水盡情無盡周美成眉共春山爭秀可憐長皺莫將清淚濕花枝恐花也如人瘦清潤玉簫閒久知音稀有欲知日日倚欄愁但問取亭前栁二杜宇思歸聲苦和春催去倚欄一霎酒旗風任撲靣桃花雨目斷隴雲江樹難逢尺素落霞隱隱日平西料想是分擕處秦少游楊花終日空飛舞奈久長難駐海潮雖是暫時來却有箇堪慿處紫府碧雲為路好相將歸去肯如薄幸五更風不解與花為主山谷誰道秋來烟景素在遊人不顧一畨時態一畨新到得意皆歡慕紫茰黃菊繁華處對風庭月露愁來即便去尋芳更作甚悲秋賦朱希真一夜雨聲速曉青燈相照舊時情緒此時心花不見人空老可惜春光閒了隂多晴少江南江北水連雲問何處尋芳草二慣被好花留住蝶飛鶯語少年場上醉鄉中容易放春歸去今日江南春暮朱顔何處莫將愁緒比飛花花有數愁無數玉連環管鑑江上青山無數緑隂深處夕陽猶在繫扁舟為佳景留人住已辦一蓑歸去江南烟雨有情鷗鷺莫驚飛便相約長為侣陸放翁滿路遊絲飛絮韶光將暮此時誰與說新愁有百囀流鶯語俯仰人間今古神仙何處花前須判醉扶歸酒不到劉伶墓陳鳯儀成都妓蜀江春色濃如霧擁雙旌歸去海棠也似别君難一㸃㸃啼紅雨此去馬蹄何處沙堤新路禁林賜宴賞花時還記得西樓否送王伯紹帥慶陽王履道塞栁未傳春信霜花侵鬢送君西去指秦關看日近長安近玉帳同時英俊合離無定路逢新鴈北飛來寄一字燕山問程正伯門外烟寒楊栁正減歡踈酒春隂早是做人愁更何况花飛後莫倚東風消瘦有酴醿入手儘偎香玉醉何妨任花落愁依舊辛幼安羞見鑑鸞孤却倩人梳掠一春長是為花愁甚夜夜東風惡行繞翠簾珠箔錦箋誰託玊觴淚滿却停觴怕酒似郎情薄春懷嚴次山清曉鶯啼紅樹又一雙飛去日髙花氣撲人來獨自價傷春無緒别後暗覺金縷倩誰傳語一春不忍上髙樓為怕見分擕處二孤廟對寒潮西陵風雨蕭蕭謝娘惆悵倚蘭橈淚流玉筯千條慕天愁聽思歸樂早梅香滿山郭回首兩情蕭索離魂何處飄泊孫光憲江上草芊芊春晚湘妃廟前一方緑水楚南天數行征鴈聨翩獨倚朱欄情不極魂斷終朝相憶兩槳不知消息逺汀時起鸂鶒花前飲今古詞話雨餘天色漸寒滲海棠綻胭脂如錦告你休看書共我花前飲皓月穿簾未成寢篆香透鴛衾雙枕似恁天色時你道是好做甚品令石次仲困無力幾度偎人翠顰紅濕低低問幾時麼道不逺三五日你也自家寧耐我也自家將息驀然地煩惱一箇病教一箇怎知得秦少游掉又懼天然箇品格於中壓一簾兒下時把鞋兒踼語低低笑咭咭每每秦樓相見見了無限憐惜人前强不欲相沾識把不定臉兒赤惜春郎美人栁耆卿玉肌瓊艷新粧飾好壯觀歌席潘妃寶釧阿嬌金屋應也消得屬和新詞多俊格敢共我勍敵恨少年枉費踈狂不早與伊相識越江吟蘇易簡冷齊夜話非烟非霧瑶池宴片片碧桃冷落黃金殿蝦鬚半捲天香散春雲和孤竹清婉入霄漢紅顔醉態爛漫金輿轉霓旌影亂簫聲逺相思引笑盈盈香噴噴姑射仙人風韻天與肌膚常素嫩玉面猶嫌粉斜倚小樓凝逺信多少往來人恨只恐乘春雲雨困迤邐嬌容褪早春怨擬白石張伯雨盼得春來春寒春困陡頓無聊半剔殘燈片時春夢過了元宵空山暮暮朝朝到此際無夢可消却倚東風如水衣帶草似裙腰歸去來柳耆卿初過元宵三五慵困春情緒燈月䦨珊嬉遊處遊人盡厭歡聚慿仗如花女持杯謝酒朋詩侣餘醒更不禁香醑歌筵舞且歸去又一夜狂風雨花英墜碎紅無數垂楊謾結黃金縷儘春殘縈不住蝶稀蜂散知何處殢尊酒轉添愁緒多情不慣相思苦休惆悵好歸去孤館深沉權無染梅苑瓊英雪艷嶺梅芳天付與清香向臘後春前解壓萬花先占東陽擬待折一枝相贈奈水逺天長對粧靣忍聽羌笛還空斷人腸雙韻子張子野鳴鞘電過曉闈靜斂龍旗風定鳳樓逺出霏烟聞笑語中天逈清光近歡聲竟鴛鴦集仙花鬪影更聞度曲瑶山升瑞日春宫永鳯孤飛晏叔原一曲畫樓鐘動宛轉歌聲緩綺席飛塵座滿更小待金蕉暖細雨輕寒今夜短依前是粉墻别館端的歡期應未晚奈歸雲難管應天長韋莊緑槐隂裏黃鶯語深院無人春晝午畫簾垂金鳯舞寂寞繡屏香一炷碧雲凝人何處空役夢魂來去昨夜緑窗風雨斷腸君信否二别來半歲音書絶一寸離腸千萬結難相見易相别又是玉樓花似雪暗相思無處說惆悵夜來烟月想得此時情切淚沾紅袖黦牛嶠玉樓春望晴烟滅舞衫斜卷金條脫黃鸝嬌囀聲初歇杏花飄盡攏山雪鳳叉低赴節筵上王孫愁絶鴛鴦對銜羅結兩情深夜月二雙眉淡薄藏心事清夜背燈嬌又醉玉叉橫山枕膩寶帳鴛鴦春睡美别經時無限意虛道相思憔悴莫信綵箋書裏賺人腸斷字顧敻瑟瑟羅裙金線縷輕透鵝黃香畫袴垂交帶盤鸚鵡裊翠翹移玉步背人勻檀注慢轉橫波偷覷斂黛春情暗許倚屏慵不語惜春令杜壽域春夢無慿猶懶起銀燭盡畫簾低垂小庭楊栁黃金翠桃臉兩三枝粧閣慵梳洗悶無緒玉簫拋擲飄絮紛紛人疏逺空對日遲遲二今夕重陽秋意深籬邊散嫩菊開金萬里霜天林葉墜蕭索動離心臂上茱茰新似舊年堪賞光隂百盞香醑且酬身牛山㑹難尋沙塞子中秋無月周紫芝秋雲微淡月微羞雲黯黯月彩難留只是應嫦娥心裏也似人愁幾時回步玉移鈎人共月同上南樓却重聽畫䦨西角月上輕謳趙德莊彥端春水緑波南浦漸理棹行人欲去黯消魂栁下輕烟花梢微雨長亭放􅊦無計住但芳草迷人去路忍回頭斷雲殘日長安何處與上韻不同月中行周美成蜀絲趂日染乾紅微暖面脂融博山細篆靄房櫳靜看打窗蟲愁多膽怯疑虛幕聲不斷暮景踈鐘團團四壁小屏風淚盡夢啼中本作啼盡夢魂中月宫春毛文錫水精宫裏桂花開神仙探幾回紅芳金蕊繡重臺低傾瑪瑙杯玉銀蟾爭守護姮娥姹女戲相偎遙聽鈞天九奏玉皇親看來醉花間馮延已獨立階前星又月簾櫳偏皎潔霜樹盡空枝腸斷丁香結夜深寒不寐疑恨何曾歇憑欄干欲折兩條玉筯為君垂此宵情誰共說二月落霜繁深院閉洞房人正睡桐樹倚雕簷金井臨瑶砌曉風寒不啻獨立成憔悴閒愁渾未已離人心緒自無端莫思量休退悔桂華明三夢廣寒宫倚髯翁笛聲關子東注縹眇神仙開洞府遇廣寒宫女問我雙鬟梁溪舞還記得當時否碧玉詞章教仙語為按歌宫羽皓月滿窗人何處聲未斷瑶臺路墨莊漫録四和香李處全晦菴詞香雪漸苞偏勝韻領袖催花信華節良辰人有分看士女蟠垂鬢莫向春風尋舊恨樂事隨方寸眉壽故應天不吝浮太白吾無悶轉調和聖朝古今詞話漸覺一日濃如一日不比尋常若知人為伊瘦損成病又何妨相思到了不成模樣收淚千行把從前淚來做水流也流到伊行醉髙歌姚牧菴十年燕月歌聲幾㸃吳霜鬢影西風吹起鱸魚興已在桑榆暮景榮枯枕上三更傀儡埸中四并人生幻化如泡影幾箇臨危自省荷葉杯韋莊絶代佳人難得傾國花下見無期一雙愁黛逺山眉不忍更思惟閒掩翠屏金鳯殘夢羅幕畫堂空碧天無路信難通惆悵舊房櫳二記得那年花下深夜初識謝娘時水堂西靣畫簾垂擕手暗相期惆悵曉鶯殘月相别從此隔音塵如今俱是異鄉人相見更無因慶金枝新春入舊年綻梅蕚一枝先隴頭人待信音傳算楚岸未香殘小桃風雪憑欄干下簾幕護輕寒年華永占入芳筵付樽前漸成歡鳯來朝周美成逗曉香嬌面小窗深弄明未遍愛殘朱宿粉雲鬟亂最好是帳中見說夢雙蛾微斂錦衾溫酒香未斷待起難捨拚任日炙畫欄暖五日感事史邦卿暈粉就妝鏡掩金閨綵絲未整趂無人學指鴛鴦頸恨誰踏蘚花徑一夢蒲香葵冷墮銀瓶脆繩掛井扇底弄團圓影只此是沈郎病西江月司馬溫公詞話寶髻鬆鬆綰就鉛華淡淡粧成紅烟翠霧罩輕盈飛絮遊絲無定相見爭如不見有情還似無情笙歌散後酒微醒深院月明人靜春感栁耆卿鳯額繡簾髙捲獸簷朱户頻搖兩竿紅日上花梢春睡厭厭難覺好夢往隨飛絮閒愁濃勝香醪不成雨暮與雲朝又是韶光過了晏小山南苑垂鞭路冷西樓把祧人稀庭花猶有鬢邊枝且插殘紅自醉畫幕凉催燕去香屏曉放雲歸依前青枕夢回時試問愁閒有幾梅花寓意朝雲蘇子瞻玉骨那愁瘴霧冰肌自有仙風海仙時遣探芳叢倒掛緑毛么鳯素靣翻嫌粉涴洗粧不褪唇紅髙情已逐曉雲空不與梨花同夢春夜照野瀰瀰淺浪橫空曖曖微霄障泥未解玉驄驕我欲醉眠芳草可惜一溪明月莫教踏碎瓊瑤解鞍欹枕緑楊橋杜宇數聲春曉重陽㸃㸃樓前細雨重重江外平湖當年戲馬㑹東徐今日凄凉南浦莫恨黃花未吐且教紅粉相扶酒闌不必看茱茰俯仰人間今古中秋對月聚蘭集世事一場大夢人生幾度秋凉夜來風葉已鳴廊看取眉頭鬢上酒賤常愁客少月明多被雲妨中秋誰與共韶光把盞凄然北望張子野泛泛春船載樂溶溶湖水平橋髙鬟照影翠烟搖白紵一聲雲杪倦醉天然玉軟卸粧人惜花嬌風情遺恨幾時銷不見盧郎年少勸酒山谷斷送一生惟有破除萬事無過逺山微影蘸清波不飲傍人笑我花病等閒瘦惡春來沒箇遮䦨杯行到手莫留殘不道月明人散秦少游愁黛顰成月淺啼粧印得花殘只消鴛枕夜來閒曉鏡心情便懶醉帽簷頭風細征衫袖口香寒緑江春水寄書難擕手佳期又晚郵亭壁上詞古今詞話昨夜軺車宿處亂山深鎖郵亭烟溪霜葉顫秋聲不管愁人不聽枕冷安排難穩衾寒重疊猶輕慿誰說與那人人報道衾寒枕冷杜安道曉鏡初粧玉粉輕風暗遞幽香閒隨月影到寒塘忘却人間天上雲意空驚春意孤芳已斷年芳從教驛使為伊忙乞箇壽陽宫樣顔持約傳文草草書傳錦字厭厭夢繞梅花海山無計駐仙槎腸斷芭蕉影下缺月舊時庭院飛雲到處人家而今憔悴鬢先華說著多情也怕春夕毛澤民烟雨半藏楊栁風光初著桃花主人細細酌流霞醉裏將春留下栁外鴛鴦作伴花邊蝴蝶為家醉翁醉裏也隨他月在栁橋花榭葛魯卿靺鞨斜紅帶栁琉璃漲緑平橋人間花月正新妖不數錢塘蘇小恨寄飛花簌簌情隨流水迢迢鯉魚風送朩蘭橈回棹荒雞報曉趙元鎮世態浮雲變易時光飛箭難留五年重見海東頭只有交情似舊未盡别來生意難堪老去離愁青山迢遞水悠悠明日扁舟病酒警悟朱希真世事短如春夢人情薄似秋雲不須計較苦勞心萬事原來有命幸遇三杯酒好偶逢一朵花新片時歡笑且相親明日隂晴未定二日日深杯酒滿朝朝小圃花開自歌自舞自開懷且喜無拘無礙青史幾翻春夢紅塵多少竒才不須計較與安排領取而今見在宋謙父何敢笑人干祿自知無分彈冠只將貧賤博清閒留取書遮老眼世人風波任險門前路徑須寬心無妄想夢魂安萬事鶴長鳬短蔡京八十一年住世四千里外無家如今流落向天涯夢到瑶池闕下玊殿五回命相彤庭幾度宣麻止因貪此戀榮華便有如今事也揮麈録云蔡元長南遷有㫖取所寵姬慕容邢武者三人以金人指名來索也作詩而别至潭州作詞云李伯紀意態何如珽珽輕盈只恐飛飛華堂偏傍主人棲好與安巢穩戲攬斷樓中風月且看掌上腰支謫仙詞賦少陵詩萬語千言總記向子諲微步凌波塵起弄粧滿鏡花開春心擲處眼頻來秀色著人無奈舊事如風無迹新愁似水難裁想思日夜夢陽臺減盡沈郎衣帶史逹祖西月淡窺樓角東風暗落簷牙一燈初見影窗紗又是重簾不下幽思屢隨芳草閒愁多似楊花楊花芳草遍天涯繡被春寒夜夜子瑜一百八般佛事二十四考中書山林朝市等區區著甚由來自苦過寺談些般若逢花倒個葫蘆少時伶俐老來愚萬事安於所遇題邯鄲吕仙翁祠堂文卿壁斷何人舊字爐寒隔歲殘香洞天人去海茫茫玩世仙翁已往西日長安道逺春風趙國臺荒行人誰不悟黃糧依舊紅塵陌上遣興辛幼安醉裏且貪歡笑要愁那得工夫近來始覺古人書信著全無是處昨夜松邊醉倒問松我醉何如只疑松動要來扶以手推松曰去漢書龔勝傳勝與左將軍公孫祿議事不和博士夏侯常勸之勝以手推常曰去洞庭張安國問訊湖邊春色重來又是三年東風吹我過湖船楊栁絲絲拂靣世路如今已慣此心到處悠然寒光亭下水連天飛起沙鷗一片别友翰墨記得洛陽話别十年社燕秋鴻今朝相遇慕雲東對坐旗亭說夢破帽守遮斜日練衣袖捲寒風蘆花江上兩衰翁消得幾畨相送周紫芝池靣風翻弱絮樹紅雨退嫣紅撲花蝴蝶杳無蹤又做一場春夢便是一成去了不成沒箇來時眼前無處說相思要說除非夢裏二羅袖雲輕霧薄醉肌玉軟花柔相逢不道有春愁只道春來微瘦一㸃人間深意數聲栁下輕謳帶將離恨上歸舟腸斷月斜時候春半朱淑真辦取舞裙歌扇賞春只怕春寒捲簾無語對南山已覺緑肥紅淺去去惜花心懶踏青閒步江干恰如飛鳥倦知還淡蕩梨花深院燈花曹仙姑零落不因春雨吹噓何假東風紗窗一㸃自然紅費盡功夫怎種有艷難尋膩粉無香不惹遊蜂更䦨人靜畫堂中相伴玉人春夢寄張生鄭雲娘一片冰輪皎潔十分桂魄婆娑不施方便是如何莫是嫦娥妬我雖則清光可愛奈緣好事多魔仗誰傳與片雲呵遮取霎時則箇張生寄雲娘詞云一望朱樓巧小四邊繡幕低垂箇人活脫似楊妃倚遍闌干十二最苦兩雙情眼難禁四隻愁眉無言回首日沉西不道一聲安置席上呈蔡相押排行十九韻尹溫儀韓愈文章蓋世謝安才貌風流良辰開宴在西樓敢勸一杯芳酒記得南宫髙步弟兄都占鰲頭一門御殿御香浮名在甲科第九成都妓尹溫儀本良家女後以零替失身妓籍蔡相帥成都酷愛之尹告蔡乞除樂籍蔡戲曰若樽前成一小闋便可除免尹曰乞腔調蔡答以西江月尹又乞嚴韻蔡曰汝排行十九用九字即便應聲云云蓋取蔡第九人弟元度第十一人也蘇復齊漫録云姑蘇官妓蘇瓊行第九蔡元長道過州太守召飲元長聞瓊能詞因命即席為之乞韻以九字詞云石孝友脉脉無端心事厭厭不奈春酲越羅衫薄峭寒輕試問幾畨花信萬㸃風頭栁絮數聲栁外啼鶯斜陽還傍小窗明門掩黃昏人靜燕歸梁栁耆卿織錦裁篇寫意深幾字直千金一回披玩一愁吟腸成結淚盈襟幽歡已散前期逺無聊賴是而今密憑歸燕寄芳音恐冷落舊時心石曼卿芳草年年惹恨幽想前事悠悠傷春傷别幾時休算從古為風流春山總把深勻翠黛千疊在眉頭不知供得幾多愁更斜日憑危樓張子野去嵗中秋玩桂輪河漢淨無雲今年江上共瑶尊都不是去年人水晶宫殿琉璃臺閣紅翠兩行分㸃唇微破秀眉顰清影外見歌塵上行杯馮延已落梅暑雨消殘粉雲重烟深寒食近羅幕遮香栁外秋千出畫墻春山顛倒叉橫鳯飛絮入簾春睡重夢裡佳期祗許庭花與月知惜分飛一名惜雙雙毛澤民淚濕䦨干花著露愁到眉峰碧聚此恨平分取更無言語空相覷斷雨殘雲無意緒寂寞朝朝暮暮今夜山深處斷魂分付潮回去朝無咎山水光中元無暑是我銷魂别處只有多情雨㑹人深意留人住不及梅花來已暮未見荷花又去圗畫他年覷斷腸千古苕溪路辛幼安翡翠樓前芳草路寶馬墜鞭暫駐最是周郎顧尊前幾度歌聲誤望斷碧雲空日暮流水桃源何處聞道春歸去更無人管飄紅雨送别吳淑姬岸栁依依拖金縷是我朝來别處惟有多情絮故來衣上留人住兩眼啼紅空彈與未見桃花又去一片征帆舉斷腸遙指苕溪路惜雙雙賀方回皎鏡平湖三十里碧玉山圍四際蓮蕩香風裏綵鴛鴦覺雙飛起明月多情隨拖尾偏照空床翠被回首笙歌地醉更衣處長相記清平調昭陵梓宫發引王禹玉玉宸朝晚忽掩赭黃衣愁露鎖無扉蓬萊待得仙丹至人世已成非龍軒天仗轉西畿旌斾入雲飛望陵宫女垂紅淚不見翠輿歸二上林春晚曽是奉宸遊水殿戲龍舟玉簫吹斷催仙馭一去隔千秋游人重到曲江頭事往涕難收空餘御幄傳觴處依舊水東流太常引在燕端陽日當母誕作陳剛中孚綵絲堂上簇蘭翹記生母在今朝無地捧金蕉奈烟水龍沙路遙碧天迢遞白雲何處急雨蕭蕭萬里夢魂消待飛逐錢塘夜潮山房隨筆孚天台人時為編修二短衣孤劍客乾坤奈無䇿報親恩三載隔晨昏更踈雨寒燈斷魂赤城霞外西風鶴髮猶想倚柴門蒲醑漫盈樽倩誰寫青山淚痕韓玉東風歸路水雲間幾曽放夢魂閒何日整歸鞍有人對西風憑䦨溫柔情性繫懷傷感欲訴訴應難愁聚兩眉端又疊起千山萬山二荒山連地水連天憶曽上桂江船風雨過吳川又却在湘江岸邊不堪追念浪萍踪跡虛度夜如年風外曉鐘傳尚獨對殘燈未眠金劉雲震耽耽九虎隔重關到天上却空還回首謝塵寰問今日誰人姓韓瓜田蔬圃竹溪松徑何地不堪閒且莫問長安比蜀道元來更難見困學齊雜録梅苑行雲蹤跡杳無期梅梢上又春歸不道又别離這一度清香為誰多情囑付庾樓羌管慿仗且休吹留取兩三枝待和淚封將寄伊太清引趨省聞桂偶成蒲江夢回金井卸梧桐嘶馬帶踈鍾草靣露痕濃漸薄袖清寒暗通天低綘闕雲浮碧海殘月尚朦朧吹靣桂花風悄不似紅塵道中即太常引餞劉參議歸山東劉燕歌妓青樓集故人别我出陽關無計鎖雕鞍今古别離難兀誰畫蛾眉逺山一尊别酒一聲杜宇寂寞又春殘明月小樓閒第一夜相思淚彈四犯令侯彥周月破輕雲天淡注夜悄花無語莫聽陽關離緒拚酩酊花深處明日江郊芳草路春逐行人去不似酴醿開獨步能著意留春住漁歌子李詢九疑山三湘水蘆花時節秋風起水雲間山月裏棹月穿雲遊戲鼓清琴傾緑蟻扁舟自得逍遙志任東西無定止不議人間醒醉孫光憲草芊芊波漾漾湖邊草色連波漲沿蓼岸泊楓汀天際玉輪初上扣舷歌聨極望槳聲伊軋知何向黃鵠呌白鷗眠誰似儂家疏曠李珣桞垂絲花滿樹鶯啼楚岸春天暮棹輕舟出深浦緩唱漁歌歸去罷垂綸還酌醑孤村遙指雲遮處下長汀臨逺渡驚起一行沙鷺二荻花秋瀟湘夜橘洲佳景如屏畫碧烟中明月下小艇垂綸初罷水為鄉蓬作舍魚羮稻飯常餐也酒盈杯書滿架名利不將心挂偷聲木蘭花張子野畫橋淺映橫塘路流水滔滔春共去目送斜暉燕子雙髙蝶對飛風花將盡持杯送往事只成清夜夢莫更登樓坐想行思已自愁二雪籠瓊苑梅花瘦外院重扉聨寶獸海月新生上得髙樓沒奈情簾波不動銀缸小今夜夜長爭得曉欲夢髙唐祗恐覺來添斷腸怨三三姑溪詞用賀方回韻李端叔之儀清溪一𣲖瀉探藍岸草毶毶記得黃鸝語畫簷喚狂裏醉重三春風不動垂簷似三五初圓素蟾鎮淚眼亷纎何時歌舞再和池南捉拍醜奴兒朱希真清露濕幽香想瑶臺無語凄凉飄然欲去依然似夢雲度銀潢又是天風吹淡月珮丁東擕手西廂冷冷玉磬沉沉素瑟舞遍霓裳滴滴金周美成梅花漏泄春消息桞絲長草芽碧不覺星霜鬢邊白念時光堪惜蘭堂把酒留嘉客黛眉顰愁春色千里音書相疏隔見了方端的梅孫夫人月光飛入林前屋風䇿䇿度庭竹夜半江城擊柝聲動寒梢棲宿等閒老去年華促祗有江梅伴幽獨夢繞夷門舊家山恨驚回難續二當初親下求言詔引得都來胡道人人招是駱賔王并洛陽年少自訟監宫并嶽廟都教一時閒了誤人多是誤人多誤了人多少中吳紀聞云徽宗即位下詔求直言陸彥猷因廷對與雍孝開輩皆力陳時政闕失喝名曰有㫖駁放孝開立殿下叩頭曰陛下求直言有云言之者無罪今詔墨猶未乾奈何以直言罪人衛士怒孝開唐突以拄斧撞其頰數齒俱落時上書及廷試直言者俱得罪京師有謔詞云花草稡編卷六

body:
  text: 花草稡編卷十五明陳耀文輯中調千秋嵗秦少遊桞邊沙外城郭輕寒退花影亂鶯聲碎飄零踈酒盞離别寬衣帶人不見碧雲暮合空相對憶昔西池會鴛鷺同飛蓋携手處今誰在日邊淸夢斷鏡裏朱顔改春去也落紅萬㸃愁如海崔徽頭子洪思禹冷齊半身屏外睡覺唇紅退春思亂芳心碎空餘簮髻玉不見流蘇帶誰與問今人秀整誰冝對湘浦曽同㑹手搴輕羅蓋疑是夢今猶在十分春易盡一㸃情難改多少事却隨恨逺連雲海弔少遊山谷花邊花外記得同朝退飛騎軋鳴珂碎齊歌雲繞扇趙舞風回帶嚴鼓斷杯盤狼籍猶相對灑淚誰能會醉卧藤隂蓋人已去詞空在兔園高宴悄虎觀英遊改重感慨波濤萬頃珠沉海前調李之儀深秋庭院殘暑全消退天幕逈雲容碎地偏人罕到風慘寒微帶初睡起翩翩戲蝶飛成對歎息誰能會猶記逄傾蓋情暫遣心常在沈沈香信斷冉冉光隂改紅日晚仙山路隔空雲海謝無逸練花飄砌蔌蔌淸香細梅雨過蘋風起情隨湘水逺夢繞吳峯翠琴書倦鷓鴣喚起南窗睡密意無人寄幽恨憑誰洗修竹畔疏簾裏歌餘塵拂扇舞罷風掀袂人散後一鈎淡月天如水竹坡送春歸去說與愁無數君去後歸何處人應空懊恨春亦無言語寒日暮騰騰醉夢隨風絮盡日閒庭雨紅濕秋千柱人恨切鶯聲苦擬傾澆悶酒留取殘紅樹春去也不成不為愁人住石孝友春工領略㸃破羣花蕚對流景傷淪落踏青心緒懶病酒情懷惡無奈處東風故故吹簾幕腕玉寬金約一去音容邈魚與雁應難託從前多少事不忍思量著心撩亂斜陽影在欄干角二金風玉宇庭院新經雨香有露淸無暑溪光搖几席嵐翠橫尊爼烘笑語佳時聊復鄉人聚門外荷花浦秋到花無數紅鱠鯉靑浮醑何妨文字飲更得江山助從此去蒲輪入佐中興主彭虛寮重陽來未誰領黃花意斟玉醑歌金縷雲山籠瑞彩風月鎔淸氣北山頂壽星一㸃光無際六十今朝是甲子從頭起堂堂去千千嵗是非華表鶴深淺蓬萊水翁不管年年先共黃花醉永叔數聲鶗鴂又報芳菲歇惜春更把殘紅折雨輕風色暴梅子靑時節永豐柳無人盡日花飛雪莫把絲絃撥怨極絃能說天不老情難絶心似雙絲網終有千千結夜過也東方未白殘燈滅連理枝卲叔齊淡泊疏籬隔寂寞官橋側緑蕚靑枝風塵外别是一般姿質念天涯憔悴各飄零記初曾相識雪裏淸寒逼月下幽香襲不似薄情無憑一去音書難得看年年時候不踰期報陽和消息晏同叔玉宇秋風至簾幕生凉氣朱槿又開紅蓮尚折芙蓉含蘂送舊巢歸燕拂高簾見梧桐葉墜家宴凌晨啓金鴨風飄香細鳯竹鸞絲清歌妙舞盡呈逰藝願百千遐壽比神仙有年年嵗嵗二緑樹鶯聲老金井生秋早不寒不暖裁衣按舊天時正好况蘭堂逢著壽筵開見爐香縹眇組繡呈纎巧歌舞誇妍妙玉酒頻傾朱絃翠管移宫易調獻金杯重疊祝長生永逍遙奉道佳人醉相思桞耆卿暮景蕭蕭雨霽雲淡天高風細正月華如水金波銀漢㶑灧無際冷浸書帷夢斷却披衣重起臨軒砌素光遙指因念素娥窅隔音塵何處相望同千里盡凝睇厭厭無寐漸曉雕檻獨倚西施柳耆卿自從回步百花橋便獨處淸宵鳯衾鴛枕何事等閒拋縱有餘香也似即恩愛向日夜潜消恐伊不信芳容改將憔悴寫霜綃更憑錦字字字說情憀要識愁腸但看丁香樹漸結盡春梢二苧蘿妖艷世難偕善媚悅君懷後庭恃愛寵盡使絶嫌猜正恁朝歡暮宴情未足早江上兵來捧心調態軍前死羅綺旋變塵埃至今怨魂無主尚徘徊夜夜姑蘇城外當時月但空照荒臺歸田樂引水繞溪橋渌泛蘋汀步迷花曲衣巾散餘馥種竹更洗竹詠竹題竹日暮無人伴幽獨光隂雙轉轂可惜許等閒愁萬斛世間種種只是榮和辱念足又願足意足心足忘了眉頭怎生蹙山谷暮雨濛階砌漏漸移轉添寂寞㸃㸃心如碎怨你又戀你恨你惜你畢竟教人怎生是前歡算未已奈何如今愁無計為伊聰俊銷得人憔悴這裏誚睡裏夢裏心裏一向無言但垂淚小鎮西犯春遊柳耆卿水鄉初禁火青春未老芳菲滿柳汀煙島波際紅幃縹眇盡杯盤小歌祓禊聲聲諧楚調路遼繞野橋新市裏花穠妓好引遊人競來歡笑酩酊誰家年少信玉山倒家何處落日眠芳草三登樂慶黃守羅子衎翰過了元宵見七葉蓂又飛恰今朝昴宿降瑞初度果生賢盡道丰姿絶異翰林人物雲霄冨貴自棲鸞展驥迤邐黃堂每登要路無留滯暫歸來訪松竹趣裝行用濟增崇福祿壽延千百嵗粉蝶兒毛澤民雪遍梅花素光都共竒絶到窗前認君時節下重幃香篆冷蘭膏明滅夢悠揚空繞斷雲殘月沈即帶寬同心放開重結褪羅衣摩腰一捻正春風新著模花花葉葉粉蝶兒這回共花同活辛幼安昨日春如十三女兒學繡一枝枝不教花瘦甚無情便下得雨僝風僽向園林鋪作地衣紅皺而今春似輕薄蕩子難久記前時送春歸後把春波都釀作一江醇酎約淸愁楊柳岸邊相候離亭燕孫浩然一帶江山如畫風物向秋瀟灑水浸碧天何處斷霽色冷光相射蓼嶼荻花洲掩映竹籬茅舍雲際客帆高掛烟外酒旗低亞多少六朝興廢事盡入漁樵閒話悵望倚層樓寒日無言西下黃魯直十載尊前談笑天祿故人年少可是陸沉英俊地看即鎖忩批詔此處忽相逢潦倒禿翁同調西顧郎官湖渺試看玉樓人小短艇絶江空悵望寄得詩來高妙夢去倚君傍蝴蝶歸來淸曉惜奴嬌史邦卿香剝酥㾗自昨夜春愁醒高情寄氷橋雪嶺試約黃昏便不誤黃昏信人靜倩嬌娥留連秀影吟鬢簮香已斷了多情病年年待將春管領鏤月描雲不枉了閒心性謾聽誰敢把紅兒比並撼庭竹王晋卿綽略靑梅弄春色真艷態堪惜經年費盡東君力有情先到探春客無語泣寒香時暗度瑶席月下風前空悵望思携手同摘畫欄倚遍無消息佳辰樂事再難得還是夕陽天空暮雲凝碧黃魯直嗚咽南樓吹落梅聞鴉樹驚飛夢中相見不多時隔城今夜也應知坐久水空碧山月影沉西買箇宅兒住著伊剛不肯相隨如今却被天嗔你永落雞羣受雞欺空恁惡憐伊風日損花枝繞池遊雅詞漸春工巧玉漏花深寒淺韶景變融晴蕙風暖都門十二三五銀蟾光滿瑞煙葱蒨禁城閬苑棚山雉扇絳蠟交輝星漢神仙籍梨園奏絃管都人遊玩萬井山呼歡忭嵗嵗天仗願瞻鳯輦望梅花蒲傳正一陽初起暖力未勝寒氣堪賞素華長獨秀不並開紅抽紫靑帝只應憐潔白不使雷同衆卉淡然難比粉蝶豈知芳蕊半夜捲簾如乍失只在銀蟾影裏殘雪枝頭君認取自有淸香旑旎二寒梅堪羡堪羡輕苞展被天人製巧妝素艷羣芳皆賤碎剪月華千片綴向瓊枝欲遍小庭幽院雪月相交無辨影玲瓏何處臨溪見謝家新宴别有清香風際轉縹眇著人頭靣憶帝京憶别柳耆卿薄衾小枕凉天氣乍覺别離滋味展轉數寒更起了還重睡畢竟不成眠一夜長如嵗也擬把却回征轡又爭奈已成行計萬種思量多方開解只恁寂寞厭厭地繫我一生心負你千行淚慶夀山谷鳴鳩乳燕春閒暇化作緑隂槐夏壽斚舞紅裳睡鴨飄香麝醉此洛陽人佐郡深儒雅况座上玉麟金馬更莫問鶯老花謝萬里相依千金為壽未厭玉燭傳清夜不醉欲言歸笑殺高陽社贈彈琵琶薄粧小靨閒情素抱著琵琶凝佇慢撚復輕攏切切如私語轉撥割朱弦一假驚沙去萬里嫁烏孫公主對易水明妃不渡粉淚行行紅顔片片指下花落狂風雨借問本師誰斂撥當胸住前調銀燭生花如紅豆占好事如今有人醉曲屏深借寶瑟輕招手一陳白蘋風故滅燭教相就花帶雨氷肌香透恨啼鳥轆轤聲曉桞岸微凉吹殘酒斷腸人依舊鏡中消瘦那人知後鎮把你來僝僽隔浦蓮近拍周美成新篁搖動翠葆曲徑通深窈夏果收新脆金丸落驚飛鳥濃靄迷岸草蛙聲閙驟雨鳴池沼水亭小浮萍破處簾花簷影顛倒綸巾羽扇困卧北窗清曉屏裏吳山夢自到驚覺依然身在江表陸務觀飛花如趂燕子直度簾櫳裏帳掩香雲暖金籠鸚鵡驚起凝恨慵梳洗粧臺畔蘸粉纎纎指寶叉墜才醒又困厭厭中酒滋味墻頭桞暗過盡一年春事罨畫高樓怕獨倚千里孤舟何處烟水趙德莊西風吹斷夢草起來芙蓉老座上人誰在晨參踈影相照幽館寒意悄簷聲小醉語秋屏曉記年少相携勝處黃花香滿烏帽如今將見璧月瓊枝空好凖擬新春待見了不道些兒心事還惱師師令張子野香鈿寶珥拂菱花如水學妝皆道稱時冝粉色有天然春意蜀綵衣長勝未起縱亂雲埀地都城池苑誇桃李問東風何似不須回扇障淸歌唇一㸃小於朱蘂正值殘英和月墜寄此情千里郭郎兒近拍遣懷柳耆卿帝里閒居小曲深坊庭院沉沉朱户閉新霽畏景天氣薰風簾幕無人永晝厭厭如度嵗愁瘁枕簟微凉睡久轉轉慵起硯席塵生新詩小闋等閒都盡廢這些兒寂寞情懷何事新來常恁地傳言玉女上元朝叔用一夜東風不見柳梢殘雪御樓烟暖對鰲山綵結簫鼓向晚鳯輦初回宫闕千門燈火九街風月繡閣人人乍嬉遊困又歇艷粧初試把珠簾半揭嬌羞向人手撚玉梅低說相逄長是上元時節雅詞眉黛輕分慣學玉真梳掠艷容可畫那精神怎貌鮫綃映玉鈿帶雙穿纓絡歌音淸麗舞腰柔弱宴罷瑶池御風跨皓鶴鳯凰臺上有蕭郎共約一面笑開向月斜褰朱箔東園無限好花羞落續骫骳說云政和中袁為教坊判官撰文字一日為蔡京撰傳言玉女詞有淺淡梳粧愛學女真之語上見之改女真二字為漢宫而人莫解蓋當時已與女真盟於海上矣而中外未知帝思其語故竄易之也曽純甫鳯闕龍樓淸夜月華初照萬㸃星毬護花梢寒峭華胥夢裏老去歡情終少花愁醉悶總消除了紫陌嬉不似少年懷抱珠簾十里聽笙簫聲杳幽期密約暗想淺顰輕笑良時莫負玉山頻倒河滿子毛熙震寂寞芳菲暗度嵗華如箭堪驚緬想舊歡多少事轉添春思難平曲檻絲埀金柳小忩絃斷銀筝深院空聞燕語滿園閒落花輕一片相思休不得忍教長日愁生誰見夕陽孤夢覺來無限傷情二無語殘妝淡薄含羞嚲袂輕盈幾度香閨眠過曉綺窗踈日微明雲母帳中偷惜水精枕上初驚笑靨嫩疑花拆愁眉翠斂山橫相望只教添悵恨整鬟時見纎瓊獨倚朱扉閒立誰知别有深情陪杭州泛湖夜歸張子野溪女送花隨處沙鷗避樂分行遊舸已如圖障裏小屏猶畫瀟湘人面新生酒艷日㾗更欲春長衣上交枝鬬色叉頭比翼相雙片假落霞明水底風紋時動妝光賔從夜歸無月千燈萬火河塘前調孫巨源悵望浮生急景凄凉寶瑟餘音楚客多情偏怨别碧山逺水登臨目送連天衰草夜闌幾處踈砧黃葉無風自落秋雲不雨長隂天若有情天亦老搖搖幽恨難禁惆悵舊歡如夢覺來無處追尋杜壽域桞嫩不禁搖動梅殘儘任飄零雨餘天氣來深院向陽纎草重靑寂寞小桃初綻兩三枝上紅英又見雲中歸雁嗈嗈斷續和鳴年年依舊無情緒鎮長冷落銀屏不語閒尋往事微風頻動簾旌晏叔原緑綺琴中心事齊紈扇上時光五陵年少渾薄幸輕如曲水飄香夜夜魂銷夢峽年年淚盡啼湘歸鴈行邊逺字驚鸞舞處離腸蕙樓多少鉛華在從來錯倚紅妝可羡鄰姬十五金叉早嫁王昌百媚娘張子野珠閣五雲仙子未省有誰能似百媚算應天乞與净飾艷粧俱美取次芳華俱可意何處無桃李蜀被錦紋鋪水不放綵鴛雙戲樂事也知存後會爭奈眼前心裏緑皺小池紅疊砌花外東風起臨江仙引恨別柳耆卿渡口向晚乘瘦馬陟崇岡西郊又送秋光對暮山橫翠襯殘葉飄黃憑高念逺素景楚天無處不凄凉香閨别來無信息雲愁雨恨難忘指帝城歸路但煙水茫茫凝情望斷淚眼盡日獨立斜陽感別前人上國去客停飛蓋促離筵長安古道綿綿見岸花啼露對堤柳愁煙物情人意向此觸目無處不凄然醉擁征驂猶竚立盈盈淚眼相
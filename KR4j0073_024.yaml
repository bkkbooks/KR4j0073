間甚築屋三間近水汀洲香泛蘭沚清風明月知多少肯滯軟紅塵裏垂釣餌這春水生時賸有桃花鱖煩襟淨洗待辦取輕簔來分半席相對弄清泚瑶臺月無名氏嚴風凛冽萬木凍園林蕭靜如洗寒梅占早爭先暗吐香蕊逞素容探暖欺寒遍粧點亭臺佳致通一氣超羣卉值臘後雪清麗開筵共賞南枝宴會好折贈東君驛使把嶺頭信息逺寄遇詩朋酒侣樽前吟綴且優遊對景歡娛更莫厭陶陶沈醉羌管怨瓊花墜結子用調鼎堪餌將軍止渴思得此味集賢賓佳人栁耆卿小樓深巷狂遊遍羅綺成叢就中堪人屬意最是春風有畫難描雅態無花可比芳容幾回飲散良宵永鴛衾暖鳳枕香濃算得人間天上帷有兩心同近來雲雨忽西東悄惱損情悰縱然偷期暗會長是匆匆爭似和鳴偕老免教斂翠啼紅眼前時暫踈歡宴盟言在更莫忡忡待作真箇宅院方信有初終子夜歌彭元遜視春衫篋中半在浥浥酒痕花露恨桃李如風過盡夢裏故人成霧臨潁美人秦川公子却共何人語對誰家花草池臺回首故園咫尺未成歸去昨宵聽危絃急管酒醒不知何處漂泊情多衰遲感易無限堪憐許似尊前眼底紅顔消幾寒暑年少風流未諳春事追與東風賦待他年君老巴山共君聽雨鳳歸雲適懷栁耆卿戀帝里金谷園林平康巷陌觸處繁華連日踈狂未嘗輕負寸心雙眼况佳人盡天外行雲堂上飛燕向玳筵一一皆妙選長是因酒沈迷被花縈絆更可惜淑景亭臺暑天枕簟霜月夜涼雪霰朝飛一嵗風光盡堪隨分俊遊清宴算浮生事瞬息光隂錙銖名宦正歡笑試恁暫時分散却是恨雨愁雲地遙天逺弔嚴陵李景元蕙蘭香泛孤嶼潮平驚鷗散雪迤邐點破澄江秋色暝靄向斂踈雨乍收染出藍峯千尺漁舍孤煙鎖寒磧畫鷁翠帆旋解輕艤晴霞岸側正念往悲酸懷鄉慘切何處引羌笛追憶當時富春佳地嚴光釣趾空遺迹華星沈後扁舟泛去瀟灑間名圖籍離觴弔終寓目意闌魂消淚滴漸洞天曉回首暮雲千古碧迷仙引夢石曼卿古今詩話春隂霽岸栁參差裊金絲細畫閣晝眠鶯喚起煙光媚燕燕雙髙引愁人如醉慵緩步眉斂金鋪倚佳景易失懊惱韶光改花空委忍厭厭地施朱粉臨鸞鏡膩香銷減摧桃李獨自箇凝睇暮雲暗遙山翠天色無情四逺低垂淡如水離恨托征鴻寄旋嬌波暗落相思淚粧如洗向髙樓日日春風裏悔慿欄芳草人千里金明池詩餘瓊苑金池青門紫陌似雪楊花滿路雲日淡天低晝永過三點兩點細雨好花枝半出牆頭似悵望芳草王孫何處更水繞人家橋當門巷燕燕鶯鶯飛舞怎得東君長為主把緑鬢朱顔一時留住佳人唱金衣莫惜才子倒玉山休訴况春來倍覺傷心念故國情多新年愁苦縱寶馬嘶風紅塵拂面也只尋芳歸去夏雲峯傷春僧仲殊天濶雲髙溪橫水逺晚日寒生輕暈間階靜楊花漸少朱門掩鶯聲猶嫩悔匆匆過却清明旋占得餘芳已成幽恨都幾日隂沈連宵慵困起來韶華都盡怨入雙眉間鬭損乍品得情懷看承全近深深態無非自許厭厭意終羞人問爭知道夢裏蓬萊待忘了餘香時傳音信縱留得鶯花東風不住也則眼前愁悶笛家弄慢栁耆卿花發西園草薰南陌韶光明秀乍晴輕暖清明後水嬉舟動禊飲筵開銀塘似染金堤如繡是處王孫幾多遊妓往往攜纎手遣離人對嘉景觸目盡成感舊别久帝城當日蘭堂夜燭百萬呼盧畫閣春風十千沽酒未省宴處能忘絃管醉裏不尋花栁豈知秦樓玉簫聲斷前事難重偶空遺恨望仙鄉一餉淚沾襟袖朱雍瓌質仙姿縞袂清格天然踈秀靜軒煙鎖黃昏後影瘦零亂艷冷瓏璁雪肌瑩暖氷枝縈繡更賦風流幾番攀贈細撚香盈手與東君敘暌逺脈脈時情有舊立久閬苑凝夕瑶窗淡月百琲尋芳醉玉談羣千鍾酹酒向此是處難忘瘦花送逺何勞隨柳空聽髙樓笛聲悽斷樂事人非偶空餘恨惹幽香不滅尚沾春袖送征衣栁耆卿過昭陽璿樞電繞華渚虹流運應千載會昌罄寰宇薦殊祥吾皇誕彌月瑶圖纘慶玉葉騰芳並景貺三靈眷佑挺英哲掩前王遇年年嘉節清和頒率土稱觴無間要荒華夏盡萬里走梯航彤庭舜張大樂禹會羣方鵷行趨上國山呼鼇抃遙熱爐香竟就日瞻雲獻夀指南山等無疆願巍巍寶歷鴻基齊天地遙長緑頭鴨錢塘懷古傅按察靜中看記昔日淮山隱隱宛若虎踞龍盤下襄樊指揮湘漢鞭雲騎圍繞江干勢不成三時當混一過唐之數不為難陳橋驛孤兒寡婦久假當還挂征帆龍舟催發紫宸初捲朝班禁庭空土花暈碧輦路悄呵喝聲乾縱餘得西湖風景花栁亦凋殘去國三千遊仙一夢依然天淡夕陽間昨宵也一輪明月還照臨安春雪間早梅失名梅將雪共春彩艷灼灼不相因逐吹霏霏能爭密排枝碎碎巧妬新誰令香來滿座獨使淨斂無塵芳意饒呈瑞寒光助照人玲瓏次第開已遍點綴坐來頻那是俱懷疑似須知造化兩各逼天真熒煌初亂眼浩蕩逸氣忽迷神未許瓊花並將從玉樹相親先期迎獻嵗更同歌酒占兹辰六華蠟蒂相輝映輕盈敢自珍翠羽吟蔣捷紺露濃映素空樓觀悄玲瓏粉凍霽英光搖蕩古青松半規黃昏淡月梅氣山影溟濛有麗人步依修竹瀟然態若遊龍綃袂微皺水溶溶仙莖清瀣淨洗斜紅勸我浮香桂酒環珮暗解聲飛芳靄中弄春弱栁垂絲慢按翠舞嬌童醉不知何處驚剪剪凄緊霜風夢醒尋痕訪蹤但留殘星挂穹梅花未老翠羽雙吟一片曉峯王君本示豫越調小梅花引俾似飛仙步虛之意為其辭豫謂泛泛言仙似乎寡味越調之曲與梅花宜羅浮梅花真仙事也演而成章名翠羽吟春風裊娜馮偉夀被梁間雙燕話盡春愁朝粉謝午花柔倚紅闌故與蝶圍蜂繞栁綿無數飛上搔頭鳳管聲圓蠶房香暖笑挽羅衫須少留隔院蘭馨趁風逺鄰牆桃影伴煙收些子風情未減眉頭眼尾萬千事欲説還休薔薇露牡丹毬殷勤記省前度綢繆夢裏飛紅覺來無覔望中新緑别後空稠相思難偶歎無情明月今年巳見三度如鈎洞仙歌密約栁耆卿佳景留心慣况少年彼此風情非淺有笙歌巷陌綺羅庭院傾城巧笑如花面恣雅態明眸回美盼同心綰算國艷仙材翻恨相逢晚繾綣洞房悄悄繡被重重夜永歡餘共有海約山盟記得翠雲偷剪和鳴彩鳳于飛燕間栁徑花隂攜手便情眷戀向其間密約輕憐事何限忍聚散况已結深深願願人間天上暮雲朝雨長相見白苧栁耆卿繡簾垂畫堂悄寒風淅瀝遙天萬里黯淡同雲羃羃漸紛紛六花零亂散空碧姑射宴瑶池把碎玉零珠拋擲林巒望中髙下瓊瑶一色嚴子陵釣臺歸路迷蹤迹追惜燕然畫角寶簥珊瑚是時丞相虛作銀城換得當此際偏宜訪袁安宅醺醺醉了任他金叉舞困玉壺頻側又是東君暗遣花神先報南國昨夜江梅漏泄春消息王晦叔頥堂集云白苧詞傳者至少其正宫一關世以為紫姑神所作也方寫至追惜燕然畫角寶簥珊瑚是時丞相虛作銀城換得或問出何書答曰天上文字汝爭得知蔣竹山正春晴又春冷雲低欲落瓊苞未剖早是東風作惡旋安排一雙銀蒜鎮羅幕幽壑氷生漪皺嫩緑潛鱗初躍愔愔門巷桃樹紅才約略知甚時霽華烘破青青蕚憶昨引蝶花邊近來重見身學垂楊瘦削問小翠眉山為誰攢却斜陽院宇任蛛絲罥遍玉箏絃索户外惟聞放剪刀聲深在粧閣料想裁縫白苧春衫薄蘭陵王周美成栁隂直煙裏絲絲弄碧隋堤上曽見幾番拂水飄綿送行色登臨望故國誰惜京華倦客長亭路年去嵗來應折柔條過千尺間尋舊蹤迹又酒趁哀絃燈照離席梨花榆火催寒食愁一剪風快半篙波暖回首迢遞便數驛望人在天北悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春無極念月榭攜手露橋吹笛沈思前事似夢裏淚暗滴春遊張仲宗捲珠箔朝雨輕隂乍閣闌干外煙栁弄晴芳草侵階映紅藥東風妬花惡吹落梢頭嫩蕚屏山掩沈水倦熏中酒心情怕杯勺尋思舊京洛正年少踈狂歌笑迷著障泥油壁催梳掠曽馳道同載上林攜手燈夜初過早共約又爭信漂泊寂寞念行樂甚粉淡衣襟音斷絃索瓊枝璧月春如昨悵别後華表那回雙鶴相思除是向醉裏暫忘却春思綺霞散空碧留晴向晚東風裏天氣困人時節秋千閉深院簾旌翠波颭窗影殘紅一線春光好花臉栁腰勾引芳菲閙鶯燕間愁費消遣想蛾緑輕顰鸞鑑新怨單衣欲試寒猶淺羞衾鳳空展塞鴻難托誰問潛寬舊帶眼念人似天逺迷戀畫堂宴看最樂王孫濃艷爭勸蘭膏寶篆春宵短擁檀板低唱玉杯重暖衆中先醉謾倚檻早夢見十二時秋夜栁耆卿晚晴初淡煙籠月風透蟾光如洗覺翠帳涼生秋思漸入微寒天氣敗葉敲窗西風滿院睡不成還起更漏咽滴破憂心萬感並生都在離人愁耳天怎知當時一句做得十分縈繫夜永有時分明枕上覷著孜孜地燭暗時酒醒原來又是夢裏睡覺來披衣獨坐萬種無聊情意怎得伊來重諧雲雨再整餘香被祝告天發願從今永無拋棄破陳樂露花倒影煙蕪蘸碧靈沼波暖金栁搖風樹樹繫綵舫龍舟遙岸千步虹橋參差鴈齒直趨水殿繞金隄曼衍魚龍戲簇嬌春羅綺喧天絲管霽色榮光望中似覩蓬萊清淺時見鳳輦宸遊鸞觴禊飲臨翠水開鎬宴兩兩輕舠飛畫楫競奪錦標霞爛聲歡娛歌魚藻徘徊宛轉别有盈盈遊女各委明珠爭收翠羽相將歸去漸覺雲海沈沈洞天日晚錢塘張子野四堂互映雙門並麗龍閣開府郡美東南第一望故苑樓臺霏霧垂栁池塘流泉巷陌吳歌處處近黃昏漸更宜良夜簇繁星燈燭長衢如晝暝色韶光幾簾粉面飛甍朱户歡遇鴈齒橋紅裙腰草緑雲際寺林下路酒熟梨花賓客醉但覺滿山簫鼓盡朋遊因民樂芳菲有主自此歸從泥詔去指沙堤南屏水石西湖風月好作千騎行春畫圖寫取浪淘沙慢周美成曉隂重霜凋岸草霧隱城堞南陌脂車待發東門帳飲乍闋正拂面垂楊堪攬結掩紅淚玉手親折念溪浦離鴻去何許經時信音絶情切望中地逺天濶向露冷風清無人處耿耿寒漏咽嗟萬事難忘惟是輕别翠樽未竭慿斷雲留取西樓殘月羅帶光銷紋衾疊連環解舊香頓歇怨歌永瓊壺敲盡缺恨春去不與人期弄夜色空餘滿地梨花雪相思栁耆卿夢覺透窗風一線寒燈吹息那堪酒醒又聞空階夜雨頻滴嗟因循久作天涯客負佳人幾許盟言更忍把從前歡會陡頓翻成憂戚愁極再三追思洞房深處幾度飲散歌闋香暖鴛鴦被豈暫時踈散費伊心力殢雨尤雲有萬般千種相憐相惜到如今長天漏永無端自家踈隔知何時却擁秦雲態願低幃昵枕輕輕細説與江鄉夜夜數寒更思憶大酺周美成對宿煙收春禽靜飛雨時鳴髙屋牆頭青玉斾洗鉛霜都盡嫩梢相觸潤逼琴絲寒侵枕障蟲網吹粘簾竹郵亭無人處聽簷聲不斷困眠初熟奈愁極頓驚夢輕難記自憐幽獨行人歸意速最先念流潦妨車轂怎奈向蘭成憔悴衛玠清羸等間時易傷心目未怪平陽客雙淚落笛中哀曲况蕭索青蕪國紅糝鋪地門外荆桃如菽夜遊共誰秉燭牡丹劉後村正緑隂濃鶯聲懶庭院寒輕煙薄天然花富貴逞夭紅殷紫疊葩重蕚醉艷酣春妍姿浥露翠羽輕明如削檀心鴉黃嫩似離情愁緒萬絲交錯更銀燭相輝玉瓶微浸宛然京洛朝來風雨惡怕僝僽低張青油幕便好倩佳人插帽貴客傳箋趁良辰賞心行樂四美難并也須拚醉莫辭杯酌被花惱情無著長笛何處一笑江頭髙閣極目水雲漠漠瑞龍吟周美成章臺路還是褪粉梅梢試花桃樹愔愔坊陌人家定巢燕子歸來舊處黯凝佇因念箇人癡小乍窺門户侵晨淺約宫黃障風映袖盈盈笑語前度劉郎重到訪鄰尋里同時歌舞惟有舊時家秋娘聲價如故吟箋賦筆猶記燕臺句知誰伴名園露飲東城間步事與孤鴻去探春盡是傷離緒官栁低金縷歸騎晚纎纎池塘飛雨斷腸院落一簾風絮翁處靜清明近還是遞趲東風做成花信芳時一刻千金半晴半雨酬春未凖鴈歸盡離字向人欲寫暗雲難認西園猛憶逢迎翠紈障面花間笑隱曲徑池蓮平砌絳裙曽與濯香前粉無奈燕幕鶯簾輕負嬌俊青榆巷陌馬踏紅成寸十年夢秋千弔影襪羅塵褪事往慿誰問晝長病酒添新恨煙冷斜陽暝山黛逺曲曲闌干慿損栁絲萬尺不如半堤風緊玉女搖仙佩柳永飛瓊伴侣偶别珠宫未返神仙行綴取次梳粧尋常言語有得幾多姝麗擬把名花比恐傍人笑我談何容易細思算竒葩絶卉惟是深紅淺白而已爭如這多情占得人間千嬌百媚須信畫堂繡閣皓月清風忍把光隂輕棄自古及今佳人才子少得當年雙美且恁相偎倚未消得憐我多才多藝願嬭嬭蘭心蕙性枕前言下表余深意為盟誓今生斷不辜鴛被朱雍灰飛嶰谷珮解江干庾嶺寒輕梅瘦水面吞蟾山光暗斗物色盈枝依舊慿暖危欄久有清香旖旎却沾襟袖賦情窺人艷冷更是殷勤忍重回首誰知道春歸院落繽紛雪飛鴛甃須謝花機受惜碎璧鋪酥肯把蜚英僝僽念念瑶珂乘飈煙浦送别猶攜纎手馥郁盈芳酒臨粧罷一點眉峯傷皺又只但恐收夢斷管凄風怨曉催銀漏殘金獸參橫墮月歸時候多麗聶冠卿想人生美景良辰堪惜向其間賞心樂事古來難是并得况東城鳳臺沁苑泛晴波淺照金碧露洗華桐煙霏絲栁緑隂搖曳蕩春一色畫堂迥玉簮瓊佩髙會盡詞客清歡久重然絳蠟别就瑶席有翩若驚鴻體態暮為行雨標格逞朱唇緩歌妖麗似聽流鶯亂花隔慢舞縈回嬌鬟低軃腰肢纎細困無力忍分散彩雲歸後何處更尋覔休辭醉明月好花莫謾輕擲朝次膺晚雲收淡天一片琉璃爛銀盤來從海底皓色千里澄輝瑩無塵素娥淡佇靜可數丹桂參差玉露初零金風未凛一年無似此佳時向坐久踈星時度烏鵲正南飛瑶臺冷欄干慿暖欲下遲遲念佳人音塵隔後對此應解相思最關情漏聲正永暗斷腸花影潛移料得來宵清光未減隂晴天氣又爭知共凝戀如今别後還是隔年期人縱健清樽素月長願相隨周格非隴頭泉未到隴下輕分一聲聲凄涼嗚咽豈堪側耳重聞細思量那時攜手畫樓髙簾幕黃昏月不長圓雲多輕散天應偏妬有情人自别後小窗幽院無處不消魂羅衣上殘粧未減猶帶啼痕自一從瓶沈簮折杳知欲見無因也渾疑事如春夢又只恐人是朝雲破鏡分來朱絃斷後不堪獨自對芳尊試與問多才誰更匹配得文君須知道東陽瘦損不為傷春李子申好人人去來欲見無因記當初竊香倚暖豈期蝶散鶼分到而今謾勞夢想歎後會慘啼痕繡閣銀屏知他何處一重山盡一重雲暮天杳梗蹤萍迹還是寄孤村寂寥月今宵為誰虛照黃昏細追思深誠密愛黯然一餉消魂仗遊魚謾傳尺素望塞鴻空噎回紋帳冷衾寒香銷塵滿博山沈水更誰熏斷腸也無聊情味惟是殢芳尊沈吟久移燈向壁掩上重門記恨嚴次山最無端官樓畫角輕吹一聲來深閨深處把人好夢驚回許多愁儘教奴受些箇事未必君知淚滴蘭衾寒生珠幌翠雲撩亂枕頻欹窗兒上幾條殘月斜玉界羅帷更堪聽霜摧敗葉靜扣朱扉念别離千里萬里問何日是歸期關情處魚來鴈往斷腸時兔走烏飛美景良辰賞心樂事風流辜負縷金衣謾贏得花顔玉骨瘦損為相思歸須早劉郎雙鬢莫遣成絲前調李易安小樓寒夜長簾幕低垂恨蕭蕭無情風雨夜來揉損瓊肌也不似貴妃醉臉也不似孫夀愁眉韓令偷香徐娘傅粉莫將比擬未新竒細看取屈平陶令風韻正相宜微風起清芬藴藉不減酴醿漸秋闌雪清玉瘦向人無限依依似愁凝漢臯解佩似淚灑紈扇題詩明月清風濃煙暗雨天教憔悴度芳姿縱愛惜不知從此留得幾多時人情好何須更憶澤畔東籬六醜落花周美成正單衣試酒悵客裏光隂虛擲願春暫留春歸如過翼一去無迹為問家何在夜來風雨送楚宫傾國叉鈿墮處遺香澤亂點桃蹊輕翻柳陌多情更誰追惜但蜂媒蝶使時叩窗槅東園岑寂漸蒙籠暗碧靜繞珍叢底成歎息長條故惹行客似牽衣待話别情無極殘英小強簮巾幘終不似一朵叉頭顫裊向人欹側漂流處莫趁潮汐恐斷鴻尚有相思字何由見得輪臺子恨别栁耆卿霧瀲澄江煙鎖藍光碧彤霞襯遙天掩映斷續半空殘璧孤村望處人寂寞聞釣叟甚處一聲羌笛九嶷山畔才雨過斑竹作血痕添色感行客翻思故鄉恨因循阻隔路久沈消息正老松枯柏情如織聞野猿啼愁聽得見釣舟初出芙蓉渡頭鴛鴦灘側干名利祿終無益念嵗嵗間阻迢迢紫陌翠娥嬌艷從别經今花開栁折傷魂魄利名牽役又爭忍把光景拋擲六州歌頭過烏江李冠玉林作劉仲方秦亡草昧劉項起吞并鞭寰宇驅龍虎掃欃槍斬長鯨血染中原戰爭視餘耳皆鷹犬平禍亂歸炎漢勢奔傾兵敗月明風急旌旗亂刁斗三更共虞姬相對泣聽楚歌聲玉帳魂驚淚盈盈念花無主凝愁苦揮雪刃掩泉扄時不利騅不逝困隂陵叱追兵嗚喑摧天地望歸路忍偷生功何處蓋世成間紀見遺靈江靜水寒煙冷波紋細古木雕零遣行人到此追念益傷情勝負難慿張安國長淮望斷關塞莽然平征塵暗霜風徑悄邊聲黯銷凝追想當年事殆天數非人力洙泗上絃歌地亦榛荆隔水荒村落日牛羊下區脫縱橫看名王宵獵騎火一川明笳鼓悲鳴遣人驚念腰間箭匣中劔空埃蠧竟何成時易失心徒壯嵗將零渺神京干羽方懷逺靜烽燧且休兵冠蓋使紛馳騖若為情聞道中原遺老常南望翠葆霓旌使行人到此忠憤氣填膺有淚如傾朝野遺記云安國在建康留守席上賦此歌闋魏公為罷席而入韓元吉東風著意先上小桃枝紅粉膩嬌如醉倚朱扉記年時隱映新粧面臨水岸春將半雲日暖斜陽轉夾城西草軟沙平跛馬垂楊渡玉勒爭嘶認娥眉凝笑臉薄拂胭脂繡户曽窺恨依依昔攜手處香如霧紅隨步怨春遲消瘦損慿誰問只花知淚空垂舊日堂前燕和煙雨又雙飛人自老春長好夢佳期前度劉郎幾許風流地也應悲但茫茫暮靄目斷武陵溪往事難追驪山李世英凄涼繡嶺宫殿倚山阿明皇帝曽遊地鎖煙蘿鬱嵯峨憶昔真妃子艷傾國方姝麗朝復暮嬪嬙妬寵偏頗三尺玉泉新浴蓮羞吐紅浸秋波聽花奴敲羯鼓酣奏鳴鼉體不勝羅舞婆娑正霓裳曵驚烽燧千萬騎擁雕戈情宛轉魂空亂蹙雙蛾奈兵何痛惜三春暮委妖麗馬嵬坡平冦亂回宸輦忍重過香瘞紫囊猶有鴻都客鈿合應訛使行人到此千古只傷歌事往愁多夜半樂恨别栁耆卿凍雲黯淡天氣扁舟一葉乘興離江渚渡萬壑千巖越溪深處怒濤漸息樵風乍起更聞商旅相呼片帆髙舉泛畫鷁翩翩過南浦望中酒斾閃閃一簇煙村數行霜樹殘日下漁人鳴榔歸去敗荷零落衰楊掩映岸邊兩兩三三浣紗遊女避行客含羞相笑語到此因念繡閣輕拋浪萍難駐歎後約丁寧竟何據慘離懷空恨嵗晚歸期阻凝淚眼杳杳神京路斷鴻聲逺長天暮寶鼎現上元康伯可夕陽西下暮靄紅溢香風羅綺乘麗景華燈爭放濃焰燒空連錦砌覩皓月浸嚴城如晝花影寒籠絳蕊漸掩映芙蕖萬頃迤邐齊開秋水太守無限行歌意擁麾幢光動珠翠傾萬井歌臺舞榭瞻望朱輪駢鼓吹控寶馬耀貔貅千騎銀燭交光數里似亂簇寒星萬點擁入蓬壺影裏宴歌多才環艷粉瑶簮珠履恐看看丹詔催奉宸遊燕侍便趁早占通宵醉緩引笙歌妓任畫角吹老寒梅月滿西樓十二中吳紀聞云范周字無外純古之子工於詩詞不求聞達安貧樂道未嘗屈折於人盛季文作守時頗嫚士嘗於元宵作寶鼎現詞投之極蒙嘉奬因遺酒五百壺其詞播於天下每遇燈夕諸郡皆歌之疑即此詞梅苑東君著意化工恩被灼灼妖艷裊嫩梢輕䔒縈風惹露偏早香英綻似向人故矜誇標致倚欄全如顧盼尚困怯餘寒柔情弱態天真無限斷橋壓栁時非淺先百花風光獨占當送臘初歸迎春欲至芳姿偏婉孌料碎剪就繒紈輝麗更把胭脂重染自賦得一般容冶宛勝神仙粧臉折近小閣幽窗酷愛處令親几硯儘孜孜觀賞不枉人稱妙選待密密付如膏雨澤仍粧點任擾擾百卉千花掩迹一時羞見哨遍董解元太皥司春春工著意和氣生暘谷十里芳菲儘東風絲絲栁搓金縷漸次第桃紅杏淺水緑山青春漲生煙渚九十日光隂能幾早鳴鳩呼婦乳燕攜雛亂紅滿地任風吹飛絮蒙空有誰主春色三分半入池塘半隨塵土滿地榆錢算來難買春光住初夏永薰風池館有藤牀氷簟紗㡡日轉午脫巾散髮沈李浮瓜寶扇搖紈素著甚消磨永日有掃愁竹葉侍寢青奴霎時微雨送新涼些少金風退殘暑韶華早暗中歸去三臺万俟雅言見梨花初帶夜月海棠半含朝雨內苑春不禁過青門御溝漲潛通南浦東風靜細栁垂金縷望鳳闕非煙非霧好時代朝野多歡遍九陌太平簫鼓乍鶯兒百囀斷續燕子飛來飛去近緑水臺榭映鞦韆鬭草聚雙雙遊女餳香更酒冷踏青路曽暗識夭桃朱户向晚驟寶馬雕鞍醉襟惹亂花飛絮正輕寒輕暖漏永半隂半晴雲暮禁火天已是試新粧嵗華到三分佳處清明看漢宫傳蠟炬散翠煙飛入槐府斂兵衛閶闔門開住傳宣又還休務拋毬樂春賞栁耆卿曉來天氣濃淡微雨輕灑近清明風絮巷陌煙草池塘盡堪圖畫艷杏暖妝臉勻開弱栁困宫腰低亞是處麗質盈盈巧笑嬉嬉爭簇秋千架戲綵毬羅綬金雞芥羽少年馳騁芳郊緑野占斷五陵遊奏脆管繁絃聲和雅向名園深處爭抳畫輪競羈寶馬取次羅列杯盤就芳樹緑影紅隂下舞婆娑歌宛轉倣佛鶯嬌燕姹寸珠片玉爭似儂歡無價任他美酒十千一斗飲竭仍解金貂貰恣幕天席地淘淘盡醉太平且樂唐虞景化須信艷陽天看未足已覺鶯花謝對緑蟻翠蛾怎生輕捨哨遍東坡為米折腰因酒棄家口體交相纍歸去來誰不遣君歸覺從前皆非今是露未晞征夫指豫歸路門前笑語喧童稚嗟舊菊都荒新松暗老吾年今已如此但小窗容膝閉柴扉䇿杖看孤雲暮鴻飛雲出無心鳥倦知還本非有意噫歸去來兮我今忘我兼忘世親戚無浪語琴書中有真味步翠麓﨑嶇泛溪窈窕涓涓暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇內復幾時不自覺皇皇欲何之委吾心去留誰計神仙知在何處富貴非吾願但知臨水登山嘯詠自引壺觴自醉此生天命更何疑且乘流遇坎還止春情睡起畫堂銀蒜押簾珠幕雲垂地初雨歇洗出碧羅天正溶溶養花天氣一霎晴風回芳草榮光浮動卷皺銀塘水方杏靨勻酥花鬚吐繡園林翠紅排比見乳燕捎蝶過繁枝忽一線爐香遊絲晝永人間獨立斜陽晚來情味便乘興攜將佳麗深入芳菲裏撥胡琴語輕攏慢撚總伶俐看緊約羅裙急趣檀板霓裳入破驚鴻起顰月臨眉醉霞橫臉歌聲悠揚雲際任滿頭紅雨落花飛墜漸鳷鵲樓西玉蟾低尚徘徊未盡歡意君看今古悠悠浮幻人間世這些百嵗光隂幾日三萬六千而已醉鄉路穩不妨行但人生要適情耳劉禹錫詩野草芳菲紅錦地遊絲掩亂碧羅天戚氏栁耆卿晚秋天一霎微雨灑庭軒檻菊瀟踈井桐零亂惹殘煙凄然望鄉關飛雲黯淡夕陽間當時宋玉悲感向此臨水與登山逺道迢遞行人凄楚倦聽隴水潺湲正蟬鳴敗葉蟲響衰草相應聲喧孤館度日如年風露漸變悄悄至更闌長天靜絳河清淺皓月嬋娟思綿綿夜永對景那堪屈指暗想從前未名未祿綺陌紅樓往往經歲遷延帝里風光好當年少日暮宴朝歡况有狂朋怪侣遇當歌對酒競留連别來迅景如梭舊遊似夢煙水程何限念利名憔悴長縈絆追往事空慘愁顔漏箭移稍覺輕寒聽嗚咽畫角數聲殘對間窗畔停燈向曉抱影無眠東坡玉龜山東皇靈嫓統羣仙絳闕岧嶤翠房深迥倚霏煙幽間志蕭然金城千里鎖嬋娟當時穆滿巡狩翠華曽到海西邊風露霽鯨波極目勢浮輿蓋方圓正迢迢麗日玄圃清寂瓊草芊綿爭解繡勒香韀鸞輅駐驆八馬戲芝田瑶池近畫樓隱隱翠鳥翩翩肆華筵花間作管鳴絃宛若帝所鈞天稚頭皓齒緑髮方瞳圓極恬淡髙妍盡倒瓊壺酒獻金鼎藥固大椿年縹眇飛瓊妙舞命雙成奏曲醉留連雲璈韻響寫寒泉浩歌暢飲斜月低河漢漸漸綺霞天際紅深淺動歸思回首塵寰爛漫遊玉輦東還杏花風數里響鳴鞭望長安路依稀栁色翠點春妍李端叔跋云坡戚氏詞敘穆天子西王母事蓋在山中燕席間有歌此闋者坐客言調美而詞不典以請於公公方觀山海經即敘其事為題使妓再歌之隨其聲填寫歌竟篇就才點定五六字而已端叔時在幕府親見其事云勝州令鄭意娘韓師厚妻杏花正噴火朦朦微雨曉來初過夢回聽乳鶯調舌紫燕競穿簾幕垂楊影裏粉牆映出鞦韆索對媚景贏得雙眉鎖翠鬟信任軃誰更忺梳掠追思向日共個人同攜手略無暫時拋墮到今似海角天涯無由見得則個番思往事上心向他誰行訴却會舊歡淚滴真珠顆意中人未覩覺鳳幃冷落都是俺差錯被他間言伏語啜做到此近四五千里為水逺山遙闊當初曽言盡老更不重婚却甚鎮日共人同歡樂傳粉在那裏肯念人寂寞終待把雲箋細寫把衷腸盡總説破問伊怎下得憐新棄舊頓乖盟約可憐命掩黃泉細尋思都為他一個你忒煞虧我鶯啼序吳江長橋黃在軒銀雲捲晴縹眇臥長龍一帶栁絲蘸幾簇柔煙兩市簾棟如畫芳草岸灣環半玉鱗鱗曲港雙流會看碧天連水翻成箭樣風快白露橫江一葦萬頃問靈槎何在空翠濕衣不勝寒日華金掌沆瀣甃花平緑紋襯步瓊田湧出神仙界黛眉修依約霧鬟在秋波外閣噓青蜃簷啄彩虹飛蓋蹴鼇背燈火暮相輪倒景偷睇别浦片片歸帆舞蛟幽壑棲鴉古木有人剪取江水憶細鱗巨口魚堪膾波涵笠澤時見靜影浮光霏隂萬貌千態蒹葭深處應有間鷗寄語休見猜洗却香紅塵面買箇扁舟身世飄萍名利微芥闌干拍遍除東曹掾與天隨子是我輩儘胸中著得乾坤大亭前無限驚濤總把遙岑月明滿載夀胡存齋趙青山初荷一番濯雨錦雲紅尚捲隘華屋賦客吟仙候望南極天逺還報道飄然紫氣山竒水勝都行遍却歸來領客水晶庭院開宴窗户青紅正似京洛按笙歌一片似别有金屋佳人桃根桃葉清婉倚薰風虬鬚正緑人似玉手挼紈扇算風流只有蓬瀛畫圖曽見誰知老子正自蕭然於此興頗淺只擬問金砂玉蕊兔髓烏肝偃月爐中七還九轉今來古往悠悠史傳神仙本是英雄做笑英雄到此多留戀看著破曉耕龍跨海騎􅚪千年依舊丹臉便教乞與萬里封侯奈朔風如箭又何似六山一任種竹栽花棊局思量墨池揮染天還記得生賢初意乾坤正要人撑拄便公能安隱天寧肯待看佐漢功成伴赤松遊恁時未晚花草稡編卷二十四

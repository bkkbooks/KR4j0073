body:
  text: 花草稡編卷四明陳耀文輯小令縷縷金清湖三塔記幾回見你簾兒下佯不採把人斜抹問著他插地推聾啞到學三郎改話不也不和我巧時休和我巧時都不怕二這幾日言語夾衩只推道娘的掗把常言道官不容針又何况私同車馬不也不和我巧時休和我巧時都不怕備題楊花落夢中詞李邦直塵史楊花落燕子橫穿髙閣長恨春醪如水薄閒愁無處著去年今日玉陵舍鼓角秋風千嵗遼東回首人間萬事空喜長新王勝之秋雲朔吹曉徘徊雪照樓臺宴召鄒枚相如獨逞雄才明燭薰爐香暖深勸金杯庭前粉艷有寒梅昨夜一枝開霜天曉角張安國栁絲無力冉冉縈秋碧繫我船兒不住楚江上晚風急棹歌休怨抑有人離恨極說與歸期不逺剛不信淚偷滴張材甫曉風搖幕欹枕聞殘角霜月竹窗寒影金猊冷翠衾薄舊恨無處著新愁還又作夜夜單于聲裏燈花共淚珠落劉改之霜天曉角夢回滋味惡酒醒不禁寒力紗窗外日華薄擁衾思舊約無情風透幕惟有梅花相伴不成是也吹落劉圻父橫隂漠漠似覺羅衣薄正是海棠時候紗窗外東風惡惜春春寂寞尋花花冷落不㑹這些情味元不是念離索月當忩張宗瑞看朱成碧曽醉梅花側相遇匆匆相别又爭似不相識南北千里隔幾時重見得最苦子規啼處一片月當窗白關河令清逺軒逺望趙介之亭皋霜落飛葉滿聽西風斷鴈閒憑危䦨斜陽紅欲斂行人歸期太晚誤髣佛征帆幾㸃水逺連天愁雲遮望眼已亥宜春舟中江頭伊軋動柔櫓漸楚天欲暮浩蕩輕鷗波間自容與岸蓼汀蘋無緒更滿目蕭疏紅樹此意何窮憑誰圖畫取卜算子春恨秦處度春透水波明寒峭花枝瘦極目煙中百尺樓人在樓中否四和裊金鳬雙陸思纎手擬倩東風浣此情情更濃如酒陳瑩中身如一葉舟萬事潮頭起水長船髙一任伊來往洪濤裏潮落又潮生今古長如此後夜開樽獨酌時月滿人千里二夢裏不知眠覺後眠何在試問眠身與夢身那箇能祇對醉後有人醒醒了無人醉要識三千與大千不在微塵外裕陵時人蹙破眉峰碧纎手還重執鎮日相看未足時忍便使鴛鴦隻薄暮投村驛風雨愁通夕窗外芭蕉窗裏人分葉上心頭滴玉照新志裕陵親書其後云此詞甚佳不知何人作奏來孤鴻蘇子瞻缺月掛疏桐漏斷人初靜時見幽人獨往來縹眇孤鴻影驚起却回頭有恨無人省揀盡寒枝不肯棲楓落吳江冷耆舊續聞云趙右史云余頃於鄭公實處見東坡親蹟書卜算子斷句云寂寞沙汀冷刋本作楓落吳江冷詞意全不相屬也皎如晦杭州僧有意送春歸無計留春住畢竟年年用著來何似休歸去目斷楚天遙不見春歸路風急桃花也似愁㸃㸃飛紅雨毛刊見也如何暮别也如何遽别也難時見也難後㑹難憑據去也如何去住也如何住住也應難去也難此際難分付石孝友集金谷遺音送鮑浩然游浙東王逐客能改齊漫録水是眼波橫山是眉峰聚欲問行人去那邊眉眼盈盈處才始送春歸又送君歸去若到江南趕上春千萬和春住張子野夢短寒夜長坐待清霜曉臨鏡無人為整粧但自學孤鸞照樓臺紅樹杪風月依前好江水東流郎在西問尺素何由到杜叔元安世尊前一曲歌歌裏千重意才欲歌時淚已流恨應更多於淚試問緣何事不語癡如醉我亦情多不忍聞怕和我添憔悴程正伯獨自上層樓樓外青山逺望到斜陽欲盡時不見西飛鴈獨自下層樓樓下蛩聲怨待到黃昏月上時依舊柔腸斷吕聖求一日抵三秋半月如千嵗自夏經秋到雪飛一向都無計續續說相思不盡無窮意若寫幽懷一段愁應用天為紙徐師川天生百種愁掛在斜陽樹緑葉隂隂自得春草滿鶯啼處不見凌波步空想如簧語門外重重疊疊山遮不斷愁來路舒信道池臺小雨乾門巷香輪少誰把青錢襯落紅滿地無人掃何時鬬草歸幾度尋花了留得佳人蓮步痕宫樣鞋兒小黃山谷要見不得見要近不得近試問得君多少憐管不解多於恨禁止不得淚忍管不得悶天上人間有底愁向箇裡都諳盡劉潜夫盡是手成持合得天饒借風雨於花有甚讎作意相陵藉做暖逼教開做冷催教謝不負明年看花人只負栽花者二片片蝶衣輕㸃㸃猩紅小人道東君不惜花百種千般巧朝見樹頭繁暮見枝頭少人道東君果惜花雨打風吹了李敦詩南北利名人常恨家居少每到春時聽子規無不傷懷抱好去向長安細與公卿道待得功成名遂時不如歸來早康仲伯曽約再來時花暗春風樹今日人來花未開春未知人處坐客有踈狂綵筆題新語渾為玉人頺玉山忘了陽關路二煙髻綰層巔雲葉生寒樹斜日行人窈窕村愁陳縱橫處細細寫鸞箋道寄相思語會倩春風展栁眉回馬章臺路蒲江續續露蛩鳴索索風梧語瘦骨從來不奈秋一夜秋如許簟冷捲風漪髻滑拋雲縷展轉無人共此情畫角吹殘雨慈溪丈亭館古詞潮生浦口雲潮落沙頭樹潮本無心落又生人自來還去今古短長亭送往迎來處老盡東西南北人亭下潮如故清湖三塔記幽花帶露紅濕栁拖烟翠花栁分春各自芳惟有人憔悴寄與手中書問肯歸來未正是東風料峭寒如何獨自教人睡寄歌者李蓮吕聖求渡口看潮生水滿蒹葭浦長記扁舟載月明深入紅蕖去荷盡覆平池忘了歸來路誰信南樓百尺髙不見如蓮步陳無已梅苑搖風影似凝帶雪香如抱開盡南枝到北枝不道春將老飄颻姑射仙誰識氷肌好會有青綾夢覺人可愛池塘草二繡幕罩梅花莫放清香透鑑裏朱顔嵗嵗移只道花依舊把酒問梅花知我離情否若使梅花知我時料得花須瘦三雪暗嶺頭雲竹冷溪邊樹還似瀟湘縹眇人玉骨籠香霧月下幽香度夢裏香魂駐回首南枝酒半醺寂寞無尋處晚春髙觀屈指數春來彈指驚春去簷外蛛絲網落花也要留春住幾日喜春晴幾夜愁春雨十二雕窗六曲屏題遍傷春句二月三十日壽母范靖江夀親養老滿二望三時春景方明媚人見蟠桃結子來王母初筵啓無數桂林山不盡灕江水揔入今朝祝夀杯永保千千嵗趙可中州樂府明月在青天借問今時幾但見宵從海上來不覺雲間墜流水古今人共看皆如此唯願當歌對酒時長照金尊裏缺月挂疏桐擬東坡作趙秉文烏鵲不多驚貼貼風枝靜珠貝橫空冷不收半濕秋河影缺月墮幽窗推枕驚深省落葉蕭蕭聽雨聲簾外霜華冷西湖遺舊福建士子月在小樓西雞唱霜天曉淚眼相看話别時把定纎纎手伊道不忘人伊却都忘了我若無情似你時瞞不得橋頭栁古杭雜記贈樂婉杭妓施酒監古今詞話相逢情便深恨不相逢早識盡千千萬萬人終不似伊家好别你登長道轉更添煩惱栁外朱樓獨倚欄滿目圍芳草答施酒監樂婉相思似海深舊事如天逺淚滴千千萬萬行更使人愁腸斷要見無因見了拚終難拚若是前生未有緣待重結來生願美奴陸藻侍兒送我出東門乍别長安道兩岸垂楊鎖暮煙正是秋光老一曲古陽關莫惜金尊倒君向瀟湘我向秦魚鴈何時到苕溪漁隱梅朱淑真竹裏一枝梅映帶林逾靜雨後清竒畫不成淺水橫斜影吹徹小單于心事重思省拂拂風前度暗香月色侵花冷嚴幼芳不是愛風塵似被前緣誤花開花落自有時總賴東君主去也終須去住也如何住若得山花插滿頭莫問奴歸處後庭花毛熙震花間集鶯啼燕語芳菲節瑞庭花發昔時歡宴歌聲揭管絃清越自從陵谷追遊歇畫梁塵黦傷心一片如圭月閒鎖宫闕二越羅小袖新香舊薄籠金釧倚䦨無語搖輕扇半遮勻面春殘日暖鶯嬌懶滿庭花片爭不教人長相見畫堂深院孫光憲石城依舊空江國故宫春色七尺青絲芳草緑絶世難得玉英凋落盡更何人識野棠如織只是教人添怨憶悵望無極玉樹後庭花上元張子野華鐙火樹紅相鬭往來如晝河橋水白天晴訝别生星斗落梅穠李還依舊寶叉沽酒曉蟾殘漏心情恨雕鞍歸後二寶牀香重春眠覺魫窗難曉新聲麗色千人歌後庭清妙青驄一騎來飛鳥靚粧難好至今落日寒蟾照臺城秋草巫山一段雲毛文錫雨霽巫山上雲輕映碧天逺風吹散又相連十二晚峰前暗濕啼猿樹髙籠過客船朝朝暮暮楚江邊幾度降神仙李珣有客經巫峽停橈向水湄楚王曽此夢瑶姬一夢杳無期塵暗珠簾卷香銷翠幄垂西風回首不勝悲暮雨灑空祠二古廟依青嶂行宫枕碧流水聲山色鎖粧樓往事思悠悠雲雨朝還暮煙花春復秋啼猿何必近孤舟行客自多愁花菴詞客云唐詞多緣題所賦臨江仙則言仙事女冠子則述道情河瀆神則詠祠廟大槩不失本題之意爾後漸變失題逺矣如此二詞實唐人本來詞體如此净壇峰巫山十二峰趙孟俯疊嶂千重碧長江一帶清瑶壇霞冷月朧明欹枕若為情雲過船窗曉星移宿霧晴古今離恨撥難平惆悵峽猿聲登龍峰片月生危岫殘霞拂翠桐登龍峰下楚王宫千古感遺蹤栁色眉邊緑花明臉上紅欲尋靈跡阻江風離思杳無窮松鶴峰松鶴堆嵐靄陽臺枕水湄風清月冷好花時惆悵阻佳期别夢逰蝴蝶離歌怨竹枝悠悠往事不勝悲春恨入雙眉上升峰雲裏髙唐觀江邉楚客舟上升峰月照妝樓離思兩悠悠雨雲千里阻長江一帶秋歌聲頻唱引離愁光景恨如流朝雲峰絶頂朝雲散寒江暮雨頻楚王宫殿已成塵過客轉傷神月是巫娥伴花為宋玉鄰一聽歌調一含嚬哀怨竹枝春集仙峰雨過蘋汀逺雲深水國遙渡頭齊舉朩蘭橈纎細楚宫腰映水勻紅臉偎花整翠翹行人倚棹正無聊一望一魂銷望霞峰碧水鴛鴦浴平沙豆蔻紅望霞峰翠一重重帆卸落花風淡薄雲籠月霏微雨灑篷孤舟晚泊浪聲中無處問音容棲鳯峰芍藥虛投贈丁香漫結愁鳯棲鸞去兩悠悠新恨怯逢秋山色驚心碧江聲入夢流何時弦管簇歸舟蘭棹泊沙頭翠屏峰碧水澄青黛危峰聳翠屏竹枝歌怨月三更别是斷腸聲烟外黃牛峽雲邉白帝城扁舟清夜泊蘋汀倚棹不勝情聚鶴峰鶴信三山逺羅裙片水深髙唐春夢杳難尋惆悵至如今十二峰前月三千里外心紅箋錦字信沉沉腸斷舊香衾望泉峰曉色飄紅豆平沙枕碧流泉聲雲影弄新秋觸處是離愁臉淚橫波淡眉攢片月收佳人嫵笑凖難休半整玉搔頭起雲峰裊娜江邉栁飄颻嶺上雲卸帆回棹楚江濵歸信夜來聞欲拂珊瑚枕先熏翡翠裙江頭含笑去迎君鸞鳯畫成羣栁三變六六真游洞三三物外天九斑麟穩破非烟何處接雲軿昨夜麻姑陪宴又話蓬萊清淺幾回山腳弄雲濤髣佛見金鼇二閬苑年華永嬉逰别是情人間三度見河清一畨碧桃成金母忍將輕摘留宴鼇峰真客紅􅀈間卧吠斜陽方朔敢偷嘗三蕭氏賢夫婦茅家好弟兄羽輪飈駕赴層城髙㑹盡仙卿一曲雲謡為壽倒盡金壺碧酒醺酣爭撼白榆花踏碎九光霞减字朩蘭花歐陽永叔留春不住燕老鶯慵無覔處說似殘春一老應無却少人風和月好辦得黃金須買笑愛惜芳時莫待無花空折枝二傷懷離抱天若有情天亦老此意如何細似輕絲渺似波扁舟岸側楓葉荻花秋索索細想前歡須著人間比夢間三歌檀斂袂繚繞雕梁塵暗起柔潤清圓百琲明珠一線穿櫻唇玉齒天上仙音心下事留住行雲滿坐迷魂酒半醺四去年殘臘曽折梅花相對插人面而今空有花開無處尋天天不逺把酒拈花時發願願得和伊偎雪眠香似舊時晏叔原長亭晚送都似緑窗前日夢小字還家恰應紅燈昨夜花良時易過半鏡流年春欲破往事難忘一枕髙樓到夕陽二留春不住恰似年光無味處滿眼飛英彈指東風太淺情筝絃未穩學得新聲難破恨轉枕花前且伴香紅一夜眠三長楊輦路緑滿當年攜手處試逐春風重到宫花苑樹中芳菲繞遍今日不如前日健酒罷凄凉新恨猶添舊恨長恨别栁耆卿花心栁眼都似游絲常惹絆慵困誰憐繡線金針不喜穿深房密宴爭向好天多聚
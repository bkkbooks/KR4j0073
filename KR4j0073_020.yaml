body:
  text: 花草稡編卷二十明陳耀文輯長調換巢鸞鳳春情史邦卿人若梅嬌正愁橫斷塢夢繞溪橋倚風融漢粉坐月怨秦簫相思因甚到纎腰定知我今無魂可銷佳期晚謾幾度淚痕相照人悄天渺渺花外語香時透郎懷抱暗握荑苗乍嘗櫻顆猶恨侵階芳草天念王昌忒多情換巢鸞鳳教偕老溫柔鄉醉芙蓉一帳春曉春夏兩相期蔣捷聽深深謝家庭館東風對語雙燕似説朝來天上婺星光現金裁花誥紫泥香繡裹藤輿紅茵軟散臘宫輝行鱗厨品至今人羡西湖萬栁如線料月仙當此小停飈輦付與長年教見海心波淺縈雲玉佩五侯門洗雪華桐三春苑慢拍調鶯急鼓催鸞翠隂生院髙陽臺送翠英燕捲晴絲蜂粘落絮天教綰住間愁間裏清明匆匆粉澀紅羞燈搖縹暈茸窗冷語未闌娥影分收好傷情春也難留人也難留芳塵滿目悠悠為問縈雲佩響還繞誰樓别酒才斟從前心事都休飛鶯縱有風吹轉奈舊家苑巳成秋莫思量楊栁灣西且棹吟舟張叔夏古朩迷鴉虛堂起燕歡遊轉眼驚心南圃東窗酸風掃盡芳塵鬢貂飛入平原草最可憐渾是秋隂夜沈沈不信歸魂不到花深吹簫踏葉尋幽去任船依斷石袖裹寒雲老桂懸香珊瑚碎擊無聲故園巳是愁如許撫殘碑却又傷今更關情秋水人家斜照西林慶樂園即韓平原南園戊寅嵗過之有碑石在荆棘中惟存古桂百餘故末句有今之視昔之感春思僧皎如晦紅入桃腮青回栁眼韶華已破三分人不歸來空教草怨王孫平明幾點催花雨夢半闌欹枕初聞問東君因甚將春老却間人東郊十里香塵軟旋安排玉勒整頓雕輪趂取芳時去尋島上紅雲朱衣引馬黃金帶算到頭總是虛名莫間愁一半悲秋一半傷春石州引别恨謝勉仲日腳斜明秋色半隂人意凄楚飛雲特地凝愁做㺯晚來微雨誰家别院舞困幾葉霜紅西風送客聞砧杵鞭馬出都門正潮平洲渚無語匆匆短棹滿載離愁片帆髙舉京洛紅塵因念幾年羈旅淺顰輕笑風月逢迎别來誰畫雙眉嫵回首一銷凝望歸鴻容與慶長春夀戴一軒鐵筆翁有酒如澠便開懷痛飲我歌君拍世事輪雲都莫問秪要顔紅鬢黑鸝燕風清鴛鴦水暖打當生申節薰風來也幾人感戴翁德好是駕海胸襟屠龍手假一笑乾坤窄門外塵濤三百尺不博剡溪一雪緑幕紅圍妙歌細舞且醉三千客問翁年紀廣成千有二百琵琶仙吳興感遇薑堯章雙槳來時有人似舊曲桃根桃葉歌扇輕約飛花蛾眉正竒絶春漸逺汀洲自緑更添了幾聲啼鴂十里揚州三生杜牧前事休説又還是宫燭分煙奈愁裏匆匆換時節都把一襟芳思與空階榆莢千萬縷藏鴉細栁為玉尊起舞回雪想見西出陽關故人初别舜韶新郭子正香滿西風催嵗晚東籬黃花爭吐嫩英細蕊金豔繁粧點髙秋偏富寒地花媒少算自結多情煙雨粧面每年年謝他拒霜相顧寶馬王孫休笑孤芳陶令因誰便思歸去負春何事此恨唯才子登髙能賦千古風流在占定泛重陽芳醑堪吟醉賞何須杏園深處四代好程正伯翠幕東風早蘭窗夢又被鶯聲驚覺起來空對平階弱絮滿庭芳草厭厭來惞懷抱記栁外人家曾到憑畫闌那更春好花好酒好人好春好尚恐闌珊花好又怕飄零難保直饒酒好如澠未抵意中人好相逢盡拚醉倒况人與才情未老又豈關春去春來花愁花惱雙頭蓮陸務觀華髮星星驚壯志成虛此身如寄蕭條病驥向暗裏消盡當年豪氣夢斷故國山川隔重重煙水身萬里舊社凋零青門俊遊誰記盡道錦里繁華歎官間晝永柴荆添睡清愁自醉念此際付與何人心事縱有楚柁吳檣知何時東逝空悵望鱠美菰香秋風又起二風卷征塵堪嘆處青驄正搖金轡客襟貯淚漫萬點如血憑誰持寄佇想艷態幽情壓江南佳麗春正媚怎忍長亭匆匆頓分連理目斷淡日平蕪煙濃樹逺微茫如薺悲歡夢裏奈倦客又是關河千里最苦唱徹驪歌遲留無計何限事待與丁寧行時巳醉御帶花永叔青春何處風光好帝里偏愛元夕萬重繒綵構一屏峰嶺半空金碧寶檠銀釭耀絳幕龍虎騰擲沙堤逺雕輪繡轂爭走五王宅雍容熙熙作晝會樂府神姬海洞仙客拽香搖翠稱執手行歌錦街天陌月淡寒輕漸向曉漏聲寂寂當年少狂心未巳不醉怎歸得萬年歡元宵胡浩然燈月交光漸輕風布暖先到南國羅綺嬌容十里絳紗籠燭花豔驚郎醉目有多少佳人如玉春衫袂整整齊齊內家新樣粧束歡情未足更闌謾勾牽舊恨縈亂心曲悵望歸期應是紫姑頻卜暗想雙眉對蹙斷絃待鸞膠重續休迷戀野草間花鳳簫人在金谷春思史邦卿兩袖梅風謝橋邉岸痕猶帶隂雪過了匆匆燈市草根青發燕子春愁未醒悮幾處芳音遼絶煙溪上采緑人歸定應愁沁花骨非干厚情易歇奈燕臺句老難道離别小徑吹衣曾記故里風物多少驚心舊事第一是侵階羅襪如今但栁髮晞春夜來和露梳月前調梅苑天氣嚴凝乍寒梅數枝嶺上開拆傅粉凝脂疑是素娥粧拭先報陽和信息更雪月交光一色因追念往日歡遊共君攜手同摘别來又經嵗隔奈髙樓夢斷無計尋覔冷艷寒容啼雨恨煙愁濕似向人前淚滴怎不使伊家思憶惟只恐寂寞空枝又隨昨夜羌笛王和父雅出羣芳占春前信息臘後風光野岸郵亭繁似萬點輕霜清淺溪流倒影更黯淡月色籠香渾疑是姑射氷姿夀陽粉面初粧多情對景易感况淮天庾嶺迢遞相望愁聽龍吟悽絶畫角悲涼念昔因誰醉賞向此際空惱危腸終須待結實恁時佳味堪嘗解語花元宵周美成風銷焰蠟露浥烘爐花市光相射桂華流瓦纎雲散耿耿素娥欲下衣裳淡雅看楚女纎腰一把簫鼓喧人影參差滿路飄香麝因念都城放夜望千門如畫嬉笑遊冶鈿車羅帕相逢處自有暗塵隨馬年光是也惟只見舊情衰謝清漏移飛蓋歸來從舞休歌罷二行歌趂月喚酒延秋多買鶯鶯笑蕊枝嬌小渾無奈一掬醉鄉懷抱籌花鬬草幾曽放好春間了芳意闌可惜香心一夜酸風掃海上仙山縹眇問玉環何事苦無分曉舊愁空杳藍橋路深掩半庭斜照餘情暗惱都緣是那時年少驚回夢懶説相思畢竟如何老杏花天三月二十七姪夀姑梅坡婺星呈瑞對春餘幾許日臨三九正屬我姑初度旦恱設當年門右緑鬢猶新紅顔未改真月宫仙友柏舟節義富而榮貴長守况有詵桂青春潛心黃卷指日功名就女郎乘龍全四德未老得間仁夀天命方知嵗飢常賑隂德還多有麻姑王母年年同宴春酒惜寒梅復雅歌詞看盡千花愛寒梅暗與雪期霜約雅態香肌逈有天然淡泊五侯園囿恣遊樂憑欄處重開繡幕秦娥粧罷遙相縱豔闕洛天涯再見素萼似凝然向人玉容寂寞江上飄零怎把芳心付託那堪風雨夜來惡便減動一分瘦削直須沈醉尤香殢雲莫待改落慶春澤劉叔安燈火烘春樓臺浸月良宵一刻千金錦步成蓮彩雲簇仗難尋蓬壺影動星毬轉映兩行寶珥瑶簮恣嬉遊玉漏聲催未歇芳心笙歌十里誇張地記年時行樂憔悴而今客裏情懷伴人間笑間吟小桃未靜劉郎老把相思細寫瑶琴怕歸來紅紫欺風三徑成隂夀樓春尋春服感念史邦卿裁春衫尋芳記金刀素手同在晴窗幾度因風殘絮照舞斜陽誰念我今無裳自少年消磨疏狂但聽雨挑燈欹牀病酒多夢睡時粧飛花去良宵長有絲闌舊曲金譜新腔最恨湘雲人散楚蘭魂傷身是客愁為鄉算玉簫猶逢韋郎近寒食人家相思未忘蘋藻香繞佛閣周美成暗塵四斂樓觀逈出髙映孤館清漏將短厭聞夜久籖聲動書幔桂華又滿間步露草偏愛幽逺花氣清婉望中迤邐城隂渡河岸倦客最蕭索醉倚斜陽穿栁線還似汴堤虹梁橫水面看浪颭春燈舟下如箭此行重見歎故友難逢羈思空亂兩眉愁向誰舒展傳枝花栁耆卿平生自負風流才調口兒裏道知張鄭趙唱新詞改難令總知顛倒解刷扮能㑟嗽表裏都峭每遇著飲席歌筵人人盡道可惜許老了閻羅大伯闕但不須煩惱遇良辰當美景追歡買笑剩活取百十年只恁厮好若限滿鬼使來追待倩箇掩通著到引駕行秋恨栁耆卿虹收殘雨蟬嘶敗栁長堤暮背都門動銷黯西風片帆輕舉愁覩泛畫鷁翩翩靈鼉隱隱下前浦忍回首佳人漸逺想髙城隔煙樹幾許秦樓永晝謝閣連宵竒遇算贈笑千金酬歌百琲盡成輕負南顧念吳邦越國風煙蕭索在何處獨自箇千山萬水指天涯路渡江雲春景周美成晴嵐低楚甸暖回鴈翼陳勢起平沙驟驚春在眼借問何時委曲到山家塗香暈色盛粉飾爭作妍華千萬絲陌頭楊栁漸漸可藏鴉堪嗟清江東注畫舸西流指長安日下愁宴闌風翻旗尾潮濺烏紗今朝正對初弦月傍水驛深艤蒹葭沈恨處時時自剔燈花賦荷花盧申之錦雲香滿鏡岸巾橫笛浮醉一舟輕别愁縈短鬢晚涼池閣此地忽逢迎柄圎欹緑倚風流還恁娉婷憑畫欄嫣然輸笑無語寄心情盈盈露華勻玉日影酣紅記晚粧慵整還暗驚人間離合羞對池萍三年一覺西湖夢又等間金井秋聲銷魂久夜深月冷風清集曲名陳夢協瑞雲濃縹眇弦月當庭天香滿院玉女傳言把真珠簾捲擁鵲橋仙引江城子擬醉蓬萊宴吹紫玉簫唱黃金縷按拍聲聲慢晝錦堂前傾杯為夀祝快活年應天長逺喜似娘兒解稱人心願夢蘭蕙芳種宜男草丹鳳吟非晚更步蟾宫宴瓊林日漢宫春曉絳都春上元丁仙現融和又報乍瑞靄霽色皇州春早翠幰競飛玉勒爭馳都門道鼇山結綵蓬萊島向晚色雙龍銜照絳綃樓上彤芝蓋底仰瞻天表縹眇風傳帝樂慶三殿共賞羣仙同到迤邐御香飄滿人間聞嬉笑須臾一點星毬小漸隱隱鳴梢聲杳遊人月下歸來洞天未曉蔣竹山春愁怎畫正鶯背帶緑酴醿花謝細雨院深淡月廊斜重簾挂歸時記約燒燈夜早拆盡秋千紅架縱然歸近風光又是翠隂初夏姹婭顰青泫白恨玉佩罷舞芳塵凝榭幾擬倩人付與香蘭秋羅帕知他墮策斜攏馬在底處垂楊樓下無言暗擁嬌鬟鳳叉溜也别張子儀趙德莊平生相遇算未有笑語閩山佳處舊日文章如今風味渾如許眼前都是蓬萊路但莫道有人曽住異時天上種種風流待君如故此自君家舊物看九萬清風為君掀舉舉上青雲却憶梅花如舊否故人衰病今無緒只種得梅花盈圃待君一過山家共斟露醑為清華內子夀吳君特香深霧暖正人在錦瑟年華深院舊日漢宫分得紅蘭滋吳苑臨池羞落梅花片㺯水月初勻粧面紫煙籠處雙鸞共跨洞簫低按歌管紅圍翠袖凍雲外似覺東風先轉繡畔晝遲花底天寬春無限仙郎嬌馬瓊林宴待捲上珠簾教看更傳鶯入新年寶叉夢燕清明劉叔安和風乍扇又還是去年清明重到喜見燕子巧説千般如人道墻頭陌上青梅小是處有間花芳草偶然思想前歡醉賞牡丹時候當此三春媚景好連宵恣樂情懷歌嘯縱有珍珠難買紅顔長年少從他烏免茫茫走更莫待花殘鶯老恁時歡笑休把萬金換了梅花朱淑真寒隂漸曉報驛使探春南枝開早粉蕊㺯香芳臉凝酥瓊枝小雪天分外精神好向白玉堂前應到化工不管朱門閉也暗傳音耗輕渺盈盈笑靨稱嬌面愛學宫粧新巧幾度醉吟獨倚欄干黃昏後月籠疏影橫斜照更莫待單于吹老便須折取歸來膽瓶插了夜合花賦笛史邦卿冷截龍腰偷拿鸞爪楚山長鎖秋雲梅華未落年年怨入江城千嶂碧一聲清杜人間兒女簫笙共滄涼處琵琶湓浦長嘯蘇門當時低度西鄰天淡闌干欲暮曽賦髙情子期老矣不堪滯酒重聽纎手靜七星明有新聲應更魂驚夢回人世寥寥夜月空照天津二栁鎖鶯魂花翻蝶夢自知愁染潘郎輕衫未攬猶將淚點偷藏念前事怯流光早春窺酥雨池塘向銷凝裏梅開半面清滿徐妝風絲一寸柔腸曽在歌邉惹恨燭底縈香芳機瑞錦如何未織鴛鴦醉扶人月依墻是當初誰敢疏狂把間言語花房夜久各自思量壺中天夀陳碧山錦溪騎鯨直上問姮娥何日天生英傑笑下瓊樓還報道甫近迎長佳節萬里無雲一天如水擁出新團月正當此夜文星飛下天闕蟾苑元有髙枝至今猶待自是無心折只愛林泉供笑傲吟出陽春白雪冠玉精神希夷仙種祕受長生訣蓬壺不老待看蘭玉英發壬寅自夀劉後村比如去嵗前年今朝差覺門庭靜玉軸錦標無一首知道先生逺佞假使文殊攜諸菩薩來問維摩病無花堪散亦無香積齋襯回首雪浪驚心黃茅過頂瘴毒如炊甑山鬼海神俱長者饒得書生窮命不慕飛仙不貪成佛不要鑽天令年年今日白頭母子家慶念奴嬌一名酹江月大江東去赤壁詞百字令百字謡東坡大江東去浪淘盡千古風流人物故壘西邉人道是三國周郎赤壁亂石穿空驚濤拍岸捲起千堆雪江山如畫一時多少豪傑遙想公瑾當年小喬初嫁了雄姿英發羽扇綸巾談笑間檣櫓灰飛煙滅故國神遊多情應笑我早生華髮人生如夢一樽還酹江月東坡赤壁懷古之詞曽經御覽重加歎賞賜名酹江月見苕溪漁隱吹劍續録云東坡在玉堂日有幕士善歌因問我詞比栁耆卿詞何如對曰栁即中詞只好十七八女孩兒按執紅牙拍歌楊栁岸曉風殘月學士詞須關西大漢執鐵綽板唱大江東去公為之絶倒吹劍録云大江東去詞二江三人二國二生二故二如二千字以東坡則可他人固不可然語意到處他字不可代雖重無害也今人看人文字未論其大體如何先且指點重字中秋憑髙眺逺見長空萬里雲無留迹桂魄飛來光射處冷浸一天秋碧玉宇瓊樓乘鸞來去人在清涼國江山如畫望中煙樹厯厯我醉拍手狂歌舉杯邀月對影成三客起舞徘徊風露下今夕不知何夕便欲乘風翻然歸去何用騎鵬翼水晶宫裏一聲吹斷橫笛前調黃魯直斷虹霽雨淨秋空山染修眉新緑桂影扶疏誰便道今夕清輝不足萬里青天嫦娥何處駕此一輪玉寒光零亂為誰偏照醽渌年少隨我追涼晚尋幽徑繞張園森木醉倒金荷家萬里難得樽前相屬老子平生江南江北最愛臨風曲孫郎微笑坐來聲噴霜竹雅詞御製雅懷素態向間中天與風流標格緑鎖窗前湘簟展終日風清人寂玉子聲乾紋楸色靜星點連環直跳丸日月算應局上銷得全似洛浦斜暉寒鴉遊鷺亂點沙汀漬妙算神機須信道國手都無勍敵玳席歡餘藝堂香暖贏取專良夕桃源歸路爛柯應笑凡客送王長卿赴河間司録趙承之舊遊何處記金湯形勝蓬瀛佳麗緑水芙蓉元帥與賔僚風流濟濟萬栁亭邉雅歌堂上醉倒春風裏十年一夢覺來煙水千里惆悵送子重遊南樓依舊否朱欄誰倚要識當時惟是有明月曽陪珠履量減杯中雪添頭上甚矣吾衰矣酒徒相問為言憔悴如此春恨沈公述杏花過雨漸殘紅零落胭脂顔色流水飄香人漸逺難託春心脈脈恨别王孫墻隂目斷手把青梅摘金鞍何處緑楊依舊南陌消散雲雨須臾多情因甚有輕離輕折燕語千般爭解説些子伊家消息厚約深盟除非重見見了方端的而今無奈寸腸千恨堆積中秋燕客葉少藴洞庭波冷望氷輪初轉滄海沈沈萬頃孤光雲陳卷長笛吹破層隂洶湧三江銀濤無際遙帶五湖深酒闌歌罷至今鼉怒龍吟回首江海平生漂流容易散佳會難尋縹眇髙城風露爽獨倚危檻重臨醉倒清樽嫦娥應笑猶有向來心廣寒宫殿為余聊借瓊林程書舟秋風秋雨正黃昏供斷一窗愁絶帶減衣寬誰念我難忍重城離别轉枕褰幃挑燈整被總是相思切知他别後負人多少風月不是怨極愁濃只愁重見了相思難説料得朝來魂夢裏不管飛來蝴蝶排悶人間寄愁天上終有歸時節如今無奈亂雲依舊千疊秋月李漢老素光練淨映秋山隱隱修眉橫緑鳷鵲樓髙天似水碧瓦寒生銀粟萬丈斜暉奔雲湧霧飛過盧同屋更無塵氣滿庭風碎梧竹誰念鶴髮仙翁當年曾共賞紫巖飛瀑對影三人聊痛飲一洗離愁千斛斗轉參橫翩然歸去萬里騎黃鵠滿天霜曉呌雲吹斷橫玉前調曾公衮片帆暮落正前村梅蕊愁人如雪東陌西溪長記得踈影橫斜時節六出氷姿玉人微步笑裏輕輕折蘭房同醉暗香曽共私竊回頭萬水千山一枝重見處離腸千結料想臨鸞消瘦損時把啼紅偷浥怎得伊來許多幽恨共撚青梢説如今千里斷腸空對明月賞芍藥曾純甫人生行樂算一春歡賞都來幾日緑暗紅稀春巳去贏得星星頭白醉裏狂歌花前起舞拚罰金杯百淋漓宫錦忍辜妖豔姿色須信殿得春光秪愁花謝又作經年别嫩紫嬌紅還解語應為主人留客月落烏啼酒闌燭暗離緒傷吳越竹西歌吹不堪老去重憶送淮漕錢處和曽谹父繡衣直指問凌風一笑翩然何許詔出層霄持漢節千里秋風淮浦鑑逺江山竹西歌吹曾被腥膻汚須君椽筆為渠一洗塵土休厭共倒金荷翠眉重為唱渭城朝雨看即揚鞭歸騎穩還指鬱蔥深處寶帶兼金華韉新繡直上雲霄去回頭莫忘玉霄今夜風露梅花朱希真見梅驚笑問經年何處收香藏白似語如愁却問我何苦紅塵久客觀裏栽桃仙家種杏到處成疏隔千林無伴淡然獨傲霜雪且與管領春回孤標爭肯接雄蜂雌蝶豈是無情知受了多少凄涼風月寄驛人遙和羮心在忍使芳塵歇東風寂寞可人誰為攀折前調邵公濟天然瀟灑盡人間無物堪齊標格只與姮娥為伴侣方顯一家顔色好是多情一年一度首作東君客竹籬茅舍典刑别是清白惆悵玉杵無憑藍橋人去空鎖神仙宅今日天涯慙馬上忽見輕盈氷魄恰似當年溫柔鄉裏曉看新粧額臨風三嗅挽條不忍空摘和東坡韻苕溪漁隱炎精中否歎人材委靡都無英物戎馬長驅三犯闕誰作長城堅壁萬里奔騰兩宫幽隔此恨何時雪草廬三顧豈無髙卧賢傑天心眷我中興吾皇神武踵曾孫周發海嶽封疆俱效順仇敵會須灰滅翠羽南巡叩閽無路徒有衝冠髮孤忠耿耿劍芒冷浸秋月野史云有稱中興野人和東坡詞題吳江橋上車駕巡師江表過而覩之詔物色其人不復見矣觀潮陸永仲維之逺山一帶溯晴空極目天涯浮白楓落鴉翻談笑處不覺雲濤橫席酒病方蘇睡魔猶殢一掃無留迹吳帆趙棹恍然飛上空碧長記草賦梁園凌雲筆勢倒三江秋色對此驚心空悵望老作紅塵間客别浦煙平小樓人散回首千波寂西風歸路為君重噴霜笛髙祖見之嘉賞召見辭不赴中秋月范元卿尋常三五問今夕何夕嬋娟都勝天濶雲收崩浪靜深碧琉璃千頃銀漢無聲氷輪直上桂濕扶疏影綸巾玉麈庾樓無限清興誰念江海飄零不堪回首驚鵲南枝冷萬點蒼山何處是修竹吾廬三徑香霧雲鬟清輝玉臂醉了愁重醒參橫斗轉轆轤聲斷金井項王廟鮑魚腥斷楚將軍鞭虎驅龍而起空費咸陽三月火鑄就金刀神器垓下兵稀隂陵道狹月暗雲如壘楚歌哄發山川都姓劉矣悲泣呼醒虞姬為伊死别血刃飛花碎霸業休休騅不逝英氣烏江流水古廟頽垣斜陽紅樹遺恨鴉聲裏興亡休問髙陵秋草空翠月韓子蒼海天向晚漸霞收餘綺波澄微緑朩落山髙真箇是一雨秋容新沐喚起嫦娥撩雲撥霧駕此一輪玉桂華疏淡廣寒誰伴幽獨不見弄玉吹簫尊前空對此清光堪掬霧鬢風鬟何處問雲雨巫山六六珠斗斕斒銀河清淺影轉西樓曲此情誰會倚風三㺯橫竹前調石孝友悶紅顰翠惜流年忍對豔陽時節白玉樓成人去後兩地音塵都絶鸞鑑分飛夢雲零亂歡意今衰颯墨痕黯淡憶曾題遍紅葉須知後約難憑臂嚙鬟剪也只成虛設滿眼凄涼無限事付與丁香愁結欲語情酸臨岐步懶悵望蘭舟發出門誰伴淚昏一片孤月丙午螺川趙介之飄流蹤迹趂春來還趂春光歸去九十韶華能幾許著意留他不住趲葉催花摧紅長翠多少風和雨蜂間蝶怨盡憑枝上鶯語歸棹去去難留桃花浪暖緑漲迷津浦回首重城天樣逺人在重城深處惜别愁分凝眸有淚總寄陽關句不堪腸斷恨隨江水東注和李漢老陸子逸耆舊續聞黃橙紫蟹映金壺瀲灩新醅浮緑共賞西樓今夜月極目雲無一粟揮麈髙談倚欄長嘯下視鱗鱗屋轟然何處瑞龍聲噴蘄竹何况露白風清銀河徹漢髣佛如懸瀑此景古今如有價豈惜明珠千斛灝氣盈襟冷風入袖只欲騎鴻鵠廣寒宫殿看人顔似氷玉秋思張仲宗江天雨霽正露荷擎翠風槐搖緑試問秦樓今夜裏秋到闌干幾曲笑撚黃花重題紅葉無奈歸期促暮雲千里桂華初綻寒玉有誰伴我凄涼除非分付與杯中醽醁水本無情山又逺回首煙波雲朩夢繞西園魂飛南浦自古情難足舊遊何處落霞空映孤鶩離思張安國星沙初下望重湖逺水長雲漠漠一葉扁舟誰念我今日天涯飄泊平楚南來大江東去處處風波惡吳中何地滿懷俱是離索長記送我行時緑波亭上泣透青羅薄檣燕低飛人去後依舊湘城簾幕不盡山川無窮煙浪辜負秦樓約漁歌聲斷為君雙淚傾落前調楊廷秀老夫歸去有三徑足可長拖衫袖一道官銜清徹骨别有監臨主守主守清風監臨明月兼管栽花栁登山臨水作詩三首兩首休説白日升天莫誇金印斗大懸雙肘且説廬陵新盛事三箇間人眉夀揀罷軍員歸農押録致政誠齋叟只愁醉殺螺江門外私酒張功甫東吳名勝有髙樓直在浮雲齊處十二闌干邀逺望厯厯斜陽煙樹香徑人稀屧廊山繞往事今何許一天和氣為誰吹散疏雨知是蘭省星郎朱輪森戟與風光為主暇日登攜多雅致容我追隨臨賦小宴重開晚寒初徑還下危梯去燭華紅墜瑞堂猶按歌舞春恨辛幼安野棠花落又匆匆過了清明時節剗地東風欺客夢一枕銀屏寒怯曲岸持觴垂楊立馬此地曽經别樓空人去舊遊飛燕能説聞道綺陌東頭行人曽見簾底纎纎月舊恨春江流不盡新恨雲山千疉料得明朝尊前重見鏡裏花難折也應驚問近來多少華髮戊午生日作鄭中卿嗟來咄去被天公把做小兒調戲蹀躞龍庭歸未久還促炎州行李不半年間北陲南僥一萬三千里征衫著破著衫人可知矣休問海角天涯黃蕉丹荔自足供甘旨泛緑依紅無箇事時舞斑衣而巳救蟻藤橋養魚盆沼是亦經綸耳伊周安在且須學老萊子中秋呈徐叔至謝勉仲霽天湛碧正新涼風露氷壺清徹河漢無聲光練練湧出銀蟾孤絶巖桂香飄井梧影轉冷浸宫袍潔西廂往事一簾輕夢悽切腸斷楚峽雲歸尊前無緒知有愁如髮此夕嫦娥應也恨冷落瓊樓金闕禁漏迢迢邉鴻杳杳幽意憑誰決闌干星斗落梅三㺯初闋曉起觀落梅李子大麗譙吹角漸疏星明淡簾篩殘月嫋嫋霜飈欺翠袖飛下一庭香雪半面粧新回風舞困此况真竒絶桄榔林裏蘇仙偏感華髮休怨時暫飄零玉堂清夢不惹間蜂蝶好似王家叢竹畔乘興山隂時節剪水無情閬風歸去忍使芳心歇和羮有待恁時身到天闕吳興荷花薑堯章閙紅一舸記來時長與鴛鴦為侣三十六陂人未到水佩風裳無數翠葉吹涼玉容銷酒更灑菰蒲雨嫣然搖動冷香飛上詩句日暮青蓋亭亭情人不見爭忍凌波去只恐舞衣寒易落愁入西風南浦髙栁垂隂老魚吹浪留我花間住田田多少幾回沙際歸路菊花劉潛夫老夫白首尚兒嬉廢圃一畨料理餐飲落英并墜露重把離騷拈起冷豔幽香輕黃淡白占斷西風裏飛來雙蝶繞叢欲去還止嘗試銓次羣芳梅花差可伯仲之間耳佛説諸天金色界未必莊嚴如此尚友靈均定交元亮結好天隨子籬邉坡下一杯聊泛霜蕊茉莉劉叔安調氷弄雪想花神清夢徘徊南土一夏天香收不起付與蕊仙無語秀入精神涼生肌骨銷盡人間暑稼軒愁絶惜花還勝兒女長記歌酒闌珊開時向晚笑浥金莖露月浸闌干天似水誰伴秋娘窗户困殢雲鬟醉欹風帽總是牽情處返魂何在玉川風味如許梅花吳毅甫曉來窗外正南枝初放兩花三蘂千古春風頭上立羞退穠桃繁李姑射神遊夀陽粧褪色界塵都洗竹扉松户平生所寄聊耳堪笑強説和羮此君心事指髙山流水隴驛凄涼却怕被哀角城頭吹起此處關情為他凝佇淡月清霜裏巡簷何事嵗寒相誓而巳武夷詠梅劉靜甫武夷山志亂山深處見寒梅一朵皎然如雪的皪妍姿羞半吐斜映小窗幽絶玉染香腮酥凝冷艷容態天然别故人雖逺對花誰肯輕折疑是姑射神仙幔亭宴罷迤邐停瑶節愛此溪山供秀潤飽玩洞天風月萬石叢中百花頭上誰與爭髙潔粗桃俗李不須連夜催發送張明之赴京西幕劉叔擬艅艎東下望西江千里蒼茫煙水試問襄州何處是雉堞連雲天際叔子殘碑卧龍陳迹遺恨斜陽裏後來人物如君瓌偉能幾其肯為我來耶河陽下士正自強人意勿謂時平無事也便以言兵為諱眼底山河樓頭鼓角都是英雄淚功名機會要須間暇先備感懷呈洪守吳山青處悵長安路斷黃塵如霧荆楚西來行塹逺北過淮堧嚴扈九塞貔貅三關虎豹空作陪京固天髙難呌若為得訴忠語追念江左英雄中興事業枉被姦臣誤不見翠華移蹕處枉負吾皇神武擊楫憑誰問籌無計何日寬憂顧倚笻長嘆滿懷清淚如雨長沙趙帥席上作西風何事為行人掃蕩煩襟如洗垂漲蒸瀾都卷盡一片瀟湘清泚酒病驚秋詩愁入鬢對景人千里楚宫故事一時分付流水江上買取扁舟排雲湧浪直過金泥尾歸去江南邱壑處不用來尋月姊風露杯深芙蓉裳冷笑傲煙霞裏草廬如舊卧龍知為誰起前調趙龍圖吾今老矣好歸來了取青山活計甲子一周餘年紀諳盡人間物理婚嫁隨緣田園粗給知足寧慚愧心田安逸自然綽有餘地還是初度來臨葛巾野服不減貂蟬貴門外煙波風浪惡我巳收心無纍弟勸兄酬兒歌女舞樂得醺醺醉滿堂一笑大家百二十嵗江潮吳琚玉虹遙挂望青山隱隱有如一抹忽覺天風吹海立好似春霆初發白馬凌空瓊鼇駕水日夜朝天闕飛龍舞鳳鬱蔥環拱吳越此景天下應無東南形勝偉觀真竒絶好是吳兒飛彩幟蹴起一江秋雪黃屋天臨水犀雲擁看擊中流楫晚來波靜海門飛上明月金陵杜伯髙江山如此是天開萬古東南王氣一自髯孫橫短策坐使英雄鵲起玉樹聲消金蓮影散多少傷心事千年遼鶴併疑城郭非是當日萬駟雲屯潮生潮落處石頭孤峙人笑禇淵今齒冷只有袁公不死斜日荒煙神州何在欲墮新亭淚元龍老矣世間何限餘子菊王雙溪小粧朱檻護秋英千點金鈿如簇黃葉白蘋朝露冷只有孤芳幽馥華髮蒼頭宦情羇思來伴花幽獨巡簷無語清愁何啻千斛因念愛酒淵明東籬雅意千載無人續身在花邉須一醉小覆杯中醽醁過了重陽捻枝嗅蕊休嘆年華速明年春到陳根更有新緑雪文及翁沒巴沒鼻霎時間做出漫天漫地不論髙低并小大平白都教一例鼓弄滕六招邀巽二一恁施威勢識他不破至今道是祥瑞最是鵝鴨池邉三更半夜誤了吳元濟東郭先生都不管挨上門兒穩睡一夜東風三竿紅日萬事隨流水東皇笑道山河元是我的草木子云此譏賈似道之狹量也錢塘遺事作陳藏一前調金主亮天丁震怒掀翻銀海散亂珠箔六出竒花飛滚滚平填了山中丘壑皓虎顛狂素麟猖獗掣斷真珠索玉龍酣戰鱗甲滿天飄落誰念萬里關山征夫僵立縞帶沾旗腳色映戈矛光搖劍戟殺氣橫戎幕貔虎豪雄偏裨真勇非與談兵略須拚一醉看取碧空寥廓都城元夜金劉雲震景龍天氣正餘寒料峭簾幕萬斛金蓮光不夜香滿雲間樓閣金鐙頻敲繡簾髙揭應為黃昏約霜娥無恙喚人依舊飄泊却恨烏無情把人青鬢白恁星星却千古繁華行樂地誰笑誰歌誰酌北山尊罍東山絲竹夢裏揚州鶴客窗無味故人誰念蕭索前調張孝純朝野遺記疏眉秀目依舊是宣和裝束飛步盈盈姿媚巧舉止知非凡俗宋室宗姬秦王幼女曽嫁欽慈族干戈浩蕩事隨天地翻覆一笑邂逅相逢勸人滿飲旋旋吹橫竹流落天涯俱是客何必平生相熟舊日榮華如今憔悴付與杯中醁興亡休問為伊且盡船玉和陳元載中秋小集劉一止燕臺暮集對秋容凄緊松隂羃羃徙倚欄邉臨翠壑千頃風煙橫出坐待氷輪天空雲散一色如蒼璧姮娥有意為誰來赴今夕身世如許飄流佳時輕過了他年空憶我輩情鍾端未愧昔日蘭亭陳迹坐上何人驪歌凄斷語别還應惜有心紅燭替人珠淚頻滴諸葛廟姚卞小舟橫楫看雲峯髙擁千重蒼碧白帝城中冠蓋換田野猶談玄德三顧頻煩兩朝開濟何處尋遺迹江堆石陳至今神擁沙磧追憶當年諸葛幅巾髙卧抱圖王竒䇿見説廟堂今尚在中有參天松柏據蜀英豪吞吳遺恨俯仰成今昔空令豪俊浩歌揮涕橫臆驛中言别友人文天祥水天空濶恨東風不借世間英物蜀鳥吳花殘照裏忍見荒城頽壁銅雀春情金人秋淚此恨憑誰説堂堂劍氣斗牛空認竒傑那信江海餘生南行萬里扁舟齊發正為鷗盟留醉眼細看濤生雲滅睨柱吞嬴回旗走懿千古衝冠髮伴人無寐秦淮應是孤月德祐乙亥時事已非太學諸生為此詞以嘆世意各有所屬半堤花雨對芳辰消遣無奈情緒春色尚堪描畫在萬紫千紅塵土衆宫女行鵑促歸期朝士去鶯收佞舌臺官默燕作留人語太學上書繞闌紅藥韶華留此孤主只陳宜中在真箇恨殺東風賈似道幾畨過了不似今畨苦樂事賞心磨滅盡忽見飛書傳羽北軍至湖水湖煙峯南峯北總是堪傷處新塘楊栁賈妾名小腰猶自歌舞春夢梁隆吉一場春夢待從頭説與傍人聽著罨畫溪山紅錦幛舞燕歌鶯臺閣碧海傾春黃金買夜猶道看承薄雕香剪玉今生今世盟約須信歡樂過情間嗔冷妬一陳東風惡韻白嬌紅消瘦盡江北江南零落骨朽心存恩深緣淺忍把羅衣著蓬萊何處雲濤天際冥漠滕王閣髙信卿間登髙閣嘆興亡滿目風煙塵土畫棟朱簾當日事不見朝雲暮雨秋水長天落霞孤鶩千載名如故長空淡淡去鴻嘹唳誰數遙憶才子當年如椽健筆坐上題佳句物換星移知幾度遺恨西山南浦往事悠悠昔人安在何處尋歌舞長江東注為誰流盡今古武昌懷古漢江北瀉下長淮洗盡胸中今古樓櫓橫波征鴈逺誰見魚龍夜舞鸚鵡洲雲鳳凰池月付與沙頭鷺功名何處年年惟見春絮非不豪似周瑜壯如黃祖亦逐秋風度野草間花無限數渺在西山南浦黃鶴樓人赤烏年事江漢亭前路浮萍無據水天幾度朝暮登石頭城薩天錫石頭城上望天低吳楚眼空無物指點六朝形勝地惟有青山如壁蔽日旌旗連雲檣櫓白骨紛如雪一江南北消磨多少豪傑寂寞避暑離宫東風輦路芳草年年發落日無人松徑裏鬼火髙低明滅歌舞尊前繁華鏡裏暗換青青髮傷心千古秦淮一片明月夏日避暑僧仲殊故園避暑愛繁音翳日流霞供酌竹影篩金泉漱玉紅映薇花簾箔素質生風香肌無汗繡扇長間却雙鸞栖處緑雲時下風籜吹斷舞影歌聲陽臺人去有當年池閣佩結蘭英凝念久言語精神依約燕别雕梁鴻歸紫塞音信憑誰託爭知好景為君長是蕭索荷花水楓葉下乍湖光清淺涼生商素西帝宸遊羅翠蓋擁出三千宫女絳綵嬌春鉛華掩晝占斷鴛鴦浦歌聲搖曳浣沙人在何處别岸孤裊一枝廣寒宫殿冷落棲愁苦雪豔氷肌羞淡泊偷把胭脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏為誰長恁凝佇重陽僧仲璋消磨九日算年年惟有黃花白酒把酒簮花能有幾七十光隂回首人恨難期酒杯有限花色應如舊花濃酒釅問君著甚消受彭澤千古英雄有花能折有酒能傾否萬事悠悠輸一醉花酒休教離手明月西風闌珊酒盡憔悴花枝瘦酒腸花眼正宜年少時候春情李易安蕭條庭院有斜風細雨重門須閉寵栁嬌花寒食近種種惱人天氣險韻詩成扶頭酒醒别是間滋味征鴻過盡萬千心事難寄樓上幾日春寒簾垂四面玉欄干慵倚被冷香銷新夢覺不許愁人不起清露晨流新桐初引多少遊春意日髙煙斂更看今日晴未雪朱淑真鵝毛細剪縱輕拋密灑一時堆積斜倚東風渾漫漫頃刻也須盈尺玉作樓臺鉛鎔天地不見遙岑碧佳人作戲碎揉些子相擲爭奈好景難留風僝雨僽打碎光凝色縱有十分輕妙態誰似舊時憐惜擔閣梁吟寂寞楚舞笑揑獅兒隻梅花依舊嵗寒松竹三益酹江月括東坡赤壁賦林正大泛舟赤壁正風徐波靜舉尊屬客渺渺豫懷天一望萬頃憑虛獨立桂槳空明洞簫聲徹怨慕還悽惻星稀月淡江山依舊陳迹因念釃酒臨江賦詩橫槊好在今安適謾寄蜉蝣天地爾瞬目盈虛消息江上清風山間明月與子歡無極翻然一笑不知東方既白括後赤壁賦雪堂間步過臨皋霜靜晚林朩落月白風清如此夜與客行歌相答網舉淞鱸手攜斗酒赤壁重尋約悲歌長嘯劃然聲動寥廓試問日月幾何江流山色今日應如昨履遍巉巖風露冷水湧怒濤驚躍一葉中流聽其所止適有孤飛鶴橫江東下問豫赤壁遊樂前調范成大浮生有幾嘆歡娛常少憂愁相屬富貴功名皆由命何必區區僕僕燕蝠塵中雞蟲影裏見了還追逐山間林下幾人真箇幽獨誰似當日嚴君故人龍衮獨抱羊裘宿試把漁竿都掉了百種千般拘束兩岸煙林半溪山影此處無榮辱荒臺遺像至今嗟咏不足賀楊誠齋羅永年郎星錦帳忽翩然歸訪南溪孤鶩前日登髙誰信道夀酒重浮茰菊風露杯寒芙蓉帳冷笑受長生籙廣寒宫殿桂華應已新續不用翠倚紅圍舞裙歌袖共理稱觴曲只把文章千古事留伴平生幽獨但使明年鬢青長在萱草春風緑諸郎如許轉頭百事都足前調沈剛孫我來訪古把塵襟都付一聲鳴櫓笑把瑶觴波浩蕩却憶長鯨吞吐坐挹髙風骨清毛冷不作囂塵語客星何在謾留遺像江渚試問澤畔羊裘當時何事笑禹弇宫武金印貂蟬誰不愛只為汗顔巢許幸有髙臺較他箕頴未肯輕輸與酒酣長嘯翩然誰共飛舉大江西上曲寄李實夫提刑戴式之大江西上鬱孤臺八境人間圖畫地湧千峯搖翠浪兩𣲖玉虹如瀉彈壓江山品題風月四海今王謝風流人物如公一世雄也一片憂國丹心彈絲吹笛未必能陶寫西北風塵方澒洞宰相間歸緑野月斧爭鳴風斤運巧不用修亭榭紫樞黃閣要公整頓天下壺中天即念奴嬌曽覿素飈漾碧看天衢穩送一輪明月翠水瀛壺人不到比似世間秋别玉手瑶笙一時同色小按霓裳疉天津橋上有人偷記新闋當日誰幻銀橋阿瞞兒戲一笑成癡絶肯信羣仙髙宴處移下水晶宫闕雲海塵清山河影滿桂冷吹香雪何勞玉斧金甌千古無缺請太上太后逰聚景園淳熙六年張掄洞天深處賞嬌紅輕玉髙張雲幕國豔天香相競秀瓊苑風光如昨露洗妖妍風傳馥郁雲雨巫山約春光濃如酒五雲臺榭樓閣聖代道洽功成一塵不動四境無鳴柝屢有豐年天助順基業增隆山嶽兩世明君千秋萬嵗永享升平樂東堂呈瑞更無一片花落無俗念同念奴嬌丘長春春遊浩蕩是年年寒食梨花時節白錦無紋香爛漫玉樹瓊苞堆雪靜夜沈沈浮光靄靄冷浸溶溶月人間天上爛銀霞照通徹渾似姑射真人天姿靈秀意氣殊髙潔萬化參差誰信道不與羣芳同列浩氣清英仙材卓犖下土難分别瑶臺歸去洞天方看清絶警悟虞集十年窗下見古今成敗幾多豪傑誰會誰能誰不濟故紙數行明滅亂葉西風遊絲春夢轉轉無休歇為他憔悴不知有甚干涉寥寥無住間身盡虛空界一片中宵月雲去雲來無定相月亦本無圎缺非色非空非心非佛教我如何説不妨跬步蟾蜍飛上銀闕湘月雙調即念奴嬌之鬲指聲也薑堯章五湖舊約問經年底事長負清景暝入西山漸喚我一葉夷猶乘興倦網都收歸禽時度月上汀洲冷中流容與畫橈不點清鏡誰解喚起湘靈煙鬟霧鬢理哀絃鴻陳玉麈談玄嘆坐客多少風流名勝暗栁蕭蕭飛星苒苒夜久知秋信鱸魚應好舊家樂事誰省鳳簫吟和彥時兄重九相山雨溟濛年年今日農夫共卜期豐登髙隨處好銀屏突兀南峙對三公真珠漙露菊更芙蓉照水勻紅但華髮衰顔不堪頻鑑青銅相逢行藏休借問且徘徊目送飛鴻十年湖海千里雲山幾畨殘照凄風蟹螯粗似臂金英碎琥珀香濃細讀離騷為君一飲千鍾長夀仙聖節趙子昂瑞日當天對絳闕蓬萊非霧非煙翠光覆禁苑正淑景芳妍綵仗和風細轉御香飄滿黃金殿喜萬國會朝千官拜舞億兆同歡福祉如山如川應玉渚流虹璇樞飛電八音奏舜韶慶玉燭調元嵗嵗龍輿鳳輦九重春醉蟠桃宴天下太平祝吾皇夀與天地齊年丹鳳吟么鳳張翥蓬萊花鳥記並宿苔枝雙雙嬌小海山仙姝喚起緑衣歌笑芳叢有時遣探聽東風數聲啼曉月下人歸凄涼夢醒悵别多歡少念故巢猶在瘴雲杪甚閉入雕籠庭院深悄信斷羇雌逺鎮怨情縈繞翠襟近來漸短看梅花又還開了縱解收香寄與奈羅浮春杳燕歸慢上已雨梁寅花徑蕭條恰桃霞已盡梨雪初飄雲霾嗔麗景風雨妬佳朝山中行樂本寥寥那更值年荒酒價髙諸生共髙詠只間靜勝嬉遊千嶂暝故人逺濘妨馬水平橋象筵寶瑟何由見與誰共羽觴浮蘭亭遺迹長蓬蒿怎能勾山隂棹小舟對景度新曲獨堪向故人求瑶臺聚八仙張叔夏楚竹間桃千日酒樂意稍稍漁樵那回輕散飛夢便覺迢遙似隔芙蓉無路到如何共此可憐宵舊愁消故人念我來問寂寥登臨試開笑口看垂垂短髮破帽輕飄欵語微吟清風頓掃花妖明朝栁岸醉醒又知在煙波第幾橋懷人處任滿身風露踏月吹簫花草稡編卷二十

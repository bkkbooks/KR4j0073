body:
  text: 花草稡編巻二十二明陳耀文輯長調瑞鶴仙上元康伯可瑞烟浮禁苑正絳闕春回新正方半冰輪桂華滿溢花衢歌市芙容開遍龍樓兩觀見銀燭星毬有爛捲珠簾盡日笙歌盛集寳釵金釧堪羡綺羅叢裏蘭麝香中正宜遊翫風柔夜煖花影亂笑聲喧閙蛾兒滿路成團打塊簇著冠兒鬬轉喜皇都舊日風光太平再見二薄寒羅䄂怯教小玉添香被翻宫襭蘭缸半明滅聽幾聲歸鴈一簾㣲月情波恨葉索新詞猶自怨别夣回時雪煖酥凝掠鬢寳鴛釵折凄切紋窓描繡舊譜尋棊便成虚設同心對結重來是甚時節悵姑蘇臺上征帆何許隠隠遥山萬疊䄂紅綃獨立無言偷彈淚血春游周美成悄郊原帶郭行路永客去車塵漠漠斜陽映山落斂餘紅猶戀孤城欄角凌波歩弱過短亭何用素約有流鶯勸我重解繡鞍緩引春酌不記歸時早暮上馬誰扶醒眠朱閣驚飈動幕扶殘醉遶紅藥嘆西園已是花深無地東風何事又惡任流光過却猶喜洞天自樂玉照新志云美成以待制提舉南京鴻慶宫自杭徙居睦州夣中作此一闋既覺猶能全記了不詳其所謂也未幾清溪賊方臘起方還杭州舊居而道路兵戈已滿始入錢塘門但見杭人蒼黄奔避視落日半在鼓角樓簷門即詞中所謂斜陽映山落斂餘霞猶戀孤城欄角者應矣當是時承平日乆而狂宼嘯聚直聲言遂據二浙美成之舊居既不可往是日無處得食飢甚忽于稠人中有呼待制何往者視之鄉人侍兒也邀入酒家美成驚遽間連飲數盃散去乃詞中所謂凌波云云春酌之句驗矣飲罷覺㣲醉惶惑徑去城北江漲橋諸寺士女巳盈滿獨一小寺經閣偶無人遂宿其上即詞中所謂上馬誰扶醒眠朱閣是應矣既而奔避絶江居揚州傳聞方賊已盡據二浙渉江之淮泗因自計鴻慶宫有齋㕔可居乃携家往焉則詞中所謂念西園巳是花深無地東風又惡之語應矣至鴻慶未幾以疾卒則任流光過了歸來洞天自樂又應于身後矣美成平生好作樂府將死之際夢中得句而字字俱驗卒章又驗于身後豈偶然哉送張丞罷官歸柯山侯彦周楚山無際碧湛一溪晴綠四郊寒色霜華弄初日看玉明遥草金鋪平磧天涯倦翼更何堪臨岐送客念飛蓬斷梗無蹤把酒後期難覔愁寂梅花憔悴茅舍蕭踈倍添悽惻維舟岸側留君飲醉休惜想柯山春晩還家應對菊老松堅舊宅嘆宦游索寞情懐甚時去得春情陸子逸臉霞紅印枕睡覺来冠兒還是不整屏間麝煤冷但眉山壓翠淚珠彈粉堂深晝永燕交飛風簾露井恨無人與説相思近日帶圍寛盡重省殘燈朱幌淡月紗窓那時風景陽臺路逺雲雨夣便無凖待歸来先指花梢教看却把心期細問問因循過了青春怎生意穏前調趙徳莊攬垂楊細折有别情遺愛與君都説文茵帶琱軛是行春来處去年阡陌柔桑半葉轉光風輕颺秀麥正人家共約耕相借牛社相留客清絶溪山猶記脱㡌吟風倚樓招月東君何事將春至放春歇道從今江上一花一栁皆想油幢瑞節縱離愁瘦减腰圍帶金正曄秋思呉子和風傳秋信至顫葉葉庭梧飄零堦砌年華迅流水况榮枯翻手存亡彈指誰編故紙論古往英雄鬭智在當時喚做功名到此盡成閒氣何謂生為行客死乃歸人世同驛邸十歩九計空勞攘謾兒戲忍都將有限光隂縈絆趁逐無窮天地我直須跳出樊籠做箇俏底前調史達祖杏烟嬌濕髩過杜若汀洲楚衣香潤囬頭翠樓近指鴛鴦沙上暗藏春恨歸鞭隠隠便不念芳盟未穏自簫聲吹落雲東再數故園花信誰問聴歌窓罅倚月鉤欄舊家輕俊芳心一寸相思後總灰盡柰春風多事吹花揺栁也把幽情喚醒對南溪桃蕚翻紅又成痩損賦紅梅館娃春睡起為發妝酒煖臉霞輕膩冰霜一生裏厭從來冷澹粉腮重洗胭脂暗試便無限芳穠氣味向黄昬竹外寒深醉裏為誰偷倚嬌媚春風模様霜月心腸痩来肌體孤香細細吹夣到杏花底被髙樓横管一聲驚斷却對南枝灑淚謾相思桃葉桃根舊家姊妹梅辛幼安鴈霜寒透幙正䕶月雲輕嫩冰猶薄溪奩照梳掠想含香弄粉艶粧難學玉肌瘦弱更重重龍綃襯著倚東風一笑嫣然轉盻萬花羞落寂寞家山何在雪後園林水邊樓閣瑶池舊約隣翁更仗誰托粉蝶兒只尋桃覔柳開遍南枝未覺但傷心冷落黄昬數聲畵角離筵代意洪叔璵聴梅花吹動凉夜何其明星有爛相看淚如霰問而今去也何時㑹面匆匆聚散恐便作秋鴻社燕最傷情夜來枕上斷雲零雨何限因念人生萬事回首悲凉都成夣幻芳心繾綣空惆悵巫陽館况船頭一轉三千餘里隠隠髙城不見恨無情春水連天片帆似箭龍吟曲問梅劉寺史邦卿夜寒幽夣飛来小梅影下東風曉蝶魂未冷吾身良是悠然一笑竹杖敲苔布鞋踏凍嵗常先到傍蒼林却恨儲風養月須我輩新詩弔永以南枝為好怕從今逢花漸老愁消秀句寒回斗酒春心多少之子迯空伊人遯世又還驚覺但歸来對月髙情耿耿寄白雪杪雪夣囬虚白初生便疑冷月通窓户不知夜乆都無人見玉妃起舞銀界囬天瓊田易地晃然非故想兒童徤意生愁霽色情頻在窺簷處一片樵林釣浦是天教王維畵取未知授簡先將髙興收歸妙句江路梅愁㶚陵人老又騎驢去過章臺不記春風乍見倚簾吹絮一捻紅紫姑夷堅支志覩嬌紅細捻是西子當日留心千葉西都競栽接賞園林臺榭何妨日渉輕羅慢褶費多少陽和調爕向曉来露浥芳苞一㸃醉紅潮頰雙靨姚黄國艶魏紫天香倚風羞怯雲鬟試揷引動狂蜂浪蝶况東君開宴賞心樂事莫惜獻酬頻疊看相將紅藥翻階尚餘侍妾沈延年邀致者安公子陸務觀風雨初經社子䂓聲裏春光謝最是無情零落盡薔薇一架况我今年憔悴幽窻下人盡怪詩酒消聲價向藥爐經巻忘却鶯牕柳榭萬事收心也粉痕猶在香羅帕恨月愁花争信道如今都罷空憶前身便面章臺馬因自來禁得心腸怕縱遇歌逢舞但説京都舊話旅情栁耆卿逺岸收殘雨雨殘稍覺江天暮拾翠汀洲人寂静立雙雙鷗鷺望幾㸃漁燈隠映蒹葭浦停畵橈兩兩舟人語道去程今夜遥指前村烟樹游宦成羈旅短檣吟倚閒凝竚萬水千山迷逺近想鄉闗何處自别處風亭月榭辜歡聚剛斷腸惹得離情苦聴杜鵑聲聲勸人不如歸去花發狀元紅慢劉伯夀几三春向暮萬卉成隂有嘉艷方折嬌姿嫩質冠羣品共賞傾城傾國上苑晴晝暄千素萬紅猶竒特綺筵開㑹詠歌才子壓倒元白别有芳幽苞小歩帳華絲綺軒油壁與紫鴛鴦素蛺蝶自清旦往往連夕巧鶯喧脆管嬌燕語雕梁留客武陵人念夣役意濃堪遣情溺右劉几在神宗時與范蜀公重定大樂洛陽花品曰状元紅為一時之冠樂工花日新能為新聲汴妓郜懿以色著秘監致仕劉伯夀尤精音律熙寧中几携花日新就郜懿懽詠仍撰此曲填詞以贈之人有謂為髙達者郜懿第六即蔡奴之母也李定之父與郜六遊生定而郜六死定不之知也及王荆公為宰相擢用李定言官交攻以為母死不持服為此蔡奴亦以色著云霓裳中序第一詹可大一規古蟾魄瞥過宣和幾春色知那箇栁鬆花怯曾磋玉團香塗雲抹月龍章鳯刻是如何兒女消得便孤了翠鸞何限人更在天北磨滅古今離别幸相從薊門仙客蕭然林下秋葉對雲淡星踈眉青影白佳人已傾國贏得癡銅舊畫興亡事道人知否見了也華髮至元間監醮長春宫偶見羽士丈室古鏡状似秋葉背有金刻宣和御寳四字有感因賦應法孫愁雲翠萬叠露栁殘蟬空抱葉簾捲流蘇寳結乍庭戸嫩凉䦨干㣲月玉纎勝雪委素紈塵鎻香箧思前事鶯期燕約寂寞向誰説悲切漏籖聲咽漸寒灺蘭缸未滅良宵長是間别恨酒凝紅綃粉涴瑶玦鏡盟鸞影缺吹怨笛西風數闋無言乆和衣成夣睡損縷金蝶喜遷鶯蔡子正墨客揮犀霜天秋曉正紫塞故壘黄雲衰草漢馬嘶風邊鴻呌月隴上鐵衣寒早劒歌騎曲悲壯盡道君恩須報塞垣樂盡櫜鞬錦領山西年少談笑刀斗静烽火一把時報平安耗聖主憂邊威懐遐逺强敵尚寛天討嵗華向晩愁思誰念玉闗人老太平也且歡娯莫惜金尊頻倒元豐間挺自西掖出鎮平陽府經數載意欲歸作此詞詞播中都遂徹聖聴上因語吕丞相曰蔡挺欲歸遂以西掖召還丞相生日康伯可臘殘春早正簾幕䕶寒樓臺清曉寳運當千佳辰餘五嵩岳誕生元老帝遣阜安宗社人仰雍容廊廟盡總道是文章孔孟勲庸周召師表方眷遇魚水君臣須信從來少玉帶金魚朱顔緑鬢占斷世間榮耀篆刻鼎彛將遍整頓乾坤都了願嵗嵗見柳梢青淺梅英紅小秋夜聞鴈秋寒初勁看雲路鴈来碧天如鏡湘浦煙深衡陽沙逺風外幾行斜陣囬首塞門何處故國闗河重省漢使老認上林欲下裴囬清影江南煙水暝聲過小樓燭暗金猊冷送目鳴琴裁詩挑錦此恨此情無盡夣想洞庭飛下散入雲濤千頃過盡也柰杜陵人逺玉闗無信立春呉浩然譙樓殘月聴畵角曉寒梅花吹徹瑞日祥雲風和解凍青帝乍臨東闕暖向土牛簫鼓天路珠簾髙揭最好是戴綵幡春勝釵頭雙結竒絶開宴處珠履玳簪爼豆争羅列舞䄂翩翩歌喉縹𣺌壓倒柳腰鶯舌勸我應時納祐還把金爐香爇願嵗嵗把一巵春酒長陪佳節閠元宵呉子和銀蟾光彩喜稔嵗閏正元宵還再樂事難并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引徧嬉遊寳馬香車喧隘情快天意教人月更圓償足風流債媚栁煙濃夭桃紅小景物逈然堪愛巷陌笑聲不斷襟䄂餘香仍在待歸也便相期明日踏青挑菜端午梅霖初歇正綘色海榴争開佳節角黍包金香蒲切玉是處玳筵羅列鬬巧盡輸年少玉腕彩絲雙結艤彩舫見龍舟兩兩波心齊發竒絶難畵處激起浪花翻作湖間雪畵鼓轟雷紅旗掣電奪罷錦標方徹望中水天日暮猶自珠簾髙揭棹歸晚載荷香十里一鈎新月春宴趙文鼎韶華駘蕩看花工盡力安排春仗薄霧霏烟軟風輕日物態與人交暢鳥聲弄巧千調樓影垂空十丈亂花栁粲寳鈿纓絡綵絲帷帳佳賞輝艶冶笑語盈盈花面交相向歌運長繅酒凝深碧和氣盎然席上好春易苦風雨人意難逢舒放但拍掌醉陶然一笑忘形天壤春感易彦祥帝城春晝見杏臉桃腮胭脂㣲透一霎兒晴一霎兒雨正是催花時候淡烟細栁如畵雅稱踏青携手怎知道那人人獨倚䦨干消痩别後音信斷應是淚珠滴遍香羅袖記得年時膽瓶兒畔曾把牡丹同嗅故鄉水遥山逺怎得新歡如舊強消遣把閒愁推入花前盃酒秋懐髙賔王凉雲歸去再約著晩來西樓風雨水静簾隂鷗閒菰影秋到露汀煙浦試省喚囬幽恨盡是愁邊新句倦登眺動悲凉還在殘蟬吟處凄楚空見説香鎻霧扄心似秋蓮苦寳瑟彈冰玉臺窺月淺黛可憐偷聚幾時翠溝題葉無復綉簾吹絮鬢華晩念庾郎情在風流誰與黄鍾元宵曲史達祖月波凝滴望玉壺天近了無塵隔翠眼圏花冰絲織練黄道寳光相直自憐詩酒瘦難應接許多春色最無賴是隨香趁燭曾伴狂客蹤跡謾記憶老了杜郎忍聴東風笛柳院燈踈梅㕔雪在誰與細傾春碧舊情拘未定猶自學當年游歴怕萬一悞玉人夜寒窓簾隙送韓夷邪驃騎下淮金主亮桯史旌麾初舉正駃騠力徤嘶風江渚射虎將軍落雕都尉繡帽錦袍翹楚怒磔㦸髯争奮捲地一聲鼙鼓笑談頃指長江齊楚六師飛渡此去無自墮金印如斗獨在功名取斷鎻機謀垂鞭方略人事本無今古試展臥龍韜韞果見成功旦莫問江左想雲霓望切𤣥黄迎路别内側室王正之歸潛志玉樓歡宴記遺簪綺席題詩羅扇月枕雙欹雲窓同夣相伴小花深院舊歡頓成陳迹翻作一畨新怨素秋晚聴陽闗三疊一樽相餞留戀情繾綣紅淚洗粧雨濕梨花面月底闗河馬頭星月西去一程程逺但願此情如舊天也不違人願再相見老生涯分付藥爐經巻龍女郝仙廟汀洲蘋滿記翠籠采采相將隣媛蒼渚烟生金支光爛人在霧綃鮫館小鬟頓成雲散羅襪凌波不見翠鸞逺但清溪如鏡野花留靨情睠驚變現身後神功絲滿呉蠶繭漢女菱歌湘妃瑶瑟香動倚雲層殿彤車載花一色醉盡碧桃清燕故山晩歎流年一笑人間飛電賀生第三子古今三絶惟鄭國三良漢家三傑三俊才名三儒文學更有三君清節争似一門三秀三子三孫竒特人總道賽蜀郡三蘇河東三薛慶愜况正是三月風光盃好傾三百子並三賢孫齊三少俱篤三餘事業文既三冬足用名即三元髙揭親俱慶看寵加三命禮膺三接秋望趙彦端登山臨水正桂嶺瘴開蘋洲風起𤣥鶴髙翔蒼鷹逺擊白鷺欲飛還止江上澄波似練沙際行人如蟻目斷處見遥峰簇翠殘霞浮綺千里闗塞逺鴈陣不來猶把䦨干倚數叠悲笳一行征斾城郭幾畨成毁白塔前朝寢陵青嶂故都營壘念往事但寒烟滿目愁蟬盈耳前調劉行簡曉光催角聴宿鳥未驚鄰鷄先覺迤邐烟村馬嘶人起殘月尚穿林薄淚痕帶霜㣲凝酒力衝寒猶弱嘆倦客稍不禁重染風塵京洛追念人别後心事萬重難覔孤鴻託翠幌嬌深曲屏香煖争念嵗寒飄泊怨月恨花煩惱不是不曾經著這情味望一成消减新来還惡探春慢姜堯章衰草愁烟亂鴉送目飛沙囬旋平野拂雪金鞭欺寒茸㡌還記章臺走馬誰念飄零乆謾贏得幽懐難寫故人清眄相逢小窻閑共情話長恨離多㑹少重訪問竹西珠淚盈把鴈磧沙平漁汀人歎老去不堪遊冶無柰苕溪月又喚我扁舟東下甚日歸來梅花亂零春夜惜餘歡山谷四時美景正年少賞心頻啟東閣芳酒載盈車喜朋侣簪合盃觴交飛勸酬獻正酣飲醉主公陳榻坐来争柰玉山未頺興尋巫峽歌䦨旋燒綘蠟况漏轉銅壺煙斷香鴨猶整醉中花借纎手重挿相將扶上金鞍騕褭碾春焙願少延懽洽未須歸去重尋艶歌更留時霎春雲怨上已馮偉夀春風惡劣把數枝香錦和鶯吹折雨重栁腰嬌困燕子欲扶扶不得軟日烘烟乾風收霧芍藥荼䕷㺯顔色簾幙輕隂圗書清潤日永篆香絶盈盈笑靨宫黄額試紅鸞小扇丁香雙結團鳯眉心倩郎貼教洗金罍共看西堂醉花前月曲水成空麗人何處往事暮雲萬葉安平樂慢都門池苑應制万俟雅言瑞日初遲緒風乍暖千花百草争香瑶池路穏閬苑春深雲樹水殿相望栁曲沙平看塵隨青盖絮惹紅粧賣酒緑隂傍無人不醉春光有十里笙歌萬家羅綺身世疑在仙鄉行樂知無禁五侯半隠少年場舞妙歌妍空妬得鶯嬌燕忙念芳菲都來幾日不堪風雨踈狂雨霖鈴王介甫孜孜矻矻向無明裏强作窠窟浮名浮利何濟堪留戀處輪廻倉卒幸有明空妙覺可彈指超出縁底事抛了全潮認一浮漚作瀛渤本源自性天真佛秪些些妄想中埋没貪他眼花陽艶誰信道本來無物一旦茫然終被閆羅老子相屈便縱有千種機籌怎免伊唐突秋别柳耆卿寒蟬凄切對長亭晩驟雨初歇都門暢飲無緒方留戀處蘭舟催發執手相看淚眼竟無語凝咽念去去千里煙波暮靄沉沉楚天闊多情自古傷離别更那堪冷落清秋節今宵酒醒何處楊栁岸曉風殘月此去經年應是良辰好景虚設便縱有千種風情更與何人説綺羅香春雨史邦卿做冷欺花將烟困栁千里偷催春暮盡日冥迷愁裏欲飛還住驚粉重蝶宿西園喜泥潤燕歸南浦最妨它佳約風流鈿車不到杜陵路沈沈江上望極還被春潮急難尋官渡隠約遥峯和淚謝娘眉嫵臨斷岸新緑生時是落紅帶愁流處記當日門掩梨花剪燈深夜語漁浦有感張槃浦月窺檐松泉漱枕屏裏呉山何處暗粉踈紅依舊為誰勻注都負了燕約鶯期更閒却栁烟花雨縱十分春到郵亭賦懐應是斷腸句青青原上薺麥還被東風無賴翻成離緒望極天西惟有隴雲江樹斜照帶一縷新愁盡分付暮潮歸去歩閒堦時卜心期落花空細數古陽闗詞話渭城朝雨一霎裛輕塵更洒遍客舍青青弄柔凝千縷栁色新更洒徧客舍青青千縷栁色新休煩惱勸君更盡一杯酒人生㑹少自古富貴功名有定分莫遣容儀瘦損休煩惱勸君更盡一杯酒只恐怕西出陽闗舊遊如夣眼前無故人秪恐怕西出陽闗眼前無故人竹馬子新秋栁耆卿登孤壘荒凉危亭曠望静臨煙渚對雌霓掛雨雄風拂檻㣲收煩暑漸覺一葉驚秋殘蟬噪晩素商時序覽景想前歡指神京非霧非烟深處向此成追感新愁易積故人難聚憑髙盡日凝竚贏得銷魂無語極目霽靄霏㣲暝鴉零亂蕭索江城暮南樓畵角又逐殘陽去葉少藴與君記平山堂前細栁幾囬同挽又征帆夜落危檻依舊遥臨雲巘自笑來往匆匆朱顔漸改故人俱逺横笛想遺聲但寒松千丈傾崖蒼蘚世事終何已田隂縱在嵗隂仍晩嵇康老來尤嬾只要蓴羮菰飯却欲便買茅廬短蓬輕檝尊酒猶能辦君能過我水雲聊為伴兠上鞋兒寄張生鄭雲娘雲娘傳朦朧月影黯淡花隂獨立等多時只怕寃家乖約又恐他側畔人知千囬作念萬般思想心下暗猜疑驀地得来厮見風露下語顫聲低輕移蓮歩暗卸羅衣携手過廊西正是更䦨人静向粉郎恣意矜持片時雲雨幾多歡愛依舊兩分離報道情郎且住待奴兠上鞋兒一作連氏倩女寄陳彦臣眉嫵亦名百宜嬌姜白石看垂楊連苑杜若吹沙愁損未歸眼信馬青樓去重簾下娉婷人妙飛燕翠樽共欵聴艶歌郎意先感便携手月地雲堦裏愛良夜㣲煖無限風流踈散有暗藏弓履偷寄香翰明月聞津鼓湘江上催人還解春䌫亂紅萬㸃悵斷魂烟水遥逺又争似相携乘一舸鎮長見百宜嬌吕聖求隙月垂照亂蛩催織秋晚嫩凉房户燕拂簾旌䑕窺窓網寂寂飛螢來去金鋪鎮掩漫記得花時南浦約重陽茰糝菊英小樓遥夜歌舞銀燭暗佳期細數簾幙漸西風半窓秋雨葉底翻紅水面皺碧燈火裁縫砧杵登髙望極正霧瑣官槐歸路定須相将寳馬鈿車訪吹簫侣憶瑶姬支志作别素質曹元寵詞話雨細雲輕花嬌玉軟於中好箇情性争奈無縁相見有分孤零香箋細寫頻相問我一句句兒都聽到如今不得同歡伏惟與他耐静此事憑誰執証有樓前明月窓外花影􅂸了一生煩惱為伊成病秪恐更把風流逞便因循悞人無定恁時節若要眼兒厮覷除非㑹聖夷堅支志作王齊叟彦齡詞瀟湘静雅詞拾遺畫簾㣲捲香風逗正明月乍圓時候金盤露冷玉爐篆消漸紅鱗生酒嬌唱倚繁絃瓊枝碎輕廻雲袖風臺熖短銅壺漏永人欲醉夜如晝因念流年􅌺景被浮名暗辜歡偶人生大抵離多㑹少更相将白首何似猛尋芳都莫問積金過斗歌䦨宴闋雲窓鳯枕釵横麝透湘江静史邦卿暮草堆青雲浸浦記匆匆倦篙曾駐漁榔四起沙鷗未落怕愁沾詩句碧袖一聲歌石城怨西風隨去滄波蕩晩菰蒲弄秋還重到斷魂處酒易醒思正苦想空山桂香懸樹三年夢冷孤吟意短屢煙鐘津鼓屐齒厭登臨移燈後㡬番凉雨潘郎漸老風流頓減閒居未賦還京樂周美成禁烟近觸處浮香秀色相料理正泥花時候奈何客裏光隂虚費望箭波無際迎風漾日黄雲委任去逺中有萬㸃相思清淚到長淮底過當時樓下慇懃為説春來羇旅况味堪嗟誤約乖期向天涯自看桃李想而今應恨墨盈牋愁粧照水怎得青鸞翼飛歸教見憔悴雙聲子遊吳栁耆卿晚天蕭索斷蓬蹤跡乘興蘭棹東遊三吳風景姑蘇臺榭牢落暮靄初收夫差舊國香徑没徒有荒丘繁華處悄無覩惟聞麋鹿呦呦想當年空運籌决勝圖王取覇無休江山如畫雲濤煙浪翻輸范蠡扁舟驗前經舊史嗟謾載當日風流斜陽暮草茫茫盡成萬古遺愁烘春桃李獻蔡京江朝宗漢昇平無際慶八載相業君臣魚水鎮撫風稜調爕精神合是聖朝房魏鳯山政好還被畫轂朱輪催起按錦轡暎玉帶金魚都人争指丹陛常注意追念裕陵元佐今無㡬繡衮香濃鼎槐風細榮耀滿門朱紫四方具瞻師表盡道一䕫足矣運化筆又管領年年烘春桃李西湖月黄子行湖光冷浸玻瓈蕩一餉薰風小舟如葉藕花十丈雲梳霧洗翠嬌紅怯壺觴圍坐處正酒醁吹波紅映頰尚記得玉臂生凉不放汗香輕浹殢人小摘墻榴為碎搯猩紅細認裙褶舊遊如夢新愁似織淚珠盈睫秋娘風味在怎得對銀缸生笑靨消痩沈約詩腰彷彿堪捻春從天上來感舊吳彦髙海角飄零嘆漢苑秦宫墜露飛螢夢裏天上金屋銀屏歌吹競舉青冥問當時遺譜有絶藝鼓瑟湘靈促哀彈似林鶯嚦嚦山溜泠泠梨園太平樂府醉㡬度春風鬢變星星舞徹中原塵飛滄海風雲萬里龍庭寫鳴笳幽怨人憔悴不似丹青酒㣲醒一軒凉月燈火青熒玉林詞選云彦髙名激米元章婿也於㑹寧府遇老姬善鼔瑟自言梨園舊籍因有感而賦此後三山鄭中卿嘗從張貴謨使亦聞敵人有歌之者中州樂府云好問曽見王防禦公王説彦髙此詞句句用琵琶故實引據甚明今忘之矣武昌秋夜周伯陽浩蕩青㝠正涼露如洗萬里虚明鼓角悲健秋入重城彷彿石上三生指蓬萊雲路渺何許月冷風清倚南樓一聲長笛㡬㸃殘星西風舊年有約聽候蛩語夜客裏心驚紅樹山深翠苔門掩想見露草踈螢便乘風歸去闌干外河漢西傾笑淹留劃然孤嘯雲白天青西江月慢吕聖求春風淡淡清晝永落英千尺桃杏散平郊晴蜂來徃妙香飄擲傍畫橋煑酒青帘緑楊風外數聲長笛記去年紫陌朱門花下舊相識向寳几裁書憑燕翼望翠閣煙林似織聞道春衣猶未整過禁烟寒食但記取角枕情題東窓休悞這些端的更莫待青子緑隂春事寂歸朝歡春閨張子野聲轉轆轤聞露井曉引銀瓶牽素綆西園人語夜來風叢英飄墮紅成逕寳猊煙未冷蓮臺香蠟殘痕凝等身金誰能得意買此好光景粉落輕粧紅玉瑩月枕横釵雲墜領有情無物不雙栖文禽只合常交頸晝夜歡豈定争如翻作春宵永日曈曨嬌柔懶起簾壓捲花影栁耆卿别岸扁舟三兩隻葭葦蕭蕭風淅淅沙汀宿鴈破煙飛溪橋殘月和霜白漸漸分􅍼色路遥川逺多行役徃來人隻輪雙槳盡是利名客一望鄉闗煙水隔轉覺歸心生羽翼愁雲恨雨兩縈牽新春殘臘相催逼嵗華都瞬息浪萍風梗誠何益問歸期玉樓深處有箇人相憶對雪追和東坡相山透隙敲窓風摵摵坐見廣庭霜縞白長安道上正騎驢蔡州城裏誰堅壁表表風塵物瑶林瓊樹三豪客對揮毫連珠唱玉競把詩牋擲草草盃盤還促席痛飲狂歌話胸臆前村昨夜放梅花東鄰休把誇容色清歡那易得明朝烏㘘陞南極帶隨車黄壚咫尺莫作山河隔夀蕭禹平知縣嚴次山雲表金莖珠璀璨當日投懐驚玉燕文章議論壓西廱風流姓字翔東觀紫皇嗟見晚祥麟五色留金殿大江西銅章墨綬暫爾煩君綰十二金釵扶玉盞錦瑟摐摐隨急管獸爐烟動彩雲髙秋聲拍碎紅牙板趣君歸翰苑萊衣煥爛潘輿穏任方瞳從今看到弱水波清淺春遊馬荘父聽得提壺沽美酒人道杏花深處有杏花狼藉鳥啼風十分春色今無九麝煤銷永晝青烟飛上庭前栁畫堂深不寒不煖正是好時候團團寳月憑纎手暫借歌喉招舞袖真珠滴破小槽紅香肌縮盡纎羅痩投分須白首黄金散與親和舊且銜盃壮心未落風月長相守西河金陵懐古周美成佳麗地南朝盛事誰記山圍故國遶清江髻鬟對起怒濤寂寞打孤城風檣遥度天際斷崖樹猶倒倚莫愁艇子曽繫空遺舊跡鬰蒼蒼霧沉半壘夜深月過女墻來賞心東畔淮水酒旗戯鼓甚處市想依稀王謝鄰里燕子不知何世入尋常巷陌人家相對如説興亡斜陽裏王子文天下事問天怎忍如此陵圖誰把獻君王結愁未巳少豪氣槩總成塵空餘白骨黄葦千古恨吾老矣東遊曾弔淮水綉春臺上一廻登一廻揾淚醉歸撫劍倚西風江濤猶壯人意只今䄂手野色裏望長淮猶二千里縱有英心誰寄近新來又報烽烟起絶域張騫歸來未和王潛齋韻曹西士今日事何人弄得如此漫漫白骨蔽川原恨何日已闗河萬里寂無煙月明空照蘆葦謾哀痛無及矣無情莫問江水西風落日慘新亭㡬人墮淚戰和何者是良籌扶危但看天意只今寂寞藪澤裏豈無人髙卧閭里試問安危誰寄定相将有詔催公起須信前書言猶未送入我門來胡浩然荼壘安扉靈馗掛户神儺烈竹轟雷動念流光四序式週回須知今嵗今宵盡似頓覺明年明日催向今夕是處迎春送臘羅綺筵開今古遍同此夜賢愚共添一嵗貴賤仍偕互祝遐齡山海固難摧石崇富貴籛鏗夀更潘岳儀容子建才仗東風盡力一齊吹送入此門來瀟湘逢古人慢初夏王和甫薰風㣲動方榴花弄色萱草成窩翠幃敞輕羅試氷簟初展㡬尺湘波踈簷廣厦稱瀟湘一枕南柯引多少夢魂歸緒洞庭雨棹煙蓑驚回處閑晝永更時時燕雛鶯友相過正緑影婆娑况庭有幽花池有新荷青梅煑酒幸隨分贏取髙歌功名事到頭終在嵗華忍負清和看花回張守生日趙徳荘注目正江湖浩蕩煙雲離屬美人衣蘭佩玉澹秋水凝神陽春翻曲烹鮮坐嘯清浄五千言自足横劒氣南斗光中浩然一醉引雙鹿回鴈未歸書未續夢草處舊芳重緑誰憶瀟湘嵗晚為喚起長風吹飛黄鵠功名異時圯上家傳謝寵辱待封留拜公堂下願授我長生籙二端有恨留春無計花飛何速檻外青青翠竹鎮髙節凌雲清隂常足春寒風袂帶雨穿窓如利鏃催處處燕巧鶯慵㡬聲鈎輈呌雲朩看波面垂楊蘸緑最好是風梳煙沐隂重熏簾未捲正泛乳新芽香飄清馥新詩惠我開巻醒然欣再讀嘆辭章過人華麗擲地勝如金玉陽春楊无咎蕙風輕鶯語巧應喜乍離幽谷飛過北窗前迎清曉麗日明透翠幃縠篆臺芬馥初睡起横斜簪玉因甚自覺腰肢痩朝來又寛帬幅對清鏡無心欣梳裹誰問着餘酲帶宿尋思前懽徃事似驚回好夢難續花亭徧倚檻曲厭滿眼争春凡朩儘顦悴過了清明候愁紅慘緑史邦卿杏花烟梨花月誰與暈開春色坊巷曉愔愔東風斷舊火銷處近寒食少年踪跡愁暗隔水南山北還是寳絡雕鞍被鶯聲喚來香陌記飛盖西園寒猶凝驚醉耳誰家夜笛燈前重簾不掛殢華裙粉淚曾拭如今故里信息頼海燕年時相識奈芳草正鎖江南夢春衫怨碧向湖邊江緯讀書堂江緯退處鄉闗幽棲林藪舎宇苐須茅盖翠巘清泉啟軒窓遥對遇等門隣里過從親朋臨顧草草便成幽㑹䇿杖擕壺向湖邊栁外旋買溪魚便斫銀絲鱠誰復欲痛飲如長鯨吞海共惜醺酣恐歡娛難再矧清風明月非錢買休追念金馬玉堂心膽碎且鬬尊前有阿誰身在張拭萬里煙堤百花風榭遊女翩翩羽盖綵掛鞦韆向花梢嬌對矧門外森立喬松日花争麗猶若當年文㑹廊廟䕫龍暫卜鄰郊外共講真率玉糝金虀膾同蕭散寄傲樽罍傾北海佳處難忘約追歡須再况風月不用一錢買但回首七虎堂中心欲碎千里相思幸前盟猶在月中桂送杜㣲赴闕趙徳荘露醑無情送長歌未終已醉離别何如暮雨釀一襟凉潤來留佳客好山侵坐碧勝昨夜疎星淡月君欲翩然去人間底許員嶠問帆席詩情病非疇昔頼親朋對影且慰良夕風流雨散定㡬回腸斷能禁頭白為君煩素手薦碧藕輕絲細雪去去江南路猶應水雲秋共色更漏子杜夀域庭逺途程算萬山千水路入神京暖日春郊緑栁紅杏香逕舞燕流鶯客館悄悄閒庭堪惹舊恨深有多少馳驅驀嶺渉水枉費身心思想厚利髙名謾惹得憂煩枉度浮生幸有青松白雲深洞清閒且樂昇平長是宦遊羇思别離淚滿襟望江鄉縱跡舊遊題書尚自分明賞南枝曽子固暮冬天地閉正柔朩凍折瑞雪飄飛對景見南嶺梅露㡬㸃清雅容姿丹染蕚玉綴枝又豈是一陽有私大抵化工獨許使占却先時霜威莫苦凌持此花根性想羣卉争知貴用在和羮三春裏不管緑是紅非攀賞處宜酒巵醉撚嗅幽香更竒倚欄仗何人去囑羌管休吹長相思少游鐵甕城髙蒜山渡濶干雲十二層樓開罇待月掩箔披風依然燈火揚州綺陌南頭記歌名宛轉鄉號温柔曲檻俯清流想花隂誰繫蘭舟念凄絶秦絃感深荆賦相望㡬許凝愁勤勤裁尺素奈雙魚難渡𤓰洲曉鑑堪羞潘鬢㸃吳霜漸稠幸于飛鴛鴦未老不應同是悲秋京妓栁耆卿畫鼓喧街蘭燈滿市皎月初照嚴城清都絳闕夜景風傳銀箭露暖金莖巷陌縱横過平康欵轡緩聽歌聲鳯燭熒熒那人家未掩香屏向羅綺叢中認得依稀舊日雅態輕盈嬌波艷冶巧笑依然有意相迎墻頭馬上謾遲留難寫深誠又豈知名宦拘檢年來減盡風情迎新春嶰管變青律帝里陽和新布晴景回輕煦慶嘉節當三五列華燈千門萬户遍九陌羅綺香風㣲度十里燃絳樹鼇山聳喧喧簫鼓漸天如水素月當午香徑裏絶纓擲果無數更䦨燭影花隂下少年人徃徃竒遇太平時朝野多懽民康阜堪隨分良聚對此争忍獨醒歸去望南雲慢朩芙蓉沈公述朩葉輕飛乍雨歇亭臯簾巻秋光欄隈砌角綻拒霜㡬處䔒深淺紅芳應恨開時晚伴翠菊風前並香曉來寒露嫩臉低凝似帶啼粧堪傷記得佳人當時怨别盈腮淚粉行行而今最苦奈千里身心兩處凄凉感物成消黯念舊懽空勞寸腸月斜殘漏夢斷孤幃一枕思量綺寮怨周美成上馬人扶殘醉曉風吹未醒映水曲翠瓦朱簷垂楊裏乍見津亭當時曾題敗壁蛛絲罩淡墨苔暈青念去來嵗月如流徘徊久嘆息愁思盈去去倦尋路程江陵舊事何曽再問楊瓊舊曲凄清歛愁黛與誰聽尊前故人如在想念我最闗情何須渭城歌聲未盡處先淚零趙功可忽忽東風又老冷風吹晚隂疎簾下茶鼎孤煙斷橋外梅豆千林江南庾郎憔悴睡未醒病酒愁怎禁倚䦨干一扇凉風看平地落花如雪深千曲囊中古琴平泉金谷不堪舊事重尋當日登臨都化作夢銷沉元龍丘墳無恙誰喚起共論心哀歌怨吟問何似啼鳥枝上音花心動史梅溪風約簾波錦機寒難遮海棠烟雨夜酒未蘇春枕猶欹曾是悞成歌舞半褰薇帳雲頭散奈愁味不隨香去儘沈静文園更渴有人知否懶記温柔舊處偏只怕臨風見它桃樹綉户鎖塵錦瑟空絃無復畫眉心緒待拈銀管書春恨被雙燕替人言語意不盡垂楊㡬千萬縷臨安新亭劉叔安鳩雨催晴遍園林一番緑嬌紅媚栁外金衣花底香鬚消得艷陽天氣障泥歩錦尋芳路稱來徃縱横珠翠笑擕手旗亭問酒更酧春思還記東山樂事向歌雪香中伴春沈醉粉袖殢人彩筆題詩陶寫老來風味夜深銀燭明如晝待歸去看承花睡夢雲散屏山半熏沈水春景阮逸女仙苑春濃小桃開枝枝已堪攀折乍雨乍晴輕暖輕寒漸近賞花時節栁揺臺榭東風軟簾櫳静幽禽調舌斷魂逺閒尋翠徑頓成愁結此恨無人共説還立盡黄昏寸心空切强整綉衾獨掩朱扉簟枕為誰鋪設夜長宫漏傳聲逺紗窓映銀缸明滅夢回處梅梢半籠淡月憶諸葛章蟾英忽覩菱花這一程減却風流顔色隣姬戯問愧我為羞無語低頭寥寂珠泪紛紜和粉垂襟袂舊痕乾又濕感起愁懐堆堆積積杜宇催春急煙籠花栁粉蝶難尋覔紫燕喃喃黄鶯恰恰對景脂消香浥篆煙将盡愁未休息若得御溝玻璃碧教紅葉徃來傳箇消息永遇樂栁耆卿薰風解愠晝景晴和新霽時候火徳流光蘿圖薦祉累慶金枝秀璇樞繞電華渚流虹是日挺生元后緒唐虞垂拱千載應期萬靈敷祐殊方異域争貢琛賮架巘航波奔湊三殿稱觴九儀就列韶濩鏘金奏藩侯瞻望彤庭親擕僚吏賡歌元首祝堯齡北極齊尊南山共久東坡明月如霜好風如水清景無限曲港跳魚圓荷㵼露寂寞無人見紞如五鼓錚然一葉黯黯夢雲驚斷夜茫茫重尋無覔處覺來小園行遍天涯倦客山中歸路望斷故園心眼燕子樓空佳人何在空鎖樓中燕古今如夢何曾夢覺但有舊歡新怨異時對南樓夜景為余浩歎夜登燕子樓夢盼盼作晁無咎曰燕子樓空三句説盡張建封燕子樓事春情解方叔風煖鶯嬌露濃花重天氣和煦院落煙收垂楊舞困無奈堆金縷誰家巧縱青樓絃管惹起暮雲情緒憶當時紋衾粲枕未嘗暫孤鴛侣芳菲易老故人難聚到此翻成輕誤閬苑仙遥蠻牋縱寫何計傳深訴青山緑水古今長在惟有舊歡何處空贏得斜陽暮草淡烟細雨京口北固亭懐古稼軒千古江山英雄無覔孫仲謀處舞榭歌臺風流總被雨打風吹去斜陽草樹尋常巷陌人道寄奴曽住想當年金戈鐵馬氣吞萬里如虎元嘉草草封狼居胥贏得倉皇北顧四十三年望中猶記烽火揚州路可堪回首佛狸祠下一片神鴉社鼓憑誰問廉頗老矣尚能飯否春莫有懐劉叔擬青幄蔽林白氊鋪徑紅雨迷楚晝閣闗愁風簾捲恨盡日縈情緒陽臺雲去文園人病寂寞翠尊彫俎惜韶容匆匆易失芳叢對眼如霧巾欹潤裛衣寛涼滲又覺漸回驕暑解籜吹香遺丸薦脆小芰浮鴛浦畫欄如舊依稀猶記佇立一鈎蓮歩黯銷魂那堪又聽杜鵑更苦次韻弔青樓髙賔王淺暈脩蛾脆痕紅粉猶記窺户香斷奩空塵生砌冷誰喚青鸞舞春風花信秋宵月約歴歴此心曾許銜芳恨千年怨結玉骨未應成土朩蘭艇子莫愁何在謾繫寒江烟樹事逐雲沈情隨佩冷短夢分今古一杯遥夜孤光難曉多少碎人腸處空凄黯西風細雨盡吹淚去送春洪叔璵歌雪徘徊夢雲溶曳欲勒春住薄倖楊花無端杜宇抵死催教去參差烟岫千回百匝不解禁春歸路病厭厭那堪更聽小樓一夜風雨金釵鬬草玉盤行菜徃事了無憑據合數松兒分香帕子總是牽情處小桃朱户題詩在否尚憶去年崔䕶緑隂中鶯鶯燕燕也應解語前調雅詞功名閒事利禄休問莫繫心上幸有衣食隨縁過得着甚乾勞攘風前月下三盃兩醆撞着即莫與放且與箇山荘道友退閒故人來徃新來做得一箇寛䄂布衫着來也暢出户迎賔入城幹事恰似王保長我咱忺後人歌鬼舞任你萬般毁謗死來後一家一箇那底怎向寄所思新第者詞話孤衾不暖静聞銀漏欹枕難穏細想多情多才多貌總是多愁本而今幽㑹難成佳期頓阻只恁縈方寸知他莫是今生共伊此歡無分尋思斷腸腸斷珠淚揾了依前重揾終待臨岐分明説與我這厭厭悶得伊知後教人成病萬種斷也無恨只恐他恁不分曉謾勞痩損東臯寓居晁無咎松菊堂深芰荷池小長夏清暑燕引雛還鳩呼婦徃人静郊原趣麥天已過薄衣輕扇試起遶園徐歩聽衡宇欣欣童稚共説夜來初雨蒼苔徑裏紫葳枝上數㸃幽花垂露東里催鋤西鄰助餉相戒清晨去斜川歸興翛然滿目回首帝鄉何處只愁恐輕鞍犯夜覇陵舊路傾盃樂栁耆卿朩落霜洲鴈横煙渚分明畫出秋色暮雨乍歇小檝夜泊宿葦村山驛何人月下臨風處起一聲羌笛離愁萬緒聞岸草切切蛩吟如織為憶芳容别後水遥山逺何計馮鱗翼想繡閣深沉争知憔悴損天涯行客楚峽雲歸髙陽人散寂寞狂蹤跡望京國空目斷逺峰凝碧春霽春晴胡浩然遲日融和乍雨歇東郊嫩草凝碧紫燕雙飛海棠相襯粧㸃上林春色黯然望極困人天氣渾無力又聽得園苑數聲鶯囀栁隂直當此暗想故國繁華儼然遊人依舊南陌院深沉梨花亂落那堪如練㸃衣白酒量頓寛還量窄算此情景除非殢酒狂歡恣歌沉醉有誰知得秋霽秋晴詩餘虹影侵堦乍雨歇長空萬里凝碧孤鶩髙飛落霞相映逺状水鄉秋色黯然望極動人無限愁如織又聽得雲外數聲新鴈正嘹嚦當此暗想畫閣輕抛杳然殊無些箇消息漏聲稀銀屏冷落那堪殘月照窓白衣帶頓寛猶阻隔算此情苦除非宋玉風流共懐傷感有誰知得史邦卿江水蒼蒼望倦栁愁荷共感秋色虚閣先涼古簾空暮鴈程最嫌風力故園信息愛渠入眼南山碧念上國誰是鱠鱸江漢未歸客還又嵗晚痩骨臨風夜聞秋聲吹動岑寂露蛩鳴清燈冷屋翻書愁上髩毛白年少俊遊渾斷得但可憐處無奈苒苒魂驚採香南浦剪梅烟驛曾公衮朩落山明莫江碧樓倚太虚寥廓素手飛觴釵頭笑取金英滿浮桑落鬢雲慢約酒紅拂破香腮薄細細酌簾外任教月轉畫欄角當年快憶登臨異鄉節物難禁離索故人逺凌波何在惟有殘英共寂寞愁到斷腸無處着寄寒香與憑渠問訊佳時弄粉吹花為誰梳掠合歡帶美人栁耆卿身材兒早是妖嬈算風措實難描一箇肌膚渾是玉更都來占了千嬌妍歌艷舞鶯慚巧舌栁妬纎腰自相逢便覺韓娥價減飛燕聲銷桃花零落溪水潺湲重尋仙徑非遥莫道千金酧一笑便明珠萬斛須邀檀郎幸有凌雲詞賦擲果風標况當年便好相擕鳯樓深處吹簫杜夀域樓臺髙下玲瓏鬬芳樹緑隂濃芍藥孤栖香艷晚見櫻桃萬顆初紅巢喧乳燕珠簾鏤曳滿户香風罩紗幃象牀屏枕晝眠才似䑃朧起來無語更兼慵念分明徃事成空被你厭厭牽繫我怪纎腰繡帶寛鬆春來早是分飛兩處長恨西東到如今扇移明月簟鋪寒浪與誰同花發沁園春王晉卿帝里春歸早先粧㸃皇家池館園林雛鶯未遷燕子乍歸時節戯弄晴隂瓊樓珠閣恰正在栁曲花心翠袖艷衣凭䦨干慣聞絃管新音此際相擕宴賞縱行樂隨處芳樹遥岑桃腮杏臉嫩英萬葉千枝緑淺紅深輕風煦日泛暗香長滿衣襟洞户醉歸訪笙歌晩來雲海沉沉呈史滄洲劉坼父換譜伊凉選歌燕趙一番樂事重起花新笑靨栁軟纎腰齊楚衆芳圍裏年年佳㑹長是傍清明天氣正魏紫衣染天香蜀粧紅破春睡一簇猩羅鳯翠遍東園西城㸃檢芳事銓齋吏散晝館人稀㡬闋管絃清脆人生適意流轉共風光遊戯到遇景取次成歡怎教良夜休醉西吳曲懐襄陽劉改之説襄陽舊事重省記銅鞮巷陌醉還醒笑鶯花别後劉郎憔悴萍梗倦客天涯還買箇西風輕艇便欲訪騎馬山翁問峴首那時風景楚王城裏知㡬度經過摩挱故宫栁癭漫弔景冷烟衰草凄迷傷心興廢頼有陽春古郢乾坤誰望六百里路中原空老盡英雄腸斷劒鋒冷望明河劉一止華旌耀日報天上使星初辭金闕許國精忠試此日傅岩濟川舟檝向來鷄林外况傳詠篇章雄絶問人地真是唐朝第一未論勲業鯨波霽雲千疊望仙馭縹緲神仙明滅萬里勤勞也等是壮年繡衣持節丈夫功名事未肯向樽前傷輕别看飛棹歸侍宸遊宴賞太平風月夢横塘浪痕經雨影鬢吹寒曉來無限蕭瑟野色分橋剪不斷溪山風物船繫朱藤路迷烟寺逺鷗浮没聽踈鐘斷鼓似近還遥驚心事傷羇客新醅旋壓鵝黄􅂸清愁在眼酒病縈骨綉閣嬌慵争解説短封傳憶念誰伴塗妝綰髻嚼蘂吹花弄秋色恨對南雲此時凄斷有何人知得定風波旅情栁耆卿竚立長堤澹蕩晚風起驟雨歇極目蕭疎塞栁萬株掩映箭波千里走舟車向此人人奔名競利念蕩子終日馳驅争覺鄉闗轉迢遞何意繡閣輕抛錦字難逢等閒度嵗奈泛泛旅迹厭厭病緒近來諳盡宦遊滋味此情懐縱寫香牋馮誰與寄算孟光争得知我繼日添憔悴早梅芳上孫資政海霞紅山烟翠故都風景繁華地譙門畫㦸下臨萬井金碧樓臺相倚芰荷浦溆楊栁汀洲映虹橋倒影蘭舟飛棹遊人聚散一片湖光裏漢元侯自從破虜征蠻峻陟樞庭貴籌帷厭久盛年晝錦歸來吾鄉我里黔齋少訟宴館多懽未周星便恐皇家圖任勲賢又作登庸計羊祜傳有黔齋期夜月劉濬金鈎花綬繫雙月腰肢軟低折揎皓腕縈綉結輕盈宛轉妙若鳯鸞飛越無别香檀急扣轉清切飜纎手飄瞥催畫鼓追脆管鏘洋雅奏尙與衆音為節當時妙選舞袖慧性雅質名為殊絶滿坐傾心住目不甚窺回雪逡廵一曲霓裳徹汗透鮫鮹肌潤教人傅香粉媚容秀發濬潞洲人有才名樂部中惟杖鼓鮮有能工之者京師官妓楊素娥最工濬酷愛之作此詞素娥以此詞名振京師南浦程正伯金鴨懶薰香向晚來春酲一枕無緒濃緑漲瑶窓東風外吹盡亂紅飛絮無言竚立斷腸惟有流鶯語碧雲欲暮空惆悵韶華一時虚度追思舊日心情記題葉西樓吹花南浦老去覺歡疎傷春恨都付斷雲殘雨黄昏院落問誰猶在凭闌處可堪杜宇空只解聲聲催他春去史邦卿玉樹曉飛香待倩它和愁㸃破妝鏡輕嫩一天春平白地都䕶雨昏烟冥幽花濕露定應獨把闌干凭謝屐未蠟安排共文鵷重遊芳逕年來夢裏揚州怕事隨歌殘情趂雲冷嬌盼隔東風無人㑹鶯燕暗中心性深盟縱約盡同晴雨全無定海棠夢在相思過西園秋千紅影曲玉管秋思栁耆卿隴首雲飛江邊日晩烟波滿目凭闌久立望闗河蕭索千里清秋忍凝眸窅窅神京盈盈仙子别來錦字終難偶斷鴈無憑苒苒飛下汀洲思悠悠暗想當初有多少幽懽佳㑹豈知聚散難期翻成雨恨雲愁阻追遊悔登山臨水惹起平生心事一塲銷黯永日無言却下層樓别瑶姬慢万俟雅言可惜香紅又一番驟雨㡬陣狂風霎時留不住便夜來和月飛過簾櫳離愁未了酒病相仍便堪此恨中片片隨流水斜陽去各自西東又還是九十春光悞雙飛戯蝶並採遊蜂人生能㡬許細算來何物得似情濃沈腰暗減潘鬢先秋寸心不易供望暮雲千里沉沉障翠峰二郎神春怨徐幹臣悶來彈鵲又攪碎一簾花影謾試着春衫還思纎手薰徹金爐燼冷動是愁端如何向更怪得新來多病想舊日沈腰而今潘鬢不堪臨鏡重省别時淚漬羅襟猶凝料為我厭厭日髙慵起長託春酲未醒鴈翼不來馬蹄難去門掩一庭芳景空竚立盡日欄干遍倚晝長人静七夕栁耆卿炎光初謝過暮雨芳塵輕洒乍露冷風清庭户爽天如水玉鈎遥掛應是星娥嗟久阻叙舊約飈輪欲駕極目處㣲雲暗度耿耿銀河髙㵼閒雅須知此景古今無價運巧思穿針樓上女擡粉面雲鬟相亞鈿合金釵私語處算誰在囬廊影下願天上人間占得歡娛年年今夜用徐幹臣韻湯恢瑣窓睡起閒竚立海棠花影記翠檝銀塘紅牙金縷杯泛梨花冷燕子啣來相思字道玉痩不禁春病應蝶粉半消鴉雲斜墜暗塵侵鏡還省香痕碧唾春衫都凝悄一似荼䕷玉肌翠被消得東風喚醒青杏單衣楊花小扇閒却晩春風景最苦是蝴蝶盈盈弄晩一簾風静解連環閨情周美成怨懐難托嗟行人斷絶信音遼邈憶妙手能解連環似風散雨收霧輕雲薄燕子樓空暗塵鎖一牀絃索想移根換葉盡是舊時手種紅藥汀洲漸生杜若料舟移岸曲人在天角記得當日音書把閒語閒言盡總燒却水驛春回望寄我江南梅蕚􅂸今生對酒對花為伊淚落春水髙賔王浪揺新緑浸芳洲翠渚雨痕初足蕩霽色流入横塘看風外漪漪皺紋如縠藻荇縈廽似留戀鴛飛鷗浴愛嬌雲蘸色媚日挼藍逺迷心目仙源漾舟岸曲照芳容㡬樹香浮紅玉記那回西洛橋邊濺裙翠傳情玉纎輕掬三十六陂錦鱗渺芳音難續隔垂楊故人望斷浸愁千斛杏梁燕寓解連環張宗瑞小樓春淺記鈎簾看雪䄂粘芳片似不似栁絮因風更細與品題屢呵氷硯宛轉吟情縱真草鳯牋都徧到燈前笑語酒祓峭寒移盡更箭而今栁隂滿院却花空雪似人隔春逺歎萬事流水斜陽謾贏得前詩醉汙團扇脉脉重來算惟有畫欄曾見把千種舊愁付與杏梁語燕尉遲盃離情周美成隋堤路漸日晩宻靄生深樹隂隂淡月籠沙還宿河橋深處無情畫舸都不管烟波隔南浦等行人醉擁重衾載将離恨歸去因念舊客京華長偎傍疎林小檻歡聚冶葉倡條俱相識仍慣見珠歌翠舞如今向漁村水驛夜如嵗焚香獨自語有何人念我無憀夢魂疑想鴛侣梅苑嵗云暮歎光隂苒苒能㡬許江梅尚怯餘寒長安信音猶阻春風無據凭欄久欲去還凝竚憶溪邊月底徘徊暗香疎影庭户朝來凍解霜消南枝上香英數㸃㣲露把酒看花無言有淚還是那時情緒花依舊晨粧何處謾贏得花前愁千縷儘髙樓畫角頻吹任教紛紛飛素花草稡編巻二十二

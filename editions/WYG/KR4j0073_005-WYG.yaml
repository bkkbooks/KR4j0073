body:
  text: 花草稡編巻五明陳耀文輯小令菩薩蠻一名重疊金一名子夜歌李太白平林漠漠烟如織寒山一帯傷心碧瞑色入高樓有人樓上愁玉梯空佇立宿鳥歸飛急何處是歸程長亭更短亭湘山野錄云此詞不知何人冩在鼎州滄水驛樓復不知何人所撰魏道輔㤗見而􅋢之後至長沙得古風集於曾子宣内翰家乃知李白所撰杜陽雜編云大中初女蠻國入貢其國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往聲其詞按自𤣥宗末以至大中初相去殆幾百年始有此調其在太白同時如王杜後此如元白諸家俱未有此詞且曾氏亦止云古風豈後之詞家以其字句之同而遂名之耶唐人稿齋贅筆牡丹含露真珠顆美人折向庭前過含笑問檀郎花强妾貌强檀郎故相惱須道花枝好一向發嬌嗔碎挼花打人宣宗時有婦人斷夫兩足者上戯語宰相曰無乃碎挼花打人蓋時有此詞云溫廷筠小山重疊金明滅鬢雲欲度香顋雪懶起畫蛾眉弄妝梳洗遲照花前後鏡花靣交相映新帖繡羅襦䨇䨇金鷓鴣二翠翹金縷䨇鸂􅈑水紋細起春池碧池上海棠梨雨晴紅滿枝繡衫遮笑靨烟草粘飛蝶青𤨏對芳菲玉關音信稀三玉樓明月長相憶栁絲䙚娜春無力門外草萋萋送君聞馬嘶畫羅金翡翠香燭銷成淚花落子規啼綠窓殘夢迷四鳳皇初對盤金縷牡丹一夜經微雨明鏡照新妝鬢輕䨇臉長畫樓相望久欄外埀絲栁音信不歸來社前䨇燕迴五牡丹花謝鶯聲歇綠楊滿院中庭月相憶夢難成背窓燈半明翠鈿金壓臉寂寞香閨掩人逺淚闌干燕飛春又殘六南園滿地堆輕絮愁聞一霎清明雨雨後却斜陽杏花零落香無言匀睡臉枕上屏山掩時節欲黃昏無憀獨倚門七水精簾裏玻黎枕暖香惹夢鴛鴦錦江上栁如烟鴈飛殘月天藕絲秋色淺人勝參差剪䨇鬢隔香紅玉釵頭上風八蘂黃無限當山額宿妝隠笑紗窓隔相見牡丹時暫來還别離翠釵金作股釵上蝶䨇舞心事竟誰知月明花滿枝九杏花含露團香雪綠楊陌上多離别燈在月朧明覺來聞曉鶯玉鈎褰翠幕妝淺舊眉薄春夢正關情鏡中蟬鬢輕十滿宫明月梨花白故人萬里關山隔金鴈一䨇飛淚痕沾繡衣小園芳草綠家住越溪曲楊栁色依依燕歸君不歸十一寳函鈿雀金鸂䳵沈香關上吳山碧楊栁又如絲驛橋春雨時畫樓音信斷芳草江南岸鸞鏡與花枝此情誰得知十二夜來皓月纔當午重簾悄悄無人語深處麝烟長卧時留薄妝當年還自惜往事那堪憶花露月明殘錦衾知曉寒十三竹風輕動庭除冷珠簾月上玲瓏影山枕隠穠妝綠檀金鳳皇兩蛾愁黛淺故國吳宫逺春限正關情畫樓殘㸃聲北夢瑣言云宣宗愛唱菩薩蠻詞令狐相國假溫飛卿新撰密進之戒以勿泄而遽言於人由是踈之華州登齊雲樓唐昭宗登樓遙憶秦宫殿茫茫只見䨇飛燕渭水一條流千山與萬丘逺烟籠碧樹陌上行人去何處有英雄迎儂歸故宫二飄飄且在三峯下秋風往往堪霑灑腸斷憶仙宫朦朧烟霧中思夢時時睡不語長如醉早晩是歸期蒼穹知不知中朝故事云乾寧三年李茂貞犯闕帝次華州韓建迎歸郡中帝鬰鬰不樂每登城西齊雲樓逺望明年秋制此詞云韋莊紅樓别夜堪惆悵香燈半捲流蘇帳殘月出門時美人和淚辭琵琶金翠羽絃上黃鶯語勸我早歸家綠窓人似花二人人盡説江南好遊人只合江南老春水碧於天畫船聽雨眠鑪邊人似月皓腕䨇凝雪未老莫還鄉還鄉須斷腸三勸君今夜須沈醉鐏前莫話明朝事珍重主人心酒深情亦深須愁春漏短莫訴金盃滿遇酒且呵呵人生能幾何四洛陽春裏春光好洛陽才子他鄉老栁暗魏王堤此時心轉迷桃花春水渌水上鴛鴦浴凝恨對殘暉憶君君不知牛嶠舞裙香暖金泥鳯畫梁語燕驚殘夢門外栁花飛玉郎猶未歸愁匀紅粉淚眉剪春山翠何處是遼陽錦屏春晝長二玉釵風動春幡急交枝紅杏籠烟泣樓上望卿卿窓寒新雨晴熏爐䝉翠被繡帳鴛鴦睡何處最相知羡他初畫眉三畫屏重疊巫陽翠楚神尚有行雲意朝暮幾般心向他情謾深風流古今隔虛作瞿塘客山月照山花夢迴燈影斜四風簾燕舞鶯啼栁妝臺約鬢低纎手釵重髻盤珊一枝紅牡丹門前行樂客白馬嘶春色故故墜金鞭迴頭應眼穿五綠雲鬢上飛金雀愁眉歛翠春烟薄香閣掩芙蓉畫屏山幾重窓寒天欲曙猶結同心苣啼粉汚羅衣問郎何日歸六玉樓氷簟鴛鴦錦粉融香汗流山枕簾外轆轤聲斂眉含笑驚栁陰烟漠漠低鬢蟬釵落須作一生􅂸盡君今日歡和凝越梅半拆輕寒裏氷清澹薄籠藍水暖覺杏梢紅遊絲狂惹風閒堦莎徑碧逺夢猶堪惜離恨又迎春相思難重陳孫光憲月華如水籠香砌金鐶碎撼門初閉寒影墮高簷鈎垂一靣簾碧烟輕褭褭紅顫燈花笑即此是高唐掩屏秋夢長二花冠頻鼓墻頭翼東方澹白連窓色門外早鶯聲背樓殘月明薄寒籠醉態依舊鉛華在握手送人歸半拖金縷衣三小庭花落無人掃踈香滿地東風老春晩信沈沈天涯何處尋曉堂屏六扇眉共湘山逺爭奈别離心近來尤不禁四朩綿花映叢祠小越禽聲裡春光曉銅鼓與蠻歌南人祈賽多客帆風正急茜袖偎檣立極浦幾囘頭烟波無限愁魏承班羅裙薄薄秋波染眉間畫時山兩㸃相見綺筵時深情暗共知翠翹雲鬢動歛態彈金鳳宴罷入蘭房邀人解珮璫二羅衣穏約金泥畫玳筵一曲當秋夜聲顫覷人嬌雲鬟褭翠翹酒醺紅玉軟眉翠秋山遠繡幌麝烟沈誰人知兩心尹鶚隴雲暗合秋天白俯窓獨坐窺烟陌樓際角重吹黄昏方醉歸荒唐難共語明日還應去上馬出門時金鞭莫與伊毛熈震梨花滿院飄香雪高樓夜靜風箏咽斜月照簾帷憶君和夢稀小窓燈影背燕語驚愁態屏掩斷香飛行雲山外歸二繡簾高軸臨塘看雨飜荷芰真珠散殘暑晩初凉輕風渡水香無憀悲往事爭那牽情思光影暗相催等閒秋又來三天含殘碧融春色五陵薄倖無消息盡日掩朱門離愁暗斷魂鶯啼芳樹暖燕拂迴塘滿寂寞對屏山相思醉夢間李珣迴塘風起波紋細刺桐花裏門斜閉殘日照平蕪䨇䨇飛鷓鴣征帆何處客相見還相隔不語欲魂銷望中烟水遙二等閒將度三春景簾垂碧砌參差影曲檻日初斜杜鵑啼落花恨君容易處又話瀟湘去凝思倚屏山淚流紅臉班三隔簾微雨䨇飛燕砌花零落紅深淺捻得寳箏調心隨征棹遙楚天雲外路動便經年去香斷畫屏深舊歡何處尋與周后妹李後主花明月暗飛輕霧今宵好向郎邊去剗南唐書作衩襪步香階手提金縷鞋畫堂南畔見一晌偎人顫奴為去來難敎君恣意憐二蓬萊院閉天台女畫堂晝寢無人語抛枕翠雲光綉衣聞異香潛來珠鎻動驚覺銀屏夢慢臉笑盈盈相看無限情三銅簧韻脆鏘寒竹新聲慢奏移纎玉眼色暗相鈎秋波横欲流雨雲深繡戸末便諧衷素宴罷又成空魂迷春夢中馮延已金波逺逐行雲去踈星時作銀河渡花影卧秋千更長人不眠玉箏彈未徹鳳髻黄釵脱憶夢翠蛾低微風吹繡衣二畫堂昨夜西風過繡簾時拂朱門鎻驚夢不成雲䨇蛾枕上顰金爐烟裊裊燭暗紗窓曉殘月尚彎環玉箏和淚彈三梅花吹入誰家笛行雲半夜凝空碧欹枕不成眠關山人未還聲隨幽怨絶空斷澄霜月月影下重簷輕風花滿簾四回廊逺砌生秋草夢魂千里青門道鸚鵡怨長更碧籠金鏁横羅幃中夜起霜月清如水玉露不成圓寳箏悲斷絃五嬌鬟堆枕釵横鳳溶溶春水楊花夢紅燭淚䦨干翠屏烟浪寒錦壺催畫箭玉珮天涯逺和淚試嚴妝落梅飛夜霜六西風嫋嫋凌歌扇秋期正與行雲逺花葉脱霜紅流螢殘月中蘭閨人在否千里重樓暮翠被已銷香夢隨寒漏長七沈沈朱戸横金鏁紗窓月影隨花過燭淚冷䦨干落梅生晩寒寳釵横翠鳳千里香屏夢雲雨已荒凉江南春草長八欹鬟墮髻搖䨇槳採蓮晩出清江上顧影約流萍楚歌嬌未成相逢顰翠黛笑把珠璫解家住栁陰中畫橋東復東盧絳玉京人去秋蕭索畫簷鵲起梧桐落欹枕悄無言月和殘夢圓背燈唯暗泣甚處碪聲急眉黛逺山攢芭蕉生暮寒一作獨自倚闌干衣襟生暮寒南唐書云盧絳病店且死夜夢白衣婦人歌此詞勸酒歌數闋因謂絳曰子之疾食蔗即愈如言果差迨數夕又夢前婦人曰妾乃玉真也他日富貴相見於固子坡後入金陵累官柱國唐亡歸宋以龔慎儀事坐誅臨刑有白衣婦人同斬姿貌宛如所夢問其受刑之地即固子坡也婦人姓耿名玉真其夫死與前婦之子通當極法與絳同斬焉晏同叔高梧葉下秋光晩珎叢化出黄金盞還似去年時傍欄三兩枝人情須耐久花靣長依舊莫學蜜蜂兒等閒悠颺飛晏叔原來時楊栁東橋路曲中暗有相期處明月好因縁欲圓還未圓却尋芳草去畫扇遮微雨飛絮莫無情閒花應笑人二鶯啼似作留春語花飛鬭學回風舞紅日又平西畫簾遮燕泥烟光還自老綠鏡人空好香在去年衣魚牋音信稀三嬌香淡染胭脂雪愁春細畫彎彎月花月鏡邊明淺妝匀未成佳期應有在試倚秋千待滿地落英紅萬條楊栁風四哀箏一弄湘江曲聲聲寫盡湘波綠纎指十三絃細將幽恨傳常筵秋水慢玉柱斜飛鴈彈到斷腸時春山眉黛低五江南未雪梅花白憶梅人是江南客猶記舊相逄淡烟微月中玉容長有信一笑歸來近懷逺上樓時晩雲和鴈低六相逄欲話相思苦淺情肯信相思否還恐謾相思淺情人不知憶曾攜手處月滿窓前路長到月來時不眠猶待伊集句王荆公揮塵錄海棠亂發皆臨水君知此處花何似凉月白紛紛香風隔岸聞囀枝黄鳥近隔岸聲相應隨意坐莓苔飄零酒一盃新築草堂集句荆公山谷集數間茅屋閑臨水輕衫短㡌垂楊裏花是去年紅吹開一夜風本集作今日是何朝看予渡石橋梢梢新月偃午醉醒來晩何物最關情黄鸝三兩聲送妓往杭蘇州迎新守東坡玉童西迓浮丘伯洞天冷落秋蕭瑟不用許飛瓊瑤臺空月明清香凝夜燕借與韋郎看莫便過姑蘇扁舟下五湖代諸妓送陳述古前人娟娟缺月西南落相思撥斷琵琶索枕淚夢魂中覺來眉暈重華堂堆燭淚長笛吹新水醉客各西東應思陳孟公張子野憶郎還上層樓曲樓前芳草年年綠綠似去時袍囘頭風袖飄郎袍應已舊顔色非長久惜恐鑑中春不如花草新二香軿不至春蟾午令人轉更猜飛語翠幙動風亭時疑響屧聲花香聞水榭幾誤飄蘭麝不忍下朱扉遶廊重待伊三佳人學得平陽曲纎纎玉筍横孤竹一弄入雲聲海門江月清髻搖金鈿落惜恐櫻唇薄聽罷已依依莫吹楊栁枝四聞人話著宣鄉字嗔情恨意還相喜何况草長時酒前頻見伊嬌香堆寳帳月到梨花上心事兩人知掩燈羅幔垂五七夕牛星織女年年别分明不及人間物匹鳥少孤飛斷沙猶並栖洗車昏雨過缺月雲中墮斜漢曉依依暗蛩還促機梅雪周美成銀河宛轉三千曲浴鳬飛鷺澄波綠何處是歸舟夕陽江上樓天憎梅浪發故下封枝雪深院捲簾看應憐江上寒效荆公作黄魯直半烟半雨溪橋畔漁翁醉着無人喚疎懶意何長春風花草香江山如有待此意陶潛解問我去何之君行到自知二輕風裊斷沈烟炷霏微盡日寒塘雨殘綉没心情鳥啼花外聲離愁難自制年少乖盟誓寂寞掩朱門羅衣空淚㾗秦少游蛩聲泣露驚秋枕羅幃淚濕鴛鴦錦獨卧玉肌凉殘更與恨長陰風翻翠幔雨澀燈光暗畢竟不成眠鴉啼金井寒李元膺綵旗畫柱清明後花前姊妹爭攜手先𦂳繡羅裙輕衫束領巾頓繩金釧響漸出花梢上笑裏問高低盤雲嚲玉螭賀方回子規啼夢羅窓曉開奩拂鏡嚴妝早粉碧盡丁香背垂裙帶長鈎筆尋舊曲愁結眉心綠猶恨夜來時酒狂歸太遲二章臺遊冶金龜壻歸來猶帶醺醺醉花漏怯春宵雲屏無限嬌絳紗燈影背玉枕釵聲碎不待宿酲銷馬嘶催早朝舒信道
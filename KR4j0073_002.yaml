長相守分飛後泪㾗和酒占了雙羅袖二明月征鞭又將南陌垂楊折自憐輕別拚得音書絶杏子枝邊倚遍闌干月依前缺去年時節舊事無人說王元之雨恨雲愁江南依舊稱佳麗水村漁市一縷孤煙細天際孤鴻遙認行如綴平生事此時凝睇誰㑹憑欄意周美成臺上披襟快風一瞬收殘雨栁絲輕舉蛛網粘飛絮極目平蕪應是春歸處愁凝竚楚歌聲苦村落黃昏鼓二征騎初停酒行莫放離歌舉栁汀蓮浦香盡江南路苦恨斜陽冉冉催人去空回顧淡煙橫素不見揚鞭處三孤館迢迢暮天草露霑衣潤夜來秋近月暈通風信今日原頭黃葉飛成陳知人悶故來相趁共結臨岐恨寄楚雲妓遼鶴西歸故人多少傷心事短書不寄魚浪空千里憑仗桃根說與相思意愁何際舊時衣袂猶有東風淚夷堅支志云美成在姑蘇與營妓嶽楚雲相戀後從京師過吳則嶽已從人久矣因飲於太守蔡巒子髙坐上見其妹因作此詞寄之楚雲讀之感泣者纍日王和甫倦逰雜録秋氣微涼夢回明月穿簾幕井梧蕭索正繞南枝鵲寶瑟塵生金雁空零落情無託鬢雲慵掠不似君恩薄葉少藴髙栁蕭蕭睡餘初覺西風徑小窗人靜淅瀝生秋聽底事多情欲與流年競殘雲暝墜巾慵整獨立芝蘭徑蘇養直冰勒輕颸緑痕初漲回塘水栁洲煙際白鷺翹沙嘴篛笠青蓑未減貂蟬貴雲濤裏醉眠篷底不屬人間世李蕭逺樓下清歌水流歌斷春風暮夢雲煙樹依約江南路碧水黃沙夢到尋梅處花無數問花無語明月隨人去陳子髙曲陌春風誰家姊妹同牆看映花烘暖嬌入茸茸眼細馬輕衫倚醉偷回面垂楊轉墜鞭却扇白地肝腸斷曹元寵疏栁殘蟬助人離思斜陽外淡煙疏靄節物隨愁改水已無情風更無情煞蘭舟解水流風快回首人何在二密炬髙燒寶刀時剪金花碎照人歡醉也照人無睡待得灰心陪盡千行淚籠紗裏夜涼如水猶喜長成對三一片南雲定知來做巫山雨歌聲才度只向風中住惱亂襄王無限牽情處長天暮又還飛去目斷陽臺路四沈醉歸來洞房燈火閒相照夜寒猶峭信意和衣倒春夢雖多好夢常常少紗窗曉鳯幃人悄花外空啼鳥五雲透斜陽半樓紅影明窗户暮山無數歸雁愁邊去十里平蕪花逺重重樹空凝佇故人何處可惜春將暮東坡獨倚胡床庾公樓外峰千朵與誰同坐明月清風我別乘一來有唱終須和還知麼自從添箇風月平分破天台秦少遊醉漾輕舟信流直到花深處塵緣相誤無計花間住煙水茫茫回首斜陽暮山無數亂紅如雨不記來時路二蹴罷秋千起來慵整纎纎手露濃花瘦薄汗輕衣透見客入來襪剗金叉溜和羞走倚門回首却把青梅嗅賀方回紅杏飄香栁含煙翠拖金縷水邊朱户門掩黃昏雨燭影搖紅一枕傷春緒歸不去鳯樓何處芳草迷歸路何籀春雨濛濛淡煙深鎖垂楊院暖風輕扇落盡桃花片薄幸不來前事思量遍無由見淚痕如線界破殘粧面二鶯踏花翻亂紅堆徑無人掃杜鵑來了梅子枝頭小撥盡琵琶總是相思調知音少暗傷懷抱門掩春山老汪藻髙栁蟬嘶採菱歌斷秋風起晚雲如髻湖上山橫翠簾捲西樓雨過涼生袂天如水畫樓十二有箇人同倚託意汪彥章玉照新志永夜厭厭畫簾低月山銜斗起來搔首梅影橫窗瘦好箇霜天閒却傳杯手君知否曉鴉啼後歸夢濃如酒能改齊漫録云彥章在翰苑屢致言者作此詞或問曰歸夢濃如酒何以在曉鴉啼後公曰無奈這一隊畜生何黃山谷羅帶雙垂妙香長恁攜纎手半粧紅豆各自相思瘦聞道伊家終日睂兒皺不能勾淚珠輕溜裛損揉藍袖趙元鎮香冷金猊夢回鴛帳餘寒嫩更無人問一枕江南恨消瘦休文頓覺春衫褪清明近杏花吹盡薄暮寒成陳王民瞻花外紅樓當時青鬢顔如玉淡煙殘燭醉入花間宿白髮相逢猶唱當時曲當時曲斷絃難續且盡杯中緑梅朱新仲耆舊續聞流水泠泠斷橋斜路橫枝亞雪花飛下全勝江南畫白璧青錢欲買春無價歸來也風吹平野一㸃香隨馬吕聖求俊眼犀心尊前如有乘鸞便過愁傳怨只許燈光見見了重休河漢明遮斷深深院亂風飄霰揉了雙羅燕桃花落盡周少隱竹坡詞燕子風髙小桃枝上花無數亂溪深處滿地飛紅雨喚得春來又送春歸去渾無緒劉郎前度空記來時路朱希真春雨春風問誰染就江南草燕嬌鶯巧只是參軍老今古紅塵愁了人多少樽前好緩歌低笑醉向花間倒孫尚之煙洗風梳司花先放江梅吐竹村沙路脈脈搖寒雨醉魄吟魂無著清香處愁如縷繫春不住又折冰枝去詠梅月陳同父一夜相思水邊清淺橫枝瘦小窗如晝情共香俱透清入夢魂千里人長久君知否雨僝雲僽格調還依舊送韓濟之歸襄陽王初寮苕溪漁隱峴首亭空勸君休墮羊碑淚宦遊如寄且伴仙翁醉說與鮫人莫解江皋佩將歸思暈紅縈翠袖織回文字釣臺方有開七里灘邊江光漠漠山如㦸漁舟一葉徑入寒煙碧笑我塵勞羞對雙臺石身如織年年行役魚鳥渾相識秋社豐城南禪寺壁間詞燕子依依曉來總為誰歸去淡雲生處已覺賓鴻度淺笑深嚬便面機中素乘鸞女瑣窗瓊宇㑹有明年暑登樓頥堂休惜餘春試來把酒留春住問春無語簾捲西山雨一掬愁心强欲登髙賦山無數煙波無數不放春歸去晚春元遺山醉裏春歸緑窗猶唱留春住問春何處花落鶯無語渺渺吟懷漠漠煙中樹西樓暮一簾疏雨夢裏尋春去朱雍輕艷盈盈相逢曾向寒溪路惜飄零處無計禁春雨素影參差人在瓊城步危欄暮年光催度特地香風住梅應次蘧深雪偶談雪意嬌春臘前粧㸃春風面粉痕冰片一笑重煙見倚竹偎松誰道羅浮逺寒更轉楚騷為伴韻繞香篝暖記夢蕭允之名儒詩餘花徑相逢眼期心諾情如昨怕人疑著佯弄秋千索知有而今何似當初莫愁難托雨鈴風鐸夢斷燈花落南浦月張輯來剪蓴絲江頭一陳鳴蓑雨孤篷歸路吹得蘋風暮短髮蕭蕭笑與沙鷗語休歸去玉龍嘶處邀月過南浦魏夫人波上清風畫船明月人歸後漸消殘酒獨自憑欄久聚散匆匆此恨年年有重回首淡煙疏栁隱隱蕪城漏冬朱淑真風徑雲濃暮寒無奈侵羅幕髻鬟斜掠呵手梅粧薄少飲清歡銀燭花頻落添蕭索春工已覺㸃破梅花萼閨思李易安寂寞深閨柔腸一寸愁千縷惜春春去幾㸃催花雨倚遍闌干祗是無情緒人何處連天衰草望斷歸來路池上有懷舒氏王齊叟妻獨自臨流悶來强把闌干憑舊愁新恨耗却年時興鷺散魚潛煙斂風初定波心靜照人如鏡少箇年時影夷堅支志云王齊叟字彥齡元祐樞密彥霖弟也任俠有聲善為詞曲妻舒氏亦工篇翰而婦翁出武列事之素不謹翁不能堪取女歸竟至離絶女在父家一日行池上懷其夫作此詞醉花間毛文錫深相憶莫相憶相憶情難極銀漢是紅牆一帶遙相隔金盤珠露滴兩岸榆花白風搖玉珮清今夕為何夕二休相問怕相問相問還添恨春水滿塘生鸂鶒還相趁昨夜雨霏霏臨明寒一陳偏憶戍樓人久絶邊庭信玉蝴蝶溫庭筠秋風淒切傷離行客未歸時塞外草先衰江南雁到遲芙蓉凋嫩臉楊栁墮新睂搖落使人悲斷腸誰得知孫光憲春欲盡景仍長滿園花正黃粉翅兩悠揚翩翩過短牆鮮飈暖牽逰伴飛去立殘芳無語對蕭娘舞衫沈麝香女冠子溫庭筠含嬌含笑宿翠殘紅窈窕鬢如蟬寒玉簪秋水輕紗捲碧煙雪胸鸞鏡裏琪樹鳯樓前寄語青娥伴早求仙韋莊四月十七正是去年今日別君時忍淚佯低面含羞半斂睂不知魂已斷空有夢相隨除却天邊月沒人知二昨夜夜半枕上分明夢見語多時依舊桃花面頻低栁葉睂半羞還半喜欲去又依依覺來知是夢不勝悲牛嶠雙飛雙舞春晝後園鶯語卷羅幃錦字書封了銀河雁過遲鴛鴦排寶帳豆蔲繡連枝不語勻珠淚落花時張泌露花煙草寂寞五雲三島正春深貌減潛銷玉香殘尚惹襟竹疏虛檻靜松密醮壇陰何事劉郎去信沈沈鹿虔扆鳯樓琪樹惆悵劉郎一去正春深洞裏愁空結人間信莫尋竹疏齊殿迥松密醮壇隂倚雲低首望可知心毛熙震修蛾慢臉不語檀心一㸃小山粧蟬鬢低含緑羅衣淡拂黃悶來深院裏閒步落花傍纎手輕輕整玉爐香李詢春山夜靜愁聞洞天疏磬玉堂虛細霧垂珠珮輕煙曳翠裾對花情脈脈望月步徐徐劉阮今何處絶來書上行杯韋莊芳草灞陵春岸栁煙深滿樓絃管一曲離聲腸寸斷今日送君千萬紅縷玉盤金鏤盞須勸珍重意莫辭滿二白馬玉鞭金轡少年郎離別容易迢遞去程千萬里惆悵異鄉雲水滿酌一杯勸和淚須愧珍重意莫辭醉花草稡編卷二

body:
  text: 花草稡編卷十八明陳耀文輯長調天香冬景王通叟霜瓦鴛鴦風簾翡翠今年較是寒早矮釘明􅣘側開朱户斷莫亂教人到重隂未解雲共雪商量未了青帳垂氊要密紅爐圍炭冝小呵梅㺯粧試巧繡羅衣瑞雲芝草伴我語時同語笑時同笑已被金樽勸酒又唱新詞故相惱盡道窮冬元來恁好對梅花懷王侍御龜齡劉方叔漠漠江臯迢迢驛路天教為春傳信萬朩叢邉百花頭上不管雪飛風緊尋交訪舊惟翠竹寒松相認不意牽詩動興何心襯粧添暈孤標最甘冷落不許蝶親蜂近直自從來潔白箇中清韻儘做重聞塞管也何害香銷粉痕盡待到和羮才明底藴水調歌頭東坡明月幾時有把酒問青天不知天上宫闕今夕是何年我欲乘風歸去唯恐瓊樓玉宇高處不勝寒起舞㺯清影何似在人間轉朱閣低綺户照無眠不應有恨何事長向别時圓人有悲歡離合月有隂晴圓缺此事古難全但願人長久千里共嬋娟熙寧丙辰中秋東坡居士歡飲達旦大醉作水調歌頭兼懷子由元豐問都下傳習此詞神宗問內侍因得上塵乙覽讀至又恐瓊樓玉宇高處不勝寒二句上曰蘇軾終是愛君乃命量移汝州快哉亭蘇子瞻落日繡簾捲亭下水連空知君為我新作窗户濕青紅長記平山堂上欹枕江南煙雨杳杳沒孤鴻認得醉翁語山色有無中一千頃都鏡淨倒碧峯忽然浪起掀舞一葉白頭翁堪笑蘭臺公子未解莊生天籟剛道有雌雄一點浩然氣千里快哉風春行山谷瑶草一何碧春入武陵溪溪上桃花無數花上有黃鸝我欲穿花尋路直入白雲深處浩氣展虹霓秪恐花深裏紅露濕人衣坐白石欹玉枕拂金徽謫仙何處無人伴我白螺杯我為靈芝仙草不為朱唇丹臉長嘯亦何為醉舞下山去明月逐人歸夷堅支志云此詞舊傳黃魯直所作王晦叔頥堂集云蜀人石耆翁言此莫將少虛壯年詞也能道其詳少虛又有涴溪沙一闋云寶叉湘裙上玉梯雲重應悵翠雲低愁同芳草兩凄凄又一詞云歸夢悠揚未見真繡衾恰有異香薰五更分得楚臺春皆造語工新但晚嵗醉心富貴不復事文章今人鮮有知其所作者滄浪亭蘇子美瀟灑大湖岸淡佇洞庭山魚龍隱處煙霧深鎖渺瀰間方念陶朱張翰忽有扁舟急槳撇浪載鱸還落日暴風兩歸路繞汀灣丈夫志當景盛恥踈間壯年何事憔悴華髮改朱顔擬借寒潭垂釣又恐鷗鳥相猜不肯傍青綸刺棹穿蘆荻無語看波瀾劉仲方落日塞垣路風徑戛貂裘翩翩數騎間獵深入黑山頭極目平沙千里惟見雕弓白羽鐵面駭驊騮隱隱望青冢特地起間愁漢天子方鼎盛四百州玉顔皓齒深鎖三十六宫秋堂有經綸賢相邉有縱橫謀將不作翠蛾羞中外和樂也聖主永無憂重陽韓無咎今日我重九莫負菊花開試尋高處擕手躡屐上崔嵬放目蒼崖萬仞雲護曉霜成陳知我與君來古寺倚修竹飛檻絶纎埃笑談間風滿座酒盈杯仙人跨海休問隨處是蓬萊落日平原西望鼓角秋深悲壯戲馬但荒臺細把茱萸看一醉且徘徊詠月韓子蒼江山自雄麗風露與高寒寄聲月姊借我玉鑑此中看幽壑魚龍悲嘯倒影星辰搖動海氣夜漫漫擁起白銀闕危駐紫金山表獨立飛玉佩整雲冠漱水濯雪眇視萬里一毫端回首三山何處聞道羣仙笑我邀我欲俱還揮手從此去翳鳯更驂鸞葉夢得何處難忘酒朱夏日偏長湖山地勝瀟湘十里芰荷香栁外新蟬驚晚樓上踈簾垂翠簟枕晚生涼紈扇搖霜月曲水泛流觴流年去今古夢幾千場虛名浮利輸却幾許好時光幸有碧雲深處存取朱顔緑鬢流落又何妨莫厭人間世頻入醉中鄉凱歌寄湖南安撫劉舍人張安國猩鬼嘯篁竹玉帳夜分弓少年荆楚劍客突騎錦襜紅千里風飛雷厲四校星流彗掃蕭斧挫春蔥談笑青油幕日奏捷書同詩書師黃閣老黑頭公家傳鴻寶祕略小試不言功聞道璽書頻下看即沙堤歸去帷幄日從容君王自神武一舉朔庭空建炎庚戍題吳江中吳紀聞平生太湖上短棹幾經過如今重到何事愁與水雲多擬把匣中長劍換取扁舟一葉歸去老漁蓑銀艾非吾事丘壑已蹉跎鱠新鱸斟美酒起悲歌太平生長豈謂今日識干戈欲㵼三江雪浪淨洗邊塵千里不為挽天河回首望霄漢雙淚墮清波武昌南樓落成次王漕韻李居厚撫景幾今古遺恨此江山百年形勝但見幽草雜枯管多少名流登覽賴有神扶壞棟詩墨尚斑斑風月要磨洗顧我已衰顔擎天手携玉斧到江干一新竒觀領客觴詠有餘間煙草半川開霽城郭兩州相望都在畫屏間便擬騎黃鵠直上扣雲關旅思劉德修客夢一回醒三度碧梧秋仰看今夕天上河漢又西流早晚涼風過鴈驚落空階一葉急雨閙清溝歸計休令暮宵露浥征裘古來今生老病許多愁那堪更説無限功業鏡中羞只有青山高致對此還論世事舉白與君浮送我一杯酒誰起舞涼州春半劉改之春事能幾許密葉著青梅日高花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片點蒼苔能得幾時好追賞莫徘徊雨飄紅風換翠苦相催人生行樂且須痛飲莫辭杯坐則高談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曽來朱元晦富貴有餘樂貧賤不堪憂那知天路幽險倚伏互相酬請看東門黃犬更聽華亭清淚千古恨難收何似鴟夷子散髮弄偏舟鴟夷子成霸業有餘謀收身千乘卿相歸把釣魚鈎春晝五湖煙浪秋夜一天雲月此外儘悠悠永棄人間事吾道付滄洲孫清州生日魏華父九十九峯下百二十年州西風吹起客夢月滿驛南樓影入天河左界辰在夀星向上還是去年秋要和木蘭曲載酒夀君侯天邉信雲外步去難留夀觴庭院依舊已帶别離愁離合鍾情未免富貴關人何事浪白世間頭將相時來身健百無憂劉靜甫殘臘捲愁去春至莫間愁榮枯會有成説無處著機謀身世石中敲火富貴草頭垂露何用苦貪求三尺布衣劍千載赤松遊憶親朋方丱角總白頭羊腸世路巇嶮莫莫且休休選甚范侯高爵遮莫陶公巨産爭似五湖舟萬事付蝸角止坎謾乘流傅公謀草草三間屋愛竹旋添栽碧紗窗户眼前都是翠雲堆一月山翁高卧踏雪水村清冷木落逺山開唯有平安竹留得伴寒梅家童開門看有誰來客來一笑清話煮茗更傳杯有酒只愁無客有客又愁無酒酒熟且徘徊明日人間事天自有安排辛幼安落日古城角把酒勸君留長安路逺何事風雪弊貂裘散盡黃金身世不管秦樓人怨歸計狎沙鷗明夜扁舟去和風載離愁功名事身未老幾時休詩書萬卷致身須到古伊周莫學班超投筆縱得封侯萬里憔悴老邉州何處依劉客寂寞賦登樓劍閣崔與之萬里雲間戍立馬劔門關亂山極目無際直北是長安人苦百年塗炭鬼哭三邉鋒鏑天道久應還手寫留屯奏炯炯寸心丹對青燈搔白髮漏聲殘老來勛業未就妨却一身間梅嶺緑隂青子蒲澗清泉白石怪我舊盟寒烽火長安報歸夢到家山獻田都統劉之翰夷堅支丙涼露洗金井一葉下梧桐謫仙浪遊何事華髮作詩翁烏帽蕭蕭一幅坐對清泉白石矯首撫長松獨鶴歸來晚聲在碧霄中神仙宅留玉節駐金狨黔南一道十萬貔虎控雕弓笑折碧荷倒影自唱采蓮新曲詞句滿秋風劍佩八千嵗長入大明宫田世輔為金州都統制荆南人劉之翰者待峽州逺安主薄闕作此詞獻之田覽之大喜致書約來金城欲厚加資給之翰遽亡明年田出門武見之翰立道左泣曰人鬼殊塗公能恤吾家亦足表踐言之義忽不見田大驚異亟送千緍與其孤長江二友頥堂長江飛鳥外明月衆星中今來古往如此人事幾般風又對團團紅樹獨跨寒驢歸去山水淡丰容逺色動愁思不見兩詩翁酒如澠談如綺氣如虹當時痛飲狂醉只許賞心同響絶光沉休問俯仰之間陳迹我亦老飄蓬望久碧雲晚一鴈度寒空時方旱祈雨大作胡幼黃有喜君初度風雨作秋聲連旬烈日稻畦麥壠欲揚塵好是天瓢在手笑把羣龍呵叱四野注如傾勃勃生意滿翠浪湧縱橫君知否仁者夀夀斯仁自從三代而下民命寄蒼旻滿目桑麻谷粟滿目簿書期會試説與仁人小試作霖手蘇醒永新民談秋堂方平冨貴在何許五十已平頭人生得失且笑休遣兩眉愁管甚輪雲世變管甚風波世態沙渚且盟鷗止即儘教止流即儘教流田可秫山可蔌又何求問天只覔窮健遊戲八千秋好對梅花如粉細剪燭花如豆不改舊時遊翠袖更能舞騎鶴上揚州遊龍門元遺山灘聲蕩高壁秋氣靜雲林回頭洛陽城闕塵土一何深前日神光牛背今日春風馬耳因見古人心一笑青山底未受二毛侵問龍門何所似似山隂平生夢想佳處留眼更登臨我有一巵芳酒喚取山花山鳥伴我醉時吟何必絲與竹山水有清音賀人新娶集曲名哀長吉紫陌風光好繡閣綺羅香相將人月圓夜早慶賀新即先自少年心意為惜殢人嬌態久俟願成雙此夕于飛樂共學燕歸梁索酒子迎仙客醉紅妝訴忠情處些兒好語意難忘但願千秋嵗裏結取萬年歡會恩愛應天長行喜長春宅蘭玉滿庭芳清湖三塔記屏間金孔雀褥隱繡芙蓉洞房花燭夜玳筵席靄香風盈耳笙歌繚繞滿眼綺羅交錯銀燭影搖紅佳期今夕裡談笑畫堂中皓齒歌細腰舞樂無窮朱簾高捲金爐香噴瑞煙濃仙子將臨鳯閣玉女下離蓬島同會蕊珠宫門闌多喜色女壻近乘龍和李泰發尚書泊舟嚴陵劉行簡千古嚴陵瀨清夜月荒涼水明沙淨波面一葉㺯孤光北望旄頭天際殺氣遙昏楚甸雲樹失青蒼愁絶未歸客衰鬢點吳霜聽江邉鳴寶瑟想英皇騎鯨仙裔高韻清絶勝風篁醉入無何境界却笑昔人底事逺慕白雲鄉不見咸陽道煙草茂陵荒送吳叔永文昌吳毅甫才惜季方去又更别元方驚心天上雙鳯接翅下高岡萬里瞿塘煙浪一片昭亭雲月渺渺正相望夜雨連風壑此意獨凄涼杜鵑聲猶不住攪離腸黃雞白酒吾亦歸興動家鄉人事紛紛難料世事悠悠難説何事問穹蒼肯落兒曹淚一笑付滄浪薄媚西子詞董頴入破第一窣湘裙搖漢珮步步香風起斂雙蛾論時事蘭心巧會君意殊珍異寶猶自朝臣未與妾何人被此隆恩雖令效死奉嚴旨隱約龍姿欣悅重把甘言説辭俊雅質娉婷天教汝衆美兼備聞吳重色憑汝和親應為靖邉陲將别金門俄揮粉淚靚粧洗第二虛摧飛雲駃香車故國難回睇芳心漸搖迤邐吳都繁麗忠臣子胥預知道為邦崇諌言先啓願勿容其至周亡褒姒商傾妲已吳王却嫌胥逆耳才經眼便深恩愛東風暗綻嬌蕊綵鸞翻妬伊得取次于飛共戲金屋看承它宫盡廢第三衮遍華晏夕燈搖醉粉菡蓞籠蟾桂楊翠袖含風舞輕妙處驚鴻態分明是瑤臺瓊榭閬苑蓬壺景盡移此地花繞仙步鶯隨管吹寶帳暖留春百和馥郁融鴛被銀漏永楚雲濃三竿日猶褪霞衣宿酲輕腕嗅宫花雙帶繫合心時波下比目深憐到底第四催拍耳盈絲竹眼搖珠翠迷藥事宫闈內爭知漸國勢陵夷姦臣獻佞轉恣奢淫天譴嵗屢飢從此萬姓離心解體越遣使隂窺虛實蚤夜營邉備兵未動子胥存雖堪伐尚畏忠義斯人既戮又且嚴兵卷土赴黃池觀釁種蠡方云可矣第五衮遍機有神征鼙一鼓萬馬襟喉地庭喋血誅留守憐屈服斂兵還元如此當除禍本重結人心爭奈竟荒迷戰骨方埋靈旗又指勢連敗柔荑擕泣不忍相拖棄身在兮心先死宵奔兮兵已前圍謀窮計盡唳鶴啼猿聞處分外悲舟縱近誰容再歸第六歇拍哀誠屢吐再東分賜垂暮日置荒隅心知愧寶鍔紅委鸞存鳯去辜負恩憐情不似虞姬尚望論功榮還故里降令曰吳亡赦汝越與吳何異吳土怨越方疑從公論合去妖類娥眉宛轉竟殞鮫鮹香骨委塵泥渺渺姑蘇蕪荒鹿戲第七然衮王公子青春更才美風流慕連理耶溪一日悠悠回首凝思雲鬟煙鬢玉珮霞裾依約露妍姿送目驚喜俄迃玉趾同仙騎洞府歸去簾櫳窈窕戲魚水正一點犀通遽别恨何已媚魄千載教人屬意况當時金殿裏排遍第八怒潮卷雪巍岫布雲越襟吳帶如斯有客經遊月伴風隨值盛世觀此江山美合放懷何事却興悲不為回頭舊谷天涯為想前君事越王嫁禍獻西施吳即中深機闔廬死有遺誓句踐必誅夷吳未干戈出境倉卒越兵投怒夫差鼎沸鯨鯢越遭勍敵可憐無幾脫重圍歸路茫然城郭丘墟飄泊積山裏旅魂暗逐戰塵飛天日慘無輝排遍第九自念平生英氣凌雲凌然萬里宣威那知此際熊虎塗窮來伴麋鹿卑棲既甘臣妾猶不許何為計爭若都燔寶器盡誅吾妻子徑將死戰決雌雄天意恐憐之偶聞太宰正檀權貪賂市恩私因將寶玩獻誠雖脫霜戈石室囚繫憂嗟又經時恨不如巢燕自由歸殘月朦朦寒雨蕭蕭有血都成淚備嘗險厄返邦畿寃憤刻肝脾第十攧種陳謀謂吳兵正熾越勇難施破吳策惟妖姬有傾城妙麗名稱西子嵗方笄算夫差惑此須致顛危范蠡微行珠貝為香餌苧蘿不釣釣深閨吞餌果殊姿素肌纎弱不勝羅綺鸞鏡畔粉面淡勻梨花一朵瓊壺裏嫣然意態嬌春寸眸剪水斜鬟鬆翠人無雙宜名動君王繡履容易來登玉升樂府雅詞載此詞于卷首以排遍第八第九第十居前而入破第一以後者次之余以其字句參差無所附麗且詠西施事無容分析也因照首章入此云瀟湘夜雨竹坡詞曉色凝暾霜痕猶淺九天春意將回隔年花信先巳到江梅沉水煙濃如霧金波滿紅袖雙垂仙翁醉問春何在春處玉東西瑶臺人不老逺從赤壁來步天墀且細看八磚花影遲遲會見朱顔緑鬢家長近咫尺天威君知否天教雨露常滿嵗寒枝和潘都漕九日詞江繞淮城雲昏楚觀一枝煙笛堆橫曉風吹帽霜日照人明暗惱潘即舊恨應誰念菊老殘英秋空曉茱萸細撚酃渌為誰傾人間真夢境新愁未了緑鬢星星問明年此會誰寄幽情倚盡一樓殘照何缺更月到簾旌憑闌久歌君妙曲誰是米嘉榮三楚尾江橫斗南山秀輞川誰畫新圖幾時天際平地出方壺應念江南倦客家何在飄泊江湖天教共銀濤翠壁相伴老人娛長淮看不盡風帆落處天在平蕪算人間此地豈是窮途好與婆娑盡日應須待月到金樞山中飲從教笑我白首醉模糊玉梅香慢寒色猶高春力尚怯微律先催梅拆曉日輕烘清風煩觸凝散數枝殘雪嫩英妬粉嗟素艷有蜂蝶同歇人人向我依然頓成離缺徘徊寸腸萬結又因花暗成凝咽撚蕊憐香不禁恨深難絶若是芳心解語應共把此情細細説淚滿闌干無言強折小聖樂元好問緑葉隂濃遍池亭水閣偏趂涼多海榴初綻朵朵蹙紅羅乳燕雛鶯㺯語對高栁鳴蟬相和驟雨過似瓊珠亂撒打遍新荷人生百年有幾念良辰美景休放虛過富貧前定何用苦張羅命友邀賔晏賞飲芳醑淺斟低歌且酩酊從教二輪來往如梭塞孤曉行栁耆卿一聲雞又報殘更歇秣馬巾車催發草草生人燈下别山路險新霜滑瑶珂響起栖烏金鐙冷敲殘月漸西風緊襟袖凄裂遙指白玉京望斷黃金闕逺道何時行徹算得佳人凝恨切應念念歸時節相見了執柔荑幽會處偎香雪免鴛衾兩恁虛設朱雍雪江明練靜波聲歇玉浦梅英初發隱隱瑶林堪乍别瓊路冷雲階滑寒枝晚已黃昏鋪碎影留新月向亭臯一任風冽歌起郢曲時目斷秦城闕逺道氷車清徹追念酥粧凝望切淡佇迎佳節應暗想日邉人聊寄與同歡悅勸清樽忍負盟設夢揚州少遊晚雲收正栁塘煙雨初休燕子未歸惻惻輕寒如秋小欄外東風軟透繡幃花密香稠江南逺人何處鷓鴣啼破春愁長記曽陪燕逰酬妙舞清歌麗錦纒頭殢酒困花十載因誰淹留垂鞭拂面歸來晚望翠樓簾捲金鈎佳會阻離情正亂頻夢揚州安陸浮雲樓廖世美靄靄春空畫樓森聳凌雲渚紫薇登覽最關情絶妙誇能賦惆悵相思遲暮記當日朱欄共語塞鴻難問岸栁何窮别愁芬絮催促年光舊來流水知何處斷腸何必更殘陽極目傷平楚晚霽波聲帶雨悄無人舟橫野渡數峯江上芳草天涯參差煙樹上元上朝以道吳大年樓雪初消麗譙吹罷單于晚使君千炬起班春歌吹香風暖十里珠簾盡捲正人在蓬壺閬苑賣薪買酒立馬傳觴升平重見誰識遨頭去年曽侍傳柑晏至今衣袖帶天香行處氤氲滿巳是春宵苦短且莫遣歡遊意懶細聽歸路璧月光中玉簫聲逺梅苑點點飛香見梅知道春心透怕寒不捲玉樓簾羞與花同瘦手撚青枝頻嗅誚冷落薔薇金斗翻驚緑鬢不似芳姿年年依舊才破凝酥滿園桃李看看又江南幽夢了無啼痕暈殘襟袖鴛被有誰溫繡怎敢更十分殢酒伴君獨自幾箇黃昏月明時候上元有懷張材甫雙闕中天鳯樓十二春寒淺去年元夜奉宸遊曽侍瑶池宴玉殿珠簾盡捲擁羣仙蓬壺閬苑五雲深處萬燭光中揭天絲管馳隙流年恍如一瞬星霜換今宵誰人泣孤臣回首長安逺可是塵緣未斷謾惆悵華胥夢短滿懷幽恨數點寒燈幾聲歸鴈盱江有懷趙文鼎桃李墻頭向人都似他年意舞絲千丈揚晴光駘蕩春無際花氣薰然自醉傍垂楊行行緩轡倦遊無奈回首雲山歸期猶未孟鎖樓空鳥啼花外東風起少年恩怨付波流臨望朱闌倚冉冉塵生客袂對尊前高情暫寄洞天一笑仙馭乘空姑峯凝翠閨情孫夫人乳燕穿簾亂鶯啼樹清明近隔簾時度栁花飛猶覺寒成陳長記眉峯偷隱臉桃紅難藏酒暈背人微笑半嚲鸞叉輕籠蟬鬢别久啼多眼應不似當年俊滿園珠翠逞春嬌沒箇他風韻若見賔鴻試問待相將綵箋寄恨幾時得見鬪草歸來雙鴛微潤侑舒信道中丞懶堂女子緑淨湖光淺寒先到芙蓉島謝池幽夢屬才郎幾度生春草塵世多情易老更那堪秋風嫋嫋晚來羞對香芷汀洲枯荷池沼恨鎖橫波逺山淺黛無心掃湘江人去嘆無依此意從誰表喜趂良宵月皎况難逢人間兩好莫辭沉醉醉入屏山吳歌天曉熙州慢送述古張子野武林鄉占第一湖山詠畫爭巧鷲石飛來倚翠樓煙靄清猿啼曉况值禁垣師帥惠政流入歌謠朝暮萬景寒潮㺯月亂峯回照天使尋春不早並行樂免有花愁花笑持酒更聽紅兒肉聲長調瀟湘故人未歸但目送遊雲孤鳥際天杪離情盡寄芳草望雲間代州南樓趙獻之雲朔南陲全趙寶符河山襟帶名藩有朱樓縹眇千雉回旋雲度飛狐絶險天圍紫塞高寒弔興亡遺迹咫尺西陵煙樹蒼然時移事改極目春心不堪獨倚危欄惟是年年飛鴈霜雪知還樓上四時長好人生一世誰間故人有酒一尊高興不減東山卓牌兒万俟雅言東風緑楊天如畫出清明院宇玉艷淡薄梨花帶月燕支冷落海棠經雨單衣怯黃昏人正在珠簾笑語相並戲蹴秋千共擕手同倚闌干暗香時度翠窗繡户路繚繞潛通幽處斷魂凝佇嗟不似飛絮間悶間愁難消遣此日年年意緒無據奈酒醒春去早梅香北帝收威又探得早梅漏春消息粉蕊瓊苞擬將胭脂輕染顔色素質盈盈終不許雪霜欺得奈化工偏冝賦與夀陽粧飾獨自逞氷姿比夭桃繁杏殊别為報山翁逢此有花樽前且須攀折醉賞吟戀莫辜負好天風月恐笛聲悲紛紛便似亂飛香雪塞垣春秋怨周美成暮色分平野傍葦岸征帆卸煙村極浦樹藏孤館秋景如畫漸别離氣味難禁也更物象供瀟灑念多才渾衰減一懷幽恨難寫追念綺􅣘人天然自風韻嫻雅竟夕起相思謾嗟怨遙夜又還將兩袖珠淚沉吟向寂寞寒燈下玉骨為多感瘦來無一把步月史達祖剪栁章臺問梅東閣醉中擕手初歸逗香簾下璀璨鏤金衣正依約氷絲射眼更荏苒蟾玉西飛輕塵外雙鴛細蹙誰賦洛濵妃霏霏紅霧繞步搖共鬢影吹入花圍管絃將散人靜燭籠稀泥私語香攖乍破怕夜寒羅襪先知歸來也相偎未肯入重幃漢宫春朝叔用黯黯離懷向東門繫馬南浦移舟薰風亂飛燕子時下輕鷗無情渭水問誰教日日東流常是送行人去後煙波一向離愁回首舊遊如夢記踏青殢飲拾翠狂逰無端綵雲易散覆水難收風流未老拚千金重入揚州應又似當年載酒依前名占青樓康伯可雲海沉沉峭寒收建章雪殘鳷鵲華燈照夜萬井禁城行樂春隨鬢影映參差栁絲梅蕚丹禁杳鰲峯對聳三山上通寥廓春衫繡羅香薄步金蓮影下三千綽約氷輪桂滿皓色冷浸樓閣霓裳帝樂奏升平天風吹落留鳯輦通宵宴賞莫放漏聲間却梅花李漢老瀟灑江梅向竹梢踈處橫兩三枝東君也不愛惜雪壓霜欺無情燕子怕春寒輕失花期惟是有南來塞鴈年年長見開時清淺小溪如練問玉堂何似茅舍踈籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知沈會宗别酒初醒似一畨夢覺屈指堪驚猶疑送消寄息遇著人聽當初喚作據眼前略略看承及去了從頭想伊心下始覺寧寧黃昏畫角重城更傷高念逺懷抱何勝良時好景算來半為愁生幽期暫阻便就中月白風清千萬計年年斷除不得是這些情上元前一日立春京仲逺暖律初回又燒燈市井賣酒樓臺誰將星移萬點月滿千街輕車細馬隘通衢蹴起香埃今嵗好土牛作伴挽留春色同來不是天公省事要一時壯觀特地安排何妨綵樓鼓吹綺席樽罍良宵勝景語邦人莫惜徘徊休笑我癡頑不去年年爛醉金叉梅苑梅蕚知春見南枝向暖一朵初芳氷清玉麗自然賦得幽香煙庭水榭更無花爭染春光休謾説桃夭杏冶年年蝶閙蜂忙立馬佇凝情久念美人自别鱗羽茫茫臨岐記伊尚帶宿酒殘粧雲踈雨潤怎知千里思量除是託多情驛使殷勤折寄仙鄉二點點江梅對寒威強出一㺯新竒零珠碎玉為誰密上南枝幽香冷艷縱孤高却遣誰知惟只有江頭驛伴征鞍獨為遲遲聊撚粉香重問問春來甚日春去何時移將院落算應未肯頭低無人共折傍溪橋雪壓霜欺君不見長安陌上只誇桃李芳菲張子野紅粉苔墻透新春消息梅粉先芳竒葩異卉漢家宫額塗黃何人鬪巧運紫檀剪出蜂房應為是中央正色東君别與清香仙姿自稱霓裳更孤標俊格非雪凌霜黃昏院落為誰密解羅囊銀瓶注水浸數枝小閣幽窗春睡起纎條在手厭厭宿酒殘粧二玉減香銷被嬋娟誤我臨鏡粧慵無聊強開強解蹙破眉峯憑高望逺但斷腸殘月初鍾須信道承恩不在貌如何教妾為容風暖鳥聲和碎更日高院靜花影重重愁來待只殢酒酒薄愁濃長門怨感恨無金買賦臨笻翻動念年年伴女越溪共採芙蓉仙詞或云洞賔橫笛聲沉倚危樓紅日江轉天斜黃塵邉火澒洞何處吾家胎禽怨夜來乘風玄露丹霞先生笑飛空一劍東風猶自天涯情知道山中好早翠囂含隱瑶草新芽青溪故人信斷夢颷車乾坤星火歸來了煮石煎沙回首處幅巾蒲帳雲邉獨是桃花見庶菴老學叢談陽臺路旅情栁耆卿楚天晚墜冷風敗葉踈紅零亂冒征塵匹馬驅區愁見水遙山逺追念年時正恁鳯幃倚香偎暖嬉逰慣又豈知前歡雲雨分散此際空勞回首望帝里難收淚眼暮煙衰草算暗鎖路岐無限今宵又依前寄宿甚處葦村山館寒燈半夜猒猒憑何消遣暗香薑白石舊年月色算幾畨照我梅邉吹笛喚起玉人不管清寒與攀摘何遜而今漸老都忘却春風詞筆但怪得竹外踈花香冷入瑤席江國正寂寂嘆寄路遙夜雪初積翠樽易泣紅蕚無言耿相憶長記曽擕手處千樹壓西湖寒碧又片片吹盡也幾時見得張叔夏羽音寂寞怪虛簾晝悄近來無鵲水葉吹寒極目凝思倚江閣不信相如便老猶未減當時遊樂但趂他鬪草籌花終是帶離索憶昨更情惡謾認著梅花是君還錯石牀冷落間掃松隂與誰酌一自飄零去輕誤了燈前深約從到此歸未得幾曽忘却西子粧張炎白浪搖天青隂漲地一片野情幽意楊花點點是春心替風前萬華吹泪遙岑寸碧有誰看朝來清氣自沉吟甚流光輕把繁華如此斜陽外隱約孤村隔塢間門閉漁舟何似莫歸來想桃源路通人世危橋靜千年事都消一醉謾依依愁落鵲聲萬里黃鶯兒栁耆卿園林晴晝春誰主暖律潛催幽谷暄和黃鸝翩翩乍遷芳樹觀露濕縷金衣葉映如簧語曉來枝上綿蠻似把芳心深意低訴無據乍出暖煙來又趂遊蜂去恣狂蹤迹兩兩相呼黃昏霧吟風舞當上苑栁濃時别館花深處此際海燕偏饒都把韶光與王晉卿多情春意芳時節北圃人來傳道江梅依稀芳姿數枝新發誇嫩臉著胭脂膩骨凝香雪問伊還記年時正好相看因甚輕别情切往事散浮雲舊恨成華髮算知空對綺檻雕闌孜孜望人攀折愁未見苦思量待見重端疊願與永效高唐雲雨芳菲月鳯凰臺上憶吹簫朝無咎千里相思况無百里何妨暮往朝還又正是梅初淡佇鶯未綿蠻陌上相逢緩轡風細細雲日斑斑新晴好得意未妨行盡春山應擕後房小妓來為我盈盈對舞花間便拚却松醪翠滿密炬紅殘須信征鞍射虎清世裏曽有人間都休説簾外夜久春寒張臺卿長天霞散逺浦潮平危闌注目江臯長記年年榮遇同是今朝金鑾兩回命相對清光頻許揮毫雍容久正茶杯初賜香袖時飄歸去玉堂深夜泥封罷金蓮一寸才燒帝語丁寧曽被華衮親褒如今謾勞夢想嘆塵蹤杳隔仙鰲無聊意強當歌對酒怎消梅侯彥周浴雪精神倚風情態百端邀勒春還記舊隱溪橋日暮驛路泥乾曽伴先生蕙帳香細細粉瘦瓊間傷半落一夜夢回腸斷家山空教映溪帶月供遊客無情折滿雕鞍便忘了明窗靜几筆硯同歡莫向高樓噴笛花似我蓬鬢霜斑都休説今夜倍覺清寒李易安香冷金猊被翻紅浪起來慵自梳頭任寶奩塵滿日上簾鈎生怕離懷别苦多少事欲説還休新來瘦非干病酒不是悲秋休休這回去也千萬遍陽關也則難留念武陵人逺煙鎖秦樓惟有樓前流水應念我終日凝眸凝眸處從今又添一段新愁國香蘭花張炎空谷幽人曳氷簮霧帶古意生春結根倦隨蕭艾獨抱孤真自分生涯淡薄隱蓬蒿甘老山林風煙共憔悴冷落吳宫草暗花深霽痕消蕙雲向崖隂飲露應是知心所思何處滿楚水湘雲肯信遺芳千古依依澤畔行吟香魂幾成夢短操誰彈月冷瑤琴醉蓬萊慶老人星現栁耆卿漸亭臯葉下隴首雲飛素秋新霽華闕中天鎖蔥蔥佳氣嫩菊黃深拒霜紅淺近寶階香砌玉宇無塵金莖有露碧天如水正值升平萬機多暇夜色澄鮮漏聲迢遞南極星中有老人呈瑞此際宸遊鳯輦何處度管絃聲脆太液波翻披香簾捲月明風細永為屯田員外郎會太史奏老人星見時秋霽晏禁中仁宗命左右詞臣為樂章內侍屬栁應制栁方冀進用作此詞奏呈上見首有漸字色若不懌讀至宸遊鳯輦何處乃與御製真宗挽詞暗合上慘然又讀至太液波翻曰何不言波澄投之於地自此不復擢用上已日有懷葉少蘊問春風何事斷送繁紅便拚歸去牢落征途笑行人羈旅一曲陽關斷雲殘靄做渭城朝雨欲寄離愁緑隂千囀黃鸝空語遙想湖邉浪搖空翠絃管風高亂花飛絮曲水流觴有山翁行處翠袖朱欄故人應也㺯畫船煙浦會寫相思尊前為我重畨新句中秋謝幼槃望晴峯染黛暮靄澄空碧天無漢圓鏡高飛又一年秋半皓色誰同歸心暗折聽唳雲孤鴈向月停杯錦袍何處一尊無伴好生南鄰詩盟酒社刻燭爭成引觴愁緩今夕樓中繼阿連清玩飲劇狂歌歌終起舞醉冷光零亂樂事難窮踈星易曉又成浩歎万俟雅言正波泛銀漢漏滴銅壺上元佳致綘燭銀燈若繁星連綴明月逐人暗塵隨馬盡五陵豪貴鬢惹烏雲裙拖湘水誰家姝麗金闕南邉綵山北面接地羅綺沸天歌吹六曲屏開擁三千珠翠帝樂方深鳯爐煙噴望舜顔瞻禮太平無事君臣晏樂黎民歡醉夀參政劉圻父正霜浮菊淺露染楓深九秋佳景梅報南枝一點和羮信峻嶽生申太山瞻魯瑞啓千年運飛帛奎文儀皇韶祉明良相慶嵗值豐登道方開泰塞騎塵收海鯨波靜幾斗璿樞仰三階平正保定乾坤親扶日月萬宇同歌詠比夀彭聃侔勳周召致君堯舜夀郁梅野梅城倚東風笑問落紅啼鴂清明來未小雨㺯晴做輕寒天氣南極光中五雲深處人慶千秋嵗翡翠屏間琉璃簾下綵衣明媚九老風流五侯家數如此乾坤有人如此天正煩君作江南一瑞世上今泰山中古晉儘不經吾意但要牡丹年年今日伴人沉醉趙德莊向蓬萊雲渺姑射山深有春長好香滿枝南笑人間驚早試問寒柯鏤氷裁玉費化工多少東閣詩成西湖夢覺幾畨清曉好是羅緯麝溫屏暖却恨煙村雨愁風惱一一清芬為東君傾倒待得明年翠隂青子蔭鳯凰池沼更把陽和從頭付與繁花芳草吕聖求任落梅鋪綴鴈齒斜橋裙腰芳草間伴遊絲過曉園庭沼厮近清明雨晴風軟稱少年尋討碧縷墻頭紅雲水面栁堤花島誰信而今怕愁憎酒對著花枝自踈歌笑鶯語丁寧問甚時重到夢筆題詩帊綾封淚向鳯簫人道處處傷心年年逺念惜春人老夀史令人篁粟正花深繡閣帶拂流蘇暖簾初試窈窕笙歌擁新鮮珠翠艷菊留金早梅催粉趂得瑶池會畫館凝香仙家正住芙蓉城裏裼寢開祥玉枝祝夀列院歡娛滿堂佳瑞福夀雙星現碧霄雲際京兆時收如臯樂事占世間榮貴象服魚軒疏封大國齊眉千嵗碧牡丹李致逺破鏡重圓分叉合鈿重尋繡户珠箔説與從前不是我情薄都緣利役名牽飄蓬無定翻成輕負别後情懷有萬千牢落經時最苦分擕都為伊甘心寂寞縱滿眼間花媚栁終是強歡不樂待憑鱗羽説與相思水逺天長又難托而今幸以再逢把輕離斷却聲聲慢夏景劉巨濟梅黃金重雨細絲輕園林霧煙如織殿閣風微簾外燕喧鶯寂池塘彩鴛戲水露荷翻千點珠滴間晝永稱瀟湘竿叟爛柯仙客日午槐隂低轉茶甌罷清風頓生雙腋碾玉盤深朱李靜沉寒碧朋儕間歌白雪卸巾紗樽爼狼籍有皓月照黃昏眠又未得宋徽宗宫梅粉淡岸栁金勻皇州乍慶春回鳯闕端門鰲山彩締蓬萊沉沉洞天向晚寶輿還花滿鈞臺輕煙裏算誰將金蓮陸地齊開是處笙歌鼎沸雕鞍趂金輪隱隱輕雷萬家羅幕千步錦繡相挨銀蟾夜色如晝共乘歡爭忍歸來踈鐘斷聽行歌猶在禁街御製欺寒衝暖占早爭先江梅又報南枝暗香浮動偏宜映月臨池天然素肌瑩骨笑等間桃李芳菲勞夢想似玉人羞懶㺯粉粧遲常恐行歌聲斷猶堪恨無情塞管輕吹寄逺丁寧折贈隴首雲飛前村夜來雪裏殢東君須索饒伊爛熳也算百花猶自未知石孝友花前月下好景良辰厮守日許多時正美之間何事便有輕離無端珠泪暗蔌染征衫點點紅滋最苦是殷勤密約做就相思咿啞櫓聲離岸魂斷處高城隱隱天涯萬水千山一去定失花期東君鬬來無賴散春紅點破梅枝病成也到而今著箇甚醫和吳夢窗賦梅吳毅甫挨晴拶暖載酒呼朋夷猶東圃西園緑蕚枝頭兩三初破輕寒平生自甘寂寞占冷妝不為人妍林逋去問影踈香暗誰賦其間空想故山竒事正煙橫嶺曲月浸溪灣杏錯桃訛那時青子都圓惟曉夢窗知處對翠禽依約神仙休引角怕征人淚落腮邉曹元寵重簷飛峻麗綵橫空繁華壯觀都城雲母屏開八面人在青冥憑欄瑞煙深處望皇居遙識蓬􅌡回環道五花相鬬壓盡旗亭歌酒長春不疚金翠照羅綺笑語盈盈陸海人山輻輳萬國歡聲登臨四時總好况花朝月白風清豐年樂嵗熙熙且醉太平秋聲蔣竹山黃花深巷紅葉低窗凄涼一片秋聲逗雨深聲來中間夾帶風聲踈踈二十五點麗譙門不鎖更聲故人逺問誰搖珮簷低鈴聲彩角聲吹月望漸連營馬動四起笳聲閃爍鄰燈燈前尚有砧聲知他訴愁到曉碎噥噥多少巷聲訴未了把一半分與鴈聲閠重九飲郭園吳君特檀欒金碧婀娜蓬萊遊雲不蘸芳洲露栁霜蓮十分點綴殘秋新彎畫眉未穩似含羞低度墻頭秋送逺駐西臺車馬共惜臨流知道池亭多宴掩庭花長是驚落秦謳􅕹粉闌干猶聞憑袖香留輸他翠漣拍甃瞰新粧終日凝眸簾半捲帶黃花人在小樓元遺山林間雞犬江上村墟扁舟處處經過袖裏新詩買斷古朩滄波山中一花一草也留教老子婆娑任人笑風雲氣少兒女情多不待求田問舍被朝吟暮醉慣得蹉跎百尺高樓更問平地如何朝來斜風細雨喜紅塵不到漁蓑一尊酒喚元龍來聽浩歌元夕高賔王壺天不夜寶炬生香光風蕩搖金碧月艷氷痕花外峭寒無力歌傳翠簾盡捲誤驚回瑤臺仙迹禁漏促拚千金一刻未酬佳夕捲地香塵不斷最得意輸它五陵狂客楚栁吳梅無限眼邉春色鮫綃暗中寄與待重尋行雲消息乍醉醒怕南樓吹斷曉笛李易安尋尋覔覔冷冷清清悽悽慘慘戚戚乍暖還寒時候正難將息三杯兩杯淡酒怎敵他晚來風急鴈過也縱傷心却是舊時相識滿地黃花堆積憔悴損如今有誰忺摘守著窗兒獨自怎生得黑梧桐更兼細雨到黃昏點點滴滴這次第怎一箇愁字了得八聲甘州旅情栁耆卿對瀟瀟暮雨灑江天一畨洗清秋漸霜風凄緊關河冷落殘照當樓是處紅衰緑減苒苒物華休惟有長江水無語東流不忍登高臨逺望故鄉渺渺歸思難收嘆年來蹤迹何事苦淹留想佳人妝樓凝望誤幾回天際識歸舟爭知我倚闌干處正恁凝愁送參寥子蘇東坡有情風萬里捲潮來無情送潮歸問錢塘江上西河浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣追和東坡韻朝無咎謂東坡未老賦歸來天未遣公歸向西湖兩處秋波一種飛靄澄暉又擁竹西歌吹僧老朩蘭非一笑千秋事浮世危機莫倚平山欄檻是醉翁飲處江雨霏霏送孤鴻揮手相接眼中稀念平生相從江海任飄蓬不遣此心違登臨事更何須惜吹帽淋衣中秋夜作張功甫歎流光迅景百年間能醉幾中秋正凄蛩鳴砌驚烏翻樹煙淡蘋洲誰喚金輪出海不帶一雲浮才上青林頂低轉朱樓人老歡情宜減料素娥信我不為間愁念幾畨清夢常是故鄉留倩風前數聲橫管呌玉鸞騎向碧空遊誰能顧黍炊榮利蟻戰怨讐程正伯問東君既解遣花開不合放花飛念春風枝上一分花減一半春歸忍見千紅萬翠容易漲桃溪花自隨流水無計追隨不忍憑高南望記舊時行處芳意菲菲歎年來春減花與故人非縱使梁園賦在奈長卿老去亦何為搔首亂雲堆裡立盡斜暉朱雍聽琤琤漏永洗銀林梅英半寒收正蟾輝舒粉雲容縷色切近粧樓人在東風佇立悄悄獨凝眸多少橫斜影縈繞江流只有清香暗度墮髻簮珥玉曽賦清遊認瑤車氷輒佳致肯延留指蓬山丹砂初轉望滄溟羽佩一同舟仙娥許酒澠與我消盡春愁留客住栁耆卿偶登眺憑小樓艷陽時節乍晴天氣是處間花芳草遙山萬疊雲散漲海千里潮平波浩渺煙村院落是誰家緑樹數聲啼鳥旅情悄逺信沉沉離魂杳杳對景傷懷度日無言誰表惆悵舊歡何處後約難憑看看春又老盈盈淚眼望仙鄉隱隱斷霞殘照雪月交光劉行簡正五雲飛杖縞練纎裳亂空交舞拂石歸來向玉階微步欲喚氷娥暫憑風使為掃氛驅霧漸見停輪人間未識高空真侣千里無塵地連天向倦客西來路迷江樹故國煙深想溪橋何處雲鬢分行翠眉縈曲對夜寒樽爼清影徘徊端應坐有風流能賦慶千秋歐慶嗣點檢堯蓂自元宵過了兩莢初飛蔥蔥鬱鬱佳氣喜溢庭闈唯知降月裏姮娥欣對良時但見婺里騰瑞彩年年輝映南箕好是庭階蘭玉伴一枝丹桂戲舞萊衣椒觴迭將捧獻歌曲吟詩如王母欵對羣仙同晏瑤池萱草茂長春不老百千祝夀無期花草稡編卷十八

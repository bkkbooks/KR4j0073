body:
  text: 花草稡編卷一明陳耀文輯小令蒼梧謡餞劉恭父張安國歸十萬人家兒樣啼公歸去何日是來時二歸獵獵薰風捲繡旗攔教住重舉送行杯三歸數得宣麻拜相時秋前後公衮更萊衣十六字令窗月周晴川天機餘錦眼月影穿窗白玉錢無人弄移過枕函邊間中好鄭夢復間中好盡日松為侣此趣人不知輕風度僧語二段成式間中好塵務不縈心坐對當窗木看移三面隂三張善繼間中好幽磬度鐘遲卷上論題肇畫中僧姓支醉公子樂府詩集昨日春園飲今朝倒接㒿誰人扶上馬不省下樓時一片子栁色青山映梨花雪鳥藏緑窗桃李下間坐歎春芳望夫歌即羅嗊曲劉採春雲溪友議不喜秦淮水生憎江上船載兒夫壻去經嵗又經年二借問東園栁枯來得幾年自無枝葉分莫怨太陽偏三莫作商人婦金叉當卜錢朝朝江口望錯認幾人船四那年離別日只道往桐廬桐廬人不見今得廣州書五昨日勝今日今年老去年黃河清有日白髮黑無緣六昨夜北風寒牽船浦裏安潮來打纜斷搖櫓始知難明月斜景德寺僧房吕洞賔詩話總龜明月斜秋風冷今夜故人來不來教人立盡梧桐影南歌子裴識雲溪友議不是廚中串爭知炙裏心井邊銀釧落展轉恨還深二不信長相憶擡頭問取天風吹荷葉動無夜不搖蓮三簳蠟為紅燭情知不自由細絲斜結網爭奈眼相鈎醉粧詞蜀王衍者邊走那邊走只是尋花栁那邊走者邊走莫厭金杯酒北夢瑣言云蜀後主裹小巾其尖如錐宫妓多衣道服簪蓮花冠施胭脂夾臉號醉粧作此詞南歌子溫庭筠􅀢墮低梳髻連娟細掃睂終日兩相思為君憔悴盡百花時二轉眄如波眼娉婷似栁腰花裏暗相招憶君腸欲斷恨春宵三懶拂鴛鴦枕休縫翡翠裙羅帳罷爐燻近來心更切為思君張泌栁色遮樓暗桐花落砌香畫堂開處晚風涼髙捲水晶簾額襯斜陽二岸栁拖煙緑庭花照日紅數聲蜀魄入簾櫳驚斷碧窗殘夢畫屏空溫飛卿鏡水夜來秋月如雪採蓮時小娘紅粉對寒浪惆悵正思維二楚女欲歸南浦朝雨濕愁紅小船搖漾入花裏波起隔西風荷葉杯顧敻春盡小庭花落寂寞憑檻斂雙睂忍教成病憶佳期知摩知知摩知二記得那時相見膽顫鬢亂四肢柔泥人無語不擡頭羞摩羞羞摩羞三夜久歌聲怨咽殘月菊冷露微微看看濕透縷金衣歸摩歸歸摩歸四金鴨香濃鴛被枕膩小髻簇花鈿腰如細栁臉如蓮憐摩憐憐摩憐五一去又乖期信春盡滿院長莓苔手拈裙帶獨排徊來摩來來摩來甘露歌古祝英臺集句王介甫折得一枝香在手人間應未有疑是經春雪未消今日是何朝二盡日含毫難比興都無色可並萬里晴天何處來真是屑瓊瑰三天寒日暮山谷裏的礫愁成水地上漸多枝上稀唯有故人知北邙月妙香洞微志勸君酒莫辭花落拋舊枝只有北邙山下月清光到死也相隨鄭繼超遇田參軍贈妓曰妙香數年告別歌此詞送酒翌日同至北邙下化狐而去三臺令一名翠華引王建池北池南草緑殿前殿後花紅天子千秋萬嵗未央明月清風二魚藻池邊射鴨芙蓉苑裏看花日色赭黃相似不著紅鸞扇遮開元樂沈存中侯鯖録鳷鵲樓頭日暖蓬萊殿裏花香草緑煙迷步輦天髙日近龍床二按舞驪山影裏回鸞渭水光中玉笛一天明月翠華滿陌東風三樓上正臨宫外人間不見仙家寒食輕煙薄霧滿城明月梨花四殿後春旗簇仗樓前御隊穿花一片紅雲鬧處外人遙認官家括元豐中為翰林學士有詞四首裕陵賞愛之晴偏好李霜涯平湖千頃生芳草芙蓉不照紅顛倒東坡道波光瀲灧晴偏好西湖雖有山泉而大旱亦嘗龜坼嘉熙庚子水涸茂草生焉祈雨無應李戲作此邏者廉捕之不得摘得新皇甫松酌一巵須教玉笛吹錦筵紅爉燭莫來遲繁紅一夜經風雨是空枝二摘得新枝枝葉葉春管絃兼美酒最關人平生都得幾十度展香茵雙雁兒楊補之窮隂急景暗推遷減緑鬢換朱顔利名牽役幾時間又還驚一嵗圓二勸君今夕不須眠且滿滿泛觥船大家沈醉對芳筵願新年勝舊年三休驚明日嵗華新且喜得又逢春北堂歌舞奉慈親願遐齡等大椿十愛詞鄭子聃我愛沂陽好民淳訟自稀誰言珥筆混萊夷行見離離秋草鞠圜扉齊乘云齊州俗有登萊沂密腦後插筆之語金末子聃知沂州民淳訟簡故作此詞云春曉曲朱希真西樓落月雞聲急夜浸疏香淅瀝玉人酒渴嚼春冰曉色入簾橫寶瑟西樓月即春曉曲張仲宗瑶軒倚檻春風度栁垂煙花帶露半間鴛被怯餘寒燕子時來窺繡户搗練子聞砧李後主深院靜小庭空斷續寒砧斷續風無奈夜長人不寐數聲和月到簾櫳蘭畹曲會又春恨雲鬢亂晚粧殘帶恨睂兒逺岫攢斜托香腮春筍懶為誰和淚倚欄杆秦少遊心耿耿淚雙雙皎月清風冷透窗人去秋來宫漏永夜深無語對銀釭桂殿秋向伯恭秋色裏月明中紅旌翠節下蓮宫蟠桃已結瑶池露桂子初開玉殿風漁父張志和西塞山前白鷺飛桃花流水鱖魚肥青箬笠緑蓑衣斜風細雨不須歸二釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不曾憂三霅溪灣裏釣魚翁舴艋為家西復東江上雪浦邊風笑著荷衣不歎窮四松江蟹舍主人歡菰飯蓴羮亦共飱楓葉落荻花乾醉宿漁舟不覺寒五青草湖中月正圓巴陵漁父棹歌連釣車子掘頭船樂在風波不用仙新唐書云志和字子同始名龜齡十六擢明經肅宗特見賞重因賜名後坐事貶南浦尉不復仕居江湖自稱煙波釣徒著玄真子亦以自號每垂釣不設餌志不在魚也嘗撰漁歌憲宗圖真求其歌不能致西吳記云湖州磁湖鎮道士磯即張志和所謂西塞山前也志和有漁父詞刺史顔真卿與陸鴻漸徐士衡李成矩共唱和二十五首遞相唱和李德裕玄真子漁歌記云德裕頃在內庭伏覩憲宗皇帝寫真訪求玄真子漁歌嘆不能致余世與玄真子有舊早聞其名又感明主賞異愛才見思如此每夢想遺迹今乃獲之如遇良寶於戲漁父賢而名隱鴟夷智而功髙未若玄真隱而名彰顯而無事其嚴光之比與處二子之間誠有裕矣張松齡樂在風波釣是間草堂松桂已堪攀太湖水洞庭山狂風浪起且須還松齡玄真子之兄也懼其放浪不返和其詞以招之李珣避世垂綸不記年官髙爭得似君間傾白酒對青山笑指柴門帶月還和凝白芷汀寒立鷺鷥蘋風輕剪浪花時煙羃羃日遲遲香引芙蓉惹釣絲題供奉衛賢春江釣叟圖二首李後主金索書閬苑有情千里雪桃李無言一隊春一壺酒一竿身快活如儂有幾人二一棹春風一葉舟一綸繭縷一輕鈎花滿渚酒滿甌萬頃波中得自由見五代畫品補遺髙宗唐溪詩話水涵微雨湛虛明小笠輕蓑未要晴明鑑裏縠紋生白鷺飛來空外聲管仲姬人生貴極是王侯浮利浮名不自由爭得似一扁舟弄月吟風歸去休夢江南即望江南一名憶江南夢遊仙謝秋娘白樂天江南好風景舊曾諳日出江花紅勝火春來江水緑如藍能不憶江南劉禹錫春去也多謝洛城人弱栁風從疑舉袂叢蘭裛露似霑巾獨笑亦含嚬溫飛卿梳洗罷獨倚望江樓過盡千帆皆不是斜暉脈脈水悠悠腸斷白蘋洲二千萬恨恨極在天涯山月不知心裏事水風空落眼前花搖曳碧雲斜採蓮子皇甫松菡萏香連十頃陂舉棹小姑貪戲採蓮遲年少晚來弄水船頭濕舉棹更脫紅裙裹鴨兒年少二船動湖光灧灧秋舉棹貪看年少信船流年少無端隔水拋蓮子舉棹遙被人知半日羞年少章臺栁寄栁氏韓翃章臺栁章臺栁往日依依今在否縱使長條似舊垂亦應攀折他人手又答韓員外楊栁枝芳菲節可恨年年贈離別一葉隨風忽報秋縱使君來豈堪折楊栁枝白居易一樹春風萬萬枝嫩於金色軟於絲永豐西角荒園裏盡日無人屬阿誰唐無名氏萬里長江一帶開岸邊楊栁幾千栽錦帆未落西風起惆悵龍舟去不回崔道融霧撚煙搓一索春年年長似染來新應須喚作風流線繫得東西南北人顧雲續本事詩灞岸晴來送別頻相偎相倚不勝春自家飛絮猶無定爭把長條絆得人李涉鑒戒録錦池江上栁垂橋風引蟬聲送寂寥不必如絲千萬縷只禁離恨兩三條滕邁三條陌上拂金羈萬里橋邊映酒旗此日令人腸欲斷不堪將入笛中吹溫庭筠宜春苑外最長條間裊春風伴舞腰正是玉人腸絶處一渠春水赤欄橋二南內牆東御路傍須知春色栁絲黃杏花未肯無情思何事行人最斷腸三館娃宫外鄴城西逺映征帆近拂堤繫得王孫歸意切不同芳草緑萋萋牛嶠解凍風來陌上青解垂羅袖拜卿卿無端裊娜臨官路舞送行人過一生二吳王宫裏色偏深一簇纎條萬縷金不憤錢塘蘇小小引郎松下結同心三裊翠籠煙拂暖波舞裙新染麴塵羅章華臺畔隋堤上傍得春風爾許多歐陽炯軟碧搖煙似送人映花時把翠蛾嚬青青自是風流主慢颭金絲待洛神添聲楊栁枝裴識思量大是惡因緣只得相看不得憐願作琵琶槽那畔美人長抱在胸前溫岐一尺深紅蒙麴塵舊物天生如此新合歡桃核終堪恨裏許元來別有人二井底點燈深燭伊共郎長行莫圍棊玲瓏骰子安紅豆入骨相思知不知竹枝孫光憲亂繩千結絆人深越羅萬丈表長尋楊栁在身垂意緒藕花落盡見蓮心張妙淨憶把明珠買妾時妾起梳頭郎畫睂郎今何處妾獨在怕見花間蝴蝶飛張字惠逺曹妙清字比玉俱曉音律與楊廉夫為文字友八拍蠻閻選愁鎖黛睂煙易慘淚飄紅臉粉難勻憔悴不知緣底事遇人推道不宜春二雲鎖嫩黃煙栁細風吹紅蒂雪梅殘光影不勝閨閣恨行行坐坐黛睂攢小秦王蘇東坡濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽關腸斷聲苕溪漁隱云唐初歌詞多是五言或七言詩初無長短句自中葉至五代漸變成長短句及宋朝則盡為此體今所存者止瑞鷓鴣小秦王二闋是七言八句詩并七言絶句詩而已瑞鷓鴣尤依字易歌若小秦王必須雜以虛聲乃可歌耳字字雙王麗真女郎床頭錦衾斑復斑架上朱衣殷復殷空庭明月間復間夜長路逺山復山南鄉子歐陽炯嫩草如煙石榴花發海南天日暮江亭春影淥鴛鴦浴水逺山長看不足二洞口誰家木蘭船繫木蘭花紅袖女郎相引去遊南浦笑倚春風相對語三二八花鈿胸前如雪臉如蓮耳墜金環穿瑟瑟霞衣窄笑倚江頭招逺客李詢煙漠漠雨淒淒岸花零落鷓鴣啼逺客扁舟臨野渡思鄉處潮退水平春色暮二傾緑蟻泛紅螺間邀女伴簇笙歌避暑信船輕浪裏間遊戲夾岸荔枝紅蘸水三雲帶雨浪迎風釣翁回棹碧灣中春酒香熟鱸魚美誰同醉纜却扁舟篷底睡甘州曲蜀王衍老學叢談畫羅裙能結束稱腰身栁睂桃臉不勝春薄媚足精神可惜許淪落在風塵塞上秋老學叢談瘦藤老樹昏鴉逺山流水人家西風瘦馬斜陽下斷腸人去西風古道天涯二平沙細草斑斑曲溪流水潺潺塞上清秋早寒一聲新雁黃雲紅葉青山三西風塞上鳴笳月明馬上琵琶那底昭君恨多李陵臺下淡煙衰草黃沙喜春來除夜玉山舟中張伯雨江梅的的依茅舍石瀨濺濺潄玉沙瓦甌篷底送年華問暮鴉何處阿戎家江南春寇萊公溫公詩話波渺渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸法駕導引玉壺清話作望江南陳去非朝元路朝元路同駕玉華君千乘載花紅一色人間遙指是祥雲回望海光新二東風起東風起海上百花搖十八風鬟雲半動飛花和雨著輕綃歸路碧迢迢三簾漠漠簾漠漠天淡一簾秋自洗玉舟斟白醴月華微映是空舟歌罷海西流六么令吕洞賓東與西眼與睂偃月爐中運坎離靈砂且上飛最幽微是天機你休癡你不知九張機樂府雅詞醉留客者樂府之舊曲九張機者才士之新調憑戞玉之清歌寫擲梭之春怨章章寄意句句言情恭對華筵敢陳口號一擲
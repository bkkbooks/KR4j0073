body:
  text: 花草稡編巻十三明陳耀文輯中調賀明朝歐陽烱憶昔花間相見後只憑纎手暗抛紅豆人前不解巧傳心事别來依舊辜負春晝碧羅衣上蹙金繡覩對鴛鴦空裛淚痕透想韶顔非乆終是為伊只恁偷瘦朝玉堦杜夀域簾捲春寒小雨天牡丹花落盡惜庭軒髙空雙燕舞翩翩無風輕絮暗墜苔錢擬將幽怨冩香箋中心多少事語難傳思量真箇惡因縁那堪長夢見在伊邊玉堂春晏同叔帝城春暖御栁暗遮空苑海燕雙雙拂颺簾籠女伴相携共遶林間路折得櫻桃揷髻紅昨夜臨明㣲雨新英徧舊叢寳馬香車欲傍西池看處楊花滿袖風二後園春早殘雪尙濛烟草數樹寒梅欲綻香英小妺無端折盡釵頭朶滿把金樽細細傾憶得徃年同伴沉吟無限情惱亂東風莫便吹零落惜取芳菲眼下明後庭宴庚溪詩話石刻宣和中掘得千里故鄉十年華屋亂魂飛過屏山蔟眼重眉褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨㫁歌零舞遺恨清江曲萬樹緑低迷一庭紅撲蔌望逺行韋荘欲别無言倚畫屏含恨暗傷情謝家庭樹錦鷄鳴殘月落邊城人欲别馬頻嘶緑槐十里長堤出門芳草路萋萋雲雨别來易東西不忍别君後却入舊香閨遐方怨顧敻簾影細簟紋平象紗籠玉指縷金羅扇輕嫰紅雙臉似花明兩條眉黛逺山横鳯簫歇鏡塵生遼塞音書絶夣魂長暗驚玉郎經嵗負娉婷敎人争不恨無情臨江仙滕子京湖水連天天連水秋來分外澄清君山自是小蓬瀛氣蒸雲夣澤波撼岳陽城帝子有靈能鼓瑟凄然依舊傷情㣲聞蘭芷動芳馨曲中人不見江上數峯青東坡夜飲東坡醒復醉歸來髣髴三更家僮鼻息若雷鳴敲門都不應乆立聽江聲長恨此身非我有何時忘却營營夜來風静縠紋平扁舟從此逝江海寄餘生春暮晁無咎緑暗汀洲三月暮落花風静㠶收埀楊低映朩蘭舟半篙春水滑一叚夕陽愁㶚水橋東囘首處美人親上簾鈎青鸞無計入紅樓行雲歸楚峽飛夣到楊州李端叔九十日春都過了㝷常偶到江臯水容山態兩相饒草平天一色風暖燕雙高酒病厭厭何計那飛紅更送無聊鶯聲猶似耳邊嬌難囘巫峽夣空恨武陵桃感舊陳去非憶昔午橋橋上飲坐中多少豪英長溝流月去無聲杏花踈影裏吹笛到天明二十餘年成一夣此身雖在堪驚閒登小閣看新晴古今多少事漁唱起三更秦少㳺千里瀟湘挼藍浦蘭撓昔日曽經月髙風定露華清㣲波澄不動冷浸一天星獨倚桅檣情悄悄遥聞妃瑟泠泠新聲含盡古今情曲中人不見江上數峯青晁叔用憶昔西池池上飲年年多少歡娛别來不寄一行書㝷常相見了猶道不如初安稳錦屏今夜夢月明好渡江湖相思休問定何如情知春去後管得落花無程正伯濃緑鎻窓閒院静照人明月團圓夜長幽夢見伊難痩從香臉薄愁到翠眉殘只道花時容易見如今花盡春闌畫樓依舊五更寒可憐紅綉被空記合時歡夜景李知㡬煙桞踈踈人悄悄畫樓風外吹笙倚欄聞喚小紅聲薫香臨欲睡玉漏已三更坐待不來來不去一方明月中庭粉墻東畔小橋横起來花影下扇子撲飛螢阿初方去趙徳麟枝上粉香吹欲盡依前庭院春風更誰同遶摘芳叢漏殘金獸冷信斷錦屏空看結燈花愁不睡酒闌無夢相逢凄凉長判一生中不知雲外月永夜在房櫳立春自名鴈後歸賀方囘巧剪合歡羅勝子釵頭春意翩翩艶歌淺笑拜嫣然願郎宜此酒行樂駐蕐年未至文園多病客幽襟悽斷堪憐舊遊夣掛碧雲邊人歸落鴈後思發在花前憶舊張𢎞範千古武陵溪上路桃源流水潺潺可憐仙契剰濃歡黄鸝驚夣破青鳥喚春還囘首舊遊渾不見蒼煙一片荒山玉人何處倚闌干紫簫明月底翠袖暮雲寒石孝友一霎狂雲驚雨過月華恰到簾幃檻前疊石翠參差洞房相見處燈火乍凉時睡玉眠花愁夜短忩忩共惜佳期風梧不動酒醒遲好同蝴蝶夣飛上鳯凰枝二醉䄂吟鞭行色裏㡌簷低䖏風斜晚山一半被雲遮殘陽明逺水古朩集棲鴉暮去朝來縁底事不如早早還家曲屏深幌小窓紗翠沾眉上桞紅揾臉邊花自詠劉徳脩我似萬山千里外悠然一片歸雲官銜猶自帶云云誰知前進士已是故将軍閒行閒坐閒飲酒閒拈閒字閒文諸公留我笑紛紛一枝簮寳髻六幅舞羅裙閨怨劉叔安蕩紫飄紅芳信斷都無人問穠纎吟鞭倚醉問凉蟾香消金縷篆塵壓寳粧奩夣峽朝雲飛不到一春離緒厭厭却疑歸燕礙重簾心期花底誤眉恨桞邊添晁叔用雙舸亭亭横晚渚城中飛觀嵳峩畫橋燈火照清波玉鈎平浸水金鎻半沉河試問無情堤上桞也應厭聼離歌人生無奈别離何夜長嫌夣短淚少怕愁多顧夐碧染長空池似鏡倚樓閒望凝情滿衣紅藕細香清象床珍簟山障掩玉琴横暗想昔時歡笑事如今贏得愁生慱山爐煖澹煙輕蟬吟人静殘日傍小窓明晏叔原東野亡來無麗句于君去後少交親追思徃事好沾巾白頭王建在猶見詠詩人學道深山空自老畱名千載不干身酒筵歌席莫辭頻争如南陌上占取一年春離懐王逐客别岸相逢何草草扁舟兩岸埀楊綉屏珠箔綺香囊酒深歌拍緩愁入翠眉長燕子歸來人去也此時無奈昏黄桃花應是我心腸不禁㣲雨流淚湿紅粧閻選雨停荷芰逗濃香岸邉蟬噪埀楊物華空有舊池塘不逢仙子何處夣襄王珍簟對欹鴛枕冷此來塵暗凄凉欲慿危檻恨偏長藕花珠綴猶似汗凝粧李後主櫻桃落盡春歸去蝶翻輕粉雙飛子規啼月小樓西玉鈎羅幕惆悵暮煙埀别巷寂寥人散後望殘煙草低迷爐香閒裊鳯凰兒空持羅帶囘首恨依依續聞云親見後主梵葉書塗注數字未嘗不全蘇子由題此詞云凄凉怨慕真亡國之音也西清詩話云後主圍城中作詞云櫻桃結子春歸盡蝶翻金粉雙飛子規啼月小樓西畫簾朱箔惆悵捲金泥門巷寂寞人去後望殘烟草低迷詞未就而城破墨荘謾録云劉廷仲為補之云何時重聼玉騘嘶撲簾桞絮依約夣囘時二庭空客散人歸後畫堂半掩珠簾林風淅淅夜厭厭小樓新月囘首自纎纎春光鎮在人空老新愁徃恨何窮鎖窓力困起還慵一聲羌笛驚起醉怡容宫詞鹿䖍扆金鏁重門荒苑静綺窓愁對秋空翠華一去寂無蹤玉樓歌吹聲斷已隨風煙月不知人事改夜闌還照深宫藕花相向野塘中暗傷亡國清露泣香紅柳許庭庚溪詩話不見昭陽宫内桞黄金齊撚輕柔東君昨夜到皇州玉階金井無處不風流悵望翠華春欲暮六宫都鎻春愁煖風吹動繡簾鈎飛花委地時轉玉香毬二不見隋河堤上桞緑隂流水依依龍舟東下疾於飛千條萬葉濃翠染旌旗記得當年春去也錦㠶不見西歸故抛輕絮㸃人衣如将亡國恨説與路人知三不見陶家門外桞柴扉一徑遥通閉門終日掩清風感君高節緑䕃向人濃籬落蕭踈鷄犬静日長飛絮濛濛先生一醉萬縁空經時髙卧不到翠隂中四不見都門亭畔桞春來緑盡長條桞邊行色馬蕭蕭一枝折贈相見又何朝酒盡曲終人去也風前亦自無聊秪應於我恨偏饒東君特地付與沈郎腰五不見㶚陵原上桞徃來過盡蹄輪朝離南楚暮西秦不成名利嬴得鬢毛新莫怪枝條憔悴損一生唯苦征塵兩三煙樹倚孤村夕陽影裏愁殺宦㳺人夏景永叔池外輕雷池上雨雨聲滴碎荷聲小樓西角斷虹明欄干倚處待得月華生燕子飛來窺畫棟玉鈎埀下簾旌凉波不動簟紋平水晶䨇枕傍有堕釵横絳華堂進泛索張掄聞道彤廷森寳仗霜風逐雨驅雲六龍扶輦下青𡨕香隨鸞扇逺日映赭袍明簾捲天街人頂戴滿城喜氣氤氲等閒散作八荒春祗知天意好昨夜月華新毛文錫暮蟬聲盡落斜陽銀蟾影挂瀟湘黄陵廟側水茫茫楚山紅樹煙雨隔高唐岸泊漁燈風颭碎白蘋逺散濃香靈娥鼓瑟韻清商朱絃凄切雲散碧天長牛希濟峭碧參差十二峯冷煙寒樹重重瑶姫宫殿是仙蹤金鑪珠帳香靄晝偏濃一自楚王驚夣斷人間無路相逢至今雲雨帯愁容月斜江上征棹動晨鐘二江繞黄陵春廟閒嬌鶯獨語關關滿庭重疊緑苔斑隂雲無事四散自歸山簫鼓聲稀香燼冷月娥歛盡灣環風流皆道勝人間須知狂客判死為紅顔三素洛春光㶑灔平千重媚臉初生凌波羅襪勢輕輕煙籠日照珠翠半分明風引寳衣疑欲舞鸞迴鳯翥堪驚也知心許恐無成陳王辭賦千載有聲名四桞帶揺風漢水濵平蕪兩岸争勻鴛鴦對浴浪痕新㺯珠游女㣲笑自含春輕歩暗移蟬鬢動羅裙風惹輕塵水精宫殿豈無因空勞纎手解珮贈情人五洞庭波浪颭晴天君山一㸃凝煙此中真境属神仙玉樓珠殿相應月輪邊萬里平湖秋色冷星辰埀影參然橘林霜重更紅鮮羅浮山下有路暗相連梅李易安庭院深深深㡬許雲忩霧閣春遲為誰憔悴損芳姿夜來清夣好應是發南枝玉瘦檀輕無限恨南樓羌管休吹濃香吹盡有誰知暖風遲日也别到杏花肥二庭院深深深㡬許雲窓霧閣常扄桞梢梅蕚漸分明春歸秣陵樹人客建安城感月吟風多少事如今老去無成誰憐憔悴更彫零燈花空結蕋離别共傷情寄外劉氏苕溪漁隠千里長安名利客輕離輕散㝷常難禁三月好風光滿階芳草緑一片杏花香記得年時臨上馬看人眼淚汪汪如今不忍更思量恨無千日酒空斷九迴腸劉章文虎妻名彤字文美立春寄季順姝延安夫人一夜東風穿綉戸融融暖應佳時春來何䖏最先知平明堤上桞染遍欝金枝姊妹嬉遊時節近今朝應怨來遲憑誰説與到家期玉釵頭上勝留待逺人歸熟水易少夫人何處丼泉來席上嫩黄初沸銀瓶月團嘗罷有餘清惠山名品在歌舞暫留停欲賞壑源新氣味不應兼進豨苓此中端有淡交情相如方病酒一飲骨毛輕接賢賔毛文錫香韉鏤䄡五花騘值春景初融流珠噴沫躞蹀汗血流紅少年公子能乘馭金鑣玉轡瓏􅋛為惜珊瑚鞭不下驕生百歩千蹤信穿花從拂桞向九陌追風荷花媚霞苞露荷碧天然地别是風流摽格重重青盖下千嬌照水好紅紅白白每悵望明月清風夜甚低迷不語妖邪無力終湏放船児去清香深處住看伊顔色鞓紅粉香尤嫩衾寒可慣怎奈向春心已轉玉容别是一般閑婉悄不管桃紅杏淺月影簾櫳金堤波靣漸細細香風滿院一枝折寄故人雖逺輙莫使江南信斷憶江南馮延已去嵗迎春樓上月正是西窓夜凉時節玉人貪睡墜釵雲粉消粧薄見天真人非風月長依舊破鏡塵筝一夣經年瘦今宵簾幙颺花隂空餘枕淚獨傷心二今日相逢花未發正是去年别離時節東風次第有花開恁時須約却重來重來不怕花堪折秪怕明年花發人離别别離若向百花時東風弹淚有誰知尋梅沈㑹宗幽香淺淺濕未透認雪底思來始有剪裁尙覺瓊瑶皱苦寒中越恁骨清肌瘦東風氣象園林舊又今年而今時候急宜小摘當罇酒選一枝且付玉人纎手二今年早覺花信蹉想芳心未應悞我一日小徑幾囬過始朝來㝷見雪痕㣲破眼前大抵情無那好景色只銷些箇春風爛漫都且可是而今枝上一朶兩朶繫裙腰張子野清霜蟾照夜雲天朦朧影畫勾欄人情縱似長情月􅄸一年又能得幾畨圓欲寄西江題葉字流不到五亭前東池始有新荷緑尙小如錢問何日藕㡬時蓮劉叔儗山兒矗矗水兒清船兒似葉兒輕風兒更沒人情月兒明厮合凑送人行眼兒蔌蔌淚兒傾燈兒更冷清清遭逢鴈兒又沒前程一聲聲怎生得夣兒成魏夫人芳草渡燈花耿耿漏遲遲人别後夜凉時西風瀟洒夣初囘誰念我就单枕皺雙眉錦屏綉幌與秋期腸欲斷淚偷埀月明還到小窓西我恨你我憶你你争知秋蘂香引相思桞耆卿留不得光隂催促有芳蘭歇好花謝唯頃刻彩雲易散琉璃脆驗前事端的風月夜㡬處前蹤舊跡忍思憶這囘望斷永作終天隔向仙島歸𡨕路兩無消息少年心黄魯直對景惹起愁悶染相思病成方寸是阿誰先有意阿誰薄倖斗頓恁
body:
  text: 花草稡編巻二十一明陳耀文輯長調玉燭新早梅周美成溪源新臘後見數朶江梅剪裁初就暈酥破玉芳英嫩故把春心輕漏前村昨夜想㺯月黄昏時候孤岸峭踈影横斜濃香暗沾襟䄂尊前賦與多才向嶺外風光故人知否壽陽謾鬬終不似照水一枝清瘦風嬌雨秀好亂揷繁花盈首須信道羌管無情㸔㸔又奏史梅溪踈雲縈碧岫帶晩日搖光半江寒皺越溪近逺空頻向過鴈風邊回首酸心一縷念水北尋芳歸後輕醉醒隄月籠紗鞍鬆寳輪飛驟秦樓屢約芳春記扇背題詩帕羅沾酒瘦愁易就因驚斷夢裏桃源難又臨風話舊想日暮梅花孤瘦還静倚脩竹相思盈盈翠䄂青山梅花新霽後正錦様華堂一時妆就洞房花燭深深處慢轉銅壺銀漏新妝未了奈浩蕩春心相候香篆裏簇簇笙歌㣲寒半侵羅䄂侵晨淺捧蘭湯問堂上萱花夜來安否功名浪鬬謾贏得萬里相思清瘦藍袍俊秀便勝却登科龍首春晝永簾幙重重簫聲緩奏莊椿嵗夀趙丞相方味道翰綸巾少駐家山北窓睡覺南薫起黄庭細看長生祕訣神仙竒趣奈此蒼生願蘇炎熱仰為霖雨趂丹心未老将整頓乾坤手為經理好是今年慶事抱竒孫一門佳氣蓬山振佩麟符重錫褒綸新美玊樹參庭桂枝分種香浮蘭芷看他年接武三槐長是伴莊椿嵗桂枝香金陵懐古王介甫登臨送目正故國晚秋天氣初肅瀟灑澄江似練翠峰如簇征帆去棹殘陽下背西風酒旗斜矗綵舟雲淡星河鷺起圖畫難足念自昔豪華競逐恨門外樓頭悲恨相續千古憑髙對此謾嗟榮辱六朝舊事隨流水但寒煙衰草凝緑至今商女時時尚歌後庭遺曲觀木犀有感寄吕郎中陳同父天髙氣肅正月色分眀秋容新沐桂子初收三十六宫都足不辭散落人間去怕羣花自嫌凡俗向他秋晩唤回春意㡬曽幽獨是天生餘香賸馥恠一樹春風十里相續坐對花傍但見色浮金粟芙蓉只解添秋思况東籬凄凉黄菊入時太淺背時太逺愛尋髙躅踈簾淡月即桂枝香張宗瑞梧桐雨細漸滴作秋聲被風驚碎潤逼衣篝線裊蕙爐沈水悠悠嵗月天涯醉一分秋一分憔悴紫簫吹斷素牋恨切夜寒鴻起又何苦凄凉客裏草堂春緑竹溪空翠落葉西風吹老㡬畨塵世從前諳盡江湖味聴商歌歸興千里露侵宿酒踈簾淡月照人無寐喜朝天清暑堂贈蔡君謨張子野晚雲開睨仙舘凌虛步入蓬萊玉宇瓊甃對青林近歸鳥徘徊風月從今清暑野色帶江山助詩才簫鼓宴璇題寳字浮動持盃天多送目無際識渡舟帆小時見潮迴故國千里共十萬室日日春䑓睢社廟京非逺正和羮民口渇鹽梅佳景在吴儂還望分閫重來滿朝歡栁耆卿花隔銅壺露晞金掌都門十二清曉帝里光風爛漫偏愛春杪煙輕晝永引鶯囀上林魚逰靈沼巷陌乍晴香塵染惹垂楊芳草因念秦樓彩鳳楚舘朝雲往昔曽迷歌笑别来嵗久偶憶歡盟重到人面桃花未知何處但掩朱門悄悄盡日竚立無言贏得凄凉懐抱夀韓尚書出守梅亭一㸃箕星近天邊光彩輝耀南極竹馬兒童盡道使君生日元是鳳池仙客曽曳履持荷簮筆稱觴處晚節花香月周猶待五夕誰道久拘禁掖任雙旌五馬暫從逰逸九棘三槐都是等閒親植見說玉皇側席但早晚促歸調燮功成了笑傲南山壽如南山松栢月中仙聖節應制道宫趙子昻春滿皇州見祥烟擁日初照龍樓宫花苑栁映仙仗雲移金鼎香浮寳光生玉斧聴鳴鳳簫韶樂奏徳與和氣㳺天生聖人千載希有祥瑞電繞虹流有雲成五色芝生三秀四海太平致民物雍熈朝野歌謳千官齊拜舞玉杯進長生春酒願皇慶萬年天子與天同壽千秋嵗姪夀叔㳺文仲今年為壽都道是不比尋常時節預慶我公年八袠来獻新詞一闋筭得年時恰當尚父入相周西伯親逄盛事宗孫也五十八一門富貴榮華盈牀牙笏何待拈来說且上祝龜齡鶴筭從此千千百百笑道兒時風流丹篆冩向龍駒額更将綵筆十字頭上添一丿夫壽妻毛東堂記當初歸家似徳耀嫁梁鴻筭三十年間艱難歴徧甘苦相同新來有孫可抱也添些喜色到眉峰今日又逢生日不妨杯酒從容老翁只是一村儂欠你孺人封幸兒漸知耕婦能知織莫問窮通君看世間富貴比浮雲縹緲過晴空何似大家清徤玊林嵗嵗春風翠樓吟雙調武昌安逺樓成姜白石月冷龍沙塵清虎落今年漢酺初賜新翻邊部曲聴氊幕元戎歌吹層樓髙峙㸔檻曲縈紅簷牙飛翠人姝麗粉香吹下夜寒風細此地宜有詞仙擁素雲黄鶴與君逰戯玉梯凝望久嘆芳草萋萋千里天涯情味仗酒祓清愁花嬌英氣西山外晚来還捲一簾秋霽曲江秋楊補之前山雨歇愛竹樹低隂軒牕無熱珠箔半垂清風細繞蕭蕭吹華髪珍簟粲枕設珊瑚瘦瑠璃滑永日欹枕知誰是伴舊書重掲清絶輕雲淡月夢同泛滄波萬疊杯盤狼籍處相扶就枕歡笑歌翻雪轉棹小溪灣人家燈火斷明滅正携手無端驚回檻外數聲鶗鴂二鳴鳩怨歇對急雨過雲暗風吹熱漠漠稻田差差栁岸新沐青絲髪樓上素琴設愛流水隨絃滑深炷龍津濃熏絳幙愽山頻揭超絶遥岑吐月照蒼蒨重重叠叠恍然身在處疑同泛花舫波噴雪滉漾醉魂醒驚呼不是漚生滅竚望久空嘆無才可賦厭聴鶗鴂彩雲歸恨别栁耆卿蘅臯向晩艤輕航卸雲帆水驛魚鄉當暮天霽色如晴晝江練静皎月飛光那堪聴逺村羌管引離人斷腸此際恨浪萍風梗度嵗茫茫堪傷朝歡暮散被多情賦與凄凉别来最苦襟䄂依約尚有餘香筭得伊鴛衾鳳枕夜永争不思量牽情處惟有臨岐一句難忘豐年瑞曽覿紫皇髙宴仙臺雙成戱撃璚苞碎何人為把銀河水剪甲兵都洗玉様乾坤八荒同色了無塵翳喜氷消太液煖融鳷鵲端門曉班初退聖主憂民深意轉鴻鈞滿天和氣太平有象三宫二聖萬年千嵗雙玉杯深五雲樓迥不妨頻醉㸔来不是飛花片片是豐年瑞真珠簾陸務觀山村水舘參差路感覊逰正似殘春風絮掠地穿簾知是竟歸何處鏡裏新霜空自憫問㡬時鸞臺鰲署遲暮謾憑髙懐逺書空獨語自古儒冠多悮悔當年早不扁舟歸去醉下白蘋洲㸔夕陽鷗鷺菰菜鱸魚都棄了只換得青衫塵土休顧早收身江上一蓑烟雨二燈前月下嬉遊處向笙歌錦繡叢中相遇彼此知名纔見便論心素淺黛嬌蟬風調别最動人時時偷顧歸去想閒忩深院調絃促柱樂府初飜新譜漫裁紅㸃翠閒題金縷燕子入簾時又一畨春暮側㡌胭脂坡下過料也記前年崔護休訴待從今須與好花為主鳳歸雲遣興栁耆卿向深秋雨餘爽氣肅西郊陌上夜䦨襟䄂起凉颷天末殘星流電未滅閃閃隔林梢又是曉鷄聲㫁陽烏光動漸分山路迢迢驅驅行役苒苒光隂蠅頭利禄蝸角功名畢竟成何事謾相髙抛擲雲泉狎玩塵土壯節等閒銷幸有五湖煙浪一般風月㑹湏歸老漁樵月當㕔史邦卿白璧舊帶秦城夢因誰拜下楊栁樓心正是夜分魚鑰不動香深時有露螢自照占風裳可喜影麩金坐來久都将凉意盡付沈吟殘雲事緒無人拾恨匆匆藥娥歸去難尋綴取霧窓曽唱㡬拍清音猶有老来印愁處冷光應念雪翻簮空獨對西風緊弄一井桐隂栁色黄賀方回薄雨催寒斜照弄晴春意空濶長亭栁色纔黄逺客一枝先折烟横水映帶㡬㸃歸鴻東風銷盡龍沙雪還記出闗来恰而今時節将發畫樓芳酒紅涙清歌便成輕别已是經年杳杳音塵都絶欲知方寸共有㡬許清愁芭蕉不展丁香結望斷一天涯兩厭厭風月梅香慢髙閣寒輕映萬朶芳梅亂堆香雪未待江南早冠百花先占一陽佳節剪綵凝酥無處學天然竒絶便壽陽粧工夫費盡艶姿終别風裏弄輕盈掩珠英明瑩麝蠟飄烈莫放芳菲歇剩永宵歡賞酒酣吟折倒玉何妨且聴取樽前新闋怕笛聲長行雲散盡謾悲風月馬家春慢珠箔風輕綉簾浪捲乍入人間蓬島闘玉䦨干漸庭舘簾櫳春曉天許竒葩貴品異繁杏夭桃輕巧命化工傾國風流與一枝纎妙樽前五陵年少縱丹青異格難剔顔貌惹露凝烟困紅嬌額㣲顰低笑湏信濃香易歇更莫惜醉攀吟遶待舞蝶遊蜂細把芳心都告映山紅慢元厚之榖雨風前占淑景名花獨秀露國色僊姿品流第一春工成就羅幃䕶日金泥皺映霞腮動檀痕溜長記得天上瑤池閬苑曽有千匝遶紅玉䦨干愁只恐朝雲難久須款折繡囊剩戴細把蜂湏頻嗅佳人再拜擡嬌面歛紅巾捧金杯酒獻千千壽願長恁天香滿䄂木蘭花慢惜别栁耆卿倚危樓竚立乍蕭索晚晴初漸素景衰殘風砧韻冷霜樹紅踈雲衢見新鴈過奈佳人自别阻音書空遣悲秋念逺寸腸萬恨縈紆皇都暗想歡逰成往事動欷歔念對酒當歌低幃並枕翻恁輕辜歸途縱凝望處但斜陽暮靄滿平蕪贏得無言悄悄凭欄盡日踟蹰程正伯倩嬌鶯姹燕說不盡此時情正小院春䦨芳園晝鎖人去花零憑髙試囬望眼奈遥山逺水隔重雲誰遣風狂雨横便教無計留春情知鴈杳與鴻嗔自難寄丁寧縱竹院顰深桃門笑在知屬何人衣篝㡬回忘了奈殘香猶有舊時薫空使風頭捲絮為他飄蕩花城吕聖求石榴花謝了正荷葉盖平池試瑪瑙杯深琅玕簟冷臨水簾帷知他故人甚處曉霞明斷浦栁枝垂唯有松風水月向人長似當時依依望斷水窮雲起處是天涯奈燕子樓髙江南夢㫁虛費相思新愁暗生舊恨更流螢弄月入紗衣除却幽花軟草此情未許人知重陽京仲逺筭秋来景物皆勝賞况重陽正露冷欲霜輕烟不雨玊宇開張蜀人從来好事遇良辰不肯負時光藥市家家簾幙酒樓處處絲簧婆娑老子興難忘聊復與平章也隨分登髙茱茰綴席菊蕋浮觴明年未知健否笑杜陵底事獨凄凉不道頻開笑口年年落㡌何妨前調張安國送歸雲去鴈淡寒影滿溪樓正佩解湘腰釵孤楚鬢鸞鑑分收凝情望行處路但踈烟逺樹織離憂只有樓前溪水伴人清淚長流霜華夜永逼衾稠唤誰䕶衣篝念粉舘重来芳塵未掃爭見嬉遊情知悶来殢酒奈回腸不醉只添愁脉脉無言竟日㫁魂雙鶩南州二紫簫吹散後恨燕子只空樓念璧月長虧玉簮中折覆水難收青鸞送碧雲句道霞扃霧鎖不堪憂情與文梭共織怨隨宫葉同流人間天上兩悠悠暗淚洒燈篝記谷口園林當時驛舍夢裏曽遊銀屏低聞笑語但夢時冉冉醒時愁擬把菱花一半試尋髙價皇州送陳石泉南歸陳㕘政北歸人未老喜依舊著南冠正雪暗滹沱雲迷芒碭夢繞邯鄲鄉心促日行萬里幸此身生入玉門闗多少秦烟隴霧西湖淨洗征衫燕山望不見呉山回首一歸鞍慨故宫離黍故家喬木那忍重看鈞天紫㣲何處問瑤池八駿㡬時還誰在天津橋上杜䳌聲裏䦨干中秋呉彦髙敞千門萬户瞰蒼海爛銀盤對沆瀣樓髙儲胥鴈過墜露生寒䦨干眺河漢外送浮雲盡出衆星乾丹桂霓裳縹緲似聞襍佩珊珊長安底處髙城人不見路漫漫歎舊日心情如今容髩瘦沈愁潘幽歡縱容易得奈佳期動是隔年看歸去江湖一葉浩然對影垂竿社日有懐嚴次山東風吹霧雨更吹起裌衣寒正莽莽叢林潭潭伐皷鬰鬰焚蘭䦨干曲多少意看青烟如篆遶溪灣桑柘緑隂猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆擾擾人生紛紛離合渺渺悲歡想雲軿何處也對芳時應只在人間惆悵回紋錦字㫁腸斜日雲山前調戴式之鶯啼啼不盡憑燕語語難通這一㸃芳心十年不㫁惱亂東風重来故人何處但依前流水小橋東記得同題粉壁而今壁破無蹤蘭臯空漲緑溶溶流恨落花紅念着破春衫當時送别燈下裁縫相思謾令自苦嘆雲烟過眼揔成空落日楚天無際凭欄目送歸鴻七夕盧申之汀蓮凋晩豔又蘋末起秋風漫搔首徐吟㣲雲河漢踈雨梧桐飄零倦尋酒醆記那回歌管小樓中玊果蛛絲暗卜鈿釵蟬髩輕籠吴雲别後重重凉宴㡬時同縱人間信有犀靈鵲喜密意難通雙星分攜最苦念經年猶有一相逢寂寞橋邊舊月可堪頻照西東秋意李耘叟占西風早處一畨雨一畨秋記故國斜陽去年今日落葉林幽悲歡㡬回激烈寄踈狂酒令與詩籌遺恨清商易改多情紫燕難留嗟休觸緒蠒絲抽舊事續何由奈予懐渺渺羇愁鬰鬰歸夢悠悠生平不如老杜便如它飄泊也風流寄語庭柯徑菊甚時得棹孤舟前調劉後村瀛洲真學士為底事在紅塵為語觸宫闈沈香亭裏嗔謫仙人為親近君側者見萬言策了惎劉蕡為是尚方請劒漢廷多憚朱雲君言徃事勿重陳且鬬酒邊身也不㑹區區筭他甲子記甚庚寅爾曹譬如朝菌又安知老栢與靈椿世上榮華難保古来名節如新黄玉林問春春不語謾新緑滿芳洲記歴歴前逰看花南陌命酒西樓東風翠紅圍繞把功名一笑付糟邱醉裏了忘身世吟邊自負風流風流莫莫復休休白髪漸盈頭悵十載重来畧無歡意惟有閒愁多情向人似舊但小桃婀娜栁纎柔望㫁殘霞落日水天拍拍飛鷗題馮雲月玉連環詞自沈香夢斷風雨外失餘春悵𫀆錦淋漓金鑾論奏四海無人蛾眉古来見妬奈昭陽飛燕亦成塵惟有空梁落月至今能為傳神神遊八表跨長鯨誰是再来身愛雲月溪頭玉環一曲筆力千鈞人間不堪着眼但香名百世尚如新乞我九霞蜚珮梯空共上秋旻和答玉林韻馮偉壽酒醒人世换碧桃靚海山春任青鳥沈沈紫鱗杳杳有玉林人宫𫀆掉頭未愛愛荷衣不染市朝塵仙様蓬萊翰墨雲間鸞鳳精神笑呼銀漢入金鯨瓊苑自由身羡咳唾成章香薫花霧音和韶鈞六丁夜来捧去便天人也自嘆尖新那得金牋飛洒浩歌飛歩蒼旻賀第二娶虚寮仙家春不老誰說到牡丹休筭蠻栁樊櫻怎生了得白傅風流枝頭摽梅實好奈緑隂庭戸不禁愁幸有琴中鳳語能通鏡裏鸞求鏘璆雜佩下瀛洲寳箑紫烟浮望蘭情紅盼三生曽識一見如羞綢繆從今偕老似栁郎無負碧雲秋莫倚回文妙手放教逺覔封侯昔栁毅為牧羊女傳書碧雲杯酒意即相屬後栁三娶崔氏乃牧羊女之化身也前調遺山擁岧岧雙闕龍虎氣欝峥嵘想暮雨珠簾秋香桂樹指顧䑓城憑欄為誰西望但哀絃凄斷似平生只道江山如畫争教天地無情風雲奔走十年兵慘淡入經營問對酒當歌曹侯墓上何用虛名青青故都喬木悵西陵遺恨㡬時平安得㕘軍健筆為君重賦蕪城二渺長江東下流不盡古今情記海上三山雲間雙闕當日南城黄鶴㡬年飛去淡春隂平野草青青氷井猶殘石甃露盤已失金莖風流千古短歌行慷慨缺壺聲想釃酒臨江賦詩鞍馬詞氣縱横飄零舊家王粲似南飛烏鵲月三更笑殺西園賦客壮懐無復平生題亳州武津闗張𢎞範憶譙都風物飛一夢過千年羡百里溪程兩行堤栁數萬人烟傷心舊家遺跡謾斜陽流水接長天冷落故祠香火白雲淚眼澘然行藏好向故人傳椽筆舞蠻箋總糾糾貔貅秋風江上髙卧南邊功名談笑罇俎向錦江何必上樓船他日玉津闗下春風驕馬金鞭憶呉姬鄭禧春夢録任東風老去吹不斷淚盈盈春淺春深春寒春煖春雨春晴都来助詩人興更落花無定攪春情芳草猶迷舞蝶緑楊空悮流鶯𤣥霜着意搗初成回首失雲英但如醉如痴如狂如舞如夢如驚香魂至今迷戀問真仙消息最分明㡬夜相逢何處清風明月蓬瀛攪原作挽再和鄭禧呉氏看紅牋冩恨人醉倚夕陽樓故里梅花纔傳春信先認儒流此生料應縁淺綺窓下雨怨共雲愁如今杏花嬌艶珠簾懶上銀鈎絲蘿喬樹欲依投此景兩悠悠恐鶯老花殘翠嫣紅减辜負春逰蜂媒問人情思摠無言應只低頭夢斷東風路逺柔情猶為遲留彭城懐古薩天錫古徐州形勝消磨盡㡬英雄想鉄甲重瞳烏騅汗血玉帳連空楚謌八千兵散料夢魂應不到江東空有黄河如帶亂山起伏如龍漢家陵闕起秋風禾黍滿闗中更戯馬臺荒畫眉人逺燕子樓空人生百年寄耳且開懐一飲盡千鍾回首荒城斜日倚䦨目送飛鴻西湖送春梁貢父曽問花花不語為誰落為誰開筭春色三分半隨流水半入塵埃人生能㡬歡笑但相逢樽酒莫相推千古幕天席地一春翠繞珠圍彩雲回首暗高臺煙樹渺吟懐拚一醉留春留春不住醉裏春歸西樓半簾斜日怪銜春燕子却飛来一枕青樓好夢又教風雨驚回瑞雲濃慢六月十一日夀羅春伯陳同父䉀漿酪粉玉壺氷醑朝罷更聞宣賜去天咫尺下拜再三幸今有母可遺年年此日共道月入懐中最貴向暑天正風雲㑹遇有恁嘉瑞鶴沖霄魚得水一超便直入神仙地植根江表開拓兩河做得黑頭公未騎鯨赤手問何如長鞭尺箠向来王謝風流只今管是曲逰春趙功可千樹籠芳草正蒲風㣲過梅雨新霽客裏幽忩筭無春可到和愁都閉萬種人生計應不似午天閒睡起来踏碎松隂蕭蕭欲動疑水借問歸舟歸未望栁色煙光何處明媚抖擞人間除離情别恨乾坤餘㡬一笑晴鳬起酒醒後䦨干獨倚時見雙燕飛来斜陽滿地瑤華慢雪仇仁近踈踈密密漠漠紛紛乍舞風無力殘磚㫁礎轉眼化作方圭圓璧非花非絮似逞巧先投窓隙立小樓不見青山萬里鳥飛無迹休憐凍梗氷苔但飛入平林都是春色年華婉娩誰信道老却梁園詞客踏青近也且二白何須三白把一白分與梅花要㸃壽陽宫額次仇山村韻張伯雨篩氷為霧屑玉成塵借阿姨風力千巖競秀怎一夜换作連城之璧先生閉户恠短日寒催駒隙想平沙鴻爪成行似醉時書迹未隨埋沒雙尖便淡掃蛾眉與鬬顔色裁詩白戰驢背上䭾取㶚橋吟客撚鬚自笑儘未讓諸峯頭白看洗出宫栁梢頭已借淡黄塗額臺城路送周方山之吳張叔夏朗吟未了西湖酒驚心又歌南浦折栁官橋呼船野渡還聴垂虹風雨漂流最苦况如此江山此時情緒怕有鴟夷笑人何事載詩去荒臺祗今在否登臨休望逺都是愁處暗草埋沙明波洗月誰念天涯羈旅荷隂未暑快料理歸程再盟鷗鷺只有空山近来無杜宇二十年前事翻疑夢重逢可憐俱老水國春山空城嵗晚無語相看一笑荷衣換了任京洛風塵冷凝紗㡌見說吟情近来不見謝池草歡逰曽歩翠窈亂花迷紫曲芳意今少舞扇招香歌橈换玉猶憶錢塘蘓小無端暗惱又㡬度留連燕昏鶯曉回首粧樓甚歸去好拜星月周美成夜色催更清塵收露小曲幽坊月暗竹檻燈窓識秋娘庭院笑相遇似覺瓊枝玊樹暖日明霞光爛水盻蘭情總平生稀見畫堂中舊識春風面誰知道自到瑶臺畔眷戀雨潤雲濕苦驚風吹散念荒寒寄宿無人舘重門閉敗壁秋蟲嘆怎奈何一縷相思隔溪山不斷韓琮集云吴魚嶺鴈無消息水盼蘭情别来久昇平樂吴奕水閣層臺短亭深院依稀萬木籠隂飛暑無涯行雲有勢晩来細雨回晴庭槐轉影紗厨兩兩蟬鳴幽夢㫁枕金猊旋熱蘭炷㣲薫堪命俊才儔侣對華筵坐列朱履紅裙檀板輕敲金樽滿泛縱教畏日西沈金絲玉管間歌喉時奏清音唐虞景儘陶陶沈醉且樂昇平西平樂春暮栁耆卿盡日憑髙寓目脉脉春情緒嘉景清明漸近時節輕寒乍暖天氣才晴又雨煙光澹蕩装㸃平蕪逺樹黯凝竚臺榭好鶯燕語正是和風麗日㡬許繁紅嫩緑雅稱嬉逰去奈阻隔尋芳伴侣秦樓鳳吹楚舘雲約空悵望在何處寂寞韶光暗度可堪向晩村落聲聲杜宇朱雍夜色娟娟皎月梅玉供春緒不使鉛華㸃綴超出精神淡竚休妬殘英如雨清香眷戀只恐隨風滿路散無數江亭暮鳴佩語正值匆匆作别天逺瑤池縞轂好趂飛瓊去忍負瑤臺伴侣瓊肌瘦盡庾嶺零落空悵望動情處畫角哀時暗度參横向曉吹入深沈院宇情久長吕聖求瑣忩夜永無聊盡作傷心句甚近日帶紅移眼棃臉沾雨春心償未足怎忍聴啼血催歸杜宇暮帆掛沈沈暝色滚滚長江流不盡来無據㸃檢風光嵗月今如許趂此際浦花汀草一棹東去雲窓霧閣洞天曉同作煙霞伴侣筭誰見梅簾醉夢栁陌晴逰應未許春知處二氷梁跨水沈沈霽色遮千里怎向我小舟孤棹天外飄逐夜寒侵短髪睡不穏窓外寒風漸起嵗華暮蟾光射雪碧瓦飄霜塵不動寒無際鷄咽荒郊夢也無歸計擁綉枕斷魂殘魄清吟無味想伊睡起又念逺樓閣横枝對倚待歸去西窓剪燭小閣凝香深翠幙饒春睡小樓連苑梅楊樵雲一枝斜墮牆腰向人顫裊如相媚是誰剪取㫁雲零玉輕輕粧綴不是幽人如何能到水邊沙際又匆匆過了春風半面儘長把重門閉只管相思成夢道無情又闗鄉意蒼苔半畝如今巳是鹿胎田地甚欲追陪却嫌花下翠環解語待何時月轉幽房醉了不教歸去山亭宴有美堂贈彦猷主人張子野宴堂永晝喧簫鼓倚青空畫欄紅柱玉瑩紫薇人藹和氣春融日煦故宫池舘更樓臺約風月今宵何處湖水動鮮衣競拾翠湖邊路落花蕩漾怨空樹曉山靜數聲杜宇天意送芳菲正黯淡踈煙短雨新歡寧似舊歡長此㑹散㡬時還聚試為挹飛雲問解寄相思否望春回李景元霽霞散曉射水村漸明漁火方絶灘露夜潮痕注凍瀨凄咽征鴻来時應負書見踈栁更憶伊同折異鄉憔悴那堪更逢嵗窮時節東風暗回煖力筭折遍江梅消盡巖雪唯有這愁腸也依舊千結私言竊語些誓約便眠思夢想無休歇這些離恨除非對着說似明月戀芳春慢寒食前進万侯雅言蜂蘂分香燕泥破潤暫寒天氣清新帝里繁華昨夜細雨初勻萬品花藏四苑望一帶栁接重津寒食近蹴踘秋千又是無限逰人紅粧趂戯綺羅夾道青帘賣酒臺榭侵雲處處笙歌不負治世良辰共見西城路好翠華定将出嚴宸誰知道仁主祈祥為民非事行春慶春宫秋怨周羙成雲接平岡山圍寒野路回漸轉孤城衰栁啼鴉驚風驅鴈動人一片秋聲倦途休駕淡烟裏㣲芒見星塵埃憔悴生怕黄昏離思牽縈華堂舊日逢迎花艶參差香霧飄零管絃當頭偏憐嬌鳳夜深簧暖笙清眼波傳意恨密約匆匆未成許多煩惱只為當時一餉留情陳允平斜日明霞殘虹分雨軟風淺掠蘋波聲冷瑤笙情踈寳扇酒酲無奈秋何彩雲輕散漫敲缺銅壺浩歌眉痕留怨依約逺峯學歛雙蛾銀牀露洗凉柯屏掩香銷忍掃裀羅楚驛梅邊吴江楓畔庾郎從此愁多草蛩喧砌料催織迴文鳳梭相思遼逺簾捲翠樓月冷星河憶舊逰周邦彦記愁横淺黛淚洗紅鉛門掩秋宵墜葉驚離思聴寒螀夜泣亂雨瀟瀟鳳釵半脫雲鬢窓影燭花搖漸暗竹敲凉踈螢照曉兩地魂銷迢迢問音信道徑底花隂時認鳴鑣也擬臨朱戸嘆因郎憔悴差見郎招舊巢更有新燕楊栁拂河橋但滿眼京塵東風竟日吹露桃别黄澹翁吴君特送人猶未苦苦送春隨人去天涯片紅都飛盡隂隂潤緑暗裏啼鴉賦情頓雪雙鬢飛夢逐塵沙歎病渇凄凉分香瘦減兩地㸔花西湖斷橋路想繋馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為冩深怨空壁掃秋蛇但醉上吴臺殘陽草色歸思賖水龍吟詠笛東坡楚山脩竹如雲異材秀出千林表龍鬚半翦鳳膺㣲漲玉肌勻繞朩落淮南雨晴雲夢月明風裊自中郎不見桓伊去後知辜負秋多少聞道嶺南太守後堂深緑珠嬌小綺窓學弄梁州初遍霓裳未了嚼徴含宫泛商流羽一聲雲杪為使君洗盡蠻風瘴雨作霜天曉楊花似花還似非花也無人惜從教墮抛家傍路思量却似無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉来雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看来不是楊花㸃㸃是離人淚楊花章質夫燕忙鶯懶芳殘正堤上栁花飄墜輕飛亂舞㸃畫青林全無才思閒趂逰絲靜臨深院日長門閉傍珠簾散漫垂垂欲下依前被風扶起蘭帳玊人睡覺恠春衣雪霑瓊綴繡牀漸滿香毬無數纔圓却碎時見蜂兒仰粘輕粉魚吞池水望章臺路杳金鞍逰蕩有盈盈淚前調秦少㳺小樓連苑横空下窺綉轂雕鞍驟踈簾半捲單衣初試清明時候破暖輕風弄晴㣲雨欲無還有賣花聲過盡垂楊院宇紅成陣飛鴛甃玉佩丁東
body:
  text: 花草稡編詞曲類二詞選之屬提要臣等謹案花草稡編二十四巻明陳耀文編耀文有經典稽疑已著錄是編採掇唐宋歌詞亦間及于元人而所采殊少耀文自稱其因唐花間集宋草堂詩餘而起故以花草稡編為名然使惟以二書合編各採其一字名書已無義理乃綜括兩代之詞而以花字代唐字以草字代宋字衡以名實尤屬未安然其書捃摭繁富毎調有原題者必錄原題或稍僻者必著采自某書其有本事者併列詞話於其後其詞本不佳而所填實為孤調如縷縷金之類則註曰備題編次亦頗不茍盖耀文于明代諸人中猶講考證之學非嘲風弄月者比也雖糾正之詳不及萬樹之詞律選擇之精不及朱彝尊之詞綜而裒輯之功實居二家之前創始難工亦不容以後來掩矣此本與天中記板式相同盖猶耀文舊刻而巻首乃有延祐四年陳良弼序刋刻拙惡僅具字形而其文則仍耀文之語盖坊賈得其舊板别刋一序弁其首以偽為元板耳乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀花草稡編原序夫填詞者古樂府流也自昔選次者衆矣唐則有花間集宋則草堂詩餘詩盛於唐而衰於晚葉至夫詞調獨妙絶無倫然宋之草堂盛行而花間不顯故知宣情易感含思難諧者矣余自牽拙多睡嘗欲銓稡二集以備一代典章顧以紀緝天中因循有未果者嗣以飄泊東南納交素友淮隂吳生承恩姑蘓吳生岫皆躭樂秇文藏書甚冨余每得之假閲輙隨筆位序之久之遂成六巻移疾歸來㳺息竹素綜綴正業之餘因復益以諸人之本集各家之選本記録之所附載翰墨之所遺留上遡開天下訖宋末曲調不載於舊刻者元詞間亦與焉其義例以世次為后先以短長為小大為巻一十有二計詞三千二百八十餘首䴡則兼收不無有乖於大雅文房取玩畧闚前輩之典刑邑侯太初謂天中百巻未便刻成此帙無多冝先付梓余重違其意漁獵剪耘殆逾二紀敝帚亦不忍遂棄者所愧顧曲逺謝於周郎酸鹹或爽於衆口貽之詞垣庶期寄於取材云是刻也繇花間草堂而起故以花草命編陳良弼序

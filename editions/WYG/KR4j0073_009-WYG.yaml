body:
  text: 花草稡編巻九明陳耀文輯小令少年遊晏同叔重陽過後西風漸𦂳庭樹葉紛紛朱欄向曉芙蓉妖艶特地鬭芳新霜前月下斜紅淡蘂明媚欲囬春莫將瓊萼等閒分留贈意中人二霜華滿樹蘭彫蕙慘秋艶入芙蓉臙脂嫩臉金黄輕蘂猶自怨西風前歡徃事當歌對酒無限到心中更慿朱檻憶芳容腸斷一枝紅三芙蓉花發去年枝雙燕欲歸飛蘭堂風軟金爐香暖新曲動簾帷家人拜上千春壽深意滿瓊巵緑鬢朱顔道家裝束長似少年時四謝家庭檻曉無塵芳晏祝良辰風流妙舞櫻桃清唱依約駐行雲榴花一盞濃香滿為壽百千春歲歲年年共歡同樂喜慶與時新晏叔原緑勻欄畔黄昏淡月攜手對殘紅紗窻影裡䑃朧春睡繁杏小屏風須愁别後天高海闊何處更相逄幸有花前一盃芳酒歡計莫怱怱歡作歸二西溪丹杏波前媚臉珠露與深勻南橋翠栁烟中愁黛絲雨惱嬌顰當年此處聞歌殢酒曾對可憐人今夜相思水長山逺閒卧送殘春三離多最是東西流水終解兩相逄淺情縱似行雲無定猶到夢魂中可憐人意薄於雲水佳㑹更難重細想從來斷腸多處不與這番同四西樓别後風高露泠無奈月分明飛鴻影裡搗衣砧外總是玉關情王孫此際山重水逺何處賦西征金閨魂夢枉丁寧尋盡短長亭五雕梁燕去裁詩寄逺庭院舊風流黄花醉了碧梧題罷閒卧對高秋繁雲破後分明素月涼影掛金鈎有人凝盼倚西樓新樣兩眉愁歐陽永叔去年秋晚此園中攜手翫芳叢拈花嗅蘂惱烟撩霧拚醉倚西風今年重對芳叢處追徃事又成空敲遍闌干向人無語惆悵滿枝紅閨怨栁耆卿日高花榭嬾梳頭無語倚粧樓脩眉歛黛逺山横翠相對結春愁王孫走馬長楸陌貪迷戀少年遊似恁疎狂費人拘管爭似不風流游宴長安古道馬遲遲髙栁亂蟬嘶夕陽島外秋風原上目斷四天垂歸雲一去無蹤跡何處是前期狎興生疎酒徒蕭索不似去年時秋思參差烟樹霸陵橋風物盡前朝衰楊古栁幾經攀折憔悴楚宫腰夕陽閒淡秋光老離思滿蘅臯一曲陽關斷腸聲盡獨自上蘭橈美人層波㶑灔逺山横一笑一傾城酒容紅嫩歌喉清麗百媚坐中生牆頭馬上初相見不準擬恁多情昨夜更闌洞房深處特地快逄迎相思簾垂深院冷蕭蕭花外漏聲遙青燈未滅紅窻閒卧逺夢去迢迢薄情謾有歸消息鴛鴦被半香銷試問伊家阿誰心緒禁得恁無聊又一生贏得是凄凉追前事暗心傷好天良夜深屏香被爭忍便相忘王孫動是經年去貪迷戀有何長萬種千般把伊情分顛倒儘猜量蘇東坡去年相送餘杭門外飛雪似楊花今年春盡楊花似雪猶不見還家對酒捲簾邀明月風露透窻紗恰佀姮娥為憐雙燕明照畫梁斜周美成并刀如水呉鹽勝雪纖手破新橙錦幄初温獸烟不斷相對坐調笙低聲問向誰行宿城上已三更馬滑霜濃不如休去直是少人行二朝雲漠漠散輕絲樓閣淡春姿栁泣花啼九街泥重門外燕飛遲而今麗日明金屋春色在桃枝不似當時小樓衝雨幽恨兩人知三簷牙縹緲小紅樓涼月掛銀鈎聒席笙歌透簾燈火風景似揚州當時面色欺春雪曽伴美人遊今日重來更無人問獨自倚欄愁曉行林少瞻霽霞散曉月猶明疎木掛殘星山逕人稀翠蘿深處啼鳥兩三聲霜華重逼雲裘泠心共馬啼輕十里青山一溪流水都做許多情井桃張子野碎霞浮動曉朦朧春意與花通銀瓶素綆玉泉金甃真色浸朝紅花枝人面難常見青子小叢叢韶華長在明年依舊相與笑東風杜壽域小軒深院是秋時風葉墮高枝疎簾靜永薄帷清夜暑退覺寒微凄凉天氣離愁意音信杳難期多情成病不須醫更憔悴轉尋思二小樓歸燕又黄昏寂寞鎖髙門輕風細雨惜花天氣相次過春分畫堂無緒初燃絳䗶羅帳掩餘薰多情不解怨王孫任薄倖一從君杜壽域雙螺未合雙蛾先歛家在碧雲西别母情懐隨郎滋味桃葉渡江時扁舟載了怱怱去今夜泊前溪楊栁津頭梨花牆外心事兩人知長至毛滂逄山雪氣入疎簾羅幕曉寒添愛日騰波朝霞入戸一線過氷簷緑樽香嫩蒲萄暖滿酌破冬嚴庭下早梅已含芳意春近瘦枝南天祝弄晴微雨細絲絲山色淡無姿栁絮飛殘荼䕷開罷青杏已團枝闌干倚遍人何處愁聽語黄鸝寳瑟塵生翠銷香減天逺雁書遲趙君舉曉山日薄半春隂煙暖栁拖金滿眼新晴歌聲樓影悠蕩碧波心閒亭客散人歸去疎雨濕羅襟樓閣濛濛斷虹明處十里暮雲深迎春樂晏同叔長安紫陌春歸早軃垂楊染芳草被啼鶯語燕催清曉正好夢頻驚覺當此際青樓臨大道幽㑹處兩情多少莫惜明珠百琲占取長年少秦少遊菖蒲葉葉知多少唯有箇蜂兒妙雨晴紅粉齊開了露一㸃嬌黄小早是晚來風力暴更春共斜陽俱老怎得花香深處作箇蜂兒抱周美成清池小圃開雲屋結春伴徃來熟憶年時縱酒盃行速看月上歸禽宿牆裏修篁森似束記名字曽刋新緑見說别來長㳂翠蘚封寒玉二人人花艶明春栁憶筵上偷攜手趂歌停舞罷來相就醒醒箇無些酒比目香囊新刺繡連隔座一時薰透為甚月中歸長是他隨車後思逺人晏叔原紅葉黄花秋意晚千里念行客飛雲過盡歸鴻無信何處寄書得淚彈不盡臨窻滴就硯旋研墨漸冩到别來此情深處紅牋為無色滿宫花張泌花正芳樓似綺寂寞上陽宫裏鈿籠金鎖睡鴛鴦簾冷露華珠翠嬌艶輕盈香雪膩細雨黄鶯雙起東風惆悵欲清明公子橋邊沉醉魏承班雪霏霏風澟澟玉郎何處狂飲醉時想得縱風流羅帳香幃鴛寢春朝秋夜思君甚愁見繡屏孤枕少年何事負初心淚滴縷金雙袵尹鶚月沉沉人悄悄一炷後庭香褭風流帝子不歸來滿地禁花慵掃離恨多相見少何處醉迷三島漏清宫樹子規啼愁鎖碧窻春曉瑤池燕侯鯖録飛花成陣春心困寸寸别腸多少愁悶無人問偷啼自揾殘粧粉抱瑤琴尋出新韻玉纖趂南風未解幽愠伭雲鬢眉峰歛暈嬌和恨東坡云琴曲有瑤池燕其詞不協而聲亦怨咽變其詞作閨怨寄陳季常云此曲甚妙勿妄與人云思越人張泌燕雙飛鶯百囀越波堤下長橋鬭鈿花筐金匼匝舞衣羅薄纖腰東風澹蕩慵無力黛眉愁聚春碧滿地落花無消息月明腸斷空憶孫光憲古臺平芳草逺館娃宫外春滿翠黛空留千載恨教人何處相尋綺羅無復當時事露花㸃滴香淚惆悵遙天横渌水鴛鴦對對飛起二渚蓮枯古樹老長洲廢苑蕭條想像玉人空處所月明獨上溪橋經春初敗秋風起紅蘭緑蕙愁死一片風流傷心地魂銷目斷西子鹿䖍扆翠屏欹銀燭背漏殘清夜迢迢雙帶繡窠盤錦薦淚侵花暗香銷珊瑚枕膩鴉鬟亂玉纖慵整雲散苦是適來新夢見離腸爭不千斷玉團兒鉛華淡紵新粧束風韻天然異俗彼此知多雖然初見情分先熟爐烟淡淡雲屏曲睡半醒生香透肉賴得相逄若還虚過生世不足用周美成韻盧炳緑雲慢綰新梳束這標致諸餘不俗邂逅相逄情懐雅合全似深熟耳邊笑語論心曲把不定紅生臉肉若得同歡共伊諧老心事忒足秋夜雨蔣㨗竹山詞黄雲水驛秋笳噎吹人雙鬢如雪愁多無奈處謾碎把寒花輕撧紅芳轉入香心裏夜漸深人語初歇此際愁更别雁影落西窻斜月入塞程正伯好思量正秋風半夜長奈銀缸一㸃耿耿背西窗衾又涼枕又涼露華凄凄月半牀照得人真箇斷腸窻前誰浸朩犀黄花也香夢也香醉紅粧張子野瓊林玉樹不相饒薄雲衣細栁腰一般粧樣百般嬌眉眼秀總如描東風搖草襍花飄無計上青條更送雙歌郎且飲郎未醉有金貂結帶巾中呉紀聞頭巾帶誰理㑹三千貫賞錢新行條制不得向後長垂與殊服相類法甚嚴人盡畏硬縫闊大帶向前面繫和我大學先輩被人呼保義宣和初有㫖令士人係結帶巾否則違制論士人甚苦之當時有謔詞云探春令晏叔原緑楊枝上曉鶯啼報融和天氣被數聲吹入紗窻裏又驚起嬌娥睡緑雲斜嚲金釵墜惹芳心如醉為少年濕了鮫綃帕上都是相思淚二簾旌微動峭寒天氣龍池氷泮杏花笑吐香猶淺又還是春將半清歌妙舞從頭按等芳時開宴記去年對著東風曾不負鸎花願蔣㨗竹山詞玉窻蠅字記春寒滿茸絲紅處畫翠鴛雙展金蜩趐未抵我愁痕膩芳心一㸃天涯去絮濛濛遮住舊對花彈玩纖瓊指為粉靨空彈淚珍珠令張炎桃花扇底歌聲杳愁多少便覺道花心閑了因甚不歸來甚歸來不早滿院飛花休要掃待留與薄情知道知道怕一似飛花和春都老醉花隂和江宣德醉紅粧詞沈㑹宗微含清露真珠滴怯曉寒脈脈秉燭倚雕欄今日尊前盡是多情客從來應與春相得有動人標格半笑倚春風醉臉生紅不是胭脂色梅舒信道月幌風簾香一陣正千山雲盡冷對酒尊傍無語含情别是江南信壽陽粧罷人微困更玉釵斜襯擬揷一枝歸只恐風流羞上潘郎鬢送陸宣徳粉輕一捻和香聚教露華休妬今日在尊前只為情多脈脈都無語西湖雪過難留住指廣寒歸去去後又明年人在江南夢到花開處九日李易安薄霧濃雲愁永晝瑞腦噴金獸時節又重陽寳枕紗㡡半夜秋初透東籬把酒黄昏後有暗香盈䄂莫道不銷魂簾捲西風人似黄花痩菊花新風情栁耆卿欲掩香幃論繾綣先歛雙蛾愁夜短催促少年郎先去睡鴛衾圖暖須臾放了殘針線脫羅裳恣情無限留取帳前燈時時待看伊嬌面張子野墮髻慵粧來日暮家在栁橋堤下住衣緩絳綃垂瓊樹裊一枝紅霧院深池靜花相妬粉牆低樂聲時度長恐舞筵空輕化作綵雲飛去杜壽域怎奈花殘又鶯老檻裏青梅數枝小新荷長池沼當晴晝燕子聲鬧亭欄花綻顔色好風雨催催等閒開了酒醒暗思量無箇事甚剛煩惱望江東黄魯直江水西頭隔烟樹望不見江東路思量只有夢來去更不怕江闌住燈前冩了書無數算没箇人傳與直饒尋得雁分付又還是秋將暮青門引張子野天機餘錦乍暖還輕冷風雨晩來方定庭軒寂寞近清明殘花中酒又是去年病樓頭畫角風吹醒入夜重門靜那堪更被明月隔牆送過鞦韆影望漢月晏同叔千縷萬條堪結占斷好風良月謝娘春晩先多愁更撩亂絮飛如雪短亭相送處長憶得醉中攀折年年歲歲好時節怎奈向有人離别栁耆卿明月明月明月何事作圓還缺恰如年少洞房人歡㑹依前離别小樓凭檻處正是去年時節千里清光又依舊奈夜永厭厭人絶菊李和文能改齋謾録黄菊一叢臨砌顆顆露珠粧綴獨教冷落向秋天恨東君不曽留意雕欄新雨霽緑蘚上亂鋪金蕋此花開後更無花願愛惜莫同桃李憶餘杭掃市舞詞賦潘逍遙湘山野録長憶西湖湖水上盡日凭闌樓上望三三兩兩釣魚舟島嶼正清秋笛聲依約蘆花裏白鳥成行忽驚起别來閒想整綸竿思入水雲寒古今詞話云石曼卿見此詞使畫工綵繪之作小景圖湘山云錢希白愛之自書玉堂屏風潘閬字逍遙狂放不羈坐盧多遜黨亡命乃變姓名僧服入中條山後㑹赦以四門助教召之閬乃自歸送信州安置仍不懲艾復為掃市舞詞曰出砒霜價錢可贏得撥灰兼弄火暢殺我以此為士人不齒放棄終身南柯子一名風蝶令望秦川毛熈震逺山愁黛碧横波慢臉明膩香紅玉茜羅輕深院晚堂人靜理銀箏鬢動行雲影裙遮㸃屐聲嬌羞愛問曲中名楊栁杏花時節幾多情二惹恨還添恨牽腸即斷腸凝情不語一枝芳獨映晝簾閒立繡衣香暗想為雲女應憐傅粉郎晩來輕步出閨房髻慢釵横無力縱猖狂永叔鳯髻金泥帶龍紋玉掌梳走來窻下笑相扶愛道畫眉深淺入時無弄筆偎人久描花試手初等閒妨了繡工夫笑問雙鴛鴦字怎生書寄意侍妾榴花東坡紫陌尋春去紅塵拂面來無人不道看花囬惟見石榴新蕋一枝開氷簟堆雲髻金尊灔玉醅緑隂青子莫相催留取紅巾千㸃照池臺舞妓雲鬢裁新緑霞衣曳曉紅待歌凝立翠筵中一朶彩雲何事下巫峯趂拍鸞飛鏡囘身燕漾空莫翻紅袖過簾櫳怕被楊花勾引嫁東風端午山與歌眉㶑波同翠眼流遊人都上十三樓不羨竹西歌吹古揚州菰黍連昌歜瓊彞倒玉舟誰家水調唱歌頭聲遶碧山飛去晩雲留秦少游愁鬢香雲墜嬌眸水玉裁月幈風幌為誰開天外不知音耗百般猜玉露沾庭砌金風動琯灰相看有似夢初囘只恐又抛人去幾時來二香墨彎彎畫燕脂淡淡勻揉藍衫子杏黄裙獨倚玉闌無語㸃檀唇人去空流水花飛半掩門亂山何處覔行雲又是一鈎新月照黄昏贈陶心兒玉漏迢迢盡銀潢淡淡横夢囘宿酒未全醒已被鄰雞催起怕天明臂上粧猶在襟間淚尚盈水邊燈火漸人行天外一鈎殘月帶三星末句蓋心字也贈東坡侍妾朝雲靄靄凝春態溶溶媚曉光何期容易下巫陽祗恐使君前世是襄王暫為清歌駐還因暮雨忙瞥然歸去斷人腸空使蘭臺公子賦高唐靄靄詞話作洩洩使君雌黄作翰林又夕露霑芳草斜陽帶逺村幾聲殘角起譙音撩亂栖鵶飛舞鬧黄昏天共高城逺香餘繡被温客程常是可銷魂怎向人心頭横著箇人人又樓迥迷雲日溪深漲曉沙年來憔悴費鉛華樓上一天春思浩無涯羅帶寛腰素真珠溜臉霞海棠開盡栁飛花薄倖只知游蕩不思家别思賀方囘斗酒才供淚扁舟只載愁畫橋青栁小朱樓猶記出城車馬為遲留有恨花空委無情水自流河陽新鬢儘禁秋蕭散楚雲巫雨此生休春夜謝無逸雨洗溪光淨風掀栁帶斜畫樓朱戸玉人家簾外一眉新月浸梨花金鴨香凝袖銅荷燭映紗鳯盤宫錦小屏遮夜靜寒生春筍理琵琶僧仲殊十里青山逺潮平路帶沙數聲啼鳥怨年華又是凄涼時候在天涯白露收殘月清風散曉霞緑楊堤畔鬧荷花記得年時沽酒那人家塔院層閣陳去非矯矯千年鶴茫茫萬里風欄干三面看秋空背挿浮屠千尺泠烟中林塢村村暗溪流處處通此間何似玉霄峰遙望蓬萊依約晩雲東春景田不伐夢怕愁時斷春從醉裡囘凄涼懐抱向誰開些子清明時候被鶯催栁外都成絮欄邊半是苔多情簾燕獨徘徊依舊滿身花雨又歸來春思團玉梅梢重香羅芰扇低簾風不動蝶交飛一樣緑隂庭院鎖斜暉對月懐歌扇因風念舞衣何須惆悵惜芳菲􅂸却一年憔悴待春歸向伯恭梁苑千花亂隋堤一水長眼前風物總悲涼何況眉頭心上不相忘因夢聊攜手慿詩續斷腸已驚蝴蝶過東牆更被風吹鴻鴈不成行石次仲鳯髻斜分翠鴛鞋小砑紅東君著意綺羅叢最好一枝特地怨東風懊恨無情語嬌羞忍笑容相看疑是夢魂中怕逐飛雲歸去斷行蹤二疇昔飛鸞侣而今斷鴈行西風嶺外下斜陽無賴一鈎新月挂人腸雙泪沾襟袖孤燈對客床枕餘衾剰只殘香别得嬌癡不睡也思量三春淺梅紅小山寒嵐翠薄斜風吹雨入簾幕夢覺南樓嗚咽數聲角歌酒工夫懶别離情緒惡舞衫寛盡不堪著若比那囘相見更消削四亂絮飄晴雪殘花綉地衣西園歌舞驟然稀只有多情蝴蝶作團飛舊事深琴怨新愁減帶圍倚樓凝望更依依怕見一天風雨捲春歸早春感懐程正伯栁弱眠初醒梅殘舞尚癡春隂將冷傍簾幃又是東風和恨向人歸樂事燈前記愁腸酒後知老來無計遣芳時只有閒情隨分品花枝二竹粉翻新籜荷花拭靚粧斷雲侵晚度横塘小扇斜釵依約傍牙床蘸蜜分紅荔傾筒㵼碧香醉時風雨醒時涼明月多情依舊過西廂李蕭逺嫋嫋秋風起蕭蕭敗葉聲岳陽樓上聽哀箏樓下凄涼江月為誰明霧雨沉雲夢煙波渺洞庭可憐無處問湘靈只有無情江水遶孤城頥堂詞命嘯無人嘯含嬌何處嬌江南烟水太迢迢璧月瓊樓空想夜和朝目斷腸隨斷魂消骨更銷瑣窻風雨不相饒猶似西湖一枕聽寒潮新月洪叔璵栁浪搖清沼荷風度晩簷碧天如水印新蟾一罅清光斜露玉纖纖寳鏡微開匣金鈎未押簷西樓今夜有人忺應傍粧臺低照畫眉尖周紫芝霧帳蘭衾暖薰爐寳篆濃眼波猶帶睡朦朧卧聽曉來雙燕語春風螺淺歡餘黛霞銷枕處紅斷雲飛雨怕怱怱欲去且留情緒兩忡忡方錢塘出侍兒蟬薄輕梳鬢螺香淺畫眉西湖人道似西施人似西施濃淡更相宜畫燭催歌板飛花上舞衣殷勤猶勸玉東西不道使君腸斷已多時楊時可怨草迷南浦愁花傍短亭有情歌酒莫催行看取無情花草也關情舊日臨岐曲而今忍淚聽淮山何在暮雲凝待倩春風吹夢過江城李易安天上星河轉人間簾幕垂涼生枕簟淚痕滋起解羅衣聊問夜何其翠貼蓮蓬小金銷藕葉稀舊時天氣舊時衣只有情懐不似舊家時曾覿壁月窺紅粉金蓮映綵山東風絲管滿長安移下十洲三島在人間兩兩人初散厭厭夜向闌倦粧殘醉怯輕寒手撚玉梅無緒倚闌干吕居仁驛路侵斜月溪橋度曉霜短籬殘菊一枝黄正是亂山深處過重陽旅枕元無夢寒更毎自長只言江左好風光不道中原歸思轉凄涼丁酉清明黄叔暘天上傳新火人間試裌衣定巢新燕覔香泥不為綉簾朱戸說相思側㡌吹飛絮慿欄送落暉粉痕銷淡錦書稀怕見山南山北子規啼嚴仁栁陌通雲徑瓊梳啓翠樓桃花紙薄漬氷油記得年時詩句為君留曉緑千層出春紅一半休門前溪水泛花流流到西州猶是故家愁蘇十能江水粼粼碧雲山疊疊竒平生心事一鈎絲便是壺中日月更何疑文叔今方貴君房素自癡洛陽塵土涴人衣爭似歸來雙足踏漣漪曾舜卿桐葉涼生夜藕花香滿時幾多離思有誰知遙望盈盈一水抵天涯雨洒征衣淚月顰分鏡眉相逄又是隔年期不似畫橋歸燕解于飛天下樂楊無咎雪後雨兒雨後雪鎮日價長不歇今畨為寒忒太初和天地也來厮鼈睡不着身心自暗攧况味憑誰説枕衾冷得渾似鐵秪心頭些箇熱又一闋尾句云更闌夜永獨自坐偕影兒厮伴著夢仙郎寄越張子野江東蘇小夭斜窈窕都不勝綵鸞嬌妙春艶上新粧肌肉過人香佳樹隂隂池院華燈綉幔花月好豈能長見離聚此生縁何計問高天紅窻聽晏同叔淡薄梳粧輕結束天意與臉紅眉緑斷環書素傳情久許雙飛同宿一向無端分比目誰知道風前月底相看未足此心終擬覔鸞絃重續二記得香閨臨别語彼此有萬重心訴淡雲輕靄知多少隔桃源無處夢覺相思天欲曙依前是銀屏畫燭宵長歲暮此時何計託鴛鸞飛去上林春東堂蝴蝶初翻簾綉萬玉女齊同舞袖落花飛絮濛濛長憶著灞橋别後濃香斗帳自永漏任滿地月深雲厚夜寒不近流蘇秪憐他後庭梅瘦望逺行李珣春日遲遲思寂寥行客關山路遙瓊窻時聽語鸎嬌栁絲牽恨一條條休暈繡罷吹簫貌逐花暗凋同心猶結舊裙腰忍辜風月度良宵二露滴幽庭葉落時愁聚蕭娘栁眉玉郎一去負佳期水雲迢遞冩書遲屏半掩枕斜欹蠟淚無言對垂吟蛩斷續漏頻移入窻明月鑒空帷三遶砌花光錦綉明朱扉鎮日長扃夜寒不去夢難成爐香煙冷自亭亭殘月秣陵砧不傳消息但傳情黄金窻下忽然驚征人歸日二毛生紅羅襖周美成畫燭尋歡去羸馬載愁歸念取酒東壚樽罍雖近採花南浦蜂蝶須知自分袂天闊鴻稀空懐夢約心期楚客憶江蘺算宋玉未必為秋悲恨歡遲張尚書淡薄情懐淺綴胭脂獨占江梅最好是嚴凝苦寒天氣却是開時也不許桃杏鬬妍媸也不許雪霜相欺又只恐誰家一聲羌笛落盡南枝恨來遲頥堂詞栁暗汀洲最春深處小宴初開似泛宅浮家水平風軟咫尺蓬萊更勸君吸盡紫霞盃醉看鸞鳯徘徊正洞裏桃花盈盈一笑依舊憐才雨中花程正伯聞說海棠開盡了怎生得夜來一笑顰緑枝頭落紅㸃裡問有愁多少小院閉門春悄悄禁不得痩腰如嫋荳蔻濃時酴醿香處試把菱花照二巻地芳春都過了花不語人含笑花與人期人憐花病痩似人多少聞道重門深悄悄愁不盡露啼烟嫋斷得相思除非明月不把花枝照永叔千古都門行路能使離歌聲苦送盡行人花殘春晩又到東君去醉藉落花吹暖絮多少曲堤芳樹且攜手留連良辰美景留作相思處王逐客百尺清泉聲陸續映瀟洒碧梧翠竹面千步迴廊重重簾幙小枕欹寒玉試展鮫綃看畫軸見一片瀟湘凝緑待玉漏穿花銀河垂地月上欄杆曲楊補之自是雲濕雨潤消不解佯嗔偷悶傾坐精神故人情性眉際春生暈語帶京華清更韻聽婭姹鶯喉嬌稔别後相思心頭欲見覔箇燈花信二巳是花魁栁冠更絶唱不容同伴畫鼓低敲紅牙隨應著箇人勾喚漫引鶯喉千樣轉聽過處幾多嬌怨換羽移宫偷聲減字不怕人腸斷晏同叔剪翠粧紅欲就折得清香滿袖一對鴛鴦睡未足葉下長相守莫傍細條尋嫩藕怕緑刺罥衣傷手可惜許明月風露好恰在人歸後茶瓶兒上元趙德莊淡月華燈春夜送東風栁煙梅麝寳釵宫髻連驕馬似記得帝鄉游冶悅親戚之情話況溪山坐中如畫凌波微步人歸也看酒醒鳯鸞誰跨寄李生梁意娘滿地落花舖綉麗色著人如酒曉鶯窻外啼楊栁愁不奈兩眉頻皺關山杳音信悄那堪是昔年時候盟言辜負知多少對好景頓成消痩石次仲相對盈盈一水多聲價聞名得字副能見也還抛棄負了萬紅千翠留無計來無計成何況味而今若没些兒事却枉了做人一世鬢邊華梅苑小梅香細艶淺過楚岸樽前偶見愛閑淡天與精神青鬢開人醉眼如今抛擲經春恨不見芳枝寄逺向心上誰解相思賴長對粧樓粉面留春令黄魯直江南一鴈横秋水嘆咫尺斷行千里囘文機上字縱横欲寄逺慿誰是謝客池塘春都未微微動短牆桃李半隂纔㬉却清寒是痩損人天氣晏叔原畫屏天畔夢囘依約十洲雲水手撚紅牋寄人書冩無限傷春事别浦高樓曾謾倚對江南千里樓下分流水聲中有當日凭高淚李之儀夢斷難尋酒醒猶困那堪春暮香閤深沉紅窻翠暗莫羨顛狂絮緑滿當時攜手路嬾見同歡處何時却得低幃昵枕盡訴情千縷浪淘沙一名賣花聲小說作曲入㝠李後主簾外雨潺潺春意闌珊羅衾不暖五更寒夢裏不知身是客一餉貪歡獨自莫凭欄無限江山别時容易見時難流水落花春去也天上人間二徃事只堪哀對景難排秋風庭院蘚侵堦一行珠簾閒不捲終日誰來金劍已沉埋壯氣蒿萊晩涼天靜月華開想得玉樓瑤殿影空照秦淮永叔把酒祝東風且共從容垂楊紫陌洛城東總是當年攜手處遊遍芳叢聚散苦匆匆此恨無窮今年花勝去年紅可惜明年花更好知與誰同二萬恨苦綿綿舊約前歡桃花溪畔栁隂間幾度日高春睡重繡戸深關樓外夕陽閒獨自慿欄一重水隔一重山水闊山高人不見有淚無言王介甫伊吕兩衰翁歴遍窮通一為釣叟一耕傭若使當時身不遇老了英雄湯武偶相逢風虎雲龍興王秪在笑談中直至如今千載後誰與爭功晏叔原小緑間長紅露蕋烟叢花開花落昔年同唯恨花前攜手處徃事成空山逺水重重一笑難逢已􅂸長在别離中霜鬢知他從此去幾度春風張子野腸斷送韶華為惜楊花雪毬搖曳逐風斜容易著人容易去飛過誰家聚散苦咨嗟無計留他行人灑淚滴流霞今日畫堂歌舞地明日天涯曲入𡨕趙旭握管淚盈眸欲冩還休人間情是阿誰留千丈游絲不落地風外悠悠烟雨晩山稠人在西樓幾行候鴈下汀洲一箇思鄉寒夜客萬種離愁美人舞栁耆卿有箇人人飛燕精神急鏘環珮上華裀促拍盡隨紅袖舉風栁腰身䔩䔩輕裙妙盡尖新曲終獨立歛香塵應是西施嬌困也眉黛雙顰探春蘇東坡昨日出東城試探春情牆頭紅杏暗如傾檻内羣芳芽未吐早已囘春綺陌歛香塵雪霽前村東君用意不辭辛料想春光先到處吹綻梅英春情康伯可蹙損逺山眉幽怨誰知羅衾滴盡淚胭脂夜過春寒愁未起門外鴉啼惆悵阻佳期人在天涯東風頻動小桃枝正是銷魂時候也撩亂花飛二愁撚斷釵金逺信沉沉秦箏調怨不成音郎馬不知何處也樓外春深好夢已難尋夜夜餘衾目窮千里正傷心記得當初郎去路緑樹隂隂賀方囘一葉忽驚秋分付東流殷勤為過白蘋洲洲上小樓簾半掩應認歸舟囘首戀朋遊迹去心留歌塵蕭散夢雲收惟有樽前曽見月相伴人愁朱希真風約雨横江秋滿蓬窻箇中物色儘凄涼更是行人行未得獨繫歸艎擁被換殘香黄巻堆床開愁展恨剪思量伊是浮雲儂是夢休問家鄉石孝友好恨這風兒催俺分離船兒吹得去如飛因甚眉兒吹不展尀耐風兒不是這船兒載起相思船兒若念我孤恓載取人人蓬底睡感謝風兒杜壽域後約無慿徃事堪驚秋蛩永夜遶床鳴展轉尋思求好夢還又難成愁思若浮雲消盡重生佳人何處獨盈盈可惜一天無用月空照為誰明已未除夜周少隱江上送年歸還似年時屠蘇休恨到君遲覔得醉鄉無事處莫放愁知紅灺一燈垂應笑人衰鶴長鳬短怨他誰明日江樓春到也且醉南枝程正伯山盡兩溪頭水合天浮行人莫賦大江愁且是芙蓉城下水還送歸舟魚鴈兩悠悠烟斷雲收誰教此水却西流載我相思千㸃淚還與青樓洪叔璵花霧漲𡨕𡨕欲雨還晴薄羅衫子正宜春無奈今宵鴛帳裏身是行人别酒不須斟難洗離情絲鞘如電紫騮鳴腸斷畫橋芳草路月曉風清過龍門史邦卿醉月小紅樓錦瑟箜篌夜來風雨晩來收幾㸃落花饒栁絮同為春愁寄信問晴鷗誰在芳洲緑波寧處有蘭舟獨對舊時攜手地情思悠悠陸務觀緑樹暗長亭幾把離尊陽關常恨不堪聞何況今朝秋色裡身是行人清淚浥羅巾各自消魂一江離恨恰平分安得千尋横鐡鏁截斷烟津劉後村紙帳素屏遮全似僧家無端霜月闖窓紗驚起玉關征戍夢幾疊寒笳歲晩客天涯鬢髮蒼華今年衰似去年些詩酒近來都減價孤負梅花虞美人草辛幼安不肯過江東玉帳匆匆只今草木憶英雄唱著虞兮當日曲便舞春風兒女此情同徃事朦朧湘娥竹上淚痕濃舜目重瞳堪痛恨羽又重瞳夜泊廬山徐淵子鶴林玉露風𦂳浪花生蛟吼鼉鳴家人睡著怕人驚只有一翁捫蝨坐依約三更雪又打殘燈欲暗還明有誰知我此時情獨對梅花傾一盞早又詩成周晋仙韓文璞還了酒家錢便好安眠大槐宫裏著貂蟬行到江南知是夢雪壓漁船盤礴古梅邊也是前縁鵞黄雪白又醒然一事最竒君聽取明日新年張天雨貞居詞云晉仙宋南渡來名士一號方泉老人此詞鮮于困學毎愛書之趙子發濕逗晩香殘春淺春寒洒窻填戸著幽蘭慘慘悽悽仍滴滴做出多般和霰撒珠盤枕上更闌芭蕉怨曲帶愁彈緑遍階前苔一片曉起誰看感舊幼卿能改齋漫録極目楚天空雲雨無蹤謾留遺恨鎖眉峯自是荷花開較晚辜負東風客館嘆飄蓬聚散怱怱揚鞭那忍驟花騘望斷斜陽人不見滿袖啼紅二簾外五更風吹夢無蹤畫樓重上與誰同記得玉釵斜撥火寳篆成空囘首紫金峯雨潤烟濃一江春浪醉醒中留得羅襟前日淚彈與征鴻鄭意娘楊思厚妻盡日倚危欄觸目凄然乗高望處是居延忍聽樓頭吹畫角雪滿長川荏苒又經年暗想梁園與民同樂五門南僧院仍存宣政字不見鼇山豐城道中金叔柔女郎雨溜和風鈴滴滴丁丁釀成一枕别離情可惜當年陶學士孤負郵亭邊鴈帶新聲音信難慿花鬚偷數卜歸程料得到家秋正晩菊滿寒城古杭襍記玉英塞上早春時暖律猶微仰舒金線栁囘堤料得江鄉應更好閒盡梅溪晝漏漸遲遲愁損香肌幾囘無語歛雙眉凭徧闌干十二曲日下樓西夷堅支志壬感舊鄧光薦疎雨洗天清枕簟涼生井梧一葉做秋聲誰念客身輕似葉千里飄零夢斷古臺城月淡潮平便須攜酒訪新亭不見當時王謝宅烟草青青花草稡編巻九

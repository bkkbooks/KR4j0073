body:
  text: 花草稡編卷十明陳耀文輯小令端正好杜壽域檻菊愁烟霑秋露天微冷雙燕辭去月明空照别離苦透素光穿朱戶夜來西風雕寒樹憑欄望迢遙長路花箋寫就此情緒特寄傳知何處二每逢春來長如病玉容瘦薄妝相稱雙歡未經成孤另奈後約全無定衆禽啾唧聲愁聽相思事多少春恨孤眠帳外銀缸耿透一㸃爐烟暝三野禽林栖啾唧語閒庭院殘陽將暮蘭堂靜悄珠簾窣想玉人歸何處喜鵲幾回薄無據愁都在雙眉頭聚凄凉方感孤鴛侣對夜永成愁緒戀繡衾朱希真朩落江南感未平雨瀟瀟衰鬢到今甚處是長安路水連空山鎖暮雲老人對酒今如此一畨新殘夢暗驚又是灑黃花泪問明年此㑹怎生陸放翁長夜偏冷添被兒枕頭兒移了又移我自是笑别人却元來當局者迷如今只恨因緣淺也不曽死恨伊合手下安排了那筵席須有散時二病來自是於春懶但别院笙歌一片蛛絲網遍玻黎盞更問舞裙歌扇有多少鶯愁蝶怨甚夢裏春歸不管楊花也笑人情淺故故粘衣撲面史達祖黃華驚破九日愁正寒城風雨怨秋愁便是秋心也又隨人來到畫樓因緣幸自天安頓更題紅不禁御溝待寫與相思話為怕奴憔悴且休杏花天朱希真淺春庭院東風曉細雨打鴛鴦寒峭花尖望見秋千了無路踏青鬭草人别後碧雲信杳對好景愁多歡少等他燕子傳音耗紅杏開也未到春思吳子和悶來慿得䦨干暖自手引朱簾高捲桃花半露胭脂面芳草如茵乍展煙光散湖光㶑灔映緑栁黃鸝巧囀遙山好似宫眉淺人比遙山更逺史邦卿細風微月垂楊院記年少春愁一㸃棲鶯未覺花梢顫踏損殘紅幾片長安共日邊近逺況老少芳情漸減屏山幾夜春寒淺却怕因而夢見春田謝勉仲海棠枝上東風軟蕩霽色煙光弄暖雙雙燕子歸來晚零落紅香過半琵琶淚揾青衫淺念事與危腸易斷餘酲未解扶頭懶屏裏瀟湘夢逺杏花風稼軒軟波拖碧蒲芽短畫樓外花晴栁暖今年自是清明晚便覺芳情較懶春衫瘦東風剪剪過花塢香吹醉面歸來立馬斜陽岸隔水歌聲一片月照梨花一作怨王孫張子野花暮春去都門東路嘶馬將行江南江北十里五里郵亭幾程程高城漸逺重凝睇烟容細碧空無際不知今夜何處泠落衾幃欲眠時陸務觀霽景風軟烟江春漲小閣無人繡簾半上花外姊妹相呼約樗蒲修蛾忘了章臺樣細思一餉感事添惆悵胸酥臂玉消減擬覔雙魚倩傳書二悶已縈損那堪多病幾曲屏山伴人晝靜梁燕催起猶慵換薰籠新愁舊恨何時盡漸凋緑鬢小雨知花信芳箋寄與何處繡閣珠櫳栁隂中黃玉林晝景方永重簾花影好夢猶酣鶯聲喚醒門外風絮交飛送春歸修蛾畫了無人問幾多别恨淚洗殘粧粉不知郎馬何處嘶烟草萋迷鷓鴣啼春暮李易安夢斷漏悄愁濃酒惱寶枕生寒翠屏向曉門外誰掃殘紅夜來風玉簫聲斷人何處春又去忍把歸期負此情此恨此際擬託行雲問東君二帝里春晚重門深院草緑階前暮天鴈斷樓上逺信誰傳恨綿綿多情自是多沾惹難拚捨又是寒食也鞦韆巷陌人靜皎月初斜浸梨花怨王孫賞荷湖上風來波浩渺秋已暮紅稀香少水光山色與人親說不盡無窮好蓮子已成荷葉老清露洗蘋花汀草眠沙鷗鷺不回頭似應也恨人歸早首句復雅歌詞作雲鎖重樓簾幕曉憶王孫絶筆周紫芝梅子青時春漸老紅滿地落花誰掃舊年池館不歸來又緑盡今年草思量千里鄉關道山共水幾時得到杜鵑只解怨殘春也不管人煩惱望江南一名夢遊仙夢江南江南好李後主多少恨昨夜夢魂中還似舊時遊上苑車如流水馬如龍花月正春風多少淚斷臉復橫頥心事莫將如淚滴鳯笙休向月時吹腸斷更無疑二閒夢逺南國正芳春船上管絃江面緑滿城飛絮混輕塵愁殺看花人閒夢逺南國正清秋千里江山寒色逺蘆花深處泊孤舟笛在月明樓永叔江南蝶斜日一雙雙身似何郎全傅粉心如韓壽愛偷香天賦與輕狂微雨後薄翅膩烟光才伴遊蜂來小院又隨飛絮過東牆長是為花忙錢氏私志江南栁葉細未成隂人為絲輕那忍折鶯嬌枝嫩不勝吟留與待春深十四五閒抱琵琶尋階上乩錢階下走那時相見已留心何況到如今王君玉琪江南栁烟穗拂人輕愁黛空長描不似舞腰雖瘦學難成天意與風情攀折處離恨幾時平已縱柔條維客棹更飛狂絮撲旗亭三月亂啼鶯二江南酒何處味偏濃醉卧春風深巷裏曉尋香斾小橋東竹葉滿金鍾檀板醉人面粉生紅青杏黃梅朱閣上鰣魚苦筍玉盤中酩酊任愁攻三江南燕輕揚繡簾風二月池塘新社過六朝宫殿舊巢空鴶䲳自西東王謝宅曽在桂堂中烟徑落花飛欵欵曉窗驚夢語匆匆偏占杏梁紅四江南竹清潤絶纖埃深徑欲留雙鳯宿後庭偏映小桃開風月影徘徊寒玉瘦霜霰信相催粉泪空流粧㸃在羊車曽傍翠枝來龍笛莫輕裁五江南草如種復如描深映落花鶯舌亂緑迷南浦客魂銷日日鬭青袍風欲轉柔態不勝嬌逺翠天涯經夜雨冷痕沙上帶昏潮誰夢與蘭苕六江南雨風送滿長川碧瓦烟昏沉栁岸紅銷香潤入梅天飄灑正瀟然昏與暮長在楚峯前寒夜愁歌金帶枕暮江深閉朩蘭船烟泪逺相連七江南水江路轉平沙雨霽高烟收素練風晴細浪吐寒花迢遞送星槎名利客飄泊未還家西塞前山漁唱逺洞庭波上鴈行斜征棹宿天涯八江南岸雲樹半晴隂帆去帆來天亦老潮生潮落日西沉南北别離心興廢事千古一沾襟山下孤烟漁市逺栁邊疏雨酒家深行客莫登臨九江南月清夜滿西樓雲葉開時氷吐鑑浪花深處玉沉鈎圓缺幾時休星漢回風露入新秋丹桂不知搖落恨素娥應信别離愁天上共悠悠十江南雪輕素剪雲端瓊樹忽驚春意早梅花偏覺曉香寒飛盞遞清歡蟾玉迥清夜好重看謝女聯詩吟翠幕子猷乘興泛平瀾空惜舞英殘與龍靚張子野青樓宴靚女薦瑤杯一曲白雲江月滿際天拖練夜潮來人物誤瑤臺醺醺酒拂拂上雙腮媚臉已非朱淡粉香紅全勝雪籠梅標格外塵埃閨情香閨內空自想佳期獨步花隂情緒亂謾將珠泪兩行垂勝㑹在何時懨懨病此夕最難持一㸃芳心無托處荼􅐘架上月遲遲惆悵有誰知周美成遊妓散獨自繞回堤芳草懷煙迷水曲密雲銜雨暗城西九陌未霑泥桃李下春晚未成蹊牆外見花尋路轉栁隂行馬過鶯啼無處不悽悽九日雨奉敕撰康伯可重陽日隂雨四郊垂戲馬臺前泥拍肚龍山㑹上水平臍直浸到東籬茱萸胖菊蕊濕滋滋落帽孟嘉尋篛笠休官陶令覔蓑衣兩箇一身泥梅苑梅花好依約透春光記得佳人初睡起巧臨鸞鑑試新粧粉面鬬瓊芳江亭上繞樹嗅清香擬把一枝傳信去不知何處是蘭房獨自暗凄涼夜泊龍橋灘前遇雨作程正伯篷上雨篷底有人愁身在漢江東畔去不知家在錦江頭烟水兩悠悠吾老矣心事幾時休沉水尉香年似日薄雲垂帳夏如秋安得小書舟石次仲山又水雲巘帶風灣斷鴈飛時天拍水亂鴉啼處日銜山疑在畫圖間人漸逺遊子損朱顔别淚空沾雙袖濕春心不放兩眉閒此去幾時還盧申之疏雨過芳節到戎葵纒臂細交紋線縷稱身初試碧綃衣閒步小亭池花下意脈脈有誰知試把花梢和恨數因看蝴蝶著雙飛凝扇立多時夀張儀真王楙野客叢書三傑後福壽兩無涯食乳相君功未既嫵眉京兆眷方滋富貴莫推辭門兩㦸卻棹一綸絲蓴菜秋風鱸鱠美桃花春水鱖魚肥笑傲霅溪湄酬梓潼婁道明侍兒洞賔瑤池上瑞霧藹羣仙素練金童鏘鳯板青衣玉女肅笙鸞身在大羅天沉醉處縹渺玉京山唱徹步虛清燕罷不知今夕是何年海水又桑田蔡真人闌干曲紅揚繡簾旌花嫩不禁纖手捻被風吹去意還驚眉黛蹙山青鏗鐵板閒引步虛聲塵世無人知此曲却騎黃鶴上瑤京風冷月華清陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不顧倡去倚闌獨立歌此詞音調清越東問何人製曰上清蔡真人也歌罷得數錢即下樓亟遣僕追之巳失矣海山記隋煬帝湖上栁烟裏不勝摧宿霧洗開明媚眼東風搖弄好腰肢烟雨更相宜環曲岸隂覆畫橋低線拂行人春晚後絮飛晴雪暖風時幽意更依依青鎖高議海山記云隋煬帝泛東湖製湖上曲望江南八闋按段安節樂府雜録云望江南李德裕鎮浙日為亡妓謝秋娘所撰本名謝秋娘後改此名亦曰夢江南據此則隋時初無此調也且曲詞略不類隋人語豈其劉斧虛搆為者耶因留此一闋以祛後人之惑云諭新及第友人古今詞話這癡騃休恁淚漣漣他是霸陵橋畔栁千人攀了到君攀剛甚别離難荷上露莫把作珠穿水性本來無定度這邊圓了那邊圓終是不心堅於中好楊無咎牆頭艷杏花初試繞珍叢細挼紅蕊欲知占盡春明媚悄無意看桃李持杯準擬花前醉早一葉兩葉飛墜晚來旋旋深無地更聽得東風起二濺濺不住溪流素憶曽記碧桃紅露别來寂寞朝朝暮恨遮亂當時路仙家豈解空相誤嗟塵世自難知處而今重與春為主儘浪蕊浮花妬江月晃重山雪意陸游芳草洲前道路夕陽樓上欄干碧雲何處望歸鞍從軍客耽樂不思還洞裏仙人種玉江邊禁客滋蘭鴛鴦沙暖鶺鴒寒菱花晚不奈鬢毛班初到嵩山作元遺山塞上秋風鼓角城頭落日旌旗少年鞍馬適相宜從軍樂莫問所從誰候騎才通冀北先聲已動遼西歸期猶及栁依依春閨月紅袖不須啼步虛詞李衛公仙女侍董雙成桂殿夜寒吹玉笙曲終却從仙官去萬戶千門皆月明河漢女玉鍊顔雲軿往往到人間九霄有路去無跡裊裊天風吹佩環金錯刀又名醉瑤琴馮延已雙玉斗百瓊壺佳人歡飲笑喧呼麒麟欲畫時難偶鷗鷺何猜興不孤歌婉轉醉糢糊高燒銀燭卧流蘇只銷幾覺懵騰睡身外功名任有無二日融融草芊芊黃鶯求友啼林前栁條裊裊拖金線花蕊茸茸簇錦氈鳩逐婦燕穿簾狂蜂浪蝶相翩翩春光堪賞還堪玩惱殺東風悮少年塗值賈似道葉李余歸路君來路天理昭昭胡不悟公田關㑹竟何如子細思量真自誤雷州戶崕州戶人生㑹有相逄處客中邂逅乏蒸羊聊贈一篇長短句亭前栁朱雍拜月南樓上面嬋娟恰對新粧誰憑欄干處笛聲長追往事遍凄涼看素質臨風消瘦盡粉痕輕依舊真香蕭灑春塵境過橫塘渡清影在回廊二竚立東風裏放纖手淨試梅粧眉暈輕輕畫逺山長添新恨更凄涼嘗憶驛亭人别後尋春去盡是幽香歸路臨清淺在寒塘同水月照虛廊三養就元霜圃問東君曽放瑤英回首藍橋路遍瓊城橫斜影照人明飄香信玉溪仙佩晚同新月步入西清冰質枝頭裊更輕盈分春色贈雙成趙介之坦菴晚秋天過暮雨雲容斂月澄鮮正風露凄清處砌蛩喧更黃葉舞翩翩念故里千山雲水隔被名韁利鎖縈牽莫作悲秋意對樽前且同樂太平年鼓笛令黃魯直寶犀未解心先透惱殺人逺山微皺意淡言疏情最厚枉教作著行宫栁小雨勒花時候抱琵琶為誰清瘦翡翠金籠思珍偶忽拚與山雞僝僽金蓮繞鳯樓宋徽宗綘燭朱籠相隨映馳繡轂塵清香襯萬金光射龍軒瑩繞端門瑞雷輕振元宵為開聖景嚴敷坐觀燈錫慶帝家華英乘春興褰珠簾望堯瞻舜睿恩新晏同叔芙蓉一朵霜秋色迎曉露依依先折似佳人獨立傾城傍朱檻暗傳消息靜對西風脈脈金蘂綻粉紅如滴向蘭堂莫厭重新免清夜微寒漸逼二紅絲一曲傍階砌珠露下獨呈纖麗剪鮫綃碎作香英粉彩線簇成嬌蘂向晚羣花新悴放朵朵似延秋意待佳人插向叉頭更裊裊低臨鳯髻玉樓人去年尋處曽持酒又還是向南枝見後宜霜宜雪精神沒些兒風味減舊先春似與羣芳鬭暗度香不待頻嗅有人笑折歸來玉纖長儘露羅袖憶人人密傳春信微粧曉景淡竚香苞欲綻臨風雖未吐芳心奈暗露盈盈粉面何人月下一聲長笛即是飛英亂慿欄無惜賞芳姿更莫待傾筐巳滿二前村滿雪難尋幽艷無奈清香漏綻烟稍霜萼出牆時似暗妬壽陽粧面幽香浮動無緣攀賞但只心勞魂亂不辭他日醉瓊姿又只恐隂成子滿河傳溫飛卿湖上間望雨蕭蕭烟浦花橋路遙謝娘翠蛾愁不銷終朝夢魂迷晚潮蕩子天涯歸棹逺春已晚鶯語空腸斷若耶溪溪水西栁堤不聞郎馬嘶二江畔相喚曉粧鮮仙景箇女採蓮請君莫向那岸邊少年好花新滿船紅袖搖曳逐風暖垂玉腕腸向桞絲斷浦南歸浦北歸莫知晚來人已稀三同伴相唤杏花稀夢裏每愁依違仙客一去燕已飛不歸泪痕空滿衣天際雲鳥引情逺春已晚烟靄渡南苑雪梅香栁帶長小娘轉令人意傷李詢去去何處迢迢巴楚山水相連朝雲暮雨依舊十二峯前猿聲到客船愁腸豈異丁香結因離别故國音書絶想佳人花下對明月春風恨應同二春暮微雨送君南浦愁斂雙蛾落花深處啼鳥似逐離歌粉檀珠淚和臨流更把同心結情哽咽後㑹何時節不堪回首相望已隔汀洲櫓聲幽孫光憲風颭波斂團荷閃閃珠傾露㸃朩蘭舟上何處吳娃越艷藕花紅照臉大堤狂殺襄陽客烟波隔渺渺湖光白身已歸心不歸斜暉逺汀鸂䳵飛二太平天子等閒遊戲疏河千里栁如絲偎倚緑波春水長淮風不起如花殿腳三千女爭雲雨何處留人住錦帆風烟際紅燒空魂迷大業中三花落烟薄謝家池閣寂寞春深翠蛾輕斂意沉吟沾襟無人知此心玉爐香斷霜灰冷簾鋪影梁燕歸紅杏晚來天空悄然孤眠枕檀雲髻偏顧敻燕揚晴景小窗屏暖鴛鴦交頸菱花掩却翠鬟欹慵整海棠簾外影繡幃香斷金鸂䳵無消息心事空相憶倚東風春正濃愁紅泪痕衣上重二棹舉舟去波光渺渺不知何處岸花汀草共依依雨微鷓鴣相逐飛天涯離恨江聲咽啼猿切此意向誰說艤棹橈獨無憀魂銷小爐香欲焦韋莊何處烟雨隋堤春暮栁色葱蘢畫橈金縷翠旗高颭香風水光融青娥殿腳春粧媚輕雲裏綽約司花妓江都宫闕清淮月映迷樓古今愁二春晚風暖錦城花滿狂殺遊人玉鞭金勒尋勝馳驟輕塵惜良晨翠娥爭勸臨卭酒纖纖手拂面垂絲栁歸時烟裏鐘鼓正是黃昏暗銷魂三錦浦春女繡衣金縷霧薄雲輕花深栁暗時節正是清明雨初晴玉鞭魂斷烟霞路鶯鶯語一望巫山雨香塵隱映遙見翠檻紅樓黛眉愁顧敻曲檻春晚碧流紋細栁楊絲軟露花鮮杏枝繁鶯囀野蕪平似剪直是人間到天上堪遊賞醉眼疑屏障對池塘惜韶光斷腸為花須盡狂閻選秋雨秋雨無晝無夜滴滴霏霏暗燈涼簟怨分離妖姬不勝悲西風稍急喧窗竹停又續膩臉懸雙玉幾回邀約鴈來時違期鴈歸人不歸張泌渺莽雲水惆悵暮帆去程迢遞夕陽芳草千里萬里鴈聲無限起夢魂悄斷烟波裏心如醉相見何處是錦屏香冷無睡被頭多少泪二紅杏交枝相映密密濛濛一庭濃豔倚東風香融透簾櫳斜陽似共春光語蝶爭舞更引流鶯妬魂銷千片玉樽前神仙瑤池醉暮天薛昭藴秋光滿目風清露白蓮紅水緑何處夢回弄珠拾翠盈盈倚蘭橈眉黛蹙採蓮調穩聲相續吳兒伴侣倚棹吳江曲驚起暮天幾雙交頸鴛鴦入蘆花深處宿美人栁耆卿淮岸漸晚園荷向背芙蓉深淺仙娥畫舸露影紅芳交亂難分花與面採多乍覺輕舸滿呼歸伴急漿烟村逺隱隱棹歌漸被蒹葭遮斷曲終人不見秦少游恨眉醉眼甚輕輕覷著神魂迷亂常記那回小曲闌干西畔鬢雲鬆羅襪剗丁香笑吐嬌無限語軟聲低道我何曽慣雲雨未諧早被東風吹散悶損人天不管吕聖求斜紅照水似晴空萬里明霞相倚逐伴笑歌小立緑槐隂裡誚沒些春風味紛紛覷著閒桃李淺淺深深不滿遊人意幽艷一枝向晚重簾深閉是青君愛惜底妓行四者雙花對植似黃封和了龍香難敵四和香悶把琵琶試把么絃輕轣算行家才認得四行家朱窩戲捻骰兒擲朱窩四隻骰子賭名惟有燒盆貢采偏難覔四隻滿江紅名燒盆貢采常把那目字橫書謝三娘全不識俗云謝三娘不識四字罪字頭夜行船歐陽永叔滿眼東風飛絮催行色短亭春暮落花流水草連雲看看是斷腸南浦檀板未終人去去扁舟在緑楊深處手把金尊難為别更那堪亂鶯疏雨别情謝希深綘昨夜佳期初共鬢雲低翠翹金鳯尊前和笑不成歌意偷轉眼波微送草草不容成楚夢漸寒深翠簾霜重相看送到斷腸時月西斜畫樓鍾動餘英溪泛舟毛滂弄水餘英溪畔綺羅香日遲風慢桃花春浸一篙深畫橋東栁低烟逺漲緑流紅空滿眼倚蘭橈舊愁無限莫把鴛鴦驚飛去要歌時少低檀板楊無咎怪被狂風相誤落輕帆暫停烟渚桐樹隂森茅簷瀟灑元是那回來處相與狂朋沽醁醑聽吳姬隔窗言語我既癡迷君還留意明日慢移船去孫浩然何處採菱歸暮隔宵烟菱歌輕舉白蘋風清月華寒影朦朧半和梅雨脈脈相逄心似許扶蘭棹黯然凝竚遙指前村隱隱烟樹含情背人歸去蒲江暖入新梢風又起秋千外霧縈絲細鳩侣寒輕燕泥香重人在杏花窗裡十二銀屏山四倚春醪困共篝沉水却說當時栁啼花怨魂夢為君迢遞梁州令栁耆卿夢覺紗窗曉殘燈掩然空照因思人事苦縈牽離愁别恨無限何時了憐深定是心腸小往往成煩惱一生惆悵情多感月不長圓春色易為老東堂石榴歐陽永叔翠樹芳條颭灼灼裙腰初染佳人攜手弄芳菲緑隂紅影共展雙紋簟插花照影窺鸞鑑只恐芳容減不堪零落春晚青苔雨後深紅㸃二一去門閒掩重來却尋朱檻離離秋實弄輕霜嬌紅脈脈似見燕脂臉人非事往空眉斂誰把佳期賺芳心只願長依舊春風更放明年艷小山莫唱陽關曲淚濕當年金縷離歌自古最銷魂于今更在銷魂處南樓楊栁多情緒不繫行人住人情切似飛絮悠揚便逐春風去鷓鴣天一名思佳客剪朝霞醉梅花思越人永叔學畫宫眉細細長芙蓉出水鬬新粧只知一笑能傾國不信相看有斷腸雙黃鵠兩鴛鴦迢迢雲水恨難忘早知今日長相憶不及從初莫作雙輦路聞車中美人呼歐九醜面漢寶轂雕輪狹路逄一聲腸斷秀幃中身無彩鳯雙飛翼心有靈犀一㸃通金作屋玉為籠車如流水馬如龍劉郎巳恨蓬山逺更隔蓬山十萬重晏叔原彩袖殷勤捧玉鍾當年拚却醉顔紅舞低楊栁樓心月歌盡桃花扇影風從别後憶相逄幾回魂夢與君同今宵剩把銀缸照猶恐相逄是夢中三陌上濛濛殘絮飛杜鵑花裡杜鵑啼年年底事不歸去怨月愁烟長為誰梅雨細曉風微倚樓人聽欲沾衣故園三度羣花謝曼倩天涯猶未歸栁耆卿吹破殘烟入夜風一軒明月上簾櫳因驚路逺人還逺縱得心同寢未同情脈脈意忡忡碧雲歸去認無蹤只應曾向前生裏愛把鴛鴦兩處籠妓館東坡笑撚紅梅嚲翠翹揚州十里最妖嬈夜來綺席新曾見撮得精神滴滴嬌嬌後眼舞時腰劉郎幾度欲魂消明朝酒醒知何處腸斷雲間碧玉簫春閨秦少游枝上流鶯和淚聞新啼痕間舊啼痕一春魚鳥無消息千里關山勞夢魂無一語對芳樽安排腸斷到黃昏甫能炙得燈兒了雨打梨花深閉門黃山谷節去蜂愁蝶不知曉庭環繞折殘枝自然今日人心别未必秋香一夜衰無閒事即芳期菊花須插滿頭歸宜將酩丁酬佳節不用登臨送落暉重九集句塞鴈初來秋影寒霜林風過葉聲乾龍山落帽千年事我對西風猶整冠蘭委佩菊堪餐人情世事半悲歡但將酩酊酬佳節更把茱萸子細看又西塞山邊白鳥飛桃花流水鱖魚肥朝廷尚覔𤣥真子何處如今更有詩青篛笠緑簔衣斜風細雨不須歸人間底事風波險一日風波十二時和韓持國瑞鷓鴣范純仁本集臘後春前暖律催日和風軟欲開梅公方結客尋佳景我亦忘形趂酒杯添歌管續尊罍更闌燭短未能回清歡莫待相期約乘興來時便可來淚小說碎似真珠顆顆停清如秋露臉邊傾灑時㸃盡湘江竹感處曽摧數里城思薄幸憶多情玉纖彈處暗銷魂有時看了鮫綃上無限新痕壓舊痕李元膺寂寞秋千兩繡旗日長花影轉階遲燕驚午夢周遮語蝶困春遊落托飛思往事入顰眉桞梢隂重又當時薄情風絮難拘束飛過東牆不肯歸賀方回怊悵離亭斷綵襟碧雲明月兩關心幾行書尾情何限一尺裙腰瘦不禁遙夜半曲房深有時昵語話如今侵窗冷雨燈生暈泪濕羅箋楚調吟過湖隂席上贈妓蘇養直梅妬晨粧雪妬輕逺山依約學眉青樽前無復歌金縷夢覺空餘月滿林魚與鴈兩浮沉淺顰微笑總關心相思恰似江南栁一夜春風一夜深石孝友收拾眉尖眼尾情當筵相見便相親偷傳翡翠歌中意暗合鴛鴦夢裏身雲態度月精神月流雲散兩無情覺來一枕凄涼恨不敢分明說向人二收拾眉尖眼尾情夜來真箇夢傾城鴛鴦有底情難盡蝴蝶無端夢易驚愁一掬月三更繡幃應好睡輕盈知他莫有相憐分展轉尋思直到明陳子高芳樹隂隂脫晚紅餘香不斷玉叉風薄情夫壻花相似一片西飛一片東金翡翠繡芙蓉從教纖媚笑牀空楺藍衫子休無賴只與離人結短封陳瑩中宜笑宜顰掌上身能歌能舞惡精神臉邊紅入桃花嫩眉上青歸栁葉新嬌不語易生嗔尊前還是一番春深杯百罰重拚却只為妖嬈醉得人自述朱希真我是清都山水郎天教分付與誰狂曽批給雨支風券屢上留雲借月章詩萬首酒千觴幾曽著眼看侯王玉樓金闕慵歸去且插梅花醉洛陽無名氏擬上高樓欲散愁奈愁隨我上高樓經行眼底青山遍㸃檢簮邊白髮稠歸去去去休休不成人總待封侯蒼烟起處孤雲白人若如雲儘自由毛刊别後應憐信息疏西風幾度到庭梧夜來縱有鴛鴦夢春去空餘蛺蝶圖烟樹逺塞鴻孤垂垂天影帶平蕪慿誰寫此相思曲寄與馮川鄭小奴上元向伯恭紫禁烟花一萬重鼇山宫闕隱晴空玉皇端拱彤雲上人物嬉遊陸海中星轉斗駕回龍五侯池館醉春風而今白髮三千丈愁對寒燈數㸃紅秋意辛幼安枕簟溪堂冷欲秋斷雲依水晚來收紅蓮相倚深如怨白鳥無言定自愁書咄咄且休休一丘一壑也風流不知筋力衰多少但覺新來懶上樓石次仲家住東湖湖上頭别來風月為誰留落霞孤鶩齊飛處南浦西山相對愁真了了好休休莫教辜負菊花秋浮雲富貴何須美畫餅聲名肯浪求二一别音塵兩杳然不堪虛度菊花天驚秋逺鴈橫斜字噪晚哀蟬斷續絃好將息惡因緣涼宵如水復如年夢魂不怕風波險飛過江西阿郍邊三屏幛重重翠幕遮蘭膏烟暖篆香斜相思樹上雙栖翼連理枝頭並蒂花歌鳯髻嚲烏紗雲慵雨困興無涯箇中贏取平生事兔走烏飛一任他旅中中秋露葉披殘露顆摶明星著地月流天不辭獨賞窮今夜應為相逄憶去年辜窈窕負嬋娟誰知兩處照孤眠姮娥不怕離人怨有甚心情獨自圓和伯可曽覿桃李飄零春已深可憐輕負惜花心樽前賴有紅千疊窗外休驚緑滿林燈灼灼醉沉沉笙歌叢裏酒頻斟留歡且莫匆匆去悵望春歸何處尋趙寶文未有年光好破瓜緑珠嬌小翠鬟了清肌瑩骨能香玉艷質英姿解語花叉插鳯鬢堆鴉舞腰春栁愛風斜有時馬上人爭看擘破紅窗新絳紗思逺人趙德麟素玉朝來有好懷一枝梅粉照人開晴雲欲向杯中起春色先從臉上來深院落小樓臺玉盤香篆看徘徊須知月色撩人恨數夜春寒不下階張安國日日青樓醉夢中不知樓外巳春濃杏花未遇疏疏雨楊栁初搖短短風扶畫鷁躍花驄湧金門外小橋東行行又入笙歌裏人在珠簾第幾重情景洪空同意態嬋娟畫不如瑩然初日照芙蕖笑捐瓊佩遺交甫肯把文梭擲幼輿花上蝶水中鳬芳心密意兩相於情知不作庭前柳到得秋來日日疏别意嚴仁行盡春山春事空别愁離恨滿江東三更鼓潤官樓雨五夜燈殘客舍風寒淡淡曉朧朧黃雞催斷丑時鐘紫騮嚼勒金銜響衝破飛花一道紅陸務觀家住東吳近帝鄉平生豪舉少年場十千沽酒青樓上百萬呼盧錦瑟傍身易老恨難忘尊前贏得是凄涼君歸為報京華舊一事無成兩鬢霜段克已千尺長虹下飲溪兩山環合翠屏圍非魚定不知魚樂得鹿還生失鹿悲花藹藹絮霏霏東風不染鬢邊絲百川尚有西流日一老曽無却少時此溪西溪故也段成已豪氣消磨百尺樓憂來一日抵三秋故人落落晨星少新冢纍纍塞草稠思往事去悠悠夕陽回首忽西流葉聲遍入愁人耳聲本無心人自愁壬辰豫章惠月佛閣趙介之烟靄空濛江上春夕陽芳草渡頭情飛紅已逐東風逺嫩緑還因夜雨深情脈脈思沉沉捲簾愁與暮雲平闌干倚遍東西曲杜宇一聲腸斷人集句趙獻之中州十頃平波溢岸青草香沙暖水雲晴輕衫短帽垂楊裏楚潤相看别有情揮彩筆倒銀瓶花枝照眼句還成老來漸減金叉興回施春光與後生集句鄭明舉欲把長繩繫日難紛紛從此見花殘休將世事兼身事須看人間比夢間紅燭繼艷歌闌等閒留客却成歡勸君更盡一杯酒贏得浮生半日閒車中紫陌朱輪去似流丁香初結小銀鈎憑闌試問秦樓路瞥見纎纎十指柔金約腕玉搔頭儘教人看却佯羞欲題紅葉無流水别是桃源一段愁離别鎮日無心掃黛眉臨行愁見理征衣樽前祗恐傷郎意閣淚汪汪不敢垂停寶馬捧瑤巵相斟相勸忍分離不如飲待奴先醉圖得不知郎去時集曲名朱子厚翰燭影搖紅玉漏遲鵲橋仙子下瑤池傾杯樂處笙歌沸蘇幕遮闌笑語隨醉落魄阮郎歸傳言玉女步輕移鳯凰臺上深深願一日和鳴十二時李易安寒日蕭蕭上鎖窗梧桐應恨夜來霜酒闌更喜團茶苦夢斷偏宜瑞腦香秋已盡日猶長仲宣懷逺更凄涼不如隨分尊前醉莫負東籬菊蕊黃春溪朱淑真獨倚闌干晝日長紛紛蜂蝶鬬輕狂一天飛絮東風惡滿路桃花春雨香當此際意偏傷萋萋芳草傍池塘千鍾尚欲偕春醉幸有荼䕷與海棠寄李之問聶勝瓊京師名妓玉慘花愁出鳯城蓮花樓下栁青青清樽一曲陽關後别箇人人第五程尋好夢夢難成況誰知我此時情枕前淚共芭蕉雨隔箇窗兒滴到明張東父寬盡香羅金縷衣心情不似舊家時萬絲栁暗才飛絮一㸃梅酸巳著枝金底背玉東西前歡贏得兩相思傷心不及風前燕猶解穿簾度幕飛閨思馬莊父睡鴨徘徊煙縷長日高春困不成粧步欹草色金蓮潤撚斷花鬚玉筍香輕洛浦笑巫陽錦紋新織寄檀郎兒家閉戶藏春色戲蝶游蜂不敢狂茶瓶兒悼亡李元膺去年相逄深院宇海棠下曽歌金縷歌罷花如雨翠羅衫上㸃㸃紅無數今歲重尋攜手處空物是人非春暮回首青門路亂紅飛絮相逐東風去芳草渡馮延已梧桐落蓼花秋烟初泠雨才收蕭條風物正堪愁人去後多少恨在心頭燕鴻逺羌笛悠渺渺澄波一片山如黛月如鈎笙歌散夢魂斷倚高樓張子野雙門曉鎖響朱扉千騎擁萬人隨風烏弄影畫船移歌時泪和别怨作秋悲寒潮小渡淮遲吳越路漸天涯宋玉臺上為相思江雲下日西盡雁南飛二主人宴客玉樓西風飄雪忽氛霏唐昌花蘂漸平枝浮光裡寒聲聚隊禽栖驚曉日喜春遲野橋時伴梅飛山明日逺霽雲披溪上月堂下水併春輝花草稡編卷十

如閒坐但尊中有酒心頭無事葫蘆提過唐玉潜淡妝人更嬋娟晚奩凈洗鉛華膩泠泠月色蕭蕭風度嬌紅歛避太液池空霓裳舞倦不堪重記嘆氷魂猶在翠輿難駐玉簮為誰輕墜别有凌空一葉泛清寒素波千里珠房淚濕明璫恨逺舊遊夢裏羽扇生秋璚樓不夜尚遺仙意奈香雲易散綃衣半脫露凉如水宴清都春閨何籕細草沿堦軟紅日薄蕙風輕藹㣲暖東君靳惜桃英尚小栁芽猶短羅幃綉幙髙捲早已是歌慵笑嬾凭畫樓那更天逺山逺水逺人逺堪怨傅粉踈狂竊香俊雅無計拘管青絲絆馬紅裙歡酒甚處迷戀無言淚珠零亂翠䄂儘重重漬遍故要得别後思量歸時覷見秋思周美成地僻無鐘鼔殘燈滅夜長人倦難度寒吹斷梗風翻暗雨洒窓填戸賔鴻謾說傳書算過盡千儔萬侣始信得庾信愁多江淹恨極須賦凄凉病損文園徽絃乍拂音韻先苦淮水夜月金城暮草夢魂飛去秋霜半入青鏡嘆帶眼都移舊處更久長不見文君歸時認否前調趙文鼎踈栁無情緒都不管渡頭行客欲去猶依賴得玉光萬頃為人留住相從嵗月如騖歎回首離歌又賦更舉目斜照沈沈西風剪剪秋墅君行定憶南池歌筵舞地花晨月午八磚歩日三雍奏樂送君雲路别情未抵遺愛試聴取湖山共語便可能無意同傾一尊露醑初春盧申之春訊飛瓊管風日薄度牆啼鳥聲亂江城次第笙歌翠合綺羅香煖溶溶澗緑氷泮醉夢裏年華暗換料黛眉重鎖隋堤芳心還動梁苑新来鴈濶雲音鸞分鑑影無計重見啼春細雨籠愁澹月恁時庭院離腸未語先㫁筭猶有凭髙望眼更那堪芳草連天飛梅弄晚石州慢感舊張仲宗寒水依痕春意漸回沙際煙闊溪梅清照生香冷蘂數枝爭發天涯舊恨試㸔㡬許消魂長亭門外山重疊不盡眼中青怕黄昏時節情切畫樓深閉想見東風暗消肌雪辜負枕前雲雨樽前花月心期切處更有多少凄凉殷勤留與歸時說到得再相逢恰經年離别髙麗妓舘蔡伯堅歸潜志雲海蓬萊風霧鬢鬟不假梳掠仙衣巻盡霓裳方見宫腰纎弱心期得處世間言語非真海犀一㸃通寥廓無物比情濃與無情相搏離索晚来一枕餘香酒病賴花醫却㶑灔金尊收拾新愁重酌半帆雲影載得無際闗山夢魂應被揚花覺梅子雨絲絲滿江干樓閣花犯周美成粉牆低梅花照眼依然舊風味露痕輕綴疑净洗鉛華無限佳麗去年勝賞曽孤倚氷盤共宴喜更可惜雪中髙士香篝薫素被今年對花最匆匆相逢似有恨依依愁悴凝望久青苔上旋㸔飛墜相将見脆圓薦酒人正在空江煙浪裡但夢想一枝瀟洒黄昏斜照水賀後溪劉再娶青山綉簾深劉郎一笑風流勝前度㦸香門戸還别有祥雲簷外飛舞洞房燭下應低語晨妝須帶曙待獻了堂前羅襪雙雙交囑付從前倩桃與楊枝如今便合遜梅花為主行樂處西溪上栁汀花嶼封侯事㸔人謾苦誰能向黄河風雪路且對取錦屏金幙雙蛾新様嫵上林春曽公衮東苑梅繁豪健放樂醉倒花前狂客靚粧㣲歩攀條弄粉凌波遍尋青陌暗香墮靨更飄近霧鬟蟬額倒金荷念流光易失幽姿堪惜惜花心未丼鬢白南枝上又見尋芳消息舊遊回首前懽如夢誰知等閒抛擲稠紅亂蕋漫開遍楚江南北獨消魂念誰寄故園春色元宵晁叔用續骫骳說㡌落宫花衣惹御香鳳輦晚来初過鶴降詔飛龍擎燭戱端門萬枝燈火滿城車馬對明月有誰閒坐任狂㳺更許傍禁街不扃金鎖玉樓人暗中擲果珠簾下笑着春衫裊娜素蛾遶釵輕蟬撲鬂垂垂栁絲梅朶夜䦨飲散但贏得翠翹雙嚲醉歸来又重向曉窓梳裹畫錦堂閨情周美成雨洗桃花風飄栁絮日日飛滿雕簷懊恨一春幽恨盡屬眉尖愁聞雙飛新燕語更堪孤枕宿酲忺雲鬟亂獨歩畫堂輕風暗觸珠簾多厭晴晝永瓊户悄香銷金獸慵添自與蕭郎别後事事俱嫌短歌新曲無心理鳳簫龍管不曽拈空惆悵長是毎年三月病酒懨懨荷花蒋勝欲染栁煙消敲菰雨斷歴歴猶寄斜陽掩冉玉妃芳袂擁出靈塲倩他鴛鴦來寄語駐君舴艋亦何妨漁榔靜獨奏櫂歌邀妃試酌清觴湖上雲漸暝秋浩蕩鮮風支盡蟬糧贈我非環非珮萬斛生香半蝸茅屋歸吹影數螺苔石壓波光鴛鴦笑何似且留雙擑翠隠紅藏上李真州壺山荷葉龜逰庭臯鶴舞應是秋滿淮涯昨夜将星明處彷彿峨眉干戈已凈銀河淡塵沙不動翠煙㣲邦人道半月中秋當歌不飲何為誰知心事逺但感慨登臨白羽頻揮恨不明朝出塞獵獵旌旗文南一矢澶淵勁䕫門三箭武闗竒挑燈㸔龍吼傳家舊劒曽斬吴㬢金盞子秋思蔣捷練月縈窓夢乍醒黄花翠竹庭舘心字夜香清人孤另雙鶼被他羞看擬待告訴天公減秋聲一半無情鴈正用恁時飛来呌雲尋伴猶記杏櫳煖銀燭下纎影缷佩欵春渦暈紅豆小鶯衣嬾珠痕澹印芳汗自從信誤青驪想籠鸚停唤風刀快但剪畫簷梧桐怎剪愁斷史達祖奨緑催紅仰一畨膏雨始張春色未踏畫橋烟江南岸應是草穠花宻尚憶濺裙蘋溪覺詩愁相覔光風外除是倩鶯煩燕謾通消息梨花夜来白相思夢空欄一抹月深深栁枝巷陌難重遇弓彎兩袖雲碧見說倦理秦箏怯春揔無力空遺恨當時秀句蒼苔蠧壁氐州第一秋思周美成波落寒汀村渡向晚遥㸔數㸃帆小亂葉翻鴉驚風破鴈天角孤雲縹緲官栁瀟踈甚尚掛㣲㣲殘照景物闗情川途換目頓来催老漸觧狂朋歡意少奈猶被思牽情繞座上琴心機中錦字覺最縈懐抱也知人懸望久薔薇謝歸来一笑欲夢髙唐未成眠霜空已曉壽劉府教趙青山風雨山城天意欲雪梅花照影清峭綵燕飛春祥麟紱旦當日文星髙照天地無情向十載風埃吹老盖世科名經邦事業白衣蒼狗不是貪名求分表謾獵較逢塲一笑野外朝儀城中馬隊且暫淹才調為斯文爭一脉斯文在乾坤未了爛醉金尊夜何其東方漸曉鼓笛慢壽意吕聖求拍肩笑别洪崖共㸔紫海還清淺蓬壺舊約人間舒笑桃紅千遍去嵗爭春今年逼臘滿空飄霰漸横枝照水清絲弄日都㸃綴江南岸須吸百川為夀捲恩波已傾銀漢戎𫀆擁㦸萬釘圍帶天孫新眷十里塵香五更弦月未收絃管正秦箏續譜宫簫定拍候来重按齊天樂端午周邦彦踈踈㡬㸃黄梅雨佳時又逢重午角黍包金香蒲切玉風物依然荆楚衫裁艾虎更釵裊朱符臂纒紅縷撲粉香綿喚風綾扇小窻午沉湘人去巳逺勸君休對景感時懐古謾囀鶯喉輕敲象板勝讀離騷章句荷香暗度漸引入醄醄醉鄉深處卧聴江頭畫船喧韻鼓秋緑蕪凋盡臺城路殊鄉又逢秋晩暮雨生寒鳴蛩勸織深閣時聞裁剪雲窓靜掩嘆重拂羅䄄頓踈花簟尚有練囊露螢清夜照書巻荆江留滯最久故人相望處離思何限渭水西風長安亂葉空憶詩情宛轉凭髙眺逺正玉液新芻蟹螯初薦醉倒山翁但愁斜照歛前調姜堯章庾郎先自吟愁賦凄凄更聞私語露濕銅鋪苔侵石井都是曽聴伊處哀音似訴正思婦無眠起尋機杼曲曲屏山夜凉獨自甚情緒西窓又吹暗雨為誰頻斷續相和砧杵候舘吟秋離宫弔月别有傷心無數豳詩謾與笑籬落呼燈世間兒女冩入琴絲一聲聲更苦白髪史達祖秋風早入潘郎髩班班遽驚如許暖雪侵梳晴絲拂領栽滿愁城深處瑤簮謾妬便羞揷宫花自憐衰暮尚思春情舊吟凄斷茂陵女人間公道惟此嘆朱顔也任容易墮去涅不重緇搔来便短方悔風流相誤郎潜㡬縷漸踈了銅駝俊逰儔侣縱有黟黟奈何詩思苦湖上即席分韻得羽字鴛鴦拂破蘋花影低低趂凉飛去畫裏移舟詩邊就夢葉葉碧雲分雨芳㳺自許過栁影閒波水花平渚見說西風為人吹恨上瑶樹䦨干斜照未滿杏牆應望斷春翠偷聚淺約挼香深盟搗月誰是窓間青羽孤筝㡬柱問因甚參差蹔成離阻夜色空庭待歸聴俊語前調張宗瑞西風揚子江頭路扁舟雨晴呼渡岸隔𤓰洲津横蒜石搖盡波聲千古詩仙一去但對峙金焦斷磯青樹欲下斜陽長淮渺渺正愁予中流笑與客語把貂裘為浣半生塵土品水烹茶㸔碑憶鶴恍似舊曽逰處聊憑陸諝問八極神逰肯重来否如此江山更蒼煙白鷺壽史滄洲劉圻父雅歌堂下新堤路栁外行人相語碧藕開花金桃結子三見使君初度樓臺北渚似畫出西湖水雲深處綵鷁雙飛水亭開宴近重午溪蒲堪薦緑醑幔亭何惜為曽孫留住碧水吟哦滄洲夢想未放舟横野渡維申及甫正夾輔中興擎天作柱願祝嵩髙嵗添長命縷和楚客賦蘆方岳孤蓬夜傍低叢宿蕭蕭雨聲悲切一岸霜痕半江烟色愁到沙頭枯葉淡雲沒滅黯西風吹老滿汀新雪天豈無情離騷㸃㸃送歸客歸去来兮怎得儘鷺翹鷗倚乍寒時節秋晚山川夕陽浦溆贏得别腸千結濤翻浪疊那得似西来一笻横絶搔首江南鴈銜千里月左緜道中陸務觀角殘鐘晩闗山路行人乍依孤店塞月征塵鞭絲㡌影常把流年虛占藏鴉栁暗歎輕負鶯花謾勞書劒事往闗情悄然頻動壮逰念孤懐誰與强遣市壚沽酒酒薄怎當愁釅倚瑟妍詞調鉛妙筆那寫柔情芳艷征途自厭况煙歛蕪痕雨稀萍㸃最是眠時枕寒門半掩壽賈奚倬然齊東野語金颷吹淨人間暑連朝㺯凉新雨萬寳功成無人解得秋入天機深處閒中自數㡬心酌乾坤手斟霜露護了山河共㸔元影在銀免而今神仙正好向清空覔箇冲澹襟宇帝念羣生如何便肯從我乗風歸去夷猶洞府把月杼雲機教他兒女水逸山明此情天付與慶湖北漕知鄂州李樓峯文山南樓月轉銀河曙玉簫乂吹梅早鸚鵡沙晴蒲萄水暖一縷燕香清裊瑤池春透想桃露霏霞菊波沁曉𫀆錦風流御仙花帶瑞虹繞玉闗人正未老唤磯頭黄鶴岸巾談笑劍拂淮青槊横楚黛雨洗一川烟草印黄似斗看半硯薔薇滿鞍楊栁沙路歸来金貂蟬翼小初秋王月山夜来踈雨鳴金井一夜舞風紅淺蓮渚生香蘭臯浮爽凉思頓欺班扇秋光冉冉任老却蘆花西風不管清興難磨㡬回有句到詩巻長安故人别後料征鴻聲裏畫䦨凭遍横竹吹商踈砧㸃月好夢又隨雲逺閒情似線共繋損柔腸不堪裁剪聴着鳴蛩一夜聲聲是怨前調唐珏蛻痕初染仙莖露新聲又移凉影珮玉流空綃衣剪霧㡬度槐昏栁暝幽窓睡醒奈欲斷還連不堪重聴怨結齊姬故宫煙樹翠隂冷當時舊情在否晚粧清鏡裡猶記嬌鬢亂咽頻驚餘悲漸杳搖曵風枝未定秋期話盡又抱葉凄凄暮寒山靜付與孤蛩苦吟清夜永南浦旅况魯逸仲風悲畫角聴單于三弄落譙門投宿駸駸征騎飛雪滿孤村酒市漸闌燈火正敲窓亂葉舞紛紛送數聲驚鴈下離烟水嘹唳度寒雲好在半朧溪月到如今無處不銷魂故國梅花歸夢愁損緑羅裙為問暗香閒艶也相思萬㸃付啼痕算翠屏應是兩眉餘恨倚黄昏花草稡編巻二十一

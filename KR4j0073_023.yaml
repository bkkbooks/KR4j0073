body:
  text: 花草稡編巻二十三明陳耀文輯長調泛清波滴遍晏叔原催花雨小着栁風柔都似去年時候好露紅烟緑盡有狂情鬭春早長安道秋千影裏絲管聲中誰放艶陽輕過了倦客登臨暗惜光隂恨多少楚天渺歸思正如亂雲短夢未成芳草空把吴霜鬢華自悲清曉帝城杳雙鳳舊約漸虛孤鴻後期難到且趁朝花夜月翠尊頻倒真珠髻重重山外冉冉流光又是殘冬時節小園幽徑池邊樓畔翠木嫩條春别纎蕋苞輕粉蕚染猩猩鮮血乍幾日好景和風次第一齊催發天然香艶殊絶比成雙皎皎倍芳潔去年因遇東歸使指増逺恨意曽攀折豈謂浮雲始終不放滿枝明月但歎息時飲金鍾更遶叢叢繁雪傾杯樂上元栁耆卿禁漏花深繡工日永蕙風布暖變韶景都門十二元宵三五銀蟾光滿連雲複道凌飛觀聳皇居麗佳氣瑞烟葱蒨翠華宵幸是處層城閬苑龍鳳燭六交光星漢對咫尺鰲山開雉扇會樂府兩籍神仙梨園四部絃管向曉色都人未散盈萬井山呼鰲抃願嵗嵗天仗裏常瞻鳳輦席上賞雪曽覿錦帳寒添畫簷雀噪凍雲布野望空際瑤峯㣲吐瓊花初綻江山如畫裁氷剪水裝鴛瓦杳旗亭路依稀管絃䑓榭小樓佳興一行珠簾不下隨縷板歌聲閒暇傍翠袖雲鬟憐艶冶似佯醉不耐嬌羞濃歡旋學風雅向暝色雙鸞舞罷紅獸暖春生金斚但殢飲香霧捲壺天不夜青門飲贈妓少游風起雲間鴈横天末嚴城畫角梅花三奏塞草西風凍雲籠月忩外曉寒輕透人去香猶在孤衾長閒餘繡恨與宵長一夜薰爐添盡香獸前事空勞囘首雖夢斷春歸相思依舊湘瑟聲沈庾梅信斷誰念畫眉人瘦一句難忘處怎忍辜耳邊輕呪任人攀折可憐又學章臺楊桞寄寵人時彦邊馬嘶風漢旗翻雪彤雲又吐一竿殘照古木連空亂山無數行盡暮沙衰草星斗横幽館夜無眠燈花空老霧濃香鴨氷凝淚燭霜天難曉長記小粧纔了一杯未盡離懐多少醉裏秋波夢中朝雨都是醒時煩惱料有牽情處忍思量耳邊曽道甚時躍馬歸來認得迎門輕笑前調曹元寵山静烟沈岸空潮去晴天萬里飛鴻南渡冉冉黄花翠翹金鈿還是倚風凝露嵗嵗青門飲盡龍山髙陽儔侣舊賞成空囘首舊遊人在何處此際誰憐萍泛空自感光隂暗傷羇旅醉裏悲歌夜深驚夢無奈覺來情緒孤館昏還曉厭時聞南樓鐘鼓但淚眼臨風腸斷望中歸路落梅慢王晉卿夀陽粧晩慵匀素臉經宵醉痕堪惜前村雪裏幾枝初綻氷姿仙格忍被東風亂飄滿地殘英堆積可堪江上起離愁慿誰說寄腸斷未歸客流恨聲傳羌笛感行人水亭山驛越溪信阻仙鄉路杳但風流塵跡香艶濃時未多吟賞巳成輕擲願身長徤且慿闌明年還放春消息前調梅苑帯烟和雪繁枝淡竚誰將粉融酥滴踈枝冷蕋壓羣芳年年常占春色江路溪橋謾倒裊裊風中無力暗香浮動氷姿明月裏想無花比髙格爭奈光隂瞬息動幽怨潜生羌笛新花鬭巧有天然閒態倚闌堪惜零亂殘英片片飛上舞筵歌席斷腸忍淚念前期經嵗還有芳容隔望梅小春栁耆卿小寒時節正同雲暮慘勁風朝冽信早梅偏占陽和向日處凌晨數枝爭發時有香來望明艶遥知非雪想玲瓏嫩蕋弄粉素英旖旎清絶仙姿更誰並列有幽光映水踈影籠月且大家留倚闌干對緑醑飛觥錦箋吟閲桃李繁華奈彼此芬芳俱别等和羮待用休把翠條漫折王聖與畫欄人寂喜輕盈照水犯寒先折裊數枝雲縷鮫綃露淺淺塗黄漢宫嬌額剪玉裁氷已占斷江南春色恨風前素艶雪裏暗香偶成抛擲如今眼穿故國待拈花嗅蕋時話思憶想隴頭依約飄零甚千里芳心杳無消息粉怯珠愁又只恐吹殘羌笛正斜飛半忩曉月夢囘隴驛陸務觀夀非金石恨天教老向水程山驛似夢來到南柯這些子光隂更堪輕擲戍火邊塵又過了一年春色歎名姬駿馬盡付杜陵苑路豪客長繩漫勞繋日看人間俯仰俱是陳迹縱自倚英氣凌雲奈囘盡鵬程鎩殘鸞翮終日慿髙悄不見江東消息筭沙邊也有斷鴻倩誰問得征部樂相思栁耆卿雅歡幽會良夜可惜虚抛擲每追念狂蹤舊跡長祇恁愁悶朝夕慿誰去花衢覔細説與此中端的道向我轉覺厭厭夢役魂勞苦相憶須知最有風前月下心事始終難得但願我重重心下把人看待長似初相識况漸逢春色便是有舉場消息待這囘好好憐伊更不輕離折望逺行詠雪長空降瑞寒風剪淅淅瑶花初下亂飄僧舍密洒歌樓迤邐漸迷鴛瓦好是漁人披得一簑歸去江上晩來堪畫滿長安髙却旗亭酒價幽雅乗輿最宜訪戴泛小棹越溪瀟洒皓鶴奪鮮白鷴失素千里廣鋪寒野須信幽蘭歌斷同雲收盡别有瑶臺瓊榭放一輪明月交光清夜相思繡幃睡起殘粧淺無緒匀紅鋪翠藻井凝塵金梯鋪蘚寂寞鳳樓十二風絮紛紛烟蕪苒苒永日畫欄沈吟獨倚望逺行南陌春殘悄歸騎凝睇消遣離愁無計但暗擲金釵買醉對好景空飲香醪爭奈轉添珠淚待伊遊冶歸來故故解放翠羽輕裙重繋見纎腰圍小信人憔悴前調梅苑重隂未解又早是年時梅花争綻暗香浮動踈影横斜月淡水清亭院好是前村雪裏一枝開處昨夜東風布暖動行人多少離愁腸斷凝戀天賦自然雅態似夀陽初匀粉面故人折贈欣逢驛使只恐隴頭春晩寄與髙樓休學龍吟三弄留取瓊花爛漫正有人同倚闌干爭看内家嬌春恨栁耆卿煦景朝升烟光晝歛踈雨夜來新霽垂楊艶杏絲軟霞輕繡出芳郊明媚處處踏青鬭草人人偎紅倚翠奈少年自有新愁舊恨消遣無計帝里風光當此際正好恁攜佳麗阻歸程迢逓奈向好景難留舊歡頻棄早是傷春情緒那堪困人天氣但贏得獨立髙原斷腸一餉凝睇楚宫春慢仲殊輕盈絳雪乍團聚同心千㸃珠結畫館繡幄低飛融融香徹笑裏精神放縱斷未許年華偷歇信任芳春都不管漸漸南薰别是一家風月扁舟去後囘望處娃宫凄凉凝咽身似斷雲零落深心難說不與雕欄寸地忍覷着漂流離缺盡日厭厭總無語不及髙唐夢裏相逢時節夜飛鵲别情周美成河橋送人處凉夜何其斜月逺墮餘輝銅盤燭淚巳流盡霏霏凉露霑衣相將散離會處探風前津鼓樹杪參旗華驄會意縱揚鞭亦自行遲迢逓路囘清野人語漸無聞空帯愁歸何意垂紅滿地遺鈿不見斜徑都迷兔葵燕麥向殘陽欲與人齊但徘徊班草唏嘘酬酒極望天西别意盧申之驕嘶破清曉分恨臨期花下恁月明知餘光是處散離思最憐香靄霏霏牽衣揾彈淚問凄風愁露剗地東西留鞭換佩怕匆匆巳是遲遲凉怯幾番羅袂還燕别文梁螢㸃書幃一自秋娘迢逓黄金對酒爭忍輕揮新來院落燕難尋簾幕長垂怕彫梧敲徑驚囘舊夢應也顰眉望海潮京都栁耆卿東南形勝江湖都會錢塘自古繁華烟栁畫橋風簾翠幙參差十萬人家雲樹遶堤沙怒濤捲霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羌管弄晴菱歌汎夜嬉嬉釣叟蓮娃千騎擁髙牙乗醉聴簫鼓吟賞烟霞異日圖將好景歸去鳳池誇耆卿與孫相何為布衣交孫知杭門禁甚嚴耆卿欲見之不得作此詞往詣名妓楚楚曰欲見孫相恨無門路若因府㑹願借朱唇歌於孫之前若問誰為此詞但說栁七中秋夜㑹楚宛轉歌之孫即日迎耆卿預坐洛陽懐古淮海梅英踈淡氷凘溶洩東風暗換年華金谷俊遊銅駞巷陌新晴細履平沙長記誤隨車正絮翻蝶舞芳思交加栁下桃蹊亂分春色到人家西園夜飲鳴笳有華燈礙月飛蓋妨花蘭苑未空行人漸老重來是事堪嗟烟暝酒旗斜但倚樓極目時見棲鴉無奈歸心暗隨流水到天涯别意奴如飛絮郎如流水相沾便肯相隨微月户庭殘燈簾幙匆匆共惜佳期纔話暫分攜早抱人嬌咽雙淚紅垂畫舸難停翠幃輕别兩依依别來怎表相思有分香帕子合數松兒紅粉脆痕青箋嫩約丁寧莫遣人知成病也因誰更自言秋杪親去無疑但恐生時注著合有分于飛贄賀沈公述山光凝翠川容如畫名都自古并州簫鼓沸天弓刀似水連營十萬貔貅金騎走長楸少年人一一錦帯吴鈎路入榆關鴈飛汾水正宜秋追思昔日風流有儒將醉吟才子狂遊松偃舊亭城髙故國空餘舞榭歌樓方面倚賢侯便恐為霖雨歸去難留好向西溪恣攜絃管宴蘭舟石孝友離情氷泮歸心雲擾黯然凝竚江臯栁色揺金梅香弄粉依稀滿眼春嬌常記極遊遨更與持玉斚因解金貂郎去瞿塘妾家巫峽水迢迢别來暗减風標奈碧雲暗斷翠被香銷春草生池芳塵凝榭凄凉月夕花朝千里夢魂勞但鳥啼渡口猿響山椒擬把無窮幽恨萬疊寫霜綃吕聖求側寒斜雨微燈薄霧匆匆過了元宵簾影䕶風盆池見日青青栁葉柔條碧草皺裙腰正晝長烟暖蜂困鶯嬌望處凄迷半篙緑水浸斜橋孫郎病酒無聊記烏絲醉語碧玉風標新燕又雙蘭心漸吐佳期趁取花朝心事轉迢迢但夢隨人逺心與山遥誤了芳音小窻斜日到芭蕉望湘人春思賀方囘厭鶯聲到枕花氣動簾醉魂愁夢相半被惜餘熏帯驚剰眼幾許傷春春晩淚竹痕鮮佩蘭香老湘天濃暖記小江風月佳時屢約非烟遊伴須信鸞絃易斷奈雲和再鼓曲終人逺認羅襪無蹤舊處弄波清淺青翰棹艤白蘋洲畔儘目臨臯飛觀不解寄一字相思幸有歸來雙燕傾杯送别栁耆卿離讌慇懃蘭舟凝滯看看送行南浦情知道世上難使皓月長圓彩雲鎮聚筭人生悲莫悲於輕别最苦正歡娱便分鴛侣淚流瓊臉梨花一枝春帯雨慘黛蛾盈盈無緒共黯然消魂重攜纖手話别臨行再三問道君須去頻耳畔低語知多少他日深盟平生丹素從今盡把慿鱗羽張子野飛雲過盡明河淺天無畔草色栖螢霜華清暑輕颸弄袂澄瀾拍岸宴玉麈談賓倚瓊枝秀挹雕觴滿午夜中秋十分圓月香槽撥鳳朱絃軋鴈正是欲醒還醉臨空悵逺壺更疊換對東西數里囘塘恨零落芙蓉春不管籠燈待散誰知道座有離人目斷雙歌伴烟江艇子歸來晩折紅梅吴感喜輕漸初泮微和漸入芳郊時節春消息夜來陡覺紅梅數枝争發玉溪仙館不是箇尋常標格化工别與一種風情似匀㸃胭脂染成香雪重吟細閲比繁杏夭桃品流真别只愁共彩雲易散冷落謝池風月慿誰向說三弄處龍吟休咽大家留取倚闌干聞有花堪折勸君須折二覩南翔征鴈踈林敗葉凋霜零亂獨紅梅自守嵗寒天教最後開綻盈盈水伴踈影蘸横斜清淺化工似把深色胭脂怪姑射氷姿剰與紅間誰人寵眷待金鎖不開慿欄先看曽飛落夀陽粉額粧成漢宫傳徧江南風暖春信喜一枝清逺對酒便好折取竒苞撚清香重嗅舉杯重勸古傾杯林鐘商栁耆卿凍水消痕曉風生暖春滿東郊道遲遲淑景烟和露潤偏染長堤芳草斷鴻隱隱歸飛江天杳杳遥山變色粧眉淡掃目極千里閒倚危檣迥眺動幾許傷春懐抱念何處韶陽偏早想帝里看看名園芳榭爛漫鶯花好追思往昔年少繼日恁把酒聴歌量金買笑别後暗負光隂多少黄鐘調水鄉天氣洒蒹葭露結寒生早客館更堪秋杪空階下木葉飄零颯颯聲乾狂風亂掃當無緒人静酒初醒天外征鴻知送誰家歸信穿雲悲呌蟲響幽窻風窺寒硯一㸃銀缸閒照夢枕頻驚愁衾半擁萬里歸心悄悄往事追思多少贏得空使方寸攪斷不成眠此夜厭厭就中難曉大石調金風淡蕩漸秋光老清宵永小院新晴天氣輕烟乍歛皓月當軒練净對千里寒光念幽期阻當殘景早是多愁多病那堪細把舊約前歡重省最苦碧雲信斷仙鄉路杳歸鴻難倩每髙歌强遣離懐奈慘咽翻成心耿耿漏淺露冷空贏得悄悄無言愁緒終難整又是立盡梧桐清影惜黄花慢楊無咎霽空如水襯落木墜紅遥山堆翠獨立閒階數聲笛度風前幾㸃鴈横雲際已凉天氣未寒時問好處一年誰記笑聲裏摘得半釵金蕋來至横斜為挿烏紗更碎揉汎入金樽瓊螘滿酌霞觴願人夀百千可奈此時情味牛山何必獨沾衣對佳節惟應歡醉看睡起曉蝶也花愁懶戲菩薩蠻引羅志仁曉鶯催起問當年秀色為誰料理悵别後屏掩吴山便樓燕月寒鬢蟬雲委錦字無慿付銀燭盡燒千紙對寒泓凈碧又把去鴻往恨都洗桃花自貪結子道東風有意吹逐流水謾記得當日心嫁卿卿是日暮天寒翠袖堪倚扇月乗鸞儘夢隔嬋娟千里倒嗔人從今不信畫簷鵲喜汎清苕正月十四日與公擇吴興汎舟張子野緑凈無痕過曉霽清苕鏡裏遊人紅粧巧綵船隱當筵主秘館詞臣吴娃勸飲韓娥唱競艶容左右偕春學為行雨傍畫槳從教水濺羅裙溪烟混月黄昏漸樓臺上下火影星分飛檻倚斗牛近響簫鼓逺破重雲歸軒未至千家待掩半粧翠箔朱門衣香拂面扶醉卸簪花滿袖餘煴一蕚紅人日長沙登定王臺姜堯章古城隂有官梅幾許紅蕚未宜簪池面氷膠牆腰雪老雲意還又沈沈翠藤共閒穿徑竹漸笑語驚起卧沙禽野老林泉故王臺榭呼喚登臨南去北來何事蕩湘雲楚水目極傷心朱户黏雞金盤簇燕空歎時序侵尋記曽共西樓雅集想垂栁還裊萬絲金待得歸鞍到時只怕春深雅詞斷雲漏日青陽布漸入融和天氣糝綴夭桃金綻垂楊粧㸃亭臺佳致曉露染風裁雨暈是牡丹偏稱化工美向此際會未教一蕚紅開鮮蘂迤邐漸成春意放秀色妖艶天真難比粉惹蝶翅香上蜂鬚忍把芳心縈碎爭似便移歸深院將緑盖青幃䕶風日恁時節占斷與偎紅倚翠寄弁陽翁李商隱過薔薇正風喧雲淡春去未多時古岸停橈單衣試酒滿眼芳草斜暉故人老經年賦别燈暈裏相對夜何其泛剡清愁買花芳事一巻新詩流水孤航漸逺想家山猿鶴喜見重歸北阜尋幽青津問釣多情楊栁依依最難忘吟邊舊語數菖蒲老是來期幾夕相思夢蝶飛遶蘋溪登蓬萊閣有感周公謹步深幽正雲黄天淡雪意未全休鑑曲寒沙茂陵烟草俯仰今古悠悠嵗華晩漂零漸逺誰念我同載五湖舟磴古松斜厓隂苔老一片清愁囘首天涯歸夢幾魂飛西浦淚洒東州故國山川故園心眼還似王粲登樓最負他秦鬟粧鏡好江山何事此時遊為喚狂吟老監共賦銷憂夜聞南婦哭北劉天迪擁孤衾正朔風凄𦂳氊帳夜驚寒春夢無慿秋期又誤迢逓烟水雲山斷腸處黄茅瘴雨恨驄馬憔悴只空還揉翠盟孤啼紅怨切暗老朱顔堪歎揚州十載甚倡條冶葉不省春殘蔡琰悲笳昭君怨曲何預當日悲歡謾贏得西隣倦客空惆悵今古上眉端夢破梅花角聲又報更闌薄倖春情賀方囘淡粧多態更的的頻囘眄睞便認得琴心先許與綰合歡雙帯記畫堂風月逢迎輕顰淺笑嬌無奈向睡鴨爐邊翔鴛屏裏羞把香羅偷解自過了收燈後都不見踏青挑菜幾囘慿雙燕丁寧深意往來飜恨重簾礙約何時再正春濃酒煖人閒晝永無聊頼懨懨睡起猶有花梢日在送安伯弟韓南澗送君南浦對烟栁青青萬縷更滿眼殘紅吹盡葉底黄鸝自語甚動人多少離情樓頭水閣山無數記竹裏題詩花邊載酒魂斷江干春暮都莫問功名事白髪星星如許任雞鳴起舞鄉關何在慿髙目盡孤鴻去漫留君住趁酴醿香煖持杯且醉瑶臺路相思記取愁絶西窻夜雨前調吕聖求青樓春晩晝寂寂梳匀又懶怎聴得鴉啼鶯弄惹起新愁無限記年時偷擲春心花間隔霧遥相見便角枕題詩寳釵貰酒共醉青苔深院怎忘得囘廊下攜手處花明月滿如今但暮雨蜂愁蝶恨小窻閒對芭蕉展却誰拘管儘無言閒品秦箏淚滿參差鴈腰肢漸小心與楊花共逺飛雪滿羣山蔡仲道氷結金壺寒生羅幙夜闌霜月侵門翠筠敲竹踈梅弄影數聲鴈過南雲酒醒欹粲枕愴然猶有殘粧淚痕繡被孤擁餘香未减猶是那時熏長記得扁舟尋舊約聴小窻風雨燈火黄昏錦裀纔展瓊籖報曙寳釵又是輕分黯然攜手處倚朱箔愁凝黛顰夢囘雲散山遥水逺空斷魂一寸金上蜀刺史栁耆卿井絡天開劒嶺横雲控西夏地勝異錦里風光蠶市繁華簇簇歌臺舞榭雅俗多遊賞輕裘俊靚粧艶冶當春晝摸石池邊浣花溪上景如畫夢應三刀橋名萬里中和政多暇仗漢節攬轡澄清髙掩武侯勲業文翁風化台鼎思賢乆方鎮静又還命駕空遺愛兩蜀山川異日成佳話周美成州夾蒼崖下枕江山是城郭望海霞接日紅飜水面晴風吹草青揺山脚波暖鳬鷖作沙痕退夜潮正落踈林外一㸃炊烟渡口參差正寥廓自歎勞生經年何事京華信漂泊念渚蒲汀栁空歸閒夢風輪雨檝終辜前約情景牽心眼留連處利名易薄囘頭謝冶葉倡條便入漁釣樂憶瑶姬騎省之悼也史邦卿嬌月籠烟下楚領春分兩朶湘雲花房漸密時弄杏箋初會歌袖慇懃沈沈夜乆西窻屢隔蘭燈幔影昏自綵鸞飛入芳巢繡屏羅薦粉光新十年未始輕分念此飛花可憐柔脆銷春空餘雙淚眼到舊家時節謾染愁巾神仙說道凌虚一夜相思玉樣人但起來梅發窻前哽噎疑是君五綵結同心無名氏珠簾垂户金索懸窻家接浣紗溪路相見桐隂下一鈎月恰在鳳凰栖處素瓊撚就宫腰小花枝裊盈盈嬌步新粧淺滿腮紅雪綽約片雲欲度塵寰豈能留住惟只愁化作綵雲飛去蟬翼衫兒薄氷肌瑩輕罩一團香霧彩箋巧綴相思苦脈脈動憐才心緒好作今秦樓活計吹簫伴侣為澗卿夀趙彦端人間塵斷雨外風囘凉波自泛仙槎非郭還非埜閒鶯燕時傍笑語清佳銅壺花漏長如線金鋪碎香煖簷牙誰知道東園五畝種成國艶天葩主人漢家龍種正翩翩迥立雪紵烏紗歌舞承平舊圍紅袖詩興自寫春華未知三斗朝天去定何似鴻寳丹砂且一醉朱顔相慶共看玉井浮花杜韋娘杜夀域暮春天氣鶯老燕子忙如織間嫩葉題詩哨梅小乍遍水新萍圓碧初牡丹謝了秋千搭起垂楊暗鎖深深陌暖風輕盡日閒把榆錢亂擲恨寂寂芳容衰减頓欹玳枕困無力為少年狂蕩恩情薄尚未有歸來消息想當初鳳侣鴛儔喚作平生更不輕離拆倚朱扉淚眼滴損紅綃數尺樂府雅詞華堂深院霜籠月采生寒暈度翠幄風觸梅香噴漸嵗晩春光將近惹離恨萬種多情易感歡難聚少愁成陣擁紅爐鳳枕慵欹銀燈挑盡當此際爭忍前期後約度嵗無慿凖對好景空積相思恨但自覺厭厭方寸擬蠻箋象管丹青妙手寫出寄與伊教信儘千工萬巧惟有心期難問緑意荷葉無名氏碧圓自潔向淺洲逺浦亭亭清絶猶有遺簪不展秋心能倦幾多炎熱鴛鴦密語同傾盖且莫與浣紗人說怨歌忽斷花風碎却翠雲千疊囘省當年漢舞帕飛去謾縐留仙裙褶戀戀青衫猶染枯香還笑鬢絲飄雪盤心清露如鉛水又一夜西風聴折喜凈看匹練秋光倒㵼半湖明月解珮環彭元遜江空不渡恨蘼蕪杜若零落無數逺道荒寒婉娩流年望望美人遲暮風烟雨雪隂晴晩更何須春風千樹盡孤城落木蕭蕭日夜江聲流去日晏山深聞笛恐他年流落與子同賦事濶心違交淡媒勞蔓草沾衣多露汀洲窈窕餘醒寐遺珮浮沈澧浦有白漚淡月微波寄語逍遥容與罥馬索無名氏曉窻明庭外寒梅向殘月吴溪庾嶺一枝偷把陽和洩氷姿素艶自然天賦品格真香殊常别奈北人不識南枝喚作臘前杏先發竒絶照溪臨水素禽飛下玉羽瓊芳鬭清潔懊恨春工來何晩傷憐媚眉先折多情立馬待得黄昏踈影斜斜微酸結恨馬融一聲羌笛起處紛紛落如雪擊梧桐别西湖社友李珏元暉楓葉濃於染秋正老江上征衫寒淺又是秦鴻過霽烟外寫出離愁幾㸃年來嵗去朝生暮落人似吴潮展轉怕聴陽關曲奈短笛喚起天涯情逺雙屐行春扁舟嘯晩憶着鷗湖鶯苑小小梅花屋雪月夜記把山扉牢掩惆悵明朝何處故人相望但碧雲半歛定蘇堤重來時候芳草如剪李景元杳杳春江濶收細雨風蹙波聲無歇鴈去汀洲暖岸蕪静翠染遥山一抹羣鷗聚散征航來去隔水相望楚越對此凝情乆念往嵗上國嬉遊時節鬭草園林賣花巷陌觸處風光竒絶正恁濃歡裏悄不意頓有天涯離别看即梅生翠實栁飄狂絮没個人共折把而今愁煩滋味教向誰說八寳粧李甲門掩黄昏畫堂人寂暮雨乍收殘暑簾捲踈星庭户悄隱隱嚴城鐘鼓空街烟暝半開斜月朦朧銀河澄淡風凄楚還是鳳樓人逺桃源無路惆悵夜乆星繁碧雲望斷玉簫聲在何處念誰伴茜裙翠袖共攜手瑶臺歸去對脩竹森森院宇曲屏香暖凝沈炷問對酒當歌情懐記得劉郎否大聖樂初夏康伯可千朶竒峯半軒微雨曉來初過漸燕子引教雛飛蓞菡暗薰芳草池面凉多淺斟瓊巵浮緑蟻展湘簟雙紋生細波輕紈舉動圓團素月仙桂婆娑臨風對月恣樂便好把千金邀艶娥幸太平無事擊壤鼓腹攜酒髙歌富貴安居功名天賦爭奈皆由時命呵休眉鎖問朱顔去了還更來麽陶成之生日蔣勝欲笙月凉邊翠翹雙舞夀仙曲破更聴得艶拍流星慢唱夀詞初了羣唱蓮歌主翁樓中披鶴氅展一笑微微紅透渦襟懐好縱炎官駐繖長是春和千年鼻祖事業記曽趁雷聲飛快梭但也曽三徑撫松採菊隨分吟哦富貴浮雲榮華風過淡處還他滋味多休辭飲有碧荷貯酒深似金荷風流子初春少游東風吹碧草年華換行客老滄洲見梅吐舊英栁揺新緑惱人春色還上枝頭寸心亂北隨雲黯黯東逐水悠悠斜日半山暝烟兩岸數聲横笛一葉扁舟青門同攜携手前歡記渾似夢裏揚州誰念斷腸南陌囬首西樓筭天長地乆有時有盡奈何綿綿此恨無休擬待倩人說與生怕伊愁秋思張文濳亭臯木葉下重陽近又是搗衣秋奈愁入庾腸老侵潘鬢謾簪黄菊花也應羞楚天晩白蘋烟盡處紅蓼水邊頭芳草有情夕陽無語鴈横南浦人倚西樓玉容知安否香箋共錦字兩處悠悠空恨碧雲離合青鳥沈浮向風前懊惱芳心一㸃寸眉兩葉禁甚閒愁情到不堪言處分付東流秋怨周美成楓林凋晩葉關河迥楚客慘將歸望一川暝靄鴈聲哀怨半規凉月人影參差酒醒後淚花銷鳳蠟風幕捲金泥砧杵韻髙喚囘殘夢綺羅香减牽起餘悲亭臯分襟地難拚處偏是掩面牽衣何况愁懐長結重見無期想寄恨書中銀鈎空滿斷腸聲裏玉筯還垂多少暗愁密意惟有天知風情新緑小池塘風簾動碎影舞斜陽羡金屋去來舊時巢燕土花繚繞前度莓牆繡閣鳳幃深幾許聴得理絲簧欲說又休慮乖芳信未歌先咽愁近清觴遥知新粧了開朱户應自待月西廂最苦夢魂今宵不到伊行問甚時說與佳音密耗寄將秦鏡偷換韓香天便教人霎時厮見何妨前調雅詞淑景皇州滿和風漸催促栁花飛過清明驟雨五侯臺榭散入青烟新火開時繡簾外傍人飛燕子映葉語黄鸝秋千晝永綺羅人散笑隔花隂紅粉牆低青鳥多行樂尋芳處何計强逐輕肥空對舊遊滿目誰共開眉遇有時繫馬垂楊影下佇立風前惆悵佳期囘首故園桃李應待人歸和魏桐城相山扁舟南浦岸分攜處鳴珮憶珊珊見十五里長堤數聲啼鴂至今清淚衿袖斕斑誰信道沈腰成瘦損潘鬢就衰殘謾把酒臨風看花對月不言柱笏無緒慿欄相逢還相感但凝情秋水送恨春山應念馬催行色泥濺征衫况芳菲將過紅英婉娩追隨正樂黄鳥間關争得此心無着渾似雲閒和楚客維揚燈夕方秋崖小樓簾不捲花正閙燈火競元宵想舊日何郎飛金叵羅三生杜牧醉董嬌嬈香塵路雲鬆鸞髻鬌月襯馬蹄驕彷彿神仙劉安雞犬分明富貴子晉笙簫人生行樂爾君不見迷樓春緑迢迢二十四經行處舊月今橋但索笑梅花酒消新雪縱情詩草筆捲春潮俯仰人間陳迹莫惜金貂燕山驛壁間詞吴激庚溪詩話書劔憶遊梁當時事底處不堪傷念蘭苕嫩葉向吴南浦杏花微雨窺宋東牆鳳城外燕隨青步障絲惹紫游韁曲水古今禁烟前後暮雲樓閣春草池塘囘首斷人腸年芳但如霧鏡髮已成霜獨有蟻尊陶寫蝶夢悠颺聴出塞琵琶風沙淅瀝寄書鴻鴈烟月微茫不似海門潮信猶到潯陽前調史達祖紅樓横落日蕭郎去幾度碧雲飛記窻眼逓香玉臺粧罷馬蹄敲月沙路人歸如今但流鶯通信息雙燕說相思入耳舊歌怕聴金縷斷腸新句羞染烏絲相逢南溪上桃花嫩嬌様淺淡羅衣恰是怨深腮赤愁重聲遲悵東風巷陌草迷春恨軟塵庭户花誤幽期多少寄來芳字都待還伊憶别方千里河梁攜手别臨岐語共約踏青歸自雙燕再來斷無音信海棠開了還又參差料此際笑隨花便面醉騁錦障泥不憶故園粉愁香怨忍教華屋緑慘紅悲萬家歌舞地生踈乆塵暗鳳縷羅衣何限可憐心事難訴歡期但兩㸃愁蛾才開重歛幾行清淚欲制還垂爭表為郎憔悴相見方知孫花翁三疊古陽關輕寒噤清月滿征鞍記玉笋攬衣翠囊親贈繡巾揾臉金栁初攀自囘首燕臺雲掩冉鳳閣雨闌珊天有盡頭水無西注鬢難留黑帯易成寛啼粧東風悄菱花在擬倩錦字封還應恨忍蛾眉凝黛慵髻堆鬟奈情逐事遷心隨春老夢和香冷歡與花殘閒煞烟茸窻閣十二屏山長夀樂栁耆卿繁紅嫩翠艶陽景粧㸃神州明媚是處樓臺朱門院落絃管新聲騰沸恣遊人無限馳驟驕馬如水競尋芳選劇强歸來向晩起通衢近逺香塵細細太平世少年時忍把韶光輕棄况有紅粧楚艶一笑千金何啻向尊前舞袖飄雪歌響行雲止願長繩且把飛烏繫任好從容痛飲誰能惜醉八犯玉交枝招寳山觀月上仇逺滄島雲連緑瀛秋入暮景却沈洲嶼無浪無風天地白聴得潮生人語擎空孤柱翠倚髙閣慿虛中流蒼碧迷烟霧惟見廣寒門外青無重數不知是水是山不知是樹漫漫知是何處倩誰問凌波輕步謾凝睇乗鸞秦女想庭曲霓裳正舞莫須長笛吹愁去怕喚起魚龍三更噴作前山雨踈影仙吕宫姜堯章苔枝綴玉有翠禽小小枝上同宿客裏相逢籬角黄昏無言自倚脩竹昭君不慣邊沙逺但暗憶江南江北想珮環月夜歸來化作此花幽獨猶記深宫舊事那人正睡裏飛近蛾緑莫似春風不管盈盈早與安排金屋還教一片隨波去又却怨玉龍哀曲等恁時重覔幽香已入小窻横幅梅影張叔夏黄昏片月似滿地碎隂還更清絶枝北枝南疑有疑無幾度燈前難折依稀倩女離魂處緩步出前村時節看夜深竹影横斜應妬過雲明滅窺鏡蛾眉淡掃為容不在貌獨抱孤潔莫是花光描取春痕不怕麗譙吹徹還驚海上然犀去照水底珊瑚如活做弄得酒醒天寒空對一庭香雪霜葉飛秋夜周美成露迷衰草踈星掛凉蟾低下林表素娥青女鬭嬋娟正倍添悽悄漸颯颯丹楓撼曉横天雲浪魚鱗小見皓月相看又透入清輝半餉特地留照迢逓望極關山波穿千里度日如嵗難到鳳樓今夜聴西風奈五更愁抱想玉匣哀絃閉了無心重理相思調念故人牽離恨屏掩孤顰淚流多少沈唐霜林凋晩危樓迥登臨無限秋思望中閒想洞庭波面亂紅初墜更蕭索風吹渭水長安飛舞千門裏變景摧芳榭惟有蘭衰暮叢菊殘餘蕋念花滿堂時自美人一去鎮掩香閨經嵗又觀珠露碎㸃蒼苔敗梧飄砌謾贏得相思淚眼東君早作歸來計便莫惜丹青手重與芳菲萬紅千翠失名故宫秋晩餘芳盡輕隂閒淡池閣鳳泥銀暗玳紋花巻斷腸簾幕漸砌菊遺金謝却芙蓉纔共清霜約半弄蕋氷綃波淺拂胭脂翠瓊連並彫蕚應是曽倚東君縱艶姿輕盈映損丹杏紅藥旋成深妬判與西風任從開落况衰晩淵明意薄重陽羞對吟酌待說與江梅早傅粉匀香慰伊蕭索過秦樓周美成水浴清蟾葉喧凉吹巷陌雨聲初斷閒依露井笑撲流螢惹破畫羅輕扇人靜夜乆凭欄愁不歸眠立殘更箭歎年華一瞬人今千里夢沈書逺空見說鬢怯瓊梳容銷金鏡漸懶趁時匀染梅風地溽虹雨苔滋一架舞紅都變誰信無憀為伊才减江淹情傷荀倩但明河影下還看稀星數㸃春晩李景元賣酒壚邊尋芳原上亂花飛絮悠悠已蝶稀鶯散便擬把長繩繫日無由謾道草忘憂也徒將酒解閒愁正江南春盡行人千里蘋滿汀洲有翠紅徑裏盈盈侣簇芳茵禊飲時笑時謳當暖風遲景任相將永日爛漫狂遊誰信盛狂中有離情忽到心頭向尊前擬問雙燕來時曽過秦樓江神子慢吕聖求新枝媚斜日花徑霽晩碧汎紅滴近寒食蜂蝶亂㸃檢一城春色倦遊客門外昏鴉啼夢破春心似遊絲飛逺碧燕子又語斜簷行雲自没消息當時烏絲夜語約桃花時候同醉瑶瑟甚端的看看是榆莢楊花飛擲怎忘得斜倚紅樓囘淚眼天如水沈沈連翠璧想伊不整啼粧影簾側瑞香蔡伯堅紫雲㸃楓葉崖樹小婆娑嵗寒節占髙潔纎苞煖釀出梅魂蘭魄照濃碧茗盌添春花氣重芸窻晩濛濛浮霽月小眠鼻觀先通廬山舊夢清絶蕭閒平生淡泊獨芳温一念猶未衰歇種種陳迹而今老但覔茶烟禪榻寄閒寂風外天花無夢也鴛鴦債從渠千萬刼夜寒囘施幽香與春愁客鬭嬋娟張炎舊家池館尋芳處從教飛燕頻繞一灣栁䕶水房春看鏡鸞窺曉暈宿粉雙蛾淡掃羅襦飄帯腰圍小盡醉方歸去又暗約明朝鬭草誰解先到心緒亂若晴絲那囘遊處墜紅爭戀斜照近來歡事漸無多尚被鶯聲惱便白髮如今縱少情懐不似前時好謾重省燕臺句愁極還醒背花一笑幔捲紬相思栁耆卿閒窻燭暗孤幃夜永欹枕難成寐細屈指尋思舊事前歡都來未盡平生深意到得如今萬般追悔空祇添憔悴對好景良宵皺着眉兒成甚滋味紅茵翠被當時事一一堪垂淚怎生得依前似恁偎香倚暖抱着日髙猶睡筭得伊家也應隨分煩惱心兒裏又爭似從前澹澹相看免恁縈繫李景元絶羽沈鱗埋香葬玉杳杳悲前事對一盞寒燈數㸃沈螢悄悄畫屏巫山十二蕣臉星眸蕙情蘭性一旦成流水便縱有甘泉妙手洪都方士何濟香閨寳砌臨粧處迤邐苔痕翠更不忍看伊繡殘鴛履而今尚有啼紅粉漬好夢不來斷雲飛去黯黯情無際謾飲盡香醪奈向愁腸消遣無計女冠子元夕蔣勝欲蕙花香也雪晴池館如畫春風飛到寳釵樓上一片笙簫琉璃光射而今鐙謾掛不是暗塵明月那時元夜况年來心懶意怯羞與蛾兒爭耍江城人悄初更打問繁華誰解再向天公借剔殘紅灺但夢裏隱隱鈿車羅帕吴箋銀粉砑待把舊家風景寫成閒話笑緑鬟鄰女倚窻猶唱夕陽西下二電旂飛舞雙龍還又爭渡湘灕雲外獨醒何在翠筠紅蘅芳菲如故深衷全未悟不似素車白馬巻潮起怒但悄然千載舊跡時有人來弔古生平慣受椒蘭苦甚魄沈寒波更被饞蛟妬結瓊紉珞料貝闕隱隱騎鯨烟霧楚妃花倚闕玉簫吹了泝波同步待月明洲渚小留旌節朗吟騷賦上元李漢老帝城三五燈光花市盈路天街遊處此時方信鳳闕都民奢華豪富紗籠纔過處喝道轉身一壁小來且住見許多才子艶質攜手並肩低語東來西住誰家女買玉梅爭戴緩步香風度北觀南顧見畫燭影裏神仙無數引人魂似醉不如趁早步月歸去這一雙情眼怎生禁得許多胡覷前調栁耆卿斷烟殘雨洒微凉生軒户動清籟蕭蕭庭樹銀河濃淡華星明滅輕雲時度莎階寂静無覩幽蟲切切秋吟苦踈篁一徑流螢幾㸃飛來又去對月臨風空恁無眠耿耿暗想舊日牽情處綺羅叢裏有人人那囘飲散畧畧曽諧鴛侣因循忍便聧阻相思不得長相聚好天良夜無端惹起千愁萬緒二淡烟飄薄鶯花謝清和院落樹隂翠密葉成幄麥秋霽景夏雲忽變竒峯倚寥廓波暖銀塘漲新萍緑魚躍想端憂多暇陳王是日嫩苔生閣正鑠石天髙流金晝永楚榭光風轉蕙披襟處波翻翠幕以文會友沈李浮𤓰忍輕諾别館清閒避炎蒸豈須河朔但樽前隨分雅歌艶舞盡成歡樂康與之火雲初布遲遲永日炎暑濃隂髙樹黄鸝葉底羽毛學整方調嬌語薰風時漸動峻閣池塘芰荷爭吐畫梁紫燕對對銜泥飛來又去想佳期容易成辜負共人人同上畫樓斟香醑恨花無主卧象牀犀枕成何情緒有時魂夢斷半窻殘月透簾穿户去年今夜扇兒搧我情人何處雪景周美成同雲密布撒梨花栁絮飛舞樓臺悄似玉向紅爐煖閣院宇深沈廣排筵會聴笙歌猶未徹漸覺輕寒透簾穿户亂飄僧舍密洒歌樓酒帘如故想樵人山徑迷蹤路料漁人收綸罷釣歸南浦路無伴侣見孤村寂寞招颭酒旗斜處南軒孤鴈過嚦嚦聲聲又無書度見臘梅枝上嫩蘂兩兩三三微吐夀星明慶黄宰秩滿梅亭玉露迎寒金風薦冷正蘭桂香覺秋光過半日臨三九葱葱佳氣靄靄琴堂見說當年申生穀旦夢叶長庚天降祥文章伯英聲早著騰踏飛黄雙鳬暫駐東陽巳種得春隂千種棠有無邊風月幾多事業安排青瑣入與平章百里民歌一樽春酒爭勸殷勤稱夀觴願此去龜齡難老長侍君王離别難栁耆卿花謝水流倐忽嗟年少光隂有天然蕙質蘭心美韶容何啻直千金便因甚翠弱紅衰纒綿香體都不勝任筭神仙五色靈丹無驗中路委瓶簮人悄悄夜沈沈閉香閨永棄鴛衾想嬌魂媚魄非逺縱洪都方士也難尋最苦是好景良天尊前歌笑空想遺音望斷處杳杳巫山十二千古暮雲深透碧霄日華邊萬年芳樹起祥烟帝居壯麗皇家熈盛寳運當千端門清晝觚稜照日雙闕中天太平時朝野多歡徧錦街香陌鈞天歌吹閬苑神仙昔觀光得意狂遊風景再覩更精妍傍栁隂尋花徑空恁嚲轡垂鞭樂遊雅戲平康艶質應也依然仗何人多謝嬋娟道宦名蹤跡歌酒情懐不似當年查荎艤蘭舟十分端是載離愁練波送逺屏山遮斷此去難留相從爭奈心期乆要屢變霜秋歎人生杳似萍浮又翻成輕别都將深恨付與東流想斜陽影裏寒烟明處雙槳去悠悠愛渚梅幽香動須採掇倩纎柔艶歌粲發誰傳餘韻來說仙遊念故人留此遐州但春風老去秋月圓時獨倚江樓選冠子一名蘇武慢張敏叔嫩水挼藍遥堤影翠半雨半烟橋畔鳴禽弄舌夢草縈心偏稱謝家池館紅粉牆頭步揺金縷纎柔舞腰低軟被和風搭在闌干終日畫簾髙捲春易老細葉舒眉輕花吐絮漸覺緑隂成幔章臺繫馬灞水維舟誰念鳳城人逺惆悵故國陽關杯酒飄零惹人腸斷恨青青客舎江頭風笛亂雲空晩梅苑庾嶺烟光江南風景冷落嵗寒庭院踈林萬木凍折孤根獨拒曉霜囘暖蕚㸃胭脂粉凝芳葉依稀幾枝初綻上層樓月夜慿欄風送暗香清逺嗟往昔漢妃臨鸞新粧才飾艶絶人間金鈿東君信息造化工夫却笑衆葩開晩若似芳菲訊速終與和羮鳳池仙館願樓頭羌管休吹免使為花腸斷蘇武慢侯彦周暗雨收梅晴波揺栁萬頃水精宫冷橋森畫棟岸列紅樓兩岸翠簾交映天上行舟鑑中開户人在蘂珠仙境况吟烟嘯月彈絲吹竹太平歌詠人盡說銅虎分賢銀潢儲秀鞏固行都藩屏棠隂散暑鼎篆凝香永日一庭虚靜紅袖持觴綵箋揮翰適意酒豪詩俊看飛雲丹詔行沙金勒待公歸覲馮尊師飯了從容消閒策杖野望有何慿仗帆歸逺浦鷺立汀洲千樹好花微放芳草池塘錦江樓閣隱隱雲埋青嶂向東郊極目天涯不見故人惆悵歸去也翠麓﨑嶇林巒掩映消遣晩來情况幽禽巧語弱栁揺金緑影小橋清響揮掃龍蛇領畧風光陶寫丹青吟唱這雲山好景物外烟霞幾人能訪又返照迴光終焉活計何處可為依託凋零鄭圃竹塢松溪林下勝遊行樂霞友雲朋水色山光幽隱烟蘿巖壑更堂堂氣槩摩天一㸃浩然寥廓堪愛處蝶戲花梢苔生石徑風細日髙簾幕清虚器量咀嚼乾坤髙邁市朝歡約踈葛寛裁瘦玉横拖嘯傲東籬吟酌把真情欲寫奈何塵世故人蕭索又識破塵寰凡籠跳出飄蕩幸無拘束萍蹤自在雅操孤髙還若野雲麋鹿遇坎乗流混俗和光知止有何榮辱恣陶陶海上人間不管嵗華催促從此後筆硯生塵蠅蝸絶念安分翠微雲屋般般放下事事都休靜對小軒梅竹一味踈慵萬古淳風便是真常清福任羣情晝夜世俗奔波競爭蠻觸又夢斷槐宫倚天長嘯勘破物情今古擔簦映雪射虎誅龍曽把少年身誤金谷繁華漢苑秦宫空有落花飛絮歎浮生終日忙忙誰肯死前囘顧爭似我玉麈清談金徽雅弄髙卧洞天門户逍遥畎畝肆任情懐閒伴蓼汀鷗鷺收拾生涯紫蠏黄柑江上一簔烟雨醉歸來依舊蘆花深處月明幽浦又堪歎羣情迷津宛轉飄蕩甚時休歇爭頭競角抵死漫生一向戀家貪業利鎖名韁慾浪恩山酒市花衢顛蹷騁僂儸似蟻循環不念鬢華如雪誰肯向太朴林中無為鄉裏閒伴老𣆀莊列珠亡罔象夢斷華胥髙枕洞天日月三界廓然八表冲虛湛湛靈光通徹這逍遥刼外妙哉真樂世間難說又過隙年光如毛塵事暗把物情移換浮生擾擾背覺隨塵酒色利名縈絆慿君看取歴代英雄楚越周秦唐漢謾遺留壊冢頺碑千古是非不斷聞早悟碧玉壺中白雲堆裏别有翠霞宫殿三天雅㑹五彩光攅朝赴紫微瓊宴閬苑瑶池綘闕清都信任逍遥遊翫笑愚頑苦海販骨無休往來流轉全真馮尊師本燕趙書生遊汴遇異人得仙學所賦歌曲髙潔雄暢最傳者蘇武幔二十篇前十篇道遺世之樂後十篇論修仙之事㑹稽費無隱獨善歌之聞者有凌雲之思無復流連光景者矣予山居毎登髙望逺則與無隱歌而和之無隱謂我更作十篇居兩年得兩篇半後於湖上二三夕間得七篇半毎一篇成無隱即歌之馮尊師天外有聞能乗風為我一來聴耶道園道人虞集記虞集歸去來兮昨非今是惆悵獨悲奚語迷途未逺晨景熹微乃命僕夫先路風颺舟輕候門童稚此日再瞻衡宇酒盈樽三徑雖荒松菊宛然如故聊寄傲與世相違舊交俱息更復駕言焉取琴書情話尋壑經邱倦鳥岫雲容與農人告我有事西疇孤櫂賦詩春雨但樂夫天命何疑乗化任渠留去又雲淡風輕傍花隨栁將謂少年行樂髙閣林間小車城裏千古太平西洛瞻彼泱泱言思君子流水儼然如昨但清遊天際輕隂未便暮愁離索長記得童冠相隨浴泝歸去吟咏鳶飛魚躍逝者如斯吾衰甚矣調理自存斟酌清廟朱絲舊堂金石隱几似聞更作農人告我有事西疇窈窕掛書牛角前調楊太尉碧眼連車黄頭間坐望斷故人何處當時勝麗舊日繁華都變闕萬里銜寃幾年埋恨仔細向誰分訴對南風凝眸眺神旌觸目淚流如雨今幸會電掃雷驅雲開霧歛一旦青天重覩桃林卧草華嶽嘶風行迓太平周武洗盡闕巷陌從此追歡酒杯頻舉任笙簫聲裏花朝月夕醉中歌舞吕聖求雨濕花房風斜燕子池閣晝長春晩檀盤戰象寳局鋪棊籌畫未分還懶誰念少年齒怯梅酸病踈霞盞正青錢遮路緑絲明水倦尋歌扇空記得小閣題名紅箋親製燈火夜深裁剪明眸似水妙語如絃不覺曉霜雞喚聞道近來筝譜慵看金鋪長掩瘦一枝梅影囘首江南路逺惜餘春慢春情魯逸仲弄月餘花團風輕絮露濕池塘春草鶯鶯戀友燕燕將雛惆悵睡殘清曉還似初相見時攜手旗亭酒香梅小向登臨長是傷春滋味淚彈多少因甚却輕許風流終非長乆又說分飛煩惱羅衣瘦損繡被香消那更亂紅如掃門外無窮路岐天若有情和天須老念髙唐歸夢凄凉何處水流雲繞玉山枕栁耆卿驟雨新霽蕩原野清如洗斷霞散彩殘陽倒影天外雲峯數朶相倚露莎烟芰滿池塘見次第幾番紅翠當是時河朔飛觴避炎蒸想風流堪繼晩來髙樹清風起動簾幕生秋氣畫樓晝寂蘭堂夜静舞艶歌姝漸任羅綺訟閒時泰足風情便爭奈雅歡都廢省教成幾闋新歌盡新聲好尊前重理洞庭春色曽鞏絳蕚欺寒暗傳春信一枝乍芳向籬邊竹外前村雪裏青梢猶瘦踈影溪傍惹露和烟凝酥艶似瀟洒玉人初試粧江南路有多情竚立迴盡柔腸倚樓最難忘處正皓月千里流光縱廣平心勁難思麗句少陵詩興猶愛清香休怪東君先留意問他日和羮誰又强還輕許笑凌空檜影松䕃交相程正伯錦字親裁淚巾偷裛細說舊時記笑桃門巷粧窺寳靨弄花庭榭香濕羅衣幾度相隨遊冶去任月細風尖猶未歸多少事有垂楊眼見紅燭心知如今事都過也但贏得雙鬢成絲歎半粧紅豆相思有分兩分青鏡重合難期惆悵一春飛絮夢悠揚教人分付誰銷魂處又梨花雨暗半掩重扉陸務觀壯嵗文章暮年勲業自昔誤人筭英雄成敗軒裳得失難如人意空喪天真請看邯鄲當日夢待炊罷黄粱徐欠伸方知道許多時富貴何處關身人間定無可意怎換得玉鱠絲蓴且釣竿漁艇筆牀茶竈閒聴荷雨一洗衣塵洛水秦關千古後尚棘暗銅駞空愴神何須更慕封侯定逺圖像麒麟丹鳳吟春恨周美成迤邐春光無賴翠藻翻池黄蜂遊閣朝來風暴飛絮亂投簾幕生憎暮景倚牆臨岸杏靨妖邪榆錢輕薄晝永思惟傍枕睡起無聊殘照猶在庭角况是别離氣味坐來便覺心緒惡痛引澆愁酒奈愁濃如酒無計銷鑠那堪昏暝蔌蔌半簷花落弄粉調朱柔素手問何時重握此時此意長怕人道着花草稡編巻二十三

功業何須慕不學淵明便歸去坎止流行随所寓玉堂金馬竹籬茅舎緫是無心處旅情曹元寵田園有計歸須早在家縱貧亦好南去北來何日了光隂送盡可憐青鬂暗逐流年老􅄫寥孤館殘燈照正鄉思驚時夢初覺落月蒼蒼關河曉一聲鷄唱馬嘶人起又上長安道毛澤民今宵月好來同看月未落人還散把手留連簾兒畔含羞和恨轉嬌盼任花映春風面相思不用寛金釧也不用多情似玉燕問取嬋娟學長逺不必清光夜夜見但莫負團圓願史邦卿蕙花老盡離騷句緑染遍江頭樹日午酒消聽驟雨青榆錢小碧苔錢古難買東君住宫河不礙遺鞭路被芳草將愁去多定紅樓簾影暮蘭燈初上夜香初炷猶自聽鸚鵡社日無名氏年年社日停針線怎忍見雙飛燕今日江城春已半一身猶在亂山深處寂寞溪橋畔春衫著破誰針線㸃㸃行行淚痕滿落日觧鞍芳草岸花無人載酒無人勸醉也無人管送弟山谷謫宜州黄元明改齋謾録千峯百嶂宜州路天黯淡知人去曉别吾家黄叔度弟兄華髮暮山修水異日同歸處長亭飲散尊罍暮聽别語不成句已斷離腸能㡬許水村山郭夜䦨無寐聽盡空階雨赴宜州和兄元明韻山谷煙中一線來時路極目送幽人去第四陽關雲不度山胡聲轉子規言語正是人愁處别恨朝朝連暮暮憶我當年醉時句渡水穿雲心已許晚年光景小軒南浦簾捲西山雨和前韻洪覺範緑隂煙桞長亭路恨取次分離去日永如年愁難度髙城囬首暮雲遮盡目斷人何處觧鞍旅舎天將暮暗憶丁寧千萬句一寸老腸情㡬許薄衾孤枕夢囬人静徹曉瀟瀟雨姚進道湘江詩話三年枕上呉中路遣黄耳随君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處輞川圖上看春暮長記高人右丞句作箇歸期天巳許春衣猶是小蠻針線曽濕西湖雨元遺山落紅吹滿沙頭路似緫被春將去花落花開春㡬度多情惟有畫梁雙燕知道春歸處鏡中冉冉韶華暮欲寫幽懐恨無句九十花期能㡬許一巵芳酒一襟清淚寂寞紗窓雨送别李易安征鞍不見邯鄲路莫便匆匆歸去秋正蕭條何以度明窓小酌暗燈清話最好留連處相逢各自傷遲暮猶把新詞誦竒句鹽絮家風人所許如今憔悴但餘雙淚一似黄梅雨新凉毛澤民芙蕖花上濛濛雨又冷落池塘暮何處風來揺碧戸捲簾凝望淡烟踈桞翡翠穿花去玉京人去無由駐忍獨在憑欄處試問緑窓秋到否可人今夜新凉一枕無計相分付鳯凰閣傷春葉道卿遍園林緑暗渾如翠幄下無一片是花蕚可恨狂風横雨忒煞情薄盡底把韶華送却楊花無奈是處穿簾透幙豈知人意正蕭索春去也這般愁沒處安着怎奈向黄昏院落桞耆卿天機匆匆相見懊惱恩情太薄霎時雲雨人抛却教我行思坐想肌膚如削恨只恨相違舊約相思成病那更瀟瀟雨落斷腸人在䦨干角山逺水逺人逺音信難托這滋味黄昏又􅁖撒金錢袁陶宣和遺事頻瞻禮喜昇平又逢元宵佳致鰲山高聳翠對端門珠璣交製似嫦娥降仙宫乍臨凡世恩露勻施憑御欄聖顔垂視撒金錢亂抛墜萬姓推搶沒理㑹告官裡這失儀且與免罪天仙子張子野水調數聲持酒聽午醉醒來愁未醒送春春去㡬時囬臨晩鏡傷流景徃事後期空記省沙上並禽池上瞑雲破月來花㺯影重重翠幙宻遮燈風不定人初静明日落紅應滿逕二別渝州醉笑相逢能㡬度為報江頭春且住主人今日是行人紅䄂舞青歌女憑仗東風交㸃取三月桞枝柔似縷落絮倦飛還戀樹有情寧不憶西園鶯解語花無數應訝使君何處去水閣沈㑹宗景物因人成勝槩滿目更無塵可礙等閒簾幙小䦨干衣未觧心先快明月清風如有待誰信門前車馬隘别是人間閒世界坐中無物不清凉山一帶水一𣲖流水白雲長自在趙徳麟宿雨洗空臺榭瑩下盡珠簾寒未定花開花落㡬畨晴春欲竟愁未醒池面杏花紅透影一紙短書言不盡明月清風還記省玉樓香斷又添香閒展興臨好景心似亂萍何處整代人送希文吕聖求樓下轆轤横露井樓上嬋姢開曉鏡下樓難忘上樓時風未定帆不正蔌蔌珎珠揮麈柄眉上新愁吹不醒别酒未斟歌未忍雪中梅下定重來烟瞑瞑腸寸寸莫放笛聲吹落盡夀陳倅八月十五平齋翰風月分將秋一半昨夜月明今夜滿有人笙鶴御風來玉䋲轉銀河淡凉入天孫雲錦叚笑撚桂枝香婉娩十字金書光照眼看看細札促歸來漏聲緩珂聲逺夜宿玉堂誰是伴初赴省於郭外别寵姬劉改之夷堅支志别酒醺醺渾易醉囬過頭來三十里馬兒不住去如飛騎一㑹行一㑹斷送殺人山共水是則青衫終可喜不道恩情抛得未雪迷前路小橋横住底是去底是煩惱自家煩惱你夜中侑酒琴精夷堅支志别來未斟心先醉忍聽陽闗辭故里揚鞭勒馬到皇都三題盡當際㑹穏跳龍門三汲水天意令吾先送喜不審君侯知得未蔡邕博識㸑桐聲君背負只此是酒滿金盃來勸你劉改之别妾賦詞毎令小僕歌之到建昌麻姑山暮夜思想之極至于堕淚二更後一羙人忽來前執拍板歌以侑酒云云改之問蔡邕背負之句曰我麻姑妺也謫居此山因携行劉擢第授荆門教授歸過臨江遇術者知為琴精云兩同心晏叔原楚鄉春晚似入仙源拾翠處閒随流水踏青路暗惹芳塵心心在桞外青帘花下朱門對景且醉芳樽莫話銷魂好意思曽同明月惡滋味最是黄昏相思處一紙紅牋無限啼痕桞耆卿竚立東風斷魂南國花光媚春醉瓊樓蟾彩逈夜逰香陌憶當時酒戀花迷役損詞客别有眼長腰搦痛憐深惜鴛衾冷夕雨凄飛錦書斷暮雲凝碧想别來好景良時也應相憶山谷秋水遥岑粧淡情深儘道教心堅穿石更說甚官不容針霎時間雨散雲歸無處追尋小樓朱閣沉沉一笑千金你共人女邊着子争知我門裏挑心最難忘小院囬廊月影花隂楊無咎秋水明眸翠螺堆髪却扇坐羞落庭花凌波歩塵生羅襪芳心發分付春風恰當時節漸觧愁花怨月忒貪嬌劣寧寧地情態於人惺惺處語言低說相思切不見須臾可堪離别客中憶守嵗薛泳沂叔深雪偶談一盤消夜江南果喫果看書只清坐罪過梅花料理我一年心事半生牢落盡向今宵過此身本是山中箇纔出山來便希差手種青松應是大縳茅深處抱琴歸去又是明年話殢人嬌上夀晏同叔玉樹㣲凉漸覺銀河影轉林葉静踈紅欲徧朱簾細雨尙遲留歸燕喜慶日多少世人良願楚竹驚鸞秦筝起鴈縈舞䄂急翻羅薦雲逥一曲更輕櫳檀板香炷逺同祝夀期無限二二月春風正是楊花滿路那堪更别離情緒羅巾掩淚任粉痕霑汗争奈向千留萬留不住玉酒頻傾宿眉愁聚空腸斷寳筝絃柱人間後㑹又不知何處魂夢裏也須時時飛去失婢王庭珪小院桃花烟鎻㡬重珠箔更深後海棠睡着東風吹去落誰家墻角平白地教人為他情惡花若有情應不薄也須悔從前事錯而今夜雨念玉顔飄泊知那裡人家怎生頓着張彦實深院海棠誰倩春工染就暎窓户爛如錦繡東君何意便風狂雨驟堪恨處一枝未曽到手今日乍晴怱怱命酒猶及見胭脂半透殘紅㡬㸃明朝知在否問何似去年看花時候毛澤民雪做屏風花為行帳屏帳裡見春模様小晴未了輕隂一晌酒到處恰如把春拈上宫桞黄輕河堤渌漲花多處少停蘭槳雪邊花際平蕪疊嶂這一叚凄凉為誰悵望後亭梅開有感李易安玉瘦香濃檀深雪散今年恨探梅又晚江樓楚館雲閒水逺清晝永凭欄翠簾低巻坐上客來樽前酒滿歌聲共水流雲斷南枝可挿更須頻剪莫直待西樓數聲羌管江城子一名江神子馮延已曲䦨干外小中庭雨初晴早鶯聲飛絮落花時節近清明睡覺起來勻面了無箇事沒心情碧羅衫子欝金裙好精神小腰身每到花時常是不宜春早是自家無氣力更被你惡憐人東坡天涯流落思無窮既相逢却匆匆携手佳人和淚折殘紅為問東君餘㡬許春總在與誰同隋堤三月水溶溶背歸鴻去呉中囬望彭城清泗與淮通寄我相思千㸃淚流不到楚江東山谷畫堂髙㑹酒䦨珊倚䦨干霎時間千里關山常恨見伊難及至而今相見了依舊似隔關山倩人傳語問平安省愁煩淚休弹哭損眼兒不似舊時單尋得石榴雙葉子憑寄與挿雲鬖秦少㳺西城楊桞㺯春柔動離憂淚難收猶記多情曽為繫歸舟碧野朱橋當日事人不見水空流韶華不為少年留恨悠悠㡬時休飛絮落花時候一登樓便做春江都是淚流不盡許多愁二南來飛燕北歸鴻偶相逢惨愁容緑鬢朱顔重見兩衰翁别後悠悠君莫問無限事不言中小槽春酒滴珠紅莫怱怱滿金鍾飲散落花流水各西東後㑹不知何處是煙浪逺暮雲重三棗花金釧約柔荑昔曽携事難期咫尺玉顔和淚鎻金閨恰似小園桃與李雖同處不同枝玉笙初度顫鸞箆落花飛為誰吹月冷風高此恨只天知任是行人無定處重相見是何時賀方囬麝薫㣲度繡芙蓉翠衾重畫堂空前夜偷期相見却忩忩心事兩知何處問依約是夣中逢坐疑行聽竹窓風出簷櫳杳無蹤已過黄昏才動寺樓鐘暮雨不來春又去花滿地月朦朧葉少藴西清詩話銀濤無際捲蓬瀛落霞明暮雲平曽見青鸞紫鳯下層城二十五絃弹不盡空感慨有餘情蒼梧煙水斷歸程捲霓旌為誰迎空有千行流淚寄幽貞舞罷魚龍雲海晚千古恨入江聲集句晁無咎雙鴛池沼水融融桂堂東又春風今日看花花勝去年紅把酒問花花不語携手處遍芳叢留春且住莫怱怱秉金籠夜寒濃沉醉揷花走馬月明中待得醒時君不見不随水即随風竹坡夕陽低盡桞如烟淡平川斷腸天今夜十分霜月更姢姢怎得人如天上月雖暫缺有時圓斷雲飛雨又經年思凄然淚㳙㳙且做如今要見也無縁因甚江頭來處鴈飛不到小樓邊謝無逸杏花村館酒旗風水溶溶颺殘紅野渡舟横楊桞緑隂濃望斷江南山色逺人不見草連空夕陽樓外晚烟籠粉香融淡眉峯記得年時相見畫屏中只有關山今夜月千里外素光同二一江秋水碧灣灣繞青山玉連環簾幕低垂人在畫屏間閒抱琵琶㝷舊曲弹未了意瓓珊飛鴻數㸃拂雲端倚䦨看楚天寒擬倩西風吹夢到長安恰似梨花春帶雨愁滿眼淚䦨干譚明之淡黄初染緑初描倚春嬌索風饒燕外鶯邊想見萬絲揺便做無情終軟美天付與眼眉腰短長亭外短長橋駐金鑣繫蘭橈可惜風流年紀可憐宵辦得重來攀折後烟雨暗不辭遥黄子厚西風嫋嫋夕陽紅晚烟濃暮雲重萬疊青山山外呌孤鴻獨上髙樓三百尺憑玉楯睇層空人間日月去匆匆碧梧桐又西風北去南來銷盡㡬英雄擲下玉尊天外去多少事不言中送人歸舊居遺山草堂瀟洒浙江頭傍林丘買扁舟隔岸紅塵無路近沙鷗枕上書尊有酒身外事更何求暮雲歸鳥仲宣樓弊貂裘為誰留千古書生那得盡封侯在半山亭下路聞未老去來休叚克巳雞棲行李短轅車馬如蛙畏途賖四十九年強半在天涯任使東風吹不去頭上雪眼中花丼泉宜稌復宜麻近山窊更宜𤓰明日新年聞健早還家報荅春光猶有酒傾緑蟻岸烏紗蒲江畫樓簾幕巻新晴掩銀屏曉寒輕墜粉飄香日日喚愁生暗數十年湖上路能㡬度着娉婷年華空自感飄零擁春酲對誰醒天闊雲開無處覔簫聲載酒買花年少事渾不似舊心情周公謹羅窓曉色透花明靚瑶笙按瑶筝㡬訊東風能有㡬分春二十四䦨憑玉煖楊桞月海棠隂依依愁翠沁雙顰愛鶯聲怕䳌聲人自多情春去自無情把酒問花花不語花外夢夢中雲郭仲宣臘寒猶重見年芳為花忙忙倚雕墻凖擬巡簷一笑但清狂冷蕋踈枝渾不奈憑折取泛清觴揚州春夢兩㣲茫記娥粧耿氷腸春信全通何用玉奩香誰見月斜人去後踈影亂醮寒塘魏夫人曽相妻别郎容易見郎難㡬何般懶臨鸞憔悴容儀陡覺縷衣寛門外紅梅將謝也誰信道不曽看曉粧樓上望長安怯輕寒莫凭欄嫌怕東風吹恨在眉間為報歸期須是早休誤妾一春閒朱淑真斜風細雨作春寒對尊前憶前歡曽把棃花寂寞淚䦨干芳草斷烟南浦路和别淚看青山昨宵結得夢夤縁水雲間悄亡言争奈醒來愁恨又依然展轉翠衾空懊惱天易見見伊難贈尹生古今詞話相逢只怕有分離許多時暗為期常是眉來眼去惹猜疑何似捴休拈㺯上輕咳𠻳有人知終須買箇小舩兒任風吹儘東西假使天涯海角也相随縱被江神收領了離不得我和伊虞尙書策帥蜀其子弟惓尹生常苦人知終不快其情意作此贈之凡綴詞多借腔叙他事此名江神子却舉江神可謂詠景着題也雨中花令竹坡山雨細泉生幽谷水滿平田雪蠒紅蠶熟後黄雲隴麥秋間武陵烟煖數聲鷄犬别是山川嗟老去倦逰蹤跡長恨華顛行盡呉頭楚尾空慚萬壑千巖不如休也一庵歸去依舊雲山惜黄花史邦卿涵秋寒渚染霜丹樹尙依稀是來時夢中行路時節正思家逺道仍懐古更對着滿城風雨黄花無數碧雲欲暮羙人􅀆羙人􅀆未知何處獨自捲簾櫳誰為開尊爼恨不得御風歸去許冲元鴈聲晚斷寒霄雲捲正一枝開風前看月下見花占千花上香笑千香淺化工與最先裁剪誰把瑶林秀閒抛江岸恁素英濃芳心細意何限不恨宫粧色不怨吹羌管恨天逺恨春來晩且坐令東浦詞韓玉閒院落悞了清明約杏花雨過胭脂綽緊了秋千索闘草人歸朱門悄掩棃花寂寞書萬紙恨憑誰託纔封了又揉却寃家何處貪歡樂引得我心兒惡怎生全不思量着那人人情薄小桃紅劉龍洲晚入紗忩静戲㺯菱花鏡翠䄂輕勻玉纎弹去小妝紅粉畫行人愁外兩青山與尊前離恨宿酒醺難醒笑記香肩並暖借蓮腮碧雲㣲透暈眉斜印最多情生怕外人猜拭香津㣲揾程正伯不恨殘花妥不恨殘春破只恨流光一年一度又催新火縱青天白日繫長䋲也留春得麽花院從教鎻春事從教過燒笋園林嘗梅臺榭有何不可已安排珍簟小胡床待日長閒坐紅娘子小桃紅同程正伯小小閒窓底曲曲深屏裡一枕新凉半床明月留人歡意奈梅花引裡喚人行苦随他無計㡬㸃清觴淚數曲烏絲紙見少離多心長分短如何得是到如今留下許多愁枉教人憔悴月上海棠陸務觀蘭房綉户厭厭病歎春酲和悶甚時醒燕子空歸㡬時傳玉闗邊信傷心處獨展團窠瑞錦熏籠消渇沉烟冷淚痕深展轉看花影漫擁餘香怎禁他峭寒孤枕西窓曉㡬聲銀屏玊井蜀王舊苑前人斜陽廢苑朱門閉吊興亡遺恨淚痕裏淡淡宫梅也依然㸃酥剪水凝愁處似憶宣華舊事行人别有凄凉意折幽香誰與寄千里佇立江臯杳難逢隴頭歸騎音塵逺楚天危樓獨倚宣華故蜀苑名梅苑南枝昨夜先囬暖便臨寒開花暗香逺化工忒㬠把瓊瑶恣情裁剪皚皚的㸃綴梢頭又遍横斜影蘸清溪淺似玉人臨鸞照粉面大家休折且遅留對花開宴祝東風吹作和羮未晩次遯菴韻叚成已酒盃何侣浮名好一入枯腸泰山小喚醒夢中身鶗鴂數聲春曉昻頭處㡬㸃青山屋杪人生得計魚逰沼視過眼光隂向來少須卜一枝安笑月底驚烏三繞無窮事畢竟何時是了脱銀􅂁曹元寵宣和遺事濟楚風光昇平時世端門友散碗遂逐旋温來吃得過那堪更使金噐分明是與窮漢消灾㓕罪又沒支分猶然逓滯打篤磨槎來根底換頭巾更上㺯交畨厮替告官裡馳逗高陽餓鬼祭祅神你自平生行短不公正欺物瞞心交年夜時燒毁猶自昧神明若還替得你亦可知好裏争索無憑我雖然無口肚裏清醒除非閻家大伯一時批判昏沉休痴呵臨時恐内各自要安身因話録云紙錢起自唐時紙畫人未知起于何時今世禱祀禳禬者用之刻板印染有男女之形而無口北方之俗嵗暮則人畫一板於臘月二十四日夜珮之於身除夕焚之時有謔詞云花草稡編巻十四

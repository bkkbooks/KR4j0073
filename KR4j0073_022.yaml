爭奈無緣相見有分孤零香箋細寫頻相問我一句句兒都聽到如今不得同歡伏惟與他耐靜此事憑誰執證有樓前明月窗外花影拚了一生煩惱為伊成病秪恐更把風流逞便因循誤人無定恁時節若要眼兒厮覷除非㑹聖夷堅支志作王齊叟彥齡詞瀟湘靜雅詞拾遺畫簾微捲香風逗正明月乍圓時候金盤露冷玉爐篆消漸紅鱗生酒嬌唱倚繁絃瓊枝碎輕回雲袖風臺熖短銅壺漏永人欲醉夜如晝因念流年迅景被浮名暗辜歡偶人生大抵離多㑹少更相將白首何似猛尋芳都莫問積金過斗歌䦨宴闋雲窗鳯枕叉橫麝透湘江靜史邦卿暮草堆青雲浸浦記匆匆倦篙曾駐漁榔四起沙鷗未落怕愁沾詩句碧袖一聲歌石城怨西風隨去滄波蕩晚菰蒲弄秋還重到斷魂處酒易醒思正苦想空山桂香懸樹三年夢冷孤吟意短屢煙鐘津鼓屐齒厭登臨移燈後幾番凉雨潘郎漸老風流頓減閒居未賦還京樂周美成禁烟近觸處浮香秀色相料理正泥花時候奈何客裏光隂虛費望箭波無際迎風漾日黃雲委任去逺中有萬㸃相思清淚到長淮底過當時樓下殷勤為說春來羇旅况味堪嗟誤約乖期向天涯自看桃李想而今應恨墨盈箋愁粧照水怎得青鸞翼飛歸教見憔悴雙聲子遊吳栁耆卿晚天蕭索斷蓬蹤跡乘興蘭棹東遊三吳風景姑蘇臺榭牢落暮靄初收夫差舊國香徑沒徒有荒丘繁華處悄無覩惟聞麋鹿呦呦想當年空運籌决勝圖王取霸無休江山如畫雲濤煙浪翻輸范蠡扁舟驗前經舊史嗟謾載當日風流斜陽暮草茫茫盡成萬古遺愁烘春桃李獻蔡京江朝宗漢升平無際慶八載相業君臣魚水鎮撫風稜調燮精神合是聖朝房魏鳯山政好還被畫轂朱輪催起按錦轡映玉帶金魚都人爭指丹陛常注意追念裕陵元佐今無幾繡衮香濃鼎槐風細榮耀滿門朱紫四方具瞻師表盡道一䕫足矣運化筆又管領年年烘春桃李西湖月黃子行湖光冷浸玻瓈蕩一餉薰風小舟如葉藕花十丈雲梳霧洗翠嬌紅怯壺觴圍坐處正酒醁吹波紅映頰尚記得玉臂生凉不放汗香輕浹殢人小摘墻榴為碎搯猩紅細認裙褶舊遊如夢新愁似織淚珠盈睫秋娘風味在怎得對銀缸生笑靨消瘦沈約詩腰倣佛堪捻春從天上來感舊吳彥髙海角飄零嘆漢苑秦宫墜露飛螢夢裏天上金屋銀屏歌吹競舉青冥問當時遺譜有絶藝鼓瑟湘靈促哀彈似林鶯嚦嚦山溜泠泠梨園太平樂府醉幾度春風鬢變星星舞徹中原塵飛滄海風雲萬里龍庭寫鳴笳幽怨人憔悴不似丹青酒微醒一軒凉月燈火青熒玉林詞選云彥髙名激米元章壻也於㑹寧府遇老姬善鼓瑟自言梨園舊籍因有感而賦此後三山鄭中卿嘗從張貴謨使亦聞敵人有歌之者中州樂府云好問曽見王防禦公王說彥髙此詞句句用琵琶故實引據甚明今忘之矣武昌秋夜周伯陽浩蕩青冥正涼露如洗萬里虛明鼓角悲健秋入重城倣佛石上三生指蓬萊雲路渺何許月冷風清倚南樓一聲長笛幾㸃殘星西風舊年有約聽候蛩語夜客裏心驚紅樹山深翠苔門掩想見露草踈螢便乘風歸去闌干外河漢西傾笑淹留劃然孤嘯雲白天青西江月慢吕聖求春風淡淡清晝永落英千尺桃杏散平郊晴蜂來往妙香飄擲傍畫橋煮酒青帘緑楊風外數聲長笛記去年紫陌朱門花下舊相識向寶几裁書憑燕翼望翠閣煙林似織聞道春衣猶未整過禁烟寒食但記取角枕情題東窗休誤這些端的更莫待青子緑隂春事寂歸朝歡春閨張子野聲轉轆轤聞露井曉引銀瓶牽素綆西園人語夜來風叢英飄墮紅成徑寶猊煙未冷蓮臺香蠟殘痕凝等身金誰能得意買此好光景粉落輕粧紅玉瑩月枕橫叉雲墜領有情無物不雙栖文禽只合常交頸晝夜歡豈定爭如翻作春宵永日曈曨嬌柔懶起簾壓捲花影栁耆卿别岸扁舟三兩隻葭葦蕭蕭風淅淅沙汀宿鴈破煙飛溪橋殘月和霜白漸漸分曙色路遙川逺多行役往來人隻輪雙槳盡是利名客一望鄉關煙水隔轉覺歸心生羽翼愁雲恨雨兩縈牽新春殘臘相催逼嵗華都瞬息浪萍風梗誠何益問歸期玉樓深處有箇人相憶對雪追和東坡相山透隙敲窗風摵摵坐見廣庭霜縞白長安道上正騎驢蔡州城裏誰堅壁表表風塵物瑶林瓊樹三豪客對揮毫連珠唱玉競把詩箋擲草草杯盤還促席痛飲狂歌話胸臆前村昨夜放梅花東鄰休把誇容色清歡那易得明朝烏㘘升南極帶隨車黃壚咫尺莫作山河隔夀蕭禹平知縣嚴次山雲表金莖珠璀璨當日投懷驚玉燕文章議論壓西雍風流姓字翔東觀紫皇嗟見晚祥麟五色留金殿大江西銅章墨綬暫爾煩君綰十二金叉扶玉盞錦瑟摐摐隨急管獸爐烟動彩雲髙秋聲拍碎紅牙板趣君歸翰苑萊衣煥爛潘輿穩任方瞳從今看到弱水波清淺春遊馬莊父聽得提壺沽美酒人道杏花深處有杏花狼藉鳥啼風十分春色今無九麝煤銷永晝青烟飛上庭前栁畫堂深不寒不暖正是好時候團團寶月憑纎手暫借歌喉招舞袖真珠滴破小槽紅香肌縮盡纎羅瘦投分須白首黃金散與親和舊且銜杯壯心未落風月長相守西河金陵懷古周美成佳麗地南朝盛事誰記山圍故國繞清江髻鬟對起怒濤寂寞打孤城風檣遙度天際斷崖樹猶倒倚莫愁艇子曽繫空遺舊跡鬱蒼蒼霧沉半壘夜深月過女墻來賞心東畔淮水酒旗戲鼓甚處市想依稀王謝鄰里燕子不知何世入尋常巷陌人家相對如說興亡斜陽裏王子文天下事問天怎忍如此陵圖誰把獻君王結愁未巳少豪氣槩總成塵空餘白骨黃葦千古恨吾老矣東遊曾弔淮水繡春臺上一回登一回揾淚醉歸撫劍倚西風江濤猶壯人意只今䄂手野色裏望長淮猶二千里縱有英心誰寄近新來又報烽烟起絶域張騫歸來未和王潛齊韻曹西士今日事何人弄得如此漫漫白骨蔽川原恨何日已關河萬里寂無煙月明空照蘆葦謾哀痛無及矣無情莫問江水西風落日慘新亭幾人墮淚戰和何者是良籌扶危但看天意只今寂寞藪澤裏豈無人髙卧閭里試問安危誰寄定相將有詔催公起須信前書言猶未送入我門來胡浩然荼壘安扉靈馗掛户神儺烈竹轟雷動念流光四序式周回須知今嵗今宵盡似頓覺明年明日催向今夕是處迎春送臘羅綺筵開今古遍同此夜賢愚共添一嵗貴賤仍偕互祝遐齡山海固難摧石崇富貴籛鏗夀更潘嶽儀容子建才仗東風盡力一齊吹送入此門來瀟湘逢古人慢初夏王和甫薰風微動方榴花弄色萱草成窩翠幃敞輕羅試氷簟初展幾尺湘波踈簷廣厦稱瀟湘一枕南柯引多少夢魂歸緒洞庭雨棹煙蓑驚回處間晝永更時時燕雛鶯友相過正緑影婆娑况庭有幽花池有新荷青梅煮酒幸隨分贏取髙歌功名事到頭終在嵗華忍負清和看花回張守生日趙德莊注目正江湖浩蕩煙雲離屬美人衣蘭佩玉淡秋水凝神陽春翻曲烹鮮坐嘯清淨五千言自足橫劒氣南斗光中浩然一醉引雙鹿回鴈未歸書未續夢草處舊芳重緑誰憶瀟湘嵗晚為喚起長風吹飛黃鵠功名異時圯上家傳謝寵辱待封留拜公堂下願授我長生籙二端有恨留春無計花飛何速檻外青青翠竹鎮髙節凌雲清隂常足春寒風袂帶雨穿窗如利鏃催處處燕巧鶯慵幾聲鈎輈呌雲朩看波面垂楊蘸緑最好是風梳煙沐隂重熏簾未捲正泛乳新芽香飄清馥新詩惠我開卷醒然欣再讀嘆辭章過人華麗擲地勝如金玉陽春楊無咎蕙風輕鶯語巧應喜乍離幽谷飛過北窗前迎清曉麗日明透翠幃縠篆臺芬馥初睡起橫斜簪玉因甚自覺腰肢瘦朝來又寬裙幅對清鏡無心欣梳裹誰問著餘酲帶宿尋思前歡往事似驚回好夢難續花亭遍倚檻曲厭滿眼爭春凡朩儘憔悴過了清明候愁紅慘緑史邦卿杏花烟梨花月誰與暈開春色坊巷曉愔愔東風斷舊火銷處近寒食少年踪跡愁暗隔水南山北還是寶絡雕鞍被鶯聲喚來香陌記飛蓋西園寒猶凝驚醉耳誰家夜笛燈前重簾不掛殢華裙粉淚曾拭如今故里信息賴海燕年時相識奈芳草正鎖江南夢春衫怨碧向湖邊江緯讀書堂江緯退處鄉關幽棲林藪舍宇苐須茅蓋翠巘清泉啓軒窗遙對遇等門鄰里過從親朋臨顧草草便成幽㑹䇿杖擕壺向湖邊栁外旋買溪魚便斫銀絲鱠誰復欲痛飲如長鯨吞海共惜醺酣恐歡娛難再矧清風明月非錢買休追念金馬玉堂心膽碎且鬬尊前有阿誰身在張拭萬里煙堤百花風榭遊女翩翩羽蓋綵掛鞦韆向花梢嬌對矧門外森立喬松日花爭麗猶若當年文㑹廊廟䕫龍暫卜鄰郊外共講真率玉糝金虀膾同蕭散寄傲樽罍傾北海佳處難忘約追歡須再况風月不用一錢買但回首七虎堂中心欲碎千里相思幸前盟猶在月中桂送杜微赴闕趙德莊露醑無情送長歌未終已醉離别何如暮雨釀一襟凉潤來留佳客好山侵坐碧勝昨夜疏星淡月君欲翩然去人間底許員嶠問帆席詩情病非疇昔賴親朋對影且慰良夕風流雨散定幾回腸斷能禁頭白為君煩素手薦碧藕輕絲細雪去去江南路猶應水雲秋共色更漏子杜夀域庭逺途程算萬山千水路入神京暖日春郊緑栁紅杏香徑舞燕流鶯客館悄悄閒庭堪惹舊恨深有多少馳驅驀嶺涉水枉費身心思想厚利髙名謾惹得憂煩枉度浮生幸有青松白雲深洞清閒且樂升平長是宦遊羇思别離淚滿襟望江鄉縱跡舊遊題書尚自分明賞南枝曽子固暮冬天地閉正柔朩凍折瑞雪飄飛對景見南嶺梅露幾㸃清雅容姿丹染蕚玉綴枝又豈是一陽有私大抵化工獨許使占却先時霜威莫苦凌持此花根性想羣卉爭知貴用在和羮三春裏不管緑是紅非攀賞處宜酒巵醉撚嗅幽香更竒倚欄仗何人去囑羌管休吹長相思少游鐵甕城髙蒜山渡濶干雲十二層樓開樽待月掩箔披風依然燈火揚州綺陌南頭記歌名宛轉鄉號溫柔曲檻俯清流想花隂誰繫蘭舟念凄絶秦絃感深荆賦相望幾許凝愁勤勤裁尺素奈雙魚難渡瓜洲曉鑑堪羞潘鬢㸃吳霜漸稠幸于飛鴛鴦未老不應同是悲秋京妓栁耆卿畫鼓喧街蘭燈滿市皎月初照嚴城清都絳闕夜景風傳銀箭露暖金莖巷陌縱橫過平康欵轡緩聽歌聲鳯燭熒熒那人家未掩香屏向羅綺叢中認得依稀舊日雅態輕盈嬌波艷冶巧笑依然有意相迎墻頭馬上謾遲留難寫深誠又豈知名宦拘檢年來減盡風情迎新春嶰管變青律帝里陽和新布晴景回輕煦慶嘉節當三五列華燈千門萬户遍九陌羅綺香風微度十里燃絳樹鼇山聳喧喧簫鼓漸天如水素月當午香徑裏絶纓擲果無數更䦨燭影花隂下少年人往往竒遇太平時朝野多歡民康阜堪隨分良聚對此爭忍獨醒歸去望南雲慢朩芙蓉沈公述朩葉輕飛乍雨歇亭臯簾卷秋光欄隈砌角綻拒霜幾處䔒深淺紅芳應恨開時晚伴翠菊風前並香曉來寒露嫩臉低凝似帶啼粧堪傷記得佳人當時怨别盈腮淚粉行行而今最苦奈千里身心兩處凄凉感物成消黯念舊歡空勞寸腸月斜殘漏夢斷孤幃一枕思量綺寮怨周美成上馬人扶殘醉曉風吹未醒映水曲翠瓦朱簷垂楊裏乍見津亭當時曾題敗壁蛛絲罩淡墨苔暈青念去來嵗月如流徘徊久嘆息愁思盈去去倦尋路程江陵舊事何曽再問楊瓊舊曲凄清斂愁黛與誰聽尊前故人如在想念我最關情何須渭城歌聲未盡處先淚零趙功可忽忽東風又老冷風吹晚隂疏簾下茶鼎孤煙斷橋外梅豆千林江南庾郎憔悴睡未醒病酒愁怎禁倚䦨干一扇凉風看平地落花如雪深千曲囊中古琴平泉金谷不堪舊事重尋當日登臨都化作夢銷沉元龍丘墳無恙誰喚起共論心哀歌怨吟問何似啼鳥枝上音花心動史梅溪風約簾波錦機寒難遮海棠烟雨夜酒未蘇春枕猶欹曾是誤成歌舞半褰薇帳雲頭散奈愁味不隨香去儘沈靜文園更渴有人知否懶記溫柔舊處偏只怕臨風見它桃樹繡户鎖塵錦瑟空絃無復畫眉心緒待拈銀管書春恨被雙燕替人言語意不盡垂楊幾千萬縷臨安新亭劉叔安鳩雨催晴遍園林一番緑嬌紅媚栁外金衣花底香鬚消得艷陽天氣障泥步錦尋芳路稱來往縱橫珠翠笑擕手旗亭問酒更酬春思還記東山樂事向歌雪香中伴春沈醉粉袖殢人彩筆題詩陶寫老來風味夜深銀燭明如晝待歸去看承花睡夢雲散屏山半熏沈水春景阮逸女仙苑春濃小桃開枝枝已堪攀折乍雨乍晴輕暖輕寒漸近賞花時節栁搖臺榭東風軟簾櫳靜幽禽調舌斷魂逺閒尋翠徑頓成愁結此恨無人共說還立盡黃昏寸心空切强整繡衾獨掩朱扉簟枕為誰鋪設夜長宫漏傳聲逺紗窗映銀缸明滅夢回處梅梢半籠淡月憶諸葛章蟾英忽覩菱花這一程減却風流顔色鄰姬戲問愧我為羞無語低頭寥寂珠泪紛紜和粉垂襟袂舊痕乾又濕感起愁懷堆堆積積杜宇催春急煙籠花栁粉蝶難尋覔紫燕喃喃黃鶯恰恰對景脂消香浥篆煙將盡愁未休息若得御溝玻璃碧教紅葉往來傳箇消息永遇樂栁耆卿薰風解愠晝景晴和新霽時候火德流光蘿圖薦祉纍慶金枝秀璇樞繞電華渚流虹是日挺生元后緒唐虞垂拱千載應期萬靈敷祐殊方異域爭貢琛賮架巘航波奔湊三殿稱觴九儀就列韶濩鏘金奏藩侯瞻望彤庭親擕僚吏賡歌元首祝堯齡北極齊尊南山共久東坡明月如霜好風如水清景無限曲港跳魚圓荷㵼露寂寞無人見紞如五鼓錚然一葉黯黯夢雲驚斷夜茫茫重尋無覔處覺來小園行遍天涯倦客山中歸路望斷故園心眼燕子樓空佳人何在空鎖樓中燕古今如夢何曾夢覺但有舊歡新怨異時對南樓夜景為余浩歎夜登燕子樓夢盼盼作朝無咎曰燕子樓空三句說盡張建封燕子樓事春情解方叔風暖鶯嬌露濃花重天氣和煦院落煙收垂楊舞困無奈堆金縷誰家巧縱青樓絃管惹起暮雲情緒憶當時紋衾粲枕未嘗暫孤鴛侣芳菲易老故人難聚到此翻成輕誤閬苑仙遙蠻箋縱寫何計傳深訴青山緑水古今長在惟有舊歡何處空贏得斜陽暮草淡烟細雨京口北固亭懷古稼軒千古江山英雄無覔孫仲謀處舞榭歌臺風流總被雨打風吹去斜陽草樹尋常巷陌人道寄奴曽住想當年金戈鐵馬氣吞萬里如虎元嘉草草封狼居胥贏得倉皇北顧四十三年望中猶記烽火揚州路可堪回首佛狸祠下一片神鴉社鼓憑誰問廉頗老矣尚能飯否春莫有懷劉叔擬青幄蔽林白氊鋪徑紅雨迷楚晝閣關愁風簾捲恨盡日縈情緒陽臺雲去文園人病寂寞翠尊雕俎惜韶容匆匆易失芳叢對眼如霧巾欹潤裛衣寬涼滲又覺漸回驕暑解籜吹香遺丸薦脆小芰浮鴛浦畫欄如舊依稀猶記佇立一鈎蓮步黯銷魂那堪又聽杜鵑更苦次韻弔青樓髙賔王淺暈修蛾脆痕紅粉猶記窺户香斷奩空塵生砌冷誰喚青鸞舞春風花信秋宵月約歷歷此心曾許銜芳恨千年怨結玉骨未應成土朩蘭艇子莫愁何在謾繫寒江烟樹事逐雲沈情隨佩冷短夢分今古一杯遙夜孤光難曉多少碎人腸處空凄黯西風細雨盡吹淚去送春洪叔璵歌雪徘徊夢雲溶曳欲勒春住薄幸楊花無端杜宇抵死催教去參差烟岫千回百匝不解禁春歸路病厭厭那堪更聽小樓一夜風雨金叉鬬草玉盤行菜往事了無憑據合數松兒分香帕子總是牽情處小桃朱户題詩在否尚憶去年崔護緑隂中鶯鶯燕燕也應解語前調雅詞功名閒事利祿休問莫繫心上幸有衣食隨緣過得著甚乾勞攘風前月下三杯兩盞撞著即莫與放且與箇山莊道友退閒故人來往新來做得一箇寬䄂布衫著來也暢出户迎賔入城幹事恰似王保長我咱忺後人歌鬼舞任你萬般毁謗死來後一家一箇那底怎向寄所思新第者詞話孤衾不暖靜聞銀漏欹枕難穩細想多情多才多貌總是多愁本而今幽㑹難成佳期頓阻只恁縈方寸知他莫是今生共伊此歡無分尋思斷腸腸斷珠淚揾了依前重揾終待臨岐分明說與我這厭厭悶得伊知後教人成病萬種斷也無恨只恐他恁不分曉謾勞瘦損東臯寓居朝無咎松菊堂深芰荷池小長夏清暑燕引雛還鳩呼婦往人靜郊原趣麥天已過薄衣輕扇試起繞園徐步聽衡宇欣欣童稚共說夜來初雨蒼苔徑裏紫葳枝上數㸃幽花垂露東里催鋤西鄰助餉相戒清晨去斜川歸興翛然滿目回首帝鄉何處只愁恐輕鞍犯夜霸陵舊路傾杯樂栁耆卿朩落霜洲鴈橫煙渚分明畫出秋色暮雨乍歇小楫夜泊宿葦村山驛何人月下臨風處起一聲羌笛離愁萬緒聞岸草切切蛩吟如織為憶芳容别後水遙山逺何計馮鱗翼想繡閣深沉爭知憔悴損天涯行客楚峽雲歸髙陽人散寂寞狂蹤跡望京國空目斷逺峰凝碧春霽春晴胡浩然遲日融和乍雨歇東郊嫩草凝碧紫燕雙飛海棠相襯粧㸃上林春色黯然望極困人天氣渾無力又聽得園苑數聲鶯囀栁隂直當此暗想故國繁華儼然遊人依舊南陌院深沉梨花亂落那堪如練㸃衣白酒量頓寬還量窄算此情景除非殢酒狂歡恣歌沉醉有誰知得秋霽秋晴詩餘虹影侵階乍雨歇長空萬里凝碧孤鶩髙飛落霞相映逺狀水鄉秋色黯然望極動人無限愁如織又聽得雲外數聲新鴈正嘹嚦當此暗想畫閣輕拋杳然殊無些箇消息漏聲稀銀屏冷落那堪殘月照窗白衣帶頓寬猶阻隔算此情苦除非宋玉風流共懷傷感有誰知得史邦卿江水蒼蒼望倦栁愁荷共感秋色虛閣先涼古簾空暮鴈程最嫌風力故園信息愛渠入眼南山碧念上國誰是鱠鱸江漢未歸客還又嵗晚瘦骨臨風夜聞秋聲吹動岑寂露蛩鳴清燈冷屋翻書愁上鬢毛白年少俊遊渾斷得但可憐處無奈苒苒魂驚採香南浦剪梅烟驛曾公衮朩落山明莫江碧樓倚太虛寥廓素手飛觴叉頭笑取金英滿浮桑落鬢雲慢約酒紅拂破香腮薄細細酌簾外任教月轉畫欄角當年快憶登臨異鄉節物難禁離索故人逺凌波何在惟有殘英共寂寞愁到斷腸無處著寄寒香與憑渠問訊佳時弄粉吹花為誰梳掠合歡帶美人栁耆卿身材兒早是妖嬈算風措實難描一箇肌膚渾是玉更都來占了千嬌妍歌艷舞鶯慚巧舌栁妬纎腰自相逢便覺韓娥價減飛燕聲銷桃花零落溪水潺湲重尋仙徑非遙莫道千金酬一笑便明珠萬斛須邀檀郎幸有凌雲詞賦擲果風標况當年便好相擕鳯樓深處吹簫杜夀域樓臺髙下玲瓏鬬芳樹緑隂濃芍藥孤栖香艷晚見櫻桃萬顆初紅巢喧乳燕珠簾鏤曳滿户香風罩紗幃象牀屏枕晝眠才似朦朧起來無語更兼慵念分明往事成空被你厭厭牽繫我怪纎腰繡帶寬鬆春來早是分飛兩處長恨西東到如今扇移明月簟鋪寒浪與誰同花發沁園春王晉卿帝里春歸早先粧㸃皇家池館園林雛鶯未遷燕子乍歸時節戲弄晴隂瓊樓珠閣恰正在栁曲花心翠袖艷衣憑䦨干慣聞絃管新音此際相擕宴賞縱行樂隨處芳樹遙岑桃腮杏臉嫩英萬葉千枝緑淺紅深輕風煦日泛暗香長滿衣襟洞户醉歸訪笙歌晚來雲海沉沉呈史滄洲劉坼父換譜伊凉選歌燕趙一番樂事重起花新笑靨栁軟纎腰齊楚衆芳圍裏年年佳㑹長是傍清明天氣正魏紫衣染天香蜀粧紅破春睡一簇猩羅鳯翠遍東園西城㸃檢芳事銓齊吏散晝館人稀幾闋管絃清脆人生適意流轉共風光遊戲到遇景取次成歡怎教良夜休醉西吳曲懷襄陽劉改之說襄陽舊事重省記銅鞮巷陌醉還醒笑鶯花别後劉郎憔悴萍梗倦客天涯還買箇西風輕艇便欲訪騎馬山翁問峴首那時風景楚王城裏知幾度經過摩挲故宫栁癭漫弔景冷烟衰草凄迷傷心興廢賴有陽春古郢乾坤誰望六百里路中原空老盡英雄腸斷劒鋒冷望明河劉一止華旌耀日報天上使星初辭金闕許國精忠試此日傅岩濟川舟楫向來雞林外况傳詠篇章雄絶問人地真是唐朝第一未論勳業鯨波霽雲千疊望仙馭縹眇神仙明滅萬里勤勞也等是壯年繡衣持節丈夫功名事未肯向樽前傷輕别看飛棹歸侍宸遊宴賞太平風月夢橫塘浪痕經雨影鬢吹寒曉來無限蕭瑟野色分橋剪不斷溪山風物船繫朱藤路迷烟寺逺鷗浮沒聽踈鐘斷鼓似近還遙驚心事傷羇客新醅旋壓鵝黃拚清愁在眼酒病縈骨繡閣嬌慵爭解說短封傳憶念誰伴塗妝綰髻嚼蘂吹花弄秋色恨對南雲此時凄斷有何人知得定風波旅情栁耆卿竚立長堤淡蕩晚風起驟雨歇極目蕭疏塞栁萬株掩映箭波千里走舟車向此人人奔名競利念蕩子終日馳驅爭覺鄉關轉迢遞何意繡閣輕拋錦字難逢等閒度嵗奈泛泛旅迹厭厭病緒近來諳盡宦遊滋味此情懷縱寫香箋馮誰與寄算孟光爭得知我繼日添憔悴早梅芳上孫資政海霞紅山烟翠故都風景繁華地譙門畫㦸下臨萬井金碧樓臺相倚芰荷浦溆楊栁汀洲映虹橋倒影蘭舟飛棹遊人聚散一片湖光裏漢元侯自從破虜征蠻峻陟樞庭貴籌帷厭久盛年晝錦歸來吾鄉我里黔齊少訟宴館多歡未周星便恐皇家圖任勳賢又作登庸計羊祜傳有黔齊期夜月劉濬金鈎花綬繫雙月腰肢軟低折揎皓腕縈繡結輕盈宛轉妙若鳯鸞飛越無别香檀急扣轉清切翻纎手飄瞥催畫鼓追脆管鏘洋雅奏尚與衆音為節當時妙選舞袖慧性雅質名為殊絶滿坐傾心住目不甚窺回雪逡巡一曲霓裳徹汗透鮫鮹肌潤教人傅香粉媚容秀發濬潞洲人有才名樂部中惟杖鼓鮮有能工之者京師官妓楊素娥最工濬酷愛之作此詞素娥以此詞名振京師南浦程正伯金鴨懶薰香向晚來春酲一枕無緒濃緑漲瑶窗東風外吹盡亂紅飛絮無言竚立斷腸惟有流鶯語碧雲欲暮空惆悵韶華一時虛度追思舊日心情記題葉西樓吹花南浦老去覺歡疏傷春恨都付斷雲殘雨黃昏院落問誰猶在憑闌處可堪杜宇空只解聲聲催他春去史邦卿玉樹曉飛香待倩它和愁㸃破妝鏡輕嫩一天春平白地都護雨昏烟冥幽花濕露定應獨把闌干憑謝屐未蠟安排共文鵷重遊芳徑年來夢裏揚州怕事隨歌殘情趂雲冷嬌盼隔東風無人㑹鶯燕暗中心性深盟縱約盡同晴雨全無定海棠夢在相思過西園秋千紅影曲玉管秋思栁耆卿隴首雲飛江邊日晚烟波滿目憑闌久立望關河蕭索千里清秋忍凝眸窅窅神京盈盈仙子别來錦字終難偶斷鴈無憑苒苒飛下汀洲思悠悠暗想當初有多少幽歡佳㑹豈知聚散難期翻成雨恨雲愁阻追遊悔登山臨水惹起平生心事一場銷黯永日無言却下層樓别瑶姬慢万俟雅言可惜香紅又一番驟雨幾陳狂風霎時留不住便夜來和月飛過簾櫳離愁未了酒病相仍便堪此恨中片片隨流水斜陽去各自西東又還是九十春光誤雙飛戲蝶並採遊蜂人生能幾許細算來何物得似情濃沈腰暗減潘鬢先秋寸心不易供望暮雲千里沉沉障翠峰二郎神春怨徐幹臣悶來彈鵲又攪碎一簾花影謾試著春衫還思纎手薰徹金爐燼冷動是愁端如何向更怪得新來多病想舊日沈腰而今潘鬢不堪臨鏡重省别時淚漬羅襟猶凝料為我厭厭日髙慵起長託春酲未醒鴈翼不來馬蹄難去門掩一庭芳景空竚立盡日欄干遍倚晝長人靜七夕栁耆卿炎光初謝過暮雨芳塵輕灑乍露冷風清庭户爽天如水玉鈎遙掛應是星娥嗟久阻叙舊約飈輪欲駕極目處微雲暗度耿耿銀河髙㵼閒雅須知此景古今無價運巧思穿針樓上女擡粉面雲鬟相亞鈿合金叉私語處算誰在回廊影下願天上人間占得歡娛年年今夜用徐幹臣韻湯恢瑣窗睡起閒竚立海棠花影記翠楫銀塘紅牙金縷杯泛梨花冷燕子銜來相思字道玉瘦不禁春病應蝶粉半消鴉雲斜墜暗塵侵鏡還省香痕碧唾春衫都凝悄一似荼䕷玉肌翠被消得東風喚醒青杏單衣楊花小扇閒却晚春風景最苦是蝴蝶盈盈弄晚一簾風靜解連環閨情周美成怨懷難托嗟行人斷絶信音遼邈憶妙手能解連環似風散雨收霧輕雲薄燕子樓空暗塵鎖一牀絃索想移根換葉盡是舊時手種紅藥汀洲漸生杜若料舟移岸曲人在天角記得當日音書把閒語閒言盡總燒却水驛春回望寄我江南梅蕚拚今生對酒對花為伊淚落春水髙賔王浪搖新緑浸芳洲翠渚雨痕初足蕩霽色流入橫塘看風外漪漪皺紋如縠藻荇縈廽似留戀鴛飛鷗浴愛嬌雲蘸色媚日挼藍逺迷心目仙源漾舟岸曲照芳容幾樹香浮紅玉記那回西洛橋邊濺裙翠傳情玉纎輕掬三十六陂錦鱗渺芳音難續隔垂楊故人望斷浸愁千斛杏梁燕寓解連環張宗瑞小樓春淺記鈎簾看雪䄂粘芳片似不似栁絮因風更細與品題屢呵氷硯宛轉吟情縱真草鳯箋都遍到燈前笑語酒祓峭寒移盡更箭而今栁隂滿院却花空雪似人隔春逺歎萬事流水斜陽謾贏得前詩醉汙團扇脉脉重來算惟有畫欄曾見把千種舊愁付與杏梁語燕尉遲杯離情周美成隋堤路漸日晚密靄生深樹隂隂淡月籠沙還宿河橋深處無情畫舸都不管烟波隔南浦等行人醉擁重衾載將離恨歸去因念舊客京華長偎傍疏林小檻歡聚冶葉倡條俱相識仍慣見珠歌翠舞如今向漁村水驛夜如嵗焚香獨自語有何人念我無憀夢魂疑想鴛侣梅苑嵗云暮歎光隂苒苒能幾許江梅尚怯餘寒長安信音猶阻春風無據憑欄久欲去還凝竚憶溪邊月底徘徊暗香疏影庭户朝來凍解霜消南枝上香英數㸃微露把酒看花無言有淚還是那時情緒花依舊晨粧何處謾贏得花前愁千縷儘髙樓畫角頻吹任教紛紛飛素花草稡編卷二十二

body:
  text: 花草稡編巻十四明陳耀文輯中調攤破南鄉子一名青杏児程正伯休賦惜春詩留春住說與人知一年已負東風瘦說愁說恨數期數刻只望歸時莫恠杜䳌啼真箇也喚得人歸歸來休恨花開了梁間燕子且教知道人也雙飛飲興趙秉文中州集風雨替花愁風雨罷花也應休勸君莫惜花前醉今年花謝明年花謝白了人頭乘興兩三甌揀溪山好處追逰但教有酒身無事有花也好無花也好選甚春秋蘇幙遮范希文碧雲天黄花地秋色連波波上含烟翠山映斜陽天接水芳草無情更在斜陽外黯鄉魂追旅思夜夜除非好夢􅇔人睡明月樓高休獨倚酒入愁腸化作相思淚唐書宋務光傳比見坊邑相率為深渾脱隊駿馬邊服名曰蘇莫作幕誤風情周美成隴雲沉新月小楊桞梢頭能有春多少試着羅裳寒尙峭簾捲青樓占得東風早翠屏深香篆裊流水落花不管劉郎到三疊陽關聲漸杳斷雨殘雲只怕巫山曉竹坡水傍邊山盡處喚取雲來共我山頭住分得一江風共雨滿院芙蓉更聽紅粧舞趂霜晴閒獨歩那裏烟村有箇梅花樹小徑斜穿來又去醉後知他有甚青雲路王通叟儘思量還尀耐為甚當時故故相招買早是幽歡多障礙更遣分飛驀驀如天外有心憐無計奈兩處厭厭未斷殘恩愛獨上小樓臨暮靄凭暖朱欄此意無人㑹閨怨陶氏與君别情易許執手相將永逺成鴛侣一去音書千萬里望斷陽關泪滴如秋雨到如今成間阻等到侯郎來把相思訴看着梅花花不語花巳成梅結就心中苦周美成燎沉香消溽暑鳥雀呼晴侵曉窺簷語葉上初陽乾宿雨水面清圓一一風荷舉故鄉遥何日去家住呉門乆作長安旅五月漁郎相憶否小楫輕舟夢入芙蓉浦好女兒小山緑遍西池梅子青時儘無端盡日東風惡更霏㣲細雨惱人離恨滿路春泥應是行雲歸路有閒淚洒相思想旗亭望斷黄昏月又依前誤了紅牋香信翠䄂歡期二酌酒殷勤儘更留春忍無情便賦餘花落待花前細把一春心事問箇人人莫似花開還謝願芳意且長新倚嬌紅待得歡期定向水沉烟底金蓮影下睡過佳辰促拍醜奴兒元遺山朱麝掌中香可憐兒初浴蘭湯靈椿未老丹枝秀東隣西舎排家助喜沽酒牽羊天與讀書郎便安排富貴文章高門自有容車日明年且看青衫竹馬鴈鴈成行皇甫季貞陽餅局二女則牙牙學語五男則鴈鴈成行見司空表聖一鳴集障車文歲闌劉須溪送嵗可無詩得團欒忍不開眉不記去年今夕夢江東懐抱江西信息舎比妻兒五十扊扅炊待五十富貴成癡百年苦樂乘除看今朝一半明朝一半更似兒時夀孟萬户鄧中齋睡起怯春寒海棠花開未開間莫言春色三分二朱顔緑鬢栽花種竹誰似君閒侯印舊家氊早天邊飛詔催還從君嵗嵗稱觴處人如玉雪花如錦綉福夀如山憐薄命戴復古妻惜多才憐薄命無計可留汝揉碎花牋忍寫斷腸句道傍楊柳依依千絲萬縷抵不住一分愁緒捉月盟言不是夢中語後囬君若重來不相忘處把盃酒澆奴墳土輟耕緑云戴復古字式之號石屏天台人未遇時流寓江右武寧有富家翁愛其才以女妻之居二三年忽欲作歸計妻問其故告以曽娶妻白之父父怒妻宛曲解釋盡以奩具贈夫仍餞以詞夫既别遂赴水死獻衷心歐陽烱見好花顔色争笑東風雙臉上晩粧同閉小樓深閣春景重重三五夜偏有恨月明中情未巳信曽通滿衣猶自染檀紅恨不如雙燕飛舞簾櫳春欲暮殘絮盡桞條空顧􅗥繡鴛鴦帳暖畫孔雀屏欹人悄悄月明時想昔年懽笑恨今日分離銀缸背銅漏永阻佳期小爐烟細虛閣簾垂幾多心事暗地思惟被嬌娥牽役魂夢如癡金閨裏山枕上始應知黄鍾樂魏承班池塘烟暖草萋萋惆悵閒宵含恨愁坐思堪迷遥想玉人情事逺音容渾似隔桃溪偏記同歡秋月低簾外論心花畔和醉暗相攜何事春來君不見夢魂長在錦江西香山㑹向神前發願燒香做呪斷了去娼家吃酒果子錢早是遭他毒手更一箇瓶兒滲漏才斟兩盞三盞早斟不勾又添和薄漓半斗奴哥有我奴哥道有有我時當面盪酒醉春風趙徳仁陌上清明近行人難借問風流何處不歸來悶悶悶囬鴈峯前戲魚波上試尋芳信夜永蘭膏燼春睡何曽稳枕邊珠淚㡬時乾恨恨恨惟有窓前過來明月照人方寸趙元鎮寳鑑菱花瑩孤鸞慵照影魚書蝶夢兩消沉恨恨恨結盡丁香瘦如楊桞雨踈雲冷宿醉厭厭病羅巾空淚粉欲將逺意托湘絃悶悶悶香絮悠悠晝簾悄悄日長春困緱山月雨夕梁寅急雨響巖阿隂雲暗薜蘿山中春去更寒多縱柴門不閉花滿逕蒼苔潤少人過蘭舟曽記蘭汀宿牽恨是烟波而今林下和樵歌看風風雨雨従造物時時變搃心和侍香金童寳䑓蒙繡瑞獸髙三尺玉殿無風烟自直迤邐傍懐盈綺席苒苒菲菲斷處凝碧是龍涎鳯髄惱人情意極想韓夀風流應暗識去似彩雲無處覔惟有多情䄂中留得鈿帶長中腔万俟雅言簇真香似風前拆麝囊嫩紫輕紅間闘異芳風流富貴自覺蘭蕙荒獨占蕋珠春光繡結流蘇宻緻魂夢悠颺氣融液散滿洞房朝寒料峭殢嬌不易當着意要得韓郎芭蕉雨程正伯雨過凉生藕葉晚庭消盡暑渾無熱枕簟不勝香滑争奈寳帳情生金樽意愜玉人何處夢蝶思一見氷雪須寫箇帖兒丁說試問道肯來麽今夜小院無人重樓有月喝火令黄魯直見晩情如舊交䟽分已深舞時歌處動人心烟水數年魂夢無處可追尋昨夜燈前見重題漢上襟便愁雲雨又難尋曉也星稀曉也月西沉曉也鴈行低度不㑹寄芳音淡黄桞姜堯章白石詞空城畫角吹入垂楊陌馬上单衣寒側側看盡鵝黄嫩緑都是江南舊相識正岑寂明朝又寒食強携酒小橋宅怕梨花落盡成秋色燕燕飛來問春何在惟有池塘自碧厭金盃賀方囬風軟香遲花深漏短可憐宵畫堂春半碧紗窓影巻帳蠟燈紅鴛枕畔宻寫烏絲一叚採蘋溪晚拾翠沙空儘愁倚夢雲飛觀朩蘭艇子㡬日渡江來心目斷桃葉青山隔岸行香子張子野舞雪歌雲閒淡粧勻藍溪水深染輕裙酒香醺臉粉色生春更巧談話羙情性好精神江空無畔凌波何處月橋邊青桞朱門斷鍾殘角又送黄昏奈心中事眼中淚意中人晏叔原晩緑寒紅芳意匆匆惜年華今與誰同碧雲零落數字征鴻看沼蓮凋宫扇舊怨秋風流波墜葉佳期何在想天教離恨無窮試將前事閒倚梧桐有銷魂處明月夜粉屏空與泗守過南山晚歸東坡北望平川野水荒灣共尋春飛歩孱顔和風㺯䄂香霧縈鬟正酒半酣人語笑白雲間飛鴻落照相將歸去澹涓涓玉宇清閒何人無事宴坐空山望長橋上燈火亂使君還杜夀域黄金葉細碧玉枝纎初暖日當乍晴天向武昌溪畔於彭澤門前陶潜影張緒態兩相牽數株堤面㡬樹橋邊嫩垂條絮蕩輕綿繫長江舴艋拂深院秋千寒食下半和雨半和煙趙介之春日遅遅春景熈熈漸郊原芳草萋萋夭桃灼灼楊桞依依見燕喃喃蜂簇簇蝶飛飛閒庭寂寂曲沼漪漪更秋千紅索垂垂遊人隊隊樂意嬉嬉盡醉曛曛歌緩緩語低低蔣㨗紅了櫻桃綠了芭蕉送春歸客尙蓬飄昨宵糓水今夜蘭臯奈雲溶溶風淡淡雨瀟瀟銀字笙調心字香燒料芳踪乍整還凋待將春恨都付春潮過窈娘堤秋娘渡泰娘橋洪叔璵楚楚精神楊桞腰身是風流天上飛瓊凌波㣲歩羅襪生塵有許多嬌許多韻許多情十年心事兩字眉㛰問何時真箇行雲秋衾半冷窓月窺人想為人愁為人瘦為人顰葛魯卿風物颼颼朩落滄州漸老人不奈悲秋羇懐都在鬂上眉頭似休文瘦文通恨子山愁庭梧影薄籬菊香浮強招尋聊命朋儔窮通皆夢今古如流且淵明徑子猷舫仲宣樓雅詞天與秋光轉轉情傷探金英知近重陽薄衣初試緑蟻新嘗漸一畨風一畨雨一畨凉黄昏院落恓恓惶惶酒醒時徃事愁腸那堪永夜明月空床聞砧聲搗蛩聲細漏聲長羅浮滿洞苔錢買斷風煙笑桃花日落晴川石樓髙處夜夜啼猿看一更雲三更月四更天細草如氊獨枕空拳與山糜野鹿同眠殘霞未散淡霧沉綿是晋時人唐時洞漢時仙晁次膺别恨綿綿屈指三年再相逢情分依然君初霜鬂我已華顛况其間有多少恨不堪言小庭幽檻菊蕋斕班近清宵月已嬋娟莫思身外且闘樽前願花長好身長徤月長圓山水扇面劉改之佛寺雲邊茅舎山前樹隂中酒斾低懸峯巒空翠溪水青連只欠梅花欠沙鳥欠漁船無限風烟景趣天然最宜他隠者盤旋何人村墅若箇林泉恰似欹湖似枋口似斜川元遺山漫漫晴池澹澹雲羅傍青山是處經過桃花觧笑楊桞能歌儘百年身千古意兩蹉跎酒惡無聊詩苦成魔只閒情不易消磨㡬人樵徑何處山阿恨夕陽遅芳草逺落紅多張天師净掃塵埃惜取蒼苔任門前紅葉鋪堦也堪圖畫還也竒哉有數株樹數竿竹數枝梅花朩栽培取次教開明朝事天自安排知他富貴㡬時來且優游且随分且寛懐東坡清夜無塵月色如銀酒斟時須滿十分浮名浮利休苦勞神歎隙中駒石中火夢中身雖抱文章開口誰親且陶陶樂盡天真不如歸去作箇閒人對一張琴一壺酒一溪雲容齋随筆清要無因舉選艱辛繫書錢須要十分浮名浮利虛苦勞神歎旅中愁心中悶部中身雖抱文章苦苦推尋更休說誰假誰真不如歸去作箇齊民免一囬來一囬討一囬論紹興初范覺民為相以自崇寧以來創立法度例有汎賞建議討論又行下吏部参酌追奪有至奪十五官者雖公論當然而失職者胥動造謗浮議蜂起無名子因改坡語云云至大字書寫貼於内前墻上邏者得之以聞朝論慮或揺人心罷討論之舉范公用是為臺諌所攻李易安草際鳴蛩驚落梧桐正人間天上愁濃雲堦月色關鎻千重縱浮槎來浮槎去不相逢星橋鶴駕經年纔見想離情别恨難窮牽牛織女莫是離中甚一霎兒晴一霎兒雨一霎兒風書舍偶成叚成已自嘆勞生枉了經營到而今一事無成不如趂早覓箇歸程向渭川漁東市卜富春耕眼底浮榮身外虛名儘輸他時軰峥嶸得偷閒處且適閒情有坐忘篇傳燈録洗心經贈柳兒行劉叔安露葉煙條天與多嬌筭風流張緒難消惱人春思政自無聊奈斂愁眉酣醉眼减圍腰風絮招要蝶㺯鶯嘲最關情是短長橋解驂分􅃑催上蘭橈更緑波平紅日墜碧雲遥晁無咎前嵗栽桃今嵗成溪更黄鸝乆住相知㣲行清露細履斜暉對林中侣閒中我醉中誰何妨到老常閒常醉任功名生事俱非衰顔難強拙語多遅但酒同行月同坐影同嬉千金意琴精音音音音音你負心你真負心孤負我到如今記得年時低低唱淺淺斟一曲直千金如今寂寞古墻隂秋風荒草白雲深斷橋流水何處尋凄凄切切冷冷清清教奴怎禁江湖紀聞云曹珪仕呉越守嘉興後為蘇州刺史光啓中捨宅為招提寺宋嘉熈丁酉鄧州金鶴雲以琴書寓嘉興富家居近寺側每夜聞歌云云甚習一夕歌聲甚近窺之乃一女子也明夜推戸至榻惜别以百金為意女子澘然曰妾曹刺史家女也遇異人得仙術但凡心未除累遭降謫今方別後未卜㑹期君前程甚逺夾山之㑹君其慎之金異之明以告主人皆不曉其故後修寺墻下得石匣藏一古琴係百金焉金後為縣令卒於峽州聲聲令春思愈克成簾移碎影香褪衣襟舊家庭院嫩苔侵東風過盡暮雲鎻緑窓深怕對人間枕剩衾樓底輕隂春信斷怯登臨斷腸魂夢兩沉沉花飛水逺便從今莫追尋又怎奈驀地上心錦纒道宋子京燕子呢喃景色乍長春晝覩園林萬花如繡海棠經雨胭脂透桞展宫眉翠拂行人首向郊原踏青恣歌携手醉醺醺向尋芳酒問牧童遥指孤村道杏花深處那裏人家有觧佩令宫詞晏叔原玉階秋感年華暗去掩深宫團扇無緒記得當時自剪下機中輕素㸃丹青畫成秦女凉襟猶在朱絃未改忍霜紈飄零何處自古悲凉是情事輕如雲雨荷么絃恨長難訴春蔣㨗春晴也好春
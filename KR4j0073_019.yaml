夾栁橋疏穩縱香勒前度湧金樓嘯傲東風鷗鷺半相識暗數院僧歸盡長虹卧深碧花間恨猶記憶正素手暗裁輕拆夜深後不道人來燈細窗隙栁浪聞鶯翠迷倦舞紅駐殘粧流鶯怕與春别過了禁煙寒食東風顫環鐵遊人恨柔帶結更喚醒羽喉宫舌畫船逺不認綿蠻晚棹空歇爭似湧金樓燕燕歸來鈎轉暮簾揭對語畫梁消息香泥砌花屑昆明事休更説費夢繞建章宫闕曉啼處穩繫金狨雙鐙籠月三潭印月桂輪逼彩菱沼漾金潛虬暗動鮫室水路乍疑霜雪明眸洗春色年時事還記憶對萬頃葑痕龜坼舊遊處不認三潭此際曾識今度湧金樓素練縈窗頻照庾侯席自與影娥人約移舟弄空碧宵風悄籖漏滴早未許睡魔相覔有時恨月被雲妨天也拚得兩峯插雲暮屏翠冷秋樹赭疏雙峯對起南北好與霽天相接浮圗現西極苕嶤處雲共碧謾費盡少年遊屐故鄉逺一望空遙水斷煙隔間憑湧金樓瀲灩波心如洗夢淹筆喚起睡龍蒼角盤空壯商色西湖路成倦客待倩寫素縑千尺便歸去酒底花邉猶自看得雲仙引桂花馮偉夀紫鳳臺髙紅鸞鏡裏馡馡幾度秋馨黃金重緑雲輕丹砂鬢邉滴粟翠葉玲瓏煙剪成含笑出簾月香滿袖天霧縈身年時花下逢迎有逰女翩翩如五雲亂擲芳英為簮斜朵事事關心長向金風一枝在手嗅蕊悲歌雙黛顰繞臨溪樹對初弦月露下更深繡停針陸務觀歎半紀跨萬里秦吳頓覺衰謝回首鵷行英俊並遊咫尺玉堂金馬氣凌嵩華負壯略縱橫王霸夢經洛浦梁園覺來淚流如瀉山林定去也却自恐説著少年時話靜院焚香間倚素屏今古總成虛假趂時婚嫁幸自有湖邉茅舍燕歸應笑客中又還過社􅌑瓏四犯春思周美成穠李夭桃是舊日潘郎親試春豔自别河陽長負露房煙臉憔悴鬢點吳霜念想夢魂飛亂嘆畫欄玉砌都換才始有緣重見夜深偷展香羅薦暗窗前醉眠蔥蒨浮花浪蕊都相識誰更曽擡眼休問舊色舊香但認取芳心一點又片時一陳風雨惡吹分散京口寄所思史達祖闊甚吳天頓放得離緒江南多少一雨為秋涼氣小窗先到輕夢聽徹風蒲又散入楚空清曉問世間愁在何處不離淡煙芳草簟紋獨浸芙蓉影想凄凄欠郎偎抱即今卧得雲衣冷山月仍相照方悔翠袖易分難聚有玉香花笑待鴈來先寄新詞歸去且教知道越中嵗暮聞簫鼓感懷薑堯章疊鼓夜寒垂燈春淺匆匆時事如許倦遊歡意少俯仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世惟有此情苦揚州栁垂官路有輕盈喚馬端正窺户酒醒明月下夢逐潮聲去文章信美知何用謾贏得天涯羇旅教説與春來要尋花伴侣金菊對芙蓉東坡花則一名種分三色嫩紅妖白嬌黃正新秋佳景雨霽風涼郊墟十里飄蘭麝瀟灑處旖旎非常自然風韻開時不惹蝶亂蜂狂攜酒獨揖蟾光問花神何屬離兊中央引騷人乘興廣賦詩章幾多才子爭攀折嫦娥道三種清香狀元紅是黃為榜眼白探花郎秋怨康伯可梧葉飄黃萬山空翠斷霞流水爭輝正金風西起海燕東歸憑欄不見南來鴈望故人消息遲遲朩樨開後不應悮我好景良時只念獨守孤幃把枕前囑付一旦分飛上秦樓遊賞酒殢花迷誰知别後相思苦悄為伊瘦損香肌花前月下黃昏院落珠淚偷垂前調劉靜甫淺拂春山慢橫秋水玉纎間理絲桐按清泠繁露淡佇悲風素絃瑶軫調新韻顫翠翹金簇芙蓉疊鈎重鎖輕挑慢摘特地情濃泛商刻羽無窮似和鳴鸞鳳律應雌雄問髙山流水此意誰同箇中只許知音聽有茂陵車馬雍容晝簾人靜琴心三疊時倒金鐘月華清憶别馬莊父瑟瑟秋聲蕭蕭天籟滿庭搖落空翠數遍丹楓不見葉間題字人何處千里嬋娟愁不斷一江流水遙睇見征鴻幾點碧天無際悵望月中仙桂問竊藥佳人誰與同嵗把鏡當空照盡别離情意心裏恨莫結丁香琴上曲休彈秋思怕裏又悲來老却蘭臺公子春夜對月洪叔璵花影搖春蟲聲吟暮九霄雲幕初捲誰駕氷蟾擁出桂輪天半素魄映青瑣窗前皓彩散畫欄干畔凝盼見金波晃漾分輝鵲殿况是風柔夜暖正燕子新來海棠微綻不似秋光只照離人腸斷恨無奈利鎖名韁誰為喚舞裙歌扇吟玩怕銅壺催曉玉繩低轉梨花朱淑真雪壓庭春香浮花月攬衣還怯單薄欹枕徘徊又聽一聲乾鵲粉淚共宿雨闌干清夢與寒雲寂寞除却是江梅曽許詩人吟作長恨曉風漂泊且莫遣香肌瘦減如削深杏夭桃端的為誰零落况天氣粧點清明對美景不妨行樂拚著向花時取一杯獨酌玉蝴蝶京城栁耆卿漸覺芳郊明媚夜來膏雨一洗塵埃滿目淺桃深杏露染煙裁銀塘靜魚鱗簟展煙岫翠龜甲屏開殷晴雷雲中鼓吹遊遍蓬萊徘徊隼旟前後三千珠履十二金叉雅俗熙熙下車成宴盡春臺好雍容東山妓女堪笑傲北海樽罍且追陪鳳池歸去那更重來秋思望處雲收雨斷憑欄悄悄目送秋光晚景瀟疏堪動宋玉悲涼水風輕蘋花漸老月露冷梧葉飄黃遣情傷故人何在煙水茫茫難忘文期酒會幾辜風月屢變星霜海濶山遙未知何處是瀟湘念雙燕難憑逺信指暮天空識歸航黯相望斷鴻聲裏立盡斜陽重陽淡蕩素商行暮逺空雨歇平野煙收滿目江山堪助楚客冥搜素光動雲濤漲晚紫翠冷霜巘橫秋景清幽渚蘭香謝汀樹紅愁良儔西風吹帽東籬攜酒共結歡遊淺酌低吟坐中俱是飲家流對殘暉登臨休嘆賞令節酩酊方酬且相留眼前尤物盞裏忘憂春思朝叔用目斷江南千里灞橋一望煙水微茫晝鎖重門人去暗惜流光雨輕輕梨花院落風淡淡楊栁池塘恨偏長佩沈湘浦雲散髙唐清狂重來一夢手搓梅子煮酒新嘗寂寞經春小橋依舊燕飛忙玉鈎欄憑多漸暖金縷枕别久猶香最難忘看花南陌待月西廂秋思髙賔王喚起一襟涼思未成晚雨先做秋隂楚客悲殘誰解此意登臨古臺荒斷霞斜照新夢黯微月疏砧總難禁盡將幽恨分付孤斟從今倦看青鏡既遲勳業可負煙林斷梗無憑嵗華搖落又驚心想蓴汀水雲愁凝間蕙帳猿鶴悲吟信沈沈故園歸計休更侵尋前調史達祖晚雨末催宫樹可憐殘葉猶抱涼蟬短景歸秋吟思又接愁邉漏初長夢魂難禁人漸老風月俱寒想幽歡土花庭甃蟲網闌干無端啼蛄攪夜恨隨團扇苦近秋蓮一笛當樓謝娘懸淚立風前故園晚強留詩酒新鴈逺不致寒暄隔蒼煙楚香羅袖誰伴嬋娟王忠州家席上作陸務觀倦客平生行處墜鞭京洛解佩瀟湘此夕何年來賦宋玉髙唐繡簾開香塵乍起蓮步穩銀燭分行暗端相燕羞鶯妬蝶繞蜂忙難忘芳樽頻勸峭寒新退玉漏猶長幾許幽情只愁歌罷月侵廊欲歸時司空笑悶微近處丞相嗔狂斷人腸假饒相送上馬何妨和維揚朝侍郎寄強伯葛信齋憶昨苕溪慣弄五亭月笛四水煙蓑何事毗檀門外馬駐長坡野花中亂紅杳靄小橋外疊翠嵯峨且顔酡但存長袖舞到婆娑云何立盟惠政春行五馬月皎千波贏得賔僚聽隔牆無事髙歌帳煙寒瑞麟影墮簾霧細寶鴨香多試蹉跎一枰落日又送樵柯燕山亭杏花宋徽宗裁剪氷綃輕疊數重冷淡燕脂勻注新樣靚粧豔溢香融羞殺蕊珠宫女易得凋零更多少無情風雨愁苦問院落凄涼幾畨春暮憑寄離恨重重這雙燕何曾會人言語天遙地逺萬水千山知他故宫何處怎不思量除夢裡有時曾去無據和夢也新來不做中秋諸王席上作曽純甫河漢風清庭户夜涼皓月澄秋時候氷鑑乍開跨海飛來先掩滿天星斗四捲珠簾漸移影寶階鴛甃還又看嵗嵗嬋娟向人依舊朱邸髙宴簮纓正歌吹瑶臺舞翻宫袖銀管競酬棣蕚相輝風流古來誰有玉笛橫空更聽徹霓裳三奏難偶拚醉倒參橫曉漏三姝媚史邦卿煙光搖縹瓦望晴簷多風栁花如灑錦瑟橫牀想淚痕塵影鳳絃常下倦出犀帷頻夢見王孫驕馬諱道相思偷理綃裙自驚腰衩惆悵南樓遙夜記翠箔張燈枕肩歌罷又入銅駝過舊家門巷首詢聲價可惜東風將恨與間花俱謝記取崔徽模樣歸來暗寫古衛舟人謂曾載錢塘宫人天遊詹玉一蓬兒别苦是誰家花天月地兒女紫曲藏嬌慣錦窠金翠玉璈鐘吕綺席傳宣笑聲裏龍樓三鼓歌扇題詩舞袖籠香幾曾塵土因甚留春不住怎知道人間匆匆今古金屋銀屏被西風將換蓼汀蘋渚如此江山應悔却西湖歌舞載取斷雲何處江南煙雨次周公謹故京送别韻王沂孫蘭缸花半綻正西窗凄凄斷螢新鴈别久逢稀謾相看華髮共成銷黯總是飄零更休賦梨花秋苑何况如今離思難禁俊才都減今夜山髙江淺又月落帆空酒醒人逺綵袖烏紗解愁人惟有斷歌幽婉一信東風再約看紅腮青眼只恐扁舟西去蘋花弄晚鎖寒窗寒食周美成暗栁啼鴉單衣佇立小簾朱户桐花半畝靜瑣一庭愁雨灑空階更闌未休故人剪燭西窗語似楚江暝宿風燈零亂少年羇旅遲暮嬉遊處正店舍無煙禁城百五旗亭喚酒付與髙陽儔侣想東園桃李自春小唇秀靨今在否到歸時定有殘英待客攜樽爼楊補之栁暗藏鴉花深見蝶物華如繡情多思逺又是一畨清瘦憶前回庭榭未春箇人預約同攜手恨遲留載酒期程孤負踏青時候搔首雙眉暗鬬况無似今年一春晴晝風僝雨僽直得迤逗想間窗針線倦拈寂寞細撚酴醿嗅待還家定自寃人淚粉盈襟袖有感程先傳之宋休寧人雨洗紅塵雲迷翠麓小車難去凄涼感慨未有今年春暮想曲江水邉麗人影沈香歇誰為主但葵燕麥風前搖蕩徑花成土空被多情苦慶會難逢少年幾許紛紛沸鼎負了青陽百五待何時重享太平典衣貰酒相爾汝算蘭亭有此歡娛又却悲今古前調蕭允之細雨收塵輕隂弄日栁絲掠道桃邉杏處猶記玉驄曾到對東風回首舊遊香消豔歇無音耗悵佳人有約難來緑遍滿庭芳草愁抱沈吟久問翠珥金鈿為何人好回文細字塵暗當年纎縞倚闌干斜陽又西歡期易失春易老待何時再覔珍叢共把清樽倒五福降中天慢詠梅沈約之月朧煙淡霜溪滑孤宿暮林荒驛繞樹微吟巡簷索笑自分平生相得氷池半釋正節物驚心淚痕沾臆流水濺濺照影古寺滿春色沈嘆今年未識暗香微動人初寂酷愛芳姿最憐幽韻來欵禪房深密他時悢悵却月凌風信音難的雪底幽期為誰還露立紫玉簫韓相家姬輕盈朝無咎羅綺叢中笙歌筵裏眼狂初認輕盈無花解比似一鈎新月雲際初生算不虛得都占與第一佳名卿歸去那知有人别後牽情襄王自是春夢休謾説東墻事更難憑誰教慕宋要題詩曽倚寶柱低聲似瑶臺曉空暗想衆裏飛瓊餘香冷猶在小窗一到魂驚三部樂周美成浮玉霏瓊向邃館靜軒倍增清絶夜窗垂練何用交光明月近聞道官閣多梅趂暗香未逺凍蕊初發倩誰摘取寄贈情人桃葉回文近傳錦字道為君瘦損是人都説遙知染紅著手膠梳粘髮轉思量鎮長墮睫都只為情深意切欲報消息無一句堪喻愁結七月送丘宗卿使敵陳同父小窟穹廬但三滿三平其勞均佚人中龍虎本為明時而出只合是端坐王朝看指揮整辨掃蕩飄忽也持漢節聊過舊家官室西風又還帶暑把征衫著上有時披拂休將看花淚眼間弦缺骨對遺民有如皎日行萬里依然故物入奏幾策天下禮終定于一芳草古鳳簫吟韓玉汝鎖離愁連綿無際來時陌上初熏繡幃人念逺暗垂珠露泣送征輪長行長在眼更重重逺水孤雲但望極樓髙盡日目斷王孫消魂池塘别後曾行處緑妬輕裙恁時攜素手亂花飛絮裏緩步香禋朱顔空自改向年年芳意長新遍緑野嬉遊醉眼莫負青春丁香結周美成蒼蘚沿階冷螢粘屋庭樹望秋先隕漸雨凄風迅淡暮色倍覺園林清潤漢姬紈扇在重吟玩棄擲未忍登山臨水此恨自古消磨不盡牽引起試酒歸時映月同看鴈陳寶幄香纓薰爐象尺夜寒燈暈誰念留滯故園舊事勞方寸唯丹青相伴那更塵昏蠧損䀨龍謡朱希真肩拍洪崖手攜子晉夢裏暫辭塵宇髙步層霄俯人間如許算蝸戰多少功名問蟻聚幾回今古度銀潢展盡參旗桂華淡月飛去天風緊玉樓斜舞萬女霓袖光搖金縷明廷燕闋倚青冥回顧過瑶池重借雙成就楚岫更邀巫女轉雲車指點虛無引蓬萊路二憑月攜簫遡空秉羽夢踏絳霄仙去花冷街揄悄中天風露並真官蕊珮芬芳望帝所紫雲容與享鈞天九奏傳觴聽龍嘯看鸞舞驚塵世悔平生歎萬感千恨誰憐深素羣仙念我好人間難住勸阿母偏與金桃教酒醒賸斟瓊醑醉歸時手授丹經指長生路閨怨無悶程正伯天與多才不合更與殢栁憐花情分甚總為才情惱人方寸早是春殘花褪也不料一春都成病自失笑因甚腰圍半減淚珠頻揾難省也怨天也自恨怎免千般思忖倩人説與又却不忍拚了一生愁悶又只恐愁多無人問到這裡天也憐人看他穩也不穩雪意王沂孫隂積龍荒寒度鴈門西北髙樓獨倚悵短景無多亂山如此欲喚飛瓊起舞怕攪碎紛紛銀河水凍雲一片藏花護玉未教輕墜清致悄無似有照水一枝巳攙春意誤幾度憑欄莫愁凝睇應是梨花夢好未肯放東風來人世待翠管吹破蒼茫看取玉壺天地月下笛次韻曾允元吹老楊花浮萍點點一溪春色間尋舊迹認溪頭浣沙磧柔條折盡成輕别向空外瑶簮一擲算無情更苦鶯巢暗葉題破幽寂凝立闌干側記露飲東園聮鑣西陌容消鬢減相逢應自難識東風吹得愁似海謾點染空階自碧獨歸晚解説心中事月下短笛垂楊懷古陳允平銀屏夢覺漸淺黃嫩緑一聲鶯小細雨輕塵建章初閉東風悄依然千樹長安道翠雲鎖玉窗深窈斷橋人空倚斜陽帶舊愁多少還是清明過了任煙縷露條碧纎青嫋恨隔天涯幾回惆悵蘇堤曉飛花滿地誰為掃甚薄幸隨波縹眇啼鵑不喚春歸人自老鴈過粧樓已已菊日寓溧陽聞鴈聲因動鶺鴒之感張炎遍插茱茰人何處客裏頓懶攜壺鴈影涵秋絶似暮雨相呼料得曽留堤上月舊家伴侣有書無謾嗟吁數聲怨抑翻致無書一笑飄零萬里更可憐倦翼同此江湖飲啄關心知是近日何如陶潛謾存徑菊最堪羡松風陶隱居沙汀冷揀寒枝不似煙水寒蘆大有九日漁莊潘希白戲馬臺前採花籬下問嵗華還是重九恰歸來南山翠色依舊簾櫳昨夜聽風雨都不似登臨時候一片宋玉情懷十分衛郎清瘦紅茰佩空對酒砧杵動微寒暗欺羅袖秋已無多早是敗荷衰栁強整帽簷欹側曽經向天涯搔首幾回憶故國蓴鱸霜前鴈後陌上花使歸有懷張仲舉關山夢裏歸來還又嵗華催晚馬影雞聲諳盡倦郵荒館緑箋密記多情事一看一回腸斷待殷勤寄與舊遊鶯燕水流雲散滿羅衫是酒香痕凝處唾碧啼紅相半只恐梅花瘦倚夜寒誰暖不成便沒相逢日重整叉鸞筝鴈但何郎縱有春風詞筆病懷渾懶蠟梅香吳師孟錦里陽和看萬朩凋時早梅獨秀珍館瓊樓正絳趺初吐穠華將茂國豔天葩真淡佇雪肌清瘦似廣寒宫鉛華未御自然粧就凝睇倚朱欄噴清香暗度易襲襟袖好與花為主宜秉燭頻觀泛湘酎莫待南枝隨樂府新聲吹後對賞心人良辰好景須信難偶前調喻明仲愛日初長正園林才見萬木凋黃檻外朝來巳見數枝復欲掩映回廊賜與東皇付芳信粧點江鄉想玉樓中誰家豔質試學新粧桃杏苦尋芳縱成蹊豈能似恁清香素豔妖嬈應是盡夜曾與明月風光瑞雪氷霜渾疑是粉蝶輕狂待拚吟賞休聽畫樓橫管悲傷秋宵吟越調薑白石古簾空墜月皎坐久西窗人悄蛩吟苦漸漏永丁丁箭壺催曉引涼颸動翠葆露腳斜飛雲表因嗟念似去國情懷暮帆煙草帶眼銷磨為近日愁多頓老衛娘何在宋玉歸來兩地暗縈繞搖落江楓早嫩約無憑幽夢又杳但盈盈泪灑單衣今夕何夕恨未了東風第一枝春雪史達祖巧沁蘭心偷黏草甲東風欲障新暖謾凝碧瓦難留信知暮寒較淺行天入鏡做弄出輕鬆纎軟料故園不捲重簾悮了乍來雙燕青未了栁回白眼紅欲斷杏開素面舊遊憶著山隂後盟遂妨上苑寒爐重暖便放慢春衫針線恐鳳靴挑菜歸來萬一灞橋相見二草腳愁蘇花心夢醒鞭香拂散牛土舊歌空憶珠簾綵筆倦題繡户粘雞貼燕想立斷東風來處暗惹起一掬相思亂若翠盤紅縷今夜覔夢池秀句明日動探花芳緒寄聲沽酒人家預約俊遊伴侣憐他梅栁怎忍後天街酥雨待過了一月燈期日日醉扶歸去三酒館歌雲燈街舞繡笑聲喧似簫鼓太平京國多歡大酺綺羅幾處東風不動照花影一天春聚耀翠光金縷相交苒苒細吹香霧羞醉玉少年丰度懷豔雪舊家伴侣閉門明月關心倚窗小梅索句吟情欲斷念嬌俊知人無據想袖寒珠絡藏香夜久帶愁歸去錦堂春司馬光青箱雜記紅日遲遲虛廊轉影槐隂迤邐西斜彩筆工夫難狀晚景煙霞蝶尚不知春去謾繞幽砌尋花奈猛風過後縱有殘紅飛向誰家始知青春無價笑飄蓬宦路荏苒年華今日笙歌叢裏特地咨嗟席上青衫濕透算感舊何止琵琶怎不教易老多少離愁散在天涯再會栁耆卿墜髻慵梳愁蛾懶畫心緒是事闌珊覺新來憔悴金縷衣寬認得這疏狂意下向人誚譬如間把芳容整頓恁地輕辜爭忍心安依前過了舊約甚當初賺我偷剪雲鬟幾時得歸來香閣深關待伊要尤雲殢雨纒繡衾不與同歡儘更深欵欵問伊今後敢更無端雪梅梅苑臘雪初晴氷銷凝泮尋幽開賞名園向長亭登眺倚遍朱欄拂面嚴風凍薄滿階前霜葉聲乾竟小臺深處數葉江梅漏泄春權百花休恨開晚奈韶華瞬息常放教先非是東君私語和煦恩偏欲寄江南音耗念故人隔濶雲煙一枝贈春色待把金刀剪倩人傳花草稡編卷十九

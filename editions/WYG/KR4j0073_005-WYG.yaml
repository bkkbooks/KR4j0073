蒲桃綠時節又黄昏東風深閉門玉簫吹未徹窓影梅花月無語只低眉閒拈雙荔枝七夕陳后山行雲過盡星河爛爐烟未斷蛛絲滿想得兩眉顰停針憶逺人河橋知有路不解留郎住天上隔年期人間長别離二曉來誤入桃源洞恰見佳人春睡重玉腕枕香腮荷花藕上開一扇俄驚起斂黛凝秋水笑倩整金衣問郎來㡬時陳達叟舉頭忽見衡陽鴈千聲萬字情何限尀耐薄情夫一行書也無泣歸香閣恨和淚掩紅粉待鴈却回時也無書寄伊離思無名氏有情潮落西陵浦無情人向西陵去去也不教知怕人留戀伊憶了千千萬恨了千千萬畢竟憶時多恨時無奈何佳人黄師憲眉尖早識愁滋味嬌羞未解論心事試問憶人不無言只㸃頭嗔人歸不早故把金杯惱醉㸔舞時腰還如舊日嬌張孝祥東風約畧吹羅幕一簾細雨春隂薄試把杏花㸔濕紅嬌暮寒佳人雙玉枕烘醉鴛鴦錦折得最繁枝暖香生翠幃二恰則春來春又去慿誰説與春教住與問坐中人㡬回迎送春明年春更好只怕人先老春去有來時願春長見伊杜夀域遊絲欲堕還重上春殘日永人相望花共燕爭飛青梅細雨枝離愁終未解忘了依前在擬待不尋思剛纔夢見伊二錦機織了相思字天涯路逺無由寄寒鴈只啣蘆何曽解寄書緘封和血淚目斷西江水擬欲託雙魚問君情有無程正伯紅雲半壓秋波急艷粧泣露嬌啼色佳夢入仙城風流石曼卿宫袍呼醉醒休捲西風景明月粉香殘六橋烟水寒題梅扇周忘機梅花韻似人人靣為伊寫在春風扇人靣似花妍花應不解言在手微風動勾引相思夢莫用揷酴醿酴醿羞見伊盧炳石榴裙束纖腰裊金蓮穏襯弓靴小嬌騃羞見人傘低遮半身恩情如紙薄方信當初錯邂逅苦匆匆還疑是夢中二而今怕聽相思曲多情蹙損眉峯綠惜别上扁舟望窮江際樓蠻牋封了發為憶人如雪離恨寫教㸔休令盟約寒張子野五雲深處蓬山杳寒輕霧重銀蟾小枕上挹餘香春風歸路長鴈來書不到人靜重門悄一陣落花風雲山千萬重二青梅又是花時節粉墻閒把青梅折玉􅌱偶逄君春情如亂雲藕絲牽不斷誰信朱顔換莫厭十分斟酒深情更深秋思葉夢得平波不盡蒹葭逺清霜半落沙㾗淺烟樹晩微茫孤鴻下夕陽梅花消息近試向南枝問記得水邊春江南别後人立秋玉林西風半夜驚羅扇蛩聲入夢傳幽怨碧藕試初涼露㾗啼粉香清冰凝簟竹不許雙鴛宿又是五更鐘啼鴉金井桐過吳江張表臣垂紅亭下扁舟住松江烟雨長橋暮白紵聽呉歌佳人淚臉波勸傾金鑿落莫作思家惡綠鴨與鱸魚如何可寄書石孝女酒濃花艷秋波滑舞餘腰素花枝活相見又還休不禁歸去愁醉衾成獨擁月冷知霜重早是夢難成梅花腸斷聲陸務觀江天淡碧雲如掃蘋花零落蓴絲老細細晩波平月從波靣生漁家真箇好悔不歸來早經歲洛陽城鬢絲添幾莖仲春碧澗玉䦨干外重簾晩流雲欲度長天逺花草不知名春來各自生綠鞍遊冶客何處垂陽陌不信不歸來海棠花又開魏夫人溪山掩映斜陽裏樓臺影動鴛鴦起隔㟁兩三家出墻紅杏花綠楊堤下路早晩溪邊去三見栁綿飛離人猶未歸二東風已綠瀛洲草畫樓簾捲清霜曉清絶比湖梅花開未滿枝長天音信斷又見南歸鴈何處是離愁長安明月樓梅孫夫人䦨干六曲天圍碧松風亭下梅梢白臘盡見春回寒花驚又開曲瓊閒不捲沈燎孤星轉凝佇小徘徊雲間征鴈來李易安風柔日薄春猶早夾衫乍着心情好睡起覺微寒梅花鬢上殘故鄉何處是忘了除非醉沉水卧時燒香消酒未消二歸鴻聲斷殘雲碧背忩雪落爐烟直燭底鳳釵明釵頭人勝輕角聲催曉漏曙色回牛斗春意㸔花難西風留舊寒梅朱淑真濕雲不渡溪橋冷嫩寒初透東風景橋下水聲長一枝和雪香人憐花似舊花不知人痩獨自倚䦨干夜深花正寒秋秋聲乍起梧桐落蛩吟唧唧添蕭索欹枕背燈眠月和殘夢圓起來鈎翠箔何處寒砧作獨倚小䦨干逼人風露寒三山亭水榭秋方半􅃫幃寂寞無人伴愁悶一畨新雙蛾只暗顰起來臨綉户時有踈螢渡多謝月相憐今宵不忍圓與張世英蕭淑蘭無情水滿西興渡多情人徃西興去西興去路遥教奴魂夢勞今將心内苦聨作相思句君若見情詞同諧連理枝淑蘭又與世英詞云君心情逺迷蓬島妾心命薄連芳草芳草正萋萋君心知不知妾身輕似葉君意堅如鐵妾意為君多君心棄妾何書江西造口壁辛㓜安鬱孤臺下清江水中間多少行人淚西北望長安可憐無數山青山遮不住畢竟東流去江晩正愁余山深聞鷓鴣鶴林玉露云南渡初金人追隆祐太后御舟至造口不及而還鷓鴣之句謂恢復之事行不得也梅扶叔茂絲絲楊栁鶯聲近晩風吹過秋千影寒色一簾輕燈殘夢不成耳邊消息在笑指花稍待又是不歸來滿庭花自開諷詞昔年曾伴花前醉今年空灑花前淚花有再榮時人無重見期故人情義重不忍營新寵日月有盈虧妾心無改移古今詞話云蜀中有一寡婦姿色絶羙父母憐其年少欲議再嫁歸家有喜宴伶唱此詞婦聞之泣涕於神前欲割一耳以明志其母速徃止之抱持而痛遂不易其節子夜歌李後主人生愁恨何能免銷魂獨我情何限故國夢重歸覺來雙淚垂髙樓誰與上長記秋晴望徃事已成空還如一夢中又一闋云尋春須是陽春早㸔花莫待花枝老惜後不全廽文冬劉無言雪窻寒聽孤燈滅滅燈孤聽寒窗雪殘漏惜衾閑閑衾惜漏殘說時常恨别别恨常時說還不奈宵寒寒宵奈不還王文甫獸噴香縷飛長晝晝長飛縷香噴獸迎日喜葵傾傾葵喜日迎捲簾䨇舞燕燕舞䨇簾捲清簟枕釵横横釵枕簟清伊川令寄外花中𦙍妻西風昨夜穿簾幙閨院添消索最是梧桐零落迤邐秋光過却人情音信難託教奴獨自守空房淚珠與燈花共落仲𦙍為相州録事久而不歸其妻寄此詞𦙍拆覽之伊字作尹字遂作行香子寄囬云頓首起情人即日恭惟問好音接得綵箋詞一首堪驚題起詞名恨轉生展轉意多情寄與音書不志誠不冩伊川題尹字無心料想伊家不要人妻復答云奴啓情人勿見罪閑將小書作尹字情人不解其中意共伊間别幾多時身邊少箇人兒𦙍見之大笑稱賞時人咸榮之訴衷情晏殊青梅煮酒鬬時新天氣欲殘春東城南陌花下逢着意中人回綉袂展香茵叙情親此情􅂸作千尺游絲惹住朝雲二芙蓉金菊閗馨香天氣欲重陽遠村秋色如畵紅樹間踈黄流水淡碧天長路茫茫慿髙目斷鴻鴈來時無限思量三數枝金菊對芙蓉落葉意重重不知多少幽怨和露泣西風人散後月明中夜寒濃謝娘愁卧潘令閒眠心事無窮四露蓮雙臉逺山睂偏與淡妝冝小庭簾幕春晩閒共栁絲垂人别後月圓時信遲遲心心念念説盡無慿只是相思晏叔原小梅風韻最妖嬈開處雪初消南枝欲附春信長恨隴人遙閒記憶舊江臯路迢迢暗香浮動踈影横斜幾處溪橋二長因蕙草記羅裙緑腰沉水薫䦨干曲處人静曾共倚黄昏風有韻月無痕暗銷魂擬將幽恨試冩殘花寄與朝雲眉意歐陽永叔清晨簾幕巻輕霜呵手試梅粧都縁自有離恨故畵作逺山長思徃事惜流芳恨難忘未歌先歛欲笑還顰最斷人腸山谷作珠簾綉幕周美成堤前亭午未融霜風𦂳雁無行重尋舊日岐路茸㡌北遊裝期信杳别離長逺情傷風飜酒幔寒凝茶煙又是何鄉日暮柳耆卿一聲画角日西曛催促掩朱門不堪更倚危欄腸斷已銷魂年漸晩鴈空頻問無因思心欲碎愁淚難收又是黄昏唐子西平生不㑹斂眉頭諸事等閒休元來却到愁情須着與他愁殘照外大江流去悠悠風悲蘭麝烟淡滄浪何處歸舟宫怨謝希深銀缸夜永影長孤香草續殘爐倚屏脉脉無語粉淚不成珠雙粲枕百嬌壺憶當初君恩莫似秋葉無情欲向人踈雅詞碧天明月晃金波清淺帶銀河深深院宇人靜獨自問姮娥圓夜少缺時多事因何嫦娥莫是也有别離一似人麽沈㑹宗深深院宇小池塘一徑碧桐長青春又歸何處新笋緑成行多少事惱人腸懶思量香消一炷睡起霎時日過東窗黄山谷旋揎玊指着紅靴宛宛閗彎訛天然自有殊態供愁黛不須多分逺岫壓横波妙難過自欹枕處獨倚欄時不奈顰何曽純甫半鈎珠箔小揚州春色在重樓曾醉玳筵歌舞楚夢苦難留情脉脉恨悠悠幾時休大都人世㑹少離多總是閒愁二閒窗靜院漏聲長金鴨冷殘香幾翻夢回枕上飛絮恨悠揚身在此意伊行㬠思量不言不語幾許閒情月上回廊送春万俟雅言一鞭清曉喜還家宿醉困流霞夜來小雨新霽雙燕舞風斜山不盡水無涯望中賒送春滋味念逺情懐分付楊花章貢别懐嚴次山一聲水調解蘭舟人間無此愁無情江水東流去與我淚爭流人已逺更回頭苦凝眸斷䰟何處梅花岸曲小小紅樓夜景天機餘錦燒殘絳蠟淚成痕衙鼓報黄昏碧雲又阻歸信廊上月侵門愁夜永拂香裀待誰溫夢蘭憔悴擲果凄凉兩地消魂康伯可阿房廢址漢荒丘狐兎又羣逰豪華盡成春夣留下古今愁君莫上古原頭淚難收夕陽西下塞鴈南飛渭水東流枕畔聞殘梅噴香李易安夜來沉醉卸粧遲梅蕋揷殘枝酒醒薫破春睡夢斷不成歸人悄悄月依依翠簾垂更挼殘蕋再撚餘香更得些時毛文錫桃花流水漾縱横春晝彩霞明劉郎去阮郎行惆悵恨難平愁坐對雲屏􅄸歸程何時攜手洞邊迎訴衷情二鴛鴦交頸繡衣輕碧沼藕花馨隈藻荇映蘭汀和雨浴浮萍思婦對心驚想邊庭何時解珮掩雲屏訴衷情魏承班髙歌宴罷月初盈詩情引恨情煙露冷水流輕思想夢難成羅帳褭香平恨頻生思君無計睡還醒隔層城二春深花簇小樓臺風飄錦繡開新睡覺歩香堦山枕映紅腮鬢亂墜金釵語檀偎臨行執手重重囑幾千廻三銀漢雲晴玊漏長蛩聲悄畵堂筠簟冷碧窗凉紅䗶淚飄香皓月瀉寒光割人腸那堪獨自歩池塘對鴛鴦四金風輕透碧窗紗銀缸熖影斜欹枕卧恨何賒山掩小屏霞雲雨别吳娃想容華夣成幾度遶天涯到君家五春情滿眼臉紅銷嬌妬索人饒星靨小玊璫揺幾共醉春朝别後憶纎腰夣魂勞如今風葉又蕭蕭恨迢迢花草稡編巻五

body:
  text: 花草稡編巻三明陳耀文輯小令中興樂毛文錫荳蔻花繁烟艷深丁香軟結同心翠鬟女相與共淘金紅蕉葉裏猩猩語鴛鴦浦鏡中鸞舞絲雨隔荔枝隂牛希濟池塘暖碧浸晴暉濛濛栁絮輕飛紅蘂凋來醉夢還稀春雲空有鴈歸珠簾垂東風寂寞恨郎抛擲淚濕羅衣酒泉子温庭筠羅帶惹香猶繫别時紅豆淚痕新金縷舊㫁離腸一雙嬌燕語雕梁還是去年時節緑隂濃芳草歇栁花狂韋莊月落星沉樓上美人春睡緑雲傾金枕膩畫屏深子規啼破相思夢曙色東方纔動栁煙輕花露重思難任顧瓊楊栁舞風輕惹春煙殘雨杏花愁鶯正語畫樓東錦屏寂寞思無窮還是不知消息鏡塵生珠淚滴損儀容馮延巳楚女不歸樓枕小河春水月孤明風又起杏花稀玉釵斜挿髻雲垂裙上縷金雙鳯一行書千里夢鴈南飛温庭筠花映栁條閒向緑萍池上凭欄干窺細浪雨瀟瀟近來音信兩疎索洞房空寂寞掩銀屏垂翠箔度春宵顧敻羅帶縷金蘭麝煙凝魂㫁畫屏欹雲鬂亂恨難任幾迴垂淚滴鴛衾薄情何處去月臨窓花滿樹信沉沉馮延巳庭下花飛月照粧樓春事晩珠簾風蘭燭燼怨空閨迢迢何處寄相思玉筯零零腸㫁屏幃深更漏永夢魂迷二芳草長川栁映危橋橋下路歸鴻飛行人去碧山邊風微烟淡雨蕭然隔岸馬嘶何處九迴腸雙臉淚夕陽天三春色融融飛燕乍來鶯未語小桃寒垂栁晩玉樓空天長烟逺恨重重消息燕鴻歸去枕前燈窓外月閉朱籠四深院空幃廊下風簾驚宿燕香印灰蘭燭灺覺來時月明人自𢷬寒衣剛愛無端惆悵堦前行䦨畔立欲鷄啼顧敻黛薄紅深約掠緑鬟雲膩小鴛鴦金翡翠稱人心錦鱗無處傳幽意海燕蘭堂春又去隔年書千㸃淚恨難任李詢秋月嬋娟皎潔碧紗窓外照花穿竹冷沉沉印池心凝露滴砌蛩吟驚覺謝娘殘夢夜深斜傍枕前來影徘徊張泌春雨打窓驚夢覺來天氣曉畫堂深紅熖小背蘭缸酒香噴鼻懶開缸惆悵更無人共醉舊巢中新燕子語雙雙李詢雨漬花零紅散香凋池兩岸别情遥春歌㫁掩銀屏孤㠶早晩離三楚閒理鈿筝愁幾許曲中情絃上語不堪聽顧敻黛怨紅羞掩映畫堂春欲暮殘花微雨隔青樓思悠悠芳菲時節看將度寂寞無人還獨語畫羅濡香粉汚不勝愁毛文錫緑樹春深燕語鶯啼聲㫁續蕙風飄蕩入芳叢惹殘紅栁絲無力褭烟空金盞不辭須滿酌海棠花下思朦朧醉香風晏同叔春色初來遍折紅芳千萬樹流鶯粉蝶鬭翻飛戀香枝勸君莫惜縷金衣把酒看花須强飲明朝後日漸離披惜芳時沙塞子朱希真萬里漂零南越山引泪酒催愁不見鳯樓龍闕又經秋九日江亭閒望蠻樹瘴煙浮腸㫁紅蕉花晩水西流二前調太悲再作蠻逕尋春春早千㸃雪已飛梅席地挿花傳酒日西催莫作楚囚相泣傾銀漢洗瑶池還盡人間桃李拂衣歸落梅風宫烟如水濕芳晨梅似雪相親數枝春惹香塵夀陽嬌面偏憐惜粧成一面花新鏡中重把玉纎勻酒初醺醉垂鞭錢塘送祖擇之張子野酒面灔金魚吳娃唱吳潮上玉殿白麻書待君歸後除勾留風月好平湖曉翠峯孤此景出闗無西州空畫圖二雙蝶繡羅裙東池宴初相見朱粉不深匀閒花淡淡春細看諸處好人人道栁腰身昨日亂山昏來時衣上雲雪花飛黃魯直攜手青雲路穩天聲迤邐傳呼袍笏恩章乍賜春滿皇都何處難忘酒瓊花照玉壺歸嫋絲梢競醉雪舞郊衢春光好碧鷄漫志云近世或易名愁倚欄和凝紗窓煖畫屏閒軃雲鬟睡起四肢無力半春間玉指剪裁羅勝金盤㸃綴酥山窺宋深心無限事小眉彎二蘋葉軟杏花明畫船輕雙浴鴛鴦出緑汀棹歌聲春水無風無浪春天半雨半晴紅粉相隨南浦晩幾含情曽純甫心下事不思量自難忘花底夢迴春漠漠恨偏長閒日多少韶光雕䦨静芳草池塘風急落紅留不住又斜陽愁倚欄氷肌玉骨精神不風塵昨夜窓前都折盡忽疑君清淚拂拂沾巾誰相念折贈芳春羌管休吹别塞曲有人聽三榮道上程正伯山無數雨蕭蕭路迢迢不似芙蓉城下去栁如腰夢隨春絮飄飄知他在第幾朱橋説與杜鵑休喚覺怕魂銷二春猶淺栁初芽杏初花楊栁杏花交影處有人家玉窓明暖烘霞小屏上水遶山斜昨夜酒多春睡重莫驚他倚䦨令蒲江惜春心步花隂怕春深風颺㳺絲吹落絮滿園林日長簾幙沉沉朱闌畔斜軃瓊簮笑折棃花閒照水貼眉心浣溪沙張曙枕障薫爐隔綉幃二年終日兩相思好風明月始應知天上人間何處去舊歡新夢覺來時黄昏微雨畫簾垂北夢𤨏言云張禕侍郎喪愛妾悼念不已其猶子曙作此詞禕見之痛曰必阿灰所作韓偓香奩集攏鬢新收玉步揺背燈初解繡裙腰枕寒衾煖異香焦深院不闗春寂寂落花和雨夜迢迢恨情殘醉却無寥二宿醉離愁慢髻鬟六銖衣薄惹輕寒慵紅悶翠掩青鸞羅襪况兼金菡蓞雪肌仍是玉琅玕骨香腰細更沉檀韋莊夜夜相思更漏殘傷心明月凭欄干想君思我錦衾寒咫尺畫堂深似海憶來唯把舊書看幾時攜手入長安張泌馬上凝情憶舊遊照花淹竹小溪流鈿筝羅幕玉搔頭早是出門長帶月可堪分袂又經秋晩風斜日不勝愁二獨立寒堦望月華露濃香泛小庭花繡屏愁背一燈斜雲雨自從分散後人間無路到仙家但憑魂夢訪天涯歐陽烱天碧羅衣拂地垂美人初著更相宜好風如舞透香肌獨坐含嚬吹鳯竹園中緩步折花枝有情無力泥人時二相見休言有淚珠酒䦨重得叙歡娛鳯屏鴛枕宿金鋪蘭麝細香聞喘息綺羅纎縷見肌膚此時還恨薄情無顧敻紅藕香寒翠渚平月籠虛閣夜蛩清塞鴻驚夢兩牽情寶帳玉爐殘麝冷羅衣金縷暗塵生小窓孤燭淚縱横二惆悵經年别謝娘月窓花院好風光此時相望最情傷青鳥不來傳錦字瑶姬何處鎻蘭房忍教魂夢兩茫茫三庭菊飄黄玉露濃冷莎隈砌隠鳴蛩何期良夜得相逢背帳風揺紅爉滴惹香暖夢繡衾重覺來枕上怯晨鐘四鴈響遥天玉漏清小紗窓外月朧明翠幃金鴨炷香平何處不歸音信㫁良宵空使夢魂驚簟凉枕冷不勝情五露白蟾明又到秋佳期幽㑹兩悠悠夢牽情役幾時休記得那人微斂黛無言斜倚小書樓暗思前事不勝愁孫光憲覽鏡無言淚欲流凝情半日懶梳頭一庭疎雨濕春愁楊栁秪知傷怨别杏花應信損嬌羞淚沾魂㫁軫離憂二蘭沐初休曲檻前暖風遲日洗頭天濕雲新斂未梳蟬翠袂半將遮粉臆寶釵長欲墜香肩此時模様不禁憐三輕打銀筝墜燕泥㫁絲髙罥畫樓西花冠閒上午牆啼粉籜半開新竹逕紅苞盡落舊桃蹊不堪終日閉深閨閻選寂寞流蘇冷繡茵倚屏山枕惹香塵小庭花露泣濃春劉阮信非仙洞客嫦娥終是月中人此生無路訪東鄰毛熙震花榭香紅煙景迷滿庭芳草緑萋萋金鋪閒掩繡簾低紫燕一雙嬌語碎翠屏十二晩峰齊夢魂銷散醉空閨薛昭藴握手河橋栁似金蜂鬚輕惹百花心蕙風蘭思寄清琴意滿便同春水滿情深還似酒盃深楚烟湘月兩沉沉二傾國傾城恨有餘幾多紅淚泣姑蘇倚風凝睇雪肌膚吳主山河空落日越王宫殿半平蕪藕花菱蔓滿重湖李珣訪舊傷離欲㫁魂無因重見玉樓人六街微雨鏤香塵早為不逢巫峽夜那堪虛度錦江春遇花傾酒莫辭頻二紅藕花香到檻頻可堪閒憶似花人舊歡如夢絶音塵翠疊畫屏山隠隠冷鋪紋簟水潾潾㫁魂何處一蟬新南唐李主紅日已髙三丈透金鑪次第添香獸紅錦地衣隨步皺佳人舞㸃金釵溜酒惡時拈花蕋嗅别殿遥聞簫皷奏馮延巳轉燭飄蓬一夢歸欲尋陳迹悵人非天教心願與身違待月池臺空逝水䕃花樓閣謾斜暉登臨不惜更沾衣春恨李景風壓輕雲貼水飛乍晴池館燕争泥沈郎多病不勝衣沙上未聞鴻鴈信竹間時有鷓鴣啼此情惟有落花知晏同叔閬苑瑶䑓風露秋整鬟凝思捧觥籌欲歸臨别强遲留月好謾成孤枕夢酒䦨空得兩眉愁此時情緒悔風流二青杏園林煮酒香佳人初著薄羅裳栁絲無力燕飛忙乍雨乍晴花自落閒愁閒悶日偏長為誰消痩减容光三一曲新詞酒一盃去年天氣舊亭䑓夕陽西下幾時迴無可奈何花落去似曽相識燕歸來小園香徑獨徘徊四一向年光有限身等閒離别易銷魂酒筵歌席莫辭頻滿目山河空念逺落花風雨更傷春不如憐取眼前人晏叔原緑栁藏烏静掩闗鴨爐香細𤨏窓閒那回分袂月初殘惜别謾成良夜醉解愁時有翠牋還欲尋雙葉寄情難二午醉西橋夕未醒雨花凄㫁不堪聽歸時應减鬢邊青衣化客塵今古道栁含春意短長亭鳯樓争見路傍情歐陽永叔堤上遊人逐畫船泊堤春水四垂天緑楊樓外出鞦韆白髪戴花君莫笑六么催拍盞頻傳人生何處似樽前二湖上朱橋響畫輪溶溶春水浸春雲碧瑠璃滑浄無塵當路遊絲縈醉客隔花啼鳥喚行人日斜歸去奈何春三葉底青青杏子垂枝頭薄薄栁綿飛日髙深院晩鶯啼堪恨風流成薄倖㫁無消息道歸期托腮無語翠眉低四十載相逢酒一巵故人纔見便開眉老來遊舊更同誰浮世歌歡真易失宦途離合信難期樽前莫惜醉如泥五樓上燈深欲閉門夢雲散處不留痕幾年芳草憶王孫白日䦨干依舊緑試將前事倚黄昏記曽來處易銷魂集句王介甫百畆庭中半是苔門前古道水縈迴愛閒能有幾人來小院回廊人寂寂山桃野杏兩三栽為誰零落為誰開蘇子瞻玉腕氷寒滴露華粉融香雪透輕紗晩來粧面勝荷花鬢嚲欲迎眉際月酒紅初上臉邊霞一場春夢日西斜橘菊暗荷枯一夜霜輕苞緑葉占林光竹籬茅舍出青黄香露噴人驚半破清泉流齒怯初嘗吳姬三百手猶香方響花滿銀塘水漫流犀槌玉板奏凉州順風環珮過秦樓逺漢碧雲輕漠漠今宵人在鵲橋頭一聲敲徹絳河秋秦少逰漠漠輕寒上小樓曉隂無賴似窮秋澹烟流水畫屏幽自在飛花輕似夢無邊絲雨細如愁寶簾閒挂小銀鈎二香靨凝羞一笑開栁腰如醉暖相挨日長春困下樓臺照水有情聊整鬢倚䦨無緒更兠鞋眼邊牽恨懶歸來三脚上鞋兒四寸羅脣邊朱麝一櫻多見人無語但回波料得有心憐宋玉只應無奈楚襄何今生有分共伊麽四錦帳重重巻暮霞屏風曲曲鬭紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜滿庭芳草襯殘花黄魯直飛鵲臺前暈翠蛾千金新買帶青螺最難如意為情多幾處淚痕留醉袖一春愁思近横波逺山低盡不成歌張子野樓倚春江百尺髙烟中還未見歸橈幾時期信似江潮花片片飛風弄蝶栁隂隂下水平橋日長才過又今宵二輕屜來時不破塵石榴花映石榴裙有情應解憶青春夜短更難留逺夢日髙何計學行雲樹深鶯過静無人謝無逸樓閣簾垂乳燕飛圓荷細細㸃清漪薫風破夢晩凉時玉軫琴邊蘭思逺霜紈扇裏翠眉低揉藍衫子閙蜂兒周美成日射欹紅蠟蔕香風乾微汗粉襟凉碧紗對掩簟紋光自剪栁枝明畫閣戱抛蓮菂種橫塘長亭無事好思量二翠葆參差竹徑成新荷跳雨淚珠傾曲欄斜轉小池亭風約簾衣歸燕急水揺扇影戱魚驚栁梢殘日弄微晴三薄薄紗厨望似空簟紋如水浸芙蓉醒來嬌眼尚矇矓强整羅衣擡皓腕更將紈扇掩酥胷羞郎何事面微紅四寶扇輕圓淺畫繒象床平穏細穿藤飛蠅不到避壺氷翠枕面凉頻憶睡玉簫手汗錯成聲日長無力要人凭五雨過殘紅濕未飛珠簾一帶透斜暉逰蜂釀蜜竊香歸金屋無人風竹亂夜篝盡日水沉㣲一春須有憶人時六樓上晴天碧四垂樓前芳草接天涯勸君莫上最髙梯新笋已成堂下竹落花都入燕巢泥忍聽林表杜鵑啼春景水漲魚天拍栁橋雲鳩拖雨過江皋一畨春信入東郊閒碾鳯團消短夢静看燕子疊新巢又移日影上花梢石孝友宿醉離愁慢髻鬟韓偓緑殘紅豆憶前懽叔原錦江春水寄書難叔原紅袖時籠金鴨煖少㳺小樓吹徹玉笙寒李璟為誰和淚倚䦨干中行趙徳麟風急花飛晝掩門一簷殘雨滴黄昏便無離恨也銷魂翠被任薫終不暖玉盃慵舉幾畨温箇般情事與誰論劉平叔出家妓八人絶藝脚絶琴絶歌絶舞絶穏小弓鞋三寸羅歌唇清韻一櫻多燈前秀艶揔横波指下鳴泉清杳𣺌掌中回旋小婆娑明朝歸路奈情何三一朶夢雲驚曉鴉數枝春雨帶梨花坐來殘月冷窓紗釵鳯謾曽留得半枕山猶是枕時斜對花今日奈天涯四槐栁春餘渌漲天酒旗髙挿夕陽邊誰家牆裏笑鞦韆徃事不堪樓上看新愁多向曲中傳此情銷得是何年五水滿池塘花滿枝亂香深裏語黄鸝東風輕軟㺯簾幃日正長時春夢短燕交飛處栁烟低玉牎紅子鬭棊時六少日懐山老住山一官休務得身閒幾年食息白雲間似我樂來真是少見人忙處不相闗養真髙静出塵寰賀方回秋水斜陽逺漾金平山隠隠隔横林幾家村落幾聲砧記得西樓凝醉眼昔年風物似如今只無人與共登臨二煙栁春梢蘸暈黄井欄風綽小桃香覺時簾幕又斜陽望處定無千里眼㫁來能有幾回腸少年禁取恁凄凉三鸚鵡無言理翠衿杏花零落晝隂隂畫橋流水半篙深芳徑與誰期鬭草繡床終日罷拈針小箋香管冩春心四鼓動城頭啼瞑鵶過雲時送雨些些嫩凉如水逗窓紗弄影西廂侵戸月分香東畔拂牆花此時相望抵天涯五雲母窓前歇繡針低鬟凝思坐調琴玉纎纎按十三金歸卧文園猶帶酒栁花飛度畫堂隂只憑雙燕話春心六蓮燭啼痕怨漏長吟蛩隨月到囘廊一屏烟景畫瀟湘連夜㫁無行雨夢隔年猶有着人香此情須信是難忘七閒把琵琶舊譜尋四絃聲怨却沉吟燕飛人静畫堂深欹枕有時成雨夢隔簾無處説春心一從燈夜到如今八宫錦袍薫氷麝香越紗裙染鬱金黄薄羅依約見明粧繡陌不逢攜手伴緑窓誰是畫眉郎春風十里㫁人腸九兩㸃春山一寸波當筵嬌甚不成歌動人情態可須多金井露寒風下葉畫樓雲㫁月侵河厭厭此夜奈愁何十樓角初銷一縷霞澹黄楊栁帶栖鴉玉人和月摘梅花笑撚粉香歸洞戸更垂羅幙䕶窓紗東風寒似夜來些和葆光春晩飲㑹舒信道金縷歌殘紅燭稀梁州舞罷小鬟垂酒醒還是獨歸時畫棟日髙來語燕綺窓風暖度游絲幾多緑葉上青枝重陽前一日登極目亭葉少藴小雨初迴昨夜凉繞籬新菊已催黄碧空無際巻蒼茫千里㫁鴻供逺目十年芳草掛愁腸緩歌聊與送瑶觴書虞元翁畫蘇養直水榭風微玉枕凉牙床角簟藕花香野塘煙雨罩鴛鴦紅蓼渡頭青嶂逺緑蘋波上白鷗雙淋浪淡墨水雲鄉吕居仁暖日温風破淺寒短青無數簇幽欄三年春在病中看中酒心情渾似夢採花時候不曽閒幾年芳信隔秦闗歳除集二老句向伯恭爆竹聲中一嵗除東風送暖入屠蘇荆公曈曈曉色上林廬老去怕看新厯日退歸擬學舊桃符東坡青春不染白髭鬚朱希真白玉欄干白玉人倚花吹葉忍黄昏蕭郎一去又經春眉淡翠峰愁易聚臉殘紅雨淚難匀纎腰减半緑羅裙二雨濕清明香火殘碧溪橋外燕泥寒日長獨自倚䦨干脱籜修篁初散緑褪花新杏未成酸江南春好與誰看三才子佳人相見難舞收歌罷又更䦨宻將春恨繫幽歡結子同心香佩帶帕兒雙字玉連環酒醒燈暗忍重看泛舟毛澤民銀字笙簫小小童梁州吹過栁橋風阿誰勸我玉盃空小醉徑須眠錦瑟夜歸不用簇紗籠畫舩簾捲月明中趙元鎮艶艶春嬌入眼波勸人金盞緩聲歌不禁粉淚揾香羅暮雨朝雲相見少落花流水别離多寸腸争奈此情何陳克子髙罨畫溪頭春水生銅官山外夕陽明煖風無力小舟横萬事悠悠生處熟三杯兀兀醉時醒杏花楊栁更多情二短燭熒熒照碧窓重重簾幙䕶梨霜幽歡不怕夜偏長羅襪鈿釵紅粉醉曲屏深幔緑橙香征鴻雖逺㫁人腸三牎紙幽幽不肯明寒更忍作㫁腸聲背人殘燭却多情合下心期唯有夢如今魂夢也無憑幾行閒淚莫縱横趙子發疎䕃揺揺趂岸移驚鷗㸃㸃過㠶飛舡分水打嫩沙回㫁夢不知人去處巻簾還有燕來時日斜風𦂳轉灣西曹元龍栁絮池臺淡淡風碧波花嶼小橋通雲連麗宇倚晴空芳草緑楊人去住短牆幽徑燕西東攀條弄蕋得從容吳大年白玉樓中白雪歌更將白紵襯春羅軟紅香裏最么麽桃葉桃根隨處有江南江北見來多風前月底奈愁何二璧月光中玉漏清小梅疎影水邊明似梅人醉月西傾梅欲黄時朝暮雨月重圓處短長亭舊愁新恨若為情趙徳莊花下憑肩月下迎避人私語臉霞生畫堂紅燭意盈盈病酒一春愁與睡倚䦨終日雨還晴强移心緒作清明餘干傳舎吳儆畫楯朱欄繞碧山平湖倚徙水雲寛人家楊栁帶汀灣目力已隨飛鳥盡機心還逐白鷗閒瀟瀟微雨晚來寒上已軟翠冠兒簇海棠砑羅衫子繡丁香閒來水上踏青陽風暖有人能作伴日長無事可思量水流花落任匆忙張安國已是人間不繫舟此心元是不驚鷗卧看駭浪與天浮對月只應頻舉酒臨風何必更搔頭暝煙多處是神州二冉冉幽香解鈿囊蘭橈烟雨暗春江十分清痩為蕭郎遥憶牙檣收楚䌫應將玉筯㸃吳粧有人縈㫁九回腸坐中十八客同是􅌡洲丹府仙只今聊結社中蓮鳴笳按拍酒如川喚起封姨清晩景更將荔子冩新圓從今三夜看嬋姢相山詞一種秋風兩處凉雨聲初歇漏聲長池塘零落藕花香歸夢等閒歸燕去㫁腸分付㫁雲行畫屏今夜更思量陸放翁嬾向沙頭醉玉瓶喚君同賞小窓明夕陽吹角最闗情忙日苦多閒日少新愁常續舊愁生客中無伴怕君行漁父徐師川西塞山前白鷺飛桃花流水鱖魚肥一波纔動萬波隨黄帽豈如青篛笠羊裘何似緑蓑衣斜風細雨不須歸二新婦磯邊秋月明女兒浦口晩潮平沙頭鷺宿戯魚驚青蒻笠前明此事緑蓑衣底慶平生斜風細雨小舟輕張志和漁父詞云西塞山前白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣斜風細雨不須歸顧况漁父詞云新婦磯邊月明女兒浦口潮平沙頭鷺宿魚驚東坡云元真語極清麗恨其曲度不傳加數語以浣溪沙歌之云西塞山前白鷺飛散花洲外片㠶㣲桃花流水鱖魚肥自芘一身青篛笠相隨到處緑蓑衣斜風細雨不須歸山谷見之擊節稱賞且云惜乎散花與桃花字重疊又漁舟少有使㠶者乃取張顧二詞合為浣溪沙云新婦磯邊眉黛愁女兒浦口眼波秋驚魚錯認月沉鈎青篛笠前無限事緑蓑衣底一時休斜風細雨轉船頭東坡跋云魯直此詞清新婉麗問其最得意處以山光水色替却玉肌花貌真得漁父家風也然纔出新婦磯便入女兒浦此漁父無乃太瀾浪乎東湖老人因坡谷互有異同之論故作此詞二闋云朱雍殘日憑欄目㫁霞寒林人静毎歸鴉小梅春早壓羣花一檻風聲清玉管數枝月影到窓紗隔簾時度暗香些春情劉致君繡館人人倦踏青粉垣深處簸錢聲賣花門外緑隂輕簾幙風柔飛燕燕池塘花煖語鶯鶯有誰知道一春情蔡州𤓰陂舖壁間詞能改齋謾録剪碎香羅裛淚痕鷓鴣聲㫁不堪聞馬嘶人去近黄昏整整斜斜楊栁陌踈疎宻宻杏花村一畨風月更消魂武進㕔壁楊彦齡筆録倦客東歸得自由西風江上泛扁舟夜寒霜月素光流想得故人千里外醉吟應上謝家樓不多天氣近中秋二北固江頭浪拍空歸㠶一夜趂秋風月明初上荻花叢漸入三吳烟景好此身將過浙江東夢魂先在鑑湖中别恨鄭中卿酒薄愁濃醉不成夜深欹枕數殘更嫩寒時節過燒燈已自孤鸞羞對鏡未能雙鳯怕聞笙莫教吹作别離聲延安李氏無力薔薇帶雨低多情蝴蝶趂花飛流水飄香乳燕啼南浦魂消春不管東陽衣减鏡先知小樓今夜月依依李易安小院閒窓春色深重簾未捲影沉沉倚樓無語理瑶琴逺岫出山催薄暮細風吹雨弄輕隂梨花欲謝恐難禁二淡蕩春光寒食天玉罏沉水裊殘烟夢迴山枕隠花鈿海鷰未來人鬭草江梅已過栁生綿黄昏疎雨濕鞦韆閨情髻子傷春慵更梳晩風庭院落梅初淡雲來徃月疎疎玉鴨薫爐閒瑞腦朱櫻斗帳掩流蘓遺犀還解辟寒無朱淑真露井夭桃吐絳英春衣初試薄羅輕風和烟煖燕巢成滿院深簾閒不捲曲房朱户悶長扄惱人光景又清明春怨卸下金釵一様嬌背燈初解繡裙腰衾寒枕冷夜香消深院不闗春寂寂落花和雨夜迢迢恨情和夢更無聊慕容嵓卿妻滿目江山憶舊遊汀花汀草弄春柔長亭艤住朩蘭舟好夢易隨流水去芳心猶逐曉雲愁行人莫上望京樓竹坡詩話云頃年平江府雍熙寺毎深夜月明有婦人歌小詞於廊廡間者就之不見客有聞而録之者姑蘇士子慕容嵓卿見而驚曰君何從得此詞客語之故嵓卿悲歎乆之曰此余亡妻之詞無知之者明日視之乃其妻旅襯所在珍娘鬼也溪霧溪烟溪景新溶溶春水净無塵碧琉璃底浸春雲風颺㳺絲垂蝶翅雨飄飛絮濕鶯唇桃花片片送殘春紗窓恨毛文錫雙雙蝶翅塗鈆粉咂花心綺窓繡户飛來穏畫堂隂二三月愛隨飄絮伴落花來拂衣襟更剪輕羅片傅黄金二新春燕子還來至一雙飛壘巢泥濕時時墜涴人衣後園裏看百花發香風拂繡户金扉月照紗忩裏恨依依戀情深毛文錫滴滴銅壺寒漏咽醉紅樓月宴餘香殿㑹鴛衾蕩春心真珠簾下曉光侵鶯語隔瓊林寶帳欲開慵起戀情深宮詞玉殿春濃花爛漫簇神仙伴羅裙窣地縷黄金奏清音酒䦨歌罷兩沉沉一笑動君心永願作鴛鴦伴戀情深清商怨晏叔原庭花香信尚淺最玉樓先暖夢覺春衾江南依舊逺回紋錦字暗剪謾寄與也應歸晩要問相思天涯猶自短周美成枝頭風勢漸小看暮鴉飛了又是黄昏閉門收返照江南人去路緲信未通愁已先到怕見孤燈霜寒催睡早歐陽永叔闗河愁思望處滿漸素秋向晩鴈過南雲行人回淚眼雙鸞衾裯悔展夜又水枕孤人逺夢未成歸梅花聞塞管江淹詩心逐南雲去身隨北雁來陸機思親賦指南雲以寄欽陸雲九愍眷南雲以興悲沈文伯天機餘錦城上鴉啼斗轉漸漸玉壺氷滿月淡寒梅清香來小院誰遣鸞牋冩怨翻錦字疊疊和愁巻夢破悲笳江南烟樹逺贊浦子毛文錫錦帳添香睡金爐換夕薫懶結芙蓉帶慵拖翡翠裙正是桃夭栁媚那堪暮雨朝雲宋玉髙唐意裁瓊欲贈君傷春怨荆公能改齋漫録雨打江南樹一夜花開無數緑葉漸成隂下有遊人歸路與君相逢處不道春將暮把酒祝東風且莫匆匆去平湖樂緑荷相背倚西風凉露烟霏重翠盖銀瓶醉時捧使君公徑須傾倒玻瓈瓮青山城郭暮雲樓閣髙下一重重二安仁雙鬢已驚秋更甚眉頭皺一笑相逢且開口玉為舟新詞淡似鵝黄酒醉歸扶路竹西歌吹人道似揚州三採菱人語隔秋煙波静如横練入手風光莫流轉共留連畫船一笑春風面江山信美終非吾土問何日是歸年四秋風湖上水増波朩底雲隂過憔悴湘纍莫輕和且髙歌凌波幽夢誰驚破佳人望㫁碧雲暮合道别後意如何小桃紅張小山一汀煙栁索春饒添得楊花閙盼殺歸舟朩蘭棹水迢迢畫樓明月空相照今畨痩了多情知道寛褪翠裙腰歸國遥温飛卿雙臉小鳯戰箆金颭艶舞衣無力風歛藕絲秋色染錦帳繡幃斜掩露珠清曉簟粉心黄蘂花靨黛眉山兩㸃韋莊春欲暮滿地落花紅帶雨惆悵玉籠鸚鵡單棲無伴侣南望去程何許問花花不語早晩得同歸去恨無雙翠羽二金翡翠為我南飛傳我意罨畫橋邊春水幾年花下醉别後只知相愧淚珠難逺寄羅幕繡幃鴛被舊歡如夢裏馮延巳花間作温雕香玉翠鳯寶釵垂􅀢􅝹鈿筐交勝金粟越羅香水渌畫堂照簾殘燭夢餘更漏促謝娘無限心曲曉屏山㫁續三字令歐陽烱春欲暮日遲遲牡丹時羅幌巻翠簾垂兩心知人不在燕空歸負佳期香燼落枕函欹月分明花澹薄惹相思向伯恭春盡日雨餘時紅蔌蔌緑漪漪花滿地水平池烟光裏雲衫上畫船移文鴛並白鷗飛歌韻響酒行遲將我意入新詩春欲去留且住莫教歸花草稡編巻三

才醒歷歷黃鸝枕上聽此情難遣不比紅蕉心易展要識離愁只似楊花不自由張安國愛而不見立馬章臺空便面想像娉婷只恐丹青畫不成詩人老去恰要鶯鶯相伴住試與平章嵗晚教人枉斷腸李端叔亂魂無據黯黯只尋來處路燈盡花殘不覺長更又向䦨幾回枕上那件不曽留夢想變盡星星一滴秋霖是一莖闕春融酒困一寸橫波千里恨著處芳菲蝶興鶯情醉自迷欹雲妥翠冷落金屏山十二低抱琵琶月向黃昏日又斜雅詞誰知瑩徹惟有碧天雲外月一見風流洗盡胸中萬斛愁賸燒密炬只恐夜深花睡去想得橫陳全是巫山一段雲吕居仁去年今夜同醉月明花樹下此夜江邉月暗長堤栁暗船故人何處帶我離愁江外去來嵗花前又似今年憶去年魏夫人西樓明月掩映梨花千樹雪樓上人歸愁聽孤城一鴈飛玉人何處又見江南春色暮芳信難尋去後桃花流水深二落花飛絮杳杳天涯人甚處欲寄相思春盡衡陽鴈漸稀離腸淚眼腸斷淚痕流不斷明月西樓一曲欄干一倍愁李易安賣花擔上買得一枝春欲放淚染輕勻猶帶彤霞曉露痕怕郎猜道奴面不如花面好雲鬢斜簮徒要教郎比並看雄州驛李令女朝雲橫度轆轆車聲如水去白草黃沙月照孤村三兩家天天去也萬結愁腸無晝夜漸近燕山回首鄉關歸路難梅澗詩話云靖康間金人犯闕陽武蔣令興祖死之其女為所虜去題字於雄州驛中叙其本末仍作此詞蔣令浙西人其女方笄美顔色能詩詞鄉人皆能道之此湯巖起詩海遺珠所載春朱淑真獨行獨坐獨唱獨酬還獨卧竚立傷神無奈春寒著摸人此情難見淚洗殘粧無一半愁病相仍剔盡孤燈夢不成李季蘭自從君去曉夜縈牽腸斷處緑遍香階過夏經秋鴈又來想伊那里應也情懷愁不止眇眇書沉直至如今沒信音蘇小小别離情緒萬里關山如底數遣妾傷悲未必郎家知不知自從君去數盡殘冬春又暮音信全乖等到花開不見來洪惠英夷堅支志梅花似雪剛被雪來相挫折雪裏梅花無限精神總屬他梅花無語只有東風來作主傳語東君且與梅花作主人洪邁守㑹稽惠英於席間歌其自製述懷小曲梅者自喻雪指無賴惡少也馬裕齊多情多愛還了平生花栁債好箇檀郎室女為妻也不妨傑才髙作聊贈青蚨三百索燭影搖紅記取媒人是馬公三朝野史云馬光祖尹京日有士踰牆偷人室女事覺到官光祖出踰牆樓處子詩面試士人秉筆云花栁平生債風流一段愁開牆乘興下處子有心摟謝砌應潜越韓香許暗偷有情還愛欲無語强嬌羞不負秦樓約安知漢獄囚玉顔麗如此何用讀書求光祖判此詞云夷堅支志丙四家門希差養得一枚依樣畫百事無能只去籬邉纒倒藤幾回水上軋捺不翻真箇强無處容他只好炎天照作巴宗室公衡居秀州性和易善與人欵曲但天資滑稽遇可啓顔一笑衝口輒發見之者無不敬畏因寡髮俗目之為趙葫蘆好事者作此詞詠之蓋以謔受報也採桑子一名羅敷令醜奴兒令和凝蝤蠐領上訶梨子繡帶雙垂椒户閒時竟學樗蒲賭荔枝叢頭鞋子紅編細裙窣金絲無事嚬眉春思翻教阿母疑春怨李後主轆轤金井梧桐晚幾樹驚秋晝雨新愁百尺蝦鬚上玉鈎瓊窗春斷雙娥皺回首邉頭欲寄鱗遊九曲寒波不泝流春思前人亭前春逐紅英盡舞態徘徊細雨霏微不放雙眉時暫開緑窗冷靜芳音斷香印成灰可賴情懷欲睡朦朧入夢來馮延巳小庭雨過春將盡片片花飛獨折殘枝無語憑䦨祇自知玉堂香暖珠簾捲雙燕來歸君約佳期肯信韶華得幾時二馬嘶人語春風岸芳草綿綿楊栁橋邉落日髙樓酒斾懸舊愁新恨知多少目斷遙天獨立花前更聽笙歌滿畫船三西風半夜簾櫳冷逺夢初歸夢過金扉花謝窗前夜合枝昭陽殿裏新翻曲未有人知偷取笙吹驚覺寒蛩到曉啼四酒䦨睡覺天香暖繡户慵開香印成灰獨背寒屏理舊眉朦朧却向燈前卧窗月徘徊曉夢初回一夜東風綻早梅五小堂深靜無人到滿院春風惆悵牆東一樹櫻桃帶雨紅愁心似醉兼如病欲語還慵日暮疏鐘雙燕歸棲畫閣中六畫堂燈暖簾櫳卷禁漏丁丁雨罷寒生一夜西窗夢不成玉娥重起添香印回倚孤屏不語含情水調何人吹笛聲七笙歌放散人歸去獨宿江樓月上雲收一半珠簾掛玉鈎起來檢㸃經逰地處處新愁憑仗東流將取離心過橘州八昭陽記得神仙侣獨自承恩水殿燈昏羅幕輕寒夜正春如今别館添蕭索滿面啼痕舊約猶存忍把金環别與人九微風簾幕清明近花落春殘樽酒留歡添盡羅衣怯夜寒愁顔恰似燒殘燭珠淚䦨干也欲髙拚爭奈相逢情萬般十畫堂昨夜愁無睡風雨凄凄林鵲爭棲落盡燈花雞未啼年光往事如流水休說情迷玉筯雙垂秪是金籠鸚鵡知十一寒蟬欲報三秋候寂靜幽齊葉落閒階月透簾櫳逺夢回昭陽舊恨依前在休說當時玉笛才吹滿袖猩猩血又埀十二洞房深夜笙歌散簾幕重重斜月朦朧雨過殘花落地紅昔年無限傷心事依舊東風獨倚梧桐閒想閒思到曉鐘十三花前失却逰春侣極目尋芳滿眼悲凉縱有笙歌亦斷腸林間戲蝶簾間燕各自雙雙忍更思量緑樹青苔半夕陽晏同叔陽和二月芳菲遍暖景溶溶戲蝶逰蜂深入千花粉豔中何人解繫天邉日占取春風免使繁紅一片西飛一片東二時光只解催人老不信多情長恨離亭淚滴春衫酒易醒梧桐昨夜西風急淡月朧明好夢頻驚何處髙樓鴈一聲三花中獨占春風早長愛江梅秀艷清柸芳意先愁調角催尋香已落閒人後此恨難裁更曉須來却恐初開勝未開小山詞蘆鞭墜遍楊花陌晚見珍珍疑是朝雲來作髙唐夢裡人應憐醉落樓中帽長帶歌塵試拂香茵留解金鞭睡過春二征人去日殷勤囑莫負心期寒鴈來時第一傳書慰别離輕絲織就機中素淚墨題詩欲寄相思日日髙樓看鴈飛三花時惱得瓊枝瘦半被殘香睡損梅粧紅淚今春第一行風流笑伴相逢處白馬逰韁共折垂楊手撚芳條說夜長四秋來更覺銷魂苦小字還稀坐想行思怎得相看似舊時南樓把手憑肩處風月應知别後除非夢裡時時得見伊五誰將一㸃凄凉意送入低眉畫箔閒垂多是今宵得睡遲夜痕記盡窗間月曽誤心期凖擬相思還是窗間記月時六前歡幾處笙歌地長負登臨月幌風襟猶憶西樓著意深鶯花見盡當時事應笑如今一寸愁心日日寒蟬夜夜砧七日髙庭院楊花轉暗淡春風鶯語惺愡似笑金屏昨夜空嬌慵未洗勻粧手閒印斜紅新恨重重都與年時舊意同歐陽永叔輕舟短棹西湖好緑水逶迤芳草長堤隱隱笙歌處處隨無風水面琉璃滑不覺船移微動漣漪驚起沙禽掠岸飛張子野水雲薄薄天同色竟日清輝風影輕飛花發瑶林春未知剡溪不辨沙頭路湖水平堤姑射人歸記得歌聲與舞時周美成肌膚綽約真仙子來伴氷霜洗盡鉛黃素面初無一㸃粧尋花不用持銀燭暗裏聞香零落池塘分付餘妍與夀陽黃山谷櫻桃著子如紅豆不管春歸聞道開時蜂惹香鬚蝶惹衣樓臺燈火明珠翠酒戀歌迷醉玉東西少箇人人暖被攜秦少遊夜來酒醒清無夢愁倚䦨干露滴輕寒兩頰芙蓉淚不乾佳人别後音塵悄銷瘦難拚明月無端已過江樓十二間舒信道一池秋水踈星動寒影橫斜滿坐風花紅燭紛紛透絳紗江湖散誕扁舟裏到處如家且盡流霞莫管年來兩鬢華吕居仁恨君不似江樓月南北東西南北東西只有相隨無别離恨君却似江樓月暫滿還虧暫滿還虧待得團團是幾時二亂紅天緑風吹盡小市疏樓細雨輕鷗總向離人恨裏收年年春好年年病妾自西遊水自東流不似殘花一樣愁謝無逸楚山削玉雲中碧影落沙汀秋水澄凝一抹江天鴈字橫金錢滿地西風急紅蓼煙輕簾外砧聲驚起青樓夢不成萬里朝天花蕊夫人費氏初離蜀道心將碎離恨綿綿春日如年馬上時時聞杜鵑三千宫女皆花貌妾最嬋娟此去朝天只恐君王寵愛偏胡夫人與君别後愁無限永逺團圞間阻多方水逺山遙寸斷腸終朝等候郎音耗捱過春光烟水茫茫梅子青青又待黃芭蕉添字李易安窗前誰種芭蕉樹隂滿中庭隂滿中庭葉葉心心舒卷有餘情傷心枕上三更雨㸃滴霖霪㸃滴霖霪愁損北人不慣起來聽集句朱秋娘女郎王孫去後無芳草朱淑真緑遍香階李季蘭塵滿粧臺吳淑姬粉面羞搽淚滿腮王幼玉教我甚情懷李易安去時梅蕊全然少竇夫人等到花開蘇小小花已成梅陶梅子青青又帶黃胡夫人兀自未歸來王嬌姿花草稡編卷四

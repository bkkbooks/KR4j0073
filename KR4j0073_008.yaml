body:
  text: 花草稡編卷八明陳耀文輯小令慶春時晏叔原倚天樓殿升平風月彩仗春移鸞絲鳯竹長生調裏迎得翠輿歸雕鞍逰罷何處還有心期濃薰翠被深停畫燭人約月西時二梅梢已有春來音信風意猶寒南樓暮雪無人共賞間却玉䦨干殷勤今夜凉月還似眉彎尊前為把桃根麗曲重倚四絃看伊州三臺丹桂坦菴桂華移自雲岩更被靈砂染丹清露濕酡顔醉乘風下臨世間素娥襟韻蕭閒不與羣芳並看蔌蔌絳綃單覺身輕夢回廣寒烏夜啼李後主昨夜風兼雨簾幃颯颯秋聲燭殘漏滴頻欹枕起坐不能平世事漫隨流水算來一夢浮生醉鄉路穩冝頻到此外不堪行權無染梅洗净鉛華汚玉顔自發輕紅無言雪月黃昏後别是箇丰容骨瘦難禁消瘦香蒙不並芳穠與君髙却看花眼紅紫謾春風春思趙德麟樓上縈簾弱絮墻頭礙月低花年年春事關心事腸斷欲棲鴉舞鏡鸞衾翠减啼珠鳯蠟紅斜重門不鎖相思夢隨意繞天涯詩餘作錦堂春蒲江照水飛禽鬪影舞風小徑低花征鴻排盡相思字音信落誰家繫恨腰圍頓减禁愁酒力難加樓髙日暮休簾捲芳草滿天涯二栁色津頭泫緑桃花渡口啼紅一春又負西湖醉離恨雨聲中客袂迢迢西塞餘寒剪剪東風誰家拂水飛來燕惆悵小樓空三漾暖紋波颭颭吹晴絲雨濛濛輕衫短帽西湖路花氣撲春驄鬬草騫衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風四假假寒沙淺水蕭蕭暮雨孤蓬香羅不共征衫逺砧杵客愁中别恨慵看楊桞歸期暗數芙蓉碧梧聲到紗窗曉昨夜幾秋風程正伯楊桞拖烟漠漠梨花浸月溶溶吹香院落春還盡憔悴立東風只道芳時易見誰知密約難通芳園繞遍無人問獨自拾殘紅陸放翁金鴨餘香尚暖緑窗斜日偏明蘭膏香染雲鬟膩叉墜滑無聲冷落鞦韆伴侣䦨珊打馬心情繡屏驚斷瀟湘夢花外一聲鶯離情劉迎離恨逺縈楊栁夢魂長繞梨花青衫記得章臺月歸路玉鞭斜翠鏡啼痕印䄂紅墻醉墨寵紗相逢不盡平生事春思入琵琶閨思前人菱鑑玉箆秋月蕙爐銀葉朝雲宿醒人困屏山夢煙樹小江村翠甲未消蘭恨粉香不斷梅魂離愁分付殘春雨花外泣黃昏西湖無名氏水漫汀洲新緑雲開崦嶂微青殘紅不見成陰後鶗鴂寂無聲笑倣坡詩一夢風流杜牧三生西湖依舊人中意來去竟難慿桃源憶故人一名虞美人影歐陽永叔梅梢㺯粉香猶嫩欲寄江南春信别後寸腸縈損說與伊爭穩小爐獨守空灰燼忍淚低頭畫盡眉上萬重新恨竟日無人問二鶯愁燕苦春歸去寂寂花飄紅雨碧草緑楊岐路况是長亭暮少年行客情難訴泣對東風無語目斷兩三煙樹翠隔江淹浦冬景秦少游玉樓深鎖薄情種清夜悠悠誰共羞見枕衾鴛鳯悶則和衣擁無端畫角嚴城動驚破一畨新夢窗外月華霜重聽徹梅花㺯詩餘碧紗影㺯東風曉一夜海棠開了枝上數聲啼鳥粧㸃知多少妬雲恨雨腰肢裊眉黛不堪重掃薄幸不來春老羞帶冝男草黃山谷碧天露洗春容淨淡月曉收殘暈花上密煙飄盡花底鶯聲嫩雲歸楚峽厭厭困雨㸃遙山新恨和淚暗彈紅粉生怕人來問鄭中卿東風料峭寒吹面低下繡簾休卷憔悴怕他春見一任鶯花怨新愁不受詩排遣塵滿玉毫金硯若問此愁深淺天闊浮雲逺王逸民劉郎自是桃花主不許春風門度春色易隨風去片片傷春暮反魂不用清香注却有梅花淡竚從此鎮長相雇不怨飄殘雨桃源憶故人吳子和畫橋流水飛花舞樓外斜風細雨紅瘦緑肥春暮腸斷桃源路歡隨仙子乘鸞去鏤月裁雲何處唯有病和愁緒肯伴劉郎住趙元鎮青春不與花為主花正開時春暮花下醉眠休訴看取春歸去鶯愁蝶怨春知否欲問春歸何處只有一尊芳醑留得青春住朱希真雨斜風橫香成陳春去空留春恨歡少愁多因甚燕子渾難問碧尖蹙損眉慵暈淚濕胭脂紅沁可惜海棠吹盡又是黃昏近二西樓幾日無人到依舊紅圍緑繞樓下落花誰掃不見長安道碧雲望斷無音耗倚遍䦨干殘照試問淚彈多少濕遍樓前草城頭月贈梁彌仙馬天驥城頭月色明如晝總是青霞有酒醉茶醒饑餐困睡不把雙眉皺坎離龍虎勤交媾煉得丹將就借問羅浮鶴侣還似先生否和李昴英工夫作用中宵晝㸃化無中有真意長存童顔不改底用呵摩皺一身二五陽精媾積得嬰兒就借問霞仙三田熟未還解飛冲否栁梢青佳人周美成有箇人人海棠標韻飛燕輕盈酒暈潮紅羞蛾凝緑一笑生春為伊無限傷心更說甚巫山楚雲斗帳香消紗窗月冷著意溫存春暮賀方回子規啼血可憐又是春歸時節滿院東風海棠鋪繡梨花飛雪丁香露泣殘枝誚未比愁腸寸結自是休文多情多感不干風月秦少游岸草平沙吳王故苑栁裊烟斜雨後寒輕風前香軟春在梨花行人一棹天涯酒醒處殘陽亂鴉門外鞦韆墻頭紅杏深院誰家游女蔣勝欲學唱新腔鞦韆架上叉股敲雙栁雨花風翠鬆裙褶紅膩鞋幫歸來門掩銀缸淡月裏踈鐘漸撞嬌欲人扶醉嫌人問斜倚樓窗有談舊倡潘氏前人小飲微吟殘燈斷雨靜户幽窗幾度花開幾畨花謝又到昏黃潘娘不是潘郎料應也霜粘鬢傍鸚鵡䦨空鴛鴦壺破烟渺雲茫七夕劉叔安乾鵲收聲濕螢度影庭院秋香步月移隂梳雲約翠人在廽廊醺醺宿酒殘粧待付與溫柔醉鄉卻扇藏嬌牽衣索笑今夜差凉二酴醿過也酴醿過後無花堪折只有垂楊埀楊却作絮驚行色海棠半在如無又爭倩薔薇戀得除是東風隨君歸問玉堂消息謝無逸香肩輕拍樽前忍聽一聲將息昨夜濃歡今宵别酒明日行客後回來則須來便去也如何去得無限離情無窮江水無邊山色朱希真紅分翠别宿酒半醒征鞍將發樓外殘鐘帳前殘燭窗邊殘月想伊繡枕無眠記行客如今去也心下難拚眼前難覔口頭難說二任蹤怪迹誰料半老天涯為客帆展霜風船隨江月山寒波碧如今著處添愁怎忍看參西鴈北洛浦鶯花伊川雲水如何歸得舉場不利董參政夷堅志滿腹文章滿頭霜雪滿面埃塵直至如今别無收拾只有清貧功名已是因循懊恨張巡李巡幾箇明年幾畨好運只是瞞人德夀宫觀花應制張掄栁色初濃餘寒似水纎雨如塵一陳東風縠紋微皺碧沼鱗鱗仙娥花月精神奏鳯管鸞絃鬪新萬歲聲中九霞杯內長醉芳春和前曽覿桃靨紅勻梨腮粉薄鴛徑無塵鳯閣凌虛龍池澄碧芳意鱗鱗清時酒聖花神看內苑風光又新一部仙韶九重鸞仗天上長春二小宴清秋霎時見了雨散雲收栁絮輕柔梅花閒淡宫院風流空教夢繞青樓待說箇相思又休無奈情何不來眼底常在心頭張元幹海山浮碧細風絲雨新愁如織慵試春衫不禁宿酒天涯寒食歸期莫數芳辰誤幾度回廊夜色入户飛花隔簾雙燕有誰知得送梅坡劉改之泛菊杯深吹梅角逺同在京城聚散匆匆雲邊孤鴈水上浮萍教人怎不傷情屈指知心幾人後夜相思塵隨馬足自逐舟行豐樂樓趙汝愚水月光中烟霞影裏湧出樓臺空外笙簫人間笑語人在蓬萊天香暗逐風回正十里荷花盛開買箇小舟山南逰遍山北歸來七夕諸公祖席管鑑淡雲微月又是一年新秋佳節天上歡期人間何事畨成離别清尊欲醉還歇怕飲散匆匆話别若是經年得回相見甘心愁絶盧炳蘭蕙心情海棠韻度楊栁腰肢步穩金蓮手纎春筍膚似凝脂歌聲舞態都宜拚著箇堅心共伊無奈相思帶圍寬盡說與教知元正吳雲堅綵杖鞭春鵝毛飛管斗柄回寅拂面東風雖然料峭畢竟寒輕戴花折栁心情怎捱得元宵放燈不是今朝有些殘雪先去踏青張鎡天逺山圍龍蟠淡靄虎踞斜暉幾度功名幾畨成敗渾似鷗飛樓臺一望凄迷算到底空爭是非今夜潮生明朝風順且送船歸嶽陽樓戴式之神劔飛吟洞庭青草秋水深深萬頃波光嶽陽樓上一快披襟不須携酒登臨問有酒何人共斟變盡人間君山一㸃自古如今梅朱淑真玉骨氷肌為誰偏好特地相宜一味風流廣平休賦和靖無詩倚窗睡起春遲困無力菱花笑窺嚼蕊吹香眉心㸃處鬢畔插時二茅舍踈籬半飄殘雪斜卧枝低可便相宜烟藏修竹月在寒溪亭亭佇立多時拚瘦損無妨為伊誰賦才情畫成幽思寫入新詩三月墜霜飛隔窗踈影徹見橫枝不道寒香解隨羌管吹到屏幃箇中風味誰知睡乍起烏雲任欹嚼蕊搖英淺顰輕笑酒半醒時蜀州王守門下客遇紅梅花作祟贈此依稀曉星明滅白露㸃蒼苔敗葉斷址頺垣荒烟衰草漢家宫闕咸陽道上行客又依舊利名深切改換容顔銷磨今古壠頭殘月古今詞話胡搗練晏幾道小春花信雪中來壠上小梅先拆今歲東君消息還自南枝得素衣洗盡九天香玉酒添成國色一自故園踈隔腸斷長相憶二夜來江上見寒梅自逞芳妍標格為甚東風先折分付春消息美人叉上玉樽前朵朵穠香堪惜誰把彩毫描得免恁輕拋擲霅上送唐彥猷張子野使君少醉離亭酒酒醒離愁轉有紫禁時虛右清霅留難久一聲歌掩雙羅袖日落汀花春後猶有東城烟栁青蔭長依舊鹽角兒朝無咎初開似雪勝開似雪花中竒艷香非在蕊香非在蕚骨中香徹占溪風留溪月堪羞損山桃如血直饒更踈淡終有一般清别撼庭秋晏同叔别來音信千里恨此情難寄碧紗秋月梧桐夜雨幾回無寐樓髙目斷天遙雲黯只堪憔悴念蘭堂紅燭心長焰短向人垂淚賀聖朝葉道卿滿斟緑醑留君住莫匆匆歸去三分春色二分愁悶一分風雨花開花謝都來幾日且髙歌休訴知他來歲牡丹時候相逢何處趙德莊河陽桃李開無數待乘春歸去小園幾片忽驚飛恨主人難駐雛鶯乳燕悲悲語道留君不住願君送處作東風與羣芳為主馮延巳金絲帳暖牙床穩懷香方寸輕顰輕笑汗珠微透栁沾花潤雲鬟斜墜春應未已不勝嬌困半欹犀枕亂纒珠被轉羞人問趙鼎斷霞收盡黃昏雨滳梧桐踈樹簾櫳不捲夜沉沉鎖一庭風露天涯人逺深期夢悄苦長宵難度知他窗外促織兒有許多言語喜團圓晏叔原危樓靜鎖窗中逺岫門外垂楊珠簾不禁春風度解偷送餘香眠思夢想不如雙燕得到蘭房别來只是憑髙淚眼感舊離腸與團圓鮫綃霧縠沒多重數緊礙偷憐孜孜覷著算前生只結得眼因緣眼是心媒心為情本裡外勾連天還有意不違人願與箇團圓二輕攢碎玉玲瓏竹外脫去繁華殢東君先㸃破壓羣花瘦影生香黃昏月館清淺溪沙仙標淡竚偏宜么鳯肯帶棲鴉洛陽春歐陽永叔紅紗未曉黃鸝語蕙爐銷蘭炷錦屏羅幕護春寒昨夜三更雨繡簾閒倚吹輕絮斂眉山無緒看花拭淚向歸鴻問來處逢郎否極相思宋宗室夫人桞烟霽色方融花露遍金莖鞦韆院落海棠漸老才過清明嫩玉腕托香脂臉相傅粉更與誰情秋波綻處相思淚迸天沮深誠墨客揮犀二拂墻花影飄紅微月辨簾櫳香風滿䄂金蓮印步狹徑迎逢笑靨乍開還斂翠正花時却恁西東别房初睡斜門未鎖且更從容陸務觀江頭疏雨輕煙寒食落花天翻紅墜素殘霞暗錦一假凄然惆悵東君堪恨處也不念冷落樽前那堪更看漫空相趂桞絮榆錢憶漢月歐陽永叔紅艷幾枝輕裊新被東風開了倚烟啼露為誰嬌故惹蝶憐蜂惱多情遊賞處留戀向緑叢千繞酒䦨歡罷不成歸腸斷月斜春老醉鄉春謫蕂州作秦少游冷齊夜話喚起一聲人悄衾冷夢寒霜曉瘴雨過海棠開春色又添多少社甕釀成微笑半破癭瓢共􅀢夭覺顛倒急投床醉鄉廣大人間小少遊在黃州飲於海棠橋橋南北多海棠有老書家海棠叢開少遊醉臥於此明日題此於柱河瀆神溫庭筠河上望叢祠廟前春雨來時楚山無限鳥飛遲蘭棹空傷别離何處杜鵑啼不歇艷紅開盡如血蟬鬢美人愁絶百花芳草佳節花草稡編卷八

body:
  text: 花草稡編卷二十一明陳耀文輯長調玉燭新早梅周美成溪源新臘後見數朵江梅剪裁初就暈酥破玉芳英嫩故把春心輕漏前村昨夜想㺯月黃昏時候孤岸峭踈影橫斜濃香暗沾襟䄂尊前賦與多才向嶺外風光故人知否壽陽謾鬬終不似照水一枝清瘦風嬌雨秀好亂插繁花盈首須信道羌管無情看看又奏史梅溪踈雲縈碧岫帶晚日搖光半江寒皺越溪近逺空頻向過鴈風邊回首酸心一縷念水北尋芳歸後輕醉醒隄月籠紗鞍鬆寶輪飛驟秦樓屢約芳春記扇背題詩帕羅沾酒瘦愁易就因驚斷夢裏桃源難又臨風話舊想日暮梅花孤瘦還靜倚修竹相思盈盈翠䄂青山梅花新霽後正錦樣華堂一時妝就洞房花燭深深處慢轉銅壺銀漏新妝未了奈浩蕩春心相候香篆裏簇簇笙歌微寒半侵羅䄂侵晨淺捧蘭湯問堂上萱花夜來安否功名浪鬬謾贏得萬里相思清瘦藍袍俊秀便勝却登科龍首春晝永簾幕重重簫聲緩奏莊椿嵗夀趙丞相方味道翰綸巾少駐家山北窗睡覺南薰起黃庭細看長生祕訣神仙竒趣奈此蒼生願蘇炎熱仰為霖雨趂丹心未老將整頓乾坤手為經理好是今年慶事抱竒孫一門佳氣蓬山振佩麟符重錫褒綸新美玊樹參庭桂枝分種香浮蘭芷看他年接武三槐長是伴莊椿嵗桂枝香金陵懷古王介甫登臨送目正故國晚秋天氣初肅瀟灑澄江似練翠峰如簇征帆去棹殘陽下背西風酒旗斜矗綵舟雲淡星河鷺起圖畫難足念自昔豪華競逐恨門外樓頭悲恨相續千古憑髙對此謾嗟榮辱六朝舊事隨流水但寒煙衰草凝緑至今商女時時尚歌後庭遺曲觀木犀有感寄吕郎中陳同父天髙氣肅正月色分眀秋容新沐桂子初收三十六宫都足不辭散落人間去怕羣花自嫌凡俗向他秋晚唤回春意幾曽幽獨是天生餘香賸馥怪一樹春風十里相續坐對花傍但見色浮金粟芙蓉只解添秋思况東籬凄凉黃菊入時太淺背時太逺愛尋髙躅踈簾淡月即桂枝香張宗瑞梧桐雨細漸滴作秋聲被風驚碎潤逼衣篝線裊蕙爐沈水悠悠嵗月天涯醉一分秋一分憔悴紫簫吹斷素箋恨切夜寒鴻起又何苦凄凉客裏草堂春緑竹溪空翠落葉西風吹老幾畨塵世從前諳盡江湖味聽商歌歸興千里露侵宿酒踈簾淡月照人無寐喜朝天清暑堂贈蔡君謨張子野晚雲開睨仙館凌虛步入蓬萊玉宇瓊甃對青林近歸鳥徘徊風月從今清暑野色帶江山助詩才簫鼓宴璇題寶字浮動持杯天多送目無際識渡舟帆小時見潮回故國千里共十萬室日日春臺睢社廟京非逺正和羮民口渴鹽梅佳景在吳儂還望分閫重來滿朝歡栁耆卿花隔銅壺露晞金掌都門十二清曉帝里光風爛漫偏愛春杪煙輕晝永引鶯囀上林魚逰靈沼巷陌乍晴香塵染惹垂楊芳草因念秦樓彩鳳楚館朝雲往昔曽迷歌笑别來嵗久偶憶歡盟重到人面桃花未知何處但掩朱門悄悄盡日竚立無言贏得凄凉懷抱夀韓尚書出守梅亭一㸃箕星近天邊光彩輝耀南極竹馬兒童盡道使君生日元是鳳池仙客曽曳履持荷簮筆稱觴處晚節花香月周猶待五夕誰道久拘禁掖任雙旌五馬暫從逰逸九棘三槐都是等閒親植見說玉皇側席但早晚促歸調燮功成了笑傲南山壽如南山松柏月中仙聖節應制道宫趙子昻春滿皇州見祥烟擁日初照龍樓宫花苑栁映仙仗雲移金鼎香浮寶光生玉斧聽鳴鳳簫韶樂奏德與和氣遊天生聖人千載希有祥瑞電繞虹流有雲成五色芝生三秀四海太平致民物雍熙朝野歌謳千官齊拜舞玉杯進長生春酒願皇慶萬年天子與天同壽千秋嵗姪夀叔遊文仲今年為壽都道是不比尋常時節預慶我公年八袠來獻新詞一闋算得年時恰當尚父入相周西伯親逄盛事宗孫也五十八一門富貴榮華盈牀牙笏何待拈來說且上祝龜齡鶴算從此千千百百笑道兒時風流丹篆寫向龍駒額更將綵筆十字頭上添一丿夫壽妻毛東堂記當初歸家似德耀嫁梁鴻算三十年間艱難歷遍甘苦相同新來有孫可抱也添些喜色到眉峰今日又逢生日不妨杯酒從容老翁只是一村儂缺你孺人封幸兒漸知耕婦能知織莫問窮通君看世間富貴比浮雲縹眇過晴空何似大家清健玊林嵗嵗春風翠樓吟雙調武昌安逺樓成姜白石月冷龍沙塵清虎落今年漢酺初賜新翻邊部曲聽氊幕元戎歌吹層樓髙峙看檻曲縈紅簷牙飛翠人姝麗粉香吹下夜寒風細此地宜有詞仙擁素雲黃鶴與君逰戲玉梯凝望久嘆芳草萋萋千里天涯情味仗酒祓清愁花嬌英氣西山外晚來還捲一簾秋霽曲江秋楊補之前山雨歇愛竹樹低隂軒窗無熱珠箔半垂清風細繞蕭蕭吹華髮珍簟粲枕設珊瑚瘦琉璃滑永日欹枕知誰是伴舊書重揭清絶輕雲淡月夢同泛滄波萬疊杯盤狼籍處相扶就枕歡笑歌翻雪轉棹小溪灣人家燈火斷明滅正携手無端驚回檻外數聲鶗鴂二鳴鳩怨歇對急雨過雲暗風吹熱漠漠稻田差差栁岸新沐青絲髮樓上素琴設愛流水隨絃滑深炷龍津濃熏絳幕博山頻揭超絶遙岑吐月照蒼蒨重重叠叠恍然身在處疑同泛花舫波噴雪滉漾醉魂醒驚呼不是漚生滅竚望久空嘆無才可賦厭聽鶗鴂彩雲歸恨别栁耆卿蘅臯向晚艤輕航卸雲帆水驛魚鄉當暮天霽色如晴晝江練靜皎月飛光那堪聽逺村羌管引離人斷腸此際恨浪萍風梗度嵗茫茫堪傷朝歡暮散被多情賦與凄凉别來最苦襟䄂依約尚有餘香算得伊鴛衾鳳枕夜永爭不思量牽情處惟有臨岐一句難忘豐年瑞曽覿紫皇髙宴仙臺雙成戲擊璚苞碎何人為把銀河水剪甲兵都洗玉樣乾坤八荒同色了無塵翳喜氷消太液暖融鳷鵲端門曉班初退聖主憂民深意轉鴻鈞滿天和氣太平有象三宫二聖萬年千嵗雙玉杯深五雲樓迥不妨頻醉看來不是飛花片片是豐年瑞真珠簾陸務觀山村水館參差路感羈逰正似殘春風絮掠地穿簾知是竟歸何處鏡裏新霜空自憫問幾時鸞臺鰲署遲暮謾憑髙懷逺書空獨語自古儒冠多悮悔當年早不扁舟歸去醉下白蘋洲看夕陽鷗鷺菰菜鱸魚都棄了只換得青衫塵土休顧早收身江上一蓑烟雨二燈前月下嬉遊處向笙歌錦繡叢中相遇彼此知名才見便論心素淺黛嬌蟬風調别最動人時時偷顧歸去想閒忩深院調絃促柱樂府初翻新譜漫裁紅㸃翠閒題金縷燕子入簾時又一畨春暮側帽胭脂坡下過料也記前年崔護休訴待從今須與好花為主鳳歸雲遣興栁耆卿向深秋雨餘爽氣肅西郊陌上夜䦨襟䄂起凉颷天末殘星流電未滅閃閃隔林梢又是曉雞聲斷陽烏光動漸分山路迢迢驅驅行役苒苒光隂蠅頭利祿蝸角功名畢竟成何事謾相髙拋擲雲泉狎玩塵土壯節等閒銷幸有五湖煙浪一般風月㑹須歸老漁樵月當㕔史邦卿白璧舊帶秦城夢因誰拜下楊栁樓心正是夜分魚鑰不動香深時有露螢自照占風裳可喜影麩金坐來久都將凉意盡付沈吟殘雲事緒無人拾恨匆匆藥娥歸去難尋綴取霧窗曽唱幾拍清音猶有老來印愁處冷光應念雪翻簮空獨對西風緊弄一井桐隂栁色黃賀方回薄雨催寒斜照弄晴春意空濶長亭栁色才黃逺客一枝先折烟橫水映帶幾㸃歸鴻東風銷盡龍沙雪還記出關來恰而今時節將發畫樓芳酒紅淚清歌便成輕别已是經年杳杳音塵都絶欲知方寸共有幾許清愁芭蕉不展丁香結望斷一天涯兩厭厭風月梅香慢髙閣寒輕映萬朵芳梅亂堆香雪未待江南早冠百花先占一陽佳節剪綵凝酥無處學天然竒絶便壽陽粧工夫費盡艷姿終别風裏弄輕盈掩珠英明瑩麝蠟飄烈莫放芳菲歇剩永宵歡賞酒酣吟折倒玉何妨且聽取樽前新闋怕笛聲長行雲散盡謾悲風月馬家春慢珠箔風輕繡簾浪捲乍入人間蓬島鬪玉䦨干漸庭館簾櫳春曉天許竒葩貴品異繁杏夭桃輕巧命化工傾國風流與一枝纎妙樽前五陵年少縱丹青異格難剔顔貌惹露凝烟困紅嬌額微顰低笑須信濃香易歇更莫惜醉攀吟繞待舞蝶遊蜂細把芳心都告映山紅慢元厚之榖雨風前占淑景名花獨秀露國色仙姿品流第一春工成就羅幃護日金泥皺映霞腮動檀痕溜長記得天上瑤池閬苑曽有千匝繞紅玉䦨干愁只恐朝雲難久須款折繡囊剩戴細把蜂須頻嗅佳人再拜擡嬌面斂紅巾捧金杯酒獻千千壽願長恁天香滿䄂木蘭花慢惜别栁耆卿倚危樓竚立乍蕭索晚晴初漸素景衰殘風砧韻冷霜樹紅踈雲衢見新鴈過奈佳人自别阻音書空遣悲秋念逺寸腸萬恨縈紆皇都暗想歡逰成往事動欷歔念對酒當歌低幃並枕翻恁輕辜歸途縱凝望處但斜陽暮靄滿平蕪贏得無言悄悄憑欄盡日踟蹰程正伯倩嬌鶯姹燕說不盡此時情正小院春䦨芳園晝鎖人去花零憑髙試回望眼奈遙山逺水隔重雲誰遣風狂雨橫便教無計留春情知鴈杳與鴻嗔自難寄丁寧縱竹院顰深桃門笑在知屬何人衣篝幾回忘了奈殘香猶有舊時薰空使風頭捲絮為他飄蕩花城吕聖求石榴花謝了正荷葉蓋平池試瑪瑙杯深琅玕簟冷臨水簾帷知他故人甚處曉霞明斷浦栁枝垂唯有松風水月向人長似當時依依望斷水窮雲起處是天涯奈燕子樓髙江南夢斷虛費相思新愁暗生舊恨更流螢弄月入紗衣除却幽花軟草此情未許人知重陽京仲逺算秋來景物皆勝賞况重陽正露冷欲霜輕烟不雨玊宇開張蜀人從來好事遇良辰不肯負時光藥市家家簾幕酒樓處處絲簧婆娑老子興難忘聊復與平章也隨分登髙茱茰綴席菊蕊浮觴明年未知健否笑杜陵底事獨凄凉不道頻開笑口年年落帽何妨前調張安國送歸雲去鴈淡寒影滿溪樓正佩解湘腰叉孤楚鬢鸞鑑分收凝情望行處路但踈烟逺樹織離憂只有樓前溪水伴人清淚長流霜華夜永逼衾稠唤誰護衣篝念粉館重來芳塵未掃爭見嬉遊情知悶來殢酒奈回腸不醉只添愁脉脉無言竟日斷魂雙鶩南州二紫簫吹散後恨燕子只空樓念璧月長虧玉簮中折覆水難收青鸞送碧雲句道霞扃霧鎖不堪憂情與文梭共織怨隨宫葉同流人間天上兩悠悠暗淚灑燈篝記谷口園林當時驛舍夢裏曽遊銀屏低聞笑語但夢時冉冉醒時愁擬把菱花一半試尋髙價皇州送陳石泉南歸陳參政北歸人未老喜依舊著南冠正雪暗滹沱雲迷芒碭夢繞邯鄲鄉心促日行萬里幸此身生入玉門關多少秦烟隴霧西湖淨洗征衫燕山望不見吳山回首一歸鞍慨故宫離黍故家喬木那忍重看鈞天紫微何處問瑤池八駿幾時還誰在天津橋上杜䳌聲裏䦨干中秋吳彥髙敞千門萬户瞰蒼海爛銀盤對沆瀣樓髙儲胥鴈過墜露生寒䦨干眺河漢外送浮雲盡出衆星乾丹桂霓裳縹眇似聞雜佩珊珊長安底處髙城人不見路漫漫歎舊日心情如今容鬢瘦沈愁潘幽歡縱容易得奈佳期動是隔年看歸去江湖一葉浩然對影垂竿社日有懷嚴次山東風吹霧雨更吹起夾衣寒正莽莽叢林潭潭伐鼓鬱鬱焚蘭䦨干曲多少意看青烟如篆繞溪灣桑柘緑隂猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆擾擾人生紛紛離合渺渺悲歡想雲軿何處也對芳時應只在人間惆悵回紋錦字斷腸斜日雲山前調戴式之鶯啼啼不盡憑燕語語難通這一㸃芳心十年不斷惱亂東風重來故人何處但依前流水小橋東記得同題粉壁而今壁破無蹤蘭臯空漲緑溶溶流恨落花紅念著破春衫當時送别燈下裁縫相思謾令自苦嘆雲烟過眼揔成空落日楚天無際憑欄目送歸鴻七夕盧申之汀蓮凋晚豔又蘋末起秋風漫搔首徐吟微雲河漢踈雨梧桐飄零倦尋酒盞記那回歌管小樓中玊果蛛絲暗卜鈿叉蟬鬢輕籠吳雲别後重重凉宴幾時同縱人間信有犀靈鵲喜密意難通雙星分攜最苦念經年猶有一相逢寂寞橋邊舊月可堪頻照西東秋意李耘叟占西風早處一畨雨一畨秋記故國斜陽去年今日落葉林幽悲歡幾回激烈寄踈狂酒令與詩籌遺恨清商易改多情紫燕難留嗟休觸緒繭絲抽舊事續何由奈豫懷渺渺羇愁鬱鬱歸夢悠悠生平不如老杜便如它飄泊也風流寄語庭柯徑菊甚時得棹孤舟前調劉後村瀛洲真學士為底事在紅塵為語觸宫闈沈香亭裏嗔謫仙人為親近君側者見萬言策了惎劉蕡為是尚方請劒漢廷多憚朱雲君言往事勿重陳且鬬酒邊身也不㑹區區算他甲子記甚庚寅爾曹譬如朝菌又安知老柏與靈椿世上榮華難保古來名節如新黃玉林問春春不語謾新緑滿芳洲記歷歷前逰看花南陌命酒西樓東風翠紅圍繞把功名一笑付糟邱醉裏了忘身世吟邊自負風流風流莫莫復休休白髮漸盈頭悵十載重來略無歡意惟有閒愁多情向人似舊但小桃婀娜栁纎柔望斷殘霞落日水天拍拍飛鷗題馮雲月玉連環詞自沈香夢斷風雨外失餘春悵𫀆錦淋漓金鑾論奏四海無人蛾眉古來見妬奈昭陽飛燕亦成塵惟有空梁落月至今能為傳神神遊八表跨長鯨誰是再來身愛雲月溪頭玉環一曲筆力千鈞人間不堪著眼但香名百世尚如新乞我九霞蜚珮梯空共上秋旻和答玉林韻馮偉壽酒醒人世换碧桃靚海山春任青鳥沈沈紫鱗杳杳有玉林人宫𫀆掉頭未愛愛荷衣不染市朝塵仙樣蓬萊翰墨雲間鸞鳳精神笑呼銀漢入金鯨瓊苑自由身羡咳唾成章香薰花霧音和韶鈞六丁夜來捧去便天人也自嘆尖新那得金箋飛灑浩歌飛步蒼旻賀第二娶虛寮仙家春不老誰說到牡丹休算蠻栁樊櫻怎生了得白傅風流枝頭摽梅實好奈緑隂庭戶不禁愁幸有琴中鳳語能通鏡裏鸞求鏘璆雜佩下瀛洲寶箑紫烟浮望蘭情紅盼三生曽識一見如羞綢繆從今偕老似栁郎無負碧雲秋莫倚回文妙手放教逺覔封侯昔栁毅為牧羊女傳書碧雲杯酒意即相屬後栁三娶崔氏乃牧羊女之化身也前調遺山擁岧岧雙闕龍虎氣鬱峥嶸想暮雨珠簾秋香桂樹指顧臺城憑欄為誰西望但哀絃凄斷似平生只道江山如畫爭教天地無情風雲奔走十年兵慘淡入經營問對酒當歌曹侯墓上何用虛名青青故都喬木悵西陵遺恨幾時平安得參軍健筆為君重賦蕪城二渺長江東下流不盡古今情記海上三山雲間雙闕當日南城黃鶴幾年飛去淡春隂平野草青青氷井猶殘石甃露盤已失金莖風流千古短歌行慷慨缺壺聲想釃酒臨江賦詩鞍馬詞氣縱橫飄零舊家王粲似南飛烏鵲月三更笑殺西園賦客壯懷無復平生題亳州武津關張𢎞範憶譙都風物飛一夢過千年羡百里溪程兩行堤栁數萬人烟傷心舊家遺跡謾斜陽流水接長天冷落故祠香火白雲淚眼澘然行藏好向故人傳椽筆舞蠻箋總糾糾貔貅秋風江上髙卧南邊功名談笑樽俎向錦江何必上樓船他日玉津關下春風驕馬金鞭憶吳姬鄭禧春夢録任東風老去吹不斷淚盈盈春淺春深春寒春暖春雨春晴都來助詩人興更落花無定攪春情芳草猶迷舞蝶緑楊空悮流鶯𤣥霜著意搗初成回首失雲英但如醉如癡如狂如舞如夢如驚香魂至今迷戀問真仙消息最分明幾夜相逢何處清風明月蓬瀛攪原作挽再和鄭禧吳氏看紅箋寫恨人醉倚夕陽樓故里梅花才傳春信先認儒流此生料應緣淺綺窗下雨怨共雲愁如今杏花嬌艷珠簾懶上銀鈎絲蘿喬樹欲依投此景兩悠悠恐鶯老花殘翠嫣紅减辜負春逰蜂媒問人情思總無言應只低頭夢斷東風路逺柔情猶為遲留彭城懷古薩天錫古徐州形勝消磨盡幾英雄想鐵甲重瞳烏騅汗血玉帳連空楚歌八千兵散料夢魂應不到江東空有黃河如帶亂山起伏如龍漢家陵闕起秋風禾黍滿關中更戲馬臺荒畫眉人逺燕子樓空人生百年寄耳且開懷一飲盡千鍾回首荒城斜日倚䦨目送飛鴻西湖送春梁貢父曽問花花不語為誰落為誰開算春色三分半隨流水半入塵埃人生能幾歡笑但相逢樽酒莫相推千古幕天席地一春翠繞珠圍彩雲回首暗高臺煙樹渺吟懷拚一醉留春留春不住醉裏春歸西樓半簾斜日怪銜春燕子却飛來一枕青樓好夢又教風雨驚回瑞雲濃慢六月十一日夀羅春伯陳同父䉀漿酪粉玉壺氷醑朝罷更聞宣賜去天咫尺下拜再三幸今有母可遺年年此日共道月入懷中最貴向暑天正風雲㑹遇有恁嘉瑞鶴沖霄魚得水一超便直入神仙地植根江表開拓兩河做得黑頭公未騎鯨赤手問何如長鞭尺箠向來王謝風流只今管是曲逰春趙功可千樹籠芳草正蒲風微過梅雨新霽客裏幽忩算無春可到和愁都閉萬種人生計應不似午天閒睡起來踏碎松隂蕭蕭欲動疑水借問歸舟歸未望栁色煙光何處明媚抖擻人間除離情别恨乾坤餘幾一笑晴鳬起酒醒後䦨干獨倚時見雙燕飛來斜陽滿地瑤華慢雪仇仁近踈踈密密漠漠紛紛乍舞風無力殘磚斷礎轉眼化作方圭圓璧非花非絮似逞巧先投窗隙立小樓不見青山萬里鳥飛無迹休憐凍梗氷苔但飛入平林都是春色年華婉娩誰信道老却梁園詞客踏青近也且二白何須三白把一白分與梅花要㸃壽陽宫額次仇山村韻張伯雨篩氷為霧屑玉成塵借阿姨風力千巖競秀怎一夜换作連城之璧先生閉户怪短日寒催駒隙想平沙鴻爪成行似醉時書迹未隨埋沒雙尖便淡掃蛾眉與鬬顔色裁詩白戰驢背上䭾取灞橋吟客撚鬚自笑儘未讓諸峯頭白看洗出宫栁梢頭已借淡黃塗額臺城路送周方山之吳張叔夏朗吟未了西湖酒驚心又歌南浦折栁官橋呼船野渡還聽垂虹風雨漂流最苦况如此江山此時情緒怕有鴟夷笑人何事載詩去荒臺祗今在否登臨休望逺都是愁處暗草埋沙明波洗月誰念天涯羈旅荷隂未暑快料理歸程再盟鷗鷺只有空山近來無杜宇二十年前事翻疑夢重逢可憐俱老水國春山空城嵗晚無語相看一笑荷衣換了任京洛風塵冷凝紗帽見說吟情近來不見謝池草歡逰曽步翠窈亂花迷紫曲芳意今少舞扇招香歌橈换玉猶憶錢塘蘇小無端暗惱又幾度留連燕昏鶯曉回首粧樓甚歸去好拜星月周美成夜色催更清塵收露小曲幽坊月暗竹檻燈窗識秋娘庭院笑相遇似覺瓊枝玊樹暖日明霞光爛水盻蘭情總平生稀見畫堂中舊識春風面誰知道自到瑶臺畔眷戀雨潤雲濕苦驚風吹散念荒寒寄宿無人館重門閉敗壁秋蟲嘆怎奈何一縷相思隔溪山不斷韓琮集云吳魚嶺鴈無消息水盼蘭情别來久升平樂吳奕水閣層臺短亭深院依稀萬木籠隂飛暑無涯行雲有勢晚來細雨回晴庭槐轉影紗厨兩兩蟬鳴幽夢斷枕金猊旋熱蘭炷微薰堪命俊才儔侣對華筵坐列朱履紅裙檀板輕敲金樽滿泛縱教畏日西沈金絲玉管間歌喉時奏清音唐虞景儘陶陶沈醉且樂升平西平樂春暮栁耆卿盡日憑髙寓目脉脉春情緒嘉景清明漸近時節輕寒乍暖天氣才晴又雨煙光淡蕩裝㸃平蕪逺樹黯凝竚臺榭好鶯燕語正是和風麗日幾許繁紅嫩緑雅稱嬉逰去奈阻隔尋芳伴侣秦樓鳳吹楚館雲約空悵望在何處寂寞韶光暗度可堪向晚村落聲聲杜宇朱雍夜色娟娟皎月梅玉供春緒不使鉛華㸃綴超出精神淡竚休妬殘英如雨清香眷戀只恐隨風滿路散無數江亭暮鳴佩語正值匆匆作别天逺瑤池縞轂好趂飛瓊去忍負瑤臺伴侣瓊肌瘦盡庾嶺零落空悵望動情處畫角哀時暗度參橫向曉吹入深沈院宇情久長吕聖求瑣忩夜永無聊盡作傷心句甚近日帶紅移眼梨臉沾雨春心償未足怎忍聽啼血催歸杜宇暮帆掛沈沈暝色滚滚長江流不盡來無據㸃檢風光嵗月今如許趂此際浦花汀草一棹東去雲窗霧閣洞天曉同作煙霞伴侣算誰見梅簾醉夢栁陌晴逰應未許春知處二氷梁跨水沈沈霽色遮千里怎向我小舟孤棹天外飄逐夜寒侵短髮睡不穩窗外寒風漸起嵗華暮蟾光射雪碧瓦飄霜塵不動寒無際雞咽荒郊夢也無歸計擁繡枕斷魂殘魄清吟無味想伊睡起又念逺樓閣橫枝對倚待歸去西窗剪燭小閣凝香深翠幕饒春睡小樓連苑梅楊樵雲一枝斜墮牆腰向人顫裊如相媚是誰剪取斷雲零玉輕輕粧綴不是幽人如何能到水邊沙際又匆匆過了春風半面儘長把重門閉只管相思成夢道無情又關鄉意蒼苔半畝如今巳是鹿胎田地甚欲追陪却嫌花下翠環解語待何時月轉幽房醉了不教歸去山亭宴有美堂贈彥猷主人張子野宴堂永晝喧簫鼓倚青空畫欄紅柱玉瑩紫薇人藹和氣春融日煦故宫池館更樓臺約風月今宵何處湖水動鮮衣競拾翠湖邊路落花蕩漾怨空樹曉山靜數聲杜宇天意送芳菲正黯淡踈煙短雨新歡寧似舊歡長此㑹散幾時還聚試為挹飛雲問解寄相思否望春回李景元霽霞散曉射水村漸明漁火方絶灘露夜潮痕注凍瀨凄咽征鴻來時應負書見踈栁更憶伊同折異鄉憔悴那堪更逢嵗窮時節東風暗回暖力算折遍江梅消盡巖雪唯有這愁腸也依舊千結私言竊語些誓約便眠思夢想無休歇這些離恨除非對著說似明月戀芳春慢寒食前進万侯雅言蜂蘂分香燕泥破潤暫寒天氣清新帝里繁華昨夜細雨初勻萬品花藏四苑望一帶栁接重津寒食近蹴踘秋千又是無限逰人紅粧趂戲綺羅夾道青帘賣酒臺榭侵雲處處笙歌不負治世良辰共見西城路好翠華定將出嚴宸誰知道仁主祈祥為民非事行春慶春宫秋怨周美成雲接平岡山圍寒野路回漸轉孤城衰栁啼鴉驚風驅鴈動人一片秋聲倦途休駕淡烟裏微芒見星塵埃憔悴生怕黃昏離思牽縈華堂舊日逢迎花艷參差香霧飄零管絃當頭偏憐嬌鳳夜深簧暖笙清眼波傳意恨密約匆匆未成許多煩惱只為當時一餉留情陳允平斜日明霞殘虹分雨軟風淺掠蘋波聲冷瑤笙情踈寶扇酒酲無奈秋何彩雲輕散漫敲缺銅壺浩歌眉痕留怨依約逺峯學斂雙蛾銀牀露洗凉柯屏掩香銷忍掃裀羅楚驛梅邊吳江楓畔庾郎從此愁多草蛩喧砌料催織回文鳳梭相思遼逺簾捲翠樓月冷星河憶舊逰周邦彥記愁橫淺黛淚洗紅鉛門掩秋宵墜葉驚離思聽寒螀夜泣亂雨瀟瀟鳳叉半脫雲鬢窗影燭花搖漸暗竹敲凉踈螢照曉兩地魂銷迢迢問音信道徑底花隂時認鳴鑣也擬臨朱戶嘆因郎憔悴差見郎招舊巢更有新燕楊栁拂河橋但滿眼京塵東風竟日吹露桃别黃淡翁吳君特送人猶未苦苦送春隨人去天涯片紅都飛盡隂隂潤緑暗裏啼鴉賦情頓雪雙鬢飛夢逐塵沙歎病渴凄凉分香瘦減兩地看花西湖斷橋路想繫馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為寫深怨空壁掃秋蛇但醉上吳臺殘陽草色歸思賖水龍吟詠笛東坡楚山修竹如雲異材秀出千林表龍鬚半翦鳳膺微漲玉肌勻繞朩落淮南雨晴雲夢月明風裊自中郎不見桓伊去後知辜負秋多少聞道嶺南太守後堂深緑珠嬌小綺窗學弄梁州初遍霓裳未了嚼徴含宫泛商流羽一聲雲杪為使君洗盡蠻風瘴雨作霜天曉楊花似花還似非花也無人惜從教墮拋家傍路思量却似無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看來不是楊花㸃㸃是離人淚楊花章質夫燕忙鶯懶芳殘正堤上栁花飄墜輕飛亂舞㸃畫青林全無才思閒趂逰絲靜臨深院日長門閉傍珠簾散漫垂垂欲下依前被風扶起蘭帳玊人睡覺怪春衣雪霑瓊綴繡牀漸滿香毬無數才圓却碎時見蜂兒仰粘輕粉魚吞池水望章臺路杳金鞍逰蕩有盈盈淚前調秦少遊小樓連苑橫空下窺繡轂雕鞍驟踈簾半捲單衣初試清明時候破暖輕風弄晴微雨欲無還有賣花聲過盡垂楊院宇紅成陳飛鴛甃玉佩丁東
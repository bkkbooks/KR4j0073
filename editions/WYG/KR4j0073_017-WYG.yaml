body:
  text: 花草稡編巻十七明陳耀文輯長調東風齊着力除久胡浩然殘臘収寒三陽初轉已換年華東君律管迤邐到山家處處笙簧鼎沸㑹佳宴坐列仙娃花叢裏金爐滿爇龍麝烟斜此景轉堪誇深意祝夀山福海増加玉觥滿泛且莫厭流霞幸有迎春夀酒銀缾浸㡬朶梅花休辭醉園林秀色百草萌芽法曲獻仙音初夏周美成蟬咽凉柯燕雙塵幕漏閣籖聲時度倦脫綸巾困便湘竹桐隂半侵朱户向抱影凝情處時聞打窓雨耿無語嘆文園近來多病情緒懶尊酒易成間阻縹緲玉京人想依然京兆眉嫵翠幕深中對徽容空在紈素待花前月下見了不教歸去呉君特落葉霞翻敗窗風咽暮色凄凉深院瘦不闗秋涙縁生别情銷鬢霜千㸃悵翠冷搔頭燕那能語恩怨紫簫逺記桃枝向隨春渡愁未洗鉛水又將恨染粉縞澁離箱忍重拈燈夜裁剪望極藍橋綵雲飛羅扇歌㫁料鸚籠玉鏁夢裏隔花時見姜堯章虚閣籠寒小簾通月暮色偏憐高處樹隔離宫水平馳道湖山盡入尊爼奈楚客淹留久砧聲帶愁去屢囬頋過秋風未成歸計誰念我重見冷楓紅舞喚起淡粧人問逋仙今在何許象筆鸞牋甚而今不道秀句怕平生幽恨化作沙邉烟雨塞翁吟周美成暗葉啼風雨窗外曉色瓏􅋛散氷麝小池東亂一岸芙蓉蘄州簟展雙紋浪輕帳翠縷如空夢逺别淚痕重淡鈆臉斜紅忡忡嗟憔悴新寛帶結羞艷冶都銷鏡中有蜀紙堪憑寄恨等今夜洒血書詞剪燭親封菖蒲漸老早晩成花教見薫風青山坐對梅花笑還記初度年時名利事總成非謾老矣何為呉山夜月閩山霧囬首鬢影如絲懶更問斗牛箕强憑醉成詩閒思嗟漂泊浮雲飛絮曽跌蕩春風柘枝便萬里金臺築就已長分采藥龎公誓墓羲之百年政爾一笑樽前兒女牽衣意難忘佳人周美成衣染鶯黄愛停歌駐拍勸酒持觴低鬟蟾影動私語口脂香簷露滴竹風凉􅂸劇飲淋浪夜漸深籠燈就月子細端相知音見說無雙解移宫換羽未怕周郎長顰知有恨貪耍不成粧些箇事惱人腸試說與何妨又恐伊㝷消問息瘦減容光程正伯花擁鴛房記駞肩髻小約鬢眉長輕身翻燕羽低語轉鶯簧相見處便難忘肯親度瑶觴夜向闌歌翻郢曲帶換韓香别來音信難將似雲収楚峽雨散巫陽相逢情有在不語意難量些箇事㫁人腸怎禁得恓惶待與伊移根換葉試又何妨贈友宋梅洞鷄犬雲中笑種桃道士虚費春風山城看過鴈春水夢為龍雲上下燕西東久别各相逢向夜深江聲浦樹鐙影漁篷舊逰新悶重重便十分談笑一様飄蓬詩書摧意氣丹鼎賺英雄年未老世無窮春事苦匆匆更與題詩藥市沽酒新豐勸金船張子野流泉宛轉雙開竇帶染輕紗皺何人暗得金船酒擁羅綺前後緑定見花影照並與艷粧争秀行盡曲名休更再歌楊栁光生飛動搖瓊甃隔障笙簫奏須知短景歡無足乂還過清畫翰閣遲歸來傳騎恨留住難久異日鳯凰池上為誰思舊露華玉簪張仲舉瀛洲種玉總付與花神月底深斸琢就瑤笄光映髩雲斜矗㡬度借取搔頭别試漢宫粧束風露冷幽香半襟淡佇䦨曲亭亭雪艷愁獨愛粉沁水筩須撚金粟石上那囬磨㫁爭忍輕觸一自楚客歸來珠履舊㳺誰續秋夢起殘粧半簪墜緑錦園春海棠蒲江醉痕潮玉愛柔英未吐露樷如簇絶艷矜春分流芳金谷風梳雨沐耿空抱夜䦨清淑杜老情踈黄州賦冷誰憐幽獨酲玉環睡醒未足記傳榆試火髙照宫燭錦幄風翻緲春容難續迷紅怨緑漫惟有舊愁相觸一舸東㳺何時更約西飛鴻鵠賦牡丹三犯前人晝長人倦正凋紅漲緑懶鶯忙燕解連環絲雨濛晴放珠簾高捲醉蓬萊神仙笑宴半醒醉綵鸞飛徧雪獅兒碧玉䦨干青油幢日沉香庭院醉蓬萊洛陽畫圖舊見向天香深處猶認嬌面解連環霧縠霞綃間綺羅裁剪醉蓬萊情高意逺怕容易曉風吹散雪獅兒一笑何妨銀臺換蠟銅壺催箭醉蓬萊月城春夀無為趙秘書前人五雲騰曉望凝香畫㦸恍然蓬島解連環玉露氷壺照神仙風表醉蓬萊詩書坐嘯喚淮楚滿城春好雪獅兒雨谷催耕風帘戱鼓家家歡笑醉蓬萊南湖細吟未了看金蓮夜直丹鳯飛詔解連環髩影青青辦功名多少醉蓬萊持杯滿釂聴千里載歌難老雪獅兒試問尊前蟠桃次第紅芳猶小醉蓬萊賀聖朝謔詞宣和遺事清夜録太平無事四邉寧靜狼烟杳國泰民安謾說堯舜禹湯好萬民翹望景龍門上龍燈鳯燭相照只聴得教坊雜劇喧笑藝人巧寳籙宫前呪水書符㫁妖艮岳傍邉竹林深處勝蓬島笙歌閙奈吾皇不候等元宵景色來到只恐後月隂晴未保宣和七年預借元宵時有此詞淳祐三年京尹趙節齋與竹清預放元宵十二日十四日諸巷陌橋道皆編竹為張燈之計臣僚劄子引此詞末二句為次年五月五日金人入冦之䜟十五日早晨遂拆去轆轤金井劉改之翠眉重拂後房深自喚小蠻嬌小綉帶羅垂報道濃粧纔了堂虚夜悄但依約鼓簫聲閙一曲梅花樽前舞徹梨園新調高陽醉山未倒看鞋飛鳯翼釵褪微搯秋滿東湖更西風凉早桃源路杳記流水泛舟曽到桂子香濃梧桐影轉月寒天曉金盞倒垂蓮依約踈林見盈盈春意㡬㸃霜􅀈應是東君試手作芳菲粉面倚天風微笑是日暖雪已晴時人静么鳯翩翩踏碎殘枝幽香渾無着處甚一般雨露獨占清竒淡月踈雲何處不相宜陌上報春來也但緑暗青子離離桃杏應仗先容次第追隨臨江仙引栁耆卿夢覺小庭院冷風浙浙踈雨瀟瀟綺窗外秋聲敗葉狂飄心揺奈寒漏永孤幃悄淚燭空燒無端處是綉衾鴛枕閒過清宵蕭條牽情繫恨爭向年少偏饒覺新來憔悴舊日風標魂銷念歡娯事烟波阻後約方遙還經嵗問怎生奈得如許無聊如魚水京都前人輕靄浮空亂峯倒影㶑灧十里銀塘繞岸垂楊紅樓朱閣相望芰荷香雙雙戱鸂􅈑鴛鴦乍雨過蘭芷汀洲望中依約似瀟湘風淡淡水茫茫動一片晴光畫舫相將盈盈紅粉清商紫薇即修禊飲且樂仙鄉便歸去徧厯鸞坡鳯沼此景也難忘凄凉犯蕭踈野栁嘶寒馬蘆深還見遊獵山勢北來甚時曽到醉魂飛越醉風自咽擁吟鼻征衣暗裂正凄迷天涯羈旅不似㶚橋雪誰念如今老目極寒波坐分黄葉空憐㫁梗夢依依嵗華輕别待擊歌壺怕如意和氷凍折且行行平沙萬里盡是月二西風暗剪荷花碎柔縷不解重緝荒烟㫁浦晴暉零亂半江搖碧悠悠望極忍獨聴秋聲漸急更憐他栁髪蕭條相為動愁色老態今如此獨自留連醉笻遊屐不堪瘦影𣺌天涯儘成行客因甚忘歸謾吹裂山陽夜笛夢三十六陂流水未曽得尾犯一名碧芙蓉栁耆卿夜雨滴空堦孤館夣囬情緒蕭索一片閒愁想丹青難貌秋漸老蛩聲正苦夜將䦨燈花旋落最無端處總把良宵秪恁孤眠却佳人應怪我别後寡信輕諾記得當初剪香雲為約甚時向幽閨深處按新調流霞共酌再同歡笑肯把金玉珍珠博紅情荷花無邉香色記涉江自採錦亭雲蜜剪剪紅衣學舞波心舊曽識一見依然自語流水逺㡬回空憶看倒影窺粧玉潤露痕濕閒立翠屏側愛向人弄芳背酣斜日料應太液三十六宫土花碧清興陵風更爽無數滿汀如昔泛片葉烟浪裏卧横紫笛徴招彭元遜和煥甫秋聲君有逺逰之興為道行路難以感之人間無欠秋風處偏到霜痕月杪風雨船蓬日夜風波未了忽潮生海立又天濶江清欲曉孤逈幽深激揚悲壯浮沉浩𣺌行路古來難貂裘敝匹馬闗山人老錦字未成寒到君邉書到夢倚門囬首兒女燈前娯笑早斟酌萬里封侯寳鏡遲霜照答仇山村寄張叔夏可憐張緒門前栁相看頓非年少三逕已荒凉更如今懐抱薄逰渾未減滿烟水東風殘照古調誰彈古音誰賞嵗華空老京洛染緇塵悠悠意獨對南山一笑只在此山中甚相逢不早瘦吟心共苦知㡬度剪燈窗小何時更聴雨巴山賦草池春曉滿江紅退寓南都杜衍言行録無名無利無榮無辱無煩無惱夜燈前獨歌獨酌獨吟獨笑又值羣山初雪滿又兼明月交光好便假饒百嵗擬如何従他老知富貴誰能保知功業何時了筭簟瓢金玉所爭多少一瞬光隂何足道但思行樂常不早待春來擕酒殢東風眠芳草桐川栁耆卿暮雨初収長川靜征帆夜落臨島嶼蓼烟踈淡葦風蕭索㡬許漁人横短艇盡將燈火歸村落遣行客到此念囬程傷漂泊桐江好烟漠漠波似染山如削遶嚴陵灘畔鷺飛魚躍逰宦區區成底事平生况有雲泉約歸去來一曲仲宣吟従軍樂張子野飄盡寒梅笑粉蝶逰蜂未覺漸迤􅆔水明山秀暖生簾幕過雨小桃紅未透舞烟新栁青猶弱記畫橋深處水邉亭曽偷約多少恨今猶昨愁和悶都忘却􅂸従前爛醉被花迷着晴鴿試鈴風力軟雛鶯㺯舌春寒薄但只愁錦綉闘粧時東風惡黄州上東坡李嬰荆楚風烟寂寞近中秋時候露下冷蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窗牖又誰念江邉有神仙飄零久横琴膝携笻手曠望眼閒吟口抵紛紛萬事到頭何有君不見凌煙冠劍客何人氣貌長依舊歸去來一曲為君吟為君夀春暮東坡晁無咎東武南城新堤固漣漪初溢隠隠遍長林高阜卧紅堆碧枝上殘花吹盡也與君試向江邉覔問向前猶有㡬多春三之一官裏事何時畢風雨外無多日相將泛曲水滿城争出君不見蘭亭修禊事當時座上皆豪逸到如今修竹滿山隂空陳迹春閨周美成晝日移隂攬衣起春幃睡足臨寳鑑緑雲繚亂未炊粧束蝶粉蜂黄都過了枕痕一線紅生玉背畫欄脉脉悄無言㝷棋局重㑹面何時卜無限事縈心曲想秦箏依舊尚鳴金屋芳草連天迷逺望寳香薫被成孤宿最苦是蝴蝶滿園飛無心撲秋望趙元積慘結秋隂西風送絲絲雨濕凝望眼征鴻㡬字暮投沙磧欲往鄉闗何處是水雲浩蕩連南北但修眉一抹有無中遙山色天涯路江上客腸已㫁頭應白空搔首興嘆莫年離隔欲待忘憂除是酒奈酒行欲盡愁無極便挽將江水入樽罍澆胷臆程正伯門掩垂楊寳香度翠簾重疊春寒在羅衣初試素肌猶怯薄靄籠花天欲暮小風送角聲初咽但獨衾幽愰悄無言傷初别衣上雨眉間月滴不盡顰空切羡栖梁歸燕入簾雙蝶愁緒多於花絮亂柔腸過似丁香結問甚時重理錦囊書従頭説前人水逺山明秋容淡不禁搖落况樓臺高處晩凉猶薄月在衣裳風在袖氷生枕簟香生幙筭四時佳處是清秋須行樂東籬下西窗角㝷舊菊催新酌笑廣平何事對秋消索揺葉聲聲深院宇折荷寸寸閒池閣待歸來閒把朩犀花重薫却晁無咎華髮春風長歌罷傷今感昨春正好瑶墀已歎侍臣冥寞牙帳塵昏餘劍㦸翠幃月冷虚絃索記往嵗龍坂誤曽登今飄泊賢人命従來薄流年竟赴誰託繞南枝身似未眠飛鵲射虎山邉追舊迹騎鯨海上㝷前約便與世江湖永相忘還堪樂詠雨張安國斗帳高眠寒窗靜瀟瀟雨意南樓近更移三鼓漏傳一水㸃㸃不離楊栁外聲聲只在芭蕉裏也不管滴破故鄉心愁人耳無似有逰絲細聚復散真珠碎天應分付與别離滋味破我一床蝴蝶夢輸他雙枕鴛鴦睡向此際别有好思量人千里二秋懐秋滿灕源瘴雲凈曉山如簇動逺思空江小艇高丘喬朩䇿䇿西風雙鬢底暉暉斜日朱䦨曲試側身囬首望京華迷南北思歸夣天邉鵠逰宦事蕉中鹿想一年好處砌紅堆緑羅帕分柑霜落齒氷盤剥芡珠盈掬借春纎縷鱠搗香虀新蒭熟三千古凄凉興亡事但悲陳迹凝望眼呉波不動楚山空碧巴滇緑駿追風逺武昌雲斾連天赤笑老姦遺臭到如今留空壁邉書靜烽烟息通軺傳銷鋒鏑仰太平天子聖明無敵蹙踏揚州開帝里渡江天馬龍為匹看東南佳氣鬰葱傳千億梅程過春欲來時長是與江梅有約還又向竹林踈處一枝開却對酒漸驚身老大看花應念人離索但十分沉醉祝東君長如昨芳草渡孤舟泊山斂黛天垂幕黯銷魂無奈暮雲殘角便好折來和雪戴莫教酒醒隨風落待殷勤留此寄相思誰堪託蔣竹山秋本無愁奈客裏秋偏岑寂身老大忺敲秦缶懶移陶甓萬悞曽因踈處起一閒且向貧中覔笑新來多事是征鴻聲嘹嚦雙户掩孤燈剔書束架琴縣壁笑人間無此小窗幽閴浪逺微聴葭葉響雨殘細數梧梢滴正依稀夢到故人家誰横笛毛栞潑火初収秋千外輕烟漠漠春漸逺緑楊芳草燕飛池閣已著單衣寒食後夜來還是東風惡對空山寂寂杜鵑啼棃花落傷别恨閒情作十載事驚如昨向花前月下共誰行樂飛葢低迷南苑路湔裠悵望東城約但老來憔悴惜春心年年覺幽居吕居仁東里先生家何在山隂溪曲對一川平野數椽茅屋昨夜岡頭新雨過門前流水清如玉抱小橋回合栁參天搖新緑踈籬下叢叢菊虚簷外簫簫竹嘆古今得失是非榮辱須信人生歸去好世間萬事何時足問此春春醖酒何時今朝熟僧晦庵擾擾勞生待足何時是足據見定隨家豐儉便堪龜縮得意濃時休進步須防世事多畨覆枉教人白了少年頭空碌碌誰不願黄金屋誰不愛千鍾粟奈五行不是這般題目枉使心機空計較兒孫自有兒孫福又不須採藥訪蓬萊但寡慾杜鵑康伯可惱殺行人東風裏為誰啼血正青春未老流鶯方歇蝴蝶枕前顛倒夢杏花枝上朦朧月問天涯何事苦闗情思離别聲一喚腸千結閩嶺外江南陌正長堤楊栁翠條堪折鎮日叮嚀千百遍只將一句頻頻說道不如歸去不如歸傷情切冩懐岳飛怒髮衝冠凭欄處瀟瀟雨歇擡望眼仰天長嘯壯懐激烈三十功名塵與土八千里路雲和月莫等閒白了少年頭空悲切靖康耻猶未雪臣子恨何時滅駕長車踏破賀闌山缺壯志飢飱仇冦肉笑談渇飲匃奴血待従頭収拾舊山河朝金闕旅思張仲宗春水連天桃花浪㡬番風惡雲乍起逺山遮盡晩風還作緑遍芳洲生杜若楚帆帶雨烟中落認向來沙觜共停橈傷飄泊寒猶在衾偏薄腸欲㫁愁難着倚蓬窗無寐引盃孤酌寒食清明都過却可憐孤負年時約小樓日日望歸舟人如削上䕫師樂秘閣生日李居厚玉帳西來道前是綉衣使者逰覧處秋風鼓吹自天而下湘水得霜清可鑒巫峯過雨森如畫有神仙佳致在胸襟真瀟洒荆州寳元無價䕫門政長多暇聴談兵樽爼百川傾㵼此日夀觴容我勸它年樞柄逺公把趂桂花時節去朝天香隨馬㳺子明一舸歸來何太晚鬢絲如織謾嘆息凄凉往事盡成陳迹山迫暮烟浮紫翠溪搖寒浪翻金碧看長虹渇飲下青冥危欄濕誰可住烟蘿側俗士駕當回勒伴岩扃須是碧雲仙客風月已供無盡藏奚山更衍清凉國恨謫仙蘓二不曽來無人說春晩劉叔擬着意留春留不住春歸難戀最苦是梅天烟雨麥秋庭院嫩竹隂濃鶯出谷柔桑采盡蚕成繭奈沈腰寛盡有誰知難消遣幽閣恨雙眉斂香牋寄飛鴻逺向風簾羞見一雙歸燕翠被閒將情做夣青樓賺得恩成怨對尊前莫惜喚瓊姬持盃勸暮春辛幼安㸃火櫻桃照一架荼䕷如雪春正好見龍孫穿破紫苔蒼壁乳燕引雛飛力弱流鶯喚友嬌聲怯問春歸不肯帶愁歸腸千結層樓望春山叠家何在烟波隔抱古今遺恨向他誰說蝴蝶不傳千里夢子規呌㫁三更月聴聲聲枕上勸人歸歸難得史邦卿緩轡西風歎三宿遲遲行客桑梓外鋤耰漸入栁坊花陌雙闕逺騰龍鳯影九門空鎻鴛鸞翼更無人擫笛傍宫墻苔花碧天相漢民離國天厭敵臣離徳趂建瓴一舉再収鰲極老子豈無經世術詩人不預平戎䇿辦一襟風月看升平吟春色劉潜夫金甲琱戈記當日轅門初立磨盾鼻一揮千帋龍蛇猶濕鐵馬曉嘶營壁冷樓船夜渡風濤急有誰憐猿臂故將軍無功級平戎䇿従軍什零落盡慵収拾把茶經香傳時時温習生怕客談榆塞事且教兒誦花間集歎臣之壯也不如人今何及赤壁懐古戴式之赤壁磯頭一畨過一畨懐古想當時周郎年少氣吞區宇萬騎臨江貔虎噪千艘烈炬魚龍怒巻長波一鼓困曹瞞今如許江上渡江邉路形勝地興亡處覽遺蹤勝讀史書言語㡬度東風吹世換千年往事隨潮去問道傍楊栁為誰春揺金縷齊雲月酌盧申之樓倚晴空炎雲净晩來風力滄海外等閒吹上滿輪寒璧河漢低垂天欲近乾坤浩蕩秋無極凭欄干衣袂拂青冥知何夕登眺地追疇昔呉越事皆陳迹對清光秪有醉吟消得萬古悠悠惟月在浮生衮衮空頭白自騎鯨仙去有誰知遙相憶秋感宋謙父舉扇西風又十載重逰秋浦對舊日江山錯愕鬢絲如許世事興亡空感慨男兒事業誰堪數被老天開眼看人忙成今古江上路喧鼙鼓山中地紛豺虎謾乾坤許大着身何處名利等成狂夢寐文章亦是間言語賴雙投酒熟蟹螯肥忘羈旅送李御帶珙呉毅甫紅玉階前問何事翩然引去湖海上一汀鷗鷺半帆烟雨報國無門空自怨濟時有䇿従誰吐過垂虹亭下繫扁舟鱸堪煮􅂸一醉留君住歌一曲送君路遍江南江北欲歸何處世事悠悠渾未了年光冉冉今如許試舉頭一笑問青天天無語風泉峽觀泉劉坼父雲壑飛泉蒲根下懸流陸續堪愛處石池湛湛一方寒玉暑際直當磐石坐渇來自引懸瓢掬聴泠泠清響㵼淙琤勝絲竹寒照膽消炎燠質徹骨無塵俗笑幽人忻翫滯留空谷静坐時看松䑕飲醉眠不礙山禽浴喚仙人伴我酌瓊瑶餐秋菊趙介之去去春光留不住情懐索寞那堪是日長人困雨餘寒薄葉底青青梅勝豆枝頭顆顆花留蕚歎流年空有惜春心憑春酌歌共酒誰酧酢非與是忘今昨且隨時隨分强歡尋樂世事燕鴻南北去人生烏兔東西落問故園不負送春期明年約郭承禧五十頭顱早已覺飛騰景暮愁眼看蜂黄蝶粉草烟花露莫做陽臺雲雨夢休懐渭北春天樹悵城闉多少踏青人紅塵路懐古恨憑書訴傾國貌障羞妬記山隂陳迹羣賢星聚對景裁詩真謾興看花不飲成虚負問落紅千㸃總隨流歸何處春雨汪紫巖檢㸃春光隂雨過三分之一従頭數元宵燈夕都無晴日不碍郊原肥草緑但漫丘壑沉雲黒那東君忒煞沒綱維春無力燕忙甚泥渾濕蜂愁甚脾無蜜更兩旬又是梨花寒食蔫杏殷桃吾不較豈堪浸爛連疇麥望前村白鷺襯霞紅探晴色呉履齋栁帶榆錢又還過清明寒食天一笑滿園羅綺滿城簫笛花樹得晴紅欲染逺山過雨清如滴問江南池舘有誰來江南客烏衣巷今猶昔烏衣事今誰覔但年年燕子晩烟斜日抖擻一春塵土債悲凉萬古英雄迹且芳樽隨分趂芳時休虚擲秋興元遺山老樹荒臺秋興動悠然獨酌秋老江山憔悴鬢華先覺人到中年元易感眼看華屋歸零落筭世間惟有醉鄉民平生樂凌浩蕩觀寥廓月為燭雲為幄盡百川都釀不供杯杓身外虚名將底用古來已錯今尤錯喚野猿山鳥一時歌休休莫二天上飛烏阿誰遣東生西沒明鏡裏朝為青髮暮為華髮弱水蓬萊三萬里夢魂不到金銀闕更㡬人能有謝家山飛仙骨山鳥哢林花發玉盃冷秋雲滑彭殤共一醉不爭毫末鞭石何年滄海過三山只是尊中物暫放教老子據胡床邀明月三江上窪尊人道有浮休遺跡尊爼地江山如畫百年岑寂白鶴重來城郭在山花山鳥渾相識任與君載酒半山亭追疇昔人易老時難得歡未減悲還及筭身前身後杳無終極一笑何須留故事千年誰復知今日持醉來横卧隴頭雲林間石段克已欲把長繩維白日暫留春住親友面一回相見一回非舊擾擾膠膠塵世事不如人意十常九向斜陽無語倚危樓空搔首活國手談天口都付與尊中酒這情懷又是去年時候風外絲絲飛絮亂栁邉湛湛長江去問老來還有㡬多愁愁如許侯彦周困頓春眠無情思夢魂飄泊簷外雨霏霏冉冉乍晴還落山黛四圍頻入眼栁絲一縷低縈閣念沈即多感更傷春腰如削風入户香穿箔花似舊人非昨任遊蜂雙燕經營拂掠海濶錦魚傳不到洞深紫鳯期難約謾綵牋牙管倚西窗題紅葉括盧㒰有所思林政大為憶當時沉醉裏青樓弄月閒想像繡幃珠箔魂飛心折羞向姮娥談舊事㡬經三五盈還缺望翠眉蟬鬢一天涯傷離别㝷昨夢巫雲結流别淚湘江咽對花深兩岸摠成悲切試與含愁彈緑綺知音不遇絃空絶窗前一夜寄相思梅花發夀大山兄小山七十人稀嘗記得少陵舊語誰知道五園庵主夀今如許書底青瞳如月様鏡中黒鬢無雙處與人間世味不相投神仙侣文漢史詩唐句字晉帖碑周鼓這千年勲業一年一部􅁮􅁮紫芝商隠皓猗猗緑竹淇瞻武問先生何處更高歌凭椿樹段成已料峭東風吹醉面向人如舊凝竚立野禽聲裡無言搔首庭下梅花開盡也春痕已到江邉栁待人閒事了覔清懽身先朽莬裘計何時有林下約床頭酒怕流年不覺鬢邉還透往事不堪重記省舊愁未㫁新愁又把春光分付少年場従今後别大名親舊許魯齋河上徘徊未分袂孤懐先怯中年後此般憔悴怎禁離别淚苦滴成襟畔濕愁多擁就心頭結倚東風搔首謾無聊情難說黄巻内消白日青鏡裏増華髮念嵗寒交友故山烟月虚道人生歸去好誰知美事雙難得計従今佳㑹㡬何時長相憶牡丹彭㢲吾翠袖餘寒早添得銖衣㡬重何須怪妍華都謝更為誰容銜盡呉花成鹿苑人間不恨雨和風便一枝流落到人家清淚紅山霧濕倚熏籠垂㔩葉鬢酥融恨宫雲一朶飛過空同白日長閒青鳥在楊家花落白蘋中問故人忍更負東風尊酒空金陵懐古薩天錫六代豪華春去也更無消息空悵望山川形勝已非疇昔王謝堂前雙燕子烏衣巷口曽相識聴夜深寂寞打孤城春潮急思往事愁如織懐故國空陳迹但荒烟衰草亂鴉斜日玉樹謌殘秋霞冷胭脂井壊寒螿泣到如今只有蔣山青秦淮碧燈花胡惠齋暝靄黄昏燈檠上熒熒初炙銀熖裊孤光分夜寸心凝碧留照嬌顔歡笑偶上元慶賞嬉逰夕笑聚螢積雪與偷光寒儒憶蝶眷戀成何得花傳喜知何日聴憐家昨夜扣閽誰覔熖短始知新月上搖紅孤館因風急恨那人别後不成眠時時剔南京夷山驛丙子之變宫娥多北遷王昭儀太液芙蓉渾不似舊時顔色曽記得恩承雨露玉樓金闕名播蘭簮妃后裏暈潮蓮臉君王側忽一朝鼙鼓掲天來繁華歇龍虎散風雲滅千古恨憑誰說對山河百二泪霑襟血驛舘夜驚塵土夢宫車晩碾闗山月問嫦娥相顧肯相容隨圓缺佩楚軒客談昭儀下張瓊英題梅子黄時雨病子思歸張叔夏流水孤村愛塵事頓消來訪深隠向醉裏誰扶滿身花影鷗鷺驚看相比瘦近來不是傷春病嗟流景竹外野橋猶繫烟艇誰引斜川歸興便啼鵑總少無奈時聴待掉擊空明魚波千頃彈㫁琵琶留不住愁人最是黄昏近江風𦂳一行栁隂吹暝雪明鳷鵲夜道君望五雲多處春探開閬苑别就蓬島正梅雪韻清桂月光皎鳯帳龍簾縈嫩風御座深翠金間纔半天中香泛千花燈掛百寳聖時觀風重臘有簫鼓沸空錦繡匝道競呼盧氣貫彫歡笑袖裏金錢擲下來侍宴歌太平睿藻願年年此際迎春不老雪梅香秋思栁耆卿景蕭索危樓獨倚面晴空動悲秋情緒當時宋玉應同漁市孤烟裊寒碧水村殘葉舞愁紅楚天濶浪浸斜陽千里溶溶臨風想佳麗别後愁顔鎮斂眉峯可惜當年頓乖雨跡雲蹤媚態妍恣正歡洽落花流水忽西東無限恨相思意盡分付征鴻一枝春除夕竹爆驚春競喧闐夜起千門簫鼓流蘓帳暖翠鼎緩騰香霧停杯未舉奈剛要送午詩句應自賞歌字清圓未誇上林鶯語従它嵗窮日暮縦閒愁怎減劉郎風度屠蘇辨了迤􅆔栁忻梅妬宫壼未曉早驕馬繡車盈路還又把月夕花朝自今細數六么令小山日高春睡喚起懶裝束年年落花時候慣得嬌眠足學唱宫梅便好更暖銀笙逐黛娥低緑堪教人恨却似江南舊時曲常記東樓夜雪翠幕遮紅燭還是芳酒盃中一醉光隂促曽笑陽臺夢短無計怜香玉此歡難續乞求歌罷借取歸雲畫堂宿二雪殘風信悠颺春消息天涯倚樓新恨楊栁㡬絲碧還是南雲雁少錦字無端的寳釵瑶席彩絃聲裏􅂸作尊前未歸客遙想踈梅此際月底香英宻别後誰遶前溪手揀繁枝摘莫道傷高懐逺付與臨風笛儘堪愁寂花時往事更有多情箇人憶栁耆卿澹烟殘照搖拽溪光碧溪邉殘桃深杏迤邐深春色昨夜扁舟泊處枕展當灘磧波聲漁笛驚回好夢夢裏欲歸歸不得展轉翻成無寐因此傷行役思念多媚多嬌咫尺千山隔都為深情宻愛不忍輕離拆好天良夕鴛幃寂靜筭得也應暗思憶重九周美成快風収雨亭館清殘燠池光靜横秋影岸栁如新沐聞道宜城酒美昨日新醅熟輕鑣相逐衝泥策馬來折東籬半開菊華堂花艷對列一一驚即目歌韻巧共泉聲間雜琮琤玉惆悵周即已老莫唱當時曲幽歡難卜明年誰徤更把茱萸再三囑賀方回暮雲消散簾捲畫堂曉殘薰燼蠟隠映綺席金壺倒塵送行鞭裊裊醉指長安道波平天杳蘭丹欲上回首離愁滿芳草身外浮名擾擾已負狂年少無奈風月多情此去應相笑心記歌聲縹緲翻是相思調明年春早宛溪楊栁依舊青青為誰好京中清明李琳淡烟疎雨香逕𣺌啼鴂新晴晝簾閒捲燕外寒猶力依約天涯芳草染得春風碧人間陳迹斜陽今古㡬縷㳺絲趂飛蝶栁向尊前起舞又覺春如客翠䄂折取嫣紅笑與簮華髮回首青山一㸃簷外寒雲疊梨花淡白栁花飛絮夢繞闌干一株雪應天長重陽栁耆卿殘蟬聲漸絶傍碧砌脩梧敗葉微脱風露淒清正是登高時節東籬霜乍結綻金蕋嫩香堪折聚宴處落㡌風流未饒前哲把酒與君説恁好景佳辰怎忍虚設休效牛山空對江天凝咽塵勞無暫歇遇良㑹剰偷歡悦歌未闋盃興方濃莫便中輟葉夢得松陵秋已老正栁岸田家酒醅初熟鱸鱠蓴羮萬里水天相續扁舟凌浩渺寄一葉暮濤吞沃青蒻笠西塞山前自翻新曲來往未應足便細雨斜風有誰拘束陶冩中年何待更須絲竹鴟夷千古意筭入手比來尤速最好是千㸃雲峯半篙澄緑留别詞話雕鞍成謾駐望㫁也不歸院深天暮倚遍舊日曽共憑肩門户踏青何處所想醉拍春衫歌舞征斾舉一步紅塵一歩回顧行行愁獨語想媚容今宵怨即不住來為相思却又空將愁去人生無定據嘆後㑹不知何處愁萬縷憑仗東風和淚吹與駐馬聴亦名應天長栁耆卿鳯枕鴛幃二三載如魚似水相知良天好景深憐多愛無非盡意依隨奈何伊恣性靈忒煞些兒無事孜煎萬回千度怎免分離而今漸疎漸逺雖悔難追謾恁寄消寄息終久奚為也擬重論繾綣爭奈翻覆思惟縦再㑹只恐恩情難似當時玉漏遲宋子京杏香消散盡須知自昔都門春早燕子來時綉陌亂鋪芳草蕙圃妖桃過雨弄笑臉紅篩碧沼深院悄緑楊巷陌鶯聲爭巧蚤是賦得多情更遇酒臨花鎮辜歡笑數曲欄干故國謾勞凝眺漢外微雲盡處亂峯鎻一竿脩竹間琅玕東風淚零多少韓魏公子都尉嘉彦才質清秀頗有豪氣因言語間與公主參啇安置鄧州泊春來感懐作此詞都下盛傳因教池開公主出逰教池李師師獻此詞以侑觴聲韻悽惋公主問辭之所由師師具道其意公主因縁感疾帝乃遣使速召嘉彦還都程正伯一春渾不見那堪又是花飛時節忍對危欄數曲暮雲千叠門外星星栁眼看誰似當時風月愁萬結憑誰為我慇懄低説不是慣却春心奈新燕傳情舊鶯饒舌冷篆餘香莫放等閒消歇縦使繁紅褪盡猶有酴醿堪折魂夢切如今不奈飛來蝴蝶滿庭芳秋思景叔原南苑吹花西樓題葉故園懽事重重凭欄秋思閒記舊相逢㡬處歌雲夢雨可憐便流水西東别來久淺情未有錦字繫征鴻年光還少味開殘檻菊落盡溪桐謾留得樽前淡月凄風此恨誰堪說與清愁付緑酒杯中佳期在歸時待把香袖看啼紅警悟東坡蝸角虚名蠅頭微利筭來着甚干忙事皆前定誰弱又誰强且趂閒身未老儘教我些子踈狂百年裏渾教是醉三萬六千塲思量能㡬許憂愁風雨一半相妨又何須抵死説短論長幸對清風皓月苔裀展雲幙高張江南好千鍾美酒一曲滿庭芳二歸去來兮吾歸何處萬里家在岷峨百年强半來日苦無多坐見黄州載閏兒童盡楚語呉歌山中友鷄豚社飲相勸老東坡云何當此際人生底事來往如梭待閒看秋風洛水清波好在堂前細栁應念我莫剪柔柯仍傳語江南父老時與㬠漁簑三歸去來兮清溪無底上有千仞嵳峩畫樓東畔天逺夕陽多老去君恩未報空囬首彈鋏悲歌船頭轉長風萬里歸馬駐平坡無何何處是銀潢盡處天女停梭問人間何事乆戯風波顧謂同來穉子應爛汝腰下長柯青衫破羣仙笑我千縷掛烟簑余居黄五年將赴臨汝作滿庭芳一篇别黄州既至南都䝉㤙放歸陽羡復作一篇春景少㳺晩兔雲開春隨人意驟雨纔過還晴古臺芳榭飛燕蹴紅英舞困榆錢自落鞦韆外緑水橋平東風裏朱門映栁低按小秦箏多情行樂處珠鈿翠葢金轡紅纓漸酒空醽醁花困蓬瀛豆蔻梢頭舊恨十年夢屈指堪驚凭欄久踈烟淡月微映百層城二山抹微雲天連衰草畫角聲㫁譙門暫停征棹聊共引離尊多少蓬萊舊事空回首烟靄紛紛斜陽外寒鴉數㸃流水繞孤村銷魂當此際香囊暗解羅帶輕分謾贏得青樓薄倖名存此去何時見也襟袖上空惹啼痕傷情處高城望㫁燈火已黄昏三紅蓼花繁黄蘆葉亂夜深玉露初零霽天空濶雲淡楚江清獨棹孤篷小艇悠悠過烟渚沙汀金鈎細絲綸慢捲牽動一潭星時時横短笛清風皓月相與忘形任人笑生涯泛梗飄萍飲罷不妨醉卧塵勞事有耳誰聴江風靜日高未起枕上酒微醒四碧水驚秋黄雲凝暮敗葉零亂空堦洞房人靜斜月照徘徊又是重陽近也㡬處處砧杵聲催西窗下風搖翠竹疑是故人來傷懐増悵望新懽易失往事難猜問籬邉黄菊知誰為開謾道愁須殢酒酒未醒愁已先回憑闌久金波漸轉白露㸃蒼苔山谷初綰雲鬟才勝羅綺便嫌栁巷花街占春才子容易託行媒其奈風流債負烟花部不免差排劉即恨桃花片片流水惹塵埃風流賢太守能籠翠羽宜醉金釵且留取垂楊掩映㕔堦直待朱轓去後従伊便窄襪弓鞋知恩否朝雲暮雨還向夢中來夏景周美成風老鶯雛雨肥梅子午隂嘉樹清圓地卑山近衣潤費爐烟人靜鳥鳶自樂小橋外新緑濺濺凭欄久黄蘆苦竹擬泛九江船年年如社燕飄流瀚海來寄修椽且莫思身外長近樽前憔悴江南倦客不堪聴急管繁絃歌筵畔先安枕簟容我醉時眠李西美一種江梅偷傳春信夜來先綻南枝嫩苞寒蕚粧㸃綴胭脂雪裏渾迷素質明月下惟有香肌山村路人家舍窄低亞水邉籬偏宜夀陽女新粧淡淡粉面曽施更胡笛羌管塞曲爭吹陌上行人暫聴香風動都入愁眉音書杳天涯望㫁折寄擬憑誰和左丞范致虚宋徽宗詞話寰宇清夷元宵逰豫為開臨御端門暖風搖曳香氣靄輕氛十萬鈎陳燦爛鈞臺外羅綺繽紛歡聲裏燭龍銜耀黼藻太平春靈鰲擎綵岫氷輪逺駕初上祥雲照萬宇嬉逰一視同仁更起維垣大第通宵燕調燮良臣従兹慶都俞賡載千載樂昌辰陳瑩中擾擾怱怱紅塵滿䄂自然心在溪山尋思百計真箇不如閒浮世紛華夢影囂塵路來往循環江湖手長安障日何似把魚竿盤旋那忍去他邦縦好終異鄉闗向七峯回首清淚班班西望烟波萬里扁舟去何日東還分擕處相期痛飲莫放酒杯慳二淮葉繽紛江烟濃淡别樽同倒寒暉未逢春信霜露惹征衣往事元無是處何須待回首知非春鵑語従來勸我常道不如歸家山何處近江樓簾棟夕巻朝飛問西江筍蕨何似鱸肥且置華胥舊夢忘言處千古同時君知我平生心事相契古來稀三槁朩形骸浮雲踪跡一年兩到京華又還乗興往看洛陽花聞道鞋紅最好春歸後終委塵沙忘言處花開花謝不似我生涯年華留不住饑飡困寢觸處為家這一輪明月本自無瑕隨分冬裘夏葛都不㑹赤水黄芽誰知我春風一拐談笑有丹砂四跛子年來形容何似儼然一部髭鬚世間許大拐上做工夫選甚南川北縣逢着處酒滿葫蘆熏熏醉不知明日何處度明晡洛陽花看了歸來帝里一事全無又還與瓠羮再作門徒驀地思量下水浪網上蘆蓆横舖呵呵笑睢陽門外有箇大南湖上舒信道紅葉飄零寒烟踈淡樓臺半在雲間望中風景圖畫也應難又是重陽過了東籬下黄菊闌珊陶潜病風流載酒秋意與人閒霞冠欹倒處瑶臺唱罷如夢中還但醉裏贏得滿眼青山華髮看看滿也留不住當日朱顔平生事従頭話了獨自却凭欄趙徳麟玉枕生凉金釭傳晚敗葉飛破新秋雨餘翻浪𣺌𣺌阻行舟暫繫汀洲側畔風夜起荻葉添愁銀屏逺龍香漸盡還似夢揚州更籌何太永當年情事今日堪酬最苦恨紅樓笑我飄浮為寄相思細字教字字愁蹙眉頭凄凉久漁人唱曉隨月過横溝晁次膺緑遶羣峯紅搖千柄夜來暑雨初収共君乗興輕舫信悠悠且盡一樽别酒荷香裏滿酌輕謳明朝去征帆夜落何處好汀洲風流吾小阮朝辭東觀夕向南州况聖時爭教賈傅淹留若過潯陽亭上琵琶淚莫灑清秋堤邉栁従今愛惜留待繫歸舟木犀向伯恭月窟蟠根雲巖分種絶知不是塵凡琉璃剪葉金粟綴花繁黄菊周旋避舍友蘭蕙羞殺山樊清香逺秋風十里鼻觀巳先參酒蘭聴我語平生半世江北江南經行處無窮渌水青山常被此花相惱思共老結屋中間不因爾薌林底事㳺戯到人寰沈㑹宗踈才藏鍾輕烟籠角㡬家簾幕燈光暮砧聲㫁空璧鎻寒螿入袂西風陣陣徹醉骨都不勝凉欄干外依稀嫩菊月色冷如霜仙鄉何處是雲深路杳不念劉郎但畫橋流水依舊垂楊要見時時便見一向價只作尋常爭知道愁腸淚眼獨自箇重陽二五㪷相逢千鍾一飲古今樂事無過香生銀瓮浮蟻浴春波瀲灧光凝醆面輕風皺淺碧宫羅乗歡處傾罍痛飲珠貫引清歌云何君不飲良辰美景聚少離多怎忍放春風容易蹉跎但願一樽常共花隂下急景如梭須沉醉彫鞍歸去爭看醉顔酡與周熟仁試賜茶甘露寺米元章雅燕飛觴清譚揮坐使君高㑹羣賢宻雲雙鳯初破縷金團窗外爐烟自動開瓶試二品香泉輕淘起香生玉麈雪濺紫甌圓嬌鬟宜美盻雙擎翠袖穏步紅蓮坐中客翻愁酒醒歌闌㸃上紗籠畫燭花驄弄月影當頻相顧餘歡未盡欲去且留連古今詞話風急霜濃天低雲淡過來孤雁聲切雁兒且住畧聴自家説你為離羣到此我共箇人人才别松江岸黄蘆叢裏天更待飛雪聲聲腸欲㫁和我也㸃㸃珠淚成血這一江流水流也嗚咽告你高飛逺舉前程事永無磨折休煩惱飄零散聚終有見時節臨安晚登舟程正伯南月驚烏西風破鴈又還是秋滿平湖採蓮人盡寒色戰菰蒲舊信江南好景一萬里輕覔蓴鱸誰知道呉儂未識蜀客已情孤憑高増悵望湘雲盡處都是平蕪問故鄉何日重見吾廬縦有荷紉芰製終不似菊短籬踈歸情逺三更雨夢依舊遶庭梧吉席胡浩然瀟灑佳人風流才子天然分付成雙蘭堂綺席燭影搖熒煌數幅紅羅繡帳寳粧篆金鴨焚香分明是芙蕖浪裏一對浴鴛鴦歡娯當此際山盟海誓地久天長願五男二女七子成行男作公卿將相女須嫁君宰侯王従兹去榮華冨貴福禄夀無疆和胡明仲桂花詞劉彥沖秋入微隂凉生平逺小山愁絶天南似聞還㫁飛䇿遍千岩葉底輕黄纂纂惱人是微裂芳緘翛然勝清真冷淡無艷寄塵凡澄潭欹兩岸波光搖動碧影相參任西風十里吹度松杉我自寒灰槁朩凝神處不覺醺酣歸來晚飛花無迹明月滿空涵王民瞻宿雨初収晚風微度萬家簾捲青烟暗塵隨馬人物似神仙試問天公借月天須放明月教圓應移下廣寒宫殿燈火接星躔盧川元古郡當時太守賔従俱賢到如今萬井歌吹喧闐花下紅粧賣酒時相遇曲水橋邉誰知道山城父老重見中興年促織兒張功甫月洗高梧露􅄎幽草寳釵樓外秋深土花沿翠螢火墜墻隂靜聴寒聲㫁續微韻轉凄曀悲沉爭求侣殷勤勸織促破曉機心兒時曽記得呼燈灌穴斂步隨音任滿身花影猶自追㝷擕向華堂戲闘亭臺小籠巧粧金今休説従渠牀下良夜聴孤吟送張守漢卿赴召李子召麥秀連雲桑枝重緑史君佳政流傳鳯衘丹詔來自九重天千里歡騰祖帳棠隂外多少攀轅津亭路紞如五鼓難駐鄧侯船光華家世事門中列㦸圮上遺編况建炎勲業圖畫凌烟此去朝端濟美看平步兩兩台躔須知道中興盛治主聖賴臣賢留别劉伯􅃂栁裊金絲梨鋪香雪一年春事方中燭前一見花艷覺羞紅枕臂香痕未落舟横岸作計匆匆明朝去暮天平水雙槳碧雲東隔離歌一闋琵琶聲㫁燕子樓空歎陽臺夢杳行雨無踪後㑹芙蕖未老従今去日望歸鴻愁如織㫁腸啼鴂饒舌訴東風元夕上邵武王守子文戴式之草朩生春樓臺不夜團團月上雲霄太平官府民物共逍遙指㸃江梅一笑㡬畨負雨秀風嬌今年好花邉把酒歌舞醉元宵風流賢太守青雲志氣玉樹丰標是神仙班裏舊日王喬出奉版輿行樂金蓮照十里笙簫収燈後看看丹詔催入聖明朝春感呉毅甫漠漠春隂踈踈春雨鵓鳩喚起春眠小園人靜獨自倚秋千又見飄紅墮雪芳徑裏都是花鈿年年事閒愁閒悶挂在緑楊邉㝷思都遍了功名竹帛富貴貂蟬但身為利鎻心被名牽爭似依山傍水數椽外二頃良田無縈絆炊粳釀秫長是好花天懐舊呉益恭宿雨滋蘭輕風颭栁新來隨處和融幽蘭曲逕花氣巧相通燕子纔飛又語帶芹泥時㸃芳叢微中酒日長睡起心事在眉峯年年春好處聫鑣蕩槳拾翠挼紅任金貂醉脫不放杯空誰信風流一别當時事已逐飛鴻雲山晚闌干罷倚烟寺起踈鍾李菩薩十月牡丹汴京遇仙樓元裕之梅澗詩話天上殷韓解羈官府爛逰舞榭歌樓開花讓酒來看帝王州常見牡丹開後獨占㫁穀雨風流仙家好霜天槁葉穠艷破春柔狂僧誰借手一杯喚起緑怨紅愁天香國艷梅菊背人羞盡掲紗籠䕶日容光動玉􅕸瓊舟都人士女年年十月常記遇仙樓殘梅李易安小閣藏春閒窗鎻晝畫堂無限深幽篆香燒盡日影下簾鈎手種江梅漸好又何必臨水登樓無人到寂寥恰似何遜在揚州従來知韻勝難堪雨藉不耐風揉更誰家横笛吹動濃愁莫恨香銷雪減須信道掃跡情留難言處良宵淡月踈影尚風流僧兒廣漢營妓團菊包金叢蘭減翠畫成秋暮風烟使君歸去千里倍􅏰然兩度朱旛鴈水全勝得陶侃當年如何見一時盛事都在送行篇愁煩梳洗懶㝷思陪宴花月湖邉有多少風流往事縈牽聞道霓旌羽駕看看是玉局神仙應相許冲雲破霧一到洞中天唐漢營妓僧兒秀外惠中善填詞有戴厶兩作漢守寵之既而得請玉局之笥以歸僧兒作此見意花草稡編巻十七

body:
  text: 花草稡編巻十一明陳耀文輯小令玉樓春春暮溫飛卿家臨長信往來道乳燕雙雙拂煙草油壁車輕金犢肥流蘇帳曉春雞報籠中嬌鳥暖猶睡簾外落花閒不掃衰桃一樹近前池似惜容顔鏡中老春睡歐陽炯日照玉樓花似錦樓上醉和春色寢綠楊風送小鶯聲殘夢不成離玉枕堪愛晚來韶景甚寳柱秦箏方再品青蛾紅臉笑來迎又向海棠花下飲顧夐月照玉樓春漏促颯颯風揺庭砌竹夢驚鴛被覺來時何處管絃聲斷續惆悵少年遊冶去枕上兩蛾攢細綠曉鶯簾外語花枝背帳猶殘紅蠟燭二栁映玉樓春日晚雨細風輕煙草軟畫堂鸚鵡語雕籠金粉小屏猶半掩香滅繡幃人寂寂倚檻無言愁思逺恨郎何處縱疎狂長使含啼睂不展三拂水雙飛來去燕曲檻小屏山六扇春愁凝思結睂心綠綺懶調紅錦薦話別情多聲欲顫玉筯痕留紅粉面鎭長獨立到黄昏却怕良宵頻夢見魏承班寂寂畫堂梁上燕高巻翠簾横數扇一庭春色惱人來滿地落花紅幾片愁倚錦屏低雪面淚滴繡羅金縷線好天涼月盡傷心為是玉郎長不見與花蕊夫人夜起避暑摩訶池上孟㫤漫叟詩話冰肌玉骨清無汗水殿風來暗香滿簾開明月獨窺人欹枕釵横雲鬢亂起來瓊户啟無聲時見疎星渡河漢屈指西風幾時來只恐流年暗中換李後主晚粧初了明肌雪春殿嬪娥魚貫列笙歌吹斷水雲閒重按霓裳歌遍徹臨春誰更飄香屑醉拍闌干情未切歸時休照燭花紅待放馬蹄清夜月春景晏同叔集無綠楊芳草長亭路年少抛人容易去樓頭殘夢五更鐘花外離愁三月雨無情不似多情苦一寸還成千萬縷天涯地角有窮時只有相思無盡處詩眼云晏叔原見蒲傳正云先公平日小詞雖多未嘗作婦人語傳正云綠楊芳草長亭路年少抛人容易去豈非婦人語乎晏曰公謂年少為何語傳正曰豈不謂其所欲乎晏曰因公言遂曉樂天詩兩句欲留所歡待富貴富貴不來所歡去傳正笑而悟其言之失晏叔原雕鞍好為鶯花住占取東城南陌路儘教春思亂如雲莫管世倩輕似絮古來多被虚名誤寧負虚名身莫負勸君頻入醉鄉來此是無愁無恨處二東風又作無情計艷粉嬌紅吹滿地碧樓簾影不遮愁還是去年今日意誰知錯管春殘事到處登臨曾費泪此時金盞直須深看盡落花能幾醉三當年信道情無價桃葉尊前論別夜臉紅心緒學梅粧睂翠工夫如月畫來時醉倒旗亭下知是阿誰扶上馬憶曾挑盡五更燈不記臨時多少話永叔風遲日媚煙光好綠樹依依芳意早年華容易即凋零春色只宜長恨少池塘隱隱驚雷曉栁眼未開梅萼小樽前貪愛物華新不道物新人漸老二春山斂黛低歌扇暫解吳鈎登祖宴畫樓鐘動已魂銷何况馬嘶芳草岸青門栁色隨人逺望欲斷時腸已斷洛城春色待君來莫到落花飛似霰三洛陽正值芳菲節穠艷清香相間發游絲有意苦相縈垂栁無端爭贈別杏花紅處青山缺山畔行人山下歇今宵誰肯逺相隨惟有寂寥孤館月四殘春一夜狂風雨斷送紅飛花落樹人心花意待留春春色無情容易去高樓把酒愁獨語借問春歸何處所暮雲空闊不知音惟有綠楊芳草路五蝶飛芳草花飛路把酒已嗟春色暮當時枝上落殘花今日水流何處去樓前獨遶鳴蟬樹憶把芳條吹暖絮紅蓮綠芰亦芳菲不奈金風兼玉露六別後不知君逺近觸目淒涼多少悶漸行漸逺漸無書水闊魚沉何處問夜深風竹敲秋韻萬葉千聲皆是恨故欹單枕夢中尋夢又不成燈又燼七珠簾半下香銷印二月東風催栁信琵琶傍畔且尋思鸚鵡前頭休借問驚鴻過後生離恨紅日長時添酒困未知心在阿誰邊滿眼泪珠言不盡八湖邊栁外樓高處望斷雲山多少路欄干倚遍使人愁又是天涯初日暮輕無管繫狂無數水畔花飛風裏絮算伊渾似薄情郎去便不來來便去九東風本是開花信及至花時風更緊吹開吹謝苦悤悤春意到頭無處問把酒臨風千萬恨欲埽殘紅猶未忍夜來風雨轉離披滿眼淒涼愁不盡妓館妖冶風情天與措清瘦肌膚冰雪妬百年心事一宵同愁聽雞聲牕外度信阻青禽雲雨暮海月空驚人兩䖏强将離恨倚江樓江水不能流恨去宋子京東城漸覺風光好皺縠波紋迎客棹綠楊煙外曉雲輕紅杏枝頭春意鬧浮生長恨歡娛少肯愛千金輕一笑為君持酒勸斜陽且向花間留晚照劉圻父今來古往長安道歲歲榮枯原上草行人幾度到江濱不覺身隨楓樹老蒲花易晚蘆花早客裏光隂如過鳥一般垂栁短長亭去路不如歸路好海棠王晉卿錦城春色花無數排比笙歌留客住輕寒輕暖夾衣天乍雨乍晴寒食路花雖不語鶯能語莫放韶光容易去海棠開後月明前縱有千金無買處長生芭蕉仲殊飛香漠漠簾帷暖一線水沉煙未斷紅樓西畔小欄干盡日倚欄人已逺黄梅雨入芭蕉晚鳳毛揺翠雙葉短舊年春色舊年心留到如今春不管立春日毛澤民小園半夜東風轉吹破冰池雲母面曉披閶闔見朝陽知向碧階添幾線小煙弄栁晴光暖殘雪禁梅香尚淺殷勤先拂舊東君多少韶華都借看盱眙作長安回首空雲霧春夢覺來無覔處冷烟寒食又黄昏數盡一隄楊栁樹楚山照眼青無數淮口潮生催曉渡西風吹面立蒼茫欲寄此情無雁去春情贈妓路瑩王履道飛鴻只解留箏柱終寄青樓書不去手因春夢有攜時眼到花梢無着處泥金小字迴文句翠袖紅裙知在否欲尋楚館舊時雲看取高唐臺畔路栁耆卿閬風岐路連銀闕曾許金桃容易竊烏龍未睡定驚猜鸚鵡多言防漏泄悤悤縱得憐香雪窗隔殘煙簾映月別來也擬不思量爭奈餘香猶未歇錢思公城上風光鶯語亂城下煙波春拍岸綠楊芳草幾時休淚眼愁腸先已斷情懐漸變成衰晚鸞鏡朱顔驚暗換往年多病厭芳樽今日芳樽惟恐淺思公謫漢東日毎酒闌歌此輒泣下有鄧王老姬驚鴻云先王將薨戒挽歌木蘭花引紼為送相公其將亡乎果卒陏州鄧王曲有帝鄉煙鎖春愁故國山川空泪眼之句出侍兒小名錄周美成當時攜手城東道月墮簷牙人睡了酒邊難使客愁驚帳底不教春夢到別來人事如秋草應有吳霜侵翠葆夕陽深鎖綠苔門一任盧郎愁裏老二桃溪不作從容住秋藕絶來無續處當時相俟赤闌橋今日獨尋黄葉渡煙中列岫青無數雁背夕陽紅欲暮人如風後入江雲情似雨餘粘地絮游寒溪改樂天詩郭生志林鳥啼鵲噪昏喬木清明寒食誰家哭風吹曠野野錢飛古墓纍纍春草綠棠梨花映白楊樹盡是死生離別處冥漠重泉哭不聞蕭蕭暮雨人歸去樂天詩首句云丘墟郭門外寒食誰家哭寒食謝無逸弄晴數㸃梨花雨門外畫橋寒食路杜鵑飛破草間煙蛺蝶惹殘花底霧東君着意憐樊素一段韶華都付與粧成不管露桃嗔舞罷從教風栁妬杜郎中風解池冰蟬翅薄庭樹枯枝翻翠萼背寒迎暖起偏慵閒捲珠簾凭畫閣晴景融融煙漠漠天際行人乖信約病容先怕見春來長到恁時添瘦削郭承禧悤悤相遇悤悤去恰似當初元未遇生憎黄土嶺頭塵強學章臺街裡絮雨荒三徑雲迷路總是離人堪恨處從今對酒與當歌空惹離情千萬緒石次仲小桃破盡風前萼草草年華閒過却十分清瘦有誰知一㸃相思無處着書憑雁字應難託花與泪珠相對落萬紅千翠儘春光若比此情猶自薄康伯可青牋後約無憑據誤我碧桃花下語誰將消息問劉郎悵望玉溪溪上路春來無限傷情緒擬欲題詩都付與東風吹落一庭花手把新愁無寫處侯彦周市橋燈火春星碎街鼓催歸人未醉半嗔還笑眼回波欲去更留睂斂翠歸來短燭餘紅淚月淡天高梅影細北風休遣雁南來斷送不成今夜睡春思嚴次山春風只在園西畔薺菜花繁蝴蝶亂冰池晴綠照還空香徑落紅吹已斷意長翻恨遊絲短盡日相思羅帶緩寳奩明月不欺人明日歸來君試看紅梅李易安紅酥肯放瓊瑶碎探着南枝開遍未不知藴藉幾多香但見包藏無限意道人憔悴春窗底閒損欄干愁不倚要來小着便來休未必明朝風不起惜春容侑涪翁即玉樓春盼盼少年看花雙鬢綠走馬章臺絃管逐而今老更惜花深終日看花花不足坐中美女顔如玉為我同歌金縷曲歸時壓得帽簷欹頭上春風紅簌簌木蘭花韋莊獨上小樓春欲暮愁望玉關芳草路消息斷不逢人却斂細睂歸繡户坐看落花空歎息羅袂濕斑紅淚滴千山萬水不曾行魂夢欲教何處覔魏承斑小芙蓉香旖旎碧玉堂深清似水閉寳匣掩金鋪倚屏拖袖愁如醉遲遲好景煙花媚曲渚鴛鴦眠錦翅凝然愁望靜相思一雙笑靨嚬香蕊毛熙震掩朱扉鈎翠箔滿院鶯聲春寂寞匀粉淚恨檀郎一去不歸花又落對斜暉臨小閤前事豈堪重想着金帶冷畫屏幽寳悵慵薫蘭麝薄賈子明都城水綠嬉遊處僊棹往來人笑語紅隨逺浪泛桃花雪散平隄飛栁絮東君欲共春歸去一陣狂風和驟雨碧油紅斾錦障泥斜日畫橋芳草路晏同叔東風昨夜回梁苑日脚依稀添一線旋開楊栁綠蛾睂暗拆海棠紅粉面無情一去雲中雁有意歸來梁上燕有情無意且休論莫向酒杯容易散二玉樓朱閤黄金鎖寒食清明春欲破窗間斜月兩睂愁簾外落花雙泪墮朝雲聚散眞無那百歲相看能幾箇別來將為不牽情萬轉千回思想過晏叔原秋千院落重簾暮彩筆閒來題繡户牆頭丹杏雨餘花門外綠楊花後絮朝雲信斷知何處應作襄王春夢去紫騮認得舊游踪嘶過畫橋東畔路二風簾向曉寒成陣來報東風消息近試從梅蔕紫邊尋更遶栁枝柔處問來遲不是春無信開晚却疑花有恨又應添得幾分愁二十五絃彈未盡三初心已恨花期晚別後相思長在眼蘭衾猶有舊時香毎到夢回珠泪滿多應不信人腸斷幾夜夜寒誰共暖欲將恩愛結來生只恐來生緣又短西湖永叔西湖南北煙波闊風裏絲篁聲韻咽舞餘羅帶綠雙垂酒入香腮紅一抹杯深不覺琉璃滑貪看六么花十八明朝車馬各西東凋悵畫樓風與月賀方回木蘭詞舞腰輕怯絳裙長羞按築毬花十八佳人栁耆卿个人丰韻眞堪羨問着佯羞回却面若言無意向咱行為甚夢中頻夢見不如及早還心願免使牽人魂夢亂風流腸肚不堅牢只恐被伊牽惹斷前調張子野人意共憐花月滿花好月圓人又散歡情去逐逺雲空往事過如幽夢斷草樹爭春紅影亂一唱離聲千萬怨任教遲日更添長能得幾時擡眼看和孫公素別安陸相離徒有相逢夢門外馬蹄塵已動怨歌留待醉時聽逺目不堪空際送今宵風月知誰共聲咽琵琶槽上鳳人生無物比多情江水不深山不重又西湖楊栁風流絶滿縷青春看贈別牆頭簌簌暗飛花山外隂隂初落月秦姬穠麗雲梳髪持酒聽歌留晚發驪駒應亦解人情欲出重城嘶不歇冬景徐昌圖沉檀煙起盤紅霧一翦霜風吹繡户漢宫花面學梅粧謝女雪詩裁栁絮長垂天幕孤鸞舞旋炙銀笙雙鳳語紅牕酒病對寒冰永覺相思無夢處周美成郊園雨過金英秀風拂霜威寒入袖感君一曲斷腸歌勸我十分和泪酒古道塵清榆栁瘦繫馬郵亭人散後金宵燈盡酒醒時可惜朱顔成皓首秦少游秋容老盡芙蓉院草上霜花匀似翦西樓促坐酒盃深風壓繡簾香不捲玉纎慵整銀筝鴈紅袖時籠金鴨煖歲華一任委西風獨有春紅留醉臉聞笛王子武紅樓十二闌干側樓角暮寒吹玉篴天津橋上舊曾聽三十六宫秋草碧昭華人去無消息江上青山空晚色一聲落盡短亭花無數行人歸未得周紫芝江頭雨後山如髻催送新涼風有意月來楊栁綠隂中秋在梧桐踈影外小牕紋簟涼如水歲歲年年同此味眼前不忍對西風夢裏更堪追往事二江得書作程正伯別時已有重來願誰料情多天不管分明咫尺是青樓抵死濃雲遮得遍寄聲只倚西風雁雁答書回空是怨領愁歸去有誰知水又茫茫山又斷石次仲尋春悞入桃源洞草草幽懽聊與共牢籠風月此時情做造溪山今夜夢栁蹊未放金絲弄梅徑已經香雪凍春愁離恨重於山不信馬兒駞得動王通叟銅駝陌上新正後第一風流除是栁勾牽春事不如梅斷送離人強似酒東君有意偏撋就慣得腰肢眞箇瘦阿誰道你不思量因甚睂頭長恁皺春思無名氏栁梢綠小梅如印乍暖還寒猶未定惜花長是為花愁殢酒却嫌添酒病蠅頭蝸角都休競萬古豪華同一盡東君曉夜促歸期三十六番花遞信成都郭帥席上尹温儀浣花溪上風光主燕夕桃源開幕府商巖本是作霖人也使閒花沾雨露父兄世業傳儒素何事失身非類侶若䝉化筆一吹嘘免使飄零飛繡户劉因未開常探花開未又恐開時風雨至花開風雨不相妨說甚不來花下醉百年枉作千年計今日不知明日事春風欲勸座中人一片落紅當眼墜玉闌干杜夀域珠簾怕捲春殘景小雨牡丹零欲盡庭軒悄悄燕高空風飄絮綠苔侵徑砍將幽恨傳愁信想後期無個憑定幾回獨睡不思量還悠悠夢裏尋趁西湖曲朱希眞今冬寒早風光好休怪攙先欹絮帽蟹肥一箇可秤斤酒美三盃眞合道年少閑夢垂垂了且喜松風吹不倒平分兩月是新春却共梅花依舊笑清江曲蘇養直墨客揮犀屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚秋着蘆花一岸霜扁舟繫岸依林樾蕭蕭兩鬢吹華髪萬事不理醉復醒長占烟波弄明月瑞鷓鴣永叔楚王臺上一神仙眼色相看意已傳見了又休還似夢坐來雖近逺如天隴禽有恨猶能說江月無情也解圓更被春風送惆悵落花飛絮兩翩翩林逋詩句梅苑衆芳揺落獨鮮妍占盡風情向小園疎影横斜水清淺暗香浮動月黄昏寒禽欲下先偷眼粉蝶如知亦斷魂幸有微吟可相押不須檀板共金樽崔魯詩句含情含態一枝枝斜壓漁家短短籬惹袖尚餘香半日向人如訴雨多時初開偏稱雕梁畫未落先愁玉笛吹行客見時無意去解帆煙浦為題詩杜夀域夜來風雨損餘芳數片衰紅落檻傍媚景背人容易去半軒飛絮日空長從來不信相思切及至如今倍感傷獨立黄昏繡簾外可堪新月露圓光趙介庵榴花五月眼邊明角簟流冰午夢清江上扁舟停畫槳雲間一笑濯塵纓主人杯酒留連意倦客關河去住情都付郵亭今日水伴人東去到江城辛稼軒膠膠擾擾幾時休一出山來不自由秋水觀中秋月夜停雲堂下菊花秋隨緣道理應須會過分功名莫強求先自一身愁不了那堪愁上又添愁周忘機一痕月色掛簾櫳梅影斜斜小院中狂醉有心窺粉面夢魂無處避香風愁來夢楚三千里人在巫山十二重咫尺藍橋無問處玉山聲斷楚山空席上迴文郭從範傾城一笑得人留舞罷嬌蛾斂黛愁明月寳韝金絡背翠瓊花珥碧搔頭晴雲片雪腰支嫋晚吹微波眼色秋清露亭臯芳草綠輕綃軟掛玉簾鈎雙銀杏李易安風韻雍容未甚都樽前甘橘可為奴誰憐流落江湖上玉骨冰肌未肯枯誰教並蔕連枝摘醉後明皇倚太眞居士擘開眞有意要吟風味兩家新京師妓昔時曾從漢梁王濯錦江邊醉幾塲拂石坐來衫袖冷踏花歸去馬蹄香當初酒􅊦寧辭醉今日愁來不易當暗想舊遊渾似夢芙蓉城下水茫茫春日南園程正伯門前楊栁綠成隂翠塢籠香徑自深遲日煖薫芳草眼好風輕撼落花心無多春恨鶯難語最晚朝眠蝶易尋惟有狂醒不相代釀成憔悴到如今陳彭年湘山野錄盡出花鈿散寳津雲鬟初翦向殘春因驚風燭難留世遂作池蓮不染身貝葉乍翻疑錦軸梵聲纔學誤梁塵從兹艷質歸空後湘浦應無解佩人初申國長公主為尼詔兩禁送於寺傳宣作詩送之彭年作此好事者能於瑞鷓鴣曲聲歌之栁耆卿天將竒艷與寒梅忽驚艷杏臘前開暗想花神巧作江南信鮮染胭脂細翦裁夀陽粧罷無端飲凌晨酒入香腮恨聽烟塢深處誰緩吹羌管逐風來絳雪紛紛落翠苔二三吳佳會古風流渭南往歲憶東遊西子方來越相功成去千里滄波一葉舟至今無限盈盈者盡來拾翠芳洲最是簇簇寒村遥認南朝路晚煙收三兩人家古渡頭鳳銜盃晏同叔青蘋昨夜秋風起無限箇露蓮相倚獨凭朱欄愁放晴天際空目斷遥山翠彩牋長錦書細誰信道兩情難寄可惜良辰好景歡娯地只恁空憔悴二留花不住怨花飛向南園情緒依依可惜倒紅斜白一枝枝經宿雨又離披憑朱檻把金巵對芳叢惆悵多時何况舊歡新恨阻心期滿眼是相思相思栁耆卿追悔當初孤深願經年價兩成幽怨任越水吳山似屏如障堪遊翫奈獨自慵擡眼賞烟花聽絃管圖歡娛轉加腸斷縱時展丹青強拈書信頻頻看又爭似親相見得書有美瑶卿能染翰千里寄小詩長簡想初襞苔牋旋揮翠管紅窗畔漸玉箸銀鈎滿錦囊收犀軸巻常珍重小齋吟玩更寳若珠璣置之懐袖時時看似頓見千嬌面送將歸夏王逐客漫叟詩話百尺清泉聲陸續映瀟灑碧梧翠竹面千步回廊重重簾幕小枕欹寒玊試展絞綃看畫軸見一片瀟湘凝綠待玉漏穿花銀河垂地月上欄干曲鵲橋仙永叔月波清霽煙容明淡靈漢舊期還至鵲迎橋路接天津映夾岸星榆㸃綴雲屏未巻仙雞催曉腸斷去年情味多應天意不教長恁恐把歡娛容易秦少游纎雲弄巧飛星傳恨銀漢迢迢暗度金風玉露一相逢便勝却人間無數柔情似水佳期如夢忍顧鵲橋歸路兩情若是久長時又豈在朝朝暮暮又席上賦七夕黄山谷朱樓彩舫浮瓜沈李報答春風有幾一年罇酒暫時同別淚作人間曉雨鴛鴦機錦能令儂巧也待乗槎仙去若逢海上白頭翁共一訪癡牛騃女七夕謝勉中鈎簾借月染雲為幌花面上枝交暎涼生河漢一天秋問此會今宵孰勝銅壺尚滴燭龍已駕淚浥西風不盡明朝烏鵲到人間試說向青樓薄倖七夕滕魯卿涼飈破暑清歌縈坐缺月稀星庭户瓜華草草具杯盤喜共浥初筵零露天孫東處牽牛西望勸汝一杯清醑精靈何必待秋通為一洗朦朧今古甲子七夕郭承禧金風淅淅銀河耿耿七夕如今又至人間喚作隔年期但只似屈伸指臂羅花列果拈針弄線等是紛紛兒戲巧人自少拙人多那牛女何曾管你杜夀域別離情緒多方開解却免厭厭似醉樓高終日倚欄干目斷有千山萬水妖嬈薄媚不禁抛擺漸覺肌膚瘦悴當初相見偶然間不喚作如今恁地二日長天氣深深庭院又是春愁滋味池邊昨夜雨兼風戰紅杏餘香亂墜隂隂亭榭暖煙輕栁萬縷黄金窣地一雙新燕却重來但暗把羅巾掩泪趙徳莊來時夾道紅羅步障已換青絲翠羽春愁元自逐春來卻不肯隨春歸去千觴美酒十分幽事歸到只愁風雨慿誰傳語牡丹花為做取東君些主耆舊續聞云介菴春愁元自逐春來二句盖體李漢老楊花詞驀地便和春帶將歸去也辛幼安祝英臺近詞是他春帶愁來春歸何處却不解帶將愁去是又體趙詞也夜聞杜鵑陸務觀茅簷人靜蓬牕燈暗春晚連江風雨林鶯巢燕總無聲但月夜常啼杜宇催成清泪驚殘孤夢又揀深枝飛去故山猶自不堪聽况半世飄然羇旅中秋待月不至金主亮程史停盃不舉停歌不發等候銀蟾出海片雲何處忽飛來做許大通天障礙愁睂怒目星移斗轉懊惱劒鋒不快一揮一斷此隂霾此夜看嫦娥體態秋月寄懐程正伯角聲吹月風聲落枕夢與柔腸俱斷誰教當日太情濃颺不下新愁一段黄花開了梅花開未曾約那時相見莫教容易負幽期怕眞箇辜他淚眼召侯君餞會舒信道教來歌舞接成桃李盡是使君指似如今裝就滿城春忍便擁雙旌歸去鸎心巧囀花心爭吐無計可留君住兩隄芳草一江雲早晚是西樓望處寄李順妹延安夫人星移斗轉玉蟾西下漸覺東郊向曉馬嘶人語隔霜林望千里長安古道珠宫姊妹相逢方信別後十分瘦了上林歸去正花時爭奈向花前又老七夕朱淑眞巧雲弄晚西風驚暑小雨畨空月墜牽牛織女幾經秋尚多少離腸恨淚微涼入袂幽歡生坐天上人間滿意何如暮暮與朝朝更改却年年歲歲郡齋席賦謝元卿姓嚴幼芳碧梧初墜桂香才吐池上水花微謝穿針人在合歡樓正月露玉盤高瀉蛛忙鵲懶耕慵織倦空作古今佳話人間剛道隔年期怕天上方纔隔夜答放翁自解放翁妓齊東野語說盟說誓說情說意動便春愁滿紙多應念得託空經是那箇先生教的不茶不飯不言不語一味供他憔悴相思已是不曾閒又那得工夫呪你七夕箕仙齊東野語鸞輿初駕牛車齊發隠隠鵲橋咿軋尤雲殢雨正歡濃但只怕來朝初八霞垂彩幔月明銀燭馥郁香噴金鴨年年此際一相逢未審是甚時結煞南鄉子馮延已細雨濕流光芳草年年與恨長煙鎖鳳樓無限事茫茫鸞鏡鴛衾兩斷腸魂夢任悠揚睡起楊花滿繡床薄倖不來門半掩斜陽負你殘春淚幾行二細雨泣秋風金鳳花殘滿地紅閒促黛睂慵不語情緒寂寞相思知幾許玉枕擁孤衾挹恨還聞歲月深簾巻曲房誰共醉憔悴惆悵秦樓彈粉泪永叔翠密紅繁水國涼生未是寒雨打荷花珠不定輕翻冷潑鴛鴦錦翅斑盡日凭欄弄蘂拈花子細看偷得褭蹄新鑄樣無端藏在紅房艷粉間二雨後斜陽細細風來細細香風定波平花映水休藏照出輕盈半面粧路隔秋江蓮子深深隱翠房意在蓮心無問處難忘泪裏紅腮不記行晏叔原渌水帶青潮水上朱欄小渡橋橋上女兒雙笑靨妖嬈倚着欄干弄栁條月夜落花朝減字偷聲按玉簫栁外行人回首處迢迢若比銀河路更遥二花落未消悲紅蕊明年又滿枝惟有花間人別後無期水闊山長雁字遲今日最相思記得攀條話別離共說春來春去事多時一㸃愁心入翠睂三新月又如睂長笛誰教月下吹樓倚暮雲初見雁南飛謾道行人雁後歸意欲夢佳期夢裡關山路不知却待短書來破恨應遲還是涼生玉枕時王介甫自古帝王州鬱鬱蔥蔥佳氣浮四百年來如一夢堪愁晉代衣冠成古邱繞水恣行游上盡層城更上樓往事悠悠君莫問回頭檻外長江空自流大卿榮諲江上野梅芳粉色盈盈照路傍閒折一枝和雪嗅思量似箇人人玉體香特地起愁腸此恨誰人與寄將山館寂寥天欲暮淒涼人轉迢迢路轉長張子野何處可魂銷京口終朝兩信潮不管離心千疊恨滔滔催促行人動去橈記得舊江臯綠楊輕絮幾條條春水一篙殘照闊遥遥有箇多情立畫橋蘇子瞻霜降水痕收淺碧粼粼露逺洲酒力漸消風力輭颼颼破帽多情却戀頭詩酒若為酬但把清尊斷送秋萬事到頭都是夢休休明日黄花蝶也愁二寒雀滿疎籬爭抱寒柯看玉㽔忽見客來花下坐驚飛踏散芳英落酒巵痛飲又能詩坐客無氊醉不知花謝酒闌春到也離離一㸃微酸已着枝美女半身秦少游妙手寫徽眞水翦雙眸㸃絳唇疑是昔年窺宋玉東鄰只露牆頭一半身往事已酸辛誰記當年翠黛顰盡道有些堪恨處無情任是無情亦動人黄山谷黄菊滿東籬與客攜壺上翠微已是有花兼有酒良期不用登臨怨落暉滿酌不須辭莫待無花空拆枝寂寞酒醒人散後堪悲節去蜂愁蝶不知重陽宴集諸將說封侯短笛長歌獨倚樓萬事盡隨風雨去休休戲馬臺南金絡頭催酒莫遲留酒味今秋似去秋花向老人頭上笑羞羞白髪簪花不解愁周美成晨色動粧樓短燭熒熒悄未收自在開簾風不定颼颼池面冰澌趁水流早起怯梳頭欲綰雲鬟又却休不會沈吟思底事凝眸兩㸃春山滿鏡愁吕濱老燕子喚春歸夢逐楊花滿院飛吹過西家人不見依依萍㸃荷錢又滿池屈指數佳期何日憑肩對展睂傾盡十分應不醉遲遲可惜櫻桃杏子時謝無逸淺色染春衣衣上雙雙小雁飛袖捲藕絲寒玉瘦彈碁贏得花前酒一巵冰雪染臙脂絳蠟香融落日西唱徹陽關人欲去依依醉眼横波翠黛低吳大年江上雪初消暖日晴煙弄栁條認得裙腰芳草路魂銷曾折梅花過斷橋潘鬢為誰彫長恨金閨閉阿嬌遥想晚粧呵手罷夭饒更傍朱唇㬉玉簫程正伯幾日訴離樽歌盡陽闗不忍分此度天涯眞箇去銷魂相送黄花落葉村斜日又黄昏蕭寺無人半掩門今夜粉香明日泪休論只要羅巾記舊痕冬懐黄叔暘萬籟寂無聲衾鐵稜稜近五更香斷燈昏吟未穩淒清只有霜華伴月明應是夜寒凝惱得梅花睡不成我念梅花花念我關情起看清冰滿玉缾曾覿霜月晚雲收蕭瑟西風滿院秋雅會難期嗟易散遲留把酒聽歌且勸酬萬事拚悠悠只有情親意未休後夜扁舟煙浪裏回頭葉葉丹楓總是愁送朱元晦與張敬夫邢少連同集張于湖江上送歸船風雨排空浪拍天賴有清尊澆別恨悽然寳燭燒花看汲川楚舞對湘絃煖響圍春錦帳氊坐上定知無俗客懐賢便是朱張與少連集句趙徳莊窗户映朝光花氣渾如百和香即遣花飛深造次茫茫曲渚飄成錦一張相憶莫相忘並蔕芙蓉本自雙草色連雲人去住堪傷海上尖峰似劒鋩妓館潘庭堅生怕倚闌干閤下溪聲閣外山惟有舊時山共水依然暮雨朝雲去不還應是躡飛鸞月下時時整珮環月又漸低霜又下更闌折得梅花獨自看辛幼安隔户語春鶯纔挂簾兒斂袂行漸見凌波羅韈步盈盈隨笑隨顰百媚生着意聽新聲盡是司空自教成今夜酒腸難道窄多情莫放紗籠蠟炬明蔣捷泊雁小汀洲冷淡湔裙水漫秋裙上唾花無處覔重游隔栁惟存月半鈎準擬架層樓望得伊家見始休還怕粉雲天畔起悠悠化作相思一片愁談藪洪邁被拘留稽首垂哀告彼酋七日忍饑猶不耐堪羞蘇武爭禁十九秋厥父既無謀厥子安能解國憂萬里歸來誇舌辯村牛好擺頭時便擺頭蓋洪好擺頭也洪景盧奉使其父忠宣嘗薦之為北主困辱而歸太學諸生作詞誚之陸務觀早歲入皇州罇酒相逢盡勝流三十年來眞一夢堪愁客路蕭蕭兩鬢秋蓬嶠偶重遊不待人嘲我自羞看鏡倚樓俱已矣扁舟月笛煙蓑萬事休閨情孫夫人曉日壓重簾斗帳春寒起未忺天氣困人梳洗懶睂尖淡畫春山不喜添閒把繡絲撏認得金針又倒拈陌上遊人歸也未厭厭滿院楊花不捲簾惜雙雙冒雪披風開數㸃萬花壓欺寒探暖掩映閒庭院月下疎影横斜幽香逺命友開樽同宴翫聽麗質歌聲宛轉對景側金盞任他結實和羮歸仙館又墨梅庾嶺香前親寫得子細看粉匀無跡月殿休尋覔姑射人來知是曾相識不要清春閒用力也會寄江南信息着意應難摘留與梨花比並眞顔色思歸樂栁耆卿天幕清和堪宴聚相得盡高陽儔侣皓齒善歌長袖舞漸引入醉鄉深處晚歲光隂能幾許這巧宦不須多取共君把酒聽杜宇解再三勸人歸去二色宫桃鏤玉香苞酥㸃萼正萬木園林蕭索惟有一枝雪裏開江南有信慿誰託前年記賞登高樓歎年來舊歡如昨聽取樂天一句云花開處且須行樂栁搖金沈會宗相將初下蕊珠殿似醉粉生香未遍愛惜嬌心春不管被東風賺開一半中黄宫裏賜仙衣鬬淺深粧成笑面放出妖嬈難繫管笑東君自家腸斷折丹桂招山初秋兩兩留蓂莢算恰是生申佳節祝君夀閱八千秋歲歲對長空皓月威宣北都推剛決氣凛凜秋霜爭烈灘頭雙鶒看飛來便有詔催歸天闕翻香冷蘇軾金爐猶煖麝煤殘惜香愛把寳釵翻重匀處餘薫在這一般氣味勝從前背人偷蓋小重山更搛沈水與同然且圖得氤氲久為情深嫌怕斷頭煙舞春風馮延已嚴粧纔罷怨春風粉牆畫壁宋家東蕙蘭有恨枝尤綠桃李無言花自紅燕燕巢兒羅幙巻鶯鶯啼處鳳樓空年少薄倖知何處毎夜歸來春夢中明月棹孤舟木犀黄在軒雁帶愁來寒事早西風把鬢華吹老猛省中秋都來幾日先自木犀開了淰淰輕隂天弄曉平白地被花相惱一枕雲閒半窗秋透時有陣香飛到卓牌子慢楊无咎西樓天將晚流素月寒光正滿樓上笑揖姮娥似看羅襪塵生鬢雲風亂珠簾終夕捲判不寐欄干凭煖好在影落清樽冷侵香幄歡餘未教人散市橋栁送行蜀妓野語欲寄意渾無所有折盡市橋官栁看君着上征衫又相將放船楚江口後會不知何日又是男兒休要鎭長相守茍富貴無相忘若相忘有如此酒玉壺冰瓜張老小說西園摘處香和露洗盡南軒暑莫嫌坐上適來蠅只恐怕寒難近玉壺冰井花浮翠金盆小午夢初回後詩翁自是不歸來不是青門無地可移栽花草稡編巻十一

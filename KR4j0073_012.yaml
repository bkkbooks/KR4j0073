body:
  text: 花草稡編卷十二明陳耀文輯小令慶金枝張子野山圍畫障風溪弄月清溶漾玉樓苕館人相望下箬醲醅競欲金叉當使君勸醉青娥唱分明仙曲雲中響南園百卉千家賞和氣兼不獨花枝上遍地花牡丹毛澤民白玉瀾邊自凝佇滿枝頭彩雲雕霧甚芳菲繡得成團砌合出韶華好處暖風前一笑盈盈吐檀心向誰分付莫與他西子精神不枉了東君雨露妓行七小石調元是竹林舊伴侣去人日偶相遇笑盧同狂怪嘗茶問子建詩成幾步憶去年乞巧同歡把琴絃細細説與傷你愛四勾三生下五男二女虞美人唐人碧雞謾志帳中草草軍情變月下旌旗亂褫衣推枕愴離情逺風吹下楚歌聲正三更撫騅欲上重相顧艷態花無主手中蓮鍔凜秋霜九泉歸去是仙鄉恨茫茫西蜀文珏歌唇乍啓塵飛處翠葉輕輕舉似回舞態逞妖容嫩條纎麗玉玲瓏怯秋風虞姬珠碎兵戈裏莫認埋魂地只應遺恨寄芳叢露和清泪濕輕紅古今同黃載萬世間離恨何時了不為英雄少楚歌聲起霸圖休玉帳佳人血泪滿東流葛荒葵老蕪城暮玉貌知何處至今芳草解婆娑只有當時魂魄未消磨李後主春花秋月何時了往事知多少小樓昨夜又東風故國不堪回首月明中雕欄玉砌應猶在只是朱顔改問君都有幾多愁恰似一江春水向東流二風回小院庭蕪緑栁眼春相續憑闌半日獨無言依舊竹聲新月似當年笙歌未散尊罍在池面冰初解燭明香暗畫樓深滿鬢清霜殘雪思難任馮延已玉鈎鸞柱調鸚鵡宛轉留春語雲屏冷落畫堂空薄晚春寒無奈落花風搴簾燕子低飛去拂鏡塵鸞舞不知今夜月睂彎誰佩同心雙結倚闌干二春風拂拂橫秋水掩映遙相對祗知長作碧窗期誰信東風吹散彩雲飛銀屏夢與飛鸞逺祗有珠簾卷楊花零落月溶溶塵掩玉箏弦柱畫堂空晏同叔小梅枝上東君信雪後花期近南枝開盡北枝開長被隴頭遊子寄春來年年衣袖年年泪總為今朝意問誰同是憶花人賺得小鴻睂黛也低顰晏叔原曲欄干外天如水昨夜還曾倚初將明月比佳期長向月圓時候望人歸羅衣著破前香在舊意誰教改一春離恨懶調絃猶有兩行間泪寶箏前賞梅月夜有懷道山公子玉壺滿插梅梢瘦簾幕輕寒透從今春恨滿天涯月下幾枝疏影透窗紗錦城咫尺如千里乍別難成寐孤眠半晌斷人腸夜靜分明全似那人香懷舊張子野苕花落盡汀風定苕水天搖影畫船羅綺滿溪春一曲石城清響入高雲壺觴昔歲同歌笑今日無年少南園花少故人稀月照玉樓依舊似當時維揚別少遊東坡冷齋夜話波聲拍枕長淮曉隙月窺人小無情忭水自東流只載一船離恨向西州竹隂花圃曾同醉酒未多於淚誰教風鑑在塵埃醖造一場煩惱送人來世傳賀方回作春情秦少遊碧桃天上栽和露不是凡花數亂山深處水瀠回可惜一枝如畫為誰開輕寒細雨情何限不道春難管為君沈醉又何妨祗恨酒醒時候斷人腸周美成玉觴才掩朱絃悄彈指壺天曉回頭猶認倚牆花只向小樓南畔便天涯銀蟾依舊當窗滿顧影魂先斷淒風休颭半殘燈擬倩今宵歸夢到雲屏二燈前欲去仍留戀腸斷朱屏逺不須紅雨洗香腮待得薔薇花謝便歸來舞腰歌板間時按一任傍人看金爐應見舊殘煤莫遣恩情容易似寒灰三淡雲籠月松溪路長記分攜處夢魂連夜繞松溪此夜相逢恰似夢中時海山陟覺風光好莫惜金樽倒栁花吹雪燕飛忙生怕扁舟歸去斷人腸四金閨平帖春雲暖晝漏花前短玉顔酒解艷紅消一向捧心啼困不成嬌別來新翠迷行徑窗鎖玲瓏影砑綾小字夜來封斜倚曲欄凝睇數歸鴻杜夀域江亭春晚芳菲盡行色青天近畫橋楊栁也多情暗拋飛絮惹前行路塵清彤庭早晚瞻虞舜遙聽恩遷峻二年歌宴綺羅人片雲疏雨忍漂淪淚沾巾光化道中寄家趙德麟畫船穩泛春波渺夕雨寒聲小紫煙深處數峰橫驚起一灘鷗鷺照川明雨樓今夜歸期誤恨入欄干暮可堪春事滿春懷不似珠簾新燕早歸來石孝友醉尋芳草城頭路底事頻凝佇麗譙直下小層樓鴛瓦重重勻砌幾重愁睡紅顰翠春風面咫尺無由見從教笑語落簷楹圖得香閨依約認郎聲杭樓蔣捷絲絲楊栁絲絲雨春在溟濛處樓兒忒小不藏愁幾度和雲飛去覔歸舟天憐客子鄉關逺借與花消遣海棠紅近緑闌干才捲朱簾却又晚風寒聽雨少年聽雨歌樓上紅燭昏羅帳壯年聽雨客舟中江闊雲低斷雁叫西風而今聽雨僧廬下鬢已星星也悲歡離合本無情一任階前點滴到天明李方叔玉欄干外清江浦渺渺天涯雨好風如扇雨如簾時見岸花汀草漲痕添青林枕上關山路臥想乘鸞處碧蕪千里思悠悠惟有霎時春夢到南州春愁程正伯輕紅短白東城路憶得分襟處栁絲無賴舞春愁不繫離人只解繫離愁如今花謝春將老栁下無人到月明門外子規啼喚得人愁爭似喚人歸宗戚侍兒惠柔贈帕何栗分香帕子揉膩翠欲去殷勤惠重來直待牡丹時莫遣花枝知後故開遲別來看盡間桃李日日闌干倚催花無計問東風夢作一雙蝴蝶繞芳叢何文縝初登第在館閣飲於宗戚一貴人家侍兒惠柔者麗黠人也慕何風標密解帕子為贈共約牡丹時再集何亦甚關抱既歸賦此隱其小名以寄惓惓之意何後自書此詞示蜀人趙詠道言其張本如此夷堅支志見頤堂集政和丁酉下琵琶溝作向伯恭朦朧煙樹無重數不得相思路晚雲分外欲增愁更那堪聽疏雨送歸舟雨來還被風吹去流淚多如雨擬題雙葉問離憂怎得水隨人意肯西流二綺窗人似鶯藏栁巧語春心透聲聲清切入人深一夜不知兩鬢雪霜侵何時月下歌金縷醉看行雲住懶將幽恨寄瑶琴却倩金籠鸚鵡遞芳音陳去非十年花底承朝露看到江南樹洛陽城裏又東風未必桃花得似舊時紅胭脂睡起春才好應恨人空老心情雖在只吟詩白髮劉郎孤負可憐枝毛文錫寶檀金縷鴛鴦枕綬帶盤宫錦夕陽低映小窗明南園緑樹語鶯鶯夢難成玉爐香暖頻添炷滿地飄輕絮珠簾不卷度沈煙庭前間立畫鞦韆艷陽天顧敻碧梧桐映紗窗晚花謝鶯聲懶小屏屈曲掩青山翠幃香粉玉爐寒兩蛾攢顚狂年少輕離別辜負春時節畫羅紅袂有啼痕魂消無語倚閨門欲黃昏二深閨春色勞思想恨共春蕪長黃鸝嬌囀䛏芳妍杏枝如畫倚輕煙鎖窗前憑欄愁立雙蛾細柳影斜搖砌玉郎還是不還家教人魂夢逐楊花繞天涯孫光憲紅窗寂寂無人語暗淡梨花雨繡羅紋地粉新描博山香炷旋抽條暗魂銷天涯一去無消息終日長相憶教人相憶幾時休不堪棖觸別離愁泪還流鹿虔扆卷荷香淡浮煙渚緑嫩擎新雨鎖窗疏透曉風清象床珍簟冷光輕水紋平九疑黛色屏斜掩枕上睂心斂不堪相望病將成鈿昏檀粉泪縱橫不勝情閻選楚腰蠐領團香玉鬢疊深深緑月蛾星眼笑微頻栁夭桃艷不勝春晚粧勻水紋簟映青紗帳霧罩秋波上一枝嬌臥醉芙蓉良宵不得與君同恨忡忡笑微頻一作笑和顰李珣金籠鶯報天將曙驚起分飛處夜來潛與玉郎期多情不覺酒醒遲失歸期映花避月遙相送膩髻偏垂鳳却回嬌步入香閨倚屏無語撚雲箆翠睂低回文王文甫黃金嫩栁搖絲軟永日堂堂掩捲簾飛燕未歸來客去醉眠欹枕殢殘杯睂山淺拂青螺黛整整垂雙帶水沈香尉窄衫輕瑩玉碧溪春流眼波橫一斛珠李後主晚粧初過沉檀輕注些兒箇向人微露丁香顆一曲清歌暫引櫻桃破羅袖裛殘殷色可杯深旋被香醪涴繡床斜憑嬌無那爛嚼紅茸笑向檀郎唾蘇東坡洛陽春晚垂楊亂掩紅樓半小池輕浪紋如篆燭下花前曾醉離歌宴自惜風流雲雨散關山有限情無限待君重見尋芳伴為説相思目斷西樓燕歐陽永叔傷春懷抱清明過後鶯花老勸君莫向愁人道又被香輪碾破青青草夜來風月連清曉牆隂目斷無人到恨別王孫愁多少猶頓春寒未放花枝老紅窗逈古今詞話富春坊好景致兩岸盡是歌姬舞妓引調得上界神仙把凡心都起內有丙丁并壬癸這兩尊神為你爭些口氣火星道我待逞些神通不怕你是水家山好公述湘山野録挂冠歸去舊煙蘿間身健養天和功名富貴非由我莫貪他這岐路足風波水晶宫裏家山好物外勝遊多晴溪短棹時時醉唱梩梭羅天公奈我何梅花引万俟雅言曉風酸曉霜乾一雁南飛人度關客衣單客衣單千里斷魂空歌行路難寒梅驚破前村雪寒雞啼破西樓月酒腸寬酒腸寬家在日邊不堪頻倚欄怨春風張子野無由且住綿綿恨似春蠶緒見來時晌還須去月淺燈收多在偷期處今夜掩粧花下語明朝芳草東西路願身不學相思樹但願羅衣化作雙飛羽陽臺夢解昉仙姿本寓十二峰前住千里行雲行雨偶因鶴馭過巫陽邂逅他楚襄王無端宋玉誇才賦誣誕人心素至今狂客到陽臺也有癡心望妾入夢中來錦帳春淮東陳提舉清明奉母夫人遊徐山翁庵戴式之處處逢花家家插栁政寒食清明時候奉板輿行樂使星隨後人間稀有出郭尋仙繡衣春晝馬上列兩行紅袖對韶華一笑勸夫人酒百千長夀辛幼安春色難留酒杯常淺把舊恨新愁相間五更風千里夢看飛紅幾片這般庭院幾許風流幾般嬌懶問相見何如不見燕飛忙鶯語亂恨重簾不捲翠屏逺留春程珌最是春來苦無風雨只恁匆匆歸去看遊絲都不恨恨秦淮新漲向人東注醉裏仙人惜春曾賦却不解留春且住問何人留得住怕小山更有碧蕪春句醉落魄晏叔原天教命薄青樓占得聲名惡對酒當歌尋思著月户星窗多少舊期約相逢細語初心錯兩行紅泪尊前落霞觴且共深深酌惱亂春宵翠被都間却二滿鞭斜月垂鞭自唱陽關徹斷盡柔腸思歸切都為人人不許多時別南橋昨夜風吹雪短長亭下征塵歇歸時定有梅堪折欲把離愁細撚花枝説佳人吹笛張子野雲輕栁弱內家髻子新梳掠生香真色人難學橫管孤吹月淡天垂幕朱唇淺破櫻桃萼倚樓人在闌干角夜寒指冷羅衣薄聲入霜林簌簌驚梅落詠茶黃魯直紅牙板歇韶聲斷六么初徹小槽酒滴真珠竭紫玉甌圓淺浪泛春雪香芽嫩蕊清心骨醉中襟量與天闊夜闌似覺歸仙闕走馬章臺踏碎滿街月謝無逸霜砧聲急蕭蕭疏雨梧桐濕無言獨倚闌干立簾捲黃昏一陳西風入年時畫閣嘉賓集玉人檀板當筵執銀瓶已斷絲繩汲莫話前歡忍對屏山泣朱希真海山翠疊夕陽殿雨雲堆雪鷓鴣聲裏蠻花發我共扁舟江上兩萍葉東風落酒愁難説誰教春夢分南北碧城芳草應消歇曾識劉郎惟有半灣月張安國輕黃淡緑可人風韻間裝束多情早是睂峰蹙一點秋波間裏覷人毒桃花庭院光隂速銅鞮誰唱大隄曲歸時想是櫻桃熟不道秋千誰伴那人蹴程正伯晚涼時節翠梧風定蟬聲歇有人睡起香浮頰倚著闌干笑揀青荷葉如今往事愁難説曲池依舊間風月田田翠蓋香羅疊留得霞痕都是泪珠結曾純甫情深恨切憶伊悄沒些休歇百般做處百厮愜管是前生曾負你寃業臨岐不忍匆匆別兩行珠淚流紅頰關山漸逺音書絶一箇心腸兩處對風月詠額舟行汴中見岸傍畫船有映簾向觀者見其額汪彥章小舟簾隙佳人半露梅粧額緑雲低映花如刻恰似秋宵一半銀蟾白結兒捎朵香紅扐鈿蟬隱隱搖金碧春山秋水渾無迹不露牆頭些子真消息吕聖求纖鞋窄襪紅茵自稱琵琶拍明眸妝臉春梳掠好好亭亭難得恁標格匆匆一醉霜華白歸來偏記藍橋宅五更殘夢迷蝴蝶覷著花枝只被繡簾隔周少隱江天雲薄江頭雪似楊花落寒燈不管人離索照得人來真箇睡不著歸期已負梅花約又還春動空飄泊曉寒誰看伊梳掠雪滿西樓人在闌干角二栁邊池閣曉來卷地東風惡人生不解頻行樂昨日花開今日風吹落楊花却似人飄泊春雲更似人情薄如今始信從前錯為個蠅頭輕負青山約醉
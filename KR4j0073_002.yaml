body:
  text: 花草稡編卷二眀陳耀文輯小令夢桃源眀道雜志砥柱勒銘賦本贊禹功勳試官親處分贊唐文秀才冥子裏鑾駕幸并汾恰似鄭州去出曹門党禹錫學士厚德老儒而性涉迂滯嘗言一生讀書但得佳賦題數箇每遇差考試輒用之用亦幾盡嘗試監生試砥柱勒銘賦此銘今具在乃唐太宗銘禹功而党公誤記為太宗自銘其功宋渙中第一其賦悉是太宗自銘韓玉汝時為御史因章劾之有無名子作此嘲之冥子裏俗謂昏也河滿子毛文錫紅粉樓前月照碧紗窗外鶯啼夢斷遼陽音信那堪獨守空閨恨對百花時節王孫緑草萋萋和凝寫得魚箋無限其如花鎖春輝目斷巫山雲雨空教殘夢依依却愛薰香小鴨羡他長在屏幃孫光憲冠劒不隨君去江河還共恩深歌袖半遮眉黛淚珠旋滴衣襟惆悵雲愁雨怨斷魂何處相尋風光好陶秀實好姻緣惡姻緣祇得郵亭一夜眠別神仙琵琶撥盡相思調知音少待得鸞膠續斷絃是何年天機餘錦栁陰陰水沈沈風約雙鳧立不禁碧波心孤村橋斷人迷路舟橫渡旋買村醪淺淺斟更微吟相見歡又名上西樓秋夜月憶真妃烏夜啼薛昭藴羅襦繡袂香紅畫堂中細草平沙蕃馬小屏風卷羅幕憑粧閣思無窮暮雨輕煙魂斷隔簾櫳孟昶古今詞話無言獨上西樓月如鈎寂寞梧桐深院鎖清秋剪不斷理還亂是離愁別有一般滋味在心頭李後主林花謝了春紅太匆匆無奈朝來寒雨晚來風胭脂淚相留醉幾時重自是人生長恨水長東馮延己曉窗夢到昭華阿瓊家欹枕殘粧一朵卧枝花情極處却無語玉叉斜翠閣銀屏回首已天涯朱希真東風吹盡江梅橘花開舊日吳王宫殿長青苔今古事英雄淚老相催常恨夕陽西下晚潮回二瀧州幾番清秋許多愁嘆我貼閒白了少年頭人間事如何是去來休自是不歸歸去有誰留天機餘錦都無一㸃殘紅夜來風底事東君歸去太匆匆桃花醉梨花淚總成空斷送一年春在緑陰中詞話一彎月掛危樓似藏鈎醉裏不知黃葉報新秋征鴻斷歸雲亂逺峰愁愁見緑楊凝恨在江頭陸放翁江樓緑暗紅稀燕交飛忽到當年行處恨依依灑清淚嘆人事與心違滿酌玉壺花露送春歸康仲伯匆匆一望關河聽離歌艇子急催雙槳下清波淋浪醉闌干淚奈情何眀日畫橋西畔暮雲多蔡仲道樓前流水悠悠駐行舟滿目寒雲衰草使人愁多少恨多少淚謾遲留何似驀然拚捨去來休望梅花和凝春草全無消息臘雪猶餘蹤跡越嶺寒枝香自坼冷艷竒芳堪惜何事夀陽無處覓吹入誰家橫笛孫光憲二調異數枝開與短牆平見雪萼紅跗相映引起誰人邊塞情簾外欲三更吹斷離愁月正明空聽隔江聲醉太平贈妓劉龍洲情髙意真眉長鬢青小樓明月調筝寫春風數聲思君憶君魂牽夢縈翠銷香暖雲屏更那堪酒醒四字令張叔夏鶯吟翠屏簾吹絮雲東風也怕花嗔帶飛花趁春鄰娃笑迎嬉遊趁晴明朝何處相尋那人家栁陰調笑集句宣和中九重傳出蓋聞行樂須及良辰鍾情正在吾輩飛觴舉白目斷巫山之暮雲綴玉聨珠韻勝池塘之春草集古人之妙句助今日之清歡珠流璧合暗連文月入千江體不分此曲只應天上有歌聲豈合世間聞巫山千里楚江水明月樓髙愁獨倚井梧宫殿生秋意望斷巫山十二雪肌花貌參差是朱閣五雲仙子桃源相誤桃源路萬里蒼蒼煙水暮留君不住君須去秋月春風閒度桃花零亂如紅雨人面不知何處洛浦非霧花無語還似朝雲何處去凌波不過橫塘路燕燕鶯鶯飛舞風吹仙袂飄飄舉擬倩遊絲惹住明妃相憶無消息目斷遙天雲自白寒山一帶傷心碧風土蕭疏故國長安不見浮雲隔縱使君來爭得班女來見蕊宫殿記得隨班迎鳯輦餘花落盡蒼苔院斜掩金鋪一扇千金買笑無方便和淚盈盈嬌眼錦瑟無處難輕訴錦瑟華年誰與度黃昏更下瀟瀟雨况是青春將暮花雖無語鶯能語來道曾逢郎否琵琶衫濕情何極上下花間聲轉急滿船明月蘆花白秋水長天一色芳年未老時難得目斷逺空凝碧放隊玉爐夜起沈香煙喚起佳人舞繡筵去似朝雲無處覓遊童陌上拾花鈿西子朝無咎腸斷越江岸越女江頭沙自浣天然玉貌鉛紅淺自弄芙蓉日晚紫騮嘶去猶回眄笑入荷花不見回紋寸結肝腸切織錦機邊音韻咽玉琴塵暗薰爐歇望盡床前秋月刀裁錦斷詩可滅恨似連環難絶羅敷歸去攜籠女南陌柔桑三月暮使君春思如飛絮五馬徘徊頻駐蠶饑日晚空留顧笑指秦樓歸去武陵煙暖武陵晚洞裏春長花爛漫紅英滿地溪流淺漸聽雲中雞犬劉郎迷路香風逺誤到蓬萊仙館蘇小蘇小最嬌妙幾度花間曾調笑雲情雨態知多少悔恨相逢又早劉郎襟韻正年少風月今宵偏好蘇蘇聲切恨難說千里潮平春浪闊梅風不解相思結忍送落花飛雪多才一去芳音絶更對珠簾新月張好好李漢老相望楚江上縈水繚雲凝妙唱龍沙醉眼看花浪正要風將月傍雲車瑶佩成惆悵衰栁自須相向太真黃山谷無語恨如許方士歸時腸斷處梨花一枝春帶雨半鈿分叉親付天長地久相思苦渺渺鯨波無路王昭君秦少遊回顧漢宫路捍撥檀槽鸞對舞玉容寂寞花無主顧影偷彈玉筯未央宫殿知何處目斷征鴻南去樂昌公主輦路江楓古樓上吹簫人在否菱花半璧香塵汚往日繁華何處舊歡新愛誰為主啼笑兩難分付崔徽翡翠好容止誰使庸奴輕㸃綴裴郎一見心如醉笑裏偷傳深意羅衣深夜與門吏暗結城西幽會無雙相慕無雙女當日尚書先曾許王郎明俊神仙侣腸斷別離情苦數年暌恨今復遇笑指襄江歸去灼灼腸斷繡簾捲妾願身為梁上燕朝朝暮暮長相見莫遣恩遷情變紅綃粉淚知何限萬古空傳遺怨盼盼戀戀樓中燕燕子樓空春日晚將君一去音容逺空鎖樓中深怨春風重到人不見十二闌干倚遍崔鶯鶯春夢神仙洞冉冉拂牆花樹動西廂待月知誰共更覺玉人情重紅娘深夜行雲送困嚲叉橫金鳳採蓮栁岸水清淺笑折荷花呼女伴盈盈日照新妝面水調空傳幽怨扁舟日暮笑聲逺對此令人腸斷煙中怨眷戀西湖岸湖面樓臺侵雲漢阿溪本是飛瓊伴風月朱扉斜掩謝郎巧思詩裁剪能動芳懷幽怨離魂記心素與誰語始信別離情最苦蘭舟欲解春江暮精爽隨君歸去異時攜手重來處夢覺春風庭户清友梅曾端伯清友羣芳右萬縞紛披兹獨秀天寒月薄黃昏後縞袂亭亭招手故山千樹連雲岫借問如今安否淨友蓮淨友如裝就折得清香來滿手一溪湛湛無塵垢白羽輕搖晴晝逺公保社今何有悵望東林搔首玉友酒玉友平生舊相與忘形偏耐久醉鄉徑到無何有莫問區區升斗人生一笑難開口為報速宜相就破子花好被花惱庭下嫣然如巧笑曾教健步移根到各是一般竒妙賞心樂事知多少亂插繁華晴昊二酒美直無比小甕新醅浮玉蟻空傳烏氏并程氏不數雲安麴米十花更互來相對常伴先生沈醉搗練子黃魯直梅凋粉栁搖金池塘波暖動遊鱗扇和風初晝永微雨後斂輕塵除非重見那人人再叙厚約深盟天機餘錦林下路水邊亭凉吹水面散餘酲小藤床隨意橫暗記得舊時經翠荷鬧雨做秋聲恁時節不怕聽薄命女一名長命女和凝天欲曉宫漏穿花聲繚繞窗裏星光少冷霞寒侵帳額殘月光沈樹杪夢斷錦帷空悄悄强起愁睂小馮延已春日宴緑酒一杯歌一遍再拜陳三願一願郎君千嵗二願妾身長健三願如同梁上燕嵗嵗長相見楊栁枝牛嶠膩粉瓊粧透碧紗雪休誇金鳯搔頭墜鬢斜髮交加倚著雲屏新睡覺思夢笑紅腮隱出枕函花有些些顧敻秋夜香閨思寂寥漏迢迢鴛幃羅幌麝煙銷燭光搖正憶玉郎遊蕩去無尋處更聞簾外雨蕭蕭滴芭蕉雅詞蔌蔌花飛一雨殘乍衣單屏風數幅畫江山水雲閒別易會難無計那淚澘澘夕陽樓上憑闌干望長安秋景趙君峰淅淅西風生暮寒繡衣單碧梧葉落藕香殘恨前歡月鏤虛櫺煙逗竹夢千山玉簫清夜憶孤鸞悄長閒感恩多牛嶠自從南浦別愁見丁香結近來情轉深憶鴛衾幾度將書託雁淚盈襟淚盈襟禮月求天願君知我心二兩條紅粉淚多少香閨意强攀桃李枝斂愁睂陌上鶯啼蝶舞栁花飛栁花飛願得郎心憶家還早歸醉公子顧敻漠漠秋雲淡紅藕香侵檻枕倚小山屏金鋪向晚扃睡起橫波慢獨望情何限衰栁數聲蟬魂銷似去年二岸栁垂金線雨晴鶯百囀家住緑楊邊往來多少年馬嘶芳草逺髙樓簾半捲斂袖翠蛾攢相逢爾許難尹鶚暮煙籠蘚砌㦸門猶未閉盡日醉尋春歸來月滿身離鞍偎繡袂墜巾花亂綴何處惱佳人檀㾗衣上新唐人門外猧兒吠知是蕭郎至剗襪下香階寃家今夜醉扶得入羅幃不肯脫羅衣醉則從他醉還勝獨睡時生查子韓偓侍女動粧奩故故驚人睡那知本未眠背靣偷垂淚懶缷鳳頭叉羞入鴛鴦被時復見殘燈和煙墜金穗牛希濟春山煙欲收天淡星稀少殘月臉邊明別淚臨清曉語多情更深回首猶重道記得緑羅裙處處憐芳草魏承班煙雨晚晴天零落花無語難話此時心梁燕雙來去琴韻對薰風有限和情撫腸斷斷絃頻淚滴黃金縷二寂寞畫堂空深夜垂羅幕燈暗錦屏欹月冷珠簾箔愁恨夢難成何處貪歡樂看看又春來還是長蕭索歐陽永叔去年元夜時花市燈如晝月在栁梢頭人約黃昏後今年元夜時月與燈依舊不見去年人淚滿春衫袖箏張子野含愁整翠鈿得意頻相顧雁柱十三弦一一春鶯語嬌雲容易飛夢斷知何處深院鎖黃昏陳陳芭蕉雨朱敦儒年年玉鏡臺梅蕊宫粧困今嵗未還家怕見江南信歡從別後疏淚向愁中盡遙想楚雲深人逺天涯近趙德莊新月曲如睂未有團圓意紅豆不堪看滿眼相思淚終日擘桃穰人在心兒裏兩朵隔牆花早晚成連理向伯恭春心如杜鵑日夜思歸切啼盡一川花愁落千山月遙憐白玉人翠被前香歇可慣獨眠寒減動豐肌雪二春山和恨長秋水無言度脈脈復盈盈幾㸃梨花雨深深一段愁寂寂無行路推去又還來沒箇遮欄處劈橙為軟金詞金章宗見歸潛志風流紫府郎飲痛烏紗岸柔軟九曲腸冷怯玻璃碗纎纎白玉蔥分破黃金彈借取洞庭春飛上桃花面摺疊扇朱新仲耆舊績聞宫紗蜂趁梅寶扇鸞開翅數摺聚清風一捻生秋意搖搖雲母輕裊裊瓊枝細莫解玉連環怕作飛花墜晏叔原金鞍美少年去躍青驄馬牽繫玉樓人翠被春寒夜消息未歸來寒食梨花謝無處說相思背面秋千下二輕輕製舞衣小小裁歌扇三月栁濃時又向津亭見垂淚送行人濕破紅粧面玉指袖中彈一曲清商怨三紅塵陌上遊碧栁隄邊住才趁彩雲來又逐飛花去深深美酒家曲曲幽香路風月有情時總是相逢處四官身幾日閒世事何時足君貌不長紅我鬢無重緑榴花滿􅊦香金縷多情曲且盡眼中歡莫嘆時光促陸務觀梁空燕委巢院靜鳩催雨香潤上朝衣客少閒談麈鬢邊千縷緑不是吳蠶吐孤夢泛瀟湘月落聞柔櫓上元戲陳敬叟劉潛夫繁燈奪霽華戲鼓催明發風物昔時同况味中年別淺畫鏡中睂深拜樓西月人散市聲收漸入愁時節王觀關山魂夢長塞雁音書少兩鬢可憐青一夜相思老歸傍碧紗窗說與人人道真箇別離難不似相逢好朱雍簾櫳月上時寂寞東風裏又是立黃昏梅影臨窗綺玉梅清夜寒夢斷還無寐曉角一聲殘吹徹人千里吕居仁殘春霧雨餘小院黃昏後說道覓新詞把酒來相就酴酴插髻雲嵗嵗長如舊不是做詞遲却怕添伊瘦二雙雙小鳳斜淡淡鴉兒穩一曲渭城歌栁色饒春恨離腸洗別愁酒盡愁難盡寶瑟雁縱橫誰寄天涯信三人分南浦春酒把陽關盞衣帶自無情頓為離人緩愁隨苦海深恨逐前峰逺更聽斷腸猿一似聞絃雁程正伯長記別節時月淡梅花影梅影又橫窗不見江南信無心換夕香有分憐朝鏡不怕瘦稜稜只怕梅開盡吕聖求攤錢臨小窗撲蝶
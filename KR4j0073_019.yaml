body:
  text: 花草稡編卷十九明陳耀文輯長調慶清朝踏青王通叟調雨為酥催氷做水東風分付春還何人便將輕暖點破殘寒結伴踏青去好平頭鞋子小雙鸞煙栁外望中秀色如有無間晴則箇隂則箇餖飣得天氣有許多般須教撩花撥栁爭要先看不道吳綾繡襪香泥斜沁幾行斑東風巧盡收翠緑吹在眉山上樓大參李居厚天啓重光地鍾上瑞有人起自東山當年謝傅幾曽鶴髮貂冠不似文章雋老重來鳴步斗樞間洪鈞轉五原草緑太白兵間運慶今朝初度正日添紋線月挂氷盤恩重御壺宣勸喜溢天顔聽取沙隄好語金科紅篆押千官春長在調元鼎裏不假還丹前調李易安禁幄低張彤欄巧護就中獨占殘春容華淡佇綽約俱見天真待得羣花過後一畨風露曉粧新妖嬈豔態妬風笑月長殢東君東城邉南陌上正日烘池館競走香輪綺筵散日誰人可繼芳塵更好明光宫殿幾枝先近日邉勻金樽倒拚了盡燭不管黃昏倦尋芳春景王元澤露晞向曉簾幕風輕小院間晝翠徑鶯來驚下亂紅鋪繡倚危樓登髙榭海棠著雨胭脂透算韶華又因循過了清明時候倦遊燕風光滿目好景良辰誰共攜手恨被榆錢買斷兩眉長鬬憶得髙陽人散後落花流水仍依蒨這情懷對東風盡成消瘦春閨潘元質一作蘇養直獸鐶半掩鴛甃無塵庭院瀟灑樹色沈沈春盡燕嬌鶯姹夢草池塘青漸滿海棠軒檻紅相亞聽簫聲記秦樓夜約彩鸞齊跨漸迤邐更催銀箭何處貪歡猶繫嬌馬旋剪燈花兩點翠眉誰畫香滅羞回空帳裏月髙猶在重簾下恨疏狂待歸來碎揉花打春思盧申之香泥壘燕密葉巢鶯春暗寒淺花徑風柔著地舞裀紅軟鬬草煙欺羅袂薄秋千影落春遊倦醉歸來記寶帳歌慵錦屏香暖别來悵光隂容易還又荼䕷牡丹開遍妬恨疏狂那更栁花迎面鴻羽難憑芳信短長安猶近歸期逺倚危樓但鎮日繡簾髙捲餞周糾定夫吳君特暮帆挂雨氷岸飛梅春思零亂送客將歸偏是故宫離苑醉酒曽同涼月舞尋芳還隔紅塵面去難留悵芙蓉路窄緑楊天逺便繫馬鶯邉清曉煙草晴花沙潤香軟爛錦年華誰念故人遊倦寒食相思隄上路行雲應在孤山畔寄新吟莫空回五湖春鴈玉簟涼史邦卿秋是愁鄉自錦瑟斷絃有淚如江平生花裏活奈舊夢難忘藍橋雲樹正緑料抱月幾夜眠香河漢阻但鳳音傳恨欄影敲涼新妝蓮嬌試曉梅瘦破春因甚却扇臨窗紅巾銜翠翼早弱水茫茫柔情各自未剪問此去莫負王昌芳信準更敢尋紅杏西廂燕春臺張子野麗日千門紫煙雙闕瓊林又報春回殿閣風微當時去燕還來五侯池館屏開探芳菲走馬天街重簾人語轔轔車幰逺近輕雷雕觴霞灩翠幕雲飛楚腰舞栁宫面粧梅金猊夜暖羅衣暗裛香煤洞府人歸笙歌燈火樓臺下蓬萊猶有花上月清影徘徊夏初臨初夏劉巨濟泛水新荷舞風輕燕園林夏日初長庭樹隂濃雛鶯學弄新簧小橋飛蓋入橫塘跨青蘋緑藻幽香朱欄斜倚霜紈未搖衣袂先涼歌歡稀遇怨别多同路遙水逺煙淡梅黃輕衫短帽相攜洞府流觴况有紅粧醉歸來寶蠟成行拂牙牀紗厨半開月在回廊逍遙樂黃魯直春意漸歸芳草故國佳人千里信沈音杳雨潤煙光晚景澄明極目危闌斜照夢當年少對尊前上客鄒枚小鬟燕趙共舞雪歌塵醉裏談笑花色枝枝爭好鬢絲年年漸老如今遇風景空瘦損向誰道東君幸賜天幕翠遮紅繞休休醉鄉岐路華胥蓬島迷神引述懷栁耆卿一葉扁舟輕帆捲暫泊楚江南岸孤城暮角引胡笳怨水茫茫平沙鴈旋驚散煙斂寒林簇畫屏展天際遙山小黛眉淺舊賞輕拋到此成遊宦覺客程勞年光晚異鄉風物忍蕭索當愁眼帝城賖秦樓阻旅魂亂芳草連空闊殘照滿佳人無消息斷雲逺朱雍白玉樓髙雲光繞望極新蟾同照前村暮雪霽梅林道澗風平波聲渺喜登眺疏影寒枝裊太春早臨水凝清淺靚粧巧瘦體傷離向此縈懷抱覺璧華輕氷痕小倦聽塞管轉嗚咽令人老素光回長亭靜無塵到煙鎖橫塘暖香徑悄飛英難拘束任春曉長亭怨慢薑堯章漸吹盡枝頭香絮是處人家緑深門户逺浦縈回暮帆零亂向何許閲人多矣誰得似長亭樹樹若有情時不會得青青如此日暮望髙城不見只見亂山無數韋郎去也怎忘得玉環分付第一是早早歸來怕紅蕚無人為主算只有并刀難剪離愁千縷黃鸝繞碧樹周美成雙闕籠嘉氣寒威日晚嵗華將暮小院間庭對寒梅照雪淡煙凝素忍當迅景動無限傷春情緒猶賴是上苑風光漸好芳容將煦草莢蘭芽漸吐且尋芳更休思慮這浮世甚驅馳利祿奔競塵土縱有魏珠照乘未買得流年住爭如盛飲流霞醉偎瓊樹帝臺春春恨李景元芳草碧色萋萋遍南陌飛絮亂紅也似知人春愁無力憶得盈盈拾翠侣共攜賞鳳城寒食到今來海角逢春天涯行客愁旋釋還似織淚暗拭又偷滴謾倚遍危闌儘黃昏也只是暮雲凝碧拚則而今巳拚了忘則怎生便忘得又還問鱗鴻試重尋消息瑶臺第一層上元扈蹕墨莊漫録宋宗室仲御嶰管聲催人報道嫦娥步月來鳳燈鸞炬寒輕簾箔光泛樓臺萬年正春未老更傍那日月蓬萊從仙仗看星河銀界錦繡天街歡陪千官萬騎九霄人在五雲堆赭袍光裏星毬宛轉花影徘徊未央宫漏永散異香龍闕崔嵬翠輿回奏仙韶歌吹寶殿尊罍賢良朱雍西母池邉宴罷贈南真步玉霄緒風和扇氷華發秀雪質孤髙漢波澄練影問是誰獨立江臯便凝望認壺中圭璧天上瓊瑶清標曽陪勝賞坐忘愁斛醉使塵銷况雙成與乳丹點深都付香梢夀粧酥冷郢韻珮舉麝捲雲綃樂逍遙鳳皇臺畔憶取吹簫碧芙蓉亦名尾犯栁耆卿晴煙羃羃漸東郊芳草染成輕碧野塘風暖遊魚動觸氷澌微坼幾行斷鴈旋次第歸霜磧詠新詩手撚江梅故人贈我春色似此光隂催逼念浮生不滿百雖照人軒冕潤屋金珠於身何益一種勞心力圗利祿殆非長策除是恁點檢笙歌訪尋羅綺銷得晝夜樂洞房記得初相遇便只合長相聚何期小會幽歡變作别離情緒况值闌珊春色暮對滿目亂花狂絮直恐好風光盡隨伊歸去一場寂寞憑誰訴算前言總輕負早知恁地難拚悔不當初留住其奈風流端正外更别有繫人心處一日不思量也攢眉千度二秀香家住桃花徑算神仙才堪並層波細剪明眸膩玉圓搓素頸愛把歌喉當筵逞遏天邉亂雲愁凝言語似嬌鶯一聲聲堪聽洞房飲散簾幃靜擁香衾歡心稱金爐麝裊青煙鳳帳燭搖紅影無限狂心乘酒興這歡娛漸入嘉境猶自怨鄰雞道秋宵不永山谷夜深記得臨岐語説花時歸來去教人每日思量到處與誰分付其奈寃家無定據約雲朝又還雨暮將淚入鴛衾總不成行步元來也解知思慮一封書深相許情知玉帳堪歡為向金門進取直待腰金拖紫後有夫人縣君相與爭奈會分疏沒嫌伊門路春草碧俗呼中管髙万俟雅言又隨芳緒生看翠連霽空愁遍征路東風裏誰望斷西塞恨迷南浦天涯地角意不盡消沈萬古曽是送别長亭下細緑暗煙雨何處亂紅鋪繡茵有醉眠蕩子拾翠逰女王孫逺栁外共殘照斷雲無語池塘夢生謝公後還能繼否獨上畫樓春山暝鴈飛去飛龍宴蘇小娘吳七郡王姬炎炎暑氣時流光閃爍間扃深院水閣涼亭半開簾幕遙觀灼灼榴花吐豔細雨灑小荷香淺樹隂竹影清涼瀟灑枕簟搖紈扇堪嘆浮世忙如箭對良辰歡樂莫辭頻勸遇酒逢歌恣情遂意迷戀須信人生聚奈區區利牽名絆少年未倦良天皓月金樽滿夏日燕黌堂雅詞拾遺日初長正園林換葉瓜李飄香簾外雨過送一霎微涼萍蕪徑曲凝珠顆襯汀沙細簇蜂房被晚風輕颭圓荷翻水潑覺鴛鴦此景最難忘稱芳樽泛蟻筠簟鋪湘蘭舟棹穩倚何處垂楊豈能文字成狂飲更紅裙間也何妨任醉歸明月蝦鬚簾篩幾線餘霜十月桃樂府雅詞東籬菊盡遍園林敗葉滿地寒荄露井平明破香籠粉初開佳人共喜芳意呵手剪密插鸞叉無言有豔不避繁霜變作春媒問武陵溪上誰栽分付與南國舞榭歌臺恰似凝酥襯玉點綴裝裁東君自是為主先暖信律管飛灰從今雪裏一畨花休話江梅十月梅梅苑千林凋盡一陽未報已綻南枝獨對霜天冒寒先占花期清香映月浮動臨淺水疏影斜欹孤標不似緑李夭桃取次成蹊縱夀陽粧臉偏宜應未笑天然雅態氷肌寄語髙樓憑欄羌管休吹東君自是為主調鼎鼐終付他時從今點綴百草千花須待春歸芰荷香万俟雅言小瀟湘正天影倒碧波面容光水仙朝罷間列緑蓋紅幢吹風細雨蕩十頃浥浥清香人在水精中央霜綃霧縠襟袂收涼欵放輕舟閙紅裏有蜻蜓點水交頸鴛鴦翠隂密處曽覔相並青房晚霞散綺泛逺淨一葉鳴榔擬去儘促雕觴歌雲未斷月上飛梁朱希真逺尋花正風亭霽雨煙浦移沙緩提金勒路擁桃葉香車憑髙悵飲照羽觴晚日橫斜六朝浪語繁華山圍故國綺散餘霞無奈尊前萬里客歎人今何在身老天涯壯心零落怕聽疉鼓椮檛江浮醉眼望浩渺空想靈槎曲終淚濕琵琶誰扶上馬不省還家並蒂芙蓉朝端禮能改齋漫録太液波澄向鑑中照影芙蓉同蒂千柄緑荷深並丹臉爭媚天心眷臨聖日殿宇分明敞嘉瑞弄香嗅蕊願君王夀與南山齊比池邉屢回翠輦擁羣仙醉賞憑欄凝思蕚緑攬飛瓊共波上遊戲西風又看露下更結雙雙新蓮子鬬裝競美問鴛鴦向誰留意水晶簾上定齋東軒誰道秋期逺更旬浹雙星相見雨足西簾正玉井蓮開夀筵初展麈尾呼風袪暑淨那更著綸巾羽扇殢清歌不記杯行任深任淺湖邉小池苑漸苔痕竹色青青如染辨橘中荷屋晚芳自占蝸角虛名身外事付骰子紛紛戲選喜時平公道開明話頭正轉福夀千春慶黃排岸梅坡栁暗三眠蓂翻七莢稟昴蕭生時叶信道鳳毛池上種却勝河東鸑鷟篤志典墳經旨素得歐陽學妙文章赴飛黃姓名即登鴈塔要成發軔勳業便先教濟川整頓舟楫兆朕于今須從此超遷榮膺異渥他日趨裝事待還鄉歡洽頌椒觴祝遐算夀同龜鶴雨中花慢張安國一葉凌波十里御風煙鬟雨鬢蕭蕭認得江臯玉珮氷館氷綃秋淨明霞乍吐曙涼宿靄初消恨微顰不語欲進還休凝佇迢遙神交冉冉愁思盈盈斷魂欲遣誰招還似待青鸞傳信烏鵲成橋悵望胎仙琴疉羞看翡翠蘭苕夢回人逺紅雲一片天際笙簫牡丹菊東坡今嵗花時深院盡日東風蕩揚茶煙但有緑苔芳草栁絮榆錢聞道城西長廊古寺甲第名園有國豔帶酒天香染袂為我留連清明過了殘紅無處對此淚灑樽前秋向晚一枝何事向我依然髙會聊追短景清商不假餘妍不如留取十分春態付與明年前調吳子和春濃恩重長離永别憑誰為返香魂憶湘裙霞袖杏臉櫻唇眉掃春山淡淡眼裁秋水盈盈便如何忘得溫柔情態恬靜天真憑闌念及夕陽西下暮煙四起江村漸入夜疏星映栁新月籠雲醖造一生清瘦能消幾箇黃昏斷腸時候簾垂深院人掩重門春日旅况劉伯寵縹蒂緗枝玉葉翡英百梢爭趂春忙正雨後蜂粘落絮燕撲晴香遺䇿誰家蕩子唾花何處新粧想流紅有恨拾翠無心往事凄涼春愁如海客思翻空帶圍只看東陽更那堪玉笙度曲翠羽傳觴紅淚不勝閨怨白雲應老他鄉夢回羇枕風驚庭樹月在西廂前調張才翁萬縷青青初眠官栁向人猶未成隂據征鞍無語擁鼻微吟逺宦情懷誰問空勞壯志銷凝好花時節山城留滯又負歸心别離萬里飄蓬無定誰念會合難憑相聚裏莫辭金盞酒淺還深欲把春愁抖擻春愁轉更難禁亂山髙處憑欄垂袖聊寄登臨才翁風韻不羈初任臨卭秋官張公庠待之不厚會有白鶴之遊郡守率屬官同往才翁不預乃語官妓楊皎曰老子到彼必有詩詞可速寄來公庠既到白鶴便留題曰初眠官栁未成隂馬上聊為擁鼻吟逺宦情懷銷壯志好花時節負歸心别離長恨人南北會合休論酒淺深欲把
body:
  text: 花草稡編卷二十二明陳耀文輯長調瑞鶴仙上元康伯可瑞烟浮禁苑正絳闕春回新正方半冰輪桂華滿溢花衢歌市芙容開遍龍樓兩觀見銀燭星毬有爛捲珠簾盡日笙歌盛集寶叉金釧堪羡綺羅叢裏蘭麝香中正宜遊玩風柔夜暖花影亂笑聲喧閙蛾兒滿路成團打塊簇著冠兒鬬轉喜皇都舊日風光太平再見二薄寒羅䄂怯教小玉添香被翻宫襭蘭缸半明滅聽幾聲歸鴈一簾微月情波恨葉索新詞猶自怨别夢回時雪暖酥凝掠鬢寶鴛叉折凄切紋窗描繡舊譜尋棊便成虛設同心對結重來是甚時節悵姑蘇臺上征帆何許隱隱遙山萬疊䄂紅綃獨立無言偷彈淚血春游周美成悄郊原帶郭行路永客去車塵漠漠斜陽映山落斂餘紅猶戀孤城欄角凌波步弱過短亭何用素約有流鶯勸我重解繡鞍緩引春酌不記歸時早暮上馬誰扶醒眠朱閣驚飈動幕扶殘醉繞紅藥嘆西園已是花深無地東風何事又惡任流光過却猶喜洞天自樂玉照新志云美成以待制提舉南京鴻慶宫自杭徙居睦州夢中作此一闋既覺猶能全記了不詳其所謂也未幾清溪賊方臘起方還杭州舊居而道路兵戈已滿始入錢塘門但見杭人蒼黃奔避視落日半在鼓角樓簷門即詞中所謂斜陽映山落斂餘霞猶戀孤城欄角者應矣當是時承平日久而狂寇嘯聚直聲言遂據二浙美成之舊居既不可往是日無處得食飢甚忽于稠人中有呼待制何往者視之鄉人侍兒也邀入酒家美成驚遽間連飲數杯散去乃詞中所謂凌波云云春酌之句驗矣飲罷覺微醉惶惑徑去城北江漲橋諸寺士女巳盈滿獨一小寺經閣偶無人遂宿其上即詞中所謂上馬誰扶醒眠朱閣是應矣既而奔避絶江居揚州傳聞方賊已盡據二浙涉江之淮泗因自計鴻慶宫有齊㕔可居乃携家往焉則詞中所謂念西園巳是花深無地東風又惡之語應矣至鴻慶未幾以疾卒則任流光過了歸來洞天自樂又應于身後矣美成平生好作樂府將死之際夢中得句而字字俱驗卒章又驗于身後豈偶然哉送張丞罷官歸柯山侯彥周楚山無際碧湛一溪晴緑四郊寒色霜華弄初日看玉明遙草金鋪平磧天涯倦翼更何堪臨岐送客念飛蓬斷梗無蹤把酒後期難覔愁寂梅花憔悴茅舍蕭踈倍添悽惻維舟岸側留君飲醉休惜想柯山春晚還家應對菊老松堅舊宅嘆宦游索寞情懷甚時去得春情陸子逸臉霞紅印枕睡覺來冠兒還是不整屏間麝煤冷但眉山壓翠淚珠彈粉堂深晝永燕交飛風簾露井恨無人與說相思近日帶圍寬盡重省殘燈朱幌淡月紗窗那時風景陽臺路逺雲雨夢便無凖待歸來先指花梢教看却把心期細問問因循過了青春怎生意穩前調趙德莊攬垂楊細折有别情遺愛與君都說文茵帶雕軛是行春來處去年阡陌柔桑半葉轉光風輕揚秀麥正人家共約耕相借牛社相留客清絶溪山猶記脫帽吟風倚樓招月東君何事將春至放春歇道從今江上一花一栁皆想油幢瑞節縱離愁瘦减腰圍帶金正曄秋思吳子和風傳秋信至顫葉葉庭梧飄零階砌年華迅流水况榮枯翻手存亡彈指誰編故紙論古往英雄鬭智在當時喚做功名到此盡成閒氣何謂生為行客死乃歸人世同驛邸十步九計空勞攘謾兒戲忍都將有限光隂縈絆趁逐無窮天地我直須跳出樊籠做箇俏底前調史達祖杏烟嬌濕鬢過杜若汀洲楚衣香潤回頭翠樓近指鴛鴦沙上暗藏春恨歸鞭隱隱便不念芳盟未穩自簫聲吹落雲東再數故園花信誰問聽歌窗罅倚月鉤欄舊家輕俊芳心一寸相思後總灰盡奈春風多事吹花搖栁也把幽情喚醒對南溪桃蕚翻紅又成瘦損賦紅梅館娃春睡起為發妝酒暖臉霞輕膩冰霜一生裏厭從來冷淡粉腮重洗胭脂暗試便無限芳穠氣味向黃昏竹外寒深醉裏為誰偷倚嬌媚春風模樣霜月心腸瘦來肌體孤香細細吹夢到杏花底被髙樓橫管一聲驚斷却對南枝灑淚謾相思桃葉桃根舊家姊妹梅辛幼安鴈霜寒透幕正護月雲輕嫩冰猶薄溪奩照梳掠想含香弄粉艷粧難學玉肌瘦弱更重重龍綃襯著倚東風一笑嫣然轉盻萬花羞落寂寞家山何在雪後園林水邊樓閣瑶池舊約鄰翁更仗誰托粉蝶兒只尋桃覔柳開遍南枝未覺但傷心冷落黃昏數聲畫角離筵代意洪叔璵聽梅花吹動凉夜何其明星有爛相看淚如霰問而今去也何時㑹面匆匆聚散恐便作秋鴻社燕最傷情夜來枕上斷雲零雨何限因念人生萬事回首悲凉都成夢幻芳心繾綣空惆悵巫陽館况船頭一轉三千餘里隱隱髙城不見恨無情春水連天片帆似箭龍吟曲問梅劉寺史邦卿夜寒幽夢飛來小梅影下東風曉蝶魂未冷吾身良是悠然一笑竹杖敲苔布鞋踏凍嵗常先到傍蒼林却恨儲風養月須我輩新詩弔永以南枝為好怕從今逢花漸老愁消秀句寒回斗酒春心多少之子逃空伊人遁世又還驚覺但歸來對月髙情耿耿寄白雪杪雪夢回虛白初生便疑冷月通窗户不知夜久都無人見玉妃起舞銀界回天瓊田易地晃然非故想兒童健意生愁霽色情頻在窺簷處一片樵林釣浦是天教王維畫取未知授簡先將髙興收歸妙句江路梅愁灞陵人老又騎驢去過章臺不記春風乍見倚簾吹絮一捻紅紫姑夷堅支志覩嬌紅細捻是西子當日留心千葉西都競栽接賞園林臺榭何妨日涉輕羅慢褶費多少陽和調燮向曉來露浥芳苞一㸃醉紅潮頰雙靨姚黃國艷魏紫天香倚風羞怯雲鬟試插引動狂蜂浪蝶况東君開宴賞心樂事莫惜獻酬頻疊看相將紅藥翻階尚餘侍妾沈延年邀致者安公子陸務觀風雨初經社子規聲裏春光謝最是無情零落盡薔薇一架况我今年憔悴幽窗下人盡怪詩酒消聲價向藥爐經卷忘却鶯窗柳榭萬事收心也粉痕猶在香羅帕恨月愁花爭信道如今都罷空憶前身便面章臺馬因自來禁得心腸怕縱遇歌逢舞但說京都舊話旅情栁耆卿逺岸收殘雨雨殘稍覺江天暮拾翠汀洲人寂靜立雙雙鷗鷺望幾㸃漁燈隱映蒹葭浦停畫橈兩兩舟人語道去程今夜遙指前村烟樹游宦成羈旅短檣吟倚閒凝竚萬水千山迷逺近想鄉關何處自别處風亭月榭辜歡聚剛斷腸惹得離情苦聽杜鵑聲聲勸人不如歸去花發狀元紅慢劉伯夀几三春向暮萬卉成隂有嘉艷方折嬌姿嫩質冠羣品共賞傾城傾國上苑晴晝暄千素萬紅猶竒特綺筵開㑹詠歌才子壓倒元白别有芳幽苞小步帳華絲綺軒油壁與紫鴛鴦素蛺蝶自清旦往往連夕巧鶯喧脆管嬌燕語雕梁留客武陵人念夢役意濃堪遣情溺右劉几在神宗時與范蜀公重定大樂洛陽花品曰狀元紅為一時之冠樂工花日新能為新聲汴妓郜懿以色著祕監致仕劉伯夀尤精音律熙寧中几携花日新就郜懿歡詠仍撰此曲填詞以贈之人有謂為髙達者郜懿第六即蔡奴之母也李定之父與郜六遊生定而郜六死定不之知也及王荆公為宰相擢用李定言官交攻以為母死不持服為此蔡奴亦以色著云霓裳中序第一詹可大一規古蟾魄瞥過宣和幾春色知那箇栁鬆花怯曾磋玉團香塗雲抹月龍章鳯刻是如何兒女消得便孤了翠鸞何限人更在天北磨滅古今離别幸相從薊門仙客蕭然林下秋葉對雲淡星踈眉青影白佳人已傾國贏得癡銅舊畫興亡事道人知否見了也華髮至元間監醮長春宫偶見羽士丈室古鏡狀似秋葉背有金刻宣和御寶四字有感因賦應法孫愁雲翠萬叠露栁殘蟬空抱葉簾捲流蘇寶結乍庭戶嫩凉䦨干微月玉纎勝雪委素紈塵鎖香篋思前事鶯期燕約寂寞向誰說悲切漏籖聲咽漸寒灺蘭缸未滅良宵長是間别恨酒凝紅綃粉涴瑶玦鏡盟鸞影缺吹怨笛西風數闋無言久和衣成夢睡損縷金蝶喜遷鶯蔡子正墨客揮犀霜天秋曉正紫塞故壘黃雲衰草漢馬嘶風邊鴻呌月隴上鐵衣寒早劒歌騎曲悲壯盡道君恩須報塞垣樂盡櫜鞬錦領山西年少談笑刀斗靜烽火一把時報平安耗聖主憂邊威懷遐逺强敵尚寬天討嵗華向晚愁思誰念玉關人老太平也且歡娛莫惜金尊頻倒元豐間挺自西掖出鎮平陽府經數載意欲歸作此詞詞播中都遂徹聖聽上因語吕丞相曰蔡挺欲歸遂以西掖召還丞相生日康伯可臘殘春早正簾幕護寒樓臺清曉寶運當千佳辰餘五嵩嶽誕生元老帝遣阜安宗社人仰雍容廊廟盡總道是文章孔孟勳庸周召師表方眷遇魚水君臣須信從來少玉帶金魚朱顔緑鬢占斷世間榮耀篆刻鼎彛將遍整頓乾坤都了願嵗嵗見柳梢青淺梅英紅小秋夜聞鴈秋寒初徑看雲路鴈來碧天如鏡湘浦煙深衡陽沙逺風外幾行斜陳回首塞門何處故國關河重省漢使老認上林欲下裴回清影江南煙水暝聲過小樓燭暗金猊冷送目鳴琴裁詩挑錦此恨此情無盡夢想洞庭飛下散入雲濤千頃過盡也奈杜陵人逺玉關無信立春吳浩然譙樓殘月聽畫角曉寒梅花吹徹瑞日祥雲風和解凍青帝乍臨東闕暖向土牛簫鼓天路珠簾髙揭最好是戴綵幡春勝叉頭雙結竒絶開宴處珠履玳簪爼豆爭羅列舞䄂翩翩歌喉縹渺壓倒柳腰鶯舌勸我應時納祐還把金爐香爇願嵗嵗把一巵春酒長陪佳節閠元宵吳子和銀蟾光彩喜稔嵗閏正元宵還再樂事難并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引遍嬉遊寶馬香車喧隘情快天意教人月更圓償足風流債媚栁煙濃夭桃紅小景物逈然堪愛巷陌笑聲不斷襟䄂餘香仍在待歸也便相期明日踏青挑菜端午梅霖初歇正綘色海榴爭開佳節角黍包金香蒲切玉是處玳筵羅列鬬巧盡輸年少玉腕彩絲雙結艤彩舫見龍舟兩兩波心齊發竒絶難畫處激起浪花翻作湖間雪畫鼓轟雷紅旗掣電奪罷錦標方徹望中水天日暮猶自珠簾髙揭棹歸晚載荷香十里一鈎新月春宴趙文鼎韶華駘蕩看花工盡力安排春仗薄霧霏烟軟風輕日物態與人交暢鳥聲弄巧千調樓影垂空十丈亂花栁粲寶鈿纓絡綵絲帷帳佳賞輝艷冶笑語盈盈花面交相向歌運長繅酒凝深碧和氣盎然席上好春易苦風雨人意難逢舒放但拍掌醉陶然一笑忘形天壤春感易彥祥帝城春晝見杏臉桃腮胭脂微透一霎兒晴一霎兒雨正是催花時候淡烟細栁如畫雅稱踏青携手怎知道那人人獨倚䦨干消瘦别後音信斷應是淚珠滴遍香羅袖記得年時膽瓶兒畔曾把牡丹同嗅故鄉水遙山逺怎得新歡如舊強消遣把閒愁推入花前杯酒秋懷髙賔王凉雲歸去再約著晚來西樓風雨水靜簾隂鷗閒菰影秋到露汀煙浦試省喚回幽恨盡是愁邊新句倦登眺動悲凉還在殘蟬吟處凄楚空見說香鎖霧扄心似秋蓮苦寶瑟彈冰玉臺窺月淺黛可憐偷聚幾時翠溝題葉無復繡簾吹絮鬢華晚念庾郎情在風流誰與黃鍾元宵曲史達祖月波凝滴望玉壺天近了無塵隔翠眼圈花冰絲織練黃道寶光相直自憐詩酒瘦難應接許多春色最無賴是隨香趁燭曾伴狂客蹤跡謾記憶老了杜郎忍聽東風笛柳院燈踈梅㕔雪在誰與細傾春碧舊情拘未定猶自學當年游歷怕萬一誤玉人夜寒窗簾隙送韓夷邪驃騎下淮金主亮桯史旌麾初舉正駃騠力健嘶風江渚射虎將軍落雕都尉繡帽錦袍翹楚怒磔㦸髯爭奮捲地一聲鼙鼓笑談頃指長江齊楚六師飛渡此去無自墮金印如斗獨在功名取斷鎖機謀垂鞭方略人事本無今古試展臥龍韜韞果見成功旦莫問江左想雲霓望切𤣥黃迎路别內側室王正之歸潛志玉樓歡宴記遺簪綺席題詩羅扇月枕雙欹雲窗同夢相伴小花深院舊歡頓成陳迹翻作一畨新怨素秋晚聽陽關三疊一樽相餞留戀情繾綣紅淚洗粧雨濕梨花面月底關河馬頭星月西去一程程逺但願此情如舊天也不違人願再相見老生涯分付藥爐經卷龍女郝仙廟汀洲蘋滿記翠籠采采相將鄰媛
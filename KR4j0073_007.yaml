body:
  text: 花草稡編卷七明陳耀文撰小令憶秦娥一名秦樓月一名雙荷葉李太白簫聲咽秦娥夢斷秦樓月秦樓月年年柳色灞陵傷别樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕佳人周美成香馥馥樽前有個人如玉人如玉翠翹金鳯內家粧束嬌羞愛把眉兒蹙逢人只唱相思曲相思曲一聲聲是怨紅愁緑二雙溪月清光偏照雙荷葉雙荷葉紅心未偶緑衣偷結背風迎雨淚珠滑輕舟短棹先秋折先秋折煙鬟未上玊杯微缺陳去非魚龍舞湘君欲下瀟湘浦瀟湘浦興亡離合亂波平楚獨無樽酒酬端午移舟來聽明山雨明山雨白頭孤客洞庭懷古程正伯青門深海棠開盡春隂隂春隂隂萬重雲水一寸歸心玉樓深鎖烟消沉知他何日同登臨同登臨待收紅淚細說如今二愁無語黃花庭院黃梅雨黃梅雨新愁一寸舊愁千縷杜䳌呌斷空山苦相思欲寄人何許人何許一重雲斷一重山阻春思康伯可春寂寞長安古道東風惡東風惡胭脂滿地杏花零落臂銷不奈黃金鐲天寒尚怯春衫薄春衫薄不禁揾淚為君彈却房舜卿與君别相思一夜梅花發梅花發凄凉南浦斷橋斜月盈盈微步凌波襪東風笑倚天涯濶天涯濶一聲羌管暮雲愁絶曾純甫西風節碧雲捲盡秋宵月秋霄月關河千里照人離别樽前俱是天涯客那堪三載遙相憶遙相憶年光依舊漸成華髮邯鄲道望叢臺有感前人風蕭瑟邯鄲古道傷行客傷行客繁華一瞬不堪思憶叢臺舞歌無消息金樽玊管空塵跡空塵跡連天草樹暮雲凝碧范至能湘江碧故人同作湘中客湘中客東風空鴈杏花寒食溫溫月到藍橋側醒心絃裏春無極春無極明朝殘夢馬嘶南陌向伯恭芳菲歇故園目斷傷心切傷心切無邊烟水無窮山色可惜更近乾龍節眼中淚盡空啼血空啼血子規聲外曉風殘月二蟲聲切柔腸欲斷傷離别傷離别幾行清淚界殘紅頰玉階白露侵紅襪下簾却望玲朧月玲朧月寒光零亂照人愁絶周紫芝東風歇香塵滿院花如雪花如雪看看又是黃昏時節無言獨自添香鴨相思情絮無人說無人說照人只有西樓斜月二暮雲碧佳人不見愁如織愁如織兩行征鴈數聲羌笛錦書難寄西飛翼無言只是空相憶空相憶紗忩人夢夢雙人隻三嬌滴滴雙眉斂破春山色春山色為君含笑為君愁蹙多情别後無消息此時更有誰知得誰知得夜深無寐度江橫笛四臨髙閣亂山平野烟光薄烟光薄棲鴉歸後暮天吹角斷香殘酒襟懷惡西風吹趂梧桐落梧桐落又還愁也又還寂寞别情万俟雅言千里草萋萋盡處遙山小遙山小行人逺似此山多少天若有情天亦老此情說便說不了說不了一聲喚起又驚春曉碧雲深張輯風凄凄井欄絡緯驚秋啼驚秋啼凉侵好夢月正樓西卷簾望月知心誰關河空隔長相思長相思碧雲暮合有美人兮賀方回曉曚曚前溪百鳥啼匆匆啼匆匆凌波人去拜月樓空舊年今日東門東鮮粧輝映桃花紅桃花紅吹開吹洛一任東風懷人朱雍風蕭蕭驛亭春信期春潮期春潮黃昏浮動誰在江臯碧雲冉冉橫溪橋瓊車未至餘香飄餘香飄一簾踈影月在花梢蓬萊閣秦樓月宋人齊乘烟漠漠水天搖蕩蓬萊閣蓬萊閣朱甍碧瓦半浸寥廓三山謾有長生藥茫茫雲海風濤惡風濤惡仙槎不見暮沙潮落詩餘秋寂寂碧紗忩外人橫笛人橫笛天津橋上舊曽聽得宮粧玉指無人識龍吟水底聲初息聲初息月明江上數峯凝碧詩餘雲垂幕隂風慘淡天花落天花落千林瓊玖滿空鸞鶴征車渺渺穿華薄路迢迢倍增離索增離索楚溪山水碧湘樓閣秋宵黃叔暘心如結西風老盡黃花節黃花節塞鴻聲斷冷烟凄月漢朝陵廟唐宮闕興衰萬變從誰說從誰說千年青史幾人華髮初春楊萬里新春早春前十日春歸了春歸了落梅如雪野桃紅小老夫不管春催老只圖爛醉花前倒花前倒兒扶歸去醒來忩曉閨情孫夫人鄭文妻花深深一鈎羅襪行花隂行花隂閒將柳帶試結同心耳邊消息空沉沉畫眉樓上愁登臨愁登臨海棠開後望到如今正月六日夜月朱淑真彎彎曲新年新月鈎寒玊鈎寒玊鳯鞋兒小翠眉兒蹙閙蛾雪柳添妝束燭籠火樹爭馳逐爭馳逐元宵三五不如初六更漏子溫廷筠柳絲長春雨細花外漏聲迢遞驚塞鴈起城烏畫屏金鷓鴣香霧薄透簾幕惆悵謝家池閣紅燭背繡簾垂夢長君不知二星斗稀鐘鼓歇簾外曉鶯殘月蘭露重柳風斜滿庭堆落花虛閣上倚欄望還似去年惆悵春欲暮思無窮舊歡如夢中三金雀叉紅粉靣花裏暫時相見知我意感君憐此情須問天香作穗䗶成淚還似兩人心意山枕膩錦衾寒覺來更漏殘四相見稀相憶久眉淺淡煙如柳垂翠幕結同心待郎燻繡衾城上月白如雪蟬鬢美人愁絶宮樹暗鵲橋橫玉籖初報明五背江樓臨海月城上角聲嗚咽堤柳動島煙昏兩行征鴈分京口路歸帆渡正是芳菲欲度銀燭盡玊繩低一聲村落雞六玊爐煙紅蠟淚偏對畫堂秋思眉翠薄鬢雲殘夜長衾枕寒梧桐樹三更雨不道離情正苦一葉葉一聲聲空階滴到明韋莊鐘鼓寒樓閣暝月照古桐金井深院閉小庭空落花香露紅煙柳重春霧薄燈背水忩髙閣閒倚户暗沾衣待郎郎不歸牛嶠星漸稀漏頻轉何處輪臺聲怨香閣掩杏花紅月明楊柳風挑錦字記情事唯願兩心相似收淚語背燈眠玊叉橫枕邊二春夜䦨更漏促金燼暗挑殘燭驚夢斷錦屏深兩鄉明月心閨草碧望歸客還是不知消息辜負我悔憐君告天天不聞三南浦情紅粉淚爭奈兩人深意低翠黛卷征衣馬嘶霜葉飛招手别寸腸結還是去年時節書託鴈夢歸家覺來江月斜毛文錫春夜闌春恨切花外子規啼月人不見夢難憑紅紗一㸃燈偏怨别是芳節庭下丁香千結宵霧散曉霞輝梁間雙燕飛顧瓊舊歡娛新悵望擁鼻含嚬樓上濃柳翠晚霞微江鷗接翼飛簾半捲屏斜掩逺岫參差迷眼歌滿耳酒盈樽前非不要論孫光憲聽寒更聞逺鴈半夜蕭娘深院扄繡户下珠簾滿庭噴玊蟾人語靜香閨冷紅幕半垂清影雲雨態蕙蘭心此情江海深二今夜期來日别相對秪堪愁絶偎粉靣撚搖簮無言淚滿襟銀箭落霜華薄墻外曉雞咿喔聽付囑惡情悰斷腸西復東毛熙震秋色清河影淡深户燭寒光暗綃幌碧錦衾紅博山香炷融更漏咽蛩鳴切滿院霜華如雪新月上薄雲收映簾懸玊鈎二煙月寒秋夜靜漏轉金壺初永羅幕下繡屏空燈花結碎紅人悄悄愁無了思夢不成難曉長憶得與郎期竊香私語時三金剪刀青絲髮香墨蠻箋親札和粉淚一時封此情千萬重蓬垂鬢塵青鏡已分今生薄命將逺恨上髙樓寒江天外流四秋水平黃葉晚落日渡頭雲散擡朱箔掛金鈎暮潮人倚樓歡娛地思前事歌罷不勝沉醉消息逺夢魂狂酒醒空斷腸五風帶寒秋正好蘭蕙無端先老雲杳杳樹依依離人殊未歸搴羅幕憑朱閣不獨堪悲搖落月東出鴈南飛誰家夜搗衣歐集亦有六鴈孤飛人獨坐看却一秋空過瑶草短菊花殘蕭條漸向寒簾幕裡青苔地誰信閒愁如醉星移後月圓時風搖夜合枝七夜初長人近别夢斷一忩殘月鸚鵡睡蟪蛄鳴西風寒未成紅蠟燭伴碁局床上畫屏山緑褰繡幌倚瑶琴前歡淚滿襟晏同叔蕣華濃山翠淺一寸秋波如剪紅日永綺筵開暗隨仙馭來遏雲聲回雪袖占斷曉鶯春柳才送目又顰眉此情誰得知二雪藏梅烟著柳依約上春時候初送鴈欲聞鶯緑池波浪生探花開留客醉憶得去年情味金盞酒玊爐香任他紅日長小山詞檻花稀池草遍冷落吹笙庭院人去日燕西飛燕歸人未歸數書期尋夢意彈指一年春事新悵望舊悲凉不堪紅日長二柳絲長桃葉小深院斷無人到紅日淡緑烟晴流鶯三兩聲雪香濃檀暈少枕上卧枝花好春思重曉粧遲尋思殘夢時三露華髙風信逺宿醉畫簾低卷梳洗倦冶逰慵緑窗春睡濃綵條輕金縷重昨日小橋相送芳草恨落花愁去年同倚樓四柳間眠花裏醉不惜繡裙鋪地叉燕重鬢蟬輕一雙梅子青粉箋書羅袖淚還有可憐新意遮悶緑掩羞紅晚來團扇風張子野杜陵春秦樹晚傷别更堪臨逺南去信欲憑誰歸鴻多北歸小桃枝紅蓓發今夜昔時風月休苦意說相思少情人不知杜夀域臉如花花不笑雙臉勝花能笑肌似玊玊非溫肌溫勝玊溫既相逢情不重何似當初休共情既重却分飛爭如不見伊向子諲鵲橋邊牛渚上翠節紅旌相向承玊露挹金風年年歲歲同懶飛梭停弄杼遙想彩雲深處人咫尺事關山無聊獨倚欄二雪中韓叔夏席上小忩前踈影下鸞鏡弄粧初罷梅似雪雪如人都無一㸃塵暮江寒人響絶更著朦朧微月山似玊玉如君相看一笑溫三題趙伯山清白軒時王豐父同賦竹孤青梅釅白更著使君清絶梅似竹竹如君須知德有鄰月同髙風同調月底風前一笑翻碎影度浮香與人風味長蒲江蓼花蘩桐葉下寂寂夢回凉夜城角斷砌蛩悲月髙風起時衣上淚誰堪寄一寸妾心千里人北去鴈南征滿庭秋草生天機解語花斷腸草諳盡風流煩惱歡㑹少别離多此情無奈何帳前燈忩間月記得那時節繡被剩畫屏空如今在夢中梅苑綘紗籠金葉蓋向戲燈花猶在氷未結小琉璃壠梅香滿枝雪無香花有意不是江南新寄霜月净碧天寒玊樓人倚闌寄季玊妹延安夫人小闌干深院宇依舊當時别處朱户鎖玊樓空一簾霜日紅弄珠江何處是望斷碧雲無際凝淚眼出重城隔溪羌笛聲喜遷鶯人洶洶鼓鼕鼕襟䄂五更風大羅天上月朦朧騎馬上虛空香滿衣雲滿路鸞鳯繞身飛舞霓旌綘節一羣羣引見玉華君二街鼓動禁城開天上探人回鳯銜金榜出雲來平地一聲雷鶯已遷龍已化一夜滿城車馬家家樓上簇神仙爭看鶴冲天薛昭藴金門曉玊京春駿馬驟輕塵樺煙深處白衫新認得化龍身九陌喧千户啓滿䄂桂香風細杏園歡宴曲江濵自此占芳辰三清明節雨晴天得意正當年馬驕泥軟錦連乾香䄂半籠鞭花色融人竟賞盡是繡鞍朱鞅日斜無計更留連歸路草和煙毛文錫芳春景暖晴煙喬朩見鶯遷傳枝隈葉語關關飛過綺叢間錦翼鮮金毳軟百囀千嬌相喚碧紗忩曉怕聞聲驚破鴛鴦暖李後主曉月墜宿雲微無語枕憑欹夢回芳草思依依天逺鴈聲稀啼鶯散餘花亂寂寞畫堂深院片紅休掃儘從伊留待舞人歸馮延已本作和凝曉月墜宿雲披銀燭錦屏帷建章鍾動玉繩低宮漏出花遲春態淺來雙燕紅日初長一線嚴粧欲罷囀黃鸝飛上萬年枝見南唐書二宿鶯啼鄉夢斷春樹曉朦朧殘燈和燼閉朱櫳人語隔屏風香已寒燈已絶忽憶去年離别石城花雨倚江樓波上朩蘭舟鶴冲天夏英公青箱雜記霞散綺月沉鈎簾捲未央樓夜深河漢接天流宮殿鎖新秋瑶階曙金莖露鳯髓香和雲霧三千珠翠擁宸逰水殿按梁州歐陽永叔梅謝粉柳拖金香滿舊園林養花天氣半晴隂花好却愁深花無數愁無數花好却愁春去戴花持酒祝東風千萬莫匆匆二花不盡柳無窮應與我情同觥船一棹百分空何處不相逢朱絃悄知音少天若有情應老勸君看取利名場今古夢茫茫春光好即喜遷鶯馮延已露濛濛風淅淅楊柳帶踈烟飄飄輕絮滿南園墻下草芊綿燕初飛鶯已老拂靣春風長好相逢携酒且髙歌人生得幾何阮郎歸一名醉桃源碧桃春李後主東風吹水月銜山春來長是閒落花狼籍酒闌珊笙歌醉夢間珮聲悄晚粧殘憑誰整翠鬟留連光景惜朱顔黃昏獨倚闌後有𨽻書東宫書府印二南園春半踏青時風和聞馬嘶青梅如豆柳如眉日長蝴蝶飛花露重草烟低人家簾幕垂秋千慵困解羅衣畫梁雙燕歸三角聲吹斷隴梅枝孤忩月影低塞鴻無限欲驚飛城烏休夜啼尋斷夢掩香閨行人去路迷門前楊柳緑隂齊何時聞馬嘶歐陽永叔雪霜林際見依稀清香已暗期前村已遍倚南枝羣花猶未知情似舊賞休遲看看壠上吹便從今日賞芳菲韶華取次歸晏叔原來時紅日弄忩紗春紅入睡霞去時庭樹欲棲鴉香屏掩月斜收翠羽整粧華青驪信又差玊笙猶戀碧桃花今宵未憶家二舊香殘粉似當初人情恨不如一春猶有數行書秋來書更踈衾鳯冷枕鸞孤愁腸待酒舒夢魂縱有也成虛那堪和夢無司馬光青箱雜記漁舟容易入深山仙家日日閒綺忩紗幌映朱顔相逢醉夢間松露冷海霞殷匆匆整棹還落花寂寂水潺潺重尋此路難張子野仙郎何日是來期無心雲勝伊行雲猶解傍山飛郎行去不歸强自畫又芳菲春深輕薄衣桃花無語伴相思隂隂月上時二落花浮水樹臨池年前心眼期見來無事去還思而今花又飛淺螺黛淡胭脂閒粧取次冝隔簾風雨閉門時此情江月知東坡緑槐髙柳咽新蟬薰風初入絃碧紗忩下水沉煙棋聲驚晝眠踈雨過小荷翻榴花開欲燃玊盆纎手弄清泉瓊珠碎却圓古今詞話云觀者歎服其入句狀八景音律一同殊不散亂人爭寶之刻之琬琰掛于堂室間也茶黃山谷歌停檀板舞停鸞髙陽飲興闌獸煙噴盡玉壺乾香分小鳯團雲浪淺露珠圓捧甌春笋寒綘紗籠下躍金鞍歸時人倚闌詩餘舊本以前詞話東坡狀八景入此下諸刻因之誤效福唐獨木橋體作茶詞前人烹茶留客駐雕鞍有人愁逺山别郎容易見郎難月斜忩外山歸去後憶前歡畫屏金博山一杯春露莫留殘與郎扶玉山三退紅衫子亂蜂兒衣寬只為伊為伊去得忒多時教人直是疑長睡晚理粧遲愁多懶畫眉夜來算得有歸期燈花則甚知秦少游碧天如水月如眉城頭銀漏遲緑波風動畫船移嬌羞初見時銀燭暗翠簾垂芳心兩自知楚臺魂斷曉雲飛幽歡難再期二褪花新緑漸團枝撲人風絮飛秋千未拆水平堤落紅成地衣逰蝶困亂鶯啼怨春春怎知日長早被酒禁持那堪更别離三宮腰裊裊翠鬟鬆夜堂深處逢無端銀燭殞秋風靈犀得暗通更有恨恨無窮星河沉曉空隴頭流水各西東佳期如夢中四瀟湘門外水平鋪月寒征棹孤紅妝飲罷少踟蹰有人偷向隅揮玊筯灑真珠梨花春雨餘傍人盡道斷腸初那堪腸也無五湘天風雨破寒初深沉庭院虛麗譙吹罷小單于迢迢清夜徂鄉夢斷旅魂孤峥嶸歲又除衡陽猶有鴈傳書郴陽和鴈無周美成冬衣初染逺山青雙絲雲鴈綾夜寒䄂濕欲成氷都緣珠淚零情黯黯悶騰騰身如秋後蠅若教隨馬逐郎行不辭多少程二菖蒲華老水平沙臨流蘇小家畫闌曲徑宛秋蛇金英垂露華燒蜜炬引蓮娃酒香蒸臉霞再來重約日西斜倚門聽暮鴉蘇養直西園風暖落花時緑隂鶯亂啼倚欄無語惜芳菲絮飛蝴蝶飛緣底事减腰圍遣愁愁著眉波連春渚暮天垂燕歸人未歸乙卯鄱陽道中作向伯恭江南江北雪漫漫遙思易水寒同雲深處是三關斷腸山又山天可老海能翻消除此恨難頻聞遣使問平安幾時鑾輅還趙子發馬蹄踏月響空山梅生煙壑寒水妃去後淚㾗乾天風吹珮蘭紉香久帕花殘與君聊據鞍一枝欲寄北人看如今行路難曹元寵簷頭風佩響丁東簾踈燭影紅鞦韆人散月溶溶樓臺花氣中春酒醒夜寒濃繡衾誰與同只愁夢短不相逢覺來羅帳空蔣元龍山池芳草緑初勻柳寒眉尚顰東風吹雨細於塵一庭花臉皴鶯共蝶怨還嗔眼前無好春這般天氣殺愁人人愁旋旋新西湖摘楊梅作周紫芝西湖山下水潺潺滿山風雨寒枝頭紅日曉爛斑越梅催曉丹連翠葉擁金盤玊池生亂泉此生三度試井酸欲歸歸尚難蘆川詞長楊風軟弄腰肢日長蝴蝶飛雨餘新緑細通池玉鈎懸妓衣鴻鴈逺子規啼此情誰得知一尊聊與故人持醉來悲别離劉叔安寒隂漠漠夜來霜階庭楓葉黃歸鴉數㸃帶斜陽誰家砧杵忙燈弄幌月侵廊薰籠添寶香小屏低枕怯更長和雲入醉鄉德夀宮看花憑欄有燕掠水應制曾覿柳隂庭院占風光呢喃春晝長碧波新漲小池塘雙雙蹴水忙萍散漫絮飄揚輕盈體態狂為憐流水落花香銜將歸畫梁史邦卿龍香吹䄂白藤鞭帽簷衝柳烟一春幾度畫橋邊東風聽管絃花活計酒因緣從人嘲少年直須吟就緑楊篇灣頭寄小憐月下感事舊時明月舊時身舊時梅花新舊時月底似梅人梅春人不春香入夢粉成塵情多多斷魂芙蓉孔雀夜溫溫愁痕即淚痕陳康伯閒來溪上有雲飛溪光接翠微江南三月落花時春波去櫂遲尋竹路破林扉蒼臺舊釣磯欲歸回首未成歸黃塵滿素衣春閨詩餘春風吹雨繞殘枝落花無可飛小池寒緑欲生漪雨晴還日西簾半捲燕雙歸諱愁無奈眉翻身整頓著殘棋沉吟應劫遲徐淵子茶寮山上一頭陀新來學者麼蝤蛑螃蟹與烏螺知他放幾多有一物似蜂窩姓牙名老婆雖然無奈得它何如何放得它徐淵子舍人好以詩文諧謔丁少詹與妻有違言乃弃家居茶寮山始素誦經日買海物放生久而不歸妻患之祈徐譬解徐許諾出門見賣老婆牙買一巨筐銄丁且作此詞丁見詞大笑而歸天機帝城西下望西山城居歲又殘萬家風雪一家寒青燈語夜闌人鮓甕鬼門關無窮人往還求官莫要近長安長安行路難王從叔風中柳絮水中萍聚散兩無情斜陽路上短長亭今朝第幾程何限事可憐生能消幾度春别時言語總傷心何曾一字真春景嚴次山拍堤春水蘸垂楊水流花片香㺯花噆柳小鴛鴦一雙隨一雙簾半捲露新粧春衫是柳黃倚欄看處背斜陽風流暗斷腸黃叔暘粉香吹暖透單衣金泥雙鳯飛閒來花下立多時春風酒醒遲桃葉曲柳枝詞芳心空自知湘臯月冷佩聲微鴈歸人不歸碧桃春丁持正翰幾年辛苦搗元霜一朝瓊粉香雲英縹渺曵仙裳相將騎鳯凰鍧帝樂酌天漿千年顔色芳從兹歸去白雲鄉碧桃春晝長白玊蟾淡煙凝翠鎖寒蕪斜陽掛碧梧沙頭三兩鴈相呼瀟瀟風捲蘆何處笛一聲孤岸邊人釣魚快航一夜泊桐廬問人沽酒無魏夫人夕陽樓外落花飛晴空碧四垂去帆回首已天涯孤烟捲翠微
籮金李石才武陵春色濃如酒逰冶才郎初試花間手綘蠟燒殘人靜後眉峯便作傷春皺一霎風狂和雨驟桞嫩花柔揮不禁僝僽明日餘香知在否粉羅猶有殘紅透捲珠簾魏夫人記得來時春未暮執手攀花袖染花梢露暗卜春心共花語爭尋雙朵爭先去多情因甚相辜負輕拆輕離欲向誰分訴淚濕海棠花枝處東君空把奴分付李易安淚揾征衣脂粉暖四疊陽關唱了千千遍人道山長山又斷蕭蕭微雨聞孤館惜别傷離方寸亂忘了臨行酒盞深和淺若有音書憑過鴈東萊不似蓬萊逺二暖雨清風初破凍桞眼梅腮已覺春心動酒意詩情誰與共淚融殘粉花鈿重乍試夾衫金縷縫山枕斜欹枕損叉頭鳯獨抱濃愁無好夢夜闌猶剪燈花㺯上已召親族前人永夜懨懨歡意少空夢長安認取長安道為報今年春色好花光月影宜相照隨意杯盤雖草草酒美梅酸恰稱人懷抱醉莫插花花莫笑可憐春似人將老送春朱淑真樓外垂楊千萬縷欲係青春少住春還去猶自風前飄桞絮隨春且看歸何處滿目山川聞杜宇便做無情莫也愁人意把酒送春春不語黃昏却下瀟瀟雨鳯棲梧杜夀域新月羞光影庭樹窗外芭蕉數點黃昏雨何事秋來無意緒玉容寂寞雙眉聚一點銀缸扄繡戶莎砌寒蛩歷歷啼聲苦孤枕夜長君信否披衣顒坐魂飛去魚水同歡哀長吉棣蕚樓前佳氣藹欣遇稱觴正斗杓移亥三兩日來連慶會賀賔喜色增加倍未遜徐雛分小大好比晉朝二陸休聲在更祝靈椿顔不改三蘇相繼居台宰慶靈椿夀胡夫人生日黃右曹翰瑞溪庭滿園秋色好簾幕低垂一牀簮笏人間盛沉檀影裏笙歌沸處齊捧瑶巵習禮復明詩胡氏清畏人知壽堂已慶靈椿老年年嵗嵗重添嫩葉頻長繁枝雨中花令贈胡楚中張子野近鬢綵鈿雲鴈細大雲鴈小雲鴈好客艷花枝爭媚花枝十二學雙燕同栖還並翅雙燕子我合著你難分離合著這佛面前生應布施金浮圖你更看蛾眉下秋水眉十似賽九底見他三五二胡􅋄正悶裏也須歡喜悶子撥棹子黃山谷歸去來歸去來携手舊山歸去來有人共對月樽罍橫一琴甚處逍遙不自在間世界無利害何必向世間井幻愛與君釣晚煙寒瀨蒸白魚稻飯溪童供筍菜二煙姿媚氷容薄芳渠嫩隱映新萍池閣擷英人去後清香微綻透真珠簾幕似無語含情垂綵佩戲芳隂漸許纎鮮相託西風直須愛惜看看濃艷伴秋光零落贊成功毛文錫海棠未坼萬點深紅香苞緘結一重重似含羞態邀勒春風蜂來蝶去任繞芳叢昨夜微雨飄灑庭中忽聞聲滴井邊桐美人驚起坐聽晨鐘快教折取戴玉瓏璁定風波永叔把酒花前欲問它對花何惜醉顔酡春到幾人能爛賞何况無情風雨等間多艷樹香叢都幾許朝暮惜紅愁粉奈情何好是金船浮玉浪相向十分深送一聲歌詠梅葉夢得破蕚初驚一點紅又看青子映簾櫳氷雪肌膚誰復見清淺尚餘踈影照晴空惆悵年年桃李伴腸斷秪應芳信負東風待得微黃春亦暮煙雨半和飛緒作濛濛張子野西閣名臣奉詔行南牀更部錦衣榮中有瀛仙賔與主相遇平津選首更神清溪上玉樓同宴喜歡醉對堤杯葉惜秋英盡道賢人聚吳分試問也應中有老人星霅溪席上同會者六人楊元素侍讀劉孝叔吏部子瞻公擇二學士陳待舉賢良東坡月滿苕溪照夜堂五星一老閗光芒十五年間真夢裏何事長庚對月獨凄涼緑髮蒼顔同一醉還是六人冷笑水雲鄉賔主談鋒誰得似看取曹劉今對兩蘇張東坡云余昔與張子野劉孝叔李公擇陳令舉楊元素會于吳興時子野作六客詞其卒章盡道賢人聚吳分試問也應旁有老人星凡十五年再過吳興而五人者皆巳亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云重陽東坡與客携壺上翠微江涵秋影鴈初飛塵世難逢開口笑年少菊花須插滿頭歸酩酊但酬佳節了雲嶠登臨不用怨斜暉古往今來誰不老多少牛山何必更沾衣金蕉葉夜宴桞耆卿厭厭夜飲平陽第添銀燭旋呼佳麗巧笑難禁艷歌無間聲相繼凖擬幕天席地金蕉葉泛金波霽未更闌已盡狂醉就中有箇風流暗向燈光底惱遍兩行珠翠明月逐人來李持正改齋謾録星河明淡春來深淺紅蓮正滿城開遍禁街行樂暗塵香拂面皓月隨人近逺天半鰲山光動鳯樓兩觀東風靜珠簾不捲玉輦待歸雲外聞絃管認得宫花影轉李太師所撰譜漁家傲晏同叔畫鼓聲中昏又曉時光只解催人老求得淺歡風日好齊揭調神仙一曲漁家傲緑水悠悠天杳杳浮生豈得長年少莫惜醉來開口笑須信道人間萬事何時了秋思范希文塞下秋來風景異衡陽鴈去無留意四面邊聲連角起千嶂裏長煙落日孤城閉濁酒一杯家萬里燕然未勒歸無計羌管悠悠霜滿地人不寐將軍白髮征夫淚冬景六一十月小春梅蘂綻紅爐暖閣新粧遍錦帳美人貪睡暖羞起懶玉壺一夜氷澌滿樓上四垂簾不捲天寒山色偏宜逺風急鴈行吹字斷紅日晚江天雪意雲撩亂春景王介甫平岸小橋千嶂抱揉藍一水縈花草茅屋數間窗窈窕塵不到時時自有春風掃午枕覺來聞語鳥欹眠似聽朝雞早忽憶故人今總老貪夢好茫茫忘了邯鄲道漁父謝無逸秋水無痕清見底蓼花汀上西風起一葉小舟煙霧裏蘭棹艤桞條帶雨穿雙鯉自嘆直鈎無處使笛聲吹散雲山翠鱠落霜刀紅縷細新酒美醉來獨枕蓑衣睡王采日月無根天不老浮生揔被消磨了陌上紅塵常擾擾昏復曉一場大夢誰能覺洛水東流山四繞路傍幾箇新華表見説身在官職好爭信道冷煙寒雨埋荒草杜安世踈雨才收淡濘天微雲綻處月嬋姢寒鴈一聲人正逺添幽怨那堪往事思量遍誰道綢繆兩意堅水萍風絮不相緣舞鑑鸞腸虛寸斷芳容變好將憔悴教伊見春恨周美成幾日輕隂寒惻惻東風急處花成積醉踏陽春懷故國歸未得黃鸝久住如相識賴有蛾眉能暖客長歌屢勸金杯側歌罷月痕來照席貪歡適簾前重露成涓滴漁父張仲宗鶴林釣笠披雲青嶂繞緑蓑雨細春江渺白鳥飛來風滿棹收綸了漁童拍手樵青笑明月太虛同一照浮家泛宅忘昏曉醉眼冷看城市閙煙波老誰能認得間煩惱苕溪樓外天寒山欲暮溪邊雪後藏雲樹小艇風斜沙嘴露流年度春光已向梅梢住短夢今宵還到否葦村四望知何處客裏從來無意緒催歸去故園正要鶯花主憶營妓周子文陳襲善鷲嶺峯前欄獨倚愁眉蹙損愁腸碎紅粉佳人傷别𬒮情何已登山臨水年年是常記同來今獨至孤舟晚揚湖光裏衰草斜陽無限意誰與寄西湖水是相思淚丁羲叟十里寒塘初過雨采蓮舟上誰家女秋水接雲迷逺樹天光暮船頭忘了回來路却繫蘭舟深處住歌聲驚散鴛鴦侶波上清風花上霧無計去月明腸斷雙棲處頴上陶生為愛蓮房都一柄雙苞雙蕊雙紅影雨勢斷來風色定秋水淨仙郎彩女臨鸞鏡妾有容華君不省花無恩愛猶相並花却有情人薄行心耿耿因花又染相思病二近日門前溪水漲郎船幾度偷相訪船小難開紅斗帳無計向合歡影裏空惆悵願妾身為紅菡蓞年年生在秋江上更願郎為花底浪無隔障隨風逐雨長來往周紫芝遇坎乘流隨分了雞蟲得失能多少兒輩雌黃堪一笑堪一笑鶴長鳬短從他道幾度秋風吹夢到花姑溪玉人空老喚取扁舟歸去好歸去好孤蓬一枕秋江曉侯彥周過盡百花芳草滿桞絲舞困闌干暖桞外秋千裙影亂人逐伴舊家心性如今懶斗帳寶香凝不散黃昏院落鶯聲晚紅葉不來音信斷踈酒盞東陽瘦損無人管贈鼎州官妓李知幾西去征鴻東去水幾重别恨千山裏夢繞緑窗書半紙何處是桃花溪畔人千里瘦玉倚香愁黛翠勸人須要人先醉問道明朝行也未猶自記燈前背立偷垂淚假克已龍尾溝邊飛桞絮虎頭山下花無數花底醉眠晉杖屨花上露隨風散漫飄香霧老去逢春能幾度不妨且作風流主明日不知風共雨回首處夕陽又下西山去二春去春來誰是主怨他昨夜江頭雨把酒問春春不語頭懶舉亂紅飛過秋千去芳草淡煙江上路鷓鴣聲裡斜陽暮風外榆錢無意緒空自舞如何買得青春住和門人祝夀蘇子由欒城遺言七十餘年真一夢朝來壽斚兒孫奉憂患已空無復痛心不動此間自有千鈞重蚤嵗文章供世用中年禪味疑天縱石塔成時無一縫誰與共人間天上隨他送漁翁張功甫拂拂春風生草際新晴萬景供遊戲鷗鷺飛來斜照裏金和翠分明畫出真山水遮箇漁翁無愠喜乾坤頓在孤篷底一曲髙歌千古意間來睡從教月到花汀外春思談在庵深意纒綿歌宛轉橫波停恨燈前見最憶來時門半掩春不暖梨花落盡成秋苑疊鼓收聲帆帆影亂燕飛又趂東風軟目力謾長心力短消息斷青山一點和煙逺破陳子一名十拍子李後主四十年來家國三千里地山河鳯閣龍樓連霄漢玉樹瓊枝作煙蘿幾曽識干戈一旦歸為臣虜沈腰潘鬢銷磨最是蒼惶辭廟日教坊獨奏别離歌垂淚對宫娥晏同叔湖上西風斜日荷花落盡紅英金菊滿叢珠顆細海燕辭巢翅羽輕年年嵗嵗情美酒一杯新熟髙歌數闋堪聽不向尊前同一醉可奈光隂似水聲迢迢去未停陸務觀仕至千鍾良易年過七十常稀眼底榮華元是夢身後聲名不自知營營端為誰幸有旗亭沽酒何妨繭紙題詩幽谷雲蘿朝采藥靜院軒窗夕對棋不歸真箇癡卜拍子趙文鼎桞絮飛時緑暗茶䕷開後春酣花外青簾迷酒思陌上晴光收翠嵐佳辰三月三解佩人逢遊女踏青草鬪宜男醉倒畫欄欄檻北夢繞清江江水南飛鸞與並驂晏同叔海上蟠桃易熟人間好月常圓惟有擘叉分鈿似離别常多會靣難此情須問天蠟燭到明垂淚熏爐盡日生煙一點凄涼愁絶意謾道秦筝有剩絃何曽為細傳花草粹編卷十三

body:
  text: 花草稡編巻十八明陳耀文輯長調天香冬景王通叟霜瓦鴛鴦風簾翡翠今年較是寒早矮釘明􅣘側開朱户㫁莫亂教人到重隂未解雲共雪商量未了青帳垂氊要宻紅爐圍炭冝小呵梅㺯粧試巧繡羅衣瑞雲芝草伴我語時同語笑時同笑已被金樽勸酒又唱新詞故相惱盡道窮冬元來恁好對梅花懐王侍御龜齡劉方叔漠漠江臯迢迢驛路天教為春傳信萬朩叢邉百花頭上不管雪飛風𦂳㝷交訪舊惟翠竹寒松相認不意牽詩動興何心襯粧添暈孤標最甘冷落不許蝶親蜂近直自従來㓗白箇中清韻儘做重聞塞管也何害香銷粉痕盡待到和羮纔明底藴水調歌頭東坡明月㡬時有把酒問青天不知天上宫闕今夕是何年我欲乗風歸去唯恐瓊樓玉宇高處不勝寒起舞㺯清影何似在人間轉朱閣低綺户照無眠不應有恨何事長向别時圓人有悲歡離合月有隂晴圓缺此事古難全但願人長久千里共嬋娟熈寧丙辰中秋東坡居士歡飲達旦大醉作水調歌頭兼懐子由元豐問都下傳習此詞神宗問内侍因得上塵乙覽讀至又恐瓊樓玉宇高處不勝寒二句上曰蘓軾終是愛君乃命量移汝州快哉亭蘓子瞻落日繡簾捲亭下水連空知君為我新作窗户濕青紅長記平山堂上欹枕江南烟雨杳杳沒孤鴻認得醉翁語山色有無中一千頃都鏡凈倒碧峯忽然浪起掀舞一葉白頭翁堪笑蘭臺公子未解莊生天籟剛道有雌雄一㸃浩然氣千里快哉風春行山谷瑶草一何碧春入武陵溪溪上桃花無數花上有黄鸝我欲穿花㝷路直入白雲深處浩氣展虹霓秪恐花深裏紅露濕人衣坐白石欹玉枕拂金徽謫仙何處無人伴我白螺盃我為靈芝仙草不為朱唇丹臉長嘯亦何為醉舞下山去明月逐人歸夷堅支志云此詞舊傳黄魯直所作王晦叔頥堂集云蜀人石耆翁言此莫將少虚壯年詞也能道其詳少虚又有涴溪沙一闋云寳釵湘裙上玉梯雲重應悵翠雲低愁同芳草兩凄凄又一詞云歸夢悠揚未見真繡衾恰有異香薫五更分得楚臺春皆造語工新但晩嵗醉心富貴不復事文章今人鮮有知其所作者滄浪亭蘓子美瀟洒大湖岸淡竚洞庭山魚龍隠處烟霧深鎻渺瀰間方念陶朱張翰忽有扁舟急槳撇浪載鱸還落日暴風兩歸路遶汀灣丈夫志當景盛恥踈閒壯年何事憔悴華髪改朱顔擬借寒潭垂釣又恐鷗鳥相猜不肯傍青綸刺棹穿蘆荻無語看波瀾劉仲方落日塞垣路風勁戛貂裘翩翩數騎閒獵深入黒山頭極目平沙千里惟見琱弓白羽鐵面駭驊騮隠隠望青冢特地起閒愁漢天子方鼎盛四百州玉顔皓齒深鎻三十六宫秋堂有經綸賢相邉有縦横謀將不作翠蛾羞中外和樂也聖主永無憂重陽韓無咎今日我重九莫負菊花開試㝷高處擕手躡屐上崔嵬放目蒼崖萬仞雲䕶曉霜成陣知我與君來古寺倚修竹飛檻絶纎埃笑談間風滿座酒盈盃仙人跨海休問隨處是蓬萊落日平原西望鼓角秋深悲壯戯馬但荒臺細把茱萸看一醉且徘徊詠月韓子蒼江山自雄麗風露與高寒寄聲月姊借我玉鑑此中看幽壑魚龍悲嘯倒影星辰搖動海氣夜澷澷擁起白銀闕危駐紫金山表獨立飛玉佩整雲冠漱水濯雪眇視萬里一毫端回首三山何處聞道羣仙笑我邀我欲俱還揮手従此去翳鳯更驂鸞葉夢得何處難忘酒朱夏日偏長湖山地勝瀟湘十里芰荷香栁外新蟬驚晩樓上踈簾垂翠簟枕晩生涼紈扇搖霜月曲水泛流觴流年去今古夢㡬千場虚名浮利輸却㡬許好時光幸有碧雲深處存取朱顔緑鬢流落又何妨莫厭人間世頻入醉中鄉凱歌寄湖南安撫劉舍人張安國猩鬼嘯篁竹玉帳夜分弓少年荆楚劍客突騎錦襜紅千里風飛雷厲四校星流彗掃蕭斧挫春蔥談笑青油幕日奏捷書同詩書師黄閣老黒頭公家傳鴻寳秘畧小試不言功聞道璽書頻下看即沙堤歸去帷幄日従容君王自神武一舉朔庭空建炎庚戍題呉江中呉紀聞平生太湖上短棹㡬經過如今重到何事愁與水雲多擬把匣中長劍換取扁舟一葉歸去老漁蓑銀艾非吾事丘壑已蹉跎鱠新鱸斟美酒起悲歌太平生長豈謂今日識干戈欲㵼三江雪浪淨洗邊塵千里不為挽天河回首望霄漢雙淚墮清波武昌南樓落成次王漕韻李居厚撫景㡬今古遺恨此江山百年形勝但見幽草雜枯管多少名流登覧賴有神扶壊棟詩墨尚斑斑風月要磨洗頋我已衰顔擎天手携玉斧到江干一新竒觀領客觴詠有餘閒烟草半川開霽城郭兩州相望都在畫屏間便擬騎黄鵠直上扣雲闗旅思劉徳脩客夢一回醒三度碧梧秋仰看今夕天上河漢又西流早晩涼風過鴈驚落空堦一葉急雨閙清溝歸計休令暮宵露浥征裘古來今生老病許多愁那堪更說無限功業鏡中羞只有青山高致對此還論世事舉白與君浮送我一盃酒誰起舞涼州春半劉改之春事能㡬許宻葉着青梅日高花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片㸃蒼苔能得㡬時好追賞莫徘徊雨飄紅風換翠苦相催人生行樂且須痛飲莫辭杯坐則高談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曽來朱元晦富貴有餘樂貧賤不堪憂那知天路幽險倚伏互相酧請看東門黄犬更聴華亭清淚千古恨難収何似鴟夷子散髪弄偏舟鴟夷子成覇業有餘謀収身千乗卿相歸把釣魚鈎春晝五湖烟浪秋夜一天雲月此外儘悠悠永棄人間事吾道付滄洲孫清州生日魏華父九十九峯下百二十年州西風吹起客夢月滿驛南樓影入天河左界辰在夀星向上還是去年秋要和木蘭曲載酒夀君侯天邉信雲外步去難留夀觴庭院依舊已帶别離愁離合鍾情未免富貴闗人何事浪白世間頭將相時來身徤百無憂劉靜甫殘臘捲愁去春至莫閒愁榮枯㑹有成說無處着機謀身世石中敲火富貴草頭垂露何用苦貪求三尺布衣劍千載赤松㳺憶親朋方丱角摠白頭羊腸世路巇嶮莫莫且休休選甚范侯高爵遮莫陶公鉅産爭似五湖舟萬事付蝸角止坎謾乗流傅公謀草草三間屋愛竹旋添栽碧紗窗户眼前都是翠雲堆一月山翁高卧踏雪水村清冷木落逺山開唯有平安竹留得伴寒梅家童開門看有誰來客來一笑清話煮茗更傳杯有酒只愁無客有客又愁無酒酒熟且徘徊明日人間事天自有安排辛㓜安落日古城角把酒勸君留長安路逺何事風雪弊貂裘散盡黄金身世不管秦樓人怨歸計狎沙鷗明夜扁舟去和風載離愁功名事身未老㡬時休詩書萬巻致身須到古伊周莫學班超投筆縦得封侯萬里憔悴老邉州何處依劉客寂寞賦登樓劍閣崔與之萬里雲間戍立馬劔門闗亂山極目無際直北是長安人苦百年塗炭鬼哭三邉鋒鏑天道久應還手冩留屯奏烱烱寸心丹對青燈搔白髪漏聲殘老來勛業未就妨却一身閒梅嶺緑隂青子蒲澗清泉白石怪我舊盟寒烽火長安報歸夢到家山獻田都統劉之翰夷堅支丙涼露洗金井一葉下梧桐謫仙浪㳺何事華髪作詩翁烏㡌蕭蕭一幅坐對清泉白石矯首撫長松獨鶴歸來晩聲在碧霄中神仙宅留玉節駐金狨黔南一道十萬貔虎控雕弓笑折碧荷倒影自唱采蓮新曲詞句滿秋風劍佩八千嵗長入大明宫田世輔為金州都統制荆南人劉之翰者待峽州逺安主薄闕作此詞獻之田覽之大喜致書約來金城欲厚加資給之翰遽亡明年田出門武見之翰立道左泣曰人鬼殊塗公能恤吾家亦足表踐言之義忽不見田大驚異亟送千緍與其孤長江二友頥堂長江飛鳥外明月衆星中今來古往如此人事㡬般風又對團團紅樹獨跨寒驢歸去山水澹丰容逺色動愁思不見兩詩翁酒如澠談如綺氣如虹當時痛飲狂醉只許賞心同響絶光沉休問俛仰之間陳迹我亦老飄蓬望久碧雲晩一鴈度寒空時方旱祈雨大作胡㓜黄有喜君初度風雨作秋聲連旬烈日稻畦麥壠欲揚塵好是天瓢在手笑把羣龍呵叱四野注如傾勃勃生意滿翠浪湧縦横君知否仁者夀夀斯仁自従三代而下民命寄蒼旻滿目桑麻谷粟滿目簿書期㑹試説與仁人小試作霖手蘓醒永新民譚秋堂方平冨貴在何許五十已平頭人生得失且笑休遣兩眉愁管甚輪雲世變管甚風波世態沙渚且盟鷗止即儘教止流即儘教流田可秫山可蔌又何求問天只覔窮健㳺戯八千秋好對梅花如粉細剪燭花如豆不改舊時㳺翠袖更能舞騎鶴上揚州㳺龍門元遺山灘聲蕩高壁秋氣靜雲林迴頭洛陽城闕塵土一何深前日神光牛背今日春風馬耳因見古人心一笑青山底未受二毛侵問龍門何所似似山隂平生夢想佳處留眼更登臨我有一巵芳酒喚取山花山鳥伴我醉時吟何必絲與竹山水有清音賀人新娶集曲名哀長吉紫陌風光好繡閣綺羅香相將人月圓夜早慶賀新即先自少年心意為惜殢人嬌態久俟願成雙此夕于飛樂共學燕歸梁索酒子迎仙客醉紅妝訴忠情處些兒好語意難忘但願千秋嵗裏結取萬年歡㑹恩愛應天長行喜長春宅蘭玉滿庭芳清湖三塔記屏間金孔雀褥隠綉芙蓉洞房花燭夜玳筵席靄香風盈耳笙歌繚繞滿眼綺羅交錯銀燭影搖紅佳期今夕裡談笑畫堂中皓齒歌細腰舞樂無窮朱簾高捲金爐香噴瑞烟濃仙子將臨鳯閣玉女下離蓬島同㑹蕋珠宫門䦨多喜色女壻近乗龍和李泰發尚書泊舟嚴陵劉行簡千古嚴陵瀨清夜月荒凉水明沙淨波面一葉㺯孤光北望旄頭天際殺氣遙昏楚甸雲樹失青蒼愁絶未歸客衰鬢㸃呉霜聴江邉鳴寳瑟想英皇騎鯨仙裔高韻清絶勝風篁醉入無何境界却笑昔人底事逺慕白雲鄉不見咸陽道烟草茂陵荒送呉叔永文昌呉毅甫才惜季方去又更别元方驚心天上雙鳯接翅下高岡萬里瞿塘烟浪一片昭亭雲月渺渺正相望夜雨連風壑此意獨凄凉杜鵑聲猶不住攪離腸黄鷄白酒吾亦歸興動家鄉人事紛紛難料世事悠悠難說何事問穹蒼肯落兒曹淚一笑付滄浪薄媚西子詞董頴入破第一窣湘裙搖漢珮步步香風起斂雙蛾論時事蘭心巧㑹君意殊珍異寳猶自朝臣未與妾何人被此隆恩雖令効死奉嚴㫖隠約龍姿欣悦重把甘言說辭俊雅質娉婷天教汝衆美兼備聞呉重色憑汝和親應為靖邉陲將别金門俄揮粉淚靚粧洗第二虚摧飛雲駃香車故國難囬睇芳心漸搖迤邐呉都繁麗忠臣子胥預知道為邦崇諌言先啓願勿容其至周亡褒姒商傾妲已呉王却嫌胥逆耳纔經眼便深恩愛東風暗綻嬌蕋綵鸞翻妬伊得取次于飛共戯金屋看承它宫盡廢第三衮遍華晏夕燈搖醉粉菡蓞籠蟾桂楊翠袖含風舞輕妙處驚鴻態分明是瑤臺瓊榭閬苑蓬壺景盡移此地花繞仙步鶯隨管吹寳帳暖留春百和馥郁融鴛被銀漏永楚雲濃三竿日猶褪霞衣宿酲輕腕嗅宫花雙帶繫合心時波下比目深憐到底第四催拍耳盈絲竹眼搖珠翠迷藥事宫闈内爭知漸國勢陵夷姦臣獻佞轉恣奢淫天譴嵗屢饑従此萬姓離心解體越遣使隂窺虛實蚤夜營邉備兵未動子胥存雖堪伐尚畏忠義斯人既戮又且嚴兵巻土赴黄池觀釁種蠡方云可矣第五衮遍機有神征鼙一鼓萬馬襟喉地庭喋血誅留守憐屈服斂兵還元如此當除禍本重結人心爭奈竟荒迷戰骨方埋靈旗又指勢連敗柔荑擕泣不忍相拖棄身在兮心先死宵奔兮兵已前圍謀窮計盡唳鶴啼猿聞處分外悲舟縦近誰容再歸第六歇拍哀誠屢吐再東分賜垂暮日置荒隅心知愧寳鍔紅委鸞存鳯去辜負恩憐情不似虞姬尚望論功榮還故里降令曰呉亡赦汝越與呉何異呉土怨越方疑従公論合去妖類娥眉宛轉竟殞鮫鮹香骨委塵泥𣺌𣺌姑蘓蕪荒鹿戯第七然衮王公子青春更才美風流慕連理耶溪一日悠悠回首凝思雲鬟烟鬢玉珮霞裾依約露妍姿送目驚喜俄迃玉趾同仙騎洞府歸去簾櫳窈窕戯魚水正一㸃犀通遽别恨何已媚魄千載教人屬意况當時金殿裏排遍第八怒潮巻雪巍岫布雲越襟呉帶如斯有客經㳺月伴風隨值盛世觀此江山美合放懐何事却興悲不為回頭舊谷天涯為想前君事越王嫁禍獻西施呉即中深機闔廬死有遺誓句踐必誅夷呉未干戈出境倉卒越兵投怒夫差鼎沸鯨鯢越遭勍敵可憐無㡬脱重圍歸路茫然城郭丘墟飄泊積山裏旅魂暗逐戰塵飛天日慘無輝排遍第九自念平生英氣凌雲凌然萬里宣威那知此際熊虎塗窮來伴麋鹿卑棲既甘臣妾猶不許何為計爭若都燔寳器盡誅吾妻子徑將死戰決雌雄天意恐憐之偶聞太宰正檀權貪賂市恩私因將寳玩獻誠雖脱霜戈石室囚繫憂嗟又經時恨不如巢燕自由歸殘月朦朦寒雨蕭蕭有血都成淚備嘗險厄返邦畿寃憤刻肝脾第十攧種陳謀謂呉兵正熾越勇難施破呉策惟妖姬有傾城妙麗名稱西子嵗方笄筭夫差惑此須致顛危范蠡微行珠貝為香餌苧蘿不釣釣深閨吞餌果殊姿素肌纎弱不勝羅綺鸞鏡畔粉面淡匀梨花一朶瓊壺裏嫣然意態嬌春寸眸剪水斜鬟鬆翠人無雙宜名動君王繡履容易來登玉陞樂府雅詞載此詞于巻首以排遍第八第九第十居前而入破第一以後者次之余以其字句叅差無所附麗且詠西施事無容分析也因照首章入此云瀟湘夜雨竹坡詞曉色凝暾霜痕猶淺九天春意將囬隔年花信先巳到江梅沉水烟濃如霧金波滿紅袖雙垂仙翁醉問春何在春處玉東西瑶臺人不老逺従赤壁來步天墀且細看八磚花影遲遲㑹見朱顔緑髩家長近咫尺天威君知否天教雨露常滿嵗寒枝和潘都漕九日詞江繞淮城雲昏楚觀一枝烟笛堆横曉風吹帽霜日照人明暗惱潘即舊恨應誰念菊老殘英秋空曉茱萸細撚酃渌為誰傾人間真夣境新愁未了緑髩星星問明年此㑹誰寄幽情倚盡一樓殘照何缺更月到簾旌憑䦨久歌君妙曲誰是米嘉榮三楚尾江横斗南山秀輞川誰畫新圖㡬時天際平地出方壺應念江南倦客家何在飄泊江湖天教共銀濤翠壁相伴老人娯長淮看不盡風帆落處天在平蕪筭人間此地豈是窮途好與婆娑盡日應須待月到金樞山中飲従教笑我白首醉模糊玉梅香慢寒色猶高春力尚怯微律先催梅拆曉日輕烘清風煩觸凝散數枝殘雪嫩英妬粉嗟素艷有蜂蝶仝歇人人向我依然頓成離缺徘徊寸腸萬結又因花暗成凝咽撚蕋怜香不禁恨深難絶若是芳心解語應共把此情細細說淚滿䦨干無言强折小聖樂元好問緑葉隂濃徧池亭水閣偏趂凉多海榴初綻朶朶蹙紅羅乳燕雛鶯㺯語對高栁鳴蟬相和驟雨過似瓊珠亂撒打遍新荷人生百年有㡬念良辰美景休放虛過富貧前定何用苦張羅命友邀賔晏賞飲芳醑淺斟低歌且酩酊従教二輪來往如梭塞孤曉行栁耆卿一聲鷄又報殘更歇秣馬巾車催發草草生人燈下别山路險新霜滑瑶珂響起栖烏金鐙冷敲殘月漸西風𦂳襟袖凄裂遙指白玉京望㫁黄金闕逺道何時行徹筭得佳人凝恨切應念念歸時節相見了執柔荑幽㑹處偎香雪免鴛衾兩恁虚設朱雍雪江明練靜波聲歇玉浦梅英初發隠隠瑶林堪乍别瓊路冷雲堦滑寒枝晩已黄昏舖碎影留新月向亭臯一任風冽歌起郢曲時目㫁秦城闕逺道氷車清徹追念酥粧凝望切淡竚迎佳節應暗想日邉人聊寄與同懽悦勸清樽忍負盟設夢揚州少㳺晩雲収正栁塘烟雨初休燕子未歸惻惻輕寒如秋小欄外東風軟透繡幃花宻香稠江南逺人何處鷓鴣啼破春愁長記曽陪燕逰酧妙舞清歌麗錦纒頭殢酒困花十載因誰淹留垂鞭拂面歸來晩望翠樓簾捲金鈎佳㑹阻離情正亂頻夢揚州安陸浮雲樓廖世美靄靄春空畫樓森聳凌雲渚紫薇登覽最闗情絶妙誇能賦惆悵相思遲暮記當日朱欄共語塞鴻難問岸栁何窮别愁芬絮催促年光舊來流水知何處㫁腸何必更殘陽極目傷平楚晩霽波聲帶雨悄無人舟横野渡數峯江上芳草天涯參差烟樹上元上晁以道呉大年樓雪初消麗譙吹罷單于晩使君千炬起班春歌吹香風暖十里珠簾盡捲正人在蓬壺閬苑賣薪買酒立馬傳觴昇平重見誰識遨頭去年曽侍傳柑晏至今衣袖帶天香行處氤氲滿巳是春宵苦短且莫遣歡㳺意懶細聴歸路璧月光中玉簫聲逺梅苑㸃㸃飛香見梅知道春心透怕寒不捲玉樓簾羞與花同瘦手撚青枝頻嗅誚冷落薔薇金斗翻驚緑鬢不似芳姿年年依舊纔破凝酥滿園桃李看看又江南幽夢了無啼痕暈殘襟袖鴛被有誰温綉怎敢更十分殢酒伴君獨自㡬箇黄昏月明時候上元有懐張材甫雙闕中天鳯樓十二春寒淺去年元夜奉宸㳺曽侍瑶池宴玉殿珠簾盡捲擁羣仙蓬壺閬苑五雲深處萬燭光中掲天絲管馳隙流年恍如一瞬星霜換今宵誰人泣孤臣囬首長安逺可是塵縁未㫁謾惆悵華胥夢短滿懐幽恨數㸃寒燈㡬聲歸鴈盱江有懐趙文鼎桃李墻頭向人都似他年意舞絲千丈颺晴光駘蕩春無際花氣薫然自醉傍垂楊行行緩轡倦㳺無奈回首雲山歸期猶未孟鎻樓空鳥啼花外東風起少年恩怨付波流臨望朱䦨倚冉冉塵生客袂對尊前高情暫寄洞天一笑仙馭乗空姑峯凝翠閨情孫夫人乳燕穿簾亂鶯啼樹清明近隔簾時度栁花飛猶覺寒成陣長記眉峯偷隠臉桃紅難藏酒暈背人微笑半嚲鸞釵輕籠蟬鬢别久啼多眼應不似當年俊滿園珠翠逞春嬌沒箇他風韻若見賔鴻試問待相將綵牋寄恨㡬時得見闘草歸來雙鴛微潤侑舒信道中丞懶堂女子緑淨湖光淺寒先到芙蓉島謝池幽夢屬才郎㡬度生春草塵世多情易老更那堪秋風嫋嫋晩來羞對香芷汀洲枯荷池沼恨鎻横波逺山淺黛無心掃湘江人去嘆無依此意従誰表喜趂良宵月皎况難逢人間兩好莫辭沉醉醉入屏山呉歌天曉熈州慢送述古張子野武林鄉占第一湖山詠畫爭巧鷲石飛來倚翠樓烟靄清猿啼曉况值禁垣師帥惠政流入歌謠朝暮萬景寒潮㺯月亂峯廻照天使㝷春不早倂行樂免有花愁花笑持酒更聴紅兒肉聲長調瀟湘故人未歸但目送㳺雲孤鳥際天杪離情盡寄芳草望雲間代州南樓趙獻之雲朔南陲全趙寳符河山襟帶名藩有朱樓縹緲千雉囬旋雲度飛狐絶險天圍紫塞高寒弔興亡遺跡咫尺西陵烟樹蒼然時移事改極目春心不堪獨倚危欄惟是年年飛鴈霜雪知還樓上四時長好人生一世誰閒故人有酒一尊高興不減東山卓牌兒万俟雅言東風緑楊天如畫出清明院宇玉艷淡薄梨花帶月燕支冷落海棠經雨單衣怯黄昏人正在珠簾笑語相並戯蹴秋千共擕手同倚䦨干暗香時度翠窗繡户路繚繞潜通幽處㫁魂凝佇嗟不似飛絮閒悶閒愁難消遣此日年年意緒無據奈酒醒春去早梅香北帝収威又探得早梅漏春消息粉蕋瓊苞擬將胭脂輕染顔色素質盈盈終不許雪霜欺得奈化工偏冝賦與夀陽粧飾獨自逞氷姿比夭桃繁杏殊别為報山翁逢此有花樽前且須攀折醉賞吟戀莫辜負好天風月恐笛聲悲紛紛便似亂飛香雪塞垣春秋怨周美成暮色分平野傍葦岸征帆卸烟村極浦樹藏孤舘秋景如畫漸别離氣味難禁也更物象供瀟洒念多才渾衰減一懐幽恨難冩追念綺􅣘人天然自風韻嫻雅竟夕起相思謾嗟怨遙夜又還將兩袖珠淚沉吟向寂寞寒燈下玉骨為多感瘦來無一把步月史達祖剪栁章臺問梅東閣醉中擕手初歸逗香簾下璀璨鏤金衣正依約氷絲射眼更荏苒蟾玉西飛輕塵外雙鴛細蹙誰賦洛濵妃霏霏紅霧繞步搖共髩影吹入花圍筦絃將散人靜燭籠稀泥私語香攖乍破怕夜寒羅襪先知歸來也相偎未肯入重幃漢宫春晁叔用黯黯離懐向東門繋馬南浦移舟薫風亂飛燕子時下輕鷗無情渭水問誰教日日東流常是送行人去後烟波一向離愁回首舊㳺如夢記踏青殢飲拾翠狂逰無端綵雲易散覆水難収風流未老拚千金重入揚州應又似當年載酒依前名占青樓康伯可雲海沉沉峭寒収建章雪殘鳷鵲華燈照夜萬井禁城行樂春隨鬢影映參差栁絲梅蕚丹禁杳鰲峯對聳三山上通寥廓春衫綉羅香薄步金蓮影下三千綽約氷輪桂滿皓色冷浸樓閣霓裳帝樂奏昇平天風吹落留鳯輦通宵宴賞莫放漏聲閒却梅花李漢老瀟洒江梅向竹梢踈處横兩三枝東君也不愛惜雪壓霜欺無情燕子怕春寒輕失花期惟是有南來塞鴈年年長見開時清淺小溪如練問玉堂何似茅舍踈籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知沈㑹宗别酒初醒似一畨夢覺屈指堪驚猶疑送消寄息遇着人聴當初喚作據眼前畧畧看承及去了従頭想伊心下始覺寧寧黄昏畫角重城更傷高念逺懐抱何勝良時好景筭來半為愁生幽期暫阻便就中月白風清千萬計年年㫁除不得是這些情上元前一日立春京仲逺暖律初回又燒燈市井賣酒樓臺誰將星移萬㸃月滿千街輕車細馬隘通衢蹴起香埃今嵗好土牛作伴挽留春色同來不是天公省事要一時壯觀特地安排何妨綵樓鼓吹綺席樽罍良宵勝景語邦人莫惜徘徊休笑我痴頑不去年年爛醉金釵梅苑梅蕚知春見南枝向暖一朶初芳氷清玉麗自然賦得幽香烟庭水榭更無花爭染春光休謾說桃夭杏冶年年蝶閙蜂忙立馬竚凝情久念美人自别鱗羽茫茫臨岐記伊尚帶宿酒殘粧雲踈雨潤怎知千里思量除是託多情驛使殷勤折寄仙鄉二㸃㸃江梅對寒威强出一㺯新竒零珠碎玉為誰宻上南枝幽香冷艷縦孤高却遣誰知惟只有江頭驛伴征鞍獨為遲遲聊撚粉香重問問春來甚日春去何時移將院落筭應未肯頭低無人共折傍溪橋雪壓霜欺君不見長安陌上只誇桃李芳菲張子野紅粉苔墻透新春消息梅粉先芳竒葩異卉漢家宫額塗黄何人鬪巧運紫檀剪出蜂房應為是中央正色東君别與清香仙姿自稱霓裳更孤標俊格非雪凌霜黄昏院落為誰宻解羅囊銀缾注水浸數枝小閣幽窗春睡起纎條在手厭厭宿酒殘粧二玉減香銷被嬋娟誤我臨鏡粧慵無聊强開强解蹙破眉峯憑高望逺但㫁腸殘月初鍾須信道承恩不在貌如何教妾為容風煖鳥聲和碎更日高院靜花影重重愁來待只殢酒酒薄愁濃長門怨感恨無金買賦臨笻翻動念年年伴女越溪共採芙蓉仙詞或云洞賔横笛聲沉倚危樓紅日江轉天斜黄塵邉火澒洞何處吾家胎禽怨夜來乗風𤣥露丹霞先生笑飛空一劍東風猶自天涯情知道山中好早翠囂含隠瑶草新芽青溪故人信㫁夢颷車乾坤星火歸來了煮石煎沙回首處幅巾蒲帳雲邉獨是桃花見庶菴老學叢談陽臺路旅情栁耆卿楚天晩墜冷風敗葉踈紅零亂冐征塵匹馬驅區愁見水遙山逺追念年時正恁鳯幃倚香偎煖嬉逰慣又豈知前懽雲雨分散此際空勞回首望帝里難収淚眼暮烟衰草筭暗鎻路岐無限今宵又依前寄宿甚處葦村山舘寒燈半夜猒猒憑何消遣暗香姜白石舊年月色筭㡬畨照我梅邉吹笛喚起玉人不管清寒與攀摘何遜而今漸老都忘却春風詞筆但怪得竹外踈花香冷入瑤席江國正寂寂嘆寄路遙夜雪初積翠樽易泣紅蕚無言耿相憶長記曽擕手處千樹壓西湖寒碧又片片吹盡也㡬時見得張叔夏羽音寂寞怪虚簾晝悄近來無鵲水葉吹寒極目凝思倚江閣不信相如便老猶未減當時㳺樂但趂他鬪草籌花終是帶離索憶昨更情惡謾認着梅花是君還錯石牀冷落閒掃松隂與誰酌一自飄零去輕悞了燈前深約従到此歸未得㡬曽忘却西子粧張炎白浪搖天青隂漲地一片野情幽意楊花㸃㸃是春心替風前萬華吹泪遙岑寸碧有誰看朝來清氣自沉吟甚流光輕把繁華如此斜陽外隠約孤村隔塢閒門閉漁舟何似莫歸來想桃源路通人世危橋靜千年事都消一醉謾依依愁落鵲聲萬里黄鶯兒栁耆卿園林晴晝春誰主暖律潜催幽谷暄和黄鸝翩翩乍遷芳樹觀露濕縷金衣葉映如簧語曉來枝上綿蠻似把芳心深意低訴無據乍出煖烟來又趂㳺蜂去恣狂踪跡兩兩相呼黄昏霧吟風舞當上苑栁濃時别舘花深處此際海燕偏饒都把韶光與王晉卿多情春意芳時節北圃人來傳道江梅依稀芳姿數枝新發誇嫩臉着胭脂膩骨凝香雪問伊還記年時正好相看因甚輕别情切往事散浮雲舊恨成華髪筭知空對綺檻雕闌孜孜望人攀折愁未見苦思量待見重端叠願與永傚高唐雲雨芳菲月鳯凰臺上憶吹簫晁無咎千里相思况無百里何妨暮往朝還又正是梅初淡佇鶯未綿蠻陌上相逢緩轡風細細雲日斑斑新晴好得意未妨行盡春山應擕後房小妓來為我盈盈對舞花間便拚却松醪翠滿宻炬紅殘須信征鞍射虎清世裏曽有人閒都休說簾外夜久春寒張臺卿長天霞散逺浦潮平危䦨注目江臯長記年年榮遇同是今朝金鑾兩回命相對清光頻許揮毫雍容久正茶盃初賜香袖時飄歸去玉堂深夜泥封罷金蓮一寸才燒帝語丁寧曽被華衮親褒如今謾勞夢想嘆塵踪杳隔仙鰲無聊意强當歌對酒怎消梅侯彦周浴雪精神倚風情態百端邀勒春還記舊隠溪橋日暮驛路泥乾曽伴先生蕙帳香細細粉瘦瓊閒傷半落一夜夢回腸㫁家山空教映溪帶月供㳺客無情折滿雕鞍便忘了明窗靜几筆硯同歡莫向高樓噴笛花似我蓬髩霜斑都休說今夜倍覺清寒李易安香冷金猊被翻紅浪起來慵自梳頭任寳奩塵滿日上簾鈎生怕離懐别苦多少事欲說還休新來瘦非干病酒不是悲秋休休這回去也千萬遍陽闗也則難留念武陵人逺烟鎻秦樓惟有樓前流水應念我終日凝眸凝眸處従今又添一段新愁國香蘭花張炎空谷幽人曳氷簮霧帶古意生春結根倦隨蕭艾獨抱孤真自分生涯淡薄隠蓬蒿甘老山林風烟共憔悴冷落呉宫草暗花深霽痕消蕙雲向崖隂飲露應是知心所思何處滿楚水湘雲肯信遺芳千古依依澤畔行吟香魂㡬成夢短操誰彈月冷瑤琴醉蓬萊慶老人星現栁耆卿漸亭臯葉下隴首雲飛素秋新霽華闕中天鎻蔥蔥佳氣嫩菊黄深拒霜紅淺近寳階香砌玉宇無塵金莖有露碧天如水正值昇平萬機多暇夜色澄鮮漏聲迢逓南極星中有老人呈瑞此際宸㳺鳯輦何處度管絃聲脆太液波翻披香簾捲月明風細永為屯田員外郎㑹太史奏老人星見時秋霽晏禁中仁宗命左右詞臣為樂章内侍屬栁應制栁方冀進用作此詞奏呈上見首有漸字色若不懌讀至宸㳺鳯輦何處乃與御製真宗挽詞暗合上慘然又讀至太液波翻曰何不言波澄投之於地自此不復擢用上已日有懐葉少蘊問春風何事㫁送繁紅便拚歸去牢落征途笑行人羈旅一曲陽闗㫁雲殘靄做渭城朝雨欲寄離愁緑隂千囀黄鸝空語遙想湖邉浪搖空翠絃管風高亂花飛絮曲水流觴有山翁行處翠袖朱欄故人應也㺯畫船烟浦㑹冩相思尊前為我重畨新句中秋謝㓜槃望晴峯染黛暮靄澄空碧天無漢圓鏡高飛又一年秋半皓色誰同歸心暗折聴唳雲孤鴈向月停盃錦袍何處一尊無伴好生南隣詩盟酒社刻燭爭成引觴愁緩今夕樓中繼阿連清玩飲劇狂歌歌終起舞醉冷光零亂樂事難窮踈星易曉又成浩歎万俟雅言正波泛銀漢漏滴銅壺上元佳致綘燭銀燈若繁星連綴明月逐人暗塵隨馬盡五陵豪貴鬢惹烏雲裙拖湘水誰家姝麗金闕南邉綵山北面接地羅綺沸天歌吹六曲屏開擁三千珠翠帝樂方深鳯爐烟噴望舜顔瞻禮太平無事君臣晏樂黎民歡醉夀參政劉圻父正霜浮菊淺露染楓深九秋佳景梅報南枝一㸃和羮信峻嶽生申太山瞻魯瑞啓千年運飛帛奎文儀皇韶祉明良相慶嵗值豐登道方開泰塞騎塵収海鯨波靜㡬斗璿樞仰三階平正保定乾坤親扶日月萬宇同歌詠比夀彭聃侔勲周召致君堯舜夀郁梅埜梅城倚東風笑問落紅啼鴂清明來未小雨㺯晴做輕寒天氣南極光中五雲深處人慶千秋嵗翡翠屏間琉璃簾下綵衣明媚九老風流五侯家數如此乾坤有人如此天正煩君作江南一瑞世上今泰山中古晉儘不經吾意但要牡丹年年今日伴人沉醉趙徳莊向蓬萊雲𣺌姑射山深有春長好香滿枝南笑人間驚早試問寒柯鏤氷裁玉費化工多少東閣詩成西湖夢覺㡬畨清曉好是羅緯麝温屏暖却恨烟村雨愁風惱一一清芬為東君傾倒待得明年翠隂青子䕃鳯凰池沼更把陽和従頭付與繁花芳草吕聖求任落梅鋪綴鴈齒斜橋裙腰芳草閒伴㳺絲過曉園庭沼厮近清明雨晴風軟稱少年㝷討碧縷墻頭紅雲水面栁堤花島誰信而今怕愁憎酒對着花枝自踈歌笑鶯語丁寧問甚時重到夢筆題詩帊綾封淚向鳯簫人道處處傷心年年逺念惜春人老夀史令人篁粟正花深繡閣帶拂流蘇暖簾初試窈窕笙歌擁新鮮珠翠艷菊留金早梅催粉趂得瑶池㑹畫舘凝香仙家正住芙蓉城裏裼寢開祥玉枝祝夀列院歡娯滿堂佳瑞福夀雙星現碧霄雲際京兆時收如臯樂事占世間榮貴象服魚軒䟽封大國齊眉千嵗碧牡丹李致逺破鏡重圓分釵合鈿重㝷綉户珠箔說與従前不是我情薄都緣利役名牽飄蓬無定翻成輕負别後情懐有萬千牢落經時最苦分擕都為伊甘心寂寞縦滿眼閒花媚栁終是强歡不樂待憑鱗羽說與相思水逺天長又難托而今幸以再逢把輕離㫁却聲聲慢夏景劉巨濟梅黄金重雨細絲輕園林霧烟如織殿閣風微簾外燕喧鶯寂池塘彩鴛戯水露荷翻千㸃珠滴閒晝永稱瀟湘竿叟爛柯仙客日午槐隂低轉茶甌罷清風頓生雙腋碾玉盤深朱李靜沉寒碧朋儕閒歌白雪卸巾紗樽爼狼籍有皓月照黄昏眠又未得宋徽宗宫梅粉淡岸栁金勻皇州乍慶春迴鳯闕端門鰲山彩締蓬萊沉沉洞天向晩寳輿還花滿鈞臺輕烟裏筭誰將金蓮陸地齊開是處笙歌鼎沸雕鞍趂金輪隠隠輕雷萬家羅幕千步錦繡相挨銀蟾夜色如晝共乗歡爭忍歸來踈鐘㫁聴行歌猶在禁街御製欺寒衝暖占早爭先江梅又報南枝暗香浮動偏宜映月臨池天然素肌瑩骨笑等閒桃李芳菲勞夢想似玉人羞懶㺯粉粧遲常恐行歌聲㫁猶堪恨無情塞管輕吹寄逺丁寧折贈隴首雲飛前村夜來雪裏殢東君須索饒伊爛熳也筭百花猶自未知石孝友花前月下好景良辰厮守日許多時正美之間何事便有輕離無端珠泪暗蔌染征衫㸃㸃紅滋最苦是慇懃宻約做就相思咿啞櫓聲離岸魂㫁處高城隠隠天涯萬水千山一去定失花期東君鬬來無賴散春紅㸃破梅枝病成也到而今着箇甚醫和呉夢窗賦梅呉毅甫挨晴拶暖載酒呼朋夷猶東圃西園緑蕚枝頭兩三初破輕寒平生自甘寂寞占冷妝不為人妍林逋去問影踈香暗誰賦其間空想故山竒事正烟横嶺曲月浸溪灣杏錯桃訛那時青子都圓惟曉夢窗知處對翠禽依約神仙休引角怕征人淚落腮邉曹元寵重簷飛峻麗綵横空繁華壯觀都城雲母屏開八面人在青㝠憑欄瑞烟深處望皇居遙識蓬􅌡回環道五花相鬬壓盡旗亭歌酒長春不疚金翠照羅綺笑語盈盈陸海人山輻輳萬國歡聲登臨四時總好况花朝月白風清豐年樂嵗熈熈且醉太平秋聲蔣竹山黄花深巷紅葉低窗凄凉一片秋聲逗雨深聲來中間夾帶風聲踈踈二十五㸃麗譙門不鎻更聲故人逺問誰搖珮簷低鈴聲彩角聲吹月望漸連營馬動四起笳聲閃爍隣燈燈前尚有砧聲知他訴愁到曉碎噥噥多少巷聲訴未了把一半分與鴈聲閠重九飲郭園呉君特檀欒金碧婀娜蓬萊㳺雲不蘸芳洲露栁霜蓮十分㸃綴殘秋新彎畫眉未穏似含羞低度墻頭秋送逺駐西臺車馬共惜臨流知道池亭多宴掩庭花長是驚落秦謳􅕹粉䦨干猶聞凭袖香留輸他翠漣拍甃瞰新粧終日凝眸簾半捲帶黄花人在小樓元遺山林間雞犬江上村墟扁舟處處經過袖裏新詩買㫁古朩滄波山中一花一草也留教老子婆娑任人笑風雲氣少兒女情多不待求田問舍被朝吟暮醉慣得蹉跎百尺高樓更問平地如何朝來斜風細雨喜紅塵不到漁蓑一尊酒喚元龍來聴浩歌元夕高賔王壺天不夜寳炬生香光風蕩搖金碧月艷氷痕花外峭寒無力歌傳翠簾盡捲誤驚回瑤臺仙跡禁漏促拚千金一刻未酧佳夕捲地香塵不㫁最得意輸它五陵狂客楚栁呉梅無限眼邉春色鮫綃暗中寄與待重㝷行雲消息乍醉醒怕南樓吹㫁曉笛李易安㝷㝷覔覔冷冷清清悽悽慘慘戚戚乍煖還寒時候正難將息三盃兩盃淡酒怎敵他晩來風急鴈過也縦傷心却是舊時相識滿地黄花堆積憔悴損如今有誰忺摘守着窗兒獨自怎生得黒梧桐更兼細雨到黄昏㸃㸃滴滴這次第怎一箇愁字了得八聲甘州旅情栁耆卿對瀟瀟暮雨洒江天一畨洗清秋漸霜風凄𦂳闗河冷落殘照當樓是處紅衰緑減苒苒物華休惟有長江水無語東流不忍登高臨逺望故鄉𣺌𣺌歸思難収嘆年來蹤跡何事苦淹留想佳人妝樓凝望誤㡬回天際識歸舟爭知我倚䦨干處正恁凝愁送參寥子蘇東坡有情風萬里捲潮來無情送潮歸問錢塘江上西河浦口㡬度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠烟霏筭詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣追和東坡韻晁無咎謂東坡未老賦歸來天未遣公歸向西湖兩處秋波一種飛靄澄暉又擁竹西歌吹僧老朩蘭非一笑千秋事浮世危機莫倚平山欄檻是醉翁飲處江雨霏霏送孤鴻揮手相接眼中稀念平生相従江海任飄蓬不遣此心違登臨事更何須惜吹㡌淋衣中秋夜作張功甫歎流光迅景百年間能醉㡬中秋正凄蛩鳴砌驚烏翻樹烟淡蘋洲誰喚金輪出海不帶一雲浮纔上青林頂低轉朱樓人老歡情宜減料素娥信我不為閒愁念㡬畨清夢常是故鄉留倩風前數聲横管呌玉鸞騎向碧空㳺誰能顧黍炊榮利蟻戰怨讐程正伯問東君既解遣花開不合放花飛念春風枝上一分花減一半春歸忍見千紅萬翠容易漲桃溪花自隨流水無計追隨不忍憑高南望記舊時行處芳意菲菲歎年來春減花與故人非縦使梁園賦在奈長卿老去亦何為搔首亂雲堆裡立盡斜暉朱雍聴琤琤漏永洗銀林梅英半寒収正蟾輝舒粉雲容縷色切近粧樓人在東風竚立悄悄獨凝眸多少横斜影縈繞江流只有清香暗度墮髻簮珥玉曽賦清㳺認瑤車氷輙佳致肯延留指蓬山丹砂初轉望滄溟羽佩一同舟仙娥許酒澠與我消盡春愁留客住栁耆卿偶登眺凭小樓艷陽時節乍晴天氣是處閒花芳草遙山萬疊雲散漲海千里潮平波浩𣺌烟村院落是誰家緑樹數聲啼鳥旅情悄逺信沉沉離魂杳杳對景傷懐度日無言誰表惆悵舊懽何處後約難憑看看春又老盈盈淚眼望仙鄉隠隠㫁霞殘照雪月交光劉行簡正五雲飛杖縞練纎裳亂空交舞拂石歸來向玉堦微步欲喚氷娥暫憑風使為掃氛驅霧漸見停輪人間未識高空真侣千里無塵地連天向倦客西來路迷江樹故國烟深想溪橋何處雲鬢分行翠眉縈曲對夜寒樽爼清影徘徊端應坐有風流能賦慶千秋歐慶嗣㸃檢堯蓂自元宵過了兩莢初飛蔥蔥鬰鬰佳氣喜溢庭闈唯知降月裏姮娥欣對良時但見婺里騰瑞彩年年煇映南箕好是庭階蘭玉伴一枝丹桂戯舞萊衣椒觴迭將捧獻歌曲吟詩如王母欵對羣仙同晏瑤池萱草茂長春不老百千祝夀無期花草稡編巻十八

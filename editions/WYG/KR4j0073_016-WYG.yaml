body:
  text: 花草稡編巻十六明陳耀文輯中調柳初新柳耆卿東郊向曉星杓亞報帝里春來也柳擡烟眼花勻露臉漸覺緑嬌紅姹妝㸃層䑓芳榭運神功丹靑無價别有堯階試罷新郎君成行如畵杏園風細桃花浪煖競喜羽遷鱗化遍九陌相將逰冶驟香塵寶鞍嬌馬沈會宗楚天來駕春相送半醉側花冠重瑶臺淸宴羣仙戯手剪出綵衣猶動誰拂瑶琴巧弄舞丹山三千雛鳯艶冶輕盈放縱倚東風從來偏寵桃花溪上相思未斷愁掩五雲真洞筭曽揖飛鸞雙控等閒入㐮王春夣泛蘭舟霜月亭亭時節野溪開氷灼故人信付南歸也仗誰托寒影低横輕香暗度踈籬幽院何在秦樓朱閣稱簾幕携酒共看依依承醉更堪作雅淡一種天然如雪綴烟薄腸斷相逢手撚嫩枝追思渾似那人淺妝梳掠最高樓催春蔣㨗新春景明媚在何時冝早不冝遲輭塵巷陌靑油幰重簷深院畵羅衣要些兒晴日照暖風吹一片片雪兒休要下一㸃㸃雨兒休要洒纔恁他越愆期悠悠不趂梅花到匆匆枉帯柳花飛倩黄鶯將我語報春歸程正伯舊時心事說着雨眉羞長記得憑肩遊緗裙羅襪桃花岸薄衫輕扇杏花樓㡬畨行㡬畨醉㡬畨留也誰料春風吹已斷又誰料朝雲飛亦㪚天易老恨難酧蜂兒不解知人苦燕兒不解説人愁舊情懐消不盡㡬時休毛澤民㣲雨過深院芰荷中香冉冉繡重重玉人共倚欄干角月華猶在小池東入人懐吹鬢影可憐風分散去輕如雲與夣剩下了許多風與月侵枕簟冷簾櫳剛能小睡還驚覺畧成輕醉早醒鬆仗行雲將此恨到眉峯慶洪景盧内翰七十辛㓜安金閨彦眉壽正如川七十且華筵樂天詩句香山裏杜陵酒債曲江邊問何如歌窈窕舞嬋娟更十嵗太公方出將又十嵗武公方入相留盛事看明年直須腰下添金印莫教頭上欠貂蟬向人間長富貴地行僊前調吾衰矣須冨貴何時冨貴是危機暫忘設醴抽身去未曽得米棄官歸穆先生陶縣令是吾師待葺箇園兒名佚老更作箇亭兒名亦好閒飲酒醉吟詩千年田換八百主一人口揷㡬張匙咄豚奴愁産業豈佳兒秋崖朝元了萬鶴放班囬携月下天來初平家看靑羊石滕王閣醉緑蟻杯試鳴琴花蕩漾玉崔嵬前十日鵲橋飛寳􅌱後一月兎奩開玉鏡秋色净夜裵􅏆由從五岳三光出亥將二首六身排問何其餐沆瀣燕蓬萊别妓王㓜玉桞冨青𤨏高議人間最苦最苦是分離伊愛我我憐伊靑草岸頭人獨立畫船東去櫓聲遲楚天低囘望處兩依依後會也難知未知何日重歡會心下事亂如絲好天良夜還虛過辜負我兩心知願伊家衷腸在一雙飛商於魯縣北元遺山商於路山逺客來稀雞犬静柴扉東家歡飲薑芽脆西家留宿芋魁肥覺重來猿與鶴總忘機問華屋高貲誰不戀美食大官誰不羡風浪裏竟安歸雲山既不求吾是林泉又不責吾非任年年藜藿飯芰荷衣暮春司馬昻花信𦂳二十四畨愁風雨五更頭侵堦苔蘇冝羅襪逗衣梅潤試香篝緑窓閒人夣覺鳥聲幽按􅌙筝學㺯相思調冩幽情恨殺知音少向何處説風流一絲楊柳千絲恨三分春色二分休落花中流水裏兩悠悠安公子柳耆卿長川波㶑灔楚鄉淮岸迢逓一霎煙汀雨過芳草靑如染驅驅携書劍當此好天好景自覺多愁多病行役心情厭望處曠野沉沉暮雲黯黯行色侵夜色又是急槳投村店認去程將近舟子相呼遥指漁燈一㸃倒埀柳楊無咎曉來烟露重為重陽増勝致記一年好處無似此天氣東籬白衣至南陌芳筵啟風流曾未逺登臨都在眼底人生如寄謾把茱茰看仔細擊節聼高歌痛飲莫辭醉烏㡌任教顚倒風裏墜黄花明日縱好無情味二南州初會遇記惺惺說底語而今精神傾下越様風措雍門人獨夜客舎停杯處餘香應未眠憑君重唱金縷移宫易羽縱有離愁休怨訴客裏摠凄凉怕聽斷腸句情山曲海君已心相許驂鸞乘月正好同歸去踏歌帯雪向南枝一朶江梅折許多時甚處收香白占陌上先春色瑩㓗正廣寒宫殿人窺隔銷魂處畵角數聲徹暗香浮動黃昏月瀟洒處最竒絶孤標逈不與羣芳列吟賞竟連宵痛飲無休歇輸有心牧童偷折鬬百花柳耆卿煦色韶光明媚輕藹低籠方樹池塘殘蘸烟蕪簾幙閒垂風絮春困厭厭抛擲鬬草工夫冷落踏青情緖終日扄朱户逺恨綿綿淑景遲遲難度年少傅粉依前醉眠何處深院無人黄昏乍拆鞦韆空鏁滿庭花雨二颯颯霜飄鴛瓦翠幙輕寒㣲透長門深𤨏悄悄滿林秋色將晚眼看菊蕋重陽淚落如珠長是淹殘粉面鸞輅音塵逺無限幽恨寄情空殢紈扇應是帝王當初怪妾辭輦陡頓今來宫中第一妖嬈却道昭陽飛燕三滿搦宫腰纎細年㡬方當笄嵗剛被風流沾惹與合埀楊䨇髻初學嚴粧如描似削身材怯雨羞雲情意舉措多嬌媚争奈心性未會先憐佳婿長是夜深不肯便入鴛鴦被與解羅裳盈盈背立銀缸却道你但先睡柳腰輕贈妓英英妙舞腰肢軟章䑓柳昭陽燕錦衣冠葢綺堂筵會是處千金争選顧香砌絲管初調倚輕風珮環㣲顫乍入霓裳促遍逞盈盈漸催檀板慢埀霞袖急趍蓮歩進退竒容千變笑何止傾國傾城暫囘眸萬人腸斷千秋嵗引秋思王介甫別舘寒砧孤城畵角一𣲖秋聲入寥廓東歸燕從海上去南來鴈向沙頭落楚䑓風庾樓月宛如昨無奈被些名利縳無奈被他情擔閣可惜風流總閒却當初謾留華表語而今誤我秦樓約夣闌時酒醒時思量着二詞賦偉人當代一英雄信獨歩儒林蟾宫客名登鴈塔正青春更不歷郡縣徒勞力即趍朝典文衡居花掖得儔詞科推第一便掌經綸天上尺見説慶生辰當此日翠蓂三四葉方新朱明正屬淸和節行作箇黒頭公專調爕早梅芳別恨周美成花竹深房櫳好夜閴無人到隔窗寒雨向壁孤燈弄餘照涙多羅袖重意密鶯聲小正魂驚夣怯門外已知曉去難留話未了早促登長道風披宿霧露洗初陽射林表亂愁迷逺覽苦語縈懐抱漫囘頭更甚歸路杳牽情繚墻深叢竹繞宴席臨淸沼㣲呈纎履故隠烘簾自嬉笑粉花粧暈薄帯緊腰圍小看鴻驚鳯翥滿座嘆輕妙酒醒時會散了囘首城南道河隂高轉露脚斜飛夜将曉異鄉淹嵗月醉眼迷登眺路迢迢恨滿千里草前調李端叔雪初晴陡覺寒將變己報梅梢暖日邊霜外迤邐枝條自柔軟嫩苞勻㸃綴緑蕚輕裁剪隠深心未許清香散漸融和開欲遍宻處疑無間天然標韻不與羣花鬬深淺夕陽波似動曲水風猶嬾最銷魂弄影無人見拂霓裳同叔樂秋天晩荷花上露珠圓風日好數行新鴈貼寒烟銀筝調脆管瓊柱撥清弦捧觥船一聲聲齊唱太平年人生百嵗離别易會逄難無事日剰呼賔友啟芳筵星霜催緑鬢風露損朱顔惜清歡又何妨沉醉玉尊前二喜秋成見千門萬户樂昇平金風細玉池波浪縠文生宿露霑羅幕㣲凉入畫屛張綺宴傍熏爐蕙炷和新聲神仙雅會此日向蓬瀛管絃淸旋翻紅袖學飛瓊光隂無暫住歡醉有閒情祝辰星願百千為壽獻瑶觥新荷葉趙閲道日晚芳塘圓荷嫩緑新抽越女輕盈畵橈穩泛蘭舟波光艶粉紅相間脉脉嬌羞菱歌隱隱漸遥依約凝眸堤上即心波間粧影遲留不覺歸時暮天碧襯蟾鈎殘蟬噪晩餘霞映㡬㸃沙鷗漁笛不道有人獨倚危樓趙德莊欲暑還凉如春有意重歸春若歸來任他鶯老花飛輕雷澹雨似晩風欺得单衣簷聲驚醉起來新緑成圍囘首分携光風苒苒菲菲曽㡬何時故山疑夣還非鳴琴再撫將淸恨都入金徽永懐橋下係船溪柳依依二雨細梅黄去年雙燕還歸多少繁紅盡随蝶夣蜂飛隂濃緑暗正麥秋猶衣羅衣香凝沉水雅冝簾幕重圍綵扇仍携花枝塵染芳菲遥想當時故交徃徃人非天涯再見悦情話景仰淸徽可人懷抱晩期蓮社相依侯彦周柳幄飛綿風池煖泛新萍燕疊泥香玉麟堂外春深晴雲麗日花濃處蜂蝶紛紛償春一醉管絃聲裏歡聲况是淸時錦衣重到䑓城故國江山向人依舊多情趂閒行樂休辜負冶葉䌓英彤庭歸覲恁時難駐前旌和趙德莊韻辛㓜安人巳歸來杜䳌欲勸誰歸緑樹如雲等閒付與鶯飛免葵燕麥問劉郎㡬度沾衣翠屏幽夣覺來水遶山圍有酒重携小園随意芳菲徃日繁華而今物是人非春風半靣記當年初識崔徽南雲鴈少錦書無箇因依爪茉䔧秋夜柳耆卿每到秋來轉添甚况味金風動冷淸淸地殘蝉噪晚甚聒得人心欲碎更休道宋玉多悲石人也須下淚衾寒枕冷夜迢迢更無寐深院静月明風細巴巴望曉怎生捱更迢逓料我兒只在枕頭根底等人睡來夣裏瑤堦草程正伯空山子規呌月破黄昏冷又還簾幕風輕緑暗紅又盡自從别後粉銷香减一春成病那堪晝閒日永恨難整起來無語緑萍破處池光净悶裏殘妝照花獨自憐瘦影睡來又怕飲來越醉醒來越悶看誰似我孤另南州春色汪梅溪輟耕録淸溪曲一株梅無人修采獨立古墻隈莫恨東風吹不到着意挽春囘一任天寒地凍南枝香動花傍一陽開更待明年首夏酸心結子天自栽培金鼎調羮仁心猶在還種取無限根荄管取南州春色都自此中來歸去難周成美佳約人未知背地伊變惡會稱停事看深淺如今信我委的論長逺好來無可怨自合教伊推些事後分散宻意都休待説先腸斷此恨除非是天相念堅心更守未死終相見多少閒磨難到得其間知他做甚頭眼驀山溪一名上陽春永叔新正初破三五銀蟾滿纎手染香羅剪紅蓮滿城開遍樓臺上下歌管咽春風駕香輪停寳馬只待金烏晚帝城今夜羅綺誰為伴應卜紫姑神問歸期相思望斷天涯情緒對酒且開顔春宵短春寒淺莫待金杯暖山谷鴛鴦翡翠小小思珍偶眉黛歛秋波儘湖南山明水秀娉娉嫋嫋恰似十三餘春未透花枝瘦正是愁時候尋花載酒肯落他人後祇恐逺歸來緑成隂靑梅如豆心期得處每自不由人長亭柳君知否千里猶囘首晁次膺風流心膽直把春償酒選得一枝花綺羅中筭來未有名園翠苑風月最佳時夜迢迢車欵欵是處曽携手重來一夣池舘皆依舊幽恨冩新詩託何人章臺問柳漁舟歸後雲鎻武陵溪水潺潺花片片艤棹空囘首二輕衫短㡌重入長安道屈指十年中一廻來一迴漸老朋遊在否落托更能無朱絃悄知音少撥斷相思調花邉柳外蕭洒愁重到深院鎻春風悄無人桃花自笑金釵一股凝欲問音塵天杳杳波渺渺何處尋蓬島春杜伯高春風如客可是繁華主紅紫未全開早緑遍江南千樹一畨新火多少倦遊人纎腰柳不知愁猶作風前舞小欄干外兩兩幽禽語問我不歸家有佳人天寒日暮老來心事惟只有春知江頭路帯春來更帯春歸去前調李處全梨花過雨已是春強半花惱欲顛狂興渾在秋千架畔搔頭無語斜日上簾櫳飛上下語呢喃又見雙䨇燕魚吹細浪鏡靣揺歌扇藉草倒芳樽襯香茵落紅千片追奔蝸角囘首醉初醒逄節物且歡娛莫待流年換惜别想伊不住船在藍橋路别語未丼聽更忍問而今是去門前楊柳㡬日轉西風將行色欲留心匆匆城頭鼔一畨幽會只覺添愁緖邂逅却相逢又還有此時歡否臨岐把酒莫惜十分斟尊前月月中人明夜知何處曹元寵草薫風暖樓閣籠輕霧墻短出花梢映誰家緑楊朱戸尋芳拾翠綺陌自靑春江南逺踏靑時誰念方覊旅昔遊如夣空憶横塘路羅袖舞䑓風想桃花依然舊樹一懐離恨滿眼欲歸心山連水水連雲悵望人何處二洗粧真態不在鉛華御竹外一枝斜想佳人天寒日暮黄昏院落無䖏着淸香風細細雪垂垂何况江頭路月邉踈影夣到銷魂處結子欲黄時又須作廉纎細雨孤芳一世供斷有情愁消瘦損東陽也試問花知否一本首二句作䕶霜雲際逺目明芳樹易彦祥海棠枝上留得嬌鶯語雙燕㡬時來並飛入東風院宇夣囘芳草緑遍舊池塘梨花雪桃花雨畢竟春誰主東郊拾翠襟袖霑飛絮寳馬趂雕輪亂紅中香塵滿路十千斗酒相與買春閒呉姬唱秦娥舞􅂸醉青樓暮張東父靑梅如豆斷送春歸去小緑間長紅看㡬處雲歌柳舞偎花識靣對月共論心携素手採香遊踏遍西池路水邊朱戸曽記銷魂處小立背秋千空悵望娉婷韻度楊花撲面香糝一簾風情脉脉酒厭厭囘首斜陽暮自述宋謙父壺山居士未老心先懶愛學道人家辦竹几蒲團茗椀靑山可買小結屋三間開一逕俯靑溪脩竹栽教滿客來便請随分家常飯若肯小留連更薄酒三杯兩琖吟詩度曲風月任招呼身外事不關心自有天公管前調石孝友醉魂初醒強起㝷芳徑一似楚雲歸誚沒箇鱗書羽信踈狂蹤跡虛度可憐春隂還悶晴還困贏得無端病菱花寳鏡拆破雙鸞影别袖忍頻看生怕見啼紅醉粉而今憔悴瘦立對東風紅成陣緑成隂况是春將盡野梅梅苑當時曽見上苑東風煖今嵗却相逢向烟村亭邊驛畔埀鞭立馬一餉黯無言江南信壽陽人悵望成腸斷瓊籹雪綴滿眼空零亂誰是倚闌干更那堪胡笳羌管踈枝殘蕋猶懶不嬌春水淸淺月黄昏冷淡從來慣張表臣珊瑚鈎樓横北固盡日厭厭雨欵乃數聲歌但渺漠江山煙樹寂寞風物三五過元宵尋柳眼覔花英春色知何處落梅嗚咽吹徹江城暮脉脉数飛鴻杳歸期東風凝佇長安不見􅇏起夕陽間魂欲㫁酒初醒獨下危梯去遊三榮龍洞陸務觀窮山孤疉臘盡春初破寂寞掩空齋好一箇無聊頼底我嘯䑓龍岫随分有雲山臨淺瀬䕃長松閒㨿胡床坐三杯徑醉不覺紗巾堕畫角喚人歸落梅村籃輿夜過城門漸近㡬㸃妓衣紅官驛外酒壚前也有閒燈火桂花万俟雅言芳菲葉底誰會秋工意深緑䕶輕黄怕靑女霜侵憔悴開分早晩都占九秋天花四出香十里獨歩珠宫裏佳名巖桂却是因遺子不自月中來又那得蕭蕭風味霓裳舊曲休問廣寒人飛太白酧仙蕋香外無香比前調朱希真東風不住㡬陣黄梅雨風外曉鶯聲怨飄零花殘春暮鴛鴦散後供了十年愁懐舊事想前歡忍記丁寧語塵昏青鏡休照孤鸞舞烟鎻鳯樓空問吹簫人今何處小窗驚夣携手似平生陽䑓路行雲去目斷山無数集曲名菊花新過秋蕊香猶媚三八燕山亭賀聖朝申生明世肅霜天曉正快活年時慶新壽萬年歡人醉蓬萊裏紅衫兒歌水調誇多麗仰祝壽星明指黄河淸年可擬歡同魚水永遇樂傾盃風流子洞仙歌曲唱千秋嵗滿路花促拍秦少㳺露顆添花色月綵投窓隙春思如中酒恨無力洞房咫尺曽寄靑鸞翼雲散無蹤跡羅帳春殘夣囘無處㝷覔輕紅膩白歩歩薫蘭澤約腕金環重宜裝餙未知安否一向無消息不是㝷常憶憶後教人片時存濟不得周美成金花落燼燈銀鑠鳴忩雪庭深㣲漏斷行人絶風扉不定竹圃琅玕折玊人新間濶着甚悰情更當恁地時節無言欹枕帳底淸流血愁如春後絮來相接知他那裏争信人心切除共天心說不成也還似伊無箇分别二簾烘淚雨乾酒壓愁城破氷壺防飲渴培殘火朱消粉褪絶勝新梳裹不是寒宵短日上三竿殢人猶要同卧如今多病寂寞章䑓左黄昏風弄雪門深鎻蘭房宻愛萬種思量過也須知有我着甚情悰你但忘了人呵柳耆卿香靨融春雪翠髩嚲秋煙楚腰纎細正笄年鳯幃夜短偏愛日高眠起來貪顚俊只恁殘却黛眉不整花鈿有時携手閒坐偎倚緑窓前温柔情態儘人憐畫堂春過悄悄落花天長是嬌癡處尤殢檀即未教拆了秋千迷仙引風塵柳耆卿才過笄年初綰雲鬟便學歌舞席上尊前王孫随分相許算等閑酧一笑便千金慵覷常秪恐容易蕣華偷換光隂虚度已受君㤙顧好與花為主萬里丹霄何妨携手同歸去永棄却煙花伴侣免教人見妾朝雲暮雨黄鶴引泊宅編生逄埀拱不識千戈免田隴士林書圃終年庸非天寵才初闒茸老去支離何用浩然歸筭似黄鶴秋風相送塵事塞翁心浮世莊生夣漾舟遥指烟波羣山森動神閒意聳囘首利鞿名鞚此情誰共問㡬許淋浪春甕秋夜月柳耆卿當初聚散便喚作無由再逄伊面近日來不期而㑹重歡宴向尊前閒暇裏歛着眉兒長嘆惹起舊愁無限盈盈淚眼漫向我耳邉作萬般幽怨奈你自家心下有事難見待音信真箇恁别無縈絆不免收心共伊長逺淸波引詠梅姜白石冷雲迷浦倩誰喚玉妃起舞嵗華如許野梅弄眉嫵屐齒印蒼蘚漸為尋花來暮自随秋鴈南來望江國渺何處新詩謾與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪烟雨况有清夜啼猿怨人良苦踏靑遊王晉卿金勒狨鞍西城嫩寒春曉路漸入埀楊芳草過平堤穿緑逕㡬聲啼鳥是處裏誰家杏花臨水依約靚粧斜照極目高原東風露桃烟島望十里紅圍緑繞更相將乘酒興幽情多少待向晩從頭記將歸去説與鳯樓人道詠妓崔念四識箇人人恰止二年懽會似賭賽六隻渾四向巫山重重去如魚水兩情美同倚畫樓十二倚了又還重倚兩日不來時時在人心裏擬問卜常占歸計􅂸三八淸齋望永同鴛被驀然被人驚覺夣也有頭無尾政和間一貴人未達時常游妓崔念四之舘因其行作此詞鶴冲天賀方囬鼕鼕鼓動花外沉殘漏華月萬枝燈還淸晝廣陌衣香度飛葢影相先後箇處頻回首錦坊西去期約武陵溪口當時早恨歡難偶可堪流浪逺分擕乆小畹蘭英在輕付與何人手不似長亭柳舞風眠雨伴我一春消瘦恨别柳耆卿閒窓漏永月冷霜華堕悄悄下簾幙殘燈火再三追徃事離魂亂愁腸鎖無語沉吟坐好天好景未省展眉則箇從前早是多成破何况經嵗月相抛嚲假使重相見還得似舊時麽悔恨無計那迢迢良夜自家只恁摧挫夣玉人引沈會宗追舊遊處思前事儼如昔過盡鶯花横雨暴風初息杏子枝頭又自然别是般天色好傍埀楊繫畫舩橋側小歡幽會一霎時光景也堪惜對酒當歌故人情分難覔山逺水長不成空相憶逗歸去重來又却是㡬時來得朱希真浪萍風梗寄人間倦為客夣裏瀛洲姓名誤題仙籍歛趐歸來愛小園脫籜篔簹碧新種幽花戒兒童休摘放懐随分各逍遥飛鷃等鵬翼舎此蕭閒問君携杖安適諸彦羣英詩酒皆勍敵太平時向花前不醉如何休得吕聖求上危梯望畫閣逈晝簾埀曲水飄香小園鶯喚春歸舞袖弓彎正滿城烟草凄迷結伴踏靑趂蝴蝶雙飛賞心歡計從别後無意到西池自檢羅囊要尋紅葉留詩嬾約無憑據鶯花都不知怕人問強開懷細酌酴醿祭天神柳耆卿嘆笑筵歌席輕抛亸背孤城㡬舎烟村停畫舸更深釣叟歸來数㸃殘燈火被連綿宿酒醺醺愁無那寂寞擁重衾卧又聞得行客扁舟過蓬窓近蘭棹急好夣還驚破念平生單栖踪跡多感情懐到此厭厭向曉披衣坐千秋萬嵗山東李冠杏花好子細君須辨比早梅深夭桃淺把鮫綃淡拂鮮紅靣蠟融紫蕚重重現煙外悄風中笑香滿院欲綻全開俱可羡粹美妖嬈無處選除卿卿似尋常見倚天眞艶冶輕朱粉分明洗出胭脂靣追徃事遶芳榭千千遍洞仙歌埀虹橋林外詞話飛梁壓水虹影清光曉橘里漁鄉半烟草嘆來今徃古物是人非天地裏惟有江山不老雨巾風㡌四海誰知道一劔横空㡬畨過按玉龍嘶未斷月冷波寒歸去也林屋洞門無鎻認雲屏烟障是吾廬任滿地蒼苔年年不掃苕溪漁隠吕仙作楊花李漢老一團嬌軟是將春揉做撩亂隨風到何處自是亭皋人去後烟草萋迷歸來了裝㸃離愁無数飄揚無箇事剛被縈牽長是黄昏怕㣲雨記那回深院靜簾幕低埀花隂下霎時留住又只恐伊家太輕狂驀地便和春帯將歸去初春李元膺雪雲㪚盡放曉晴庭院楊柳於人便靑眼更風流多致一㸃梅心相映逺約畧嚬輕笑淺一年春好處不在濃芳小艶踈香最嬌軟到淸明時候百紫千紅花正亂己失春風一半早占取韶光共追遊但莫管春寒醉紅自暖詠雨簾纎細雨殢東風如困縈斷千絲為誰恨向楚宫一夣多少悲凉無處問愁到而今未盡分明都是淚泣柳沾花常與騷人伴孤悶記當年得意處酒力方酣怯輕寒玉爐香潤又豈識情懐苦難禁㸃滴簷聲夜寒燈暈前調東坡或云李季成作氷肌玊骨自淸凉無汗水殿風來暗香滿繡簾開一㸃明月窺人人未寢欹枕釵横鬂亂起來携素手庭户無聲時見踈星度河漢試問夜如何夜己三更金波淡玉繩低轉但屈指西風㡬時來又不道流年暗中偷換春雨謝勉仲愁邉雨細漠漠天如醉揺颺遊絲晚風外醸輕寒和瞑色花柳難勝春自老誰管啼紅歛翠關情潜入夜斜濕簾櫳㡬處挑燈耿無寐念陽䑓當日事好伴雲來因箇甚不入㐮王夣裏便添起寒潮捲長江又恐是離人斷腸淸淚前調盧申之溶溶洩洩似飄揚愁緖不是因風等閒度道無心因甚却又情多行未駐還作高陽暮雨襄王情尚淺會少離多空自朝朝又暮暮腸斷曉光中一縷歸時銷㪚後不知何處試宻鎻瓊樓洞房深與遮斷江臯楚䑓歸路吕直夫征鞍帯月濃露沾襟䄂馬上輕衫峭寒透望翠峰深淺憶着眉兒腰肢嫋忍看風前細柳别時頻囑付早寄書來能趂淸明到家否這言語便夣裏也在心頭重相見不知伊瘦縱百卉千花己離披也趂得酴醿牡丹時候晁無咎靑烟羃處碧海飛金鏡永夜閒階臥桂影露凉時零亂多少寒螿神京逺惟有藍橋路近水晶簾不下雲母屏開冷浸佳人淡脂粉待都將許多明付金樽投曉共流霞傾盡更携取胡牀上南樓看玉做人間素秋千頃梅苑斷雲踈雨冷落空山道匹馬駸駸又重到望孤村兩三間茅屋踈籬溪水畔一簇蘆花晚照尋思行樂事去無㾗回首湘波與天杳嘆人生㡬度能醉金釵靑鏡裏贏得朱顔未老又枝頭一㸃破黄昏問客路春風為誰開早寳月廣寒曉駕姑射尋仙侣偷被霜華送將去過越嶺棲息南枝勻粧靣凝酥輕聚愛横管孤度隴頭聲盡􅂸得幽香為君分付水亭山驛衰草斜陽無限行人斷腸處盡為我留得多情何須待春風相顧任倒斷深思向梨花也無奈寒食㡬畨春雨蕙蘭芳引秋懐周美成寒瑩晩空㸃青鏡斷霞孤鶩對客館深扄霜草未衰更緑倦遊厭旅但夣繞阿嬌金屋想故人别後盡日空疑風竹塞北氍毹江南圖障是處温燠更花管雲牋猶冩寄情舊曲音塵迢逓但勞逺目今夜長争奈枕单人獨華胥引川源澄暎烟月溟濛去舟如葉岸足沙平蒲根氷冷留鴈唼别有孤角吟秋對曉風嗚軋紅日三竿醉頭扶起還怯離思相縈漸看看鬢絲堪鑷舞衫歌扇何人輕憐細閱檢㸃從前恩愛但鳯牋盈篋愁剪燈花夜來和淚雙疊受恩深秋菊柳耆卿雅致裝庭宇黄花開淡竚細香明艶盡天與助秀色堪餐向曉自有真珠露剛被金錢妬擬買斷秋天容易獨歩粉蝶無情蜂已去要上金罇惟有詩人曽許待宴賞重陽恁時盡把芳心吐陶令輕回顧免憔悴東籬冷煙寒雨五福降中天上元有感江致和喜元宵三五縱馬御柳溝東斜日映朱簾瞥見芳容秋水嬌横俊眼膩雪輕鋪素胷愛把菱花笑勻粉靣露春葱徘徊歩嬾奈一㸃靈犀未通悵望七香車去慢展春風雲情雨態願暫入陽䑓夣中路隔煙霞甚時還許到蓬宫婆羅門引相思柳耆卿昨宵裏恁和衣睡今宵裏又恁和衣睡小飲歸來初更過醺醺醉中夜後何事還驚起霜天冷風細細觸踈忩閃閃燈揺曳空牀展轉重追想雲雨夣任欹枕難繼寸心萬緒咫尺千里好景良天彼此空有相憐意未有相憐計促拍滿路花舊詞見山谷集秋風吹渭水落葉滿長安黄塵車馬道獨淸閒自然爐鼎虎繞與龍盤九轉丹砂就琴心三疊蘂宫看舞胎仙任萬釘寳帯貂蟬富貴欲熏天黄粱炊未熟夣驚殘是非海裏直道作人難䄂手江南去白蘋紅蓼又尋湓浦廬山吕聖求西風秋日短小雨菊花寒斷雲低古木暗江天星娥尺五佳約悞當年小語憑肩處猶記西園畵橋斜月䦨干鳥啼花落春信遣誰傳尚容清夜夣小留連靑樓何處寳鏡注嬋娟應念紅牋事㣲暈春山背忩愁枕孤眠離别難薛昭藴寳馬曉鞴雕鞍羅幃乍别情難那堪春景媚送君千萬里半粧珠翠落露華寒紅爉燭靑絲曲偏能勾引淚闌干良夜促香塵緑魂欲迷檀眉半歛愁低未别心先咽欲語情難說出芳草路東西揺䄂立春風急櫻花楊柳雨凄凄法曲第二偷期柳耆卿青翼傳情香徑偷期自覺當年草草未省同衾枕便輕許相將平生懽笑怎生向人間好事到頭少謾悔懊細追思恨從前容易致得恩愛成煩惱心下事千種盡憑音耗以此縈牽等伊來自家向道洎相見喜懽存問又還忘了羽仙歌潘庭堅吳中舊事雕簷綺户倚晴空如畫曽是吳王舊䑓榭自浣紗去後落日平蕪行雲㡬㫁見花開花謝凄凉䦨干外一簇江山多少圗王共争覇莫閒愁金杯㶑灔對酒當歌歡娛地夣中興亡休話漸倚遍西風晩潮生明月裏鷺鶿背人飛下滿園花少㳺一向沉吟乆淚珠盈襟袖我當初不合苦撋就慣縱得軟頑見底心先有行待癡心守甚捻著脉子倒把人來僝僽近日來非常羅皂醜佛也須眉皺怎掩得衆人口待收了孛羅罷了從來斗從今後休道共我夣見也不得能勾江城梅花引一名攤破江城子程正伯娟娟霜月冷侵門怕黄昏又黄昏手撚一枝獨自對芳樽酒又不禁花又惱漏聲逺一更更緫斷魂斷魂斷魂不堪聞被半温香半薫睡也睡也睡不穩誰與温存惟有牀前銀燭伴啼㾗一夜無眠連曉角人瘦也比梅花瘦㡬分王觀年年江上見寒梅㡬枝開暗香來疑是月宫仙子下瑶䑓冷艶一枝春在手故人逺相思切寄與誰怨極恨極嗅玉蕋念此情家萬里暮霞㪚綺楚天碧㡬片斜飛為我多情特地㸃征衣花易飄零人易老正心碎那堪聞塞管吹憶江梅洪皓天涯除館憶江梅㡬枝開使南來還帯餘杭春信到燕䑓准擬寒英聊慰逺隔山水應銷落赴愬誰空恁遐想笑摘蘂斷囘腸思故里漫彈緑綺引三弄不覺䰟飛更聽胡笳哀怨淚沾衣亂插繁華須異日待孤諷怕東風一夜吹訪寒梅春寒消息訪寒梅賞初開夣吟來映雪衘霜淸絶繞風臺可怕長洲桃李妬度香逺驚愁眼欲媚誰曽動詩興笑冷蘂效少陵慙下里萬株連綺歎金谷人墜鶯飛引領羅浮翠羽幻青衣月下花神言極麗且同醉休先愁玉笛吹憐落梅重閨佳麗最憐梅牗春開學粧來争粉翻光何遽落梳䑓笑坐雕鞍歌古曲催玉柱金巵滿勸阿誰貪為結子藏暗蘂歛娥眉隔千里舊時羅綺已零散沈謝雙飛不見嬌姿真悔着單衣若作和􅃵休訝晩堕烟雨任春風片片吹容齋五筆云紹興壬戌洪忠宣皓在燕赴張緫侍御家宴侍妾歌前詞公感其念此情家萬里之句愴然曰此詞殆為我作旣歸遂用韻賦四闋北方不識梅花士人罕有知梅事者皆注其所出每首有四笑字北人謂之四笑江梅引第四篇失其藁鵲橋仙柳耆卿留征途擕書劔迢迢匹馬東歸去慘離懐嗟少年易分難聚佳人方恁繾綣便忍分鴛侣當媚景筭宻意幽懽盡成輕負此際寸腸萬緖慘愁顔斷魂無語和淚眼片時㡬番回顧傷心脉脉誰訴但黯然凝竚暮烟寒雨望秦樓何處瑞鷓鴣寳髻瑶簪嚴妝巧天然緑媚紅深綺羅叢裏獨逞謳吟一曲陽春定價何啻直千金傾聽處王孫帝子鶴葢成隂凝態掩霞襟動象板聲聲怨思難任嘹喨處迴壓絃管低沉時恁回眸歛黛空役五陵心須信道縁情寄意别有知音上太守吳會風流人烟好高下水際山頭瑶䑓綘闕依約蓬丘萬井千閭冨庻雄壓十三州觸處靑蛾畫舸紅粉朱樓方靣委元侯致訟簡時豐繼日懽遊襦温袴煖已扇民謳旦暮絳車命駕重整濟川舟當恁時沙堤路穩歸去難留卜筭子慢寄妓青箱江南鍾輻桃花院落烟重露寒寂寞禁烟晴晝風拂朱簾還記去年時候春心不喜閉窓綉倚屏山和衣睡覺醺醺暗消殘酒獨倚危欄乆把玊笋偷彈黛娥輕鬭一㸃相思萬般自家丼受抽金釵欲買丹靑手冩别來容顔寄與使知人淸瘦傷秋柳耆卿江楓漸老汀蕙半凋滿目敗紅衰翠楚客登臨正是暮秋天氣引踈碪㫁續殘陽裡對晩景傷懐念逺新愁舊恨相繼脉脉人千里念兩處風情萬重煙水雨歇天高望㫁翠峯十二儘無言誰會憑高意縱冩得離腸萬種奈歸鴻難寄晋陸機詩歸雲難寄音張子野溪山别意烟樹去程日落採蘋春晩欲上征鞍更掩翠簾囬靣相盼惜彎彎淺黛長長眼奈畫閣歡遊也學狂花亂絮輕散水影横池舘對静夜無人月高雲逺一餉凝思兩眼淚痕還滿難遣恨私書又逐東風㫁縱夣澤層樓萬尺望湖城那見八六子一名感黄鸝少㳺詞話倚危亭恨如芳草萋萋剗盡還生念柳外靑驄别後水邉紅袂分時愴然暗驚無端天與娉婷夜月一簾幽夣春風十里柔情怎奈何歡娛漸随流水素絃聲㫁翠綃香滅那堪片片飛花㺯晚濛濛殘雨籠晴正銷凝黄鸝又啼数聲王沂孫掃芳林㡬畨風雨匆匆老盡春禽漸薄潤侵衣不斷嫩凉随扇初生晚窓自吟沉沉幽徑芳尋晻靄苔香簾净蕭踈竹影庭深謾淡却蛾眉晨粧慵掃寳釵蟲拆繡屏鸞破當時暗水和雲泛酒空山留月聽琴料如今門前数重翠隂雪獅兒程正伯斷雲低晚輕烟帯瞑風驚羅幙数㸃梅花香倚雪窓揺落紅爐對謔正酒面瓊酥初削雲屏煖不知門外月寒風惡迤邐慵雲半掠笑盈盈閒㺯寳筝絃索煖極生春已向横波先覺花嬌柳弱漸倚醉要人樓着低告托早把被香薫却魚遊春水越州碑隂詞秦楼東風裏燕子還來尋舊壘餘寒猶峭紅日薄侵羅綺嫩草方抽碧玉茵媚桞輕􅌥黄金縷鶯囀上林魚遊春水㡬曲欄干遍倚又是一畨新桃李佳人應怪歸遲梅粧淚洗鳯簫聲絶沉孤鴈望斷淸波無雙鯉雲山萬重寸心千里馬莊父池塘生春草数盡歸鴻人未到天涯目斷青鳥尚賖音耗曉月頻窺白玉堂暮雨還濕靑門道巢燕引雛乳鶯空老庭際香紅倦掃乾鵲休來枝上噪前回凖擬同它翻成病了欲題紅葉憑誰寄獨抱孤桐無心挑眉間翠攅鬢邉霜早離愁盧申之離愁禁不去好夣别來無覔處風翻征袂觸目年芳如許軟紅塵裏鳴鞭􅌱拾翠叢中勾伴侣都負嵗時暗關情緒昨夜山隂杜宇似把歸期驚倦旅遥知樓倚東風凝顰暗數寳香拂拂遺鴛錦心事悠悠㝷燕語芳草暮寒亂花㣲雨疊靑錢夏日正長無奈如焚天氣火雲聳奇峯天外未雨先雷畏日流金六龍高駕火輪飛紋簟紗厨風車謾攪月扇空揮金爐烟細午風輕轉堪避炎威漸凉生池閣捲起簾幕珠璣嬌娥美麗天然秀色氷肌玉欄深徑荷香旖旎玉筦聲齊芳草渡周美成昨夜裏又再宿桃源醉邀仙侣聽碧窓風快珠簾半捲踈雨多少離恨苦方留連啼訴鳯帳曉又是匆匆獨自歸去愁覩滿懐涙粉瘦馬衝泥尋去路漫回首煙迷望眼依稀見朱户似癡似醉暗惱損凭欄情緒澹暮色㸔盡棲鴉亂舞逺朝歸趙耆孫金谷先春見乍開江梅玉膩珠簾院落人静雨踈烟細橫斜帯月别是一般風味金樽裏任遺英亂㸃殘粉低墜惆悵秦隴當年念水逺天長故人難寄山城倦眼無緒更看桃李當時醉魄算依舊徘徊花底斜陽外漫回首畫楼十二二新律纔交早舊梢南枝朱汚粉膩烟籠淡粧恰值雨膏初細而今看了記他日酸甜滋味多應是伴玉簮鳯釵低掗斜墜迤邐對酒當歌眷戀得芳心竟日何際春光付與尤是見欺桃李叮嚀寄語且莫負樽前花底拚沉醉儘銅壼漏傳三二醉思仙憶夫孫氏建安黄雲軒妻霽霞紅看山迷暮紫烟暗孤松動翩翩風袂翻若驚鴻心似鑒鬂如雲弄淸影月明中漫悲凉嵗冉冉蕣華潜改衰容前事消凝久十年光景匆匆念雲軒一夢回首春空彩鳯逺玉簫寒夜悄悄恨無窮嘆黄塵乆埋玉斷腸洒淚東風困學齋雜録吕聖求斷人腸正西樓獨上愁倚斜陽稱鴛鴦鸂鶒兩兩池塘春乂老人何處怎慣不思量到如今瘐損我又還無計禁當小院呼盧夜當時醉倒殘缸被天風吹散鳯翼難雙南窓雨西廊月尚未㪚拂衣香聽鶯聲俏記得那時舞板歌梁醜奴兒慢初夏潘元質愁春未醒還是淸和天氣對濃緑隂中庭院燕語鶯啼数㸃新荷翠鈿輕泛水平池一簾風絮才晴又雨梅子黄時忍記那回玉人嬌困初試单衣共擕手紅窓描綉畫扇題詩怎有如今半牀明月兩天涯章䑓何處應是為我蹙損雙眉秋别呉子和金風顫葉那更餞别江樓聽凄切陽關聲㫁楚舘雲收去也難留萬重烟水一扁舟錦屏羅幌多應換得蓼岸蘋洲凝想恁時歡笑傷今萍梗悠悠謾回首妖饒何處眷戀無由先自悲秋眼前景物只供愁寂寥情緒也恨分淺也悔風流一枝花辛㓜安千丈擎天手萬巻懸河口黄金腰下印大如斗更千騎弓刀揮霍遮前後百計千方乆似兒童鬬草嬴箇他家偏有筭枉了雙眉長皺白髪空囘首那時閒説向山中友看秋隴牛羊更辨賢愚否且自栽花桞怕有人來但只道今朝中酒謝池春慢玉仙觀道中逢謝媚卿張子野繚繞重院時聞有啼鶯到繡被堆餘寒畫閣明新曉朱檻連空濶飛絮知多少徑莎平池水渺日長風静花影閒相照塵香拂馬逢謝女城南道秀麗過施粉多媚生輕笑鬬色鮮衣薄碾玉雙蝉小歡難偶春過了琵琶流䪨都入相思調李之儀殘寒銷盡踈雨過清明後花徑凝餘紅風沼縈新皺乳燕穿庭户飛絮沾襟䄂正佳時仍晚晝着人滋味濃如酒頻移帯眼空只恁厭厭瘦不見又思量見了還依舊為問頻相見何似長相守天不老人未偶且將此恨分付庭前柳探芳信史邦卿謝池曉被酒滯春眠詩縈芳草正一堦梅粉都未有人掃細禽啼處東風軟嫩約關心早未燒燈怕有殘寒故園稀到㝡說道試粧了也為我相思占它懐抱静数窓櫺欣聽鵲聲好半年白玉䑓邊話屢見銀鈎小指芳期夜月花隂夣老西湖春次周草窗韻坐淸晝正冶思縈花餘酲倦酒甚探芳人老芳心尚如舊銷魂忍說銅駞事不是因春痩向西園竹掃頺垣蔓維荒甃風雨夜來驟嘆歌冷鶯簾恨凝蛾袖愁到今年多似去年否賦情懶惰聽山陽笛目斷空搔首我何堪老却江潭漢柳遥天奉翠華引侯彦周雪消樓外山正秦淮翠溢囘瀾香梢荳蔻紅輕猶怕春寒曉光浮畫㦸捲綉簾風煖玉鈎閒紫府仙人花圍羽帔星冠蓬萊閬苑意倦㳺常戯世間佩麟舊都江左􅃭袴歌歡只恐催歸覲賸宴都休訴酒杯寛明嵗應看君鈞容舞袖歌鬟夏雲峯避暑柳耆卿宴堂深軒檻雨輕壓暑氣低沉花洞彩舟汎斚坐繞淸潯楚䑓風快湘簟冷永日披襟坐乆覺踈絃脆管換新音越娥蕙態蘭心逞妖艶昵懽邀寵難禁筵上笑歌間發舃履交侵醉鄉深處須盡興滿酌高吟向此免名韁利鎻虚費光隂戀香衾吕聖求記得花隂同携手指定日許我同歡喚作真成熱心安打疊從來不成器待做箇平地神仙又却不成些事驀地心殘據我如今沒投奔見着你淚早偷彈對月臨風一味埋寃笑則人前不妨笑行笑裏斗覺心煩怎分得煩惱兩處勻攤採蓮令柳耆卿月華收雲澹霜天曙西征客此時情苦翠娥執手送臨岐軋軋開朱户千嬌靣盈盈竚立無言有淚斷腸争忍回顧一葉蘭舟便恁急漿凌波去貪行色豈知離緖萬般方寸但飲恨脉脉同誰語更回首重城不見寒江天外隠隱兩三烟樹十二時慢朱雍粉㾗輕謝池泛玉波浸瑠璃初暖覩靚芳塵冥春浦水曲漪生遥岸麝氣柔雲容影淡正日邉寒淺閒院寂幽管聲中萬感併生心事曽陪瓊宴春暗南枝依舊但得當初繾綣晝永亂英繽紛觧佩映人輕盈面香暗酒醒處年年共副良願獅兒詞賦梅次仇山村韻張伯雨含香弄粉便勾引逰騎尋芳城南城北别有西村斷港氷凘㣲緑孤山路熟伴老鶴晚先尋宿怕凍損三花兩蘃寒泉幽谷㡬畨花影濯足記歸來醉卧雲深平屋春夣無憑鬂底閙蛾争撲不如圗畫相對展官奴風竹挑簧獨自聴瓶笙調曲四犯剪梅花上建康錢大即壽劉改之龍川詞水殿風凉賜環歸正是夣熊華旦解連環疊雪羅輕稱雲章題扇醉蓬萊西淸侍宴望黄傘日華寵輦雪獅兒金劵三王玉堂四世帝恩偏眷醉蓬萊笑折花看槖荷香紅潤醉蓬萊臨安記龍飛鳯舞信神明有後竹梧隂滿解連環功名嵗晚帯河與礪山長逺雪獅兒麟脯杯行狨薦坐穩内家宣勸醉蓬萊尉遲杯雅詞去年時正愁絶過却紅杏飛沉吟杏子靑時追悔負好花枝今年又春到傍小欄日日数花期花有信人却無憑故教春意遲遲及至待得融怡未攀條枯蘂巳嘆春歸怎得春如天不老更教花與月相随儘歸路拍手欄街笑人沉醉如泥花草稡編巻十六

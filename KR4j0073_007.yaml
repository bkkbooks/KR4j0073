秦少遊流鶯忩外啼聲巧睡未足把人驚覺翠被曉寒輕寶篆沉烟裊宿醒未解宮娥報道别院笙歌宴早試問海棠花昨夜開多少史逹祖梅溪詞似紅如白含芳意錦宫外烟輕雨細燕子不知愁驚墮黃昏淚燭花偏在紅簾底想人怕春寒正睡夢著玉環嬌又被東風醉謫仙怨劉長卿青瑣髙議晴川落日初低惆悵孤舟解擕鳥去平蕪逺近人隨流水東西白雲千里萬里明月前溪後溪獨恨長江謫去江潭春草萋萋竇𢎞餘邊塵犯闕衝關金輅提擕玉顔雲南此時消散君王何日歸還傷心朝恨暮恨回首千山萬山獨望天邊初月娥眉猶自彎彎劉斧晴山礙日橫天緑疊君王馬前鸞輅西巡蜀國龍顔東望秦川曲江魂斷芳草妃子愁凝暮烟長笛此時吹罷何言獨為嬋娟武陵春晏叔原緑蕙紅蘭芳信歇金蘂正風流應為詩人多怨秋花意與銷愁梁王苑路香英密長記舊嬉遊曽看飛瓊戴滿頭浮動舞梁州二九日黃花如有意依舊滿珍叢誰似龍山秋興濃吹帽落西風年年歲歲登髙節歡事旋成空幾處佳人此㑹同今在淚㾗中三烟栁長堤知幾曲一曲一魂銷秋水無情天共遙愁送朩蘭橈薰香繡被心情懶期信轉迢迢記得來時倚畫橋紅淚滿鮫鮹惜别謝勉仲門掩東風人去後愁損燕鶯心一朵梅花淡有春粉黛不忺勻我亦青樓成倦客風月强追尋莫把恩情做弄成容易學行雲信豐揖翠閣趙介之乍雨籠晴雲不定芳草緑纖柔燕語鶯啼小院幽春色二分休試憑危䦨凝逺目山與水光浮衮衮閒愁逐水流流不盡許多愁石次仲走去走來三百里五日以為期六日歸時已是疑應是望歸時鞭箇馬兒歸去也心急馬行遲不免相煩喜鵲兒先報那人知魏夫人小院無人簾半捲獨自倚欄時寬盡春來金縷衣憔悴有誰知玊人近日書來少應是怨來遲夢裏長安早晚歸和淚立斜暉李易安風住塵香花已盡日落倦梳頭物是人非事事休欲語淚先流聞說雙溪春尚好也擬泛輕舟只恐雙溪胙艋舟載不動許多愁岐陽郵亭趙秋官妻人道有情還有夢無夢豈無情夜夜思量直到明有夢怎教成昨夜偶然來夢裡鄰笛又還驚笛韻悽悽不忍聽總是斷腸聲一作連倩女寄陳彥臣万俟雅言燕子飛來花在否微雨退掩重門正滿院梨花雪照人獨自箇怯黃昏輕風淡月總消魂羅衣暗惹啼痕謾覷著秋千腰褪裙可㬠是不宜春鏡中人古今詞話栁烟濃梅雨潤芳草綿綿離恨花塢風來幾陳羅袖沾春粉獨上小樓迷逺近不見浣溪人信何處笛聲飄隱隱吹斷相思引髙溪梅令李端叔好花不與殢香人浪轔轔只恐春風歸去緑成隂玉鈿何處尋朩蘭雙槳夢中雲小橫陳謾向孤山山下覔盈盈翠禽啼一春雙鸂鶒朱希真拂破秋江烟碧一對雙飛鸂鶒應是逺來無力稍下相偎沙磧小艇誰吹橫笛驚起不知消息悔不當時插得如今何處尋覔茅山逢故人句曲道中送友張伯雨山下寒林平楚山外雲帆烟渚不飲如何吾生如夢鬢毛如許能消幾度相逢遮莫而今歸去壯士黃金昔人黃鶴美人黃土雙頭蓮令信豐雙蓮趙介之太平和氣兆嘉祥草朩總成雙紅苞翠蓋出橫塘兩兩鬪芬芳幹搖碧玉並青房仙髻擁新粧連枝不解引鸞凰留取映鴛鴦秋蘂香晏同叔梅蘂雪殘香瘦羅幕輕寒微透多情只似春楊栁占斷可憐時候蕭娘勸我杯中酒翻紅袖金烏玉長飛走爭得朱顔依舊二向曉雪花呈瑞飛遍玉城瑤砌何人剪碎天邊桂散作瑤田瓊蘂蕭娘斂盡雙娥翠回香袂今朝有酒今朝醉遮莫更長無睡晏叔原池苑清隂欲就還候送春時候眼中人去歡難偶誰共一杯芳酒朱欄碧砌皆如舊記擕手有情不管别離久情在相逢終有二歌徹郎君秋草别恨逺山眉小無情莫把多情惱第一歸來須早紅塵自古長安道故人少相思不比相逢好此别朱顔應老周美成乳鴨池塘水暖風緊栁花迎靣午粧粉指印窗眼曲裏長眉翠淺聞知社日停針線探新燕寶叉落枕春夢逺簾影參差滿院燭影搖紅賀方回波影翻簾淚㾗凝燭青山館離魂十里念佳期襟珮如相款惆悵更長夢短但衾枕餘芳賸暖半窗斜月照人腸斷啼烏不管毛澤民鬢緑飄蕭漫郎已是青雲晚古槐隂外小䦨干不負看山眼此意悠悠無限有雲山知人醉懶他年尋我水邊月底一蓑烟短眼兒媚一名秋波媚蒲江作小闌干左與言玊照新志樓上黃昏杏花寒斜月小䦨干一雙燕子兩行歸鴈畫角聲殘綺窗人在東風裏無語對春閒也應似舊盈盈秋水淡淡春山與張濃王元澤楊栁絲絲㺯金柔烟雨織成愁海棠未雨梨花先雪一半春休而今往事難重省歸夢繞秦樓相思只在丁香枝上豆蔻梢頭賀方回蕭蕭江上荻花秋做弄許多愁半竿落日兩行新鴈一葉扁舟惜分長怕君先去直待醉時休今朝眼底明朝心上後日眉頭北地宋徽宗玉京曽憶舊繁華萬里帝王家瓊樓玉殿朝喧絃管暮列笙琶花城人去今蕭索春夢繞龍沙家山何處忍聽羌管吹徹梅花曽純甫離腸重勸淚相看寂寞上征鞍臨行欲話風流心事萬緒千端春光漫漫人千里歸夢繞長安不堪向曉孤城吹角回首關山侯彥周花信風髙雨又收風雨互遲留無端燕子怯寒歸晚閒損簾鈎彈棋打馬心都懶攛掇上春愁推書就枕鳬烟淡淡蝶夢悠悠許道真中州濁醪篘得玊為漿風韻帶橙香持杯笑道鵝黃似酒酒似鵝黃世緣老矣不思量沉醉又何妨臨風對月山歌野調儘我疏狂尹梅津翰裊裊垂楊蘸清漪明緑染青絲市橋繫馬旗亭沽酒無限相思雲梳雨洗風前舞一好百般宜不知為甚落花時節都是顰眉石孝友次仲愁雲淡淡雨瀟瀟暮暮復朝朝别來應是眉峰翠減腕玉香銷小軒獨坐相思處情緒好無聊一叢萱草幾竿修竹數葉芭蕉蒲江玊鈎清曉上簾衣香霧濕春枝餘寒逗雨羅裙無賴重暖金猊栁邊誰寄東風纜流水只年時無人為說天涯歸思梁燕空飛史達祖兒家七十二鴛鴦珠珮鎖瑶箱期花等月秦臺吹玉賈袖傳香十年白玉堂前見直是剪柔腸將愁去也不成今世終誤王昌宋退翁霏霏疏雨轉征鴻人語暗香中小橋斜渡西亭深院水月朦朧人間不是藏春處玉笛曉霜空江南樹樹黃垂密雨緑漲薰風古今詞話慘雲愁霧罩江天呵手捲簾看濛茸栁絮萬千蝴蝶飛過危欄後庭一樹瑶華綴零亂暗香殘今畨桂影也應寒重不放新彎萍鄉道中范至能酣酣日腳紫烟浮妍暖破輕裘困人天色醉人花氣午夢扶頭春慵却似春塘水一片縠紋愁溶溶曳曳東風無力欲皺還休題蘇小樓卓田字稼軒三山人丈夫隻手把吳鈎能斷萬人頭因何鐡石打肝鑿膽剗為花柔君看項籍并劉季一怒世人愁只因撞著虞姬戚氏豪氣都休山房隨筆曽舜卿芙蓉帳冷翠衾單魂夢幾曽閒怎禁未許茫茫烟水疊疊雲山去時頻把歸期約逺不過春殘而今已是荷花開了猶倚䦨干春情馮偉壽自嚬雙黛聽啼鴉簾外翠烟斜社前風雨已歸燕子未入人家鞋兒試著無人看莫是忒寬些想他樓上悶拈簫管憔悴鶯花天機餘錦憶從溪上得相逢樽酒兩心同梅緘香雪竹搖寒月栁探春風而今總是消魂處冷落半床空夢迷狂蝶喜占乾鵲愁望飛鴻天機餘錦平生幾度怨長亭不似這畨深霜收水瘦風流帆飽怎忍輕分欄干倚遍慵歸去獨自箇黃昏荷橫叉股栁垂裙帶總是銷魂陳詵鬢邊一㸃似飛鴉休把翠鈿遮二年三載千捫百就今日天涯楊花又逐東風去隨分入人家要不思量除非酒醒休照菱花山房隨筆云湘人陳詵登第授嶽陽教官與妓江栁狎時孟之經守嶽聞其故一日公燕江栁不侍呼至杖之文其眉鬢間以陳詵二字仍押𨽻辰州詵悔罄其所有以贈且以此詞餞别栁將行㑹詵故人陸雲西以荆湖制司幹官檄至嶽陳先出迎以情告陸陸即取空名制幹扎墳陳姓名檄入制慔既而孟迎入即開宴陸曰聞籍中有江栁者善謳誰是也孟即呼至栁以花鈿隱眉間所文以前陸問其事栁出銑詞陸嗟賞示孟且誚之孟求解於陸并召銑同宴明日剡薦銑且除栁名以畀之漫興薩天錫去年人在鳯凰池銀燭夜彈絲沉火香銷梨雲夢暖深院繡簾垂今年冷落江南夜心事有誰知楊栁風柔海棠月淡獨自倚䦨時春情朱淑真遲遲風日弄輕柔花徑暗香流清明過了不堪回首雲鎖朱樓午窗睡起鶯聲巧何處怨春愁緑楊影裏海棠亭畔紅杏梢頭朝中措即照江梅歐陽永叔平山欄檻倚晴空山色有無中手種堂前楊栁别來幾度春風文章太守揮毫萬字一飲千鍾行樂直須年少樽前看取衰翁古今詞話妓獻壽時相太守改作宰相直須作不須衰翁作仙翁李蕭逺郎中湖上探春回初見照江梅過盡竹溪流水無人知道花開佳人何處江南夢逺殊未歸來喚取小叢教看隔江烟雨樓臺杜安世養花天氣近清明絲雨釀寒輕滿眼春工如繡消磨不盡離情行行又宿小桃舊䲧芳草郵亭喚起兩眉新恨緑楊深處啼鶯周紫芝雨餘庭院冷蕭蕭簷幕度微飇鳥語喚回殘夢春寒勒住花梢無憀睡起新愁黯黯歸路迢迢又是夕陽時候一爐沉水烟消二黃昏樓閣亂棲鴉天末淡微霞風裏一池楊栁月邊滿樹梨花陽臺路逺魚沉尺素人在天涯想得小窗遙夜哀絃撥斷琵琶曽純甫西湖南北舊游空誰料一樽同回首四年間事渾如飛絮濛濛林花謝了明年春到依舊芳容惟有朱顔緑鬢暗隨流水常東五月菊朱新仲耆舊續聞玉臺金盞對炎光全似去年香有意莊嚴端午不應忘却重陽菖蒲九節金英滿把同泛瑶觴舊日東籬陶令北窗正卧羲皇石次仲金谷遺音亂山疊疊水泠泠南北短長亭客路如天杳杳歸時能地寧寧春光荏苒花期冷落酒伴飄零鬢影黃邊半白燒㾗黑處重青二秋夜蓮壺宫漏長㸃㸃滴愁腸睡起羞寬羅帶傷心懶理嚴粧報鵲無慿斷鴻難倩人逺瀟湘日日危欄倚遍幾回錯認歸航陸務觀怕歌愁舞懶逢迎粧晚託春醒總是向人深處當時枉道無情關心近日啼紅密訴剪緑深盟杏館花隂恨淺畫堂銀燭嫌明二鼕鼕儺鼓餞流年燭熖動金船綵燕難尋前夢酥花空㸃春妍文園謝病蘭成久旅回首凄然明月梅山笛夜和風禹廟鶯天游王沅州山亭管鑑清江繞舍竹成隂秋日共登臨地與主人俱勝情如酒盞方深故園何處時因望眼聊寄歸心抖擻一襟凉韻不教簿領塵侵立夏日觀荼䕷作一年春事到酴醿何處更花開莫趂垂楊飛絮且隨紅藥翻階倦遊老矣肯因名宦孤負銜杯寄語故園桃李明年留待歸來梅苑山城水隘小橋傍竹裏早梅芳縱有丹青圗畫難描幽韻清香妖嬈天賦偏宜素淡楊氏宫粧雅態何須艷麗孤標不在春光趙介之踈踈簾幕映娉婷初試曉粧新玉腕雲邊緩轉修蛾還在長安人間千載從教鶴髮且駐朱顔看取烟霄平步何須九轉神丹小說鳳凰歸去碧雲空衰草亂茸茸三國六朝一夢茫茫二水傾東龍蟠虎踞亭臺望裏鴛瓦重重玉女吹簫何在斷腸淚灑西風花草稡編卷七

熏綉馥錦瑟畔低迷醉玉與歐陽永叔分題范希丈中吳紀聞昨夜因看蜀志笑曹操孫權劉備用盡機關徒勞心力只得三分天地屈指細尋思争如共劉伶一醉人世都無百嵗少癡騃老成尫悴只有中間些子少年忍把浮名牽繫一品與千金問白髪如何迴避慶生苐五子袁長吉古來五子伊誰有唐室五王稱首竇氏五龍柳家五馬西晉室陶家五桞英名不朽更東漢馬良並秀君今也五男還又應是五星孕就腹笥五經身膺五福指日繼五侯之後箇般非偶好與醉劉伶五斗望月婆羅門引楊如晦漲雲暮捲漏聲不到小簾櫳銀河淡掃澄空皓月當軒高挂秋入廣寒宫正金波不動桂影朦朧佳人未逄悵此夕與誰同望逺傷懷對景霜滿秋紅南樓何處想人在長笛一聲中凝淚眼立盡西風望月元遺山天機餘錦素蟾㪚彩九秋風露發清妍嫦娥儘有情縁留着三五盈盈永夜照憑肩看晚妝臨鏡若箇嬋姢尋常月圓恨都向此時偏㡬度郵亭枕上野店尊前珠明玉秀筭一日相看一日仙人共月長似今年前調叚成已東風嫋嫋飛花一片㸃苔衣等間耗損香霏春去春來無跡静裏㡬人知問沈郎何事帯减腰圍功名願違筭此計未應非剰把閒愁殢酒幽興裁詩溪山好在恨眼中渺渺故人稀囬首處淸淚如絲嚴仁花明桞暗一天春色繞朱樓斷鴻聲喚人愁欲問歸鴻何處身世自悠悠正東風留滯楚尾吳頭追思舊遊嘆雙鬢颯驚秋可惜等閒孤了酒令花籌斷絃難續漫題詩分付水東流流不到蓬島瀛洲風入松于國寳一春長費買花錢日日醉湖邊玉騘慣識西湖路驕嘶過沽酒樓前紅杏香中簫鼓緑楊影裏鞦韆暖風十里麗人天花壓鬂雲偏畵船載得春歸去餘情付湖水湖煙明日重扶殘醉來尋陌上花鈿廣陵元夜病中有感東風巷陌暮寒驕燈火閙河橋勝遊憶徧錢塘夜靑鸞逺信㫁難招蕙草情随雪盡梨花夣與雲銷客懐先自病無聊緑酒負金蕉下幃獨擁香篝睡春城外玉露聲遥可惜滿街明月更無人為吹簫前調周少隱禁烟過後落花天無奈輕寒東風不管春歸去共殘紅飛上秋千看盡天涯芳草春愁堆在䦨干楚江橫㫁夕陽邊無限春烟舊時雲去今何處山無數柳漲平川與問風前囘鴈甚時吹過江南二曉來凉氣滿芙蓉日到竹隂東稱觴歌袖三千指屏星畔遶緑圍紅茱糝百杯秋色桂華十里西風生朝對飲菊花叢九日一樽同文章歆向家聲舊便應去黄閣從容喚起仙翁為壽種成千嵗椿松晏叔原柳隂庭院杏梢墻依舊巫陽鳯簫已逺靑樓在水沈煙煖煎香臨鏡舞鸞離照倚筝飛鴈辭行墜鞭人去自凄凉淚眼愁腸㫁雲殘雨當年事到如今㡬處難忘兩䄂曉風花陌一簾夜月蘭堂康伯可一宵風雨送春歸緑暗紅稀畵樓整日無人到與誰同撚花枝門外薔薇開也枝頭梅子酸時玉人應是數歸期翠歛愁眉塞鴻不到雙魚逺嘆樓前流水難西新恨欲題紅葉東風滿院花飛荔枝香柳耆卿甚處尋芳賞翠歸去晚緩歩羅韈生塵來遶瓊筵看金縷霞衣輕褪似覺春遊倦遥認衆裏盈盈好身叚擬囘首又竚立簾幃畔素臉紅妝時揭蓋頭㣲見笑整金翹一㸃芳心在嬌眼王孫空恁腸㫁周美成照水殘紅零亂風掀去盡日惻惻輕寒簾底吹香霧黄昏客枕無聊細響當窗雨看两两相依燕新乳樓下水漸緑遍行舟浦暮徃朝來心逐片㠶輕舉何日迎門小檻朱籠報鸚鵡共剪西窗蜜炬于飛樂毛澤民記􅀈騰濃睡裏一片行雲未許時夣破雲驚聽轆轤聲㫁也井底銀瓶不如羅帯等閒便結得同心繫畫船楊柳岸曉月亭亭記陽關㫁韵殘聲被西風吹玉枕酒魄還淸有些言語獨自箇說與誰譍二並梅兄雙蝶子烟縷衫輕鳯凰釵繚繞香雲淡梳妝得恁雪膩酥勻揉春捻就更是他花與精神黛尖低桃蕚破㣲笑輕顰早做成役夣勞魂好風前佳月下莫忘行人扁舟去也沒箇事多様離情晏叔原曉日當簾睡㾗猶占香腮輕盈笑倚鸞䑓暈殘紅勻宿翠滿鏡花開嬌嬋鬂畔挿一枝淡蘂踈梅毎到春深多愁饒恨妝成懶下香階意中人從别後縈繫情懷良辰好景相思字喚不歸來史達祖綺翼鶼鶼問誰常借春陂生愁近渚風㣲紫山深金殿暖日暮同歸白頭相守情雖定事却難期帯恨飛來烟埋秦草年年枉夣紅衣舊沙間香頸冷合是單棲終將怨魄何年化連理芳枝應景樂蕭囬金陵故國極目長江浩渺千重隔山無際臨濡怒濤磧俯春城葦寂芳晝迤􅆔一族烟村將晚嚴光舊䑓側何處舊遊客對此景惹起離愁頓覺舊日意魂黯愁積幽恨綿綿何計消溺囘首洛東千里春聲碎譚明之翰津舘貯輕寒脉脉離情如水東風不管埀楊無力緫雨顰烟鎻䦨干外怕春燕掠天䟽鼓疊春色碎劉郎易憔悴况是厭厭病起花牋謾展便冩就新詞倩誰将寄當此際渾似夣蛺啼鵑一寸相思意祝英䑓近惜别東坡掛輕㠶飛急槳還過釣䑓路酒病無聊欹枕聽鳴櫓㫁腸簇簇雲山重重煙樹囘首望孤城何處間離阻誰念縈損㐮王何曽夣雲雨舊恨前歡心事兩無據要知欲見無由癡心猶自倩人道一聲傳語蔣㨗桞邉樓花下館低捲綉簾半簾外天絲擾擾似情亂知他蛾緑纎眉鵝黄小䄂在何處閒㳺閒翫最堪嘆筝面一寸塵深玉柱網斜鴈譜字紅鸞剪燭記同看㡬囬傳語東風将愁吹去怎奈向東風不管趙德莊獸金寒簾玊潤梅雪印苔絮春意如人易散苦難聚㡬多絲竹深情池塘幽夣猶倚賴與君同住舊㳺處誰喚别浦仙㠶風前問征路煙雨連江吹恨正無數莫教紫燕歸來紅雲開後空悵望主人輕去晩春程正伯墜紅輕濃緑潤深院又春晚睡起懨懨無語小粧嬾可堪三月風光五更魂夣又都被杜䳌催儧怎消遣人道愁與春歸春歸愁未斷閒倚銀屏羞怕淚痕滿腸㫁沉水重熏瑤琴閒理奈依舊夜寒人逺前調辛㓜安寳釵分桃葉渡烟桞暗南浦陌上層樓十日九風雨㫁腸㸃㸃飛紅都無人管倩誰喚流鶯聲住鬢邊覷試把花卜歸期纔簪又重數羅帳燈昏哽噎夣中語是他春帯愁來春歸何處却不解帯將愁去盧川枕霞紅釵燕墜花露殢雲髻粉淡香殘猶帯宿酲睡畵簷紅日三竿慵窺鸞鑑長是倚風春無力又經嵗玉腕條脫輕鬆羞即見憔悴何事秋來容易又分袂可堪踈雨梧桐空堦絡緯背人處偷弹珠泪吕聖求寳蟾明朱閣静新燕近簷語還記元宵燈火小橋路逢迎春筍柔㣲凌波纎穩怕不顧斗斜三鼓甚無據誰信一霎春愁鶯聲留不住桞色苔㾗風雨暗花圃細看羅帯銀鈎綃巾香泪筭不枉那時分付史邦卿桞枝愁桃葉恨前事怕重記紅藥開時新夢又溱洧此情老去須休春風多事便老去越難廻避阻幽會應念偷剪酴醿柔條暗縈繫節物移人春暮更顦顇可堪竹院題詩蘚堦聽雨寸心外安愁無地北固亭岳珂澹烟横層霧歛勝槩分雄占月下鳴榔風急怒濤颭關河無限淸愁不堪臨鑑正雙鬢秋風塵染漫登覽極目萬里沙塲事業頻看劍古徃今來南北限天塹倚樓誰㺯新聲重城正掩歷歷數西州更㸃憶别海棠開花影下憶得舊遊戯恰似驂鸞同在彩雲裏夢囘雨散雲收匆匆歸去一枕乍驚殘春睡甚情味人去花已飄零餘香半憔悴㸃㸃飛紅都是去時淚可堪冷落黄昏瀟瀟㣲雨㫁魂處朱䦨獨倚前調吳淑姬粉㾗銷音信㫁好夣又無據病酒無聊欹枕聽殘雨㫁腸曲曲屏山温温沉水盡是舊看承人處乆離阻誰念一㸃芳心閒愁知㡬許偷照菱花清瘦自羞覷可堪梅子酸時楊花飛盡亂鶯閙催春歸去别李澤之諸友戴式之泛杭州臨塵水㡬日共游戯歌笑開懐酒醒又還醉奈何一旦分携連宵風雨剪不㫁客愁千里水雲際遥望一片飛鴻苦是失羣地滿眼春風管甚閒桃李此行歸老家山相逄難又但一味相思而已德祐乙亥太學生湖海新聞倚危欄斜日暮驀驀甚情緖穉桞㓜君嬌黃太后全未禁風雨春江萬里雲濤扁舟飛渡北軍至那更塞鴻無數流民歎離阻有恨落天涯誰念孤旅滿目風塵冉冉如飛霧是何人惹愁來賈出那人何處賈去怎知道愁來又愁去撲蝴蝶苕溪漁隱煙條雨葉緑遍江南岸思歸倦客尋芳來較晚岫邊紅日初斜陌上花飛正滿凄凉數聲羌管怨春短玉人應在明月樓中畵眉懶鸞牋錦字多時魚雁斷恨随去水東流事與行雲共逺羅衾舊香猶煖吕聖求分釵綰髻洞府難分手離腸短曲啼㾗氷舞䄂馬嘶霜滑橋橫路轉人依古柳曉色漸分星斗怎分剖心兒一似傾入離愁萬千斗埀鞭佇立傷心還病酒十年夣裏嬋娟二月花梢荳蔻春風為誰依舊梅邵叔齊蘭摧蕙折霜重曉風惡長安何處孤根漫自託水寒㫁續溪橋月破黄昏院落相逄儼然瘦削最蕭索星星蓬髩杳杳家山路正邈攀枝嗅蕋露陪清淚閣巳無蝶使蜂媒不共鶯期燕約丼心伴人淡薄趙介之清和時候薫風來小院琅玕脱籜方塘荷翠颭柳絲輕度流鶯畵棟低飛乳燕園林緑隂初遍景何限輕紗細葛綸巾和羽扇披襟散髪心淸塵不染一杯洗滌無餘萬事銷磨去逺浮名薄利休羡曹元寵人生一世思量争甚底花開十日已随塵共水且看欲盡花枝未厭傷多酒盞何須細推物理幸容易有人争奈只知名與利朝朝日日忙忙刼刼地待得一餉閒時又却三春過了何如對花沉醉快活年近拍万俟雅言千秋萬嵗君五帝三王世觀風重令節與民樂盛際蘂宫長春洞天不老花艶蟾輝十里照春珠翠閙羅綺遥望太極一簇通明裏鉤䑓奏壽蓬山逞妙戯六宫人來五雲樓逈風送歌聲依約睿思新製四園竹周美成浮雲䕶月未放滿朱扉鼠揺暗壁螢度破窗偷入書幃秋意濃閒竚立庭柯影裏好風襟袖先知夜何其江南路遶重山心知漫與前期奈何燈前堕淚膓㫁蕭娘舊日書辭猶在紙鴈信絶淸宵夣又稀側犯周美成暮霞霽雨小蓮出水紅妝靚風定看歩襪江妃照明鏡飛螢度暗草秉燭遊花徑人静携艶質追凉就槐影金環皓腕雪藕清泉瑩誰念省滿身香猶是舊荀令見説佳人酒壚寂静煙鎻漠漠藻池苔井相思會人無百年人剛作千年調待把門關鐡鑄鬼見失笑多愁早老惹盡閒煩惱我惺也枉勞心漫計較麄衣淡飯贏取煖和飽住箇宅兒只要不大不小常教㓗净不種閒花草據見定樂平生便是神仙了鳯樓春歐陽烱鳯髻緑雲叢深掩房櫳錦書通夣中相見覺來慵匀靣淚臉珠融因想玉郎何處去對淑景誰同小樓中春思無窮倚欄顒望闇牽愁緖桞花飛起東風斜日照簾櫳羅幌香冷粉屏空海棠零落鶯語殘紅御街行范希文紛紛墜葉飄香砌夜寂静寒聲碎真珠簾捲玉樓空天淡銀河埀地年年今夜月華如練長是人千里愁腸己㫁無由醉酒未到先成淚殘燈明㓕枕頭欹諳盡孤眠滋味都來此事眉間心上無計相廻避張子野天非花艶輕非霧來夜半天明去來如春夢不多時去似朝雲無覔處乳雞棲燕落月沉星紞紞城頭鼓参差漸辨西池樹朱閣斜開户緑苔深徑少人行苔上屐㾗無數殘香餘粉閑衾剰枕天把多情付二畵船橫倚煙溪半春入呉山遍主人憑客且遲留程入花溪還逺數聲蘆葉兩行霓䄂㡬處成離宴紛紛歸騎亭皋晚風順檣烏轉古今為别最銷魂因别有情湏怨高䑓獨上不堪凝望目與飛雲㫁梅苑平生有箇風流願願長與梅為伴問伊因甚破寒來只恐百花先綻比蘭比麝比酥比玉休恁閒撩亂瑶䑓月下分明見依舊殘妝淺不知分得㡬多香一片淸如一片直須遮㫁恐人眼毒不解輕輕看聖壽柳耆卿燔柴煙㫁星河曙寳輦囘天歩端門羽衛簇雕欄六樂舜韶先舉鶴書飛下雞竿高聳恩露均寰㝢赤霜袍爛飄香霧喜色成春煦九儀三事仰天顔八彩旋生眉宇椿齡無盡蘿圗有慶常作乾坤主相思前時小飲春庭院悔放笙歌散歸來中夜酒醺醺惹起舊愁無限雖看墜樓換馬争奈不是鴛幃伴朦朧暗想如花面欲夣還驚㫁和衣擁被不成眠一枕萬囘千轉惟有畵梁新來雙燕徹曙聞長嘆前調晏叔原年光正似花梢露弹指春還暮翠眉仙子望歸來倚遍玉城珠樹豈知别後好風良月徃事無尋處狂情錯向紅塵住忘了瑶䑓路碧桃花蘂巳應開欲伴彩雲飛去囬思十載朱顔靑鬂枉被浮名誤古今詞話霜風漸𦂳寒侵被聽孤鴈聲嘹唳一聲聲送一聲悲雲淡碧天如水披衣起告鴈兒畧住聽我些兒事塔兒南畔城兒裏第三箇橋兒外瀕河西岸小紅樓門外梧桐彫砌請教且與低聲飛過那裏有人人無寐詠轎高觀藤筠巧織花紋細稱穏歩如流水踏靑陌上雨初晴嫌怕濕文鴛雙履要人送上連花即住纔過處香風起裙兒掛在簾兒裏更不把窓兒閉紅紅白白簇花枝恰稱得尋春芳意歸來時晚紗籠引道扶下人㣲醉前調韓師厚合和朱粉千餘兩捻箇觀音様大都却似五三分少一副玲瓏五臟等人合眼來人眼底終夜空勞攘香魂媚魄知何徃料只在船兒上無言倚定馬門兒獨對滔滔雪浪若將愁淚還做水筭㡬個黃天蕩岐陽郵亭洛陽女郎一身萍梗隨郵傳恨歸路如天逺近來魂夣也踈人不似舊時長見剩衾餘枕冷淸淸地空恁閒一半闕一叢花張先永叔集有傷春懷逺㡬時窮無物似情濃離愁正恁牽絲亂更南陌飛絮濛濛嘶騎漸遥征塵不㫁何處認即蹤雙鴛池沼水溶溶南北小橋通梯橫畫閣黄昏後又還是新月簾櫳沉恨細思不如桃李還解嫁春風少游年來今夜見師師雙頰酒紅滋踈簾半捲㣲燈外露華上煙裊凉颸簪髻亂抛偎人不起彈淚唱新詞佳期誰料乆參差愁緖暗縈絲相應妙舞淸歌罷又還對秋色嗟咨惟有畵樓當時明月兩處照相思趙德麟送洞庭春色晁無咎古今詞話王孫眉宇鳯凰雛元與世情踈揚州坐下瓊花底佩錦囊曽從奚奴金盞倒揮滿身花影紅䄂競來扶十年一夣訪吾居離缺重踟蹰應怜肺病臨卭客寄洞庭春色雙壼天氣未佳梅花政好曾醉燕堂無前調程正伯傷春時候一憑欄何况别離難東風只解催人去也不道鶯老花殘靑牋未約紅綃忍淚無計鎻征鞍寳釵瑶鈿一時閒此恨苦天慳如今直恁抛人去也不念人瘦衣寛歸來忍見重樓淡月依舊五更寒陸務觀樽前凝佇漫魂迷猶恨負幽期從來不慣傷春淚為伊後滴滿羅衣那堪更是吹簫池舘青子緑隂時囬廊簾影晝參差偏共睡相冝朝雲夣㫁知何處倩雙燕説與相思從今判了十分憔悴圗要箇人知望逺行雅詞當時雲雨夣不負楚王期翠峯中高樓十二掩瑶扉儘人間歡㑹只有兩心自知漸玉困花柔香汗揮歌聲飜别怨雲馭欲回時這無情紅日何似且休西但㳙㳙珠淚滴濕仙郎羽衣怎忍見雙鴛相背飛過澗歇夏景桞耆卿淮楚曠望極千里火雲燒空盡日西郊無雨壓行旅數幅輕㠶旋落艤棹蒹葭浦避畏景兩兩舟人夜深語此際争可便恁奔利名九衢塵裏衣冠冐炎暑囬首江鄉月觀風亭水邊石上幸有散髪披襟處恨别酒醒夣纔覺小閣香灰成燼洞户銀蟾移影人寂静夜永清寒翠瓦霜凝踈簾風動漏聲隠隠飄來轉愁聽怎向心緖近日厭厭長似病鳯樓咫尺佳期窅無定展轉無眠粲枕氷冷香虬􅃄㫁是誰與把重衾整陽關引離别冦平仲塞草烟光濶渭水波聲咽春朝雨霽輕塵歛征鞍發指青靑楊柳又是輕攀折動黯然知有後會甚時節更盡一杯酒歌一闋歎人生裏難歡聚易離别且莫辭沉醉聽取陽關徹念故人千里自此共明月丼州令詠雪柳耆卿凍雲深淑氣淺寒欺緑野輕雪伴早梅飄謝艶陽天正明媚却成瀟洒玉人歌畵樓酒對此景驟増高價賣花巷陌放燈䑓榭好時代怎生輕捨頼和風蕩霽靄廓淸良夜玉塵鋪桂莖滿素光裏更堪遊冶孤鴈兒程正伯在家不覺窮冬好向客裏方知道故園梅子正開時記得淸樽頻倒高燒紅蠟煖薫羅幌一任花枝惱如今客裏傷懷抱忍雙鬢随花老小窗獨自對黄昏只有月華飛到假饒眞箇鴈書頻寄何似歸來早二雙鬟乍綰橫波溜記當日香心透誰教容易逐雞飛輸却春風先手天公元也管人憔悴放出花枝痩㡬宵和月來相就問何事春山鬬秪應深院鎻嬋娟枉却嬌花時候何時為我小梯橫閣試約黄昏後李易安藤牀紙帳朝眠起說不盡無佳思沉香烟㫁玉爐寒伴我情懷如水笛聲三弄梅心驚破多少春情意小風踈雨瀟瀟地又催下千行淚吹簫人去玉樓空腸㫁與誰同倚一枝折得人間天上沒箇人堪寄夣還京柳耆卿夜來匆匆飲散欹枕背燈睡酒力全輕醉魂易醒風掲簾櫳夣㫁披衣重起悄無寐追悔當初繡閣話别太容易日許時猶阻歸計甚况味旅舘虛度殘嵗想嬌媚那裏獨守鴛幃静永漏迢迢也應暗同此意小鎮西感别意中有箇人芳顔二八天然俏自來奸黠最竒絶是笑時媚靨深深百態千嬌再三偎著再三香滑乆離缺夜來魂夣裏尤花殢雪分明似舊家時節正歡悅被雞聲喚起一塲寂寞無眠向曉空有半窗殘月憶黄梅王逐客枝上葉兒未展已有墜紅千片春意怎生防怎不怨被我安排矮牙牀斗帳和嬌艶移在花叢裏靣請君看惹淸香偎媚暖愛香愛暖金杯滿問春怎管大家􅂸便做東風緫吹交零亂猶骨自輸我鴛鴦一半金人捧露盤春晚感舊曽純甫記神京繁華地舊遊踪正御溝春水溶溶平康巷陌繡鞍金勒躍靑驄解衣沽酒醉絃管柳緑花紅到如今餘霜鬂嗟前事夣魂中但寒烟滿目飛蓬雕欄玉砌空餘三十六離宫塞笳驚起暮天鴈寂寞東風賀方回控滄江排靑嶂燕䑓凉駐綵仗樂未渠央巖花磴蔓妬千門珠翠倚新粧舞閒歌悄恨流風不管餘香繁華夣驚俄頃佳麗地指蒼茫寄一笑何與興亡量船載酒賴使君相對兩胡牀緩調清管更為儂三弄斜陽錢塘羅壺秋濕苔靑妖血碧壊垣紅怕精靈來徃相逢荒烟瓦礫寳釵零亂隱鸞龍吳峯越巘翠眉鎻苦為誰容浮屠換朝陽殿僧磬改景陽鐘興亡事淚老金銅驪山廢盡更無宫女説𤣥宗角聲起處海濤落滿眼秋風紅林擒近冬雪周羙成高柳春纔軟凍梅寒更香暮雪助淸峭玉塵散林塘那堪飄風逓冷故遣度幕穿窗似欲料理新粧呵手弄絲簧冷落詞賦客蕭索水雪鄉援毫授簡風流猶憶東梁望虛簷徐轉廻廊未掃夜長莫惜空酒觴冬初万俟雅言風雪驚初霽水鄉増暮寒樹杪堕毛羽簷牙掛琅玕纔喜堆門積巷可惜迤邐銷殘漸看低竹翩飜淸池漲㣲瀾歩履晴正好宴席晩方歡梅花耐冷亭亭來入氷盤對山前横素愁雲變色放杯同覔高處看望雲涯引李景元秋容江上岸花老蘋洲白露濕蒹葭浦嶼漸増寒色閒漁唱晚鶩鴈驚飛處映逺磧數㸃輕㠶送天際歸客鳯臺人散漫逥首沉消息素鯉無憑樓上暮雲凝碧時向西風下認逺笛宋玉悲懐未信金樽消得山亭柳晏同叔家住西秦賭博藝随身花柳上鬬尖新偶學念奴聲調有時高遏行雲蜀錦纒頭無數不負辛勤數年來徃咸京道殘杯冷炙漫銷魂衷腸事託何人若有知音見采不辭遍唱陽春一曲當筵淚落重掩羅巾杜壽域曉來風雨萬花飄落嘆韶光虛過却芳草萋萋映樓臺淡烟漠漠紛紛絮飛院宇燕子過朱閣玉容淡妝添寂寞檀郎孤願太情薄數歸期絶信約暗添春宵恨平康恣迷歡樂時時悶飲緑醑甚轉轉思量着上西平惜春程正伯愛春歸憂春去為春忙旋㸃檢雨障雲妨遮紅䕶緑翠幃羅幙任高張海棠明月杏花天更惜濃芳喚鶯吟招蝶拍迎柳舞倩桃妝盡呼起萬籟笙簧一觴一咏儘教陶冩繡心腸笑他人世漫嬉㳺擁翠偎香觀雪辛㓜安九衢中杯逐馬帯随車問誰觧愛惜瓊華何如竹外静聽窣窣蟹行沙自憐是海山頭種玉人家紛如鬬嬌如舞纔整整又斜斜要圗畵還我漁簑凍吟應笑羔兒無分漫煎茶起來極目向彌茫數盡歸鴉前調韓東浦折腰勞彈冠望縱飛蓬笑造化相戯窮通風帆浪槳暮城寒角曉樓鐘暗惜霜雪鬢邊來驚對靑銅蕭閒好何時遂門横水逕穿松有無限杯月襟風區畫箇甚帝堯堂下足䕫龍不如聞早問溪山高養吾慵上平南劉昻歸潛志躉鋒揺螳臂展舊盟寒恃洞庭彭蠡狂瀾天兵小試萬蹄一飲楚江乾㨗書飛上九重天春滿長安舜明文周禮樂唐日月漢衣冠洗五川煙瘴江山全蜀下也劔閣何用一泥丸有人傳喜日邊來都護先還歸濳志云昻字濟霄南人有才譽以先有劉昻之昻故號小劉之昻和南征作樂章一闋上平西為時所傳齊東楚語云開禧用兵金人元帥紇石烈子仁領兵濠梁大書一詞於濠之倅㕔壁間詞名上平南即上西平之調云花草稡編巻十五

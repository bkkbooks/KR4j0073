闌凝佇孤鴻影沒江天暮行雲懶寄好音來斷雲暗逐斜陽去向伯恭靄靄朝雲芳春態度楚山夢斷尋無路欲將尊酒遣新愁誰知引到深深處不盡江山無邊細雨只疑都把愁來做西山總不解遮闌隨春直過東湖去和人賦雙魚花周紫芝風翠輕翻霧紅深注鴛鴦池畔雙魚樹合歡鳳子也多情飛來連理枝頭住欲付濃愁深憑尺素戲魚波上無尋處教誰試與問花看如何寄得香箋去二燕子歸去梅花又落湘桃雨後燕支薄眼前先自許多愁斜陽更在春池閣夢裏新歡年時舊約日長院靜空簾幕幾回猛待不思量擡頭又是思量著三情似遊絲人如飛絮泪珠閣定空相覷一溪煙栁萬絲垂無因繫得蘭舟住雁過斜陽草迷煙渚如今已是愁無數明朝且做莫思量如何過得今宵去郭承禧鶚離風塵燕辭門户翩然舉翮輕飛去當初自恨探春遲而今豈解留春住花不重開萍難再聚垂楊只管牽離緒直饒雲雨夢陽臺夢回依舊無尋處夜景無名氏碧蘚回廊緑楊深院花期夜入簾猶捲照人無奈月華明潛身却恨花隂淺密約難憑幽歡未展看看滴盡銅壺箭闌干敲遍不應人分明燭下聞刀剪趙介之白雪開殘紅雲吹盡園林新緑迷芳徑榆錢不解買青春隨風亂點蒼苔暈紫燕飛忙黃鸝聲嫩日長煙暖遊蜂困憑高念逺思無窮那堪宿酒懨懨病別意洪叔嶼滿滿金杯垂垂玉筯離歌不放行人去醉中扶上木蘭船醒來忘却桃源路帶綰同心叉分一股斷魂空草高唐賦秋山萬疊水雲深茫茫無著相思處甲午重九牛山作劉後村日月跳丸光隂脫兔登臨不用深懷古向來吹帽插花人盡隨殘照西風去老矣征衫飄然客路炊煙三兩人家住欲攜斗酒答秋光山深無覔黃花處趙令威蘋葉煙深荷花露濕碧蘆紅蓼秋聲急採菱渡口日將沉飛鴻樓上人空立彩鳳難雙紅綃暗泣回文未剪吳刀澀夢雲歸處不留蹤厭厭一夜涼蟾入金陵感夢薑堯章燕燕輕盈鶯鶯嬌軟分明又向華胥見夜長爭得薄情知春初早被相思染別後書詞別時針線離魂暗逐郎行逺淮南皓月冷千山冥冥歸去無人管憶舊元遺山微步生塵殘粧暈酒朱門如海空回首東風正有去年華柔條去作誰家栁細雨春寒青燈夜久孤衾未暖還分手夢中見也不多時怎生望得長相守春興趙君舉江闊天低樓高思逈春煙黯淡如秋景今年芳草去年愁分明又報明年信燕子還來歸期未定可堪醉夢紅塵境出門萬事儘消磨水流不盡青山影春暮劉德修掃徑花零閉門春晚恨長無奈東風短起來消息探荼䕷雪條玉蕊都開遍晚月魂清夕陽香逺故山別後誰拘管多情于此更情多一枝嗅罷還重撚寄妹延安夫人孤館深沉曉寒天氣解鞍獨自闌干倚暗香浮動月黃昏落梅風送沾衣袂待寫紅箋憑誰與寄先教覔取嬉遊地到家正是早春時小桃花下拚沉醉燈花曹希藴婦人解遣愁人能添喜氣些兒好事先施力畫堂深處伴妖嬈絳紗籠裏丹砂赤有艷難留無根怎覔幾回不忍輕輕剔玉人曾向耳邊言花有信人無的東坡這箇秃奴修行忒煞雲山頂上曾持戒一從迷戀玉樓人鶉衣百結渾無奈毒手傷人花容粉碎空空色色今何在臂間刺道苦相思這回還了相思債靈隱寺僧明了然戀妓李秀奴往來日久衣鉢蕩盡秀奴絶之僧迷戀不已一夕了然乘醉而往秀奴弗納了然怒擊之隨手而斃事至郡時蘇子瞻治郡送獄院推勘於僧臂上見刺字云但願生同極樂國免教今世苦相思子瞻見招判此詞訖押赴市曹處斬荆楚前人山秀芙蓉溪明罨畫真遊洞穴滄波下臨風慨想斬蛟人長橋千載猶橫跨解珮投簪求田問舍黃雞白酒漁樵社元龍非復少時豪耳邊洗盡功名話轉調踏莎行路宜人生日趙介庵宿雨才收餘寒尚力牡丹將綻也近寒食人間好景算仙家也惜因循盡掃斷蓬萊迹舊日天涯如今咫尺一月五番價共歡集些兒夀酒且莫留半滴一百二十箇好生日曾覿翠幄成隂誰家簾幕綺羅香擁處觥籌錯清和暖近春寒更薄高歌看簌簌梁塵落美景良辰人生行樂金杯無奈是苦相虐殘紅飛盡裊垂楊輕弱來歲斷不負鶯花約東坡引辛幼安玉纖彈舊怨還敲繡屏面清歌自送西風雁雁行吹字斷雁行吹字斷夜深拜月鎖窗西畔但桂影空階滿翠帷自掩無人見羅衣寬一半羅衣寬一半別周誠可趙介之相看情未足離腸已催促停歌欲語睂先蹙何期歸太速何期歸太速如今去也無計追逐怎忍聽陽關曲扁舟後夜灘頭宿愁隨煙樹簇愁隨煙樹簇癸已豫章飛花紅不聚都因夜來雨枝頭冷落情如許東風誰是主東風誰是主看看滿地堆香絮但目斷章臺路殘英剩蕊留春住春歸何處去春歸何處去惜分叉一名摘紅英青商怨玉瓏璁叉頭鳳吕聖求春將半鶯聲亂栁絲拂馬花迎面小塘風暮樓鐘草色連雲暝色連空重重秋千畔何人見寶叉斜照春妝淺酒霞紅與誰同試問別來近日情悰沖沖二重簷挂微燈下背闌同説春風話月盈樓泪盈眸覷著紅茵無計遲留休休鶯花謝春殘也等間泣損春羅帕見無由恨難收夢短屏深清夜濃愁悠悠摘紅英程正伯桃花暖楊花亂可憐朱户春強半長記憶探芳日笑憑郎肩殢紅偎碧惜惜惜春宵短離腸斷泪痕長向東風滿憑青翼問消息花謝春歸幾時來得憶憶憶玉瓏璁能改齋漫録城南路橋南樹玉鈎簾捲香橫霧新相識舊相識淺顰低笑嫩紅輕碧惜惜惜劉郎去阮郎住為雲為雨朝還暮心相憶空相憶露荷心性栁花蹤迹得得得青商怨曾純甫華燈閙銀蟾照萬家羅幕香風繞金尊側花顔色醉裏人人向人情極惜惜惜春寒峭腰肢小鬢雲斜嚲蛾兒裊清宵寂香閨隔好夢難尋雨蹤雲迹憶憶憶史邦卿春愁逺春夢亂鳳叉一股輕塵滿江煙白江波碧栁户清明燕簾寒食憶憶憶鶯聲晚簫聲短落花不許春拘管新相識休相失翠陌吹衣畫樓橫笛得得得叉頭鳳陸務觀紅酥手黃藤酒滿城春色官牆栁東風惡歡情薄一懷愁緒幾年離索錯錯錯春如舊人空瘦淚痕紅浥鮫綃透桃花落間池閣山盟雖在錦書難托莫莫莫齊東野語云陸務觀初娶唐氏閎之女也於其母夫人為姑姪伉儷相得而弗獲於其姑因出之唐後改適同郡宗子玉程嘗以春日出遊相遇於禹迹寺南詞之沈氏園唐以語趙遣致酒殽放翁悵然久之為賦題園壁間云句耆舊續聞云唐氏見而和之云世情薄人情惡之惜不得其全闋未幾怏怏而卒聞者為之愴然擷芳詞古今詞話風搖蕩雨濛茸翠條柔弱花頭重春衫窄香肌濕記得年時共伊曾摘都如夢何曾共可憐孤似叉頭鳳關山隔晚雲碧燕兒來也又無消息政和間京師妓之姥曾嫁伶官常入內教舞傳禁中擷芳詞以教其妓時人皆愛其聲又愛其詞類唐人所作也張尚書帥成都蜀中傳此詞競唱之却於前段下添憶憶憶三字後段下添得得得三字又名摘紅英其所添字又皆鄙俚豈傳之者誤耶揭芳詞之名非擅為之蓋禁中有擷芳園擅景園也摘紅英春風惜花張仲舉鶯聲寂鳩聲急栁煙一片梨雲濕驚人困教人恨待到平明海棠應盡青無力紅無迹殘香賸粉那禁得天難準晴難穩晚風又起倚闌爭忍冉冉雲牡丹盛盧炳雨洗千紅又春晚留牡丹倚闌初綻嬌婭姹偏賦精神君看算費盡工夫點染帶露天香最清逺太真妃院粧體段拚對花滿把流霞頻勸怕逐東風零亂夀山曲馮延已侯鯖録銅壺滴漏初盡高閣雞鳴半空催啓五門金鎖猶垂三殿簾櫳階前御栁搖緑仗下宫花散紅鴛瓦數行曉日鸞旗百尺春風侍臣舞蹈重拜聖夀南山永同感皇恩安東少師訪閲道大資同遊湖山張子野廊廟當時共代工睢陵千里約逺相從欲知賓主與誰同宗枝內黃閣舊有三公廣樂起雲中湖山看畫軸兩仙翁武林佳語幾時窮元豐際德星聚照江東二延夀藝香七世孫華軒承大對見經綸溟魚一息化天津袍如草三百騎從清塵玉樹瑩風神同時棠棣萼一家春十年身是鳳池人蓬萊闕黃閣主共談賓散天花舒信道雲斷長空葉落秋寒江煙浪盡月隨舟西風偏解送離愁聲聲南去雁下汀洲無奈多情去復留驪歌齊唱罷泪爭流悠悠別恨幾時休不堪殘酒醒憑危樓南樓令張炎風雨客殊鄉梧桐傍小窗甚秋聲今夜偏長暗憶舊時歌舞地誰得似牧之狂茉莉擁叉梁窩雲一枕香醉瞢騰多少思量明月半牀人睡覺聽説道夜深涼花草稡編卷十二

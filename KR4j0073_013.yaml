body:
  text: 花草稡編卷十三明陳耀文輯中調賀明朝歐陽炯憶昔花間相見後只憑纎手暗拋紅豆人前不解巧傳心事别來依舊辜負春晝碧羅衣上蹙金繡覩對鴛鴦空裛淚痕透想韶顔非久終是為伊只恁偷瘦朝玉階杜夀域簾捲春寒小雨天牡丹花落盡惜庭軒髙空雙燕舞翩翩無風輕絮暗墜苔錢擬將幽怨寫香箋中心多少事語難傳思量真箇惡因緣那堪長夢見在伊邊玉堂春晏同叔帝城春暖御栁暗遮空苑海燕雙雙拂揚簾籠女伴相携共繞林間路折得櫻桃插髻紅昨夜臨明微雨新英遍舊叢寶馬香車欲傍西池看處楊花滿袖風二後園春早殘雪尚濛煙草數樹寒梅欲綻香英小妹無端折盡叉頭朵滿把金樽細細傾憶得往年同伴沉吟無限情惱亂東風莫便吹零落惜取芳菲眼下明後庭宴庚溪詩話石刻宣和中掘得千里故鄉十年華屋亂魂飛過屏山蔟眼重眉褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨斷歌零舞遺恨清江曲萬樹緑低迷一庭紅撲蔌望逺行韋莊欲别無言倚畫屏含恨暗傷情謝家庭樹錦雞鳴殘月落邊城人欲别馬頻嘶緑槐十里長堤出門芳草路萋萋雲雨别來易東西不忍别君後却入舊香閨遐方怨顧敻簾影細簟紋平象紗籠玉指縷金羅扇輕嫩紅雙臉似花明兩條眉黛逺山橫鳯簫歇鏡塵生遼塞音書絶夢魂長暗驚玉郎經嵗負娉婷教人爭不恨無情臨江仙滕子京湖水連天天連水秋來分外澄清君山自是小蓬瀛氣蒸雲夢澤波撼嶽陽城帝子有靈能鼓瑟凄然依舊傷情微聞蘭芷動芳馨曲中人不見江上數峯青東坡夜飲東坡醒復醉歸來髣佛三更家僮鼻息若雷鳴敲門都不應久立聽江聲長恨此身非我有何時忘却營營夜來風靜縠紋平扁舟從此逝江海寄餘生春暮朝無咎緑暗汀洲三月暮落花風靜帆收埀楊低映朩蘭舟半篙春水滑一假夕陽愁灞水橋東回首處美人親上簾鈎青鸞無計入紅樓行雲歸楚峽飛夢到楊州李端叔九十日春都過了尋常偶到江臯水容山態兩相饒草平天一色風暖燕雙高酒病厭厭何計那飛紅更送無聊鶯聲猶似耳邊嬌難回巫峽夢空恨武陵桃感舊陳去非憶昔午橋橋上飲坐中多少豪英長溝流月去無聲杏花踈影裏吹笛到天明二十餘年成一夢此身雖在堪驚間登小閣看新晴古今多少事漁唱起三更秦少遊千里瀟湘挼藍浦蘭撓昔日曽經月髙風定露華清微波澄不動冷浸一天星獨倚桅檣情悄悄遙聞妃瑟泠泠新聲含盡古今情曲中人不見江上數峯青朝叔用憶昔西池池上飲年年多少歡娛别來不寄一行書尋常相見了猶道不如初安穩錦屏今夜夢月明好渡江湖相思休問定何如情知春去後管得落花無程正伯濃緑鎖窗間院靜照人明月團圓夜長幽夢見伊難瘦從香臉薄愁到翠眉殘只道花時容易見如今花盡春闌畫樓依舊五更寒可憐紅繡被空記合時歡夜景李知幾煙桞踈踈人悄悄畫樓風外吹笙倚欄聞喚小紅聲薰香臨欲睡玉漏已三更坐待不來來不去一方明月中庭粉墻東畔小橋橫起來花影下扇子撲飛螢阿初方去趙德麟枝上粉香吹欲盡依前庭院春風更誰同繞摘芳叢漏殘金獸冷信斷錦屏空看結燈花愁不睡酒闌無夢相逢凄涼長判一生中不知雲外月永夜在房櫳立春自名鴈後歸賀方回巧剪合歡羅勝子叉頭春意翩翩艷歌淺笑拜嫣然願郎宜此酒行樂駐華年未至文園多病客幽襟悽斷堪憐舊遊夢挂碧雲邊人歸落鴈後思發在花前憶舊張𢎞範千古武陵溪上路桃源流水潺潺可憐仙契剩濃歡黃鸝驚夢破青鳥喚春還回首舊遊渾不見蒼煙一片荒山玉人何處倚闌干紫簫明月底翠袖暮雲寒石孝友一霎狂雲驚雨過月華恰到簾幃檻前疊石翠參差洞房相見處燈火乍涼時睡玉眠花愁夜短忩忩共惜佳期風梧不動酒醒遲好同蝴蝶夢飛上鳯凰枝二醉袖吟鞭行色裏帽簷低處風斜晚山一半被雲遮殘陽明逺水古朩集棲鴉暮去朝來緣底事不如早早還家曲屏深幌小窗紗翠沾眉上桞紅揾臉邊花自詠劉德修我似萬山千里外悠然一片歸雲官銜猶自帶云云誰知前進士已是故將軍間行間坐間飲酒間拈間字間文諸公留我笑紛紛一枝簮寶髻六幅舞羅裙閨怨劉叔安蕩紫飄紅芳信斷都無人問穠纎吟鞭倚醉問涼蟾香消金縷篆塵壓寶粧奩夢峽朝雲飛不到一春離緒厭厭却疑歸燕礙重簾心期花底誤眉恨桞邊添朝叔用雙舸亭亭橫晚渚城中飛觀嵳峩畫橋燈火照清波玉鈎平浸水金鎖半沉河試問無情堤上桞也應厭聼離歌人生無奈别離何夜長嫌夢短淚少怕愁多顧敻碧染長空池似鏡倚樓間望凝情滿衣紅藕細香清象床珍簟山障掩玉琴橫暗想昔時歡笑事如今贏得愁生慱山爐暖淡煙輕蟬吟人靜殘日傍小窗明晏叔原東野亡來無麗句于君去後少交親追思往事好沾巾白頭王建在猶見詠詩人學道深山空自老留名千載不干身酒筵歌席莫辭頻爭如南陌上占取一年春離懷王逐客别岸相逢何草草扁舟兩岸埀楊繡屏珠箔綺香囊酒深歌拍緩愁入翠眉長燕子歸來人去也此時無奈昏黃桃花應是我心腸不禁微雨流淚濕紅粧閻選雨停荷芰逗濃香岸邉蟬噪埀楊物華空有舊池塘不逢仙子何處夢襄王珍簟對欹鴛枕冷此來塵暗凄涼欲慿危檻恨偏長藕花珠綴猶似汗凝粧李後主櫻桃落盡春歸去蝶翻輕粉雙飛子規啼月小樓西玉鈎羅幕惆悵暮煙埀别巷寂寥人散後望殘煙草低迷爐香間裊鳯凰兒空持羅帶回首恨依依續聞云親見後主梵葉書塗注數字未嘗不全蘇子由題此詞云凄涼怨慕真亡國之音也西清詩話云後主圍城中作詞云櫻桃結子春歸盡蝶翻金粉雙飛子規啼月小樓西畫簾朱箔惆悵捲金泥門巷寂寞人去後望殘煙草低迷詞未就而城破墨莊謾録云劉廷仲為補之云何時重聼玉驄嘶撲簾桞絮依約夢回時二庭空客散人歸後畫堂半掩珠簾林風淅淅夜厭厭小樓新月回首自纎纎春光鎮在人空老新愁往恨何窮鎖窗力困起還慵一聲羌笛驚起醉怡容宫詞鹿虔扆金鎖重門荒苑靜綺窗愁對秋空翠華一去寂無蹤玉樓歌吹聲斷已隨風煙月不知人事改夜闌還照深宫藕花相向野塘中暗傷亡國清露泣香紅柳許庭庚溪詩話不見昭陽宫內桞黃金齊撚輕柔東君昨夜到皇州玉階金井無處不風流悵望翠華春欲暮六宫都鎖春愁暖風吹動繡簾鈎飛花委地時轉玉香毬二不見隋河堤上桞緑隂流水依依龍舟東下疾於飛千條萬葉濃翠染旌旗記得當年春去也錦帆不見西歸故拋輕絮點人衣如將亡國恨説與路人知三不見陶家門外桞柴扉一徑遙通閉門終日掩清風感君高節緑蔭向人濃籬落蕭踈雞犬靜日長飛絮濛濛先生一醉萬緣空經時髙卧不到翠隂中四不見都門亭畔桞春來緑盡長條桞邊行色馬蕭蕭一枝折贈相見又何朝酒盡曲終人去也風前亦自無聊秪應於我恨偏饒東君特地付與沈郎腰五不見灞陵原上桞往來過盡蹄輪朝離南楚暮西秦不成名利嬴得鬢毛新莫怪枝條憔悴損一生唯苦征塵兩三煙樹倚孤村夕陽影裏愁殺宦遊人夏景永叔池外輕雷池上雨雨聲滴碎荷聲小樓西角斷虹明欄干倚處待得月華生燕子飛來窺畫棟玉鈎埀下簾旌涼波不動簟紋平水晶雙枕傍有墮叉橫絳華堂進泛索張掄聞道彤廷森寶仗霜風逐雨驅雲六龍扶輦下青𡨕香隨鸞扇逺日映赭袍明簾捲天街人頂戴滿城喜氣氤氲等間散作八荒春祗知天意好昨夜月華新毛文錫暮蟬聲盡落斜陽銀蟾影挂瀟湘黃陵廟側水茫茫楚山紅樹煙雨隔高唐岸泊漁燈風颭碎白蘋逺散濃香靈娥鼓瑟韻清商朱絃凄切雲散碧天長牛希濟峭碧參差十二峯冷煙寒樹重重瑶姫宫殿是仙蹤金爐珠帳香靄晝偏濃一自楚王驚夢斷人間無路相逢至今雲雨帶愁容月斜江上征棹動晨鐘二江繞黃陵春廟間嬌鶯獨語關關滿庭重疊緑苔斑隂雲無事四散自歸山簫鼓聲稀香燼冷月娥斂盡灣環風流皆道勝人間須知狂客判死為紅顔三素洛春光瀲灔平千重媚臉初生凌波羅襪勢輕輕煙籠日照珠翠半分明風引寶衣疑欲舞鸞回鳯翥堪驚也知心許恐無成陳王辭賦千載有聲名四桞帶搖風漢水濵平蕪兩岸爭勻鴛鴦對浴浪痕新㺯珠遊女微笑自含春輕步暗移蟬鬢動羅裙風惹輕塵水精宫殿豈無因空勞纎手解珮贈情人五洞庭波浪颭晴天君山一點凝煙此中真境屬神仙玉樓珠殿相應月輪邊萬里平湖秋色冷星辰埀影參然橘林霜重更紅鮮羅浮山下有路暗相連梅李易安庭院深深深幾許雲忩霧閣春遲為誰憔悴損芳姿夜來清夢好應是發南枝玉瘦檀輕無限恨南樓羌管休吹濃香吹盡有誰知暖風遲日也别到杏花肥二庭院深深深幾許雲窗霧閣常扄桞梢梅蕚漸分明春歸秣陵樹人客建安城感月吟風多少事如今老去無成誰憐憔悴更雕零燈花空結蕊離别共傷情寄外劉氏苕溪漁隱千里長安名利客輕離輕散尋常難禁三月好風光滿階芳草緑一片杏花香記得年時臨上馬看人眼淚汪汪如今不忍更思量恨無千日酒空斷九回腸劉章文虎妻名彤字文美立春寄季順姝延安夫人一夜東風穿繡戶融融暖應佳時春來何處最先知平明堤上桞染遍鬱金枝姊妹嬉遊時節近今朝應怨來遲憑誰説與到家期玉叉頭上勝留待逺人歸熟水易少夫人何處井泉來席上嫩黃初沸銀瓶月團嘗罷有餘清惠山名品在歌舞暫留停欲賞壑源新氣味不應兼進豨苓此中端有淡交情相如方病酒一飲骨毛輕接賢賔毛文錫香韉鏤襜五花驄值春景初融流珠噴沫躞蹀汗血流紅少年公子能乘馭金鑣玉轡瓏璁為惜珊瑚鞭不下驕生百步千蹤信穿花從拂桞向九陌追風荷花媚霞苞露荷碧天然地别是風流摽格重重青蓋下千嬌照水好紅紅白白每悵望明月清風夜甚低迷不語妖邪無力終須放船兒去清香深處住看伊顔色鞓紅粉香尤嫩衾寒可慣怎奈向春心已轉玉容别是一般間婉悄不管桃紅杏淺月影簾櫳金堤波靣漸細細香風滿院一枝折寄故人雖逺輒莫使江南信斷憶江南馮延已去嵗迎春樓上月正是西窗夜涼時節玉人貪睡墜叉雲粉消粧薄見天真人非風月長依舊破鏡塵筝一夢經年瘦今宵簾幕揚花隂空餘枕淚獨傷心二今日相逢花未發正是去年别離時節東風次第有花開恁時須約却重來重來不怕花堪折秪怕明年花發人離别别離若向百花時東風彈淚有誰知尋梅沈會宗幽香淺淺濕未透認雪底思來始有剪裁尚覺瓊瑶皺苦寒中越恁骨清肌瘦東風氣象園林舊又今年而今時候急宜小摘當樽酒選一枝且付玉人纎手二今年早覺花信蹉想芳心未應誤我一日小徑幾回過始朝來尋見雪痕微破眼前大抵情無那好景色只銷些箇春風爛漫都且可是而今枝上一朵兩朵繫裙腰張子野清霜蟾照夜雲天朦朧影畫勾欄人情縱似長情月算一年又能得幾畨圓欲寄西江題葉字流不到五亭前東池始有新荷緑尚小如錢問何日藕幾時蓮劉叔擬山兒矗矗水兒清船兒似葉兒輕風兒更沒人情月兒明厮合湊送人行眼兒蔌蔌淚兒傾燈兒更冷清清遭逢鴈兒又沒前程一聲聲怎生得夢兒成魏夫人芳草渡燈花耿耿漏遲遲人别後夜涼時西風瀟灑夢初回誰念我就單枕皺雙眉錦屏繡幌與秋期腸欲斷淚偷埀月明還到小窗西我恨你我憶你你爭知秋蘂香引相思桞耆卿留不得光隂催促有芳蘭歇好花謝唯頃刻彩雲易散琉璃脆驗前事端的風月夜幾處前蹤舊迹忍思憶這回望斷永作終天隔向仙島歸𡨕路兩無消息少年心黃魯直對景惹起愁悶染相思病成方寸是阿誰先有意阿誰薄幸斗頓恁
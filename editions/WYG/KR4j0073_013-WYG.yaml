長歌屢勸金盃側歌罷月痕來照席貪歡適簾前重露成㳙滴漁父張仲宗鶴林釣笠披雲青嶂繞緑蓑雨細春江𣺌白鳥飛來風滿棹收綸了漁童拍手樵青笑明月太虛同一照浮家泛宅忘昏曉醉眼冷看城市閙煙波老誰能認得閒煩惱苕溪樓外天寒山欲暮溪邊雪後藏雲樹小艇風斜沙嘴露流年度春光已向梅梢住短夢今宵還到否葦村四望知何處客裏從來無意緒催歸去故園正要鶯花主憶營妓周子文陳襲善鷲嶺峯前欄獨倚愁眉蹙損愁腸碎紅粉佳人傷别􅃑情何已登山臨水年年是常記同來今獨至孤舟晚颺湖光裏衰草斜陽無限意誰與寄西湖水是相思淚丁羲叟十里寒塘初過雨采蓮舟上誰家女秋水接雲迷逺樹天光暮船頭忘了囬來路却繫蘭舟深處住歌聲驚㪚鴛鴦侶波上清風花上霧無計去月明腸斷雙棲處頴上陶生為愛蓮房都一柄雙苞雙蕋雙紅影雨勢斷來風色定秋水净仙郎彩女臨鸞鏡妾有容華君不省花無恩愛猶相並花却有情人薄行心耿耿因花又染相思病二近日門前溪水漲郎船㡬度偷相訪船小難開紅斗帳無計向合歡影裏空惆悵願妾身為紅菡蓞年年生在秋江上更願郎為花底浪無隔障随風逐雨長來徃周紫芝遇坎乘流随分了雞蟲得失能多少兒軰雌黄堪一笑堪一笑鶴長鳬短從他道㡬度秋風吹夢到花姑溪玉人空老喚取扁舟歸去好歸去好孤蓬一枕秋江曉侯彦周過盡百花芳草滿桞絲舞困䦨干煖桞外秋千裙影亂人逐伴舊家心性如今懶斗帳寳香凝不散黄昏院落鶯聲晚紅葉不來音信斷踈酒盞東陽瘦損無人管贈鼎州官妓李知㡬西去征鴻東去水㡬重别恨千山裏夢繞緑窓書半紙何處是桃花溪畔人千里瘦玉倚香愁黛翠勸人須要人先醉問道明朝行也未猶自記燈前背立偷垂淚叚克已龍尾溝邊飛桞絮虎頭山下花無數花底醉眠􅇔杖屨花上露随風散漫飄香霧老去逢春能㡬度不妨且作風流主明日不知風共雨囬首處夕陽又下西山去二春去春來誰是主怨他昨夜江頭雨把酒問春春不語頭懶舉亂紅飛過秋千去芳草澹煙江上路鷓鴣聲裡斜陽暮風外榆錢無意緒空自舞如何買得青春住和門人祝夀蘇子由欒城遺言七十餘年真一夢朝來壽斚兒孫奉憂患已空無復痛心不動此間自有千鈞重蚤嵗文章供世用中年禪味疑天縱石塔成時無一縫誰與共人間天上隨他送漁翁張功甫拂拂春風生草際新晴萬景供遊戲鷗鷺飛來斜照裏金和翠分明畫出真山水遮箇漁翁無愠喜乾坤頓在孤篷底一曲髙歌千古意閒來睡從教月到花汀外春思譚在庵深意纒綿歌宛轉横波停恨燈前見最憶來時門半掩春不暖梨花落盡成秋苑疊皷收聲䑺帆影亂燕飛又趂東風軟目力謾長心力短消息斷青山一㸃和煙逺破陣子一名十拍子李後主四十年來家國三千里地山河鳯閣龍樓連霄漢玉樹瓊枝作烟蘿㡬曽識干戈一旦歸為臣虜沈腰潘髩銷磨最是蒼惶辭廟日教坊獨奏别離歌垂淚對宫娥晏同叔湖上西風斜日荷花落盡紅英金菊滿叢珠顆細海燕辭巢翅羽輕年年嵗嵗情美酒一杯新熟髙歌數闋堪聽不向尊前同一醉可奈光隂似水聲迢迢去未停陸務觀仕至千鍾良易年過七十常稀眼底榮蕐元是夢身後聲名不自知營營端為誰幸有旗亭沽酒何妨繭紙題詩幽谷雲蘿朝采藥静院軒窓夕對棋不歸真箇癡卜拍子趙文鼎桞絮飛時緑暗茶䕷開後春酣花外青帘迷酒思陌上晴光收翠嵐佳辰三月三觧佩人逢遊女踏青草闘宜男醉倒畫欄欄檻北夢遶清江江水南飛鸞與並驂晏同叔海上蟠桃易熟人間好月常圓惟有擘釵分鈿佀離别常多㑹靣難此情湏問天蠟燭到明垂淚熏爐盡日生烟一㸃凄凉愁絶意謾道秦筝有剩絃何曽為細傳花草粹編巻十三

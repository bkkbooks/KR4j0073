body:
  text: 花草稡編巻二十四明陳耀文輯長調沁園春山谷把我身心為伊煩惱筭天便知恨一囘相見百方做計未能猥倚早覔東西鏡裏拈花水中捉月覷着無由得近伊添憔悴鎮花銷翠减玉瘦香肌奴兒又有行期你去即無妨我共誰向眼前常見心猶未足怎生禁得真個分離地角天涯我隨君去掘井為盟無改移君須是做些兒相度莫待臨時春情少游宿靄迷空膩雲籠日晝景漸長正蘭泥膏潤誰家燕喜蜜脾香少觸處蜂忙盡日無人簾幕挂更風逓遊絲時過牆微雨後有桃愁杏怨紅淚淋浪風流寸心易感但依依竚立囘盡柔腸念小奩瑶鑑重匀絳蠟玉籠金斗時熨沈香栁下相將遊冶處便囘首青樓成異鄉相憶事縱蠻箋萬疊難寫微茫次强雲卿韻蔣勝欲結筭平生風流債負請一筆勾盖攻性之兵花圍錦陣毒身之鴆笑齒歌喉豈識吾儒道中樂地絶勝珠簾十里樓迷因底歎晴乾不去待雨淋頭休休着甚來由硬鐵漢從來氣食牛只有千篇好詩好曲都無半㸃閒悶閒愁自古嬌波溺人多矣試問還能溺我否髙擡眼看牽絲傀儡誰弄誰收前調蘆川欹枕深軒散帙虚堂畏景屢移漸披襟臨水搘牀就月蓮香拂面竹色侵衣壓玉為醪折荷當盞卧看河潢星四垂人歸去飢蟬自嘯宿鳥相依癡兒莫道危機悟三十九年都盡非任紆朱拖紫圍金佩玉青錢流地白璧如坻富貴浮雲身名零露事事無心歸便歸秋風動正吴松月冷蓴長鱸肥别恨陸務觀一别秦樓轉眼新春又近放燈憶盈盈倩笑纎纎柔握雪香花語玉暖酥凝念逺愁腸傷春病思自怪平生殊未曽君知否漸香消蜀錦淚漬吴綾難求繫日長繩况倦客飄零少舊朋但江郊鴈起漁村笛怨寒缸委燼孤硯生氷水圍山繞烟昏雲慘縱有髙臺常怯登消魂處是魚箋不到蘭夢無慿退閒辛幼安三徑初成鶴怨猿驚稼軒未來甚雲山自許平生意氣衣冠人笑抵死塵埃意倦須還身閒要早豈為蓴羮鱸鱠哉秋江上看驚弦鴈避駭浪船囘東崗更葺茅齋好都把軒窻臨水開要小舟行釣先應種栁踈籬䕶竹莫礙觀梅秋菊堪餐春蘭可佩留待先生手自栽沈吟乆怕君恩未許此意徘徊夀淮東帥洪遵飲馬咸池揔轡崑崙横鶩九州慶中興機會天生山甫非常事業天授留侯左搏龍蛇右馴虎兕萬里中原談笑收功名早便貂蟬獵獵飛去兠牟新甿無限歡謳盡賣劔賣刀歸買牛正麥揺薰吹黄迷斷隴秧涵朝雨緑遍平疇眼底太平不圖再見羅拜焚香青海頭從今去願君王萬嵗元帥千秋自適嚴少魯曰歸去來歸去來兮吾將安歸但有東籬菊有西園桂有南溪月有北山薇蜂則有房魚還有穴蟻有樓臺獸有衣吾應有雲中舊隱竹裏柴扉人間征路熹微看處處丹楓白露晞况寒原衰草牛羊來下淡烟秋水鱸鱖初肥自笑平生頺然骨相只合持竿坐釣磯都休也對西風無語落日斜暉贈孫季蕃劉潜夫嵗暮天寒一見飄然幅巾布裘儘侵雲鳥道躋攀絶頂拍天鯨浪笑傲中流疇昔期君紫髯鐵面生子當如孫仲謀誰知道到中年猶未建節封侯南來萬里何求因感慨喬公成逺遊悵名姬駿馬都如昨夢隻雞斗酒難到新邱天地無情功名有數千古英雄只麽休平生客獨羊曇一箇淚洒西州和劉潜夫送孫花翁韻劉叔安誰似花翁長年湖海蹇驢弊裘想紅塵醉㡌青樓歌扇揮金談笑惜玉風流吴下阿䝉江南老賀肯為良田二頃謀人間世筭到頭一夢螻蟻王侯悠悠吾道何求况白首相逢說舊遊記踈風淡月寒燈古寺平章詩境分付糟邱聚散摶沙炎凉轉燭歸去來兮萬事休無何有問從前那箇騎鶴揚州和任子嚴避暑趙介之雨接梅霖風袪槐暑麥天巳秋正榴然紅炬枝頭色艶荷翻緑盖池面香浮心景俱清身名何有且向忙中早轉頭塵勞事枉朝思夕計細慮深謀悠悠不復徼求但安分隨縁休便休縱官居極品徒為美玩家稱鉅富未免閒愁遇酒開顔逢歡樂意有似木人騎土牛從他笑看一朝解悟八極遨遊迎方右史徳潤王實之首尾四年臺省好官都做一囘便前頭更有合當做底何妨且恁猛省歸來甲第新成開尊行樂脆管繁絃十二釵囘頭笑這狂生無用削盡官階狂生真箇狂哉潑性氣年來全未灰有龍鱗鳳翼不能攀附牛衣漁具早已安排爛煮園蔬熟煨山芋白髮蒼顔窮秀才官休做莫狂無處着送去瓊崖西巖三澗劉坼父雲壑泉泓小者如杯大者如罌更石筵平瑩寛容數客淙流囘激環遶飛觥三澗交流兩崖懸瀑𢷬雪飛霜落翠屏經行處有丹荑碧草古木蒼藤裵囘却倚山楹笑山水娱人若有情見傍囘側轉峯巒疊疊欲窮還有巖谷層層仰視雲間茅茨雞犬疑有仙家來避秦青林表望烟霞縹緲隱隱鸞笙自題方壺汪莘春至傷春秋至悲秋誰在華胥歎謫仙才氣飛揚跋扈淵明何事慷慨欷歔自我少年如今晩景行半人間真有餘都休問且一觴一詠吾愛吾廬南臯境界何如舍明月清風誰與居望蓬山路杳萬株翠檜方壺門掩四面紅蕖中有佳人綽如姑射一炷清香滿太虛塵寰外任鳴鑾報客飛鶴傳書程端明序曰叔耕蘊霞箋玉滴之竒思出天表蓄而不試憂深思逺未易遽班之賀白也子規方岳儘為春愁儘勸春歸直恁恨深况雨急黄昏寒欺客路月明夜半人夢家林店舍無烟楚鄉寒食一片花飛那可禁空凝佇黯紅蔫翠老江樹隂隂汀洲杜若誰尋想朝鶴怨兮猿夜吟甚連天芳草凄迷離恨拂簾香絮撩亂深心汝亦知乎吾今倦矣甕有餘春可共斟歸來也問淵明而後誰是知音夀宋通判祝和父自有東陽錦水城山幾千百年記往時僅說擁麾列郡而今創見持槖甘泉地脈方興天荒欲破還為鹽梅生鉅賢清和候正風薰日永作地行仙題輿小駐樵川常只恐祖生先着鞭筭誰從井落重新彊理誰從襄峴一洗腥膻幕府歸來未應袖手行有詔書來九天勲名就使吾鄉誇詫盛事流傳寄辛稼軒承㫖劉過吹劔録斗酒彘肩風雨渡江豈不快哉被香山居士與林和靖約東坡老勒駕予囘坡謂西湖正如西子淡粧濃抹臨照臺二公者皆掉頭不顧只恁傳杯白雲天竺去來看金璧崔嵬樓觀開况一澗縈迂東西水遶兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅須晴去訪稼軒未晩且此徘徊廬陵劉過以詩鳴江西厄於韋布放浪吴楚客食諸侯嘉太間來臨安時辛棄疾帥越遣介招之適以事不及行作書歸輅者因效辛體作此詞寄之辛得之大喜其逼真致餽數百千竟邀之去館燕彌月賫贈亹亹改之竟蕩於酒不問也嘗自以此詞語相臺岳珂欣然有得色珂曰詞語固佳恨無刀圭藥療君白日見鬼症耳一座為之軒渠指甲輟耕録銷薄春氷碾輕寒玉漸長漸彎見鳳鞵泥汙偎人强剔龍涎香斷撥火輕翻學撫瑶琴時時欲剪更掬水魚鱗波底寒纎柔處試摘花香滿鏤棗成斑時將粉淚偷彈記綰玉曽教栁傳看筭恩情相着搔便玉體歸期暗數畫徧闌干毎到相思沈吟静處斜倚朱唇皓齒間風流甚把仙郎暗掐莫放春閒前調洛浦凌波為誰微歩輕塵暗生記踏花芳徑亂紅不損步苔幽砌嫩緑無痕襯玉羅慳銷金樣窄載不起盈盈一叚春嬉遊倦笑教人款捻微褪些根有時自度歌聲悄不覺微尖㸃拍頻憶金蓮移換文鴛得侣繡茵催衮舞鳳輕分懊恨深遮牽情半露出没風前烟縷裙知何似似一鈎新月淺碧籠雲眉邵亨貞巧鬬彎環纎凝嫵媚明裝未收似江亭曉玩遥山拂翠宫簾暮捲新月横鈎掃黛嫌濃塗鉛訝淺能畫張郎不自由傷春倦為皺多無力翻做嬌羞填來不滿横秋料着得人間多少愁記魚箋緘啓背人偷歛鴈鈿膠併運指輕揉有喜先占長顰難效栁葉輕黄金在否雙尖鎖試臨鸞一展依舊風流目漆㸃填眶鳳梢侵鬢天然俊生記隔花瞥見踈星烱烱倚欄凝注止水盈盈端正窺簾瞢騰並枕睥睨檀郎長是青端相乆待嫣然一笑密意將成困酣曽被鶯驚强臨鏡挼挱猶未醒憶帳中親見似嫌羅密尊前相顧翻怕燈明醉後看承歌闌鬭弄幾度孜孜頻送情難忘處是絞綃揾透别淚雙零晁以道侍郎生日王千秋荳蔲嬌春桐花羞暖物華漸嘉也不須鶯怨桃封絳蕚也不須蜂恨蘭鬰金芽料是東君都將和氣分付清豐詩禮家充閭慶有青氊事業丹鳳才華乗槎早上雲霞侍祠甘泉瞻羽車試笑慿熊軾嘉禾合穗進司魚鑰菡蓞駢花蕭冦勲名龔黄模樣入拜行趨堤上沙今宵裏且觥船滿棹醉㡌欹斜挽徐元杰國學生三學上書寃乎天哉哲人已痿自綱常一䟽為時太息典刑諸老盡力扶持方哭南牀繼傷右揆死到先生事可哀傷心處笑寒梅冷落血淚淋漓人心公論難欺願君父明明悟此機昔九齡䟽諫禄山必叛更生累奏王氏為危變起范陽禍成新室說着當年人噬臍君知否但皇天祚宋此事無之前調王炎午又是年時杏紅欲吐栁緑初芽奈尋春步逺馬嘶湖曲賣花聲過人唱窻紗暖日晴烟輕衣羅扇看徧王孫七寳車誰知道十年魂夢風雨天涯休休何必傷嗟謾贏得青青兩鬢華且不知門外桃花何代不知江左燕子誰家世事無情天公有意嵗嵗東風嵗嵗花拚一笑且醒來杯酒醉後杯茶吕洞賓火宅牽纒夜去明來早晩無休奈今日不知明日事波波劫劫有甚來由人世風燈草頭珠露我見傷心眼淚流不堅乆似石中迸火水上浮漚休休聞早囘頭把往日風流一筆勾但粗衣淡飯隨縁度日任人笑我我又何求限到頭來不論貧富着甚干忙日夜憂勸年少把家縁棄了海上來遊劉氏我生不辰逢此百罹况乎亂離奈惡姻縁到不夫不主被擒捉去為妾為妻父母公姑弟兄姨妹流落不知東與西心中事把家書寫下分付伊誰越人北向燕支囘首望鴈峯天一涯奈翠鬟雲軟笠兒怎帯栁腰春細馬性難騎缺月踈桐淡烟衰草對此如何不淚垂君知否我生於何處死亦魂歸梅磵詩話云炎景丁丑嵗有過軍挾一婦人經從長興和平酒庫前題此詞云云後書鴈峯劉氏題輪臺子栁耆卿一枕清宵好夢可惜被鄰雞喚覺匆匆䇿馬登途滿目淡烟衰草前驅風觸鳴珂過霜林漸覺驚棲鳥冐征塵逺况自古凄凉長安道行行又歴孤村楚天闊望中未曉念勞生惜芳年壯嵗離多歡少歎斷梗難停暮雲漸杳但黯黯銷魂寸腸慿誰表恁馳驅何時是了又爭似却返瑶京重買千金笑梅花引劉均國千里月千山雪梅花正落寒時節一枝昻一枝藏清香冷艶天賦與孤光孤光似被珠簾隔風度烟遮好顔色粉垂垂玉纍纍先春挺秀不管百花知似霜結與霜别莫使幽人容易折短牆邊矮窻前横斜峭影重叠鬭嬋娟黄昏莫聴樓頭角只恐聴時零亂落醉來看醒來看縈絆麗人瀟洒倚闌干述懐賀方囘縛虎手懸河口車如雞栖馬如狗白綸巾撲黄塵不知我輩可是蓬蒿人衰蘭送客咸陽道天若有情天亦老作雷顛不用錢誰問旗亭美酒斗十千酌天斗更為夀青鬢常青古無有笑嫣然舞翩翩當筵秦女十五語如絃遺音能記秋風曲事去千年猶恨促攬流光繫扶桑爭奈愁來一日却為長前調朱雍梅亭别梅亭别梅亭囘首都如雪粉融融月濛濛江上小車歸去小樓空當時曽傅新粧薄而今一任花零落朝隨風暮隨風竹外孤根猶與幽徑通長相憶無消息庾嶺沈沈雲暗碧玉痕驚對離情無奈水遥天濶隔瓊城年來素袂香不滅此心無限慿誰說夜綿綿路漫漫愁聴枕前吹徹笛聲寒戲代李師周作向子諲花如頰眉如葉小時笑弄階前月最盈盈最惺惺閒愁未識無計說深情十年空省春風面花落花開不相見要相逢得相逢須信靈犀中自有心通同杯勺同斟酌千愁一醉都㤀却花隂邊栁隂邊幾囘擬待偷憐不成憐傷春玉瘦慵梳掠抛擲琵琶閒處着莫猜疑莫嫌遲鴛鴦翡翠終是一雙飛將進酒髙仲常城下路凄風露今人犁田昔人墓岸頭沙帯蒹葭漫漫昔時流水今人家黄埃赤日長安道倦客無漿馬無草開函關閉函關千古如今不見一人閒六國擾三秦掃初謂商山遺四老馳單車致緘書裂荷焚芰接武曵長裾髙陽真得杯中趣身到醉鄉安稳處生忘形死忘名二豪侍側劉伶初未醒紫萸香慢姚雲文近重陽偏多風雨絶憐此日暄明問秋香濃未待攜客出西城正自羇懐多感怕荒臺髙處更不勝情向樽前又憶漉酒揷花人只坐上已無老兵悽情淺醉還醒愁不肯與詩平記長楸走馬雕弓􅀈栁前事休評紫萸一枝傳賜夢誰到漢家陵儘烏紗便隨風去要天知道華髮如此星星歌罷涕零八歸湖中送胡徳華姜䕫芳蓮墜粉踈桐吹緑庭院暗雨乍歇無端抱影銷魂處還見篠牆螢暗蘚階蛩切送客重尋西去路問水面琵琶誰撥最可惜一片江山總付與啼鴂長恨相從未款而今何事又對西風離别渚寒烟淡棹移人逺縹緲行舟如葉想文君望乆倚竹愁生步羅襪歸來後翠尊雙飲下了珠簾玲瓏閒看月史達祖秋江帯雨寒沙縈水人看畫閣愁獨烟簔散響驚詩思還被亂鷗飛去繡句難續冷眼盡歸圖畫上認隔岸微茫雲屋想半屬魚市樵村欲暮競燒竹須信風流未老慿誰持酒慰此凄凉心目一鞭南陌幾篙官渡賴有歌眉舒緑只匆匆眺逺早覺閒愁挂喬木應難禁故人天際望徹淮山相思無鴈足宣清憶舊栁耆卿殘月朦朧小宴闌珊歸來輕寒凛凛背銀缸孤館乍眠擁重衾醉魂猶噤永漏頻傳前歡已去離愁一枕暗尋思舊追遊神京風物如錦念擲果朋儕絶纓宴㑹當時曽痛飲命舞燕翩翩歌珠貫串向玳筵前盡是神仙流品至更闌踈狂轉甚更相將鳳幃鴛寢玉釵亂横任散盡髙陽這歡娱甚時重恁賀新郎春情李玉篆縷銷金鼎醉沈沈庭隂轉午畫堂人静芳草王孫知何處惟有楊花糝徑漸玉枕騰騰春醒簾外殘紅春已透鎮無聊殢酒厭厭病雲鬢亂未忺整江南舊事休重省徧天涯尋消問息斷鴻難倩月滿西樓慿欄乆依舊歸期未定又只恐瓶沈金井嘶騎不來銀燭暗枉教人立盡梧桐影誰伴我對鸞鏡子瞻乳燕飛華屋悄無人槐隂轉午晩凉新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰來推繡户枉教人夢斷瑶臺曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蘂都盡伴君幽獨穠艶一枝細看取芳心千重似束又恐被秋風驚緑若待得君來向此花前對酒不忍觸共粉淚兩蔌蔌耆舊續聞云陸辰州云此詞後攧用榴花事晁以道家有東坡真跡晁云東坡有妾名朝雲榴花朝雲死於嶺外惟榴花獨存觀浮花浪蘂都盡伴君幽獨可見矣近觀顧景蕃續註因悟白團扇瑶臺曲皆侍妾故事東坡用此乃知辰州得榴花事於晁氏為不妄古今詞話以為東坡為杭妓秀蘭作詞名賀新凉苕溪辨其非猶未及此因載之夏意葉夢得睡起流鶯語掩蒼苔房櫳向曉亂紅無數吹盡殘花無人問惟有垂楊自舞漸暖靄初囘輕暑寳扇重尋明月影暗塵侵尚有乗鸞女驚舊恨鎮如許江南夢斷衡臯渚浪粘天蒲萄漲緑半空烟雨無限樓前滄波意誰採蘋花寄取但悵望蘭舟容與萬里雲帆何時到送孤鴻目斷千山阻誰為我唱金縷送胡澹菴張仲宗夢繞神州路恨西風連營畫角故宫離黍底事崑崙傾砥柱九地黄流亂注聚萬落千村狐兔天意從來髙難問况人情易老悲如訴更南浦送君去凉生暗栁催殘暑耿斜河踈星澹月斷雲微度萬里江山知何處囘首對床夜雨鴈不到書成誰與目盡青天懐今古肯兒曹恩怨相爾汝舉大白聴金縷别弟辛幼安緑樹聴啼鴂更那堪鷓鴣聲住杜鵑聲切啼到春歸無尋處苦恨芳菲都歇筭未抵人間離别馬上琵琶關塞黒更長門翠輦辭金闕看燕燕送歸妾將軍百戰身名烈向河梁囘頭萬里故人長絶易水蕭蕭西風冷滿座衣冠似雪正壯士悲歌未徹啼鳥還知如許恨料不啼清淚長啼血誰共我醉明月贈鄉人朱唐卿劉龍洲多病劉郎瘦最傷心天寒嵗晩客他鄉乆大舸翩翩何許至元是髙陽舊友便一笑相歡攜手與問武昌城下月又何如楊子江頭栁追往事兩眉皺燭花自剪明如晝喚青娥小紅樓上慇懃勸酒昵昵琵琶恩怨語春筍輕籠翠袖看舞徹金釵微溜若見故鄉吾父老道長安市上强如舊重會面幾時又二贈張彦功曉印霜花步夢半醒扶上雕鞍馬嘶人去嵐濕青絲雙轡冷緩控野梅江路聴畫角吹殘更鼓悲壯寒聲撩客恨甚貂裘重擁愁無數霜月白照離緒青樓囘首家何處早山遥水濶天低斷腸烟樹誰念天涯牢落况輕負暖烟濃雨記酒醒香銷時語客裏歸韉須早發怕天寒風急相思苦應為我翠眉聚三院宇重重掩醉沈沈亭隂轉午繡簾髙捲金鴨香濃噴寳篆驚起雕梁語燕正架上酴醿開徧嫩蕚梢頭舒素臉似月娥初試宫粧淺風力嫩異香軟佳人無意拈針線遶朱欄六曲徘徊為他留戀試把花心輕輕數暗計歸期近逺奈數了依然重怨把酒問春春不管枉教人只恁空腸斷腸斷處怎消遣四老去相如倦向文君說似而今怎生消遣衣袂京塵曽染處空有香紅尚軟料彼此魂消腸斷一枕新凉眠客舎聴梧桐踈雨秋風顫燈暈冷記初見樓低不放珠簾捲晩粧殘翠蛾狼籍淚痕流臉人道愁來須殢酒無奈愁多酒淺但託意焦琴紈扇莫鼓琵琶江上曲怕荻花楓葉俱悽怨雲萬叠寸心逺改之自記云去年秋余試牒四明賦贈老娼至今天下與禁中皆歌之江西人來以為鄧南秀詞非也宫詞游子明暖靄浮晴籞鎖垂楊籠池罩閣萬絲千縷池上曉光分宿霧日近羣芳易吐尋並蒂闌干凝竚不信釵頭飛鳳去但寳刀被妾留還住天一笑萬花妬阿嬌正好金屋貯甚西風易得蕭踈扇鸞塵土一自昭陽扃玉户牆角土花無數况多病情傷幽素别殿時聞簫鼓奏望紅雲冉冉知何處天尺五去無路清浪軒送春嚴仁碧浪揺春渚浸虚簷蒲萄滉漾翠綃掀舞委曲經過臺下路載取落花東去問花亦漂流良苦花不能言應有恨恨十分都被春風悮同此恨有飛絮人生聚散原無據儘慿欄一尊相對蘋洲春莫嫉色冲冲空悵望淚盡世閒兒女君不見千金求賦飛燕婕妤今何在看粘雲江影傷千古流不去斷魂處感舊李子永門掩長安道捲重簾垂楊散暑嫩凉生早午夢驚囘庭隂翠蝶舞鶯吟未了政露冷芙蓉池沼金鴈塵昏么絃斷理餘音尚想腰肢裊歡漸逺思還繞臨臯望極滄江渺晩潮平湘烟萬頃斷虹殘照綵舫凌波分飛後别浦菱花自老問錦鯉何時重到樓迥層城看不見對瀟瀟暮雨憐芳草幽恨濶楚天杳夏趙文鼎晝永重簾捲乍池塘一番過雨芰荷初展竹引新梢半含粉緑䕃扶踈滿院過花絮蜂稀蝶懶窻户沈沈人不到伴清幽時有流鶯囀凝思乆意何限玉釵墜枕風鬟顫湛虛堂壺氷瑩徹簟波零亂自是仙姿清無暑月影空垂素扇破午睡香銷餘篆一枕湖山千里夢正白蘋烟棹歸來晩雲弄碧楚天逺端午劉潜夫思逺樓前路望平堤十里湖光畫船無數緑盖盈盈紅粉面葉底荷花解語鬭巧結同心雙縷尚有經年離别恨一絲絲總是相思處相見也又重午清江舊事傳荆楚歎人情千載如新尚沈菰黍且盡樽前今日醉誰肯獨醒弔古泛幾盞菖蒲緑醑兩兩龍舟爭競渡奈珠簾暮捲西山雨看未足怎歸去九日湛湛長空黒更那堪斜風細雨亂山如織老眼平生空四海頼有髙樓百尺看浩蕩千崖秋色白髪書生神州淚儘凄凉不向牛山滴追往事去無迹少時自負凌雲筆到如今春華落盡滿懐蕭瑟常恨世人新意少愛說南朝狂客把破㡌年年拈出若對黄花孤負酒怕黄花也笑人岑寂鴻北去日西匿七夕宋謙父靈鵲橋初就記迢迢重湖風浪去年時候嵗月不留人易老萬事茫茫宇宙但獨對西風搔首巧拙豈關今夕事奈癡兒騃女流傳謬添話柄栁州栁道人識破灰心乆只好風凉月佳時踈狂如舊休笑雙星經嵗别人到中年巳後雲雨夢可曽常有雪藕調氷花熏茗正梧桐雨過新凉透且隨分一杯酒前調戴式之蝸角爭多少是英雄割據乾坤到頭休了一片泥塗荒草地盡是魚龍故道新堤上風濤難保滄海桑田何時變怕桑田未變人先老休為此生煩惱訟庭不許頻頻到這官坊翻來覆去有何分曉無諍人中為第一長訟原非吉兆但有恨平章不早樽酒喚囘和氣在看從來兄弟依然好把前事付一笑上趙侍郎生日李公甫鵠立通明殿又重逢揆余初度夢庚華旦不學花奴簮紅槿且看秋香宜晩任甲子從新更換天欲東都修車馬故降神生甫維周翰歌崧嶽詠江漢明堂朝罷夷琛獻引星辰萬人共聴風塵長筭清晝山東諸將捷席捲黄河兩岸問誰在玉皇香案師保萬民功業别向西京原廟行圭瓉定郟鄏卜瀍澗春感吴毅甫笑口開能幾把年年芳情冶思總抛閒裏桃杏枝頭春纔半寒食清明又是但嵗月飈飛川逝囘首秦樓雙燕語到如今目斷斜陽外將往事試重記香羅尚有相思淚笑人生新愁易積舊歡難繼水上流紅無覔處還隔關山萬里但贏得新來憔悴昨夜東風顛狂後想餘芳盡是飄零底詞寫就倩誰寄和劉潜夫韻陳敬叟曉夢鶯呼起便安排詩家厨傳酒家行李㸃檢花邊新雨露春在萬家生齒道官似錦溪清駛但使有人耕緑野正不妨鼓吹頻來此方覔句且夷俟畫橋西畔多春意記年年曽來幾度落花流水行到水窮雲起處依約輞川竹里興未屬王孫公子料想明年端門裏有傳柑宴罷黄封醉肯囘首萬杉底前調黄叔暘倦整摩天翼笑歸來㸃畫亭臺按行泉石落落元龍湖海氣更着髙樓百尺收攬盡水光山色曽駕飈車蟾宫去幾囘批惜月支風敕斯二者慣相識玲瓏窻户青紅濕夜深時寒光爽氣洗清肝鬲似此交遊真洒落判與升堂入室有萬象來為賓客不用笙歌輕㸃涴看仙翁手搦虹霓筆吟思逺兩峯碧西湖文及翁一勺西湖水渡江來百年歌舞百年酣醉囘首洛陽花世界烟渺黍離之地更不復新亭墮淚蔟樂紅粧揺畫舫問中流擊楫誰人是千古恨幾時洗余生自負澄清志更有誰磻溪未遇傅巖未起國事如今誰仗倚衣帯一江而巳便都道江神堪恃借問孤山林處士但掉頭笑指梅花蕋天下事可知矣石城弔古王千秋弔古城頭去正髙秋霜晴木落路通洲渚欲問紫髯分鼎事只有荒祠烟樹巫覡去乆無簫鼓霸業荒凉遺堞墜但蒼崖日閲征帆度興與廢幾今古夕陽細草空凝佇追思當時子敬用心良誤要約劉郎銅雀醉底事遽爭荆楚遂但見蜀吳烽舉致使五官伸脚睡喚諸兒晝取長陵土遺此恨欲誰語感懐李南金流落今如許我亦三生杜牧為秋娘着句先自多愁多感慨更值江南春暮君看取落花飛絮也有吹來穿繡幌有因風飄墮隨塵土人世事總無據佳人命薄君休訴若說與英雄心事一生更苦且盡樽前今日意休記緑窻眉嫵但春到兒家庭户幽恨一簾烟月曉恐明年鴈亦無尋處渾欲倩鶯留住贈建寧妓唐玉吴履齋約隱紀談可意人如玉小簾櫳輕勻淡竚道家粧束長恨春歸無尋處全在波明黛緑看冶葉倡條渾俗比似江梅清有韻更臨風對月斜依竹看不足詠不足曲屏半掩春山簇正輕寒夜永花睡半欹殘燭縹緲九霞光裏夢香在衣裳賸馥又只恐銅壺聲促試問送人歸去後對一簾花影垂金粟腸易斷情難續送太守平江妓豹隱紀談春色原無主荷東君着意看承等閒分付多少無情風與浪又那更蝶欺蜂妬筭燕雀眼前無數縱使簾櫳能愛䕶到如今已是成遲暮芳草碧遮歸路看看做到難言處怕仙槎輕轉旌旗易歌襦袴月滿西樓絃索静雲蔽崑城閬府便恁地一帆輕舉獨倚闌干愁拍碎慘玉容淚眼如紅雨去與住兩難訴乳燕飛寄劉閬風汪莘曉趁西湖約到湖頭烟消日出波生兩脚自挈白魚攜碧酒要與詩人共酌把樓上珠簾搭却坐對荷花三萬朶念西鄰未嫁肌如削待折與不堪着别來又見秋蕭索恨無由將予風月伴君雲鶴想見登山臨水處醉把茱萸盤礴唱白雪陽春新作憶自東籬人去後筭人間黄菊空零落歎作